<svg xmlns="http://www.w3.org/2000/svg" width="360" height="2010" viewBox="0 0 360 2010" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">TOEIC 860点 パート別許容失点数と70分完走タイムマップ（モバイル版）</title>
  <desc id="svgdesc">リスニング4パートとリーディング3パートそれぞれの許容失点数・目標正答率・攻略ポイントを縦に並べて示す戦略マップ</desc>
  <defs>
    <style>.tt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="360" height="2010" rx="16" fill="#F0F9FF"/>

  <rect x="20" y="20" width="320" height="60" rx="12" fill="#1E293B"/>
  <text x="180" y="42" text-anchor="middle" class="tt" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1">大谷流・TOEIC860点 攻略ナビ</text>
  <text x="180" y="64" text-anchor="middle" class="tt" font-size="14" font-weight="800" fill="#FFFFFF">許容失点数と70分完走マップ</text>

  <text x="180" y="106" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#334155">リスニング（45分・自分でペース調整不可）</text>

  <!-- Part1 -->
  <rect x="20" y="122" width="320" height="176" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="122" width="320" height="34" rx="14" fill="#3B82F6"/>
  <text x="180" y="144" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#fff">PART 1　写真描写（6問）</text>
  <text x="180" y="180" text-anchor="middle" class="tt" font-size="14" font-weight="800" fill="#1E3A8A">許容失点：0問（正答率100%）</text>
  <text x="180" y="212" text-anchor="middle" class="tt" font-size="10.5" fill="#1E3A8A">紛らわしい選択肢を消去法で確実に除外</text>
  <text x="180" y="238" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#1D4ED8">絶対に落とせないハコ</text>

  <!-- Part2 -->
  <rect x="20" y="310" width="320" height="176" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="310" width="320" height="34" rx="14" fill="#3B82F6"/>
  <text x="180" y="332" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#fff">PART 2　応答問題（25問）</text>
  <text x="180" y="368" text-anchor="middle" class="tt" font-size="14" font-weight="800" fill="#1E3A8A">許容失点：2問まで（92%以上）</text>
  <text x="180" y="400" text-anchor="middle" class="tt" font-size="10.5" fill="#1E3A8A">間接応答・否定疑問文で「詰まる」をゼロに</text>
  <text x="180" y="426" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#1D4ED8">瞬発力で決めるハコ</text>

  <!-- Part3 -->
  <rect x="20" y="498" width="320" height="176" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="498" width="320" height="34" rx="14" fill="#3B82F6"/>
  <text x="180" y="520" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#fff">PART 3　会話問題（39問）</text>
  <text x="180" y="556" text-anchor="middle" class="tt" font-size="14" font-weight="800" fill="#1E3A8A">許容失点：5〜6問（85%以上）</text>
  <text x="180" y="588" text-anchor="middle" class="tt" font-size="10.5" fill="#1E3A8A">意図問題・図表問題を先読みで確実に得点</text>
  <text x="180" y="614" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#1D4ED8">先読みが命のハコ</text>

  <!-- Part4 -->
  <rect x="20" y="686" width="320" height="176" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="686" width="320" height="34" rx="14" fill="#3B82F6"/>
  <text x="180" y="708" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#fff">PART 4　説明文問題（30問）</text>
  <text x="180" y="744" text-anchor="middle" class="tt" font-size="14" font-weight="800" fill="#1E3A8A">許容失点：4〜5問（85%以上）</text>
  <text x="180" y="776" text-anchor="middle" class="tt" font-size="10.5" fill="#1E3A8A">冒頭30秒で全体像を把握してから設問へ</text>
  <text x="180" y="802" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#1D4ED8">全体把握が命のハコ</text>

  <text x="180" y="854" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#334155">リーディング：70分で全問完走する時間配分</text>

  <!-- gauge as stacked list -->
  <rect x="20" y="870" width="320" height="40" rx="10" fill="#FDE68A"/>
  <text x="180" y="895" text-anchor="middle" class="tt" font-size="12.5" font-weight="800" fill="#78350F">Part5：10分</text>
  <rect x="20" y="914" width="320" height="40" rx="10" fill="#DDD6FE"/>
  <text x="180" y="939" text-anchor="middle" class="tt" font-size="12.5" font-weight="800" fill="#4C1D95">Part6：8分</text>
  <rect x="20" y="958" width="320" height="40" rx="10" fill="#FCA5A5"/>
  <text x="180" y="983" text-anchor="middle" class="tt" font-size="12.5" font-weight="800" fill="#7F1D1D">Part7：52分</text>

  <!-- Part5 -->
  <rect x="20" y="1022" width="320" height="234" rx="14" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2"/>
  <rect x="20" y="1022" width="320" height="34" rx="14" fill="#F59E0B"/>
  <text x="180" y="1044" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#fff">PART 5　短文穴埋め（30問）</text>
  <text x="180" y="1076" text-anchor="middle" class="tt" font-size="13" font-weight="800" fill="#78350F">10分で解き切る</text>
  <text x="180" y="1102" text-anchor="middle" class="tt" font-size="14" font-weight="800" fill="#78350F">許容失点：1〜2問（95%以上）</text>
  <text x="180" y="1130" text-anchor="middle" class="tt" font-size="10.5" fill="#78350F">語彙問題は1問も落とさない。</text>
  <text x="180" y="1150" text-anchor="middle" class="tt" font-size="10.5" fill="#78350F">文法問題は1問10秒以内に判断。</text>
  <text x="180" y="1180" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#B45309">秒殺で稼ぐ「速攻のハコ」</text>

  <!-- Part6 -->
  <rect x="20" y="1272" width="320" height="234" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="20" y="1272" width="320" height="34" rx="14" fill="#8B5CF6"/>
  <text x="180" y="1294" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#fff">PART 6　長文穴埋め（16問）</text>
  <text x="180" y="1326" text-anchor="middle" class="tt" font-size="13" font-weight="800" fill="#4C1D95">8分で解き切る</text>
  <text x="180" y="1352" text-anchor="middle" class="tt" font-size="14" font-weight="800" fill="#4C1D95">許容失点：1〜2問（90%以上）</text>
  <text x="180" y="1380" text-anchor="middle" class="tt" font-size="10.5" fill="#4C1D95">文章全体の流れを把握してから</text>
  <text x="180" y="1400" text-anchor="middle" class="tt" font-size="10.5" fill="#4C1D95">空欄に適切な語句・文を選ぶ。</text>
  <text x="180" y="1430" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#5B21B6">文脈把握の「橋渡しのハコ」</text>

  <!-- Part7 -->
  <rect x="20" y="1522" width="320" height="234" rx="14" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="20" y="1522" width="320" height="34" rx="14" fill="#EF4444"/>
  <text x="180" y="1544" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#fff">PART 7　読解問題（54問）</text>
  <text x="180" y="1576" text-anchor="middle" class="tt" font-size="13" font-weight="800" fill="#7F1D1D">52分で全問読み切る</text>
  <text x="180" y="1602" text-anchor="middle" class="tt" font-size="14" font-weight="800" fill="#7F1D1D">許容失点：10〜11問（80%以上）</text>
  <text x="180" y="1630" text-anchor="middle" class="tt" font-size="10.5" fill="#7F1D1D">1パッセージ2〜3分・複数</text>
  <text x="180" y="1650" text-anchor="middle" class="tt" font-size="10.5" fill="#7F1D1D">パッセージ4〜5分で処理。</text>
  <text x="180" y="1680" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#B91C1C">860点最大の壁「時間切れのハコ」</text>

  <!-- Footer note -->
  <text x="180" y="1730" text-anchor="middle" class="tt" font-size="11" fill="#374151">800点台で伸び悩む人の9割は</text>
  <text x="180" y="1748" text-anchor="middle" class="tt" font-size="11" fill="#374151">「Part7の時間切れ」か</text>
  <text x="180" y="1766" text-anchor="middle" class="tt" font-size="11" fill="#374151">「意図・図表問題での失点」のどちらか。</text>
  <text x="180" y="1792" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#16A34A">この2つのハコさえ埋めれば、860点の壁は</text>
  <text x="180" y="1810" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#16A34A">正確な時間配分ゲームとして必ず突破できます。</text>

  <!-- total tally box -->
  <rect x="30" y="1846" width="300" height="130" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="180" y="1878" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#1E293B">200問中の許容失点合計の目安</text>
  <text x="180" y="1918" text-anchor="middle" class="tt" font-size="17" font-weight="800" fill="#16A34A">約22〜26問まで</text>
  <text x="180" y="1940" text-anchor="middle" class="tt" font-size="10.5" fill="#16A34A">（正答率87〜89%相当）</text>
  <text x="180" y="1962" text-anchor="middle" class="tt" font-size="10" fill="#64748B">＝860点ラインの現実的な目安ゾーン</text>
</svg>
