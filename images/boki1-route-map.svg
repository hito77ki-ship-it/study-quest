<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="990" viewBox="0 0 1200 990" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">日商簿記1級 予備校×独学 生存ルート分岐マップ</title>
  <desc id="svgdesc">予算とライフスタイルに合わせて選ぶ、予備校ルート・ハイブリッドルート・独学フルコースルートの3分岐フローチャート</desc>
  <defs>
    <linearGradient id="bBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8f4"/>
      <stop offset="0.5" stop-color="#f9f7ff"/>
      <stop offset="1" stop-color="#f4fff8"/>
    </linearGradient>
    <linearGradient id="bTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="bC1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="bC2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="bC3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="bGoal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="bShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <style>.bt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="990" rx="20" fill="url(#bBg)"/>
  <circle cx="100" cy="120" r="90" fill="#FFEDD5" opacity="0.5"/>
  <circle cx="1100" cy="140" r="100" fill="#EDE9FE" opacity="0.45"/>
  <circle cx="600" cy="960" r="120" fill="#D1FAE5" opacity="0.4"/>

  <!-- Title bar -->
  <rect x="40" y="24" width="1120" height="64" rx="14" fill="url(#bTitle)"/>
  <text x="600" y="48" text-anchor="middle" class="bt" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="3">予算とライフスタイルで選ぶ</text>
  <text x="600" y="72" text-anchor="middle" class="bt" font-size="21" font-weight="800" fill="#FFFFFF">日商簿記1級 予備校×独学 生存ルート分岐マップ</text>
  <text x="600" y="106" text-anchor="middle" class="bt" font-size="13" fill="#64748B">「予備校 or 独学」の二択で悩まなくていい。あなたに合う3つ目のルートもあります</text>

  <!-- Start node -->
  <rect x="380" y="120" width="440" height="52" rx="26" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2" filter="url(#bShadow)"/>
  <text x="600" y="152" text-anchor="middle" class="bt" font-size="14" font-weight="700" fill="#1E293B">START：簿記2級合格 or 同等の実力がある人</text>

  <!-- Split connectors -->
  <line x1="600" y1="172" x2="600" y2="192" stroke="#94A3B8" stroke-width="2.5"/>
  <line x1="600" y1="192" x2="220" y2="192" stroke="#94A3B8" stroke-width="2.5"/>
  <line x1="600" y1="192" x2="980" y2="192" stroke="#94A3B8" stroke-width="2.5"/>
  <line x1="220" y1="192" x2="220" y2="206" stroke="#94A3B8" stroke-width="2.5"/>
  <line x1="600" y1="192" x2="600" y2="206" stroke="#94A3B8" stroke-width="2.5"/>
  <line x1="980" y1="192" x2="980" y2="206" stroke="#94A3B8" stroke-width="2.5"/>
  <polygon points="220,206 213,196 227,196" fill="#94A3B8"/>
  <polygon points="600,206 593,196 607,196" fill="#94A3B8"/>
  <polygon points="980,206 973,196 987,196" fill="#94A3B8"/>

  <!-- ================= COLUMN 1: 予備校ルート ================= -->
  <g filter="url(#bShadow)">
    <rect x="40" y="208" width="360" height="210" rx="18" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <rect x="40" y="208" width="360" height="44" rx="18" fill="url(#bC1)"/>
    <rect x="40" y="228" width="360" height="24" fill="#F59E0B"/>
  </g>
  <text x="220" y="228" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="rgba(255,255,255,.75)" letter-spacing="2">ROUTE 1　安心重視</text>
  <text x="220" y="246" text-anchor="middle" class="bt" font-size="16" font-weight="800" fill="#fff">予備校ルート</text>

  <!-- icon: shield + check -->
  <path d="M220,264 L248,274 L248,298 Q248,318 220,328 Q192,318 192,298 L192,274 Z" fill="#FFEDD5" stroke="#EA580C" stroke-width="2.5"/>
  <polyline points="206,296 216,306 234,282" fill="none" stroke="#EA580C" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="220" y="346" text-anchor="middle" class="bt" font-size="12" font-weight="700" fill="#9A3412">質問し放題・カリキュラム完備</text>
  <text x="220" y="363" text-anchor="middle" class="bt" font-size="12" fill="#9A3412">短期集中で一気に合格を狙う</text>

  <rect x="58" y="378" width="324" height="34" rx="10" fill="rgba(245,158,11,.10)" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="220" y="392" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#9A3412">予算目安：5〜15万円</text>
  <text x="220" y="406" text-anchor="middle" class="bt" font-size="10.5" fill="#9A3412">向いている人：短期合格・自走に不安がある人</text>

  <!-- Steps column 1 -->
  <g class="bt">
    <!-- step1 -->
    <rect x="40" y="430" width="360" height="64" rx="12" fill="#FFFBF5" stroke="#FDBA74" stroke-width="1.5"/>
    <circle cx="74" cy="462" r="18" fill="#F59E0B"/>
    <text x="74" y="468" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">1</text>
    <text x="104" y="456" font-size="13" font-weight="700" fill="#7C2D12">予備校に申し込み</text>
    <text x="104" y="476" font-size="11" fill="#9A3412">TAC・大原・CPA会計学院など</text>
    <line x1="74" y1="494" x2="74" y2="518" stroke="#FDBA74" stroke-width="2.5"/>
    <polygon points="74,518 68,507 80,507" fill="#FDBA74"/>

    <!-- step2 -->
    <rect x="40" y="518" width="360" height="64" rx="12" fill="#FFFBF5" stroke="#FDBA74" stroke-width="1.5"/>
    <circle cx="74" cy="550" r="18" fill="#F59E0B"/>
    <text x="74" y="556" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">2</text>
    <text x="104" y="544" font-size="13" font-weight="700" fill="#7C2D12">カリキュラム通りに受講</text>
    <text x="104" y="564" font-size="11" fill="#9A3412">迷わず順番通りに進められる</text>
    <line x1="74" y1="582" x2="74" y2="606" stroke="#FDBA74" stroke-width="2.5"/>
    <polygon points="74,606 68,595 80,595" fill="#FDBA74"/>

    <!-- step3 -->
    <rect x="40" y="606" width="360" height="64" rx="12" fill="#FFFBF5" stroke="#FDBA74" stroke-width="1.5"/>
    <circle cx="74" cy="638" r="18" fill="#F59E0B"/>
    <text x="74" y="644" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">3</text>
    <text x="104" y="632" font-size="13" font-weight="700" fill="#7C2D12">答練・模試で実戦力UP</text>
    <text x="104" y="652" font-size="11" fill="#9A3412">本番形式に慣れておく</text>
    <line x1="74" y1="670" x2="74" y2="694" stroke="#FDBA74" stroke-width="2.5"/>
    <polygon points="74,694 68,683 80,683" fill="#FDBA74"/>

    <!-- step4 -->
    <rect x="40" y="694" width="360" height="64" rx="12" fill="#FFFBF5" stroke="#FDBA74" stroke-width="1.5"/>
    <circle cx="74" cy="726" r="18" fill="#F59E0B"/>
    <text x="74" y="732" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">4</text>
    <text x="104" y="720" font-size="13" font-weight="700" fill="#7C2D12">疑問はその場で講師に質問</text>
    <text x="104" y="740" font-size="11" fill="#9A3412">詰まった日に即解消できる</text>
  </g>

  <!-- ================= COLUMN 2: ハイブリッドルート ================= -->
  <g filter="url(#bShadow)">
    <rect x="420" y="208" width="360" height="210" rx="18" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
    <rect x="420" y="208" width="360" height="44" rx="18" fill="url(#bC2)"/>
    <rect x="420" y="228" width="360" height="24" fill="#8B5CF6"/>
  </g>
  <text x="600" y="228" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="rgba(255,255,255,.75)" letter-spacing="2">ROUTE 2　いいとこ取り</text>
  <text x="600" y="246" text-anchor="middle" class="bt" font-size="16" font-weight="800" fill="#fff">ハイブリッドルート</text>

  <!-- icon: venn circles -->
  <circle cx="588" cy="292" r="26" fill="#DDD6FE" opacity="0.9" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="612" cy="292" r="26" fill="#C4B5FD" opacity="0.75" stroke="#7C3AED" stroke-width="2"/>

  <text x="600" y="346" text-anchor="middle" class="bt" font-size="12" font-weight="700" fill="#5B21B6">無料講義＋苦手科目だけ課金</text>
  <text x="600" y="363" text-anchor="middle" class="bt" font-size="12" fill="#5B21B6">コストと安心感のバランス型</text>

  <rect x="438" y="378" width="324" height="34" rx="10" fill="rgba(139,92,246,.10)" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="600" y="392" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#5B21B6">予算目安：3〜8万円</text>
  <text x="600" y="406" text-anchor="middle" class="bt" font-size="10.5" fill="#5B21B6">向いている人：コストは抑えたいが要所は手厚く</text>

  <!-- Steps column 2 -->
  <g class="bt">
    <rect x="420" y="430" width="360" height="64" rx="12" fill="#FAF9FF" stroke="#C4B5FD" stroke-width="1.5"/>
    <circle cx="454" cy="462" r="18" fill="#8B5CF6"/>
    <text x="454" y="468" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">1</text>
    <text x="484" y="456" font-size="13" font-weight="700" fill="#4C1D95">CPAラーニングで全範囲を独学</text>
    <text x="484" y="476" font-size="11" fill="#5B21B6">無料講義で基礎をまず固める</text>
    <line x1="454" y1="494" x2="454" y2="518" stroke="#C4B5FD" stroke-width="2.5"/>
    <polygon points="454,518 448,507 460,507" fill="#C4B5FD"/>

    <rect x="420" y="518" width="360" height="64" rx="12" fill="#FAF9FF" stroke="#C4B5FD" stroke-width="1.5"/>
    <circle cx="454" cy="550" r="18" fill="#8B5CF6"/>
    <text x="454" y="556" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">2</text>
    <text x="484" y="544" font-size="13" font-weight="700" fill="#4C1D95">連結・原価計算だけ単科講座</text>
    <text x="484" y="564" font-size="11" fill="#5B21B6">沼りやすい論点だけピンポイント課金</text>
    <line x1="454" y1="582" x2="454" y2="606" stroke="#C4B5FD" stroke-width="2.5"/>
    <polygon points="454,606 448,595 460,595" fill="#C4B5FD"/>

    <rect x="420" y="606" width="360" height="64" rx="12" fill="#FAF9FF" stroke="#C4B5FD" stroke-width="1.5"/>
    <circle cx="454" cy="638" r="18" fill="#8B5CF6"/>
    <text x="454" y="644" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">3</text>
    <text x="484" y="632" font-size="13" font-weight="700" fill="#4C1D95">AIに疑問を分解して質問</text>
    <text x="484" y="652" font-size="11" fill="#5B21B6">「なぜ」をその場で解消する</text>
    <line x1="454" y1="670" x2="454" y2="694" stroke="#C4B5FD" stroke-width="2.5"/>
    <polygon points="454,694 448,683 460,683" fill="#C4B5FD"/>

    <rect x="420" y="694" width="360" height="64" rx="12" fill="#FAF9FF" stroke="#C4B5FD" stroke-width="1.5"/>
    <circle cx="454" cy="726" r="18" fill="#8B5CF6"/>
    <text x="454" y="732" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">4</text>
    <text x="484" y="720" font-size="13" font-weight="700" fill="#4C1D95">予備校の模試だけ単発受験</text>
    <text x="484" y="740" font-size="11" fill="#5B21B6">実力を客観的に測定しておく</text>
  </g>

  <!-- ================= COLUMN 3: 独学フルコースルート ================= -->
  <g filter="url(#bShadow)">
    <rect x="800" y="208" width="360" height="210" rx="18" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
    <rect x="800" y="208" width="360" height="44" rx="18" fill="url(#bC3)"/>
    <rect x="800" y="228" width="360" height="24" fill="#22C55E"/>
  </g>
  <text x="980" y="228" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="rgba(255,255,255,.75)" letter-spacing="2">ROUTE 3　コスト最小</text>
  <text x="980" y="246" text-anchor="middle" class="bt" font-size="16" font-weight="800" fill="#fff">独学フルコースルート</text>

  <!-- icon: open book + spark -->
  <path d="M950,272 Q980,264 980,274 L980,312 Q980,302 950,310 Z" fill="#BBF7D0" stroke="#16A34A" stroke-width="2.2"/>
  <path d="M1010,272 Q980,264 980,274 L980,312 Q980,302 1010,310 Z" fill="#86EFAC" stroke="#16A34A" stroke-width="2.2"/>
  <polygon points="980,246 984,256 994,256 986,262 989,272 980,266 971,272 974,262 966,256 976,256" fill="#22C55E"/>

  <text x="980" y="346" text-anchor="middle" class="bt" font-size="12" font-weight="700" fill="#166534">CPAラーニング×AIをフル活用</text>
  <text x="980" y="363" text-anchor="middle" class="bt" font-size="12" fill="#166534">自走力があれば費用ゼロも可能</text>

  <rect x="818" y="378" width="324" height="34" rx="10" fill="rgba(34,197,94,.10)" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="980" y="392" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#166534">予算目安：1〜3万円</text>
  <text x="980" y="406" text-anchor="middle" class="bt" font-size="10.5" fill="#166534">向いている人：自走できる・費用を最小化したい人</text>

  <!-- Steps column 3 -->
  <g class="bt">
    <rect x="800" y="430" width="360" height="64" rx="12" fill="#F7FEFA" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="834" cy="462" r="18" fill="#22C55E"/>
    <text x="834" y="468" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">1</text>
    <text x="864" y="456" font-size="13" font-weight="700" fill="#14532D">CPAラーニングの無料講義</text>
    <text x="864" y="476" font-size="11" fill="#166534">簿記1級まで完全無料で学習できる</text>
    <line x1="834" y1="494" x2="834" y2="518" stroke="#86EFAC" stroke-width="2.5"/>
    <polygon points="834,518 828,507 840,507" fill="#86EFAC"/>

    <rect x="800" y="518" width="360" height="64" rx="12" fill="#F7FEFA" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="834" cy="550" r="18" fill="#22C55E"/>
    <text x="834" y="556" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">2</text>
    <text x="864" y="544" font-size="13" font-weight="700" fill="#14532D">YouTube解説で理解を補強</text>
    <text x="864" y="564" font-size="11" fill="#166534">分かりにくい論点をピンポイント補完</text>
    <line x1="834" y1="582" x2="834" y2="606" stroke="#86EFAC" stroke-width="2.5"/>
    <polygon points="834,606 828,595 840,595" fill="#86EFAC"/>

    <rect x="800" y="606" width="360" height="64" rx="12" fill="#F7FEFA" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="834" cy="638" r="18" fill="#22C55E"/>
    <text x="834" y="644" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">3</text>
    <text x="864" y="632" font-size="13" font-weight="700" fill="#14532D">AIに質問して即座に疑問解消</text>
    <text x="864" y="652" font-size="11" fill="#166534">「聞ける人がいない」を克服する</text>
    <line x1="834" y1="670" x2="834" y2="694" stroke="#86EFAC" stroke-width="2.5"/>
    <polygon points="834,694 828,683 840,683" fill="#86EFAC"/>

    <rect x="800" y="694" width="360" height="64" rx="12" fill="#F7FEFA" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="834" cy="726" r="18" fill="#22C55E"/>
    <text x="834" y="732" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">4</text>
    <text x="864" y="720" font-size="13" font-weight="700" fill="#14532D">市販の問題集・過去問で演習</text>
    <text x="864" y="740" font-size="11" fill="#166534">アウトプット量を確保する</text>
  </g>

  <!-- Convergence lines -->
  <line x1="220" y1="758" x2="220" y2="778" stroke="#94A3B8" stroke-width="2"/>
  <line x1="220" y1="778" x2="470" y2="792" stroke="#94A3B8" stroke-width="2"/>
  <line x1="600" y1="758" x2="600" y2="792" stroke="#94A3B8" stroke-width="2"/>
  <line x1="980" y1="758" x2="980" y2="778" stroke="#94A3B8" stroke-width="2"/>
  <line x1="980" y1="778" x2="730" y2="792" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="600,798 593,788 607,788" fill="#94A3B8"/>

  <!-- Goal box -->
  <rect x="400" y="800" width="400" height="130" rx="20" fill="url(#bGoal)" filter="url(#bShadow)"/>
  <!-- trophy shape -->
  <rect x="576" y="814" width="48" height="34" rx="7" fill="#DCFCE7"/>
  <rect x="586" y="848" width="28" height="7" rx="3" fill="#DCFCE7"/>
  <rect x="579" y="855" width="42" height="6" rx="3" fill="#DCFCE7"/>
  <circle cx="576" cy="826" r="7" fill="#16A34A" stroke="#DCFCE7" stroke-width="2"/>
  <circle cx="624" cy="826" r="7" fill="#16A34A" stroke="#DCFCE7" stroke-width="2"/>
  <text x="600" y="893" text-anchor="middle" class="bt" font-size="24" font-weight="800" fill="#fff">合格</text>
  <text x="600" y="915" text-anchor="middle" class="bt" font-size="13" fill="#DCFCE7">日商簿記1級——自分に合ったルートで着実に</text>

  <!-- Footer note -->
  <rect x="40" y="946" width="1120" height="0" rx="12" fill="none"/>
  <text x="600" y="960" text-anchor="middle" class="bt" font-size="12.5" fill="#374151">「予備校か独学か」の二択で悩まなくても大丈夫。CPAラーニング×AIを武器にした</text>
  <text x="600" y="978" text-anchor="middle" class="bt" font-size="12.5" font-weight="700" fill="#16A34A">ハイブリッドルートなら、コストを抑えつつ独学の弱点だった「孤独」も解消できます。</text>
</svg>
