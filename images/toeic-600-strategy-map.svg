<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="480" rx="12" fill="#FAFAFC"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">TOEIC600点突破 3本柱 × 3ヶ月タイムライン戦略マップ</text>

  <!-- 3 pillars -->
  <text x="380" y="54" text-anchor="middle" font-size="11.5" font-weight="700" fill="#64748B">配点・対策ウェイトのハコ分け</text>

  <!-- Pillar 1: 単語 -->
  <rect x="30" y="64" width="225" height="118" rx="12" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <rect x="30" y="64" width="225" height="30" rx="12" fill="#F472B6"/>
  <rect x="30" y="82" width="225" height="12" fill="#F472B6"/>
  <text x="142" y="84" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">① 単語力（最優先）</text>
  <text x="142" y="112" text-anchor="middle" font-size="10.5" fill="#374151">「金フレ」600点レベルを完璧に</text>
  <text x="142" y="128" text-anchor="middle" font-size="10.5" fill="#374151">毎日30語×2ヶ月で1周</text>
  <text x="142" y="150" text-anchor="middle" font-size="9.5" fill="#9D174D">全パートの土台になる最重要ハコ</text>
  <text x="142" y="166" text-anchor="middle" font-size="9.5" fill="#9D174D">ここを飛ばすと何も伸びない</text>

  <!-- Pillar 2: リスニング -->
  <rect x="267" y="64" width="225" height="118" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="267" y="64" width="225" height="30" rx="12" fill="#60A5FA"/>
  <rect x="267" y="82" width="225" height="12" fill="#60A5FA"/>
  <text x="379" y="84" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">② リスニング（Part1-4）</text>
  <text x="379" y="112" text-anchor="middle" font-size="10.5" fill="#374151">1日10〜15分シャドーイング</text>
  <text x="379" y="128" text-anchor="middle" font-size="10.5" fill="#374151">設問の先読みを習慣化</text>
  <text x="379" y="150" text-anchor="middle" font-size="9.5" fill="#1E40AF">600点帯の最速得点源</text>
  <text x="379" y="166" text-anchor="middle" font-size="9.5" fill="#1E40AF">「慣れ」で一番スコアが伸びる</text>

  <!-- Pillar 3: リーディング -->
  <rect x="504" y="64" width="226" height="118" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <rect x="504" y="64" width="226" height="30" rx="12" fill="#EAB308"/>
  <rect x="504" y="82" width="226" height="12" fill="#EAB308"/>
  <text x="617" y="84" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">③ リーディング（Part5-7）</text>
  <text x="617" y="112" text-anchor="middle" font-size="10.5" fill="#374151">Part5は15分以内で解き切る</text>
  <text x="617" y="128" text-anchor="middle" font-size="10.5" fill="#374151">Part7は満点を狙わない</text>
  <text x="617" y="150" text-anchor="middle" font-size="9.5" fill="#92400E">最後は割り切って塗り絵もOK</text>
  <text x="617" y="166" text-anchor="middle" font-size="9.5" fill="#92400E">時間配分の管理が最大の課題</text>

  <!-- Reading 75min defense line -->
  <text x="380" y="210" text-anchor="middle" font-size="11.5" font-weight="700" fill="#64748B">リーディング75分の時間配分・防衛ライン</text>
  <rect x="30" y="220" width="700" height="34" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="30" y="220" width="150" height="34" fill="#FDE68A"/>
  <rect x="180" y="220" width="100" height="34" fill="#FEF3C7"/>
  <rect x="280" y="220" width="450" height="34" rx="0" fill="#FEF9E7"/>
  <text x="105" y="242" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">Part5：15分</text>
  <text x="230" y="242" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">Part6：10分</text>
  <text x="505" y="242" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">Part7：残り50分（シングル→ダブル→トリプルの順）</text>

  <!-- 3-month timeline -->
  <text x="380" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">合格までの3ヶ月タイムライン</text>

  <rect x="30" y="304" width="220" height="130" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="30" y="304" width="220" height="28" rx="10" fill="#22C55E"/>
  <rect x="30" y="322" width="220" height="10" fill="#22C55E"/>
  <text x="140" y="322" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Phase1（1ヶ月目）：基礎固め</text>
  <text x="140" y="348" text-anchor="middle" font-size="10" fill="#374151"><tspan font-weight="700">金フレ</tspan>前半・文法の穴埋め</text>
  <text x="140" y="365" text-anchor="middle" font-size="10" fill="#374151">公式問題集1回分で現状把握</text>
  <text x="140" y="386" text-anchor="middle" font-size="9.5" fill="#166534">1日1時間を確実に継続</text>
  <text x="140" y="404" text-anchor="middle" font-size="9.5" fill="#166534">量より「毎日やる」を優先</text>
  <polygon points="256,368 272,362 272,374" fill="#CBD5E1"/>

  <rect x="276" y="304" width="220" height="130" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="276" y="304" width="220" height="28" rx="10" fill="#3B82F6"/>
  <rect x="276" y="322" width="220" height="10" fill="#3B82F6"/>
  <text x="386" y="322" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Phase2（2ヶ月目）：パート別演習</text>
  <text x="386" y="348" text-anchor="middle" font-size="10" fill="#374151">金フレ後半・復習を並行</text>
  <text x="386" y="365" text-anchor="middle" font-size="10" fill="#374151">毎日15分シャドーイング開始</text>
  <text x="386" y="386" text-anchor="middle" font-size="9.5" fill="#1E40AF">公式問題集2〜3回分を実施</text>
  <text x="386" y="404" text-anchor="middle" font-size="9.5" fill="#1E40AF">弱点パートが見え始める時期</text>
  <polygon points="502,368 518,362 518,374" fill="#CBD5E1"/>

  <rect x="522" y="304" width="208" height="130" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="522" y="304" width="208" height="28" rx="10" fill="#8B5CF6"/>
  <rect x="522" y="322" width="208" height="10" fill="#8B5CF6"/>
  <text x="626" y="322" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Phase3（3ヶ月目）：模試仕上げ</text>
  <text x="626" y="348" text-anchor="middle" font-size="10" fill="#374151">弱点パートを集中練習</text>
  <text x="626" y="365" text-anchor="middle" font-size="10" fill="#374151">公式問題集5回分を時間計測</text>
  <text x="626" y="386" text-anchor="middle" font-size="9.5" fill="#5B21B6">本番形式でマーキング練習</text>
  <text x="626" y="404" text-anchor="middle" font-size="9.5" fill="#5B21B6">仕上げは「慣れ」の完成度</text>

  <!-- Bottom note -->
  <rect x="30" y="448" width="700" height="26" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="380" y="465" text-anchor="middle" font-size="10.5" fill="#1E40AF">💡 600点は満点を狙わない割り切りゲーム。3本柱を固めて、防衛ラインを守れば必ず届く。</text>
</svg>
