<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 900" width="360" height="900">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="900" rx="14" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">お店の基本的な取引</text>
  <text x="180" y="46" text-anchor="middle" font-size="12" fill="#334155">仕入れ・販売・利益の流れ</text>

  <!-- 仕入れ先 -->
  <rect x="60" y="66" width="240" height="110" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="180" y="104" text-anchor="middle" font-size="30" fill="#F97316">🏭</text>
  <text x="180" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#C2410C">仕入れ先</text>
  <text x="180" y="154" text-anchor="middle" font-size="11" fill="#92400E">（メーカー・卸）</text>

  <line x1="180" y1="176" x2="180" y2="208" stroke="#64748B" stroke-width="2"/>
  <polygon points="180,216 173,204 187,204" fill="#64748B"/>
  <rect x="130" y="182" width="100" height="24" rx="5" fill="#FFEDD5"/>
  <text x="180" y="198" text-anchor="middle" font-size="11" font-weight="700" fill="#C2410C">¥100 仕入れる</text>

  <!-- お店 -->
  <rect x="30" y="222" width="300" height="150" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
  <text x="180" y="262" text-anchor="middle" font-size="34" fill="#3B82F6">🏪</text>
  <text x="180" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#1E40AF">お店（会社）</text>
  <text x="180" y="312" text-anchor="middle" font-size="11.5" fill="#1E3A8A">取引を記録して管理する</text>
  <text x="180" y="330" text-anchor="middle" font-size="11.5" fill="#1E3A8A">← これが「簿記」の役割</text>
  <text x="180" y="352" text-anchor="middle" font-size="10.5" fill="#94A3B8">（仕入原価¥100 → 売値¥150）</text>

  <line x1="180" y1="372" x2="180" y2="404" stroke="#64748B" stroke-width="2"/>
  <polygon points="180,412 173,400 187,400" fill="#64748B"/>
  <rect x="130" y="378" width="100" height="24" rx="5" fill="#DCFCE7"/>
  <text x="180" y="394" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">¥150 売る</text>

  <!-- お客さん -->
  <rect x="60" y="418" width="240" height="110" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="456" text-anchor="middle" font-size="30" fill="#22C55E">👤</text>
  <text x="180" y="486" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">お客さん</text>
  <text x="180" y="506" text-anchor="middle" font-size="11" fill="#15803D">（消費者）</text>

  <!-- 利益 -->
  <rect x="30" y="548" width="300" height="118" rx="10" fill="#FEFCE8" stroke="#FDE047" stroke-width="2"/>
  <text x="180" y="574" text-anchor="middle" font-size="13" font-weight="700" fill="#713F12">利益（もうけ）の計算</text>
  <text x="180" y="604" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">売上¥150 − 仕入¥100</text>
  <text x="180" y="626" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">＝ 利益 ¥50</text>
  <text x="180" y="650" text-anchor="middle" font-size="10.5" fill="#92400E">この「¥50のもうけ」を正確に記録するのが簿記のゴール</text>

  <!-- bottom -->
  <rect x="16" y="686" width="328" height="130" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="180" y="712" text-anchor="middle" font-size="11.5" fill="#475569">💡「取引」とは、</text>
  <text x="180" y="732" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">資産・負債・収益・費用が</text>
  <text x="180" y="750" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">変化する出来事のことです</text>
  <text x="180" y="774" text-anchor="middle" font-size="10.5" fill="#475569">仕入れ（費用の発生）・売上（収益の発生）</text>
  <text x="180" y="792" text-anchor="middle" font-size="10.5" fill="#475569">現金の受け取り——どれも「取引」</text>
</svg>
