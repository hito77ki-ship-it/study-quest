  <rect width="760" height="380" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">基本情報技術者（FE）vs 応用情報技術者（AP）比較</text>
