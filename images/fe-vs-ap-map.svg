  <rect x="20" y="174" width="256" height="34" rx="4" fill="#EDE9FE"/>
  <text x="148" y="196" text-anchor="middle" font-size="11" fill="#7C3AED">約35〜45%</text>
  <rect x="284" y="174" width="192" height="34" rx="4" fill="#F1F5F9"/>
  <text x="380" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">合格率</text>
  <rect x="484" y="174" width="256" height="34" rx="4" fill="#E0F2FE"/>
  <text x="612" y="196" text-anchor="middle" font-size="11" fill="#0369A1">約20〜25%</text>

  <rect x="20" y="214" width="256" height="34" rx="4" fill="#EDE9FE"/>
  <text x="148" y="236" text-anchor="middle" font-size="11" fill="#7C3AED">100〜200時間</text>
  <rect x="284" y="214" width="192" height="34" rx="4" fill="#F1F5F9"/>
  <text x="380" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">必要勉強時間</text>
  <rect x="484" y="214" width="256" height="34" rx="4" fill="#E0F2FE"/>
  <text x="612" y="236" text-anchor="middle" font-size="11" fill="#0369A1">200〜400時間</text>

  <rect x="20" y="254" width="256" height="44" rx="4" fill="#DDD6FE"/>
  <text x="148" y="272" text-anchor="middle" font-size="11" fill="#7C3AED">科目B：擬似言語・アルゴリズム</text>
