  <text x="193" y="351" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">IT就職・最初の国家資格 → FEから始める</text>
  <rect x="402" y="334" width="330" height="24" rx="5" fill="#0369A1"/>
  <text x="567" y="351" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">FE取得済み・昇給昇格狙い → APへステップアップ</text>
