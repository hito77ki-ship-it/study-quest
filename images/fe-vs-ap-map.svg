  <rect x="284" y="254" width="192" height="44" rx="4" fill="#F1F5F9"/>
  <text x="380" y="277" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">特徴・難しさ</text>
  <rect x="484" y="254" width="256" height="44" rx="4" fill="#BAE6FD"/>
