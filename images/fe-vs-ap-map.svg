  <text x="380" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">比較項目</text>
  <rect x="484" y="52" width="256" height="34" rx="6" fill="#0369A1"/>
  <text x="612" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">応用情報技術者（AP）</text>

  <rect x="20" y="94" width="256" height="34" rx="4" fill="#EDE9FE"/>
