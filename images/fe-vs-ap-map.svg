  <rect x="284" y="134" width="192" height="34" rx="4" fill="#F1F5F9"/>
  <text x="380" y="156" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">試験形式</text>
  <rect x="484" y="134" width="256" height="34" rx="4" fill="#E0F2FE"/>
