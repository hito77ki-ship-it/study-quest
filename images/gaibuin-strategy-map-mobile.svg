<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 980" width="360" height="980">
  <defs><style>text{font-family:'Noto Sans JP',system-ui,sans-serif;}</style></defs>
  <rect width="360" height="980" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="14" font-weight="800" fill="#1f2937">証券外務員 配点・計算問題攻略</text>
  <text x="180" y="46" text-anchor="middle" font-size="10" fill="#64748b">440点満点・308点で合格（70%）</text>

  <text x="20" y="70" font-size="11" font-weight="700" fill="#475569">① ○×問題と五肢択一、配点は5倍違う</text>

  <rect x="16" y="80" width="328" height="140" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2.5"/>
  <rect x="32" y="96" width="90" height="28" rx="14" fill="#3b82f6"/>
  <text x="77" y="115" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">○×問題</text>
  <text x="180" y="160" text-anchor="middle" font-size="32" font-weight="800" fill="#1D4ED8">2点</text>
  <text x="180" y="180" text-anchor="middle" font-size="9.5" fill="#475569">法規・諸規則の暗記知識が中心</text>
  <text x="180" y="196" text-anchor="middle" font-size="9.5" fill="#475569">1問落としても影響は限定的</text>

  <text x="180" y="240" text-anchor="middle" font-size="14" font-weight="800" fill="#92400e">↓ 配点差 ×5倍 ↓</text>

  <rect x="16" y="256" width="328" height="150" rx="16" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
  <rect x="32" y="272" width="150" height="28" rx="14" fill="#f59e0b"/>
  <text x="107" y="291" text-anchor="middle" font-size="10.5" font-weight="800" fill="#fff">五肢択一（計算中心）</text>
  <text x="180" y="336" text-anchor="middle" font-size="32" font-weight="800" fill="#C2410C">10点</text>
  <text x="180" y="356" text-anchor="middle" font-size="9.5" fill="#475569">利回り計算・PER/PBR・オプション等</text>
  <text x="180" y="372" text-anchor="middle" font-size="9.5" fill="#475569">1問の取りこぼしが合否に直結</text>
  <text x="180" y="392" text-anchor="middle" font-size="9.5" fill="#475569">○×の5倍の配点</text>

  <text x="20" y="440" font-size="11" font-weight="700" fill="#475569">② 一種・二種の計算論点の役割分担</text>

  <rect x="16" y="452" width="328" height="190" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2.5"/>
  <rect x="32" y="468" width="70" height="26" rx="13" fill="#22c55e"/>
  <text x="67" y="486" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">二種</text>
  <text x="180" y="490" text-anchor="middle" font-size="11" font-weight="800" fill="#166534">現物取引の基本計算</text>
  <rect x="32" y="502" width="296" height="32" rx="7" fill="#F0FDF4"/>
  <text x="46" y="522" font-size="10" fill="#1f2937">利回り計算（単利・複利等）</text>
  <rect x="32" y="540" width="296" height="32" rx="7" fill="#F0FDF4"/>
  <text x="46" y="560" font-size="10" fill="#1f2937">PER・PBRなど株式指標の計算</text>
  <rect x="32" y="578" width="296" height="32" rx="7" fill="#F0FDF4"/>
  <text x="46" y="598" font-size="10" fill="#1f2937">投資信託の基準価額・手数料計算</text>

  <rect x="16" y="656" width="328" height="190" rx="16" fill="#ffffff" stroke="#fdba74" stroke-width="2.5"/>
  <rect x="32" y="672" width="70" height="26" rx="13" fill="#f97316"/>
  <text x="67" y="690" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">一種</text>
  <text x="200" y="694" text-anchor="middle" font-size="11" font-weight="800" fill="#9a3412">二種＋信用・デリバティブ計算</text>
  <rect x="32" y="706" width="296" height="32" rx="7" fill="#FFF7ED"/>
  <text x="46" y="726" font-size="10" fill="#1f2937">信用取引の委託保証金・追証の計算</text>
  <rect x="32" y="744" width="296" height="32" rx="7" fill="#FFF7ED"/>
  <text x="46" y="764" font-size="10" fill="#1f2937">先物取引の理論価格・損益計算</text>
  <rect x="32" y="782" width="296" height="32" rx="7" fill="#FFF7ED"/>
  <text x="46" y="802" font-size="10" fill="#1f2937">オプション取引のプレミアム計算</text>

  <rect x="16" y="864" width="328" height="100" rx="16" fill="#f0fdf4" stroke="#86efac" stroke-width="2.5"/>
  <text x="180" y="888" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">五肢択一の計算問題を絶対に落とさない</text>
  <text x="180" y="908" text-anchor="middle" font-size="9.5" fill="#475569">10点問題の公式を確実に使えることが</text>
  <text x="180" y="924" text-anchor="middle" font-size="9.5" fill="#475569">440点の壁を早く越える最大のコツ</text>
  <text x="180" y="944" text-anchor="middle" font-size="9.5" fill="#475569">二種で基本計算を固め、一種で上乗せする</text>
</svg>
