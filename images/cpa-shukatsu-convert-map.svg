<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">公認会計士試験撤退から面接アピールへのネガポジ変換3ステップ戦略マップ</title>
  <desc id="svgdesc">面接官からのネガティブな質問を、培った会計知識と自己管理力を経て、入社後のビジョンへとひっくり返す3ステップの変換フロー図</desc>
  <defs>
    <linearGradient id="cmBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF5F5"/>
      <stop offset="0.5" stop-color="#F7F5FF"/>
      <stop offset="1" stop-color="#F0FFF7"/>
    </linearGradient>
    <linearGradient id="cmTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="cmC1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FECACA"/>
      <stop offset="1" stop-color="#F87171"/>
    </linearGradient>
    <linearGradient id="cmC2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BFDBFE"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="cmC3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="cmArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F87171"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="cmShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <style>.ct{font-family:"Noto Sans JP",system-ui,sans-serif}.cr{font-family:"Noto Sans JP",system-ui,sans-serif;font-size:11px;fill:#64748b}</style>
  </defs>

  <rect width="1200" height="720" rx="20" fill="url(#cmBg)"/>
  <circle cx="90" cy="110" r="90" fill="#FEE2E2" opacity="0.5"/>
  <circle cx="1110" cy="130" r="100" fill="#DBEAFE" opacity="0.45"/>
  <circle cx="600" cy="690" r="110" fill="#D1FAE5" opacity="0.4"/>

  <!-- Title bar -->
  <rect x="40" y="24" width="1120" height="66" rx="14" fill="url(#cmTitle)"/>
  <text x="600" y="48" text-anchor="middle" class="ct" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="3">大谷流・面接ネガポジ変換マップ</text>
  <text x="600" y="73" text-anchor="middle" class="ct" font-size="20" font-weight="800" fill="#FFFFFF">「なぜ諦めた？」を『即戦力のガクチカ』に変える3ステップ</text>

  <!-- ================= STEP 1 ================= -->
  <g filter="url(#cmShadow)">
    <rect x="50" y="150" width="300" height="380" rx="18" fill="#FFF1F1" stroke="#FCA5A5" stroke-width="2"/>
    <rect x="50" y="150" width="300" height="46" rx="18" fill="url(#cmC1)"/>
    <rect x="50" y="172" width="300" height="24" fill="#F87171"/>
  </g>
  <text x="200" y="172" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="rgba(255,255,255,.8)" letter-spacing="2">STEP 1　ネガティブな質問</text>
  <text x="200" y="192" text-anchor="middle" class="ct" font-size="16" font-weight="800" fill="#fff">面接官からのハコ</text>

  <!-- icon: question box -->
  <rect x="160" y="216" width="80" height="66" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="2.5"/>
  <text x="200" y="266" text-anchor="middle" class="ct" font-size="42" font-weight="800" fill="#EF4444">？</text>

  <text x="200" y="308" text-anchor="middle" class="ct" font-size="13" font-weight="700" fill="#991B1B">「公認会計士はなぜ</text>
  <text x="200" y="326" text-anchor="middle" class="ct" font-size="13" font-weight="700" fill="#991B1B">諦めたんですか？」</text>

  <rect x="68" y="344" width="264" height="76" rx="10" fill="rgba(239,68,68,.08)" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="200" y="366" text-anchor="middle" class="ct" font-size="11.5" fill="#991B1B">面接で必ず突かれる、</text>
  <text x="200" y="384" text-anchor="middle" class="ct" font-size="11.5" fill="#991B1B">受験生が一番怖い質問。</text>
  <text x="200" y="402" text-anchor="middle" class="ct" font-size="11.5" font-weight="700" fill="#991B1B">でも、ここが逆転の起点。</text>

  <text x="200" y="454" text-anchor="middle" class="ct" font-size="12" font-weight="700" fill="#B91C1C">NG回答：「無理でした」</text>
  <text x="200" y="474" text-anchor="middle" class="ct" font-size="11" fill="#B91C1C">で終わると評価はマイナスのまま</text>

  <path d="M120,500 q80,-20 160,0" fill="none" stroke="#F87171" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="200" y="516" text-anchor="middle" class="ct" font-size="10.5" fill="#B91C1C">視点を変えれば武器になる</text>

  <!-- ================= ARROW 1→2 ================= -->
  <g>
    <rect x="355" y="320" width="70" height="10" rx="5" fill="url(#cmArrow)"/>
    <polygon points="425,300 425,350 455,325" fill="#818CF8"/>
  </g>
  <text x="390" y="290" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#4338CA">視点を</text>
  <text x="390" y="304" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#4338CA">変換</text>

  <!-- ================= STEP 2 ================= -->
  <g filter="url(#cmShadow)">
    <rect x="460" y="150" width="300" height="380" rx="18" fill="#F0F5FF" stroke="#93C5FD" stroke-width="2"/>
    <rect x="460" y="150" width="300" height="46" rx="18" fill="url(#cmC2)"/>
    <rect x="460" y="172" width="300" height="24" fill="#60A5FA"/>
  </g>
  <text x="610" y="172" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="rgba(255,255,255,.8)" letter-spacing="2">STEP 2　培った武器</text>
  <text x="610" y="192" text-anchor="middle" class="ct" font-size="16" font-weight="800" fill="#fff">盾と剣（会計知識×自己管理力）</text>

  <!-- icon: shield + sword -->
  <path d="M610,216 L642,226 L642,254 Q642,278 610,290 Q578,278 578,254 L578,226 Z" fill="#DBEAFE" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="610" y1="222" x2="610" y2="284" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <line x1="596" y1="240" x2="624" y2="240" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>

  <text x="610" y="316" text-anchor="middle" class="ct" font-size="13" font-weight="700" fill="#1E3A8A">財務・管理会計の知識</text>
  <text x="610" y="330" text-anchor="middle" class="cr">（ざいむ・かんりかいけい）</text>
  <text x="610" y="348" text-anchor="middle" class="ct" font-size="13" font-weight="700" fill="#1E3A8A">数年間の自己管理力</text>
  <text x="610" y="362" text-anchor="middle" class="cr">（じこかんりりょく）</text>

  <rect x="478" y="378" width="264" height="76" rx="10" fill="rgba(59,130,246,.08)" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="610" y="400" text-anchor="middle" class="ct" font-size="11.5" fill="#1E3A8A">数千時間の学習で身につけた</text>
  <text x="610" y="418" text-anchor="middle" class="ct" font-size="11.5" fill="#1E3A8A">「財務諸表を読む力」と</text>
  <text x="610" y="436" text-anchor="middle" class="ct" font-size="11.5" font-weight="700" fill="#1E3A8A">「自分で方向転換を決めた判断力」</text>

  <text x="610" y="480" text-anchor="middle" class="ct" font-size="12" font-weight="700" fill="#1D4ED8">この2つを自分の言葉で</text>
  <text x="610" y="500" text-anchor="middle" class="ct" font-size="12" font-weight="700" fill="#1D4ED8">具体的に語れるかが勝負</text>

  <!-- ================= ARROW 2→3 ================= -->
  <g>
    <rect x="765" y="320" width="70" height="10" rx="5" fill="url(#cmArrow)"/>
    <polygon points="835,300 835,350 865,325" fill="#22C55E"/>
  </g>
  <text x="800" y="290" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#15803D">利益に</text>
  <text x="800" y="304" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#15803D">変換</text>

  <!-- ================= STEP 3 ================= -->
  <g filter="url(#cmShadow)">
    <rect x="870" y="150" width="300" height="380" rx="18" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
    <rect x="870" y="150" width="300" height="46" rx="18" fill="url(#cmC3)"/>
    <rect x="870" y="172" width="300" height="24" fill="#22C55E"/>
  </g>
  <text x="1020" y="172" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="rgba(255,255,255,.8)" letter-spacing="2">STEP 3　入社後のリターン</text>
  <text x="1020" y="192" text-anchor="middle" class="ct" font-size="16" font-weight="800" fill="#fff">即戦力としてのビジョン</text>

  <!-- icon: growth arrow + trophy -->
  <polyline points="988,270 1004,254 1020,264 1052,232" fill="none" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="1052,232 1038,232 1052,246" fill="#16A34A"/>
  <circle cx="988" cy="270" r="5" fill="#22C55E"/>

  <text x="1020" y="316" text-anchor="middle" class="ct" font-size="13" font-weight="700" fill="#14532D">即戦力</text>
  <text x="1020" y="330" text-anchor="middle" class="cr">（そくせんりょく）</text>
  <text x="1020" y="348" text-anchor="middle" class="ct" font-size="13" font-weight="700" fill="#14532D">として利益に貢献</text>

  <rect x="888" y="378" width="264" height="76" rx="10" fill="rgba(34,197,94,.08)" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="1020" y="400" text-anchor="middle" class="ct" font-size="11.5" fill="#14532D">「御社の経理・財務で、</text>
  <text x="1020" y="418" text-anchor="middle" class="ct" font-size="11.5" fill="#14532D">この知識と判断力を</text>
  <text x="1020" y="436" text-anchor="middle" class="ct" font-size="11.5" font-weight="700" fill="#14532D">実務で活かしたい」</text>

  <text x="1020" y="480" text-anchor="middle" class="ct" font-size="12" font-weight="700" fill="#15803D">評価がまるごと</text>
  <text x="1020" y="500" text-anchor="middle" class="ct" font-size="12" font-weight="700" fill="#15803D">ひっくり返る着地点</text>

  <!-- Bottom summary bar -->
  <rect x="50" y="556" width="1120" height="66" rx="16" fill="#111827" filter="url(#cmShadow)"/>
  <text x="600" y="584" text-anchor="middle" class="ct" font-size="13.5" fill="#E5E7EB">面接官が知りたいのは「なぜ落ちたか」ではなく、その経験を</text>
  <text x="600" y="606" text-anchor="middle" class="ct" font-size="13.5" font-weight="700" fill="#8CC63F">「どううちの会社の利益に変えてくれるか」の一点だけ。</text>

  <text x="600" y="656" text-anchor="middle" class="ct" font-size="12.5" fill="#374151">挫折を隠さず、逆算戦略で武器に変える——それが内定をむしり取る近道です。</text>
</svg>
