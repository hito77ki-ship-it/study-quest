<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="400" rx="16" fill="#FEFCF9"/>
  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">製造原価報告書からP/L売上原価へ——勘定連絡図の全体マップ</text>
  <text x="380" y="44" text-anchor="middle" font-size="11" fill="#94A3B8">材料費・労務費・経費が仕掛品（CR）を経て、製品→売上原価（P/L）へ旅をする</text>

  <!-- 左：3費目 -->
  <rect x="30" y="66" width="150" height="58" rx="12" fill="#FEF3C7" stroke="#FDE68A" stroke-width="2"/>
  <text x="105" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">材料費</text>
  <text x="105" y="110" text-anchor="middle" font-size="9" fill="#78350F">直接・間接材料費</text>

  <rect x="30" y="134" width="150" height="58" rx="12" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="2"/>
  <text x="105" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">労務費</text>
  <text x="105" y="178" text-anchor="middle" font-size="9" fill="#4C1D95">直接・間接労務費</text>

  <rect x="30" y="202" width="150" height="58" rx="12" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="105" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">経費</text>
  <text x="105" y="246" text-anchor="middle" font-size="9" fill="#14532D">直接・間接経費</text>

  <!-- 収束ライン -->
  <line x1="180" y1="95" x2="210" y2="176" stroke="#FDBA74" stroke-width="1.5"/>
  <line x1="180" y1="163" x2="210" y2="176" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="180" y1="231" x2="210" y2="176" stroke="#86EFAC" stroke-width="1.5"/>
  <polygon points="222,176 210,171 210,181" fill="#93C5FD"/>

  <!-- 仕掛品（CR） -->
  <rect x="210" y="66" width="250" height="220" rx="16" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2.5"/>
  <text x="335" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">仕掛品（製造原価報告書 CR）</text>
  <text x="335" y="122" text-anchor="middle" font-size="11" fill="#374151">月初仕掛品 ＋ 当期総製造費用</text>
  <text x="335" y="146" text-anchor="middle" font-size="11" fill="#374151">－ 月末仕掛品</text>
  <line x1="240" y1="158" x2="430" y2="158" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="335" y="184" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1D4ED8">＝ 当期製品製造原価</text>
  <text x="335" y="204" text-anchor="middle" font-size="9.5" fill="#64748B">（CRのゴール）</text>
  <text x="335" y="234" text-anchor="middle" font-size="9.5" fill="#64748B">工場での原価集計はここまで</text>
  <text x="335" y="252" text-anchor="middle" font-size="8.5" fill="#94A3B8">（ひな形は2パターン、本文で解説）</text>

  <!-- CR → 製品 のバトンリレー矢印 -->
  <text x="480" y="168" text-anchor="middle" font-size="9" font-weight="700" fill="#1D4ED8">バトン</text>
  <text x="480" y="180" text-anchor="middle" font-size="9" font-weight="700" fill="#1D4ED8">リレー</text>
  <line x1="462" y1="176" x2="496" y2="176" stroke="#1D4ED8" stroke-width="2"/>
  <polygon points="502,176 492,171 492,181" fill="#1D4ED8"/>

  <!-- 製品（P/L） -->
  <rect x="500" y="66" width="230" height="220" rx="16" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2.5"/>
  <text x="615" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">製品（P/L 売上原価計算）</text>
  <text x="615" y="122" text-anchor="middle" font-size="11" fill="#374151">月初製品 ＋ 当期製品製造原価</text>
  <text x="615" y="146" text-anchor="middle" font-size="11" fill="#374151">－ 月末製品</text>
  <line x1="530" y1="158" x2="700" y2="158" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="615" y="184" text-anchor="middle" font-size="13.5" font-weight="700" fill="#166534">＝ 売上原価</text>
  <text x="615" y="204" text-anchor="middle" font-size="9.5" fill="#64748B">（P/Lへ計上）</text>
  <text x="615" y="234" text-anchor="middle" font-size="9.5" fill="#64748B">販売された分のコストがここに出る</text>

  <!-- 下部：CRの範囲まとめ -->
  <rect x="30" y="306" width="700" height="60" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="328" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">📋 製造原価報告書（CR）がカバーする範囲</text>
  <text x="380" y="350" text-anchor="middle" font-size="10.5" fill="#78350F">材料費＋労務費＋経費＋月初仕掛品－月末仕掛品＝当期製品製造原価　←この記事はここを完全攻略します</text>
</svg>
