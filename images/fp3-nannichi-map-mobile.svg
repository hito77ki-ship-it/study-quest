<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" width="360" height="780">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="780" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">FP3級 期間別合格スケジュール</text>
  <text x="180" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">1日あたりの目安</text>

  <rect x="16" y="60" width="328" height="216" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="16" y="60" width="328" height="30" rx="10" fill="#EF4444"/>
  <rect x="16" y="80" width="328" height="10" fill="#EF4444"/>
  <text x="180" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">30日プラン（短期集中）1日2〜3h</text>
  <text x="30" y="106" font-size="10.5" font-weight="700" fill="#DC2626">Week1：テキスト全体を1周（読む）</text>
  <text x="30" y="124" font-size="10.5" font-weight="700" fill="#DC2626">Week2：過去問チャレンジ＋分析</text>
  <text x="30" y="142" font-size="10.5" font-weight="700" fill="#DC2626">Week3：苦手分野の集中攻略</text>
  <text x="30" y="160" font-size="10.5" font-weight="700" fill="#DC2626">Week4：模擬試験×2＋最終確認</text>
  <text x="30" y="184" font-size="10" fill="#374151">向いている人：試験まで時間がない／</text>
  <text x="30" y="200" font-size="10" fill="#64748B">会計や金融の基礎知識あり</text>

  <rect x="16" y="292" width="328" height="216" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <rect x="16" y="292" width="328" height="30" rx="10" fill="#EAB308"/>
  <rect x="16" y="312" width="328" height="10" fill="#EAB308"/>
  <text x="180" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">60日プラン（標準）1日1〜1.5h</text>
  <text x="30" y="338" font-size="10.5" font-weight="700" fill="#713F12">1〜2週目：テキスト1周（ライフ〜相続）</text>
  <text x="30" y="356" font-size="10.5" font-weight="700" fill="#713F12">3〜4週目：過去問（学科）を3回転</text>
  <text x="30" y="374" font-size="10.5" font-weight="700" fill="#713F12">5〜6週目：実技対策＋苦手強化</text>
  <text x="30" y="392" font-size="10.5" font-weight="700" fill="#713F12">7〜8週目：模試＋弱点ゼロ化</text>
  <text x="30" y="416" font-size="10" fill="#374151">向いている人：忙しいが毎日時間を確保／</text>
  <text x="30" y="432" font-size="10" fill="#64748B">初学者で確実に合格したい</text>

  <rect x="16" y="524" width="328" height="216" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="524" width="328" height="30" rx="10" fill="#22C55E"/>
  <rect x="16" y="544" width="328" height="10" fill="#22C55E"/>
  <text x="180" y="544" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">90日プラン（余裕あり）1日30〜60分</text>
  <text x="30" y="570" font-size="10.5" font-weight="700" fill="#166534">Month1：テキストを分野別にゆっくり</text>
  <text x="30" y="588" font-size="10.5" font-weight="700" fill="#166534">Month2：過去問を繰り返し＋暗記</text>
  <text x="30" y="606" font-size="10.5" font-weight="700" fill="#166534">Month3：実技＋模試＋最終チェック</text>
  <text x="30" y="624" font-size="10" fill="#374151">向いている人：大学生・社会人で本業が忙しい／</text>
  <text x="30" y="640" font-size="10" fill="#64748B">完全初学者でじっくり学びたい</text>

  <rect x="16" y="750" width="328" height="0" fill="none"/>
  <rect x="16" y="754" width="328" height="0" fill="none"/>
  <rect x="16" y="746" width="328" height="26" rx="6" fill="#F1F5F9"/>
  <text x="180" y="763" text-anchor="middle" font-size="10" fill="#475569">💡 合格率は学科・実技とも60〜70%台。過去問3〜5回転が近道。</text>
</svg>
