<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFBEB"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
    <style>
      .logo{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:26px;font-weight:800;fill:#276749}
      .term{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-weight:900}
      .sub{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:26px;font-weight:700;fill:#1f2937}
      .tag{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:21px;font-weight:800;fill:#ffffff}
      .step{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:20px;font-weight:800;fill:#4A5568}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="none" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="40" y="36" width="40" height="40" rx="10" fill="#8CC63F"/>
  <text x="60" y="63" text-anchor="middle" font-family="Hiragino Sans,Noto Sans JP,system-ui,sans-serif" font-size="16" font-weight="900" fill="#fff">SQ</text>
  <text x="92" y="64" class="logo">スタディクエスト</text>
  <rect x="820" y="36" width="340" height="42" rx="21" fill="#1A202C"/>
  <text x="990" y="64" text-anchor="middle" class="tag">確定申告の罰則</text>

  <text x="600" y="260" text-anchor="middle" class="term" font-size="58" fill="#B45309">罰金？前科？逮捕？</text>

  <rect x="120" y="300" width="960" height="70" rx="14" fill="#ffffff" stroke="#E2E8F0" stroke-width="2"/>
  <text x="220" y="343" text-anchor="middle" class="step" fill="#276749">①延滞税</text>
  <text x="447" y="343" text-anchor="middle" class="step" fill="#276749">②無申告加算税</text>
  <text x="700" y="343" text-anchor="middle" class="step" fill="#B45309">③重加算税</text>
  <text x="920" y="343" text-anchor="middle" class="step" fill="#DC2626">④刑事罰</text>
  <text x="325" y="343" text-anchor="middle" font-family="Hiragino Sans,Noto Sans JP,system-ui,sans-serif" font-size="18" fill="#A0AEC0">→</text>
  <text x="570" y="343" text-anchor="middle" font-family="Hiragino Sans,Noto Sans JP,system-ui,sans-serif" font-size="18" fill="#A0AEC0">→</text>
  <text x="810" y="343" text-anchor="middle" font-family="Hiragino Sans,Noto Sans JP,system-ui,sans-serif" font-size="18" fill="#A0AEC0">→</text>

  <rect x="120" y="470" width="960" height="94" rx="16" fill="rgba(255,255,255,.88)" stroke="#E2E8F0" stroke-width="2"/>
  <text x="600" y="527" text-anchor="middle" class="sub">罰則の重さ4段階と境界線を解説</text>
</svg>
