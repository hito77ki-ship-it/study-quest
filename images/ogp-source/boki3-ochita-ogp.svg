<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F0FFF4"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
    <style>
      .logo{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:26px;font-weight:800;fill:#276749}
      .term{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-weight:900}
      .sub{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:26px;font-weight:700;fill:#1f2937}
      .tag{font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:21px;font-weight:800;fill:#ffffff}
    </style>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="none" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="40" y="36" width="40" height="40" rx="10" fill="#8CC63F"/>
  <text x="60" y="63" text-anchor="middle" font-family="Hiragino Sans,Noto Sans JP,system-ui,sans-serif" font-size="16" font-weight="900" fill="#fff">SQ</text>
  <text x="92" y="64" class="logo">スタディクエスト</text>
  <rect x="880" y="36" width="280" height="42" rx="21" fill="#1A202C"/>
  <text x="1020" y="64" text-anchor="middle" class="tag">日商簿記3級</text>

  <text x="600" y="290" text-anchor="middle" class="term" font-size="60" fill="#DC2626">簿記3級に落ちた</text>
  <text x="600" y="360" text-anchor="middle" class="term" font-size="40" fill="#166534">次どうする？</text>

  <rect x="120" y="470" width="960" height="94" rx="16" fill="rgba(255,255,255,.88)" stroke="#E2E8F0" stroke-width="2"/>
  <text x="600" y="527" text-anchor="middle" class="sub">不合格後の立て直し方を4ステップで解説</text>
</svg>
