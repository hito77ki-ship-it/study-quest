<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">大谷流・資格と行動の掛け算による人生変革ロジックマップ</title>
  <desc id="svgdesc">資格の取得という武器に、次の一歩への行動という攻撃を掛け合わせることで、市場価値の拡大というリターンが生まれる仕組みを示す図解</desc>
  <defs>
    <linearGradient id="jBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8f4"/>
      <stop offset="0.5" stop-color="#f4fbff"/>
      <stop offset="1" stop-color="#f7fff4"/>
    </linearGradient>
    <linearGradient id="jTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="jGear1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#93C5FD"/><stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="jGear2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCA5A5"/><stop offset="1" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="jGear3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86EFAC"/><stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="jShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1E293B" flood-opacity="0.18"/>
    </filter>
    <style>.kt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="900" height="700" rx="20" fill="url(#jBg)"/>
  <circle cx="80" cy="110" r="80" fill="#FFEDD5" opacity="0.5"/>
  <circle cx="820" cy="130" r="90" fill="#DBEAFE" opacity="0.4"/>
  <circle cx="450" cy="660" r="110" fill="#D1FAE5" opacity="0.35"/>

  <!-- Title bar -->
  <rect x="40" y="24" width="820" height="64" rx="14" fill="url(#jTitle)"/>
  <text x="450" y="46" text-anchor="middle" class="kt" font-size="11.5" font-weight="700" fill="#94A3B8" letter-spacing="2">資格は足し算ではなく掛け算（かけざん）で効く</text>
  <text x="450" y="72" text-anchor="middle" class="kt" font-size="19" font-weight="800" fill="#FFFFFF">大谷流・資格 × 行動 人生変革（じんせいへんかく）ロジックマップ</text>
  <text x="450" y="106" text-anchor="middle" class="kt" font-size="13" fill="#64748B">資格という武器は、行動という攻撃と掛け合わせて初めて、人生を動かすリターンに変わる</text>
  <!-- ============ PANEL A: 歯車ドッキング掛け算フォーミュラ ============ -->
  <g filter="url(#jShadow)">
    <rect x="40" y="120" width="820" height="300" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  </g>
  <text x="70" y="152" class="kt" font-size="15" font-weight="800" fill="#166534">PHASE 1　歯車がガチャンとドッキングする瞬間、人生は動き出す</text>
  <text x="70" y="173" class="kt" font-size="12" fill="#64748B">資格は単体では回らない歯車。行動という歯車と噛み合って初めて、次の歯車を回す力になる。</text>
  <g filter="url(#jShadow)">
<g>
  <g transform="translate(155,295) rotate(0.00)">
    <rect x="-8.0" y="-98.0" width="16.0" height="20.0" rx="2" fill="url(#jGear1)"/>
  </g>
  <g transform="translate(155,295) rotate(30.00)">
    <rect x="-8.0" y="-98.0" width="16.0" height="20.0" rx="2" fill="url(#jGear1)"/>
  </g>
  <g transform="translate(155,295) rotate(60.00)">
    <rect x="-8.0" y="-98.0" width="16.0" height="20.0" rx="2" fill="url(#jGear1)"/>
  </g>
