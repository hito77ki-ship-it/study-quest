<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">司法書士試験——11科目の出題比率と攻略優先度マップ</text>

  <!-- 午前の部 -->
  <rect x="20" y="52" width="340" height="280" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="52" width="340" height="28" rx="10" fill="#3B82F6"/>
  <rect x="20" y="70" width="340" height="10" fill="#3B82F6"/>
  <text x="190" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">午前の部 択一式（35問）</text>

  <rect x="36" y="88" width="308" height="36" rx="6" fill="#DC2626"/>
  <text x="190" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">民法 20問 ★★★★★</text>
  <text x="190" y="116" text-anchor="middle" font-size="9.5" fill="#FEE2E2">総則・物権・債権・家族法 — 全科目の土台</text>

  <rect x="36" y="132" width="308" height="36" rx="6" fill="#EF4444"/>
  <text x="190" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">会社法 9問 ★★★★</text>
  <text x="190" y="160" text-anchor="middle" font-size="9.5" fill="#FEE2E2">機関設計・株式・設立・解散</text>

  <rect x="36" y="176" width="308" height="28" rx="6" fill="#FCA5A5"/>
  <text x="190" y="188" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7F1D1D">憲法 3問 ★★</text>
  <text x="190" y="200" text-anchor="middle" font-size="9.5" fill="#7F1D1D">基本的人権・統治機構の基本</text>

  <rect x="36" y="212" width="308" height="28" rx="6" fill="#FCA5A5"/>
  <text x="190" y="224" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7F1D1D">刑法 3問 ★★</text>
  <text x="190" y="236" text-anchor="middle" font-size="9.5" fill="#7F1D1D">犯罪成立要件・主要各論</text>

  <line x1="36" y1="248" x2="344" y2="248" stroke="#BFDBFE" stroke-width="1"/>
  <text x="190" y="264" text-anchor="middle" font-size="10" fill="#1E40AF">合格ライン：35問中 約22〜23問正解</text>
  <text x="190" y="280" text-anchor="middle" font-size="10" fill="#374151">民法を最初に固めること</text>
  <text x="190" y="296" text-anchor="middle" font-size="10" fill="#374151">会社法は民法の次に着手</text>
  <text x="190" y="312" text-anchor="middle" font-size="10" fill="#374151">憲法・刑法は後半に短期で仕上げ</text>

  <!-- 午後の部 -->
  <rect x="400" y="52" width="340" height="280" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="400" y="52" width="340" height="28" rx="10" fill="#22C55E"/>
  <rect x="400" y="70" width="340" height="10" fill="#22C55E"/>
  <text x="570" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">午後の部 択一式（35問）＋記述式（2問）</text>

  <rect x="416" y="88" width="308" height="36" rx="6" fill="#166534"/>
  <text x="570" y="102" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">不動産登記法 16問＋記述1問 ★★★★★</text>
  <text x="570" y="116" text-anchor="middle" font-size="9.5" fill="#DCFCE7">申請手続・添付情報・各種登記類型</text>

  <rect x="416" y="132" width="308" height="36" rx="6" fill="#22C55E"/>
  <text x="570" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">商業登記法 8問＋記述1問 ★★★★</text>
  <text x="570" y="160" text-anchor="middle" font-size="9.5" fill="#DCFCE7">会社法と連動した登記手続</text>

  <rect x="416" y="176" width="308" height="28" rx="6" fill="#86EFAC"/>
  <text x="570" y="188" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">民事訴訟法 5問 ★★★</text>
  <text x="570" y="200" text-anchor="middle" font-size="9.5" fill="#166534">訴訟手続・判決効力の基本</text>

  <rect x="416" y="212" width="308" height="28" rx="6" fill="#86EFAC"/>
  <text x="570" y="224" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">民事執行法・保全法・司法書士法 各2〜3問</text>
  <text x="570" y="236" text-anchor="middle" font-size="9.5" fill="#166534">基本論点のみ押さえる</text>

  <line x1="416" y1="248" x2="724" y2="248" stroke="#BBF7D0" stroke-width="1"/>
  <text x="570" y="264" text-anchor="middle" font-size="10" fill="#166534">合格ライン：35問中 約22〜23問正解</text>
  <text x="570" y="280" text-anchor="middle" font-size="10" fill="#374151">不動産登記法が最重要（記述含む）</text>
  <text x="570" y="296" text-anchor="middle" font-size="10" fill="#374151">商業登記法は会社法とセット学習</text>
  <text x="570" y="312" text-anchor="middle" font-size="10" fill="#374151">マイナー科目は全体後半で短期仕上げ</text>

  <!-- Bottom -->
  <rect x="20" y="344" width="720" height="24" rx="5" fill="#1E293B"/>
  <text x="380" y="360" text-anchor="middle" font-size="10.5" fill="#F8FAFC">攻略順：民法 → 不動産登記法 → 会社法 → 商業登記法 → 民事訴訟法 → マイナー科目</text>
  <rect x="20" y="372" width="720" height="20" rx="5" fill="#F1F5F9"/>
  <text x="380" y="386" text-anchor="middle" font-size="10" fill="#475569">💡 合格基準：午前・午後とも基準点クリア＋記述式で足切り回避が必要（総合点制ではなく科目別足切りあり）</text>
</svg>
