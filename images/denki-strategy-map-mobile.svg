<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1720" viewBox="0 0 360 1720" role="img" aria-labelledby="title desc">
  <title id="title">第二種電気工事士の攻略戦略マップ（モバイル版）</title>
  <desc id="desc">筆記試験50問の分野別出題数と、技能試験候補問題13問への流れ、合格までの最短ルートを縦に並べて示す図解</desc>
  <defs>
    <style>
      .mtitle{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14px;font-weight:800;fill:#1f2937}
      .msub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#64748b}
      .mpill{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .mphase{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:800;fill:#1f2937}
      .mstat{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11.5px;font-weight:700;fill:#334155}
      .mname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#1f2937}
      .mnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11px;font-weight:800;fill:#ffffff}
      .mbanner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:700;fill:#166534}
      .mdetail{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
      .msection{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:700;fill:#475569}
    </style>
  </defs>

  <rect width="360" height="1720" rx="20" fill="#fbfdf5"/>

  <text x="180" y="32" text-anchor="middle" class="mtitle">電気工事士（第二種）</text>
  <text x="180" y="52" text-anchor="middle" class="mtitle">攻略戦略マップ</text>
  <text x="180" y="72" text-anchor="middle" class="msub">筆記50問 → 技能13問候補、最短2段階ルート</text>

  <!-- STEP1 -->
  <rect x="20" y="92" width="320" height="150" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>
  <rect x="36" y="108" width="90" height="28" rx="14" fill="#3b82f6"/>
  <text x="81" y="127" text-anchor="middle" class="mpill">STEP 1</text>
  <text x="180" y="130" text-anchor="middle" class="mphase">筆記試験</text>
  <text x="36" y="164" class="mstat">四肢択一50問・100分</text>
  <text x="36" y="182" class="mstat">60点以上で合格</text>
  <text x="36" y="204" class="mstat">合格率 60〜70%</text>
  <text x="36" y="224" class="mstat">対策：過去問5〜10年分を3周</text>

  <text x="180" y="266" text-anchor="middle" font-size="16" fill="#94a3b8">↓</text>

  <!-- STEP2 -->
  <rect x="20" y="280" width="320" height="150" rx="18" fill="#ffffff" stroke="#86efac" stroke-width="3"/>
  <rect x="36" y="296" width="90" height="28" rx="14" fill="#22c55e"/>
  <text x="81" y="315" text-anchor="middle" class="mpill">STEP 2</text>
  <text x="180" y="318" text-anchor="middle" class="mphase">技能試験</text>
  <text x="36" y="352" class="mstat">候補問題13問中1問</text>
  <text x="36" y="370" class="mstat">40分以内に完成</text>
  <text x="36" y="392" class="mstat">合格率 70〜80%</text>
  <text x="36" y="412" class="mstat">対策：全13問を欠陥ゼロで反復</text>

  <!-- 分野別出題数 -->
  <text x="20" y="468" class="msection">筆記試験：分野別の出題数（全50問）</text>

  <rect x="20" y="482" width="320" height="70" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="36" y="506" class="mname">電気理論（オームの法則・電力計算）</text>
  <rect x="36" y="516" width="288" height="20" rx="10" fill="#3B82F6"/>
  <text x="180" y="531" text-anchor="middle" class="mnum">10問・★★★★☆</text>

  <rect x="20" y="562" width="320" height="70" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="36" y="586" class="mname">配線図の読み取り</text>
  <rect x="36" y="596" width="288" height="20" rx="10" fill="#3B82F6"/>
  <text x="180" y="611" text-anchor="middle" class="mnum">10問・★★★☆☆</text>

  <rect x="20" y="642" width="320" height="70" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="36" y="666" class="mname">電気機器・材料・工具</text>
  <rect x="36" y="676" width="288" height="20" rx="10" fill="#22C55E"/>
  <text x="180" y="691" text-anchor="middle" class="mnum">10問・★★☆☆☆</text>

  <rect x="20" y="722" width="320" height="70" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="36" y="746" class="mname">電気工事の施工方法</text>
  <rect x="36" y="756" width="230" height="20" rx="10" fill="#22C55E"/>
  <text x="150" y="771" text-anchor="middle" class="mnum">8問・★★★☆☆</text>

  <rect x="20" y="802" width="320" height="70" rx="12" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2"/>
  <text x="36" y="826" class="mname">電気法規・保安</text>
  <rect x="36" y="836" width="200" height="20" rx="10" fill="#F59E0B"/>
  <text x="136" y="851" text-anchor="middle" class="mnum">7問・★★☆☆☆</text>

  <rect x="20" y="882" width="320" height="70" rx="12" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2"/>
  <text x="36" y="906" class="mname">一般用電気工作物の検査</text>
  <rect x="36" y="916" width="150" height="20" rx="10" fill="#F59E0B"/>
  <text x="111" y="931" text-anchor="middle" class="mnum">5問・★★☆☆☆</text>

  <!-- Bottom banner -->
  <rect x="20" y="980" width="320" height="330" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
  <text x="180" y="1016" text-anchor="middle" class="mbanner">筆記は「電気理論」「配線図」に</text>
  <text x="180" y="1036" text-anchor="middle" class="mbanner">時間を割き、過去問中心で</text>
  <text x="180" y="1056" text-anchor="middle" class="mbanner">60点を確実に超える</text>
  <text x="180" y="1090" text-anchor="middle" class="mbanner">技能は「速さ」より「欠陥ゼロ」</text>
  <text x="180" y="1110" text-anchor="middle" class="mbanner">候補問題13問を全部、正確に</text>
  <text x="180" y="1130" text-anchor="middle" class="mbanner">反復するのが最短ルート</text>
  <text x="180" y="1166" text-anchor="middle" class="mdetail">重大欠陥（誤接続・極性ミス・</text>
  <text x="180" y="1184" text-anchor="middle" class="mdetail">ケーブル損傷）は即不合格。</text>
  <text x="180" y="1202" text-anchor="middle" class="mdetail">軽欠陥は2つで不合格。</text>
  <text x="180" y="1234" text-anchor="middle" class="mdetail">合計100〜150時間・3ヶ月あれば</text>
  <text x="180" y="1252" text-anchor="middle" class="mdetail">筆記→技能まで独学で十分間に合う</text>
</svg>
