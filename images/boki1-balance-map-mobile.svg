<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 620" width="360" height="620">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="620" rx="14" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">日商簿記1級 4科目</text>
  <text x="180" y="44" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">バランス戦略マップ</text>
  <text x="180" y="60" text-anchor="middle" font-size="9" fill="#64748B">各25点満点・40%足切り防衛ラインを守り合計70点を狙う</text>

  <!-- 商業簿記 目標17 -->
  <text x="24" y="88" font-size="12" font-weight="700" fill="#1E293B">商業簿記　25点満点／★★★★</text>
  <rect x="24" y="96" width="312" height="26" rx="6" fill="#F1F5F9"/>
  <rect x="24" y="96" width="212" height="26" rx="6" fill="#3B82F6"/>
  <line x1="150" y1="92" x2="150" y2="126" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="336" y="114" text-anchor="end" font-size="11" font-weight="700" fill="#1D4ED8">目標17点</text>

  <!-- 会計学 目標14 -->
  <text x="24" y="152" font-size="12" font-weight="700" fill="#1E293B">会計学　25点満点／★★★★★</text>
  <rect x="24" y="160" width="312" height="26" rx="6" fill="#F1F5F9"/>
  <rect x="24" y="160" width="175" height="26" rx="6" fill="#8B5CF6"/>
  <line x1="150" y1="156" x2="150" y2="190" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="336" y="178" text-anchor="end" font-size="11" font-weight="700" fill="#6D28D9">目標14点</text>
  <text x="24" y="202" font-size="9.5" fill="#7C3AED">最難関だが+4点の安全バッファ</text>

  <!-- 工業簿記 目標20 最優先 -->
  <text x="24" y="230" font-size="12" font-weight="700" fill="#1E293B">工業簿記　25点満点／★★★</text>
  <rect x="24" y="238" width="312" height="26" rx="6" fill="#F1F5F9"/>
  <rect x="24" y="238" width="250" height="26" rx="6" fill="#22C55E"/>
  <line x1="150" y1="234" x2="150" y2="268" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="336" y="256" text-anchor="end" font-size="11" font-weight="700" fill="#15803D">目標20点</text>
  <rect x="24" y="272" width="130" height="20" rx="10" fill="#22C55E"/>
  <text x="89" y="286" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">最優先の得点源</text>

  <!-- 原価計算 目標19 -->
  <text x="24" y="322" font-size="12" font-weight="700" fill="#1E293B">原価計算　25点満点／★★★★</text>
  <rect x="24" y="330" width="312" height="26" rx="6" fill="#F1F5F9"/>
  <rect x="24" y="330" width="237" height="26" rx="6" fill="#F97316"/>
  <line x1="150" y1="326" x2="150" y2="360" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="336" y="348" text-anchor="end" font-size="11" font-weight="700" fill="#C2410C">目標19点</text>

  <text x="180" y="392" text-anchor="middle" font-size="10" fill="#B91C1C">┊ 40%足切りライン（10点）の目安位置</text>

  <rect x="24" y="416" width="312" height="52" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">合計目標：17+14+20+19＝70点</text>
  <text x="180" y="458" text-anchor="middle" font-size="10" fill="#92400E">全科目が40%ラインを安全圏で死守</text>
