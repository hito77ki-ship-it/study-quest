<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" width="780" height="500">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="780" height="500" rx="16" fill="#FEFCF9"/>
  <text x="390" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">3ヶ月資格 限界突破マトリクス</text>
  <text x="390" y="49" text-anchor="middle" font-size="11" fill="#94A3B8">縦軸＝資格の市場価値／横軸＝必要勉強時間（3ヶ月の限界枠＝135時間）</text>

  <!-- zone tints -->
  <rect x="90" y="70" width="213" height="360" fill="#F0FBF4"/>
  <rect x="303" y="70" width="117" height="360" fill="#FFFBEA"/>
  <rect x="420" y="70" width="300" height="360" fill="#FFF1F0"/>

  <!-- zone labels -->
  <rect x="105" y="82" width="180" height="26" rx="13" fill="#68D391"/>
  <text x="195" y="99.5" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">✅ 安全圏（余裕で収まる）</text>

  <rect x="313" y="82" width="98" height="26" rx="13" fill="#F6C85F"/>
  <text x="362" y="99.5" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">⚠ ギリギリ</text>

  <rect x="500" y="82" width="200" height="26" rx="13" fill="#FC8181"/>
  <text x="600" y="99.5" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">🚫 はみ出しゾーン</text>

  <!-- limit line -->
  <line x1="303" y1="70" x2="303" y2="450" stroke="#DD6B20" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="303" y="465" text-anchor="middle" font-size="10.5" font-weight="700" fill="#DD6B20">3ヶ月の限界ライン（135時間）</text>

  <!-- axis -->
  <line x1="90" y1="430" x2="720" y2="430" stroke="#CBD5E1" stroke-width="2"/>
  <text x="90" y="447" text-anchor="start" font-size="10.5" fill="#64748B">0時間</text>
  <text x="720" y="447" text-anchor="end" font-size="10.5" fill="#64748B">必要勉強時間（多い）→</text>
  <text x="70" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#64748B" transform="rotate(-90,70,90)">↑ 市場価値（高）</text>

  <!-- 安全圏バブル -->
  <circle cx="150" cy="250" r="32" fill="#E6FFFA" stroke="#68D391" stroke-width="2.5"/>
  <text x="150" y="246" text-anchor="middle" font-size="10.5" font-weight="700" fill="#276749">ITパスポート</text>
  <text x="150" y="259" text-anchor="middle" font-size="8.5" fill="#2F855A">50〜100h</text>

  <circle cx="235" cy="230" r="30" fill="#E6FFFA" stroke="#68D391" stroke-width="2.5"/>
  <text x="235" y="226" text-anchor="middle" font-size="10.5" font-weight="700" fill="#276749">簿記3級</text>
  <text x="235" y="239" text-anchor="middle" font-size="8.5" fill="#2F855A">60〜100h</text>

  <circle cx="200" cy="310" r="28" fill="#E6FFFA" stroke="#68D391" stroke-width="2.5"/>
  <text x="200" y="306" text-anchor="middle" font-size="10" font-weight="700" fill="#276749">危険物乙4</text>
  <text x="200" y="319" text-anchor="middle" font-size="8.5" fill="#2F855A">40〜80h</text>

  <circle cx="270" cy="290" r="26" fill="#E6FFFA" stroke="#68D391" stroke-width="2.5"/>
  <text x="270" y="286" text-anchor="middle" font-size="10" font-weight="700" fill="#276749">FP3級</text>
  <text x="270" y="299" text-anchor="middle" font-size="8.5" fill="#2F855A">50〜80h</text>

  <circle cx="140" cy="330" r="26" fill="#E6FFFA" stroke="#68D391" stroke-width="2.5"/>
  <text x="140" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#276749">MOS</text>
  <text x="140" y="339" text-anchor="middle" font-size="8.5" fill="#2F855A">40〜80h</text>

  <!-- ギリギリゾーン -->
  <circle cx="350" cy="190" r="30" fill="#FFFBEA" stroke="#F6C85F" stroke-width="2.5"/>
  <text x="350" y="186" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">基本情報</text>
  <text x="350" y="199" text-anchor="middle" font-size="8.5" fill="#92400E">150〜200h</text>

  <circle cx="335" cy="250" r="28" fill="#FFFBEA" stroke="#F6C85F" stroke-width="2.5"/>
  <text x="335" y="246" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">FP2級</text>
  <text x="335" y="259" text-anchor="middle" font-size="8.5" fill="#92400E">150〜200h</text>

  <!-- はみ出しゾーン -->
  <circle cx="530" cy="150" r="34" fill="#FFF1F0" stroke="#FC8181" stroke-width="2.5"/>
  <text x="530" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#9B2C2C">簿記2級</text>
  <text x="530" y="160" text-anchor="middle" font-size="8.5" fill="#9B2C2C">200〜350h</text>

  <circle cx="630" cy="150" r="34" fill="#FFF1F0" stroke="#FC8181" stroke-width="2.5"/>
  <text x="630" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#9B2C2C">宅建</text>
  <text x="630" y="160" text-anchor="middle" font-size="8.5" fill="#9B2C2C">300〜400h</text>

  <!-- caption -->
  <rect x="70" y="470" width="640" height="24" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="390" y="486.5" text-anchor="middle" font-size="10" fill="#78350F">緑ゾーンから確実に各個撃破するのが最速攻略のセオリー。赤ゾーンは専念できる環境がない限り3ヶ月では厳しい</text>
</svg>
