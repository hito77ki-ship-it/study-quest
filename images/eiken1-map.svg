<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">英検1級 試験構成と合格戦略——合格率10%の最高峰</text>
  <!-- Left: 試験構成 -->
  <rect x="20" y="52" width="348" height="328" rx="8" fill="#F5F3FF"/>
  <rect x="20" y="52" width="348" height="34" rx="8" fill="#7C3AED"/>
  <text x="194" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">試験構成</text>
  <!-- 一次 -->
  <text x="40" y="106" text-anchor="start" font-size="12" font-weight="700" fill="#6D28D9">一次試験（筆記100分＋リスニング約35分）</text>
  <rect x="40" y="114" width="310" height="28" rx="4" fill="#EDE9FE"/>
  <text x="50" y="133" text-anchor="start" font-size="10" fill="#374151">大問1 語彙・熟語（25問）── 語彙力がスコアの核心</text>
  <rect x="40" y="148" width="310" height="28" rx="4" fill="#EDE9FE"/>
  <text x="50" y="167" text-anchor="start" font-size="10" fill="#374151">大問2 読解（10問）── 長文3種・内容一致問題</text>
  <rect x="40" y="182" width="310" height="28" rx="4" fill="#EDE9FE"/>
  <text x="50" y="201" text-anchor="start" font-size="10" fill="#374151">大問3 英作文（1問）── 意見論述350〜400語</text>
  <rect x="40" y="216" width="310" height="28" rx="4" fill="#EDE9FE"/>
  <text x="50" y="235" text-anchor="start" font-size="10" fill="#374151">リスニング（60問）── インタビュー・スピーチ・実況</text>
  <!-- 二次 -->
  <text x="40" y="264" text-anchor="start" font-size="12" font-weight="700" fill="#6D28D9">二次試験（面接 約10分）</text>
  <rect x="40" y="272" width="310" height="28" rx="4" fill="#DDD6FE"/>
  <text x="50" y="291" text-anchor="start" font-size="10" fill="#374151">スピーチ2分（与えられたトピックで）</text>
  <rect x="40" y="306" width="310" height="28" rx="4" fill="#DDD6FE"/>
  <text x="50" y="325" text-anchor="start" font-size="10" fill="#374151">Q&amp;A 4問（スピーチへの質問＋社会問題議論）</text>
  <rect x="40" y="340" width="310" height="28" rx="4" fill="#DDD6FE"/>
  <text x="50" y="359" text-anchor="start" font-size="10" fill="#374151">評価: 文法・語彙・発音・内容の4観点</text>
  <!-- Right: 合格戦略 -->
  <rect x="384" y="52" width="356" height="328" rx="8" fill="#FDF4FF"/>
  <rect x="384" y="52" width="356" height="34" rx="8" fill="#9333EA"/>
  <text x="562" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">合格戦略</text>
  <!-- 語彙 -->
  <rect x="400" y="96" width="324" height="64" rx="6" fill="#F3E8FF"/>
  <text x="562" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#7E22CE">① 語彙力：10,000〜15,000語</text>
  <text x="562" y="134" text-anchor="middle" font-size="10" fill="#374151">「英検1級でる順パス単」を軸に高度語彙を習得</text>
  <text x="562" y="150" text-anchor="middle" font-size="10" fill="#374151">大問1の語彙が合否の最大の分岐点になる</text>
  <!-- 英作文 -->
  <rect x="400" y="170" width="324" height="64" rx="6" fill="#F3E8FF"/>
  <text x="562" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#7E22CE">② 英作文：論理展開の型を覚える</text>
  <text x="562" y="208" text-anchor="middle" font-size="10" fill="#374151">導入→論点2〜3つ→結論の構成で減点ゼロを目指す</text>
  <text x="562" y="224" text-anchor="middle" font-size="10" fill="#374151">社会・環境・テクノロジー系のテーマが頻出</text>
  <!-- リスニング -->
  <rect x="400" y="244" width="324" height="64" rx="6" fill="#F3E8FF"/>
  <text x="562" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#7E22CE">③ リスニング：速い英語に慣れる</text>
  <text x="562" y="282" text-anchor="middle" font-size="10" fill="#374151">ネイティブ速度の講演・インタビュー音声を</text>
  <text x="562" y="298" text-anchor="middle" font-size="10" fill="#374151">毎日30分以上シャドーイングで体得する</text>
  <!-- 二次 -->
  <rect x="400" y="318" width="324" height="52" rx="6" fill="#EDE9FE"/>
  <text x="562" y="338" text-anchor="middle" font-size="12" font-weight="700" fill="#7E22CE">④ 二次：社会問題の英語意見を準備</text>
  <text x="562" y="356" text-anchor="middle" font-size="10" fill="#374151">環境・経済・社会系30テーマで即興スピーチを練習</text>
</svg>
