<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">繰延税金資産と繰延税金負債、将来の税金への影響からわかる違い</title>
  <desc id="desc">繰延税金資産は将来支払う法人税等が減少することを意味する資産で将来減算一時差異から生じるのに対し、繰延税金負債は将来支払う法人税等が増加することを意味する負債で将来加算一時差異から生じるという違いを対比する図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#fef2f2"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#667085" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:26px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .ptnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13px;font-weight:800;fill:#ffffff}
      .ptname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:800;fill:#1f2937}
      .ptbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:800;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="1200" height="800" rx="40" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="64" fill="#dcfce7" opacity="0.6"/>
  <circle cx="1100" cy="110" r="78" fill="#fee2e2" opacity="0.5"/>
  <circle cx="1090" cy="740" r="88" fill="#fee2e2" opacity="0.4"/>
  <circle cx="110" cy="730" r="70" fill="#dcfce7" opacity="0.45"/>

  <text x="600" y="50" text-anchor="middle" class="title">繰延税金資産 vs 繰延税金負債 将来の税金への影響からわかる違い</text>
  <text x="600" y="76" text-anchor="middle" class="sub">将来の税金が「減るなら資産」「増えるなら負債」——たった1つの軸で見分けられる</text>

  <!-- Left column: 繰延税金資産 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="104" width="500" height="46" rx="16" fill="#22c55e"/>
    <text x="320" y="133" text-anchor="middle" class="colhead">繰延税金資産（将来の税金が減る）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="70" y="166" width="500" height="500" rx="22" fill="#ffffff" stroke="#86efac" stroke-width="3"/>

    <circle cx="108" cy="206" r="17" fill="#22c55e"/>
    <text x="108" y="211" text-anchor="middle" class="ptnum">1</text>
    <text x="136" y="202" class="ptname">意味</text>
    <text x="136" y="222" class="ptbody">将来支払う法人税等が減少することを意味する資産</text>

    <line x1="96" y1="240" x2="546" y2="240" stroke="#dcfce7" stroke-width="2"/>

    <circle cx="108" cy="278" r="17" fill="#22c55e"/>
    <text x="108" y="283" text-anchor="middle" class="ptnum">2</text>
    <text x="136" y="274" class="ptname">発生する一時差異</text>
    <text x="136" y="294" class="ptbody">将来減算一時差異（今期多く払った分、将来減る）</text>

    <line x1="96" y1="312" x2="546" y2="312" stroke="#dcfce7" stroke-width="2"/>

    <circle cx="108" cy="350" r="17" fill="#22c55e"/>
    <text x="108" y="355" text-anchor="middle" class="ptnum">3</text>
    <text x="136" y="346" class="ptname">直感的なイメージ</text>
    <text x="136" y="366" class="ptbody">税金の前払いのようなもの</text>

    <rect x="96" y="466" width="450" height="176" rx="14" fill="#f0fdf4"/>
    <text x="120" y="496" class="ptname" fill="#166534">よくある発生例</text>
    <text x="120" y="522" class="ptbody">・貸倒引当金の損金不算入</text>
    <text x="120" y="544" class="ptbody">・減価償却費の償却限度超過額</text>
    <text x="120" y="576" class="ptname" fill="#166534">仕訳の型</text>
    <text x="120" y="602" class="ptbody">（借）繰延税金資産 ／（貸）法人税等調整額</text>
    <text x="120" y="624" class="ptbody">→ 法人税等調整額はマイナス（税金を減らす）</text>
  </g>

  <!-- Right column: 繰延税金負債 -->
  <g filter="url(#softShadow)">
    <rect x="630" y="104" width="500" height="46" rx="16" fill="#ef4444"/>
    <text x="880" y="133" text-anchor="middle" class="colhead">繰延税金負債（将来の税金が増える）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="630" y="166" width="500" height="500" rx="22" fill="#ffffff" stroke="#fca5a5" stroke-width="3"/>

    <circle cx="668" cy="206" r="17" fill="#ef4444"/>
    <text x="668" y="211" text-anchor="middle" class="ptnum">1</text>
    <text x="696" y="202" class="ptname">意味</text>
    <text x="696" y="222" class="ptbody">将来支払う法人税等が増加することを意味する負債</text>

    <line x1="656" y1="240" x2="1106" y2="240" stroke="#fee2e2" stroke-width="2"/>

    <circle cx="668" cy="278" r="17" fill="#ef4444"/>
    <text x="668" y="283" text-anchor="middle" class="ptnum">2</text>
    <text x="696" y="274" class="ptname">発生する一時差異</text>
    <text x="696" y="294" class="ptbody">将来加算一時差異（今期少なく払った分、将来増える）</text>

    <line x1="656" y1="312" x2="1106" y2="312" stroke="#fee2e2" stroke-width="2"/>

    <circle cx="668" cy="350" r="17" fill="#ef4444"/>
    <text x="668" y="355" text-anchor="middle" class="ptnum">3</text>
    <text x="696" y="346" class="ptname">直感的なイメージ</text>
    <text x="696" y="366" class="ptbody">税金の未払いのようなもの</text>

    <rect x="656" y="466" width="450" height="176" rx="14" fill="#fef2f2"/>
    <text x="680" y="496" class="ptname" fill="#b91c1c">よくある発生例</text>
    <text x="680" y="522" class="ptbody">・その他有価証券の評価差益（時価＞帳簿価額）</text>
    <text x="680" y="544" class="ptbody">・積立金方式の圧縮記帳</text>
    <text x="680" y="576" class="ptname" fill="#b91c1c">仕訳の型</text>
    <text x="680" y="602" class="ptbody">（借）法人税等調整額 ／（貸）繰延税金負債</text>
    <text x="680" y="624" class="ptbody">→ 法人税等調整額はプラス（税金を増やす）</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="70" y="690" width="1060" height="92" rx="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="3"/>
    <text x="600" y="724" text-anchor="middle" class="banner">迷ったら「将来の税金が減るか、増えるか」だけを見る</text>
    <text x="600" y="750" text-anchor="middle" class="bannersmall">両方が同時に発生した場合は、貸借対照表上で相殺して表示することがある——資産・負債どちらか一方にまとめる処理</text>
  </g>
</svg>
