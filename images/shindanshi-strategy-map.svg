<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">中小企業診断士試験の科目別配点と2次直結科目を最優先にする戦略マップ</title>
  <desc id="desc">1次試験7科目の勉強量の目安を横棒グラフで示し、2次試験に直結する「財務・会計」「企業経営理論」を最優先で固める戦略を表す図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#fff7fb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#667085" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:32px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:600;fill:#64748b}
      .name{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:800;fill:#1f2937}
      .detail{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:600;fill:#64748b}
      .badge{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .hour{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:700;fill:#166534}
    </style>
  </defs>

  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>
  <circle cx="110" cy="90" r="66" fill="#fef3c7" opacity="0.55"/>
  <circle cx="1100" cy="120" r="80" fill="#dbeafe" opacity="0.55"/>
  <circle cx="1090" cy="800" r="90" fill="#fce7f3" opacity="0.5"/>
  <circle cx="120" cy="810" r="72" fill="#dcfce7" opacity="0.55"/>

  <text x="600" y="54" text-anchor="middle" class="title">診断士 配点戦略マップ</text>
  <text x="600" y="84" text-anchor="middle" class="sub">1次試験7科目の勉強量と、2次試験に直結する最優先科目がひと目でわかる</text>

  <!-- Row 1: 経済学・経済政策 -->
  <g filter="url(#softShadow)">
    <rect x="100" y="150" width="1000" height="64" rx="14" fill="#FFE4E6" stroke="#FB7185" stroke-width="2.5"/>
    <text x="130" y="176" class="name">経済学・経済政策</text>
    <text x="130" y="198" class="detail">難易度：高｜目安 100〜150時間</text>
    <rect x="560" y="164" width="357" height="20" rx="10" fill="#FB7185"/>
    <text x="748" y="179" text-anchor="middle" class="hour">125h</text>
  </g>

  <!-- Row 2: 財務・会計（2次直結） -->
  <g filter="url(#softShadow)">
    <rect x="100" y="228" width="1000" height="64" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3.5"/>
    <text x="130" y="254" class="name">財務・会計</text>
    <rect x="290" y="240" width="86" height="24" rx="12" fill="#F59E0B"/>
    <text x="333" y="256" text-anchor="middle" class="badge">2次直結</text>
    <text x="130" y="276" class="detail">難易度：高｜目安 150〜200時間・最優先科目</text>
    <rect x="560" y="242" width="500" height="20" rx="10" fill="#F59E0B"/>
    <text x="810" y="257" text-anchor="middle" class="hour">175h</text>
  </g>

  <!-- Row 3: 企業経営理論（2次直結） -->
  <g filter="url(#softShadow)">
    <rect x="100" y="306" width="1000" height="64" rx="14" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3.5"/>
    <text x="130" y="332" class="name">企業経営理論</text>
    <rect x="316" y="318" width="86" height="24" rx="12" fill="#F59E0B"/>
    <text x="359" y="334" text-anchor="middle" class="badge">2次直結</text>
    <text x="130" y="354" class="detail">難易度：中｜目安 100〜150時間・最優先科目</text>
    <rect x="560" y="320" width="357" height="20" rx="10" fill="#F59E0B"/>
    <text x="748" y="335" text-anchor="middle" class="hour">125h</text>
  </g>

  <!-- Row 4: 運営管理 -->
  <g filter="url(#softShadow)">
    <rect x="100" y="384" width="1000" height="64" rx="14" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5"/>
    <text x="130" y="410" class="name">運営管理</text>
    <text x="130" y="432" class="detail">難易度：中｜目安 100〜150時間</text>
    <rect x="560" y="398" width="357" height="20" rx="10" fill="#3B82F6"/>
    <text x="748" y="413" text-anchor="middle" class="hour">125h</text>
  </g>

  <!-- Row 5: 経営法務 -->
  <g filter="url(#softShadow)">
    <rect x="100" y="462" width="1000" height="64" rx="14" fill="#FFE4E6" stroke="#FB7185" stroke-width="2.5"/>
    <text x="130" y="488" class="name">経営法務</text>
    <text x="130" y="510" class="detail">難易度：高｜目安 80〜120時間・改正に注意</text>
    <rect x="560" y="476" width="286" height="20" rx="10" fill="#FB7185"/>
    <text x="712" y="491" text-anchor="middle" class="hour">100h</text>
  </g>

  <!-- Row 6: 経営情報システム -->
  <g filter="url(#softShadow)">
    <rect x="100" y="540" width="1000" height="64" rx="14" fill="#CCFBF1" stroke="#14B8A6" stroke-width="2.5"/>
    <text x="130" y="566" class="name">経営情報システム</text>
    <text x="130" y="588" class="detail">難易度：低〜中｜目安 60〜100時間・IT経験者は得点源</text>
    <rect x="560" y="554" width="229" height="20" rx="10" fill="#14B8A6"/>
    <text x="675" y="569" text-anchor="middle" class="hour">80h</text>
  </g>

  <!-- Row 7: 中小企業経営・政策 -->
  <g filter="url(#softShadow)">
    <rect x="100" y="618" width="1000" height="64" rx="14" fill="#F3E8FF" stroke="#A855F7" stroke-width="2.5"/>
    <text x="130" y="644" class="name">中小企業経営・政策</text>
    <text x="130" y="666" class="detail">難易度：低｜目安 60〜80時間・直前期の暗記で得点</text>
    <rect x="560" y="632" width="200" height="20" rx="10" fill="#A855F7"/>
    <text x="660" y="647" text-anchor="middle" class="hour">70h</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="100" y="726" width="1000" height="110" rx="22" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <text x="600" y="764" text-anchor="middle" class="banner">2次試験にも直結する「財務・会計」「企業経営理論」を最優先で固める</text>
    <text x="600" y="792" text-anchor="middle" class="banner">――これが1次・2次を独学で完全撃破する逆算ルート</text>
    <text x="600" y="818" text-anchor="middle" class="detail">中小企業経営・政策は直前期の暗記で十分間に合う＝序盤は後回しでOK</text>
  </g>
</svg>
