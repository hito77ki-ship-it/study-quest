<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="380" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">物権・担保物権——対抗要件と抵当権の頻出論点マップ</text>

  <!-- 物権の種類 -->
  <rect x="20" y="52" width="224" height="268" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="52" width="224" height="28" rx="10" fill="#3B82F6"/>
  <rect x="20" y="70" width="224" height="10" fill="#3B82F6"/>
  <text x="132" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">物権の種類と対抗要件</text>

  <text x="36" y="90" font-size="10.5" font-weight="700" fill="#1E40AF">所有権</text>
  <text x="36" y="106" font-size="10" fill="#374151">完全な支配権。不動産：登記、動産：引渡し</text>
  <line x1="36" y1="112" x2="228" y2="112" stroke="#BFDBFE" stroke-width="1"/>

  <text x="36" y="128" font-size="10.5" font-weight="700" fill="#1E40AF">地上権・賃借権</text>
  <text x="36" y="144" font-size="10" fill="#374151">地上権：物権（第三者対抗○）</text>
  <text x="36" y="160" font-size="10" fill="#374151">賃借権：債権（登記で対抗可能）</text>
  <line x1="36" y1="166" x2="228" y2="166" stroke="#BFDBFE" stroke-width="1"/>

  <text x="36" y="182" font-size="10.5" font-weight="700" fill="#1E40AF">物権変動の対抗要件</text>
  <rect x="36" y="188" width="192" height="36" rx="5" fill="#DBEAFE"/>
  <text x="132" y="202" text-anchor="middle" font-size="10" fill="#1D4ED8">不動産：登記（先に登記した方が勝ち）</text>
  <text x="132" y="216" text-anchor="middle" font-size="10" fill="#1D4ED8">動産：引渡し（即時取得含む）</text>

  <text x="36" y="238" font-size="10.5" font-weight="700" fill="#1E40AF">二重譲渡</text>
  <text x="36" y="254" font-size="10" fill="#374151">AがBにもCにも売った → 先に登記した方勝ち</text>
  <text x="36" y="270" font-size="10" fill="#64748B">登記なければ第三者に主張できない</text>
  <text x="36" y="290" font-size="10" fill="#64748B">「第三者」の範囲が頻出論点</text>
  <text x="36" y="310" font-size="10" fill="#64748B">（背信的悪意者は第三者から除く）</text>

  <!-- 抵当権 -->
  <rect x="268" y="52" width="224" height="268" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="268" y="52" width="224" height="28" rx="10" fill="#F97316"/>
  <rect x="268" y="70" width="224" height="10" fill="#F97316"/>
  <text x="380" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">抵当権（§369〜）</text>

  <rect x="284" y="88" width="192" height="26" rx="5" fill="#FFEDD5"/>
  <text x="380" y="105" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">抵当権の設定</text>
  <text x="284" y="122" font-size="10" fill="#374151">債権担保のため不動産に設定</text>
  <text x="284" y="138" font-size="10" fill="#374151">占有を移転しない（使い続けられる）</text>

  <rect x="284" y="148" width="192" height="26" rx="5" fill="#FFEDD5"/>
  <text x="380" y="165" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">法定地上権</text>
  <text x="284" y="182" font-size="10" fill="#374151">土地と建物が同一所有者の場合</text>
  <text x="284" y="198" font-size="10" fill="#374151">競売→建物に法定地上権が発生</text>

  <rect x="284" y="208" width="192" height="26" rx="5" fill="#FFEDD5"/>
  <text x="380" y="225" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">抵当権の効力範囲</text>
  <text x="284" y="242" font-size="10" fill="#374151">付加一体物（増改築など）に及ぶ</text>
  <text x="284" y="258" font-size="10" fill="#374151">従物：抵当権設定時に存在→及ぶ</text>

  <rect x="284" y="268" width="192" height="26" rx="5" fill="#FFEDD5"/>
  <text x="380" y="285" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">根抵当権（§398の2）</text>
  <text x="284" y="302" font-size="10" fill="#374151">極度額の範囲で継続的に担保</text>
  <text x="284" y="318" font-size="10" fill="#374151">確定前は元本が増減する</text>

  <!-- 不動産登記との連動 -->
  <rect x="516" y="52" width="224" height="268" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="516" y="52" width="224" height="28" rx="10" fill="#22C55E"/>
  <rect x="516" y="70" width="224" height="10" fill="#22C55E"/>
  <text x="628" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">不動産登記法との連動</text>

  <rect x="532" y="88" width="192" height="26" rx="5" fill="#DCFCE7"/>
  <text x="628" y="105" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">物権変動 → 登記申請</text>
  <text x="532" y="122" font-size="10" fill="#374151">売買による所有権移転 → 移転登記</text>
  <text x="532" y="138" font-size="10" fill="#374151">抵当権設定 → 抵当権設定登記</text>
  <text x="532" y="154" font-size="10" fill="#374151">抵当権抹消 → 抵当権抹消登記</text>

  <rect x="532" y="164" width="192" height="26" rx="5" fill="#DCFCE7"/>
  <text x="628" y="181" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">申請人（共同申請の原則）</text>
  <text x="532" y="198" font-size="10" fill="#374151">所有権移転：登記義務者と登記権利者</text>
  <text x="532" y="214" font-size="10" fill="#374151">保存登記：登記名義人となる者が単独</text>

  <rect x="532" y="224" width="192" height="26" rx="5" fill="#DCFCE7"/>
  <text x="628" y="241" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">添付情報</text>
  <text x="532" y="258" font-size="10" fill="#374151">登記原因証明情報（売買契約書等）</text>
  <text x="532" y="274" font-size="10" fill="#374151">代理権限証書・印鑑証明・住所証明</text>

  <text x="628" y="300" text-anchor="middle" font-size="10" fill="#374151">民法の物権変動の理解があって</text>
  <text x="628" y="316" text-anchor="middle" font-size="10" fill="#374151">初めて不動産登記法が理解できる</text>

  <!-- Bottom -->
  <rect x="20" y="332" width="720" height="24" rx="5" fill="#F1F5F9"/>
  <text x="380" y="348" text-anchor="middle" font-size="10.5" fill="#475569">💡 「物権変動がなければ登記不要、物権変動があれば対抗要件として登記が必要」が物権と登記をつなぐ核心。</text>
</svg>
