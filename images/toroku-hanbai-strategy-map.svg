<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" width="780" height="540">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="780" height="540" rx="12" fill="#FAFDF6"/>
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">登録販売者試験 5科目配点ウェイトと足切り回避マップ</text>
  <text x="390" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">各科目「35%」の足切りラインを越えつつ、40問の最重要科目に学習時間を厚く配分するのが合格戦略</text>

  <!-- baseline -->
  <line x1="30" y1="420" x2="750" y2="420" stroke="#CBD5E1" stroke-width="2"/>

  <!-- 科目1：医薬品総論 20問 -->
  <rect x="45" y="290" width="130" height="130" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="110" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">20問</text>
  <line x1="45" y1="374" x2="175" y2="374" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="182" y="378" font-size="9" font-weight="700" fill="#DC2626">35%</text>
  <text x="110" y="440" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E293B">医薬品総論</text>
  <text x="110" y="454" text-anchor="middle" font-size="8.5" fill="#64748B">特性と基本的な知識</text>

  <!-- 科目2：人体と医薬品 20問 -->
  <rect x="185" y="290" width="130" height="130" rx="8" fill="#FFEDD5" stroke="#F97316" stroke-width="2"/>
  <text x="250" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412">20問</text>
  <line x1="185" y1="374" x2="315" y2="374" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="322" y="378" font-size="9" font-weight="700" fill="#DC2626">35%</text>
  <text x="250" y="440" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E293B">人体と医薬品</text>
  <text x="250" y="454" text-anchor="middle" font-size="8.5" fill="#64748B">臓器の働き・副作用</text>

  <!-- 科目3：医薬品各論 40問（最重要・ハイライト） -->
  <rect x="322" y="127" width="136" height="296" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="3"/>
  <rect x="330" y="100" width="120" height="24" rx="12" fill="#F59E0B"/>
  <text x="390" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">★ 最重要科目</text>
  <text x="390" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">40問</text>
  <line x1="330" y1="323" x2="450" y2="323" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="457" y="327" font-size="9" font-weight="700" fill="#DC2626">35%</text>
  <text x="390" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B">医薬品各論</text>
  <text x="390" y="454" text-anchor="middle" font-size="8.5" fill="#64748B">主な医薬品とその作用</text>
  <text x="390" y="466" text-anchor="middle" font-size="8.5" font-weight="700" fill="#B45309">学習時間の50%を投入</text>

  <!-- 科目4：薬事関係法規 20問 -->
  <rect x="465" y="290" width="130" height="130" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="530" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">20問</text>
  <line x1="465" y1="374" x2="595" y2="374" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="602" y="378" font-size="9" font-weight="700" fill="#DC2626">35%</text>
  <text x="530" y="440" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E293B">薬事関係法規</text>
  <text x="530" y="454" text-anchor="middle" font-size="8.5" fill="#64748B">薬機法・販売区分</text>

  <!-- 科目5：適正使用・安全対策 20問 -->
  <rect x="605" y="290" width="130" height="130" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="670" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">20問</text>
  <line x1="605" y1="374" x2="735" y2="374" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="670" y="378" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626">35%</text>
  <text x="670" y="440" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E293B">適正使用・安全</text>
  <text x="670" y="454" text-anchor="middle" font-size="8.5" fill="#64748B">添付文書・副作用報告</text>

  <!-- 下部サマリー -->
  <rect x="30" y="478" width="720" height="50" rx="8" fill="#1E293B"/>
  <text x="390" y="498" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8CC63F">合格の鉄則：全科目「35%」の足切りラインを越えつつ、全体の1/3を占める「医薬品各論」を最優先で仕上げる</text>
  <text x="390" y="516" text-anchor="middle" font-size="9" fill="#CBD5E1">配点が高い科目を制する者が、登録販売者試験を制する。40問科目を得点源にすれば、他4科目は35%クリアで十分。</text>
</svg>
