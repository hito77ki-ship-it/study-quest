<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="420" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">TOEIC 730点突破——3つの壁と攻略法</text>
  <!-- 壁① -->
  <rect x="20" y="52" width="226" height="348" rx="8" fill="#FEF3C7"/>
  <rect x="20" y="52" width="226" height="36" rx="8" fill="#F59E0B"/>
  <text x="133" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">壁① リスニング長文</text>
  <text x="133" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">Part 3 / Part 4 の壁</text>
  <text x="133" y="124" text-anchor="middle" font-size="10" fill="#374151">会話・説明文の長い音声を</text>
  <text x="133" y="140" text-anchor="middle" font-size="10" fill="#374151">全部聞こうとすると崩れる</text>
  <line x1="40" y1="158" x2="226" y2="158" stroke="#FDE68A" stroke-width="1"/>
  <text x="133" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">攻略ポイント</text>
  <text x="133" y="200" text-anchor="middle" font-size="10" fill="#374151">① 設問を先読み（30秒）</text>
  <text x="133" y="218" text-anchor="middle" font-size="10" fill="#374151">② キーワードと数字に集中</text>
  <text x="133" y="236" text-anchor="middle" font-size="10" fill="#374151">③ 選択肢を先に絞り込む</text>
  <text x="133" y="254" text-anchor="middle" font-size="10" fill="#374151">④ 全部聞かなくてよい</text>
  <line x1="40" y1="270" x2="226" y2="270" stroke="#FDE68A" stroke-width="1"/>
  <text x="133" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">おすすめトレーニング</text>
  <text x="133" y="312" text-anchor="middle" font-size="10" fill="#374151">公式問題集の音声を</text>
  <text x="133" y="328" text-anchor="middle" font-size="10" fill="#374151">シャドーイングで体に入れる</text>
  <rect x="40" y="348" width="186" height="36" rx="6" fill="#FDE68A"/>
  <text x="133" y="371" text-anchor="middle" font-size="10" font-weight="700" fill="#78350F">ここで+50点が狙える</text>
  <!-- 壁② -->
  <rect x="262" y="52" width="236" height="348" rx="8" fill="#EFF6FF"/>
  <rect x="262" y="52" width="236" height="36" rx="8" fill="#3B82F6"/>
  <text x="380" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">壁② 読解スピード</text>
  <text x="380" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A">Part 7 の壁</text>
  <text x="380" y="124" text-anchor="middle" font-size="10" fill="#374151">54問を75分で読み切れず</text>
  <text x="380" y="140" text-anchor="middle" font-size="10" fill="#374151">最後の問題が塗り絵になる</text>
  <line x1="280" y1="158" x2="478" y2="158" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#2563EB">攻略ポイント</text>
  <text x="380" y="200" text-anchor="middle" font-size="10" fill="#374151">① skim（見出し・頭尾読み）</text>
  <text x="380" y="218" text-anchor="middle" font-size="10" fill="#374151">② 設問から逆算して読む</text>
  <text x="380" y="236" text-anchor="middle" font-size="10" fill="#374151">③ NOT問題は後回し</text>
  <text x="380" y="254" text-anchor="middle" font-size="10" fill="#374151">④ 1問1分ルールを守る</text>
  <line x1="280" y1="270" x2="478" y2="270" stroke="#BFDBFE" stroke-width="1"/>
  <text x="380" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#2563EB">おすすめトレーニング</text>
  <text x="380" y="312" text-anchor="middle" font-size="10" fill="#374151">英文を毎日500語以上読む習慣</text>
  <text x="380" y="328" text-anchor="middle" font-size="10" fill="#374151">（BBC, CNN等のニュース）</text>
  <rect x="280" y="348" width="196" height="36" rx="6" fill="#BFDBFE"/>
  <text x="380" y="371" text-anchor="middle" font-size="10" font-weight="700" fill="#1E3A8A">ここで+40点が狙える</text>
  <!-- 壁③ -->
  <rect x="514" y="52" width="226" height="348" rx="8" fill="#F0FDF4"/>
  <rect x="514" y="52" width="226" height="36" rx="8" fill="#16A34A"/>
  <text x="627" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">壁③ 語彙・文法精度</text>
  <text x="627" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#14532D">Part 5 / Part 6 の壁</text>
  <text x="627" y="124" text-anchor="middle" font-size="10" fill="#374151">品詞・時制・前置詞の判断が</text>
  <text x="627" y="140" text-anchor="middle" font-size="10" fill="#374151">曖昧で失点が積み重なる</text>
  <line x1="534" y1="158" x2="720" y2="158" stroke="#BBF7D0" stroke-width="1"/>
  <text x="627" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#16A34A">攻略ポイント</text>
  <text x="627" y="200" text-anchor="middle" font-size="10" fill="#374151">① 品詞問題は語尾で判断</text>
  <text x="627" y="218" text-anchor="middle" font-size="10" fill="#374151">② 前置詞はコロケーションで覚える</text>
  <text x="627" y="236" text-anchor="middle" font-size="10" fill="#374151">③ 時制は副詞句に着目</text>
  <text x="627" y="254" text-anchor="middle" font-size="10" fill="#374151">④ Part5は20分で解き切る</text>
  <line x1="534" y1="270" x2="720" y2="270" stroke="#BBF7D0" stroke-width="1"/>
  <text x="627" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#16A34A">おすすめトレーニング</text>
  <text x="627" y="312" text-anchor="middle" font-size="10" fill="#374151">頻出パターン30種を</text>
  <text x="627" y="328" text-anchor="middle" font-size="10" fill="#374151">反射的に選べるまで反復する</text>
  <rect x="534" y="348" width="186" height="36" rx="6" fill="#BBF7D0"/>
  <text x="627" y="371" text-anchor="middle" font-size="10" font-weight="700" fill="#14532D">ここで+30点が狙える</text>
</svg>
