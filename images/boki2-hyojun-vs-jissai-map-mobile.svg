<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1480" viewBox="0 0 360 1480" role="img" aria-labelledby="title desc">
  <title id="title">標準原価計算と実際原価計算、目的からわかる3つの違い（モバイル版）</title>
  <desc id="desc">標準原価計算はあらかじめ設定した目標原価をもとに原価管理・差異分析を行うのに対し、実際原価計算は実際に発生した原価をそのまま集計するという、算定タイミングと目的の違いを対比する図解</desc>
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#f4f9ff"/>
    </linearGradient>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .ptnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11px;font-weight:800;fill:#ffffff}
      .ptname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#1f2937}
      .ptbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="360" height="1480" rx="20" fill="url(#mbg)"/>

  <text x="180" y="28" text-anchor="middle" class="title">標準原価計算 vs 実際原価計算</text>
  <text x="180" y="46" text-anchor="middle" class="sub">目的からわかる3つの違い</text>

  <!-- 標準原価計算 -->
  <rect x="16" y="64" width="328" height="40" rx="12" fill="#8B5CF6"/>
  <text x="180" y="89" text-anchor="middle" class="colhead">標準原価計算（事前の目標原価）</text>

  <rect x="16" y="116" width="328" height="500" rx="16" fill="#ffffff" stroke="#c4b5fd" stroke-width="2.5"/>

  <circle cx="44" cy="150" r="15" fill="#8B5CF6"/>
  <text x="44" y="155" text-anchor="middle" class="ptnum">1</text>
  <text x="66" y="146" class="ptname">算定タイミング</text>
  <text x="66" y="164" class="ptbody">製造前に「本来これくらい」と設定</text>

  <line x1="30" y1="180" x2="330" y2="180" stroke="#ede9fe" stroke-width="2"/>

  <circle cx="44" cy="212" r="15" fill="#8B5CF6"/>
  <text x="44" y="217" text-anchor="middle" class="ptnum">2</text>
  <text x="66" y="208" class="ptname">目的</text>
  <text x="66" y="226" class="ptbody">原価管理——ムダの原因を分析</text>

  <line x1="30" y1="242" x2="330" y2="242" stroke="#ede9fe" stroke-width="2"/>

  <circle cx="44" cy="274" r="15" fill="#8B5CF6"/>
  <text x="44" y="279" text-anchor="middle" class="ptnum">3</text>
  <text x="66" y="270" class="ptname">差異分析</text>
  <text x="66" y="288" class="ptbody">価格差異・数量差異等に分解する</text>

  <line x1="30" y1="304" x2="330" y2="304" stroke="#ede9fe" stroke-width="2"/>

  <circle cx="44" cy="336" r="15" fill="#8B5CF6"/>
  <text x="44" y="341" text-anchor="middle" class="ptnum">4</text>
  <text x="66" y="332" class="ptname">記帳方法</text>
  <text x="66" y="350" class="ptbody">シングルプラン（標準原価で記帳）</text>

  <rect x="30" y="374" width="300" height="226" rx="12" fill="#f5f3ff"/>
  <text x="46" y="400" class="ptname" fill="#6d28d9">見分けるキーワード</text>
  <text x="46" y="422" class="ptbody">「標準原価」「原価差異」</text>
  <text x="46" y="440" class="ptbody">「有利差異」「不利差異」</text>
  <text x="46" y="470" class="ptname" fill="#6d28d9">問いかけ</text>
  <text x="46" y="494" class="ptbody">「本来いくらで作れるはず？」</text>
  <text x="46" y="512" class="ptbody">→ 目標との比較がテーマ</text>

  <!-- 実際原価計算 -->
  <rect x="16" y="646" width="328" height="40" rx="12" fill="#3B82F6"/>
  <text x="180" y="671" text-anchor="middle" class="colhead">実際原価計算（事後の実績原価）</text>

  <rect x="16" y="698" width="328" height="500" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="2.5"/>

  <circle cx="44" cy="732" r="15" fill="#3B82F6"/>
  <text x="44" y="737" text-anchor="middle" class="ptnum">1</text>
  <text x="66" y="728" class="ptname">算定タイミング</text>
  <text x="66" y="746" class="ptbody">原価が実際に発生した後に集計</text>

  <line x1="30" y1="762" x2="330" y2="762" stroke="#dbeafe" stroke-width="2"/>

  <circle cx="44" cy="794" r="15" fill="#3B82F6"/>
  <text x="44" y="799" text-anchor="middle" class="ptnum">2</text>
  <text x="66" y="790" class="ptname">目的</text>
  <text x="66" y="808" class="ptbody">実際の金額をそのまま製品原価に</text>

  <line x1="30" y1="824" x2="330" y2="824" stroke="#dbeafe" stroke-width="2"/>

  <circle cx="44" cy="856" r="15" fill="#3B82F6"/>
  <text x="44" y="861" text-anchor="middle" class="ptnum">3</text>
  <text x="66" y="852" class="ptname">差異分析</text>
  <text x="66" y="870" class="ptbody">「差異」という概念自体がない</text>

  <line x1="30" y1="886" x2="330" y2="886" stroke="#dbeafe" stroke-width="2"/>

  <circle cx="44" cy="918" r="15" fill="#3B82F6"/>
  <text x="44" y="923" text-anchor="middle" class="ptnum">4</text>
  <text x="66" y="914" class="ptname">記帳方法</text>
  <text x="66" y="932" class="ptbody">個別・総合原価計算で実際発生額を記録</text>

  <rect x="30" y="956" width="300" height="226" rx="12" fill="#eff6ff"/>
  <text x="46" y="982" class="ptname" fill="#1d4ed8">見分けるキーワード</text>
  <text x="46" y="1004" class="ptbody">「実際にかかった」「実際原価」</text>
  <text x="46" y="1022" class="ptbody">「個別原価計算」「総合原価計算」</text>
  <text x="46" y="1052" class="ptname" fill="#1d4ed8">問いかけ</text>
  <text x="46" y="1076" class="ptbody">「実際いくらかかったのか？」</text>
  <text x="46" y="1094" class="ptbody">→ 事実の集計がテーマ</text>

  <!-- Bottom banner -->
  <rect x="16" y="1250" width="328" height="200" rx="16" fill="#fffbeb" stroke="#fcd34d" stroke-width="2.5"/>
  <text x="180" y="1280" text-anchor="middle" class="banner">個別・総合原価計算は</text>
  <text x="180" y="1300" text-anchor="middle" class="banner">「実際原価計算」の仲間</text>
  <text x="180" y="1328" text-anchor="middle" class="bannersmall">先に習う個別・総合原価計算は</text>
  <text x="180" y="1346" text-anchor="middle" class="bannersmall">実際原価の集計方法。標準原価</text>
  <text x="180" y="1364" text-anchor="middle" class="bannersmall">計算は「目標と比べる」という</text>
  <text x="180" y="1382" text-anchor="middle" class="bannersmall">別の目的で追加される仕組み</text>
</svg>
