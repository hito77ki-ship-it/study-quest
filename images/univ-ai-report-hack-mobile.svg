<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1020" width="360" height="1020" role="img" aria-labelledby="title desc">
  <title id="title">手書きノート vs AI×ボイスメモ──どっちが最強？（モバイル版）</title>
  <desc id="desc">従来のアナログ方式（手書きノート）とAI×ボイスメモ方式、それぞれの4ステップの流れと結末を縦に並べて比較する図解</desc>
  <defs>
    <style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style>
  </defs>
  <rect width="360" height="1020" rx="14" fill="#F8FAFC"/>

  <text x="180" y="30" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">手書きノート vs AI×ボイスメモ</text>
  <text x="180" y="48" text-anchor="middle" font-size="9.5" fill="#64748B">「聞き逃し→絶望」を「録音→AI→一瞬解決」に変える</text>

  <!-- LEFT FLOW HEADER -->
  <rect x="20" y="66" width="320" height="26" rx="8" fill="#94A3B8"/>
  <text x="180" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">😰 従来のアナログ方式（ノート手書き）</text>

  <!-- Left Node 1 -->
  <rect x="20" y="100" width="320" height="76" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="20" y="100" width="320" height="24" rx="8" fill="#94A3B8"/>
  <text x="180" y="116" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">😰 STEP 1</text>
  <text x="180" y="142" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">手書きノートに必死になる</text>
  <text x="180" y="158" text-anchor="middle" font-size="10.5" fill="#64748B">黒板を見ながらひたすら写す</text>
  <text x="180" y="172" text-anchor="middle" font-size="10" fill="#94A3B8">→ 教授の話が頭に入らない...</text>

  <line x1="180" y1="176" x2="180" y2="192" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="180,196 174,186 186,186" fill="#CBD5E1"/>

  <!-- Left Node 2 -->
  <rect x="20" y="196" width="320" height="76" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="20" y="196" width="320" height="24" rx="8" fill="#94A3B8"/>
  <text x="180" y="212" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">😱 STEP 2</text>
  <text x="180" y="238" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">大事な部分を聞き逃す！</text>
  <text x="180" y="254" text-anchor="middle" font-size="10.5" fill="#64748B">「えっ今なんて言ったの？」</text>
  <text x="180" y="268" text-anchor="middle" font-size="10" fill="#94A3B8">→ ノートに穴が開く</text>

  <line x1="180" y1="272" x2="180" y2="288" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="180,292 174,282 186,282" fill="#CBD5E1"/>

  <!-- Left Node 3 -->
  <rect x="20" y="292" width="320" height="76" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="20" y="292" width="320" height="24" rx="8" fill="#94A3B8"/>
  <text x="180" y="308" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">😞 STEP 3</text>
  <text x="180" y="334" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">情報が不足・記憶もあいまい</text>
  <text x="180" y="350" text-anchor="middle" font-size="10.5" fill="#64748B">レジュメを見ても意味がわからない</text>
  <text x="180" y="364" text-anchor="middle" font-size="10" fill="#94A3B8">→ 何を書けばいいか不明</text>

  <line x1="180" y1="368" x2="180" y2="384" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="180,388 174,378 186,378" fill="#CBD5E1"/>

  <!-- Left Node 4 (bad result) -->
  <rect x="20" y="388" width="320" height="88" rx="8" fill="#FFF5F5" stroke="#FCA5A5" stroke-width="1.5"/>
  <rect x="20" y="388" width="320" height="24" rx="8" fill="#EF4444"/>
  <text x="180" y="404" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">😰 RESULT（残念...）</text>
  <text x="180" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">レポートに詰まる...</text>
  <text x="180" y="450" text-anchor="middle" font-size="10.5" fill="#374151">ギリギリまで悩んで微妙な出来</text>
  <text x="180" y="466" text-anchor="middle" font-size="10.5" fill="#DC2626">→ 単位がヤバいかも... 😢</text>

  <!-- RIGHT FLOW HEADER -->
  <rect x="20" y="508" width="320" height="26" rx="8" fill="#3B82F6"/>
  <text x="180" y="526" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">🚀 AI×ボイスメモ方式（最強ルート）</text>

  <!-- Right Node 1: 録音 -->
  <rect x="20" y="542" width="320" height="76" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="20" y="542" width="320" height="24" rx="8" fill="#3B82F6"/>
  <text x="180" y="558" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">🎤 STEP 1</text>
  <text x="180" y="584" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E3A8A">スマホのボイスメモをON！</text>
  <text x="180" y="600" text-anchor="middle" font-size="10.5" fill="#374151">録音ボタンを押すだけでOK</text>
  <text x="180" y="614" text-anchor="middle" font-size="10" fill="#3B82F6">→ 授業を丸ごと記録できる</text>

  <line x1="180" y1="618" x2="180" y2="634" stroke="#34D399" stroke-width="2"/>
  <polygon points="180,638 174,628 186,628" fill="#34D399"/>

  <!-- Right Node 2: 文字起こし -->
  <rect x="20" y="638" width="320" height="76" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="20" y="638" width="320" height="24" rx="8" fill="#7C3AED"/>
  <text x="180" y="654" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">📝 STEP 2</text>
  <text x="180" y="680" text-anchor="middle" font-size="11.5" font-weight="700" fill="#3B1D8A">Nottaで自動文字起こし</text>
  <text x="180" y="696" text-anchor="middle" font-size="10" fill="#374151">（もじおこし：音声→テキスト変換）</text>
  <text x="180" y="710" text-anchor="middle" font-size="10" fill="#7C3AED">→ 90分分が数分で完成</text>

  <line x1="180" y1="714" x2="180" y2="730" stroke="#34D399" stroke-width="2"/>
  <polygon points="180,734 174,724 186,724" fill="#34D399"/>

  <!-- Right Node 3: AI処理 -->
  <rect x="20" y="734" width="320" height="76" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <rect x="20" y="734" width="320" height="24" rx="8" fill="#F59E0B"/>
  <text x="180" y="750" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">🤖 STEP 3</text>
  <text x="180" y="776" text-anchor="middle" font-size="11.5" font-weight="700" fill="#78350F">AIにプロンプトを投入！</text>
  <text x="180" y="792" text-anchor="middle" font-size="10" fill="#374151">（ぷろんぷと：AIへの指示文）</text>
  <text x="180" y="806" text-anchor="middle" font-size="10" fill="#F59E0B">→ 一瞬でレポート骨格が完成</text>

  <line x1="180" y1="810" x2="180" y2="826" stroke="#34D399" stroke-width="2"/>
  <polygon points="180,830 174,820 186,820" fill="#34D399"/>

  <!-- Right Node 4 (GOAL) -->
  <rect x="20" y="830" width="320" height="88" rx="8" fill="#F0FDF4" stroke="#34D399" stroke-width="2"/>
  <rect x="20" y="830" width="320" height="24" rx="8" fill="#10B981"/>
  <text x="180" y="846" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFFFFF">🎉 RESULT（最強！）</text>
  <text x="180" y="874" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">爆速レポート完成！</text>
  <text x="180" y="892" text-anchor="middle" font-size="10.5" fill="#374151">教授が感動する完璧な内容に</text>
  <text x="180" y="908" text-anchor="middle" font-size="10.5" fill="#10B981">→ 単位ゲット＆時間も余る！✨</text>

  <!-- Summary bar -->
  <rect x="20" y="944" width="320" height="56" rx="10" fill="#0F172A"/>
  <text x="180" y="966" text-anchor="middle" font-size="10.5" fill="#E2E8F0" font-weight="500">「ボイスメモON → 文字起こし →</text>
  <text x="180" y="984" text-anchor="middle" font-size="10.5" fill="#E2E8F0" font-weight="500">AIに投げる」でノートは不要になる</text>
</svg>
