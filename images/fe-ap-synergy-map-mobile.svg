<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" width="360" height="780" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">基本情報 × 応用情報 比較と「午前共通」相乗効果マップ（モバイル版）</title>
  <desc id="svgdesc">基本情報技術者と応用情報技術者の試験形式・合格率・勉強時間の比較と、午前試験が共通範囲であることによる相乗効果を縦に並べた図解</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="780" rx="16" fill="#FAFAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">基本情報 × 応用情報 比較と</text>
  <text x="180" y="46" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">「午前共通」相乗効果マップ</text>

  <!-- FE card -->
  <rect x="16" y="64" width="328" height="242" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="64" width="328" height="38" rx="12" fill="#4ADE80"/>
  <text x="180" y="88" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">基本情報技術者（FE）— レベル2</text>
  <text x="32" y="124" font-size="11" fill="#166534">🗓 試験形式：CBT方式（通年いつでも受験）</text>
  <text x="32" y="148" font-size="11" fill="#166534">📊 合格率：約40〜50%</text>
  <text x="32" y="172" font-size="11" fill="#166534">⏱ 必要勉強時間：150〜200時間</text>
  <text x="32" y="196" font-size="11" fill="#166534">✍ 午後試験：アルゴリズム＋プログラミング必須</text>
  <text x="32" y="222" font-size="10" fill="#4D7C59">向いている人：</text>
  <text x="32" y="240" font-size="10" fill="#4D7C59">IT未経験・学生・まず基礎固めしたい人</text>
  <text x="32" y="258" font-size="10" fill="#4D7C59">通年受験なので「準備できたら即受験」できる</text>

  <path d="M180,318 L180,342 M170,332 L180,342 L190,332" fill="none" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AP card -->
  <rect x="16" y="356" width="328" height="242" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="356" width="328" height="38" rx="12" fill="#60A5FA"/>
  <text x="180" y="380" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">応用情報技術者（AP）— レベル3</text>
  <text x="32" y="416" font-size="11" fill="#1E40AF">🗓 試験形式：年2回（4月・10月）記述式</text>
  <text x="32" y="440" font-size="11" fill="#1E40AF">📊 合格率：約20〜25%</text>
  <text x="32" y="464" font-size="11" fill="#1E40AF">⏱ 必要勉強時間：300〜500時間</text>
  <text x="32" y="488" font-size="11" fill="#1E40AF">✍ 午後試験：論述式（11題中5題を選択）</text>
  <text x="32" y="514" font-size="10" fill="#3B5B8C">向いている人：</text>
  <text x="32" y="532" font-size="10" fill="#3B5B8C">中堅エンジニア・転職/昇格を狙う人</text>
  <text x="32" y="550" font-size="10" fill="#3B5B8C">プログラミング不要の「経営戦略」等も選択可</text>

  <!-- Synergy banner -->
  <rect x="16" y="612" width="328" height="132" rx="14" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="638" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">🔗 午前試験は共通範囲！</text>
  <text x="180" y="656" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">これが最大の相乗効果</text>
  <text x="180" y="678" text-anchor="middle" font-size="10" fill="#78350F">FEの午前（科目A）対策はそのままAPの午前対策に直結する。</text>
  <text x="180" y="696" text-anchor="middle" font-size="10" fill="#78350F">先にFEを取れば、AP受験時は「午後の論述対策」だけに</text>
  <text x="180" y="714" text-anchor="middle" font-size="10" fill="#78350F">集中でき、学習効率が大きく上がる。</text>
</svg>
