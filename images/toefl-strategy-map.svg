<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" width="780" height="580">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="780" height="580" rx="16" fill="#FEFCF9"/>
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">TOEFL iBT 4技能バランス &amp; 足切り回避マップ</text>
  <text x="390" y="46" text-anchor="middle" font-size="11" fill="#94A3B8">TOEICとの配点構造の違いと、出願を阻む「足切り防衛線」を可視化</text>

  <!-- LEFT: TOEIC panel -->
  <rect x="30" y="64" width="290" height="440" rx="14" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="175" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">TOEIC L&amp;R（合計990点）</text>
  <text x="175" y="108" text-anchor="middle" font-size="10" fill="#94A3B8">Reading・Listeningの2技能のみで構成</text>

  <rect x="55" y="125" width="240" height="50" rx="8" fill="#BEE3F8" stroke="#63B3ED" stroke-width="2"/>
  <text x="175" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#2C5282">Listening（495点）</text>

  <rect x="55" y="185" width="240" height="50" rx="8" fill="#B2F5EA" stroke="#319795" stroke-width="2"/>
  <text x="175" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#234E52">Reading（495点）</text>

  <rect x="55" y="245" width="240" height="50" rx="8" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="175" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#718096">Speaking（試験科目なし）</text>

  <rect x="55" y="305" width="240" height="50" rx="8" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="175" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#718096">Writing（試験科目なし）</text>

  <text x="175" y="385" text-anchor="middle" font-size="10.5" fill="#4A5568">この2技能をどれだけ極めても、</text>
  <text x="175" y="402" text-anchor="middle" font-size="10.5" fill="#4A5568">TOEFLの合否には直結しない</text>

  <!-- VS badge -->
  <circle cx="325" cy="284" r="20" fill="#fff" stroke="#CBD5E1" stroke-width="2"/>
  <text x="325" y="289" text-anchor="middle" font-size="13" font-weight="700" fill="#718096">VS</text>

  <!-- RIGHT: TOEFL panel -->
  <rect x="340" y="64" width="410" height="440" rx="14" fill="#FFFDF7" stroke="#E2E8F0" stroke-width="2"/>
  <text x="545" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">TOEFL iBT（合計120点／4技能均等）</text>
  <text x="545" y="108" text-anchor="middle" font-size="10" fill="#94A3B8">Reading・Listening・Speaking・Writingが横並びで勝負</text>

  <!-- zone bands -->
  <rect x="355" y="140" width="346" height="107" fill="#C6F6D5" opacity="0.6"/>
  <rect x="355" y="247" width="346" height="213" fill="#FED7D7" opacity="0.45"/>

  <!-- axis ticks -->
  <text x="350" y="144" text-anchor="end" font-size="9.5" fill="#94A3B8">30</text>
  <text x="350" y="357" text-anchor="end" font-size="9.5" fill="#94A3B8">10</text>
  <text x="350" y="464" text-anchor="end" font-size="9.5" fill="#94A3B8">0</text>

  <!-- limit line -->
  <line x1="355" y1="247" x2="701" y2="247" stroke="#E53E3E" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="350" y="251" text-anchor="end" font-size="10.5" font-weight="700" fill="#E53E3E">20点</text>

  <!-- tracks -->
  <rect x="365" y="140" width="56" height="320" rx="6" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="455" y="140" width="56" height="320" rx="6" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="545" y="140" width="56" height="320" rx="6" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="635" y="140" width="56" height="320" rx="6" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- bars -->
  <rect x="365" y="183" width="56" height="277" rx="6" fill="#90CDF4" stroke="#3182CE" stroke-width="2"/>
  <rect x="455" y="193" width="56" height="267" rx="6" fill="#9AE6B4" stroke="#38A169" stroke-width="2"/>
  <rect x="545" y="268" width="56" height="192" rx="6" fill="#FEB2B2" stroke="#E53E3E" stroke-width="2"/>
  <rect x="635" y="225" width="56" height="235" rx="6" fill="#D6BCFA" stroke="#805AD5" stroke-width="2"/>

  <!-- status icons -->
  <text x="393" y="158" text-anchor="middle" font-size="15">✅</text>
  <text x="483" y="158" text-anchor="middle" font-size="15">✅</text>
  <text x="573" y="158" text-anchor="middle" font-size="15">❌</text>
  <text x="663" y="158" text-anchor="middle" font-size="15">✅</text>

  <!-- score labels above bars -->
  <text x="393" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#2C5282">26</text>
  <text x="483" y="185" text-anchor="middle" font-size="11" font-weight="700" fill="#276749">25</text>
  <text x="573" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#C53030">18</text>
  <text x="663" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#553C9A">22</text>

  <!-- skill labels below baseline -->
  <text x="393" y="478" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E293B">Reading</text>
  <text x="393" y="494" text-anchor="middle" font-size="9.5" fill="#2C5282">26/30点</text>

  <text x="483" y="478" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E293B">Listening</text>
  <text x="483" y="494" text-anchor="middle" font-size="9.5" fill="#276749">25/30点</text>

  <text x="573" y="478" text-anchor="middle" font-size="11.5" font-weight="700" fill="#C53030">Speaking</text>
  <text x="573" y="494" text-anchor="middle" font-size="9.5" font-weight="700" fill="#C53030">18/30点 ⚠</text>

  <text x="663" y="478" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E293B">Writing</text>
  <text x="663" y="494" text-anchor="middle" font-size="9.5" fill="#553C9A">22/30点</text>

  <!-- caption -->
  <rect x="30" y="520" width="720" height="42" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="390" y="538" text-anchor="middle" font-size="10.5" fill="#78350F">Speakingが1科目でも防衛線（目安20点）を割ると、他が高得点でも出願NGになるケースがある</text>
  <text x="390" y="554" text-anchor="middle" font-size="10.5" fill="#78350F">──だからこそ4技能を均等に鍛えるのが最速の合格ルート</text>
</svg>
