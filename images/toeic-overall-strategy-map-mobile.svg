<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1760" viewBox="0 0 360 1760" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">TOEIC L&amp;R 試験全体像とスコア帯別合格戦略マップ（モバイル版）</title>
  <desc id="svgdesc">Listening・Readingの配点ウェイト、500〜990点のスコア帯別用途とCEFR防衛線、目標スコア別に優先すべきパートを縦に並べて示す戦略マップ</desc>
  <defs>
    <style>.tt{font-family:"Noto Sans JP",system-ui,sans-serif}.tr{font-family:"Noto Sans JP",system-ui,sans-serif;font-size:10px;fill:#64748b}</style>
  </defs>

  <rect width="360" height="1760" rx="16" fill="#F0F9FF"/>

  <rect x="20" y="20" width="320" height="60" rx="12" fill="#1E293B"/>
  <text x="180" y="42" text-anchor="middle" class="tt" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1">大谷流・TOEIC L&amp;R 攻略ナビ</text>
  <text x="180" y="64" text-anchor="middle" class="tt" font-size="13" font-weight="800" fill="#FFFFFF">試験全体像とスコア帯別戦略</text>

  <text x="180" y="106" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#334155">Listening vs Readingの配点ウェイト</text>

  <rect x="20" y="120" width="320" height="180" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="36" y="148" class="tt" font-size="12.5" font-weight="800" fill="#1E3A8A">Listening（約45分）</text>
  <text x="36" y="166" class="tr">Part1写真6問／Part2応答25問／</text>
  <text x="36" y="180" class="tr">Part3会話39問／Part4説明30問＝100問</text>
  <rect x="36" y="190" width="288" height="28" rx="14" fill="#3B82F6"/>
  <text x="180" y="209" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#fff">Listening：100問</text>

  <text x="36" y="240" class="tt" font-size="12.5" font-weight="800" fill="#92400E">Reading（約75分）</text>
  <text x="36" y="258" class="tr">Part5文法30問／Part6長文16問／</text>
  <text x="36" y="272" class="tr">Part7読解54問＝100問</text>
  <rect x="36" y="282" width="288" height="28" rx="14" fill="#F59E0B"/>
  <text x="180" y="301" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#fff">Reading：100問</text>

  <text x="180" y="326" text-anchor="middle" class="tt" font-size="10.5" font-weight="700" fill="#16A34A">合計200問・2時間ノンストップ。</text>
  <text x="180" y="342" text-anchor="middle" class="tt" font-size="10.5" font-weight="700" fill="#16A34A">目標スコアに必要なハコだけ拾う「割り切りゲーム」。</text>

  <text x="180" y="384" text-anchor="middle" class="tt" font-size="12.5" font-weight="700" fill="#334155">スコア帯別の使い道とCEFR防衛線</text>

  <!-- Score checkpoints as stacked list -->
  <rect x="20" y="400" width="320" height="56" rx="10" fill="#FCA5A5"/>
  <text x="36" y="424" class="tt" font-size="12" font-weight="800" fill="#7F1D1D">10点〜600点：基礎固め期</text>
  <text x="36" y="444" class="tt" font-size="10" fill="#7F1D1D">文法・単語のハコを最優先／CEFR B1</text>

  <rect x="20" y="464" width="320" height="56" rx="10" fill="#FDE68A"/>
  <text x="36" y="488" class="tt" font-size="12" font-weight="800" fill="#92400E">600点〜800点：新卒・就活評価ライン</text>
  <text x="36" y="508" class="tt" font-size="10" fill="#92400E">一般企業の採用評価基準／730点で目安</text>

  <rect x="20" y="528" width="320" height="56" rx="10" fill="#BEF264"/>
  <text x="36" y="552" class="tt" font-size="12" font-weight="800" fill="#166534">800点〜900点：外資・グローバルライン</text>
  <text x="36" y="572" class="tt" font-size="10" fill="#166534">総合職・海外部門で有利／CEFR B2・860点</text>

  <rect x="20" y="592" width="320" height="56" rx="10" fill="#4ADE80"/>
  <text x="36" y="616" class="tt" font-size="12" font-weight="800" fill="#14532D">900点〜990点：上級ビジネスライン</text>
  <text x="36" y="636" class="tt" font-size="10" fill="#14532D">速度と語彙の強化が鍵／CEFR C1</text>

  <text x="180" y="674" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#334155">CEFR基準の防衛線を意識し、目標スコア</text>
  <text x="180" y="692" text-anchor="middle" class="tt" font-size="11" font-weight="700" fill="#334155">以上を守り切ることだけを考える</text>

  <text x="180" y="734" text-anchor="middle" class="tt" font-size="12.5" font-weight="700" fill="#334155">目標スコア別・最優先で味方にすべきハコ</text>

  <!-- Card 1 -->
  <rect x="20" y="750" width="320" height="270" rx="16" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="750" width="320" height="40" rx="16" fill="#3B82F6"/>
  <rect x="20" y="770" width="320" height="20" fill="#3B82F6"/>
  <text x="180" y="776" text-anchor="middle" class="tt" font-size="13" font-weight="800" fill="#fff">〜600点：基礎固め</text>
  <rect x="36" y="800" width="288" height="200" rx="10" fill="rgba(59,130,246,.08)" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="826" text-anchor="middle" class="tt" font-size="11.5" fill="#1E3A8A">最優先ハコ：文法・単語</text>
  <text x="180" y="848" text-anchor="middle" class="tt" font-size="11.5" fill="#1E3A8A">Part5と頻出800語を固めて</text>
  <text x="180" y="870" text-anchor="middle" class="tt" font-size="11.5" fill="#1E3A8A">確実に拾える問題を増やす。</text>
  <text x="180" y="894" text-anchor="middle" class="tt" font-size="11.5" fill="#1E3A8A">難しいPart7後半は</text>
  <text x="180" y="916" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#1D4ED8">気にせずマークを塗る</text>
  <text x="180" y="944" text-anchor="middle" class="tt" font-size="10.5" fill="#1E3A8A">満点思考は今すぐ手放してOK</text>

  <!-- Card 2 -->
  <rect x="20" y="1040" width="320" height="270" rx="16" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2"/>
  <rect x="20" y="1040" width="320" height="40" rx="16" fill="#F59E0B"/>
  <rect x="20" y="1060" width="320" height="20" fill="#F59E0B"/>
  <text x="180" y="1066" text-anchor="middle" class="tt" font-size="13" font-weight="800" fill="#fff">600〜800点：パート戦略</text>
  <rect x="36" y="1090" width="288" height="200" rx="10" fill="rgba(245,158,11,.08)" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="180" y="1116" text-anchor="middle" class="tt" font-size="11.5" fill="#92400E">最優先ハコ：Part5即答＋</text>
  <text x="180" y="1138" text-anchor="middle" class="tt" font-size="11.5" fill="#92400E">リスニング精度。設問先読み</text>
  <text x="180" y="1160" text-anchor="middle" class="tt" font-size="11.5" fill="#92400E">とシャドーイングで得点源を</text>
  <text x="180" y="1182" text-anchor="middle" class="tt" font-size="11.5" fill="#92400E">安定させる。時間切れになる</text>
  <text x="180" y="1206" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#B45309">Part7後半は割り切って進む</text>
  <text x="180" y="1234" text-anchor="middle" class="tt" font-size="10.5" fill="#92400E">解ける問題を全部拾う意識</text>

  <!-- Card 3 -->
  <rect x="20" y="1330" width="320" height="270" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="20" y="1330" width="320" height="40" rx="16" fill="#22C55E"/>
  <rect x="20" y="1350" width="320" height="20" fill="#22C55E"/>
  <text x="180" y="1356" text-anchor="middle" class="tt" font-size="13" font-weight="800" fill="#fff">800点〜：速度と語彙</text>
  <rect x="36" y="1380" width="288" height="200" rx="10" fill="rgba(34,197,94,.08)" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="180" y="1406" text-anchor="middle" class="tt" font-size="11.5" fill="#14532D">最優先ハコ：読解速度</text>
  <text x="180" y="1428" text-anchor="middle" class="tt" font-size="11.5" fill="#14532D">（1分150語以上）とビジネス</text>
  <text x="180" y="1450" text-anchor="middle" class="tt" font-size="11.5" fill="#14532D">語彙・言い換え表現。</text>
  <text x="180" y="1474" text-anchor="middle" class="tt" font-size="11.5" fill="#14532D">「読めるが時間が足りない」</text>
  <text x="180" y="1498" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#15803D">壁を速度強化で突破する</text>
  <text x="180" y="1524" text-anchor="middle" class="tt" font-size="10.5" fill="#14532D">毎日英文を読む習慣が必須</text>

  <!-- Footer note -->
  <text x="180" y="1656" text-anchor="middle" class="tt" font-size="11" fill="#374151">満点思考を手放し、自分の目標スコアの</text>
  <text x="180" y="1674" text-anchor="middle" class="tt" font-size="11" fill="#374151">防衛線だけを守り切る。</text>
  <text x="180" y="1700" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#16A34A">それが、かけた時間を最速でスコアに変える</text>
  <text x="180" y="1718" text-anchor="middle" class="tt" font-size="11.5" font-weight="700" fill="#16A34A">大谷流の割り切り戦略です。</text>
</svg>
