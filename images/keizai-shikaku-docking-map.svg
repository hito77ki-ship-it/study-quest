<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" width="760" height="470">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="470" rx="12" fill="#FAFAFC"/>
  <text x="380" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">経済・経営学部生のための業界×資格ドッキングマップ</text>

  <!-- Hub: 基礎装備 -->
  <rect x="280" y="52" width="200" height="66" rx="14" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="380" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">🛡 全員共通の基礎装備</text>
  <text x="380" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">日商簿記2級（数字を読む力）</text>
  <text x="380" y="112" text-anchor="middle" font-size="9.5" fill="#4D7C59">↓ ここから志望業界別に武器を追加</text>

  <!-- Connector lines -->
  <line x1="330" y1="118" x2="112" y2="150" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="360" y1="118" x2="287" y2="150" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="400" y1="118" x2="462" y2="150" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="430" y1="118" x2="642" y2="150" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Box1: 経理・財務 -->
  <rect x="30" y="150" width="165" height="190" rx="12" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <rect x="30" y="150" width="165" height="32" rx="12" fill="#F472B6"/>
  <rect x="30" y="170" width="165" height="12" fill="#F472B6"/>
  <text x="112" y="171" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">経理・財務・会計</text>
  <text x="112" y="200" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9D174D">🗡 武器（必須）</text>
  <text x="112" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">日商簿記2級</text>
  <text x="112" y="234" text-anchor="middle" font-size="9.5" fill="#374151">財務諸表を読む力が</text>
  <text x="112" y="248" text-anchor="middle" font-size="9.5" fill="#374151">そのまま評価される</text>
  <text x="112" y="270" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9D174D">⬆ 発展装備</text>
  <text x="112" y="287" text-anchor="middle" font-size="10.5" fill="#374151">簿記1級・税理士科目</text>
  <text x="112" y="304" text-anchor="middle" font-size="9" fill="#9D174D">会計士・税理士も視野に</text>

  <!-- Box2: 金融 -->
  <rect x="205" y="150" width="165" height="190" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="205" y="150" width="165" height="32" rx="12" fill="#3B82F6"/>
  <rect x="205" y="170" width="165" height="12" fill="#3B82F6"/>
  <text x="287" y="171" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">銀行・証券・保険</text>
  <text x="287" y="200" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E40AF">🗡 武器（必須）</text>
  <text x="287" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">FP2級（3級から）</text>
  <text x="287" y="234" text-anchor="middle" font-size="9.5" fill="#374151">税金・年金・資産運用の</text>
  <text x="287" y="248" text-anchor="middle" font-size="9.5" fill="#374151">全体像が武器になる</text>
  <text x="287" y="270" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E40AF">⬆ 発展装備</text>
  <text x="287" y="287" text-anchor="middle" font-size="10.5" fill="#374151">証券外務員</text>
  <text x="287" y="304" text-anchor="middle" font-size="9" fill="#1E40AF">簿記2級と併せ持つと最強</text>

  <!-- Box3: 不動産 -->
  <rect x="380" y="150" width="165" height="190" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <rect x="380" y="150" width="165" height="32" rx="12" fill="#EAB308"/>
  <rect x="380" y="170" width="165" height="12" fill="#EAB308"/>
  <text x="462" y="171" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">不動産・デベロッパー</text>
  <text x="462" y="200" text-anchor="middle" font-size="9.5" font-weight="700" fill="#92400E">🗡 武器（必須）</text>
  <text x="462" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">宅地建物取引士</text>
  <text x="462" y="234" text-anchor="middle" font-size="9.5" fill="#374151">従業員5人に1人以上の</text>
  <text x="462" y="248" text-anchor="middle" font-size="9.5" fill="#374151">設置義務がある国家資格</text>
  <text x="462" y="270" text-anchor="middle" font-size="9.5" font-weight="700" fill="#92400E">⬆ 発展装備</text>
  <text x="462" y="287" text-anchor="middle" font-size="10.5" fill="#374151">賃貸不動産経営管理士</text>
  <text x="462" y="304" text-anchor="middle" font-size="9" fill="#92400E">即戦力として採用で有利</text>

  <!-- Box4: IT -->
  <rect x="555" y="150" width="175" height="190" rx="12" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="555" y="150" width="175" height="32" rx="12" fill="#8B5CF6"/>
  <rect x="555" y="170" width="175" height="12" fill="#8B5CF6"/>
  <text x="642" y="171" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">IT・DX推進</text>
  <text x="642" y="200" text-anchor="middle" font-size="9.5" font-weight="700" fill="#5B21B6">🗡 武器（入門）</text>
  <text x="642" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">ITパスポート</text>
  <text x="642" y="234" text-anchor="middle" font-size="9.5" fill="#374151">文系でもDX人材として</text>
  <text x="642" y="248" text-anchor="middle" font-size="9.5" fill="#374151">差別化できる基礎資格</text>
  <text x="642" y="270" text-anchor="middle" font-size="9.5" font-weight="700" fill="#5B21B6">⬆ 発展装備</text>
  <text x="642" y="287" text-anchor="middle" font-size="10.5" fill="#374151">基本情報技術者</text>
  <text x="642" y="304" text-anchor="middle" font-size="9" fill="#5B21B6">IT・コンサル就職で高評価</text>

  <!-- Bottom note -->
  <rect x="30" y="365" width="700" height="80" rx="10" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
  <text x="380" y="392" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0369A1">💡 攻略の順番</text>
  <text x="380" y="412" text-anchor="middle" font-size="10.5" fill="#374151">① まず全員が「基礎装備＝簿記2級」を1〜2年生のうちに取得</text>
  <text x="380" y="430" text-anchor="middle" font-size="10.5" fill="#374151">② 3年生で志望業界が固まったら、そのハコに対応する専門武器を追加していく</text>
</svg>
