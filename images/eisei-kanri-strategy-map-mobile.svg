<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1800" viewBox="0 0 360 1800" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">衛生管理者試験の足切り回避と過去問循環マップ（モバイル版）</title>
  <desc id="svgdesc">各科目40%の足切りラインを死守しながら、過去問プールから60%の得点を回収する合格戦略を縦に並べた図解</desc>
  <defs>
    <linearGradient id="meTitle" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1E293B"/><stop offset="1" stop-color="#334155"/></linearGradient>
    <linearGradient id="meBar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#86EFAC"/><stop offset="1" stop-color="#22C55E"/></linearGradient>
    <linearGradient id="meBoxHead" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#C4B5FD"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient>
    <linearGradient id="meGoal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4ADE80"/><stop offset="1" stop-color="#16A34A"/></linearGradient>
    <style>.mett{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="360" height="1800" rx="16" fill="#f4fbff"/>

  <rect x="16" y="20" width="328" height="76" rx="12" fill="url(#meTitle)"/>
  <text x="180" y="42" text-anchor="middle" class="mett" font-size="9.5" font-weight="700" fill="#94A3B8" letter-spacing="1">40%の防衛線 × 過去問プール循環</text>
  <text x="180" y="62" text-anchor="middle" class="mett" font-size="13" font-weight="800" fill="#FFFFFF">衛生管理者 合格戦略マップ</text>
  <text x="180" y="86" text-anchor="middle" class="mett" font-size="9.5" fill="#94A3B8">各科目40%以上かつ総合60%以上。割り切りゲームです</text>

  <!-- PANEL A -->
  <rect x="16" y="112" width="328" height="560" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="32" y="140" class="mett" font-size="12.5" font-weight="800" fill="#166534">PHASE 1　科目別「40%の防衛ライン」</text>
  <text x="32" y="156" class="mett" font-size="9.5" fill="#64748B">1科目でも40%を下回ると即不合格。全科目のフロアを固める。</text>

  <line x1="32" y1="176" x2="328" y2="176" stroke="#DC2626" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="180" y="172" text-anchor="middle" class="mett" font-size="10" font-weight="800" fill="#DC2626">40%死守ライン</text>

  <!-- 労働衛生 62% -->
  <text x="32" y="202" class="mett" font-size="10.5" font-weight="700" fill="#374151">労働衛生（17問）</text>
  <rect x="32" y="210" width="296" height="24" rx="6" fill="#F1F5F9"/>
  <rect x="32" y="210" width="184" height="24" rx="6" fill="url(#meBar)"/>
  <text x="220" y="227" class="mett" font-size="10.5" font-weight="800" fill="#166534">62%</text>

  <!-- 関係法令(有害業務) 55% -->
  <text x="32" y="256" class="mett" font-size="10.5" font-weight="700" fill="#374151">関係法令（有害業務・10問）</text>
  <rect x="32" y="264" width="296" height="24" rx="6" fill="#F1F5F9"/>
  <rect x="32" y="264" width="163" height="24" rx="6" fill="url(#meBar)"/>
  <text x="199" y="281" class="mett" font-size="10.5" font-weight="800" fill="#166534">55%</text>

  <!-- 労働生理 68% -->
  <text x="32" y="310" class="mett" font-size="10.5" font-weight="700" fill="#374151">労働生理（10問）</text>
  <rect x="32" y="318" width="296" height="24" rx="6" fill="#F1F5F9"/>
  <rect x="32" y="318" width="201" height="24" rx="6" fill="url(#meBar)"/>
  <text x="237" y="335" class="mett" font-size="10.5" font-weight="800" fill="#166534">68%</text>

  <!-- 関係法令(その他) 50% -->
  <text x="32" y="364" class="mett" font-size="10.5" font-weight="700" fill="#374151">関係法令（その他・7問）</text>
  <rect x="32" y="372" width="296" height="24" rx="6" fill="#F1F5F9"/>
  <rect x="32" y="372" width="148" height="24" rx="6" fill="url(#meBar)"/>
  <text x="184" y="389" class="mett" font-size="10.5" font-weight="800" fill="#166534">50%</text>

  <!-- 労働衛生(その他) 58% -->
  <text x="32" y="418" class="mett" font-size="10.5" font-weight="700" fill="#374151">労働衛生（その他・6問）</text>
  <rect x="32" y="426" width="296" height="24" rx="6" fill="#F1F5F9"/>
  <rect x="32" y="426" width="172" height="24" rx="6" fill="url(#meBar)"/>
  <text x="208" y="443" class="mett" font-size="10.5" font-weight="800" fill="#166534">58%</text>

  <rect x="32" y="466" width="296" height="46" rx="8" fill="#FEE2E2" opacity="0.85"/>
  <text x="180" y="486" text-anchor="middle" class="mett" font-size="9.5" font-weight="700" fill="#B91C1C">ここを割ると科目の得点に</text>
  <text x="180" y="502" text-anchor="middle" class="mett" font-size="9.5" font-weight="700" fill="#B91C1C">関わらず即不合格</text>

  <!-- PANEL B -->
  <rect x="16" y="694" width="328" height="1000" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="32" y="722" class="mett" font-size="12.5" font-weight="800" fill="#5B21B6">PHASE 2　過去問プールを循環させる</text>
  <text x="32" y="738" class="mett" font-size="9.5" fill="#64748B">過去問の使い回しが多い。同じサイクルで得点源が積み上がる。</text>

  <rect x="32" y="756" width="296" height="150" rx="12" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="32" y="756" width="296" height="32" rx="12" fill="url(#meBoxHead)"/>
  <text x="180" y="777" text-anchor="middle" class="mett" font-size="11.5" font-weight="800" fill="#fff">① 過去問を解く</text>
  <text x="180" y="812" text-anchor="middle" class="mett" font-size="11" font-weight="700" fill="#4C1D95">直近5年分を通しで演習</text>
  <text x="180" y="834" text-anchor="middle" class="mett" font-size="10" fill="#5B21B6">まずは解けなくてもOK</text>
  <text x="180" y="852" text-anchor="middle" class="mett" font-size="10" fill="#5B21B6">出題形式に慣れることが目的</text>

  <path d="M180,906 L180,930 M170,920 L180,930 L190,920" fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="32" y="942" width="296" height="150" rx="12" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="32" y="942" width="296" height="32" rx="12" fill="url(#meBoxHead)"/>
  <text x="180" y="963" text-anchor="middle" class="mett" font-size="11.5" font-weight="800" fill="#fff">② 出題パターンを掴む</text>
  <text x="180" y="998" text-anchor="middle" class="mett" font-size="11" font-weight="700" fill="#4C1D95">数値・語句の言い換えに注目</text>
  <text x="180" y="1020" text-anchor="middle" class="mett" font-size="10" fill="#5B21B6">同じ論点が形を変えて</text>
  <text x="180" y="1038" text-anchor="middle" class="mett" font-size="10" fill="#5B21B6">繰り返し出題されると気づく</text>

  <path d="M180,1092 L180,1116 M170,1106 L180,1116 L190,1106" fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="32" y="1128" width="296" height="150" rx="12" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="32" y="1128" width="296" height="32" rx="12" fill="url(#meBoxHead)"/>
  <text x="180" y="1149" text-anchor="middle" class="mett" font-size="11.5" font-weight="800" fill="#fff">③ 頻出論点だけ暗記</text>
  <text x="180" y="1184" text-anchor="middle" class="mett" font-size="11" font-weight="700" fill="#4C1D95">100点を狙わず「捨てる」勇気</text>
  <text x="180" y="1206" text-anchor="middle" class="mett" font-size="10" fill="#5B21B6">TLV値・規制数値など</text>
  <text x="180" y="1224" text-anchor="middle" class="mett" font-size="10" fill="#5B21B6">頻出の暗記事項に絞る</text>

  <path d="M180,1278 L180,1302 M170,1292 L180,1302 L190,1292" fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="32" y="1314" width="296" height="150" rx="12" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="32" y="1314" width="296" height="32" rx="12" fill="url(#meBoxHead)"/>
  <text x="180" y="1335" text-anchor="middle" class="mett" font-size="11.5" font-weight="800" fill="#fff">④ 弱点科目を反復</text>
  <text x="180" y="1370" text-anchor="middle" class="mett" font-size="11" font-weight="700" fill="#4C1D95">40%割れ科目を最優先で復習</text>
  <text x="180" y="1392" text-anchor="middle" class="mett" font-size="10" fill="#5B21B6">防衛ラインが甘い科目から</text>
  <text x="180" y="1410" text-anchor="middle" class="mett" font-size="10" fill="#5B21B6">①に戻って繰り返す</text>

  <rect x="32" y="1476" width="296" height="46" rx="10" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="180" y="1496" text-anchor="middle" class="mett" font-size="10" font-weight="700" fill="#C2410C">同じパターンがまた出る</text>
  <text x="180" y="1512" text-anchor="middle" class="mett" font-size="10" font-weight="700" fill="#C2410C">→ ①に戻って得点源を積み増す</text>

  <!-- Goal -->
  <rect x="60" y="1546" width="240" height="100" rx="16" fill="url(#meGoal)"/>
  <circle cx="130" cy="1580" r="6" fill="#16A34A" stroke="#DCFCE7" stroke-width="2"/>
  <circle cx="160" cy="1580" r="6" fill="#16A34A" stroke="#DCFCE7" stroke-width="2"/>
  <text x="180" y="1608" text-anchor="middle" class="mett" font-size="18" font-weight="800" fill="#fff">合格</text>
  <text x="180" y="1630" text-anchor="middle" class="mett" font-size="10.5" fill="#DCFCE7">各科目40%クリア×総合60%到達</text>

  <!-- Footer -->
  <text x="180" y="1690" text-anchor="middle" class="mett" font-size="11" fill="#374151">100点満点を狙う必要はゼロ。</text>
  <text x="180" y="1708" text-anchor="middle" class="mett" font-size="11" fill="#374151">各科目40%の防衛線を守りながら、</text>
  <text x="180" y="1726" text-anchor="middle" class="mett" font-size="11" fill="#374151">過去問プールから60%だけを</text>
  <text x="180" y="1748" text-anchor="middle" class="mett" font-size="11" font-weight="700" fill="#16A34A">効率よくもぎ取る——それが衛生管理者</text>
  <text x="180" y="1766" text-anchor="middle" class="mett" font-size="11" font-weight="700" fill="#16A34A">試験の「割り切りゲーム」攻略法です。</text>
</svg>
