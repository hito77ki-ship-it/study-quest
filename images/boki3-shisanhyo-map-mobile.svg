<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1400" width="360" height="1400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1400" rx="16" fill="#F8FAFC"/>
  <text x="180" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">仕訳帳→元帳→試算表</text>
  <text x="180" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">3種類の試算表の違い</text>

  <!-- Flow -->
  <rect x="20" y="64" width="320" height="56" rx="8" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="36" y="86" font-size="12.5" font-weight="700" fill="#C2410C">仕訳帳</text>
  <text x="36" y="104" font-size="10.5" fill="#9A3412">取引を時系列で記録</text>

  <text x="180" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B">↓ 転記</text>

  <rect x="20" y="152" width="320" height="56" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="36" y="174" font-size="12.5" font-weight="700" fill="#1E40AF">総勘定元帳</text>
  <text x="36" y="192" font-size="10.5" fill="#1E3A8A">勘定科目ごとにT字で管理</text>

  <text x="180" y="228" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B">↓ 集計</text>

  <rect x="20" y="240" width="320" height="66" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="36" y="264" font-size="12.5" font-weight="700" fill="#166534">試算表（さんだかひょう）</text>
  <text x="36" y="282" font-size="10.5" fill="#15803D">全勘定の借方・貸方合計を一覧にして</text>
  <text x="36" y="298" font-size="10.5" fill="#15803D">転記ミスを検証</text>

  <text x="180" y="336" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">3種類の試算表——何を表示するかの違い</text>

  <!-- 合計試算表 -->
  <rect x="20" y="352" width="320" height="230" rx="10" fill="#FEF9C3" stroke="#FDE68A" stroke-width="2"/>
  <rect x="20" y="352" width="320" height="36" rx="10" fill="#EAB308"/>
  <rect x="20" y="378" width="320" height="10" fill="#EAB308"/>
  <text x="180" y="375" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">① 合計試算表</text>
  <text x="180" y="406" text-anchor="middle" font-size="11.5" fill="#713F12">借方合計 / 貸方合計</text>
  <text x="180" y="424" text-anchor="middle" font-size="10.5" fill="#713F12">期間中の全取引金額の総計</text>
  <rect x="36" y="436" width="288" height="112" rx="6" fill="#FEFCE8"/>
  <text x="180" y="454" text-anchor="middle" font-size="10.5" font-weight="700" fill="#713F12">科目 / 借方合計 / 貸方合計</text>
  <line x1="36" y1="460" x2="324" y2="460" stroke="#FDE68A" stroke-width="1"/>
  <text x="60" y="478" font-size="10.5" fill="#374151">現金</text>
  <text x="150" y="478" font-size="10.5" fill="#374151">80,000</text>
  <text x="250" y="478" font-size="10.5" fill="#374151">30,000</text>
  <text x="60" y="498" font-size="10.5" fill="#374151">売上</text>
  <text x="150" y="498" font-size="10.5" fill="#374151">—</text>
  <text x="250" y="498" font-size="10.5" fill="#374151">90,000</text>
  <text x="180" y="536" text-anchor="middle" font-size="10" fill="#94A3B8">（取引量の大きさがわかる）</text>

  <!-- 合計残高試算表 -->
  <rect x="20" y="600" width="320" height="248" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="20" y="600" width="320" height="36" rx="10" fill="#22C55E"/>
  <rect x="20" y="626" width="320" height="10" fill="#22C55E"/>
  <text x="180" y="623" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">② 合計残高試算表</text>
  <text x="180" y="654" text-anchor="middle" font-size="11.5" fill="#166534">合計 ＋ 残高（両方表示）</text>
  <text x="180" y="672" text-anchor="middle" font-size="10.5" fill="#166534">最も情報量が多い・実務でよく使う</text>
  <rect x="36" y="684" width="288" height="112" rx="6" fill="#DCFCE7"/>
  <text x="180" y="700" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">借方残/借方合計/貸方合計/貸方残</text>
  <line x1="36" y1="708" x2="324" y2="708" stroke="#86EFAC" stroke-width="1"/>
  <text x="55" y="726" font-size="10" fill="#374151">現金</text>
  <text x="130" y="726" font-size="10" fill="#374151">50,000</text>
  <text x="210" y="726" font-size="10" fill="#374151">80,000</text>
  <text x="290" y="726" font-size="10" fill="#374151">30,000</text>
  <text x="180" y="764" text-anchor="middle" font-size="10" fill="#94A3B8">（①＋③を合わせた構造）</text>
  <text x="180" y="782" text-anchor="middle" font-size="10" fill="#94A3B8">試験でも最もよく出題</text>

  <!-- 残高試算表 -->
  <rect x="20" y="866" width="320" height="230" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="866" width="320" height="36" rx="10" fill="#3B82F6"/>
  <rect x="20" y="892" width="320" height="10" fill="#3B82F6"/>
  <text x="180" y="889" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">③ 残高試算表</text>
  <text x="180" y="920" text-anchor="middle" font-size="11.5" fill="#1E40AF">借方残高 / 貸方残高</text>
  <text x="180" y="938" text-anchor="middle" font-size="10.5" fill="#1E40AF">期末時点の残高だけ表示</text>
  <rect x="36" y="950" width="288" height="112" rx="6" fill="#DBEAFE"/>
  <text x="180" y="968" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">科目 / 借方残高 / 貸方残高</text>
  <line x1="36" y1="974" x2="324" y2="974" stroke="#93C5FD" stroke-width="1"/>
  <text x="60" y="992" font-size="10.5" fill="#374151">現金</text>
  <text x="170" y="992" font-size="10.5" fill="#374151">50,000</text>
  <text x="270" y="992" font-size="10.5" fill="#374151">—</text>
  <text x="60" y="1012" font-size="10.5" fill="#374151">売上</text>
  <text x="170" y="1012" font-size="10.5" fill="#374151">—</text>
  <text x="270" y="1012" font-size="10.5" fill="#374151">90,000</text>
  <text x="180" y="1050" text-anchor="middle" font-size="10" fill="#94A3B8">（精算表に転記する元データ）</text>

  <!-- bottom note -->
  <rect x="20" y="1116" width="320" height="140" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="180" y="1144" text-anchor="middle" font-size="10.5" fill="#475569">💡 3種類どれも</text>
  <text x="180" y="1164" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">「借方合計(or残高合計)＝</text>
  <text x="180" y="1182" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">貸方合計(or残高合計)」</text>
  <text x="180" y="1200" text-anchor="middle" font-size="10.5" fill="#475569">になれば転記ミスなし</text>
  <text x="180" y="1228" text-anchor="middle" font-size="10.5" fill="#475569">合わない場合は仕訳帳から</text>
  <text x="180" y="1246" text-anchor="middle" font-size="10.5" fill="#475569">元帳への転記をチェックする</text>
</svg>
