<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1180" width="360" height="1180" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">インボイス特例のバトンリレー（モバイル版）</title>
  <desc id="svgdesc">2割特例が令和8年9月まで、3割特例が令和9・10年分、その後は本則課税・簡易課税へ移行するインボイス特例の段階的な移行と、免税事業者等からの仕入れにかかる仕入税額控除の経過措置（80%→70%→50%→30%→控除不可）を示す図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1180" rx="16" fill="#FAFBFC"/>

  <text x="180" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1A202C">インボイス特例の</text>
  <text x="180" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#1A202C">バトンリレー</text>

  <rect x="16" y="66" width="328" height="90" rx="12" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#1E40AF">2割特例</text>
  <text x="180" y="120" text-anchor="middle" font-size="11" fill="#2563EB">〜令和8年（2026年）9月</text>

  <text x="180" y="182" text-anchor="middle" font-size="18" fill="#94A3B8">↓</text>

  <rect x="16" y="196" width="328" height="90" rx="12" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="180" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#065F46">3割特例</text>
  <text x="180" y="250" text-anchor="middle" font-size="11" fill="#059669">令和9・10年分（2027・2028年）</text>

  <text x="180" y="312" text-anchor="middle" font-size="18" fill="#94A3B8">↓</text>

  <rect x="16" y="326" width="328" height="90" rx="12" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1.5"/>
  <text x="180" y="358" text-anchor="middle" font-size="14" font-weight="700" fill="#9D174D">本則課税・簡易課税へ</text>
  <text x="180" y="380" text-anchor="middle" font-size="11" fill="#BE185D">令和11年分〜</text>

  <text x="180" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#1A202C">仕入税額控除の経過措置</text>
  <text x="180" y="468" text-anchor="middle" font-size="10" fill="#4A5568">（免税事業者等からの仕入れ）</text>

  <rect x="16" y="486" width="328" height="72" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="180" y="516" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">80%控除</text>
  <text x="180" y="538" text-anchor="middle" font-size="10.5" fill="#B45309">〜2026年9月</text>

  <text x="180" y="576" text-anchor="middle" font-size="14" fill="#CBD5E0">↓</text>

  <rect x="16" y="588" width="328" height="72" rx="10" fill="#FDE9C8" stroke="#FBBF6A" stroke-width="1.2"/>
  <text x="180" y="618" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">70%控除</text>
  <text x="180" y="640" text-anchor="middle" font-size="10.5" fill="#B45309">2026年10月〜</text>

  <text x="180" y="678" text-anchor="middle" font-size="14" fill="#CBD5E0">↓</text>

  <rect x="16" y="690" width="328" height="72" rx="10" fill="#FDDFA8" stroke="#F9A94A" stroke-width="1.2"/>
  <text x="180" y="720" text-anchor="middle" font-size="15" font-weight="700" fill="#7C3E10">50%控除</text>
  <text x="180" y="742" text-anchor="middle" font-size="10.5" fill="#9A4A0C">2028年10月〜</text>

  <text x="180" y="780" text-anchor="middle" font-size="14" fill="#CBD5E0">↓</text>

  <rect x="16" y="792" width="328" height="72" rx="10" fill="#FBD0B8" stroke="#F58A5C" stroke-width="1.2"/>
  <text x="180" y="822" text-anchor="middle" font-size="15" font-weight="700" fill="#7C2D12">30%控除</text>
  <text x="180" y="844" text-anchor="middle" font-size="10.5" fill="#9A3412">2030年10月〜</text>

  <text x="180" y="882" text-anchor="middle" font-size="14" fill="#CBD5E0">↓</text>

  <rect x="16" y="894" width="328" height="72" rx="10" fill="#FBC5C5" stroke="#F58A8A" stroke-width="1.2"/>
  <text x="180" y="924" text-anchor="middle" font-size="15" font-weight="700" fill="#7C1D1D">控除不可</text>
  <text x="180" y="946" text-anchor="middle" font-size="10.5" fill="#9A2C2C">2031年10月〜</text>

  <rect x="16" y="998" width="328" height="90" rx="12" fill="rgba(255,255,255,.9)" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="180" y="1030" text-anchor="middle" font-size="11" font-weight="700" fill="#1A202C">2026年10月以降は1事業者あたりの</text>
  <text x="180" y="1050" text-anchor="middle" font-size="11" font-weight="700" fill="#1A202C">年間控除上限額も1億円に引き下げ</text>
</svg>
