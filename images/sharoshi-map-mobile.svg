<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1780" width="360" height="1780">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1780" rx="16" fill="#FAFDF6"/>
  <text x="180" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">社労士試験 攻略マップ</text>
  <text x="180" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B">選択式・択一式構成と足切り防衛戦略</text>
  <text x="180" y="62" text-anchor="middle" font-size="10" fill="#64748B">「全科目3点(4点)以上」の防衛陣形が生死を分ける</text>

  <!-- 試験構成 -->
  <rect x="20" y="80" width="320" height="616" rx="10" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <rect x="20" y="80" width="320" height="34" rx="10" fill="#FDBA74"/>
  <rect x="20" y="104" width="320" height="10" fill="#FDBA74"/>
  <text x="180" y="102" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9A3412">試験構成（合格率6〜7%）</text>

  <text x="36" y="140" font-size="11.5" font-weight="700" fill="#C2410C">選択式（午前：1時間20分）</text>
  <rect x="36" y="148" width="288" height="28" rx="6" fill="#FFEDD5"/>
  <text x="46" y="167" font-size="10.5" fill="#7C2D12">8科目×5問＝40問（各科目5択穴埋め）</text>
  <rect x="36" y="182" width="288" height="40" rx="6" fill="#FECACA"/>
  <text x="46" y="198" font-size="10" font-weight="700" fill="#991B1B">⚠ 即死トラップ：各科目3点未満で即アウト</text>
  <text x="46" y="212" font-size="9.5" fill="#B91C1C">（満点5点・救済で2点の回もあり）</text>

  <text x="36" y="252" font-size="11.5" font-weight="700" fill="#C2410C">択一式（午後：3時間30分）</text>
  <rect x="36" y="260" width="288" height="28" rx="6" fill="#FFEDD5"/>
  <text x="46" y="279" font-size="10.5" fill="#7C2D12">7科目×10問＝70問（5肢択一）</text>
  <rect x="36" y="294" width="288" height="40" rx="6" fill="#FECACA"/>
  <text x="46" y="310" font-size="10" font-weight="700" fill="#991B1B">⚠ 即死トラップ：各科目4点未満で即アウト</text>
  <text x="46" y="324" font-size="9.5" fill="#B91C1C">（満点10点・難化時は3点の回もあり）</text>

  <text x="36" y="364" font-size="11.5" font-weight="700" fill="#C2410C">合格基準（年度により変動）</text>
  <rect x="36" y="372" width="288" height="26" rx="6" fill="#FFEDD5"/>
  <text x="46" y="390" font-size="10.5" fill="#7C2D12">選択式：総得点24〜26点前後（目安）</text>
  <rect x="36" y="406" width="288" height="26" rx="6" fill="#FFEDD5"/>
  <text x="46" y="424" font-size="10.5" fill="#7C2D12">択一式：総得点45〜49点前後（目安）</text>

  <rect x="36" y="448" width="288" height="130" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="180" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">🛡 防衛陣形の鉄則</text>
  <text x="46" y="494" font-size="10.5" fill="#7F1D1D">総合点がどれだけ高くても、</text>
  <text x="46" y="512" font-size="10.5" fill="#7F1D1D">1科目でも基準点を割れば即不合格。</text>
  <text x="46" y="536" font-size="10.5" font-weight="700" fill="#991B1B">「高得点科目」より「弱点ゼロ」を</text>
  <text x="46" y="554" font-size="10.5" font-weight="700" fill="#991B1B">優先せよ！</text>

  <!-- 10科目 -->
  <rect x="20" y="716" width="320" height="820" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="20" y="716" width="320" height="34" rx="10" fill="#86EFAC"/>
  <rect x="20" y="740" width="320" height="10" fill="#86EFAC"/>
  <text x="180" y="738" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">主要10科目と防衛優先度</text>

  <rect x="36" y="756" width="288" height="30" rx="6" fill="#DCFCE7"/>
  <text x="46" y="776" font-size="10.5" fill="#166534">① 労働基準法・安全衛生法</text>
  <rect x="256" y="761" width="56" height="20" rx="5" fill="#4ADE80"/>
  <text x="284" y="775" text-anchor="middle" font-size="9" font-weight="700" fill="#14532D">最重要</text>

  <rect x="36" y="792" width="288" height="30" rx="6" fill="#DCFCE7"/>
  <text x="46" y="812" font-size="10.5" fill="#166534">② 労働者災害補償保険法（労災）</text>
  <rect x="256" y="797" width="56" height="20" rx="5" fill="#4ADE80"/>
  <text x="284" y="811" text-anchor="middle" font-size="9" font-weight="700" fill="#14532D">最重要</text>

  <rect x="36" y="828" width="288" height="30" rx="6" fill="#DCFCE7"/>
  <text x="46" y="848" font-size="10.5" fill="#166534">③ 雇用保険法</text>
  <rect x="256" y="833" width="56" height="20" rx="5" fill="#4ADE80"/>
  <text x="284" y="847" text-anchor="middle" font-size="9" font-weight="700" fill="#14532D">最重要</text>

  <rect x="36" y="864" width="288" height="30" rx="6" fill="#BBF7D0"/>
  <text x="46" y="884" font-size="10.5" fill="#166534">⑤ 健康保険法</text>
  <rect x="256" y="869" width="56" height="20" rx="5" fill="#86EFAC"/>
  <text x="284" y="883" text-anchor="middle" font-size="9" fill="#166534">重要</text>

  <rect x="36" y="900" width="288" height="30" rx="6" fill="#BBF7D0"/>
  <text x="46" y="920" font-size="10.5" fill="#166534">⑥ 厚生年金保険法</text>
  <rect x="256" y="905" width="56" height="20" rx="5" fill="#86EFAC"/>
  <text x="284" y="919" text-anchor="middle" font-size="9" fill="#166534">重要</text>

  <rect x="36" y="936" width="288" height="30" rx="6" fill="#BBF7D0"/>
  <text x="46" y="956" font-size="10.5" fill="#166534">⑦ 国民年金法</text>
  <rect x="256" y="941" width="56" height="20" rx="5" fill="#86EFAC"/>
  <text x="284" y="955" text-anchor="middle" font-size="9" fill="#166534">重要</text>

  <rect x="36" y="972" width="288" height="30" rx="6" fill="#DCFCE7"/>
  <text x="46" y="992" font-size="10.5" fill="#166534">⑧ 労働保険徴収法</text>
  <rect x="256" y="977" width="56" height="20" rx="5" fill="#BBF7D0"/>
  <text x="284" y="991" text-anchor="middle" font-size="9" fill="#166534">標準</text>

  <rect x="36" y="1008" width="288" height="30" rx="6" fill="#DCFCE7"/>
  <text x="46" y="1028" font-size="10.5" fill="#166534">⑩ 労働安全衛生法（安衛法）</text>
  <rect x="256" y="1013" width="56" height="20" rx="5" fill="#BBF7D0"/>
  <text x="284" y="1027" text-anchor="middle" font-size="9" fill="#166534">標準</text>

  <!-- 防具科目 -->
  <rect x="36" y="1052" width="288" height="76" rx="8" fill="#F5D0FE" stroke="#E9A6F0" stroke-width="1.2"/>
  <text x="46" y="1074" font-size="10.5" font-weight="700" fill="#86198F">④ 社会保険に関する一般常識（社一）</text>
  <text x="46" y="1094" font-size="10.5" font-weight="700" fill="#86198F">⑨ 労働に関する一般常識（労一）</text>
  <rect x="46" y="1100" width="70" height="22" rx="5" fill="#D946EF"/>
  <text x="81" y="1116" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">🛡防具・白書対策</text>

  <rect x="36" y="1144" width="288" height="90" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="180" y="1166" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">労一・社一は「防具」で足切りを防ぐ</text>
  <text x="46" y="1188" font-size="10" fill="#374151">白書・統計の最新数値を直前期に集中</text>
  <text x="46" y="1204" font-size="10" fill="#374151">インプット。これが基準点割れという</text>
  <text x="46" y="1220" font-size="10" fill="#374151">即死を防ぐ"防具"になる。</text>
</svg>
