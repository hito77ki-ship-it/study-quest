<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1260" viewBox="0 0 360 1260" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">公認会計士試験の知識を日商簿記1級へ引き継ぐ科目重複と知識コンバートマップ（モバイル版）</title>
  <desc id="svgdesc">財務会計論・管理会計論・原価計算・理論暗記体力・監査論企業法の5分野が、日商簿記1級のどの科目にどれくらい活きるかを重複度別に縦に並べて示した図解</desc>
  <defs>
    <linearGradient id="kmmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#F0FFF4"/>
    </linearGradient>
    <linearGradient id="kmmTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#2D4A10"/>
    </linearGradient>
    <style>.kmt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="360" height="1260" rx="16" fill="url(#kmmBg)"/>

  <!-- Title -->
  <rect x="16" y="16" width="328" height="72" rx="12" fill="url(#kmmTitle)"/>
  <text x="180" y="42" text-anchor="middle" class="kmt" font-size="11" font-weight="700" fill="#A0C070" letter-spacing="1">知識コンバートマップ</text>
  <text x="180" y="64" text-anchor="middle" class="kmt" font-size="14" font-weight="800" fill="#FFFFFF">会計士の学習は簿記1級に</text>
  <text x="180" y="80" text-anchor="middle" class="kmt" font-size="14" font-weight="800" fill="#FFFFFF">どこまで引き継げるか</text>

  <!-- Row 1: 財務会計論 -->
  <g>
    <rect x="16" y="108" width="328" height="66" rx="12" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2"/>
    <text x="36" y="132" class="kmt" font-size="9.5" font-weight="700" fill="#94A3B8" letter-spacing="1">CPA</text>
    <text x="36" y="154" class="kmt" font-size="16" font-weight="800" fill="#1A202C">財務会計論</text>
    <text x="200" y="145" class="kmt" font-size="10.5" fill="#718096">計算・理論の土台</text>
  </g>
  <rect x="140" y="180" width="80" height="26" rx="13" fill="#6AAF2B"/>
  <text x="180" y="198" text-anchor="middle" class="kmt" font-size="12" font-weight="700" fill="#fff">重複度：高い</text>
  <path d="M180,206 L180,222 M172,214 L180,222 L188,214" fill="none" stroke="#6AAF2B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <rect x="16" y="230" width="328" height="66" rx="12" fill="#F0FFF4" stroke="#8CC63F" stroke-width="2"/>
    <text x="36" y="254" class="kmt" font-size="9.5" font-weight="700" fill="#6AAF2B" letter-spacing="1">簿記1級</text>
    <text x="36" y="276" class="kmt" font-size="16" font-weight="800" fill="#276749">商業簿記・会計学</text>
    <text x="200" y="267" class="kmt" font-size="10.5" fill="#276749">そのまま土台に</text>
  </g>

  <!-- Row 2: 管理会計論 -->
  <g>
    <rect x="16" y="322" width="328" height="66" rx="12" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2"/>
    <text x="36" y="346" class="kmt" font-size="9.5" font-weight="700" fill="#94A3B8" letter-spacing="1">CPA</text>
    <text x="36" y="368" class="kmt" font-size="16" font-weight="800" fill="#1A202C">管理会計論</text>
    <text x="200" y="359" class="kmt" font-size="10.5" fill="#718096">原価・意思決定会計</text>
  </g>
  <rect x="140" y="394" width="80" height="26" rx="13" fill="#6AAF2B"/>
  <text x="180" y="412" text-anchor="middle" class="kmt" font-size="12" font-weight="700" fill="#fff">重複度：高い</text>
  <path d="M180,420 L180,436 M172,428 L180,436 L188,428" fill="none" stroke="#6AAF2B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <rect x="16" y="444" width="328" height="66" rx="12" fill="#F0FFF4" stroke="#8CC63F" stroke-width="2"/>
    <text x="36" y="468" class="kmt" font-size="9.5" font-weight="700" fill="#6AAF2B" letter-spacing="1">簿記1級</text>
    <text x="36" y="490" class="kmt" font-size="16" font-weight="800" fill="#276749">工業簿記</text>
    <text x="200" y="481" class="kmt" font-size="10.5" fill="#276749">原価計算の考え方が直結</text>
  </g>

  <!-- Row 3: 原価計算 -->
  <g>
    <rect x="16" y="536" width="328" height="66" rx="12" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2"/>
    <text x="36" y="560" class="kmt" font-size="9.5" font-weight="700" fill="#94A3B8" letter-spacing="1">CPA</text>
    <text x="36" y="582" class="kmt" font-size="16" font-weight="800" fill="#1A202C">原価計算</text>
    <text x="200" y="573" class="kmt" font-size="10.5" fill="#718096">CPA科目でも得点源</text>
  </g>
  <rect x="140" y="608" width="80" height="26" rx="13" fill="#6AAF2B"/>
  <text x="180" y="626" text-anchor="middle" class="kmt" font-size="12" font-weight="700" fill="#fff">重複度：高い</text>
  <path d="M180,634 L180,650 M172,642 L180,650 L188,642" fill="none" stroke="#6AAF2B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <rect x="16" y="658" width="328" height="66" rx="12" fill="#F0FFF4" stroke="#8CC63F" stroke-width="2"/>
    <text x="36" y="682" class="kmt" font-size="9.5" font-weight="700" fill="#6AAF2B" letter-spacing="1">簿記1級</text>
    <text x="36" y="704" class="kmt" font-size="16" font-weight="800" fill="#276749">原価計算</text>
    <text x="200" y="695" class="kmt" font-size="10.5" fill="#276749">大きなアドバンテージに</text>
  </g>

  <!-- Row 4: 理論暗記体力 -->
  <g>
    <rect x="16" y="750" width="328" height="66" rx="12" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <text x="36" y="774" class="kmt" font-size="9.5" font-weight="700" fill="#94A3B8" letter-spacing="1">CPA</text>
    <text x="36" y="796" class="kmt" font-size="16" font-weight="800" fill="#1A202C">理論の暗記体力</text>
    <text x="200" y="787" class="kmt" font-size="10.5" fill="#718096">理論科目の学習習慣</text>
  </g>
  <rect x="135" y="822" width="90" height="26" rx="13" fill="#F59E0B"/>
  <text x="180" y="840" text-anchor="middle" class="kmt" font-size="12" font-weight="700" fill="#fff">重複度：中</text>
  <path d="M180,848 L180,864 M172,856 L180,864 L188,856" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <rect x="16" y="872" width="328" height="66" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="36" y="896" class="kmt" font-size="9.5" font-weight="700" fill="#B7791F" letter-spacing="1">簿記1級</text>
    <text x="36" y="918" class="kmt" font-size="15" font-weight="800" fill="#975A16">学習習慣・暗記体力全般</text>
    <text x="200" y="909" class="kmt" font-size="10.5" fill="#975A16">活きるが足りない</text>
  </g>

  <!-- Row 5: 監査論・企業法 -->
  <g>
    <rect x="16" y="964" width="328" height="66" rx="12" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
    <text x="36" y="988" class="kmt" font-size="9.5" font-weight="700" fill="#94A3B8" letter-spacing="1">CPA</text>
    <text x="36" y="1010" class="kmt" font-size="16" font-weight="800" fill="#1A202C">監査論・企業法</text>
    <text x="200" y="1001" class="kmt" font-size="10.5" fill="#718096">理論暗記中心</text>
  </g>
  <rect x="135" y="1036" width="90" height="26" rx="13" fill="#94A3B8"/>
  <text x="180" y="1054" text-anchor="middle" class="kmt" font-size="12" font-weight="700" fill="#fff">重複度：低い</text>
  <path d="M180,1062 L180,1078 M172,1070 L180,1078 L188,1070" fill="none" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g>
    <rect x="16" y="1086" width="328" height="66" rx="12" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
    <text x="36" y="1110" class="kmt" font-size="9.5" font-weight="700" fill="#475569" letter-spacing="1">簿記1級</text>
    <text x="36" y="1132" class="kmt" font-size="15" font-weight="800" fill="#475569">ほぼ直接は活きない</text>
    <text x="200" y="1123" class="kmt" font-size="10.5" fill="#475569">仕切り直しが必要</text>
  </g>

  <!-- Bottom summary -->
  <rect x="16" y="1168" width="328" height="78" rx="14" fill="#111827"/>
  <text x="180" y="1194" text-anchor="middle" class="kmt" font-size="12.5" font-weight="700" fill="#8CC63F">会計・原価まわりは「強くてニューゲーム」</text>
  <text x="180" y="1214" text-anchor="middle" class="kmt" font-size="11" fill="#E5E7EB">監査論・企業法も、体系的に理解しきる力</text>
  <text x="180" y="1230" text-anchor="middle" class="kmt" font-size="11" fill="#E5E7EB">という汎用スキルとして活きています。</text>
</svg>
