<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="460" rx="12" fill="#F8FAFC"/>
  <text x="380" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">ケアマネ試験 2分野足切り回避＆五肢複択マップ</text>
  <text x="380" y="52" text-anchor="middle" font-size="11" fill="#64748B">2分野それぞれ70%前後の防衛線を同時にクリアしないと不合格</text>

  <!-- Left half: 2分野バランス（棒グラフ） -->
  <text x="200" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">① 2分野の防衛線</text>

  <!-- chart area: scale 0-100%, baseline y=280, top y=100 -->
  <!-- threshold 70% -> y = 280 - 0.7*180 = 154 -->
  <line x1="70" y1="154" x2="330" y2="154" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="336" y="158" font-size="9" fill="#B91C1C">70%防衛線</text>

  <line x1="70" y1="280" x2="330" y2="280" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="64" y="284" text-anchor="end" font-size="8.5" fill="#94A3B8">0%</text>
  <text x="64" y="158" text-anchor="end" font-size="8.5" fill="#94A3B8">70%</text>

  <!-- 介護支援分野 25問 -->
  <text x="140" y="96" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E293B">介護支援分野</text>
  <text x="140" y="110" text-anchor="middle" font-size="8.5" fill="#64748B">25問・難易度高</text>
  <rect x="105" y="146" width="70" height="134" rx="6" fill="#FFEDD5" stroke="#F97316" stroke-width="2.5"/>
  <text x="140" y="136" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">目標 75%</text>

  <!-- 保健医療福祉分野 35問 -->
  <text x="270" y="96" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E293B">保健医療福祉分野</text>
  <text x="270" y="110" text-anchor="middle" font-size="8.5" fill="#64748B">35問</text>
  <rect x="235" y="136" width="70" height="144" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="270" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">目標 78%</text>

  <text x="200" y="306" text-anchor="middle" font-size="9" fill="#92400E" font-weight="700">両方が70%を超えて初めて合格</text>

  <!-- divider -->
  <line x1="380" y1="76" x2="380" y2="320" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Right half: 五肢複択の消去フロー -->
  <text x="570" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">② 五肢複択の消去手順</text>

  <rect x="420" y="98" width="300" height="34" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="570" y="120" text-anchor="middle" font-size="10.5" fill="#5B21B6">選択肢①〜⑤を1つずつ検討</text>

  <polygon points="570,138 562,148 578,148" fill="#94A3B8"/>

  <rect x="420" y="150" width="300" height="34" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="570" y="172" text-anchor="middle" font-size="10.5" fill="#15803D">明確にYES・NOと判定できる肢を先に確定</text>

  <polygon points="570,190 562,200 578,200" fill="#94A3B8"/>

  <rect x="420" y="202" width="300" height="34" rx="8" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
  <text x="570" y="224" text-anchor="middle" font-size="10.5" fill="#A16207">迷う肢は消去法で候補を絞り込む</text>

  <polygon points="570,242 562,252 578,252" fill="#94A3B8"/>

  <rect x="420" y="254" width="300" height="34" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="570" y="276" text-anchor="middle" font-size="10.5" font-weight="700" fill="#B91C1C">1つでも誤ればその設問は全不正解</text>

  <text x="570" y="306" text-anchor="middle" font-size="9" fill="#64748B">→ 曖昧な暗記は厳禁。数字・要件は正確に</text>

  <!-- Bottom summary -->
  <rect x="46" y="360" width="668" height="70" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">実務知識 ≠ 試験知識 ── 数字・期限・要件は「なんとなく」ではなく正確に暗記する</text>
  <text x="380" y="404" text-anchor="middle" font-size="9.5" fill="#B45309">2分野の防衛線を両方超え、五肢複択で1肢もブレない状態を作るのがゴール</text>
</svg>
