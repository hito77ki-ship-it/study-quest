<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="540" rx="16" fill="#FEFCF9"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">社会人におすすめの資格ランキング10選：4象限マトリクス</text>
  <text x="380" y="49" text-anchor="middle" font-size="11" fill="#94A3B8">縦軸＝キャリアの破壊力（リターン）／横軸＝勉強時間の短さ（タイパ）</text>

  <!-- quadrant background tints -->
  <rect x="70" y="70" width="630" height="200" fill="#FFF9E6"/>
  <rect x="70" y="270" width="630" height="200" fill="#F0FBF4"/>
  <rect x="385" y="70" width="315" height="200" fill="#FFF3D6"/>

  <!-- axis lines -->
  <line x1="70" y1="270" x2="700" y2="270" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,5"/>
  <line x1="385" y1="70" x2="385" y2="470" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4,5"/>

  <!-- axis labels -->
  <text x="385" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B">↑ キャリアの破壊力（大）</text>
  <text x="385" y="486" text-anchor="middle" font-size="11" font-weight="700" fill="#64748B">↓ キャリアの破壊力（小）</text>
  <text x="76" y="500" text-anchor="start" font-size="11" font-weight="700" fill="#64748B">勉強時間が長い（低タイパ）</text>
  <text x="694" y="500" text-anchor="end" font-size="11" font-weight="700" fill="#64748B">勉強時間が短い（高タイパ）→</text>

  <!-- quadrant zone labels -->
  <rect x="470" y="82" width="220" height="26" rx="13" fill="#F6AD55" opacity="0.9"/>
  <text x="580" y="99.5" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🏆 社会人 最強ゾーン</text>

  <rect x="90" y="82" width="220" height="26" rx="13" fill="#B794F4" opacity="0.85"/>
  <text x="200" y="99.5" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">💎 じっくり投資ゾーン</text>

  <rect x="470" y="432" width="220" height="26" rx="13" fill="#68D391" opacity="0.9"/>
  <text x="580" y="449.5" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🌱 お手軽ゾーン</text>

  <rect x="90" y="432" width="220" height="26" rx="13" fill="#A0AEC0" opacity="0.85"/>
  <text x="200" y="449.5" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">△ 要検討ゾーン</text>

  <!-- 最強ゾーン（右上）バブル -->
  <circle cx="560" cy="150" r="34" fill="#FFF3D6" stroke="#F6AD55" stroke-width="2.5"/>
  <text x="560" y="146" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7C4A03">簿記2級</text>
  <text x="560" y="160" text-anchor="middle" font-size="9" fill="#92400E">転職最強</text>

  <circle cx="480" cy="152" r="34" fill="#FFF3D6" stroke="#F6AD55" stroke-width="2.5"/>
  <text x="480" y="148" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7C4A03">宅建</text>
  <text x="480" y="162" text-anchor="middle" font-size="9" fill="#92400E">独占業務</text>

  <circle cx="620" cy="215" r="32" fill="#FFF3D6" stroke="#F6AD55" stroke-width="2.5"/>
  <text x="620" y="211" text-anchor="middle" font-size="11" font-weight="700" fill="#7C4A03">FP2級</text>
  <text x="620" y="225" text-anchor="middle" font-size="9" fill="#92400E">汎用性高</text>

  <circle cx="430" cy="235" r="26" fill="#FEF9E7" stroke="#F6C85F" stroke-width="2"/>
  <text x="430" y="232" text-anchor="middle" font-size="10" font-weight="700" fill="#7C4A03">基本情報</text>
  <text x="430" y="245" text-anchor="middle" font-size="8.5" fill="#92400E">IT転職</text>

  <!-- お手軽ゾーン（右下） -->
  <circle cx="620" cy="345" r="27" fill="#E6FFFA" stroke="#68D391" stroke-width="2.5"/>
  <text x="620" y="341" text-anchor="middle" font-size="10.5" font-weight="700" fill="#276749">ITパスポート</text>
  <text x="620" y="354" text-anchor="middle" font-size="8.5" fill="#2F855A">文系OK</text>

  <!-- じっくり投資ゾーン（左上） -->
  <circle cx="115" cy="145" r="30" fill="#F3E8FF" stroke="#B794F4" stroke-width="2.5"/>
  <text x="115" y="142" text-anchor="middle" font-size="10.5" font-weight="700" fill="#553C9A">税理士</text>
  <text x="115" y="155" text-anchor="middle" font-size="8.5" fill="#6B46C1">独立最強</text>

  <circle cx="165" cy="222" r="28" fill="#F3E8FF" stroke="#B794F4" stroke-width="2.5"/>
  <text x="165" y="219" text-anchor="middle" font-size="10.5" font-weight="700" fill="#553C9A">社労士</text>
  <text x="165" y="232" text-anchor="middle" font-size="8.5" fill="#6B46C1">HR・労務</text>

  <circle cx="235" cy="170" r="28" fill="#F3E8FF" stroke="#B794F4" stroke-width="2.5"/>
  <text x="235" y="167" text-anchor="middle" font-size="10" font-weight="700" fill="#553C9A">行政書士</text>
  <text x="235" y="180" text-anchor="middle" font-size="8.5" fill="#6B46C1">独立開業</text>

  <circle cx="270" cy="240" r="26" fill="#F3E8FF" stroke="#B794F4" stroke-width="2.5"/>
  <text x="270" y="237" text-anchor="middle" font-size="9.5" font-weight="700" fill="#553C9A">中小企業診断士</text>
  <text x="270" y="250" text-anchor="middle" font-size="8.5" fill="#6B46C1">経営コンサル</text>

  <!-- 要検討ゾーン（左下） -->
  <circle cx="200" cy="360" r="27" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="2.5"/>
  <text x="200" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A5568">TOEIC700</text>
  <text x="200" y="369" text-anchor="middle" font-size="8.5" fill="#4A5568">グローバル</text>

  <!-- caption -->
  <rect x="70" y="500" width="620" height="30" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="519.5" text-anchor="middle" font-size="10.5" fill="#78350F">短期間の投資で市場価値を最速回収できるのが「社会人 最強ゾーン」——簿記2級・宅建・FP2級が代表格</text>
</svg>
