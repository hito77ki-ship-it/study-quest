<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="420" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">社労士 vs 行政書士——基本情報・強み・目的別おすすめ比較</text>
  <!-- Column Headers -->
  <rect x="20" y="52" width="256" height="34" rx="6" fill="#EA580C"/>
  <text x="148" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">社会保険労務士（社労士）</text>
  <rect x="284" y="52" width="192" height="34" rx="6" fill="#475569"/>
  <text x="380" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">比較項目</text>
  <rect x="484" y="52" width="256" height="34" rx="6" fill="#7C3AED"/>
  <text x="612" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">行政書士</text>
  <!-- Rows -->
  <rect x="20" y="94" width="256" height="36" rx="4" fill="#FFEDD5"/>
  <text x="148" y="117" text-anchor="middle" font-size="11" fill="#9A3412">年1回・8月第4日曜日</text>
  <rect x="284" y="94" width="192" height="36" rx="4" fill="#F1F5F9"/>
  <text x="380" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">試験日</text>
  <rect x="484" y="94" width="256" height="36" rx="4" fill="#F3E8FF"/>
  <text x="612" y="117" text-anchor="middle" font-size="11" fill="#6D28D9">年1回・11月第2日曜日</text>

  <rect x="20" y="136" width="256" height="36" rx="4" fill="#FFEDD5"/>
  <text x="148" y="159" text-anchor="middle" font-size="11" fill="#9A3412">6〜8%</text>
  <rect x="284" y="136" width="192" height="36" rx="4" fill="#F1F5F9"/>
  <text x="380" y="159" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">合格率</text>
  <rect x="484" y="136" width="256" height="36" rx="4" fill="#F3E8FF"/>
  <text x="612" y="159" text-anchor="middle" font-size="11" fill="#6D28D9">10〜15%</text>

  <rect x="20" y="178" width="256" height="36" rx="4" fill="#FFEDD5"/>
  <text x="148" y="201" text-anchor="middle" font-size="11" fill="#9A3412">大卒以上 or 実務経験3年以上</text>
  <rect x="284" y="178" width="192" height="36" rx="4" fill="#F1F5F9"/>
  <text x="380" y="201" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">受験資格</text>
  <rect x="484" y="178" width="256" height="36" rx="4" fill="#F3E8FF"/>
  <text x="612" y="201" text-anchor="middle" font-size="11" fill="#6D28D9">なし（誰でも受験可）</text>

  <rect x="20" y="220" width="256" height="36" rx="4" fill="#FFEDD5"/>
  <text x="148" y="243" text-anchor="middle" font-size="11" fill="#9A3412">500〜800時間</text>
  <rect x="284" y="220" width="192" height="36" rx="4" fill="#F1F5F9"/>
  <text x="380" y="243" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">必要勉強時間</text>
  <rect x="484" y="220" width="256" height="36" rx="4" fill="#F3E8FF"/>
  <text x="612" y="243" text-anchor="middle" font-size="11" fill="#6D28D9">600〜800時間</text>

  <rect x="20" y="262" width="256" height="44" rx="4" fill="#FFEDD5"/>
  <text x="148" y="280" text-anchor="middle" font-size="11" fill="#9A3412">労働・社会保険の手続き代行</text>
  <text x="148" y="297" text-anchor="middle" font-size="10" fill="#9A3412">給与計算・就業規則作成・年金相談</text>
  <rect x="284" y="262" width="192" height="44" rx="4" fill="#F1F5F9"/>
  <text x="380" y="285" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">独占業務</text>
  <rect x="484" y="262" width="256" height="44" rx="4" fill="#F3E8FF"/>
  <text x="612" y="280" text-anchor="middle" font-size="11" fill="#6D28D9">官公署への書類作成・提出代理</text>
  <text x="612" y="297" text-anchor="middle" font-size="10" fill="#6D28D9">許認可申請・契約書・遺言書作成</text>

  <rect x="20" y="314" width="256" height="44" rx="4" fill="#FED7AA"/>
  <text x="148" y="332" text-anchor="middle" font-size="11" fill="#9A3412">人事・労務・社会保険に強い</text>
  <text x="148" y="349" text-anchor="middle" font-size="10" fill="#9A3412">企業の人事部・社労士事務所で活躍</text>
  <rect x="284" y="314" width="192" height="44" rx="4" fill="#F1F5F9"/>
  <text x="380" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">活躍の場</text>
  <rect x="484" y="314" width="256" height="44" rx="4" fill="#EDE9FE"/>
  <text x="612" y="332" text-anchor="middle" font-size="11" fill="#6D28D9">法律全般・行政手続きに強い</text>
  <text x="612" y="349" text-anchor="middle" font-size="10" fill="#6D28D9">独立開業・行政書士事務所で活躍</text>

  <!-- Bottom recommendation -->
  <rect x="20" y="368" width="720" height="40" rx="8" fill="#1E293B"/>
  <rect x="28" y="376" width="330" height="24" rx="5" fill="#EA580C"/>
  <text x="193" y="393" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">労務・年金・給与を扱いたい → 社労士</text>
  <rect x="402" y="376" width="330" height="24" rx="5" fill="#7C3AED"/>
  <text x="567" y="393" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">法律全般・官公署手続きを扱いたい → 行政書士</text>
</svg>
