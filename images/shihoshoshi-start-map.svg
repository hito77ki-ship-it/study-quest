<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="360" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">司法書士——最初の7日間でやること</text>

  <!-- 7日間のタイムライン -->
  <rect x="20" y="52" width="96" height="64" rx="8" fill="#3B82F6"/>
  <text x="68" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Day 1</text>
  <text x="68" y="90" text-anchor="middle" font-size="9.5" fill="#DBEAFE">試験の</text>
  <text x="68" y="104" text-anchor="middle" font-size="9.5" fill="#DBEAFE">全体像を見る</text>

  <polygon points="122,84 117,79 117,89" fill="#94A3B8"/>

  <rect x="128" y="52" width="96" height="64" rx="8" fill="#3B82F6"/>
  <text x="176" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Day 2</text>
  <text x="176" y="90" text-anchor="middle" font-size="9.5" fill="#DBEAFE">民法から</text>
  <text x="176" y="104" text-anchor="middle" font-size="9.5" fill="#DBEAFE">スタート</text>

  <polygon points="230,84 225,79 225,89" fill="#94A3B8"/>

  <rect x="236" y="52" width="96" height="64" rx="8" fill="#22C55E"/>
  <text x="284" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Day 3</text>
  <text x="284" y="90" text-anchor="middle" font-size="9.5" fill="#DCFCE7">教材を</text>
  <text x="284" y="104" text-anchor="middle" font-size="9.5" fill="#DCFCE7">絞る</text>

  <polygon points="338,84 333,79 333,89" fill="#94A3B8"/>

  <rect x="344" y="52" width="96" height="64" rx="8" fill="#22C55E"/>
  <text x="392" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Day 4</text>
  <text x="392" y="90" text-anchor="middle" font-size="9.5" fill="#DCFCE7">過去問の</text>
  <text x="392" y="104" text-anchor="middle" font-size="9.5" fill="#DCFCE7">使い方を知る</text>

  <polygon points="446,84 441,79 441,89" fill="#94A3B8"/>

  <rect x="452" y="52" width="96" height="64" rx="8" fill="#F97316"/>
  <text x="500" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Day 5</text>
  <text x="500" y="90" text-anchor="middle" font-size="9.5" fill="#FFEDD5">民法総則を</text>
  <text x="500" y="104" text-anchor="middle" font-size="9.5" fill="#FFEDD5">1周する</text>

  <polygon points="554,84 549,79 549,89" fill="#94A3B8"/>

  <rect x="560" y="52" width="96" height="64" rx="8" fill="#F97316"/>
  <text x="608" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Day 6</text>
  <text x="608" y="90" text-anchor="middle" font-size="9.5" fill="#FFEDD5">意思表示・</text>
  <text x="608" y="104" text-anchor="middle" font-size="9.5" fill="#FFEDD5">代理を演習</text>

  <polygon points="662,84 657,79 657,89" fill="#94A3B8"/>

  <rect x="668" y="52" width="72" height="64" rx="8" fill="#EF4444"/>
  <text x="704" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Day 7</text>
  <text x="704" y="90" text-anchor="middle" font-size="9.5" fill="#FEE2E2">1週間を</text>
  <text x="704" y="104" text-anchor="middle" font-size="9.5" fill="#FEE2E2">振り返る</text>

  <!-- 各日詳細 -->
  <rect x="20" y="132" width="340" height="190" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="190" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">最初にやるべきこと</text>
  <rect x="36" y="160" width="308" height="26" rx="5" fill="#DBEAFE"/>
  <text x="190" y="177" text-anchor="middle" font-size="10.5" fill="#1D4ED8">試験の仕組みを把握する（Day1）</text>
  <text x="36" y="198" font-size="10" fill="#374151">午前35問（民法・会社法・憲法・刑法）</text>
  <text x="36" y="214" font-size="10" fill="#374151">午後35問（不動産登記法・商業登記法・訴訟法系）</text>
  <text x="36" y="230" font-size="10" fill="#374151">記述式2問（不動産登記・商業登記）</text>
  <text x="36" y="246" font-size="10" fill="#374151">口述試験（筆記合格者のみ・ほぼ全員合格）</text>
  <text x="36" y="266" font-size="10" fill="#64748B">合格率約4〜5%。毎年約2万人受験、約700人合格。</text>
  <text x="36" y="282" font-size="10" fill="#64748B">合格まで平均4〜5年。本試験は年1回（7月）。</text>
  <text x="36" y="298" font-size="10" fill="#64748B">基準点制（午前・午後・記述それぞれに足切りあり）。</text>

  <rect x="400" y="132" width="340" height="190" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="570" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#C2410C">学習ルールを決める（Day2〜4）</text>
  <rect x="416" y="160" width="308" height="26" rx="5" fill="#FFEDD5"/>
  <text x="570" y="177" text-anchor="middle" font-size="10.5" fill="#C2410C">教材は1セットに絞る（複数は NG）</text>
  <text x="416" y="198" font-size="10" fill="#374151">テキスト1冊 ＋ 過去問1冊に固定</text>
  <text x="416" y="214" font-size="10" fill="#374151">過去問は「なぜ正解か」まで理解する</text>
  <text x="416" y="230" font-size="10" fill="#374151">正答率より「理解の深さ」を優先する</text>
  <text x="416" y="250" font-size="10" fill="#64748B">民法から始める理由：</text>
  <text x="416" y="266" font-size="10" fill="#64748B">民法は全科目の土台。民法を制する者が</text>
  <text x="416" y="282" font-size="10" fill="#64748B">不動産登記法・会社法を制する。</text>
  <text x="416" y="298" font-size="10" fill="#64748B">最初の1週間は「型を作る」フェーズ。</text>

  <!-- Bottom -->
  <rect x="20" y="334" width="720" height="20" rx="5" fill="#F1F5F9"/>
  <text x="380" y="348" text-anchor="middle" font-size="10.5" fill="#475569">💡 7日目のゴール：「民法総則を読んだ」「毎日机に向かった」——この2つだけ達成すれば完璧な1週間。</text>
</svg>
