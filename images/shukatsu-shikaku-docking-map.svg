<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" width="780" height="460">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="780" height="460" rx="12" fill="#FAFDF6"/>
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">志望業界×資格ドッキング戦略マップ</text>
  <text x="390" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">志望業界のハコに、シンクロする資格をガチッとドッキングさせると評価が跳ね上がる</text>

  <!-- 業界ボックス（上段） -->
  <rect x="20" y="64" width="170" height="58" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="105" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">🏦 金融・保険</text>
  <text x="105" y="108" text-anchor="middle" font-size="9" fill="#1E40AF">数字への信頼が命</text>

  <rect x="210" y="64" width="170" height="58" rx="10" fill="#FFEDD5" stroke="#F97316" stroke-width="2"/>
  <text x="295" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#C2410C">🏭 メーカー・商社</text>
  <text x="295" y="108" text-anchor="middle" font-size="9" fill="#9A3412">グローバル×数字管理</text>

  <rect x="400" y="64" width="170" height="58" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="485" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#6D28D9">💻 IT・SaaS</text>
  <text x="485" y="108" text-anchor="middle" font-size="9" fill="#5B21B6">ITリテラシーが土台</text>

  <rect x="590" y="64" width="170" height="58" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="675" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#15803D">🏠 不動産</text>
  <text x="675" y="108" text-anchor="middle" font-size="9" fill="#166534">独占業務への本気度</text>

  <!-- ドッキング線 -->
  <line x1="105" y1="122" x2="105" y2="168" stroke="#93C5FD" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="295" y1="122" x2="295" y2="168" stroke="#FDBA74" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="485" y1="122" x2="485" y2="168" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="675" y1="122" x2="675" y2="168" stroke="#86EFAC" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ガチッ！ドッキングバッジ -->
  <circle cx="105" cy="170" r="14" fill="#3B82F6"/>
  <text x="105" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">ガチッ</text>
  <circle cx="295" cy="170" r="14" fill="#F97316"/>
  <text x="295" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">ガチッ</text>
  <circle cx="485" cy="170" r="14" fill="#8B5CF6"/>
  <text x="485" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">ガチッ</text>
  <circle cx="675" cy="170" r="14" fill="#22C55E"/>
  <text x="675" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">ガチッ</text>

  <!-- 資格ボックス（下段：ドッキング武器） -->
  <rect x="20" y="192" width="170" height="118" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="105" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1D4ED8">🔌 ドッキング武器</text>
  <text x="105" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">簿記2級</text>
  <text x="105" y="253" text-anchor="middle" font-size="9" fill="#1E40AF">＋FP3級（サブ）</text>
  <text x="105" y="275" text-anchor="middle" font-size="8.5" fill="#3B5BA9">「数字で語れる学生」</text>
  <text x="105" y="291" text-anchor="middle" font-size="8.5" fill="#3B5BA9">という一貫したストーリー</text>

  <rect x="210" y="192" width="170" height="118" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="2.5"/>
  <text x="295" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#C2410C">🔌 ドッキング武器</text>
  <text x="295" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#9A3412">TOEIC</text>
  <text x="295" y="253" text-anchor="middle" font-size="9" fill="#9A3412">＋簿記2級（サブ）</text>
  <text x="295" y="275" text-anchor="middle" font-size="8.5" fill="#B45309">グローバル対応力を</text>
  <text x="295" y="291" text-anchor="middle" font-size="8.5" fill="#B45309">数字で裏付けられる</text>

  <rect x="400" y="192" width="170" height="118" rx="10" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="485" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6D28D9">🔌 ドッキング武器</text>
  <text x="485" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">ITパスポート</text>
  <text x="485" y="253" text-anchor="middle" font-size="9" fill="#5B21B6">＋基本情報（サブ）</text>
  <text x="485" y="275" text-anchor="middle" font-size="8.5" fill="#6D28D9">非情報系でも通用する</text>
  <text x="485" y="291" text-anchor="middle" font-size="8.5" fill="#6D28D9">ITリテラシーの証明</text>

  <rect x="590" y="192" width="170" height="118" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="2.5"/>
  <text x="675" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#15803D">🔌 ドッキング武器</text>
  <text x="675" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">宅建</text>
  <text x="675" y="253" text-anchor="middle" font-size="9" fill="#166534">（独占業務資格）</text>
  <text x="675" y="275" text-anchor="middle" font-size="8.5" fill="#15803D">難易度の高さがそのまま</text>
  <text x="675" y="291" text-anchor="middle" font-size="8.5" fill="#15803D">本気度の証明になる</text>

  <!-- 下部サマリー -->
  <rect x="20" y="330" width="740" height="110" rx="10" fill="#1E293B"/>
  <text x="390" y="352" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8CC63F">ハコを間違えると、資格は「死に武器」になる</text>
  <text x="390" y="372" text-anchor="middle" font-size="9.5" fill="#CBD5E1">面接官が見ているのは資格の名前ではなく、志望業界のハコにシンクロした「なぜこれを選んだか」というストーリー。</text>
  <text x="390" y="390" text-anchor="middle" font-size="9.5" fill="#CBD5E1">簿記2級は金融・メーカーの両方でシンクロする、汎用性の高い万能ドッキング武器。</text>
  <text x="390" y="412" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FDE68A">志望業界を決めたら、まずそのハコに刺さる資格から逆算して選ぼう。</text>
</svg>
