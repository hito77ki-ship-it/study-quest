<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1720" viewBox="0 0 360 1720" role="img" aria-labelledby="title desc">
  <title id="title">調理師試験の食品衛生学における食中毒菌の分類と対策マップ（モバイル版）</title>
  <desc id="desc">食中毒菌を感染型・毒素型・中間型（生体内毒素型）に分類し、代表菌と加熱への耐性の違いを縦に並べて示す図解。黄色ブドウ球菌の毒素は加熱しても分解されない点が最大の試験ポイント</desc>
  <defs>
    <linearGradient id="mbg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="1" stop-color="#fff7fb"/>
    </linearGradient>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13px;font-weight:800;fill:#ffffff}
      .germname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#1f2937}
      .germbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
      .heat{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:800}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:700;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#78350f}
    </style>
  </defs>

  <rect width="360" height="1720" rx="20" fill="url(#mbg2)"/>

  <text x="180" y="28" text-anchor="middle" class="title">食中毒菌 分類マップ</text>
  <text x="180" y="46" text-anchor="middle" class="sub">感染型・毒素型・中間型——加熱への耐性の違いが合否を分ける</text>

  <!-- 感染型 -->
  <rect x="16" y="60" width="328" height="36" rx="12" fill="#3b82f6"/>
  <text x="180" y="84" text-anchor="middle" class="colhead">感染型</text>

  <rect x="16" y="106" width="328" height="16" text-anchor="middle"/>
  <text x="180" y="118" text-anchor="middle" class="germbody">菌そのものを摂取して腸内で増え、感染して発症</text>

  <rect x="24" y="132" width="312" height="92" rx="10" fill="#EFF6FF"/>
  <text x="40" y="156" class="germname">カンピロバクター</text>
  <text x="40" y="176" class="germbody">加熱不十分な鶏肉が原因。潜伏期間2〜5日と長い</text>
  <text x="40" y="206" class="heat" fill="#1D4ED8">🔥 加熱に弱い（菌は熱で死滅）</text>

  <rect x="24" y="232" width="312" height="92" rx="10" fill="#EFF6FF"/>
  <text x="40" y="256" class="germname">サルモネラ属菌</text>
  <text x="40" y="276" class="germbody">卵・食肉が主な原因。十分な加熱で予防できる</text>
  <text x="40" y="306" class="heat" fill="#1D4ED8">🔥 加熱に弱い（菌は熱で死滅）</text>

  <rect x="24" y="332" width="312" height="92" rx="10" fill="#EFF6FF"/>
  <text x="40" y="356" class="germname">腸炎ビブリオ</text>
  <text x="40" y="376" class="germbody">生の魚介類が主な原因。真水・加熱に弱い</text>
  <text x="40" y="406" class="heat" fill="#1D4ED8">🔥 加熱に弱い（菌は熱で死滅）</text>

  <rect x="24" y="432" width="312" height="92" rx="10" fill="#EFF6FF"/>
  <text x="40" y="456" class="germname">病原性大腸菌（O157等）</text>
  <text x="40" y="476" class="germbody">加熱不十分な食肉・生野菜が原因。ベロ毒素産生</text>
  <text x="40" y="506" class="heat" fill="#1D4ED8">🔥 加熱に弱い（中心75℃1分で死滅）</text>

  <!-- 毒素型 -->
  <rect x="16" y="542" width="328" height="36" rx="12" fill="#f97316"/>
  <text x="180" y="566" text-anchor="middle" class="colhead">毒素型</text>

  <text x="180" y="596" text-anchor="middle" class="germbody">食品中で増えた菌が毒素を産生し発症</text>

  <rect x="24" y="610" width="312" height="176" rx="10" fill="#FFF7ED"/>
  <text x="40" y="634" class="germname">黄色ブドウ球菌</text>
  <text x="40" y="654" class="germbody">おにぎり・弁当が主な原因。手指の傷口から汚染</text>
  <text x="40" y="680" class="heat" fill="#C2410C">🔥🔥🔥 毒素（エンテロトキシン）は</text>
  <text x="40" y="700" class="heat" fill="#C2410C">100℃で加熱しても分解されない！</text>
  <text x="40" y="722" class="germbody">→ 加熱後の食品でも安心できない最重要ポイント</text>
  <text x="40" y="740" class="germbody">予防は「菌を付けない・増やさない」しかない</text>

  <rect x="24" y="796" width="312" height="142" rx="10" fill="#FFF7ED"/>
  <text x="40" y="820" class="germname">ボツリヌス菌</text>
  <text x="40" y="840" class="germbody">缶詰・瓶詰・真空パックなど酸素の少ない食品が原因</text>
  <text x="40" y="864" class="heat" fill="#C2410C">🔥 毒素自体は熱に弱い（80℃30分で失活）</text>
  <text x="40" y="884" class="germbody">ただし芽胞は非常に耐熱性が高く長時間の加熱が必要</text>
  <text x="40" y="904" class="germbody">神経毒で麻痺症状を起こす致死率の高い食中毒</text>

  <!-- 中間型 -->
  <rect x="16" y="954" width="328" height="36" rx="12" fill="#a855f7"/>
  <text x="180" y="978" text-anchor="middle" class="colhead">中間型（生体内毒素型）</text>

  <text x="180" y="1008" text-anchor="middle" class="germbody">体内（腸管内）で菌が増殖し毒素を作って発症</text>

  <rect x="24" y="1022" width="312" height="132" rx="10" fill="#FAF5FF"/>
  <text x="40" y="1046" class="germname">ウェルシュ菌</text>
  <text x="40" y="1066" class="germbody">カレー・シチューなど大量調理の煮込み料理が原因</text>
  <text x="40" y="1092" class="heat" fill="#7E22CE">🔥 芽胞は耐熱性が高く、加熱調理でも生き残る</text>
  <text x="40" y="1114" class="germbody">冷めていく過程で再増殖するため、粗熱を取って</text>
  <text x="40" y="1134" class="germbody">すぐ冷蔵・小分け保存するのが予防の鉄則</text>

  <rect x="24" y="1166" width="312" height="112" rx="10" fill="#FAF5FF"/>
  <text x="40" y="1190" class="germname">セレウス菌（下痢型）</text>
  <text x="40" y="1210" class="germbody">米飯・パスタなどが原因。芽胞を形成する菌</text>
  <text x="40" y="1238" class="heat" fill="#7E22CE">🔥 芽胞は耐熱性が高い</text>
  <text x="40" y="1260" class="germbody">作り置きご飯の常温放置に特に注意</text>

  <rect x="24" y="1290" width="312" height="128" rx="10" fill="#F1F5F9"/>
  <text x="40" y="1314" class="germbody" font-weight="700">分類のコツ</text>
  <text x="40" y="1336" class="germbody">・菌そのものが原因＝感染型</text>
  <text x="40" y="1356" class="germbody">・食品中で作った毒素が原因＝毒素型</text>
  <text x="40" y="1376" class="germbody">・体内で作った毒素が原因＝中間型</text>
  <text x="40" y="1398" class="germbody">この3分類の軸で覚えると迷わない</text>

  <!-- Bottom banner -->
  <rect x="16" y="1436" width="328" height="264" rx="16" fill="#fffbeb" stroke="#fcd34d" stroke-width="2.5"/>
  <text x="180" y="1462" text-anchor="middle" class="banner">試験最大の落とし穴：</text>
  <text x="180" y="1482" text-anchor="middle" class="banner">「加熱すれば防げる」は間違い</text>
  <text x="180" y="1508" text-anchor="middle" class="bannersmall">黄色ブドウ球菌のエンテロトキシンは耐熱性</text>
  <text x="180" y="1526" text-anchor="middle" class="bannersmall">——一度作られた毒素は100℃で加熱しても</text>
  <text x="180" y="1544" text-anchor="middle" class="bannersmall">分解されない</text>
  <text x="180" y="1568" text-anchor="middle" class="bannersmall">ウェルシュ菌・セレウス菌・ボツリヌス菌の</text>
  <text x="180" y="1586" text-anchor="middle" class="bannersmall">「芽胞」も加熱に強く、通常の調理温度では</text>
  <text x="180" y="1604" text-anchor="middle" class="bannersmall">死滅しないことがある</text>
  <text x="180" y="1628" text-anchor="middle" class="bannersmall">だからこそ「菌を付けない・増やさない・</text>
  <text x="180" y="1646" text-anchor="middle" class="bannersmall">早く冷やす」が食品衛生学の核心になる</text>
</svg>
