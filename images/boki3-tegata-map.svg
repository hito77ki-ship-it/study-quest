<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">紙の約束手形と電子記録債権（でんさい）のデータフロー対比</title>
  <desc id="desc">紙の約束手形は振出・郵送・保管・銀行持参という物理的な手間とリスクを伴うのに対し、でんさいは発生記録から決済までオンラインで完結し、2026年に紙の手形が事実上廃止されでんさいへ全面移行することを示す図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#fff7fb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#667085" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:29px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:600;fill:#64748b}
      .pill{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:17px;font-weight:800;fill:#ffffff}
      .stepnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .stepname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:800;fill:#1f2937}
      .stepbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:600;fill:#475569}
      .tag{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15.5px;font-weight:700;fill:#166534}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="1200" height="820" rx="40" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="64" fill="#fee2e2" opacity="0.5"/>
  <circle cx="1100" cy="110" r="78" fill="#dcfce7" opacity="0.55"/>
  <circle cx="1090" cy="760" r="88" fill="#dbeafe" opacity="0.5"/>
  <circle cx="110" cy="750" r="70" fill="#fef3c7" opacity="0.5"/>

  <text x="600" y="52" text-anchor="middle" class="title">紙の約束手形 vs でんさい データフロー対比</text>
  <text x="600" y="80" text-anchor="middle" class="sub">2026年、紙の手形は姿を消し「でんさい（電子記録債権）」へ全面移行する</text>

  <!-- Left column: 紙の約束手形（廃止へ） -->
  <g filter="url(#softShadow)">
    <rect x="70" y="112" width="500" height="44" rx="16" fill="#f87171"/>
    <text x="320" y="140" text-anchor="middle" class="colhead">紙の約束手形（2026年に事実上廃止）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="70" y="172" width="500" height="470" rx="22" fill="#ffffff" stroke="#fca5a5" stroke-width="3"/>

    <circle cx="108" cy="212" r="18" fill="#f87171"/>
    <text x="108" y="217" text-anchor="middle" class="stepnum">1</text>
    <text x="136" y="208" class="stepname">振出（手書き・押印）</text>
    <text x="136" y="228" class="stepbody">手形用紙に金額・期日を記入し、印鑑を押して作成する</text>

    <line x1="108" y1="230" x2="108" y2="266" stroke="#fca5a5" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="108" cy="284" r="18" fill="#f87171"/>
    <text x="108" y="289" text-anchor="middle" class="stepnum">2</text>
    <text x="136" y="280" class="stepname">郵送・手渡し（数日）</text>
    <text x="136" y="300" class="stepbody">相手に届くまでタイムラグが発生。紛失・盗難のリスクあり</text>

    <line x1="108" y1="302" x2="108" y2="338" stroke="#fca5a5" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="108" cy="356" r="18" fill="#f87171"/>
    <text x="108" y="361" text-anchor="middle" class="stepnum">3</text>
    <text x="136" y="352" class="stepname">金庫で保管</text>
    <text x="136" y="372" class="stepbody">満期日まで現物を保管。劣化・紛失・盗難のリスクを抱え続ける</text>

    <line x1="108" y1="374" x2="108" y2="410" stroke="#fca5a5" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="108" cy="428" r="18" fill="#f87171"/>
    <text x="108" y="433" text-anchor="middle" class="stepnum">4</text>
    <text x="136" y="424" class="stepname">銀行へ持参・取立依頼</text>
    <text x="136" y="444" class="stepbody">満期日に窓口へ持ち込み、取立を依頼してようやく現金化</text>

    <rect x="96" y="470" width="450" height="150" rx="14" fill="#fef2f2"/>
    <text x="120" y="498" class="tag" fill="#b91c1c">✕ 印紙税がかかる（金額に応じて課税）</text>
    <text x="120" y="524" class="tag" fill="#b91c1c">✕ 紛失・盗難リスクが常につきまとう</text>
    <text x="120" y="550" class="tag" fill="#b91c1c">✕ 分割譲渡ができない（全額譲渡のみ）</text>
    <text x="120" y="576" class="tag" fill="#b91c1c">✕ 現金化まで物理的なタイムラグが発生</text>
    <text x="120" y="602" class="tag" fill="#b91c1c">✕ 全銀協が2026年めどに廃止を推進中</text>
  </g>

  <!-- Right column: でんさい（電子記録債権） -->
  <g filter="url(#softShadow)">
    <rect x="630" y="112" width="500" height="44" rx="16" fill="#22c55e"/>
    <text x="880" y="140" text-anchor="middle" class="colhead">でんさい（電子記録債権・現行の移行先）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="630" y="172" width="500" height="470" rx="22" fill="#ffffff" stroke="#86efac" stroke-width="3"/>

    <circle cx="668" cy="212" r="18" fill="#22c55e"/>
    <text x="668" y="217" text-anchor="middle" class="stepnum">1</text>
    <text x="696" y="208" class="stepname">発生記録（オンライン登録）</text>
    <text x="696" y="228" class="stepbody">でんさいネットにアクセスし、金額・期日を数分で電子登録</text>

    <line x1="668" y1="230" x2="668" y2="266" stroke="#86efac" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="668" cy="284" r="18" fill="#22c55e"/>
    <text x="668" y="289" text-anchor="middle" class="stepnum">2</text>
    <text x="696" y="280" class="stepname">電子データで銀行間共有</text>
    <text x="696" y="300" class="stepbody">記録と同時に取引銀行間でデータが即座に共有される</text>

    <line x1="668" y1="302" x2="668" y2="338" stroke="#86efac" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="668" cy="356" r="18" fill="#22c55e"/>
    <text x="668" y="361" text-anchor="middle" class="stepnum">3</text>
    <text x="696" y="352" class="stepname">必要な分だけ分割譲渡</text>
    <text x="696" y="372" class="stepbody">全額でなく一部だけを電子記録上で譲渡することも可能</text>

    <line x1="668" y1="374" x2="668" y2="410" stroke="#86efac" stroke-width="2" stroke-dasharray="3,3"/>
    <circle cx="668" cy="428" r="18" fill="#22c55e"/>
    <text x="668" y="433" text-anchor="middle" class="stepnum">4</text>
    <text x="696" y="424" class="stepname">満期日に口座間で自動決済</text>
    <text x="696" y="444" class="stepbody">窓口に行く必要はなく、口座間の資金移動が自動処理される</text>

    <rect x="656" y="470" width="450" height="150" rx="14" fill="#f0fdf4"/>
    <text x="680" y="498" class="tag" fill="#166534">◯ 印紙税は不要（電子記録のため）</text>
    <text x="680" y="524" class="tag" fill="#166534">◯ 紛失・盗難リスクがゼロ</text>
    <text x="680" y="550" class="tag" fill="#166534">◯ 分割譲渡ができ資金繰りが柔軟</text>
    <text x="680" y="576" class="tag" fill="#166534">◯ 決済まで物理的なタイムラグがない</text>
    <text x="680" y="602" class="tag" fill="#166534">◯ 経産省・全銀協が移行を強力に後押し</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="70" y="662" width="1060" height="128" rx="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="3"/>
    <text x="600" y="698" text-anchor="middle" class="banner" fill="#92400e">2026年、紙の約束手形は事実上の廃止へ</text>
    <text x="600" y="726" text-anchor="middle" class="bannersmall">経産省・全銀協の方針により、紙の手形・小切手の利用を推進する制度が終了し、でんさいへの全面移行が進む</text>
    <text x="600" y="750" text-anchor="middle" class="bannersmall">簿記の学習内容も「紙の手形は過去の話、これからはでんさいが標準」という前提に置き換わりつつある</text>
    <text x="600" y="774" text-anchor="middle" class="bannersmall">仕訳の考え方は同じでも、勘定科目名（電子記録債権・電子記録債務）の出題比重は今後さらに高まる</text>
  </g>
</svg>
