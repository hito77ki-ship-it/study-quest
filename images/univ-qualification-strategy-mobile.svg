<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1030" width="360" height="1030" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">資格戦略マップ：闇雲コレクター型 vs 逆算ハンター型（モバイル版）</title>
  <desc id="desc">とにかく資格を集める闇雲コレクター型と、なりたい姿から逆算して資格を絞る逆算ハンター型の2つの戦略を縦に並べて比較する図解</desc>
  <defs>
    <linearGradient id="bgGm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>

  <rect width="360" height="1030" fill="url(#bgGm)"/>

  <text x="180" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1A202C">資格戦略マップ</text>
  <text x="180" y="48" text-anchor="middle" font-size="10.5" fill="#64748B">闇雲コレクター型 vs 逆算ハンター型</text>

  <!-- LEFT PANEL (闇雲コレクター型) -->
  <rect x="20" y="66" width="320" height="420" rx="14" fill="#F8FAFC" stroke="#CBD5E0" stroke-width="1.5"/>
  <rect x="20" y="66" width="320" height="70" rx="14" fill="#475569"/>
  <rect x="20" y="112" width="320" height="24" fill="#475569"/>
  <circle cx="56" cy="98" r="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="56" y="106" text-anchor="middle" font-size="18" font-weight="700" fill="rgba(255,255,255,0.8)">?</text>
  <text x="200" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">闇雲コレクター型</text>
  <text x="200" y="114" text-anchor="middle" font-size="10.5" fill="#CBD5E0">とにかく数を集める・迷子プレイヤー</text>

  <circle cx="180" cy="182" r="26" fill="#CBD5E0" stroke="#94A3B8" stroke-width="2"/>
  <text x="180" y="190" text-anchor="middle" font-size="22" font-weight="700" fill="#64748B">?</text>

  <!-- scattered badges -->
  <g transform="translate(90,244) rotate(-10)">
    <rect x="-40" y="-13" width="80" height="26" rx="13" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">英検2級</text>
  </g>
  <g transform="translate(266,244) rotate(8)">
    <rect x="-30" y="-13" width="60" height="26" rx="13" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">MOS</text>
  </g>
  <g transform="translate(90,296) rotate(7)">
    <rect x="-34" y="-13" width="68" height="26" rx="13" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">FP3級</text>
  </g>
  <g transform="translate(266,296) rotate(-9)">
    <rect x="-42" y="-13" width="84" height="26" rx="13" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">色彩検定</text>
  </g>
  <g transform="translate(90,348) rotate(-6)">
    <rect x="-42" y="-13" width="84" height="26" rx="13" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">普通免許</text>
  </g>
  <g transform="translate(266,348) rotate(9)">
    <rect x="-40" y="-13" width="80" height="26" rx="13" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">簿記3級</text>
  </g>

  <rect x="34" y="404" width="292" height="60" rx="8" fill="#E2E8F0"/>
  <text x="180" y="426" text-anchor="middle" font-size="11.5" fill="#475569" font-weight="700">「結局なにがしたいの？」</text>
  <text x="180" y="444" text-anchor="middle" font-size="11.5" fill="#475569" font-weight="700">と聞かれると詰まる…</text>
  <text x="180" y="460" text-anchor="middle" font-size="10" fill="#718096">時間も労力もムダになる最悪パターン</text>

  <!-- VS badge -->
  <circle cx="180" cy="514" r="28" fill="#0F172A" stroke="#fff" stroke-width="3"/>
  <text x="180" y="522" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">VS</text>

  <!-- RIGHT PANEL (逆算ハンター型) -->
  <rect x="20" y="560" width="320" height="560" rx="14" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <rect x="20" y="560" width="320" height="70" rx="14" fill="#047857"/>
  <rect x="20" y="606" width="320" height="24" fill="#047857"/>
  <circle cx="56" cy="592" r="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <circle cx="56" cy="592" r="12" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="56" cy="592" r="4" fill="rgba(255,255,255,0.85)"/>
  <text x="200" y="588" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">逆算ハンター型</text>
  <text x="200" y="608" text-anchor="middle" font-size="10.5" fill="#A7F3D0">なりたい姿から計算する・戦略家プレイヤー</text>

  <!-- STEP 1 -->
  <rect x="36" y="646" width="288" height="56" rx="10" fill="#047857"/>
  <text x="180" y="666" text-anchor="middle" font-size="11" fill="#A7F3D0" font-weight="700">STEP 1／なりたいジョブを決める</text>
  <text x="180" y="686" text-anchor="middle" font-size="11.5" fill="#fff">会計プロ／総合職／エンジニア…</text>

  <line x1="180" y1="702" x2="180" y2="726" stroke="#059669" stroke-width="2.5" stroke-dasharray="4,3"/>
  <polygon points="174,725 186,725 180,737" fill="#059669"/>
  <text x="220" y="718" font-size="10.5" fill="#047857" font-weight="700">逆算</text>

  <!-- STEP 2 -->
  <rect x="36" y="744" width="288" height="86" rx="10" fill="#065F46"/>
  <text x="180" y="766" text-anchor="middle" font-size="11" fill="#A7F3D0" font-weight="700">STEP 2／必要な武器（資格）を絞る</text>
  <rect x="50" y="776" width="126" height="28" rx="6" fill="#047857"/>
  <text x="113" y="795" text-anchor="middle" font-size="10.5" fill="#fff" font-weight="700">簿記2級＋TOEIC</text>
  <rect x="184" y="776" width="126" height="28" rx="6" fill="#047857"/>
  <text x="247" y="795" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="700">CPA/基本情報</text>

  <line x1="180" y1="838" x2="180" y2="862" stroke="#059669" stroke-width="2.5" stroke-dasharray="4,3"/>
  <polygon points="174,861 186,861 180,873" fill="#059669"/>
  <text x="220" y="854" font-size="10.5" fill="#047857" font-weight="700">集中！</text>

  <!-- STEP 3 -->
  <rect x="36" y="880" width="288" height="56" rx="10" fill="#047857"/>
  <text x="180" y="900" text-anchor="middle" font-size="11" fill="#A7F3D0" font-weight="700">STEP 3／1点集中で最速攻略！</text>
  <text x="180" y="920" text-anchor="middle" font-size="11" fill="#fff">資格取得→実力の証明→内定獲得</text>

  <rect x="36" y="952" width="288" height="60" rx="8" fill="#059669"/>
  <text x="180" y="974" text-anchor="middle" font-size="11.5" fill="#fff" font-weight="700">「○○になりたい」という軸で</text>
  <text x="180" y="992" text-anchor="middle" font-size="11.5" fill="#fff" font-weight="700">面接無双！</text>
  <text x="180" y="1008" text-anchor="middle" font-size="10" fill="#A7F3D0">最短で市場価値MAX→就活で圧倒的優位</text>
</svg>
