<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">大谷流・資格併用の8:2黄金比バランスマップ</text>
  <text x="380" y="52" text-anchor="middle" font-size="11" fill="#64748B">脳内のエネルギーを本命8割・サブ2割に配分し、直前期のバッティングを防ぐ</text>

  <!-- container box representing "脳内の全エネルギー" -->
  <rect x="46" y="76" width="668" height="230" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="380" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">脳内エネルギー 100% のハコ</text>

  <!-- Main box: 本命資格 80% -->
  <rect x="66" y="112" width="500" height="176" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="316" y="146" text-anchor="middle" font-size="16" font-weight="700" fill="#1D4ED8">本命資格</text>
  <text x="316" y="168" text-anchor="middle" font-size="12.5" fill="#1E40AF">レベル上げの主軸 ── 難関・重量級</text>
  <rect x="106" y="184" width="420" height="30" rx="15" fill="#3B82F6"/>
  <text x="316" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">80%</text>
  <text x="316" y="234" text-anchor="middle" font-size="11" fill="#1E40AF">例：公認会計士・税理士・簿記1級 など</text>
  <text x="316" y="254" text-anchor="middle" font-size="10.5" fill="#3B82F6">毎日の学習時間の大半をここに投下</text>
  <rect x="106" y="264" width="420" height="16" rx="8" fill="#93C5FD"/>
  <text x="316" y="276" text-anchor="middle" font-size="9" fill="#1E3A8A">直前期は他を止めてでも本命を守る</text>

  <!-- Sub box: サブ資格 20% -->
  <rect x="580" y="112" width="114" height="176" rx="12" fill="#FEF9C3" stroke="#EAB308" stroke-width="2.5"/>
  <text x="637" y="140" text-anchor="middle" font-size="13.5" font-weight="700" fill="#A16207">サブ資格</text>
  <text x="637" y="158" text-anchor="middle" font-size="9.5" fill="#854D0E">息抜きの</text>
  <text x="637" y="171" text-anchor="middle" font-size="9.5" fill="#854D0E">ノーコスト</text>
  <rect x="596" y="182" width="82" height="26" rx="13" fill="#EAB308"/>
  <text x="637" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">20%</text>
  <text x="637" y="228" text-anchor="middle" font-size="9" fill="#854D0E">例：ITパスポート</text>
  <text x="637" y="242" text-anchor="middle" font-size="9" fill="#854D0E">TOEIC・MOS など</text>
  <text x="637" y="264" text-anchor="middle" font-size="8.5" fill="#A16207">疲れた日に軽く触る程度</text>

  <!-- divider between boxes -->
  <line x1="576" y1="112" x2="576" y2="288" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom note bar -->
  <rect x="46" y="328" width="668" height="52" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="350" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">主従を先に固定してから逆算 ── 8:2の比率を崩さなければ併用は破綻しない</text>
  <text x="380" y="368" text-anchor="middle" font-size="9.5" fill="#B45309">両方を「本命」にした瞬間、この比率が1:1に崩れて計画が破綻する</text>
</svg>
