<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1180" width="360" height="1180">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="1180" rx="14" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">簿記は「経理だけのもの」じゃない</text>
  <text x="180" y="44" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">こんな場面で役立つ</text>

  <!-- Card 1 経理 -->
  <rect x="20" y="62" width="320" height="150" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="62" width="320" height="34" rx="10" fill="#3B82F6"/>
  <rect x="20" y="84" width="320" height="12" fill="#3B82F6"/>
  <text x="180" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">📒 経理・会計担当</text>
  <text x="180" y="118" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">取引を正確に記録</text>
  <text x="180" y="136" text-anchor="middle" font-size="10.5" fill="#374151">仕訳・帳簿管理・決算書の作成が仕事</text>
  <text x="180" y="158" text-anchor="middle" font-size="10.5" fill="#1D4ED8">→ 簿記は必須スキル（特に2〜3級が評価）</text>
  <text x="180" y="178" text-anchor="middle" font-size="10" fill="#94A3B8">求人で「簿記2級以上」と書かれることが多い</text>

  <!-- Card 2 営業 -->
  <rect x="20" y="228" width="320" height="150" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="20" y="228" width="320" height="34" rx="10" fill="#22C55E"/>
  <rect x="20" y="250" width="320" height="12" fill="#22C55E"/>
  <text x="180" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">💼 営業・企画担当</text>
  <text x="180" y="284" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">数字を読んで動く</text>
  <text x="180" y="302" text-anchor="middle" font-size="10.5" fill="#374151">売上・利益・コストの構造が見えるようになる</text>
  <text x="180" y="324" text-anchor="middle" font-size="10.5" fill="#166534">→ 提案資料の説得力アップ</text>
  <text x="180" y="344" text-anchor="middle" font-size="10.5" fill="#166534">→ 利益率の改善提案が自分でできる</text>

  <!-- Card 3 経営者 -->
  <rect x="20" y="394" width="320" height="150" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="20" y="394" width="320" height="34" rx="10" fill="#F97316"/>
  <rect x="20" y="416" width="320" height="12" fill="#F97316"/>
  <text x="180" y="416" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">👑 経営者・管理職</text>
  <text x="180" y="450" text-anchor="middle" font-size="11.5" font-weight="700" fill="#C2410C">数字で意思決定</text>
  <text x="180" y="468" text-anchor="middle" font-size="10.5" fill="#374151">決算書を読んで会社の状態を把握する</text>
  <text x="180" y="490" text-anchor="middle" font-size="10.5" fill="#C2410C">→ 投資するか節約するか判断／黒字倒産を防ぐ</text>
  <text x="180" y="510" text-anchor="middle" font-size="10" fill="#94A3B8">（売上があっても現金がなければ倒産）</text>

  <!-- Card 4 就職・投資 -->
  <rect x="20" y="560" width="320" height="166" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="20" y="560" width="320" height="34" rx="10" fill="#7C3AED"/>
  <rect x="20" y="582" width="320" height="12" fill="#7C3AED"/>
  <text x="180" y="582" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🎯 就職・転職・投資</text>
  <text x="180" y="616" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5B21B6">人生全体で役立つ</text>
  <text x="180" y="636" text-anchor="middle" font-size="10.5" fill="#374151">就職活動での差別化・株式投資の企業分析</text>
  <text x="180" y="654" text-anchor="middle" font-size="10.5" fill="#374151">副業・フリーランスの確定申告の自己管理</text>
  <text x="180" y="678" text-anchor="middle" font-size="10.5" fill="#5B21B6">→ 3級でも大きな武器に</text>

  <!-- bottom summary -->
  <rect x="16" y="748" width="328" height="150" rx="10" fill="#F0FFF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="180" y="774" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">簿記を学ぶ意味</text>
  <text x="180" y="792" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">「記録する力」は「読む力」でもある</text>
  <text x="180" y="816" text-anchor="middle" font-size="10.5" fill="#374151">簿記の記録ルールを知ると、会社の決算書</text>
  <text x="180" y="834" text-anchor="middle" font-size="10.5" fill="#374151">（財務諸表）を自分で読めるようになります。</text>
  <text x="180" y="856" text-anchor="middle" font-size="10.5" fill="#374151">「儲かっているか」「借金は返せるか」が</text>
  <text x="180" y="874" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">数字から分かる、全員に役立つスキルです</text>
</svg>
