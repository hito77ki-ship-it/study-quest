<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="970" viewBox="0 0 1200 970" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">介護福祉士試験の13科目配点ウェイトと足切り回避の合格戦略マップ</title>
  <desc id="svgdesc">生活支援技術という最大出題科目のボリューム感と、13科目すべてに存在する1点以上の足切り防衛線の位置関係を示す図解</desc>
  <defs>
    <linearGradient id="kBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8f4"/>
      <stop offset="0.5" stop-color="#f4fbff"/>
      <stop offset="1" stop-color="#f7fff4"/>
    </linearGradient>
    <linearGradient id="kTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="kBoss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="kRow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BFDBFE"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="kRow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DDD6FE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="kRow3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="kShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <style>.kt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="970" rx="20" fill="url(#kBg)"/>
  <circle cx="100" cy="120" r="90" fill="#FFEDD5" opacity="0.5"/>
  <circle cx="1100" cy="140" r="100" fill="#DBEAFE" opacity="0.45"/>
  <circle cx="600" cy="940" r="120" fill="#D1FAE5" opacity="0.4"/>

  <!-- Title bar -->
  <rect x="40" y="24" width="1120" height="64" rx="14" fill="url(#kTitle)"/>
  <text x="600" y="46" text-anchor="middle" class="kt" font-size="11.5" font-weight="700" fill="#94A3B8" letter-spacing="2">13科目すべてを均等に丸暗記しない</text>
  <text x="600" y="72" text-anchor="middle" class="kt" font-size="19" font-weight="800" fill="#FFFFFF">介護福祉士 13科目 配点（はいてん）ウェイト × 足切り（あしきり）回避マップ</text>
  <text x="600" y="106" text-anchor="middle" class="kt" font-size="13" fill="#64748B">合格基準は「総得点60%程度」かつ「13科目すべてで1点以上」。巨大ボスを味方にしつつ全科目の防衛線（ぼうえいせん）も死守する</text>

  <!-- ============ PANEL A: 配点ウェイトマップ ============ -->
  <g filter="url(#kShadow)">
    <rect x="40" y="110" width="1120" height="500" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  </g>
  <text x="70" y="142" class="kt" font-size="15" font-weight="800" fill="#166534">PHASE 1　配点ウェイトマップ——生活支援技術（せいかつしえんぎじゅつ）という巨大ボスを最優先で味方に</text>
  <text x="70" y="163" class="kt" font-size="12" fill="#64748B">箱の大きさ＝出題数のイメージ。全125問中26問を占める最大科目を、まず得点源として押さえる。</text>

  <!-- BOSS BOX: 生活支援技術 -->
  <rect x="70" y="185" width="300" height="410" rx="16" fill="url(#kBoss)" filter="url(#kShadow)"/>
  <text x="220" y="222" text-anchor="middle" class="kt" font-size="11" fill="rgba(255,255,255,.82)" letter-spacing="1">せいかつしえんぎじゅつ</text>
  <text x="220" y="252" text-anchor="middle" class="kt" font-size="21" font-weight="800" fill="#fff">生活支援技術</text>
  <text x="220" y="340" text-anchor="middle" class="kt" font-size="58" font-weight="800" fill="#fff">26問</text>
  <text x="220" y="378" text-anchor="middle" class="kt" font-size="13" font-weight="700" fill="#F0FDF4">全125問中 最大の得点源</text>
  <text x="220" y="398" text-anchor="middle" class="kt" font-size="12" fill="#DCFCE7">ここを最優先で味方につける</text>
  <rect x="130" y="530" width="180" height="40" rx="20" fill="rgba(255,255,255,.22)" stroke="#fff" stroke-width="1.5"/>
  <text x="220" y="555" text-anchor="middle" class="kt" font-size="13" font-weight="800" fill="#fff">出題数 No.1 ボス</text>

  <!-- Row1: 総合問題12 / 社会の理解12 / こころとからだ12 / 認知症10 -->
  <rect x="400" y="185" width="144" height="120" rx="10" fill="url(#kRow1)"/>
  <text x="472" y="230" text-anchor="middle" class="kt" font-size="11" font-weight="700" fill="#1E3A8A">総合問題</text>
  <text x="472" y="256" text-anchor="middle" class="kt" font-size="18" font-weight="800" fill="#1E3A8A">12問</text>

  <rect x="554" y="185" width="144" height="120" rx="10" fill="url(#kRow1)"/>
  <text x="626" y="230" text-anchor="middle" class="kt" font-size="11" font-weight="700" fill="#1E3A8A">社会の理解</text>
  <text x="626" y="256" text-anchor="middle" class="kt" font-size="18" font-weight="800" fill="#1E3A8A">12問</text>

  <rect x="708" y="185" width="144" height="120" rx="10" fill="url(#kRow1)"/>
  <text x="780" y="230" text-anchor="middle" class="kt" font-size="11" font-weight="700" fill="#1E3A8A">からだのしくみ</text>
  <text x="780" y="256" text-anchor="middle" class="kt" font-size="18" font-weight="800" fill="#1E3A8A">12問</text>

  <rect x="862" y="185" width="120" height="120" rx="10" fill="url(#kRow1)"/>
  <text x="922" y="230" text-anchor="middle" class="kt" font-size="11" font-weight="700" fill="#1E3A8A">認知症</text>
  <text x="922" y="256" text-anchor="middle" class="kt" font-size="18" font-weight="800" fill="#1E3A8A">10問</text>

  <!-- Row2: 障害10 / 介護基本10 / 発達老化8 / 介護過程8 -->
  <rect x="400" y="330" width="120" height="120" rx="10" fill="url(#kRow2)"/>
  <text x="460" y="375" text-anchor="middle" class="kt" font-size="11" font-weight="700" fill="#4C1D95">障害の理解</text>
  <text x="460" y="401" text-anchor="middle" class="kt" font-size="18" font-weight="800" fill="#4C1D95">10問</text>

  <rect x="530" y="330" width="120" height="120" rx="10" fill="url(#kRow2)"/>
  <text x="590" y="375" text-anchor="middle" class="kt" font-size="11" font-weight="700" fill="#4C1D95">介護の基本</text>
  <text x="590" y="401" text-anchor="middle" class="kt" font-size="18" font-weight="800" fill="#4C1D95">10問</text>

  <rect x="660" y="330" width="96" height="120" rx="10" fill="url(#kRow2)"/>
  <text x="708" y="375" text-anchor="middle" class="kt" font-size="10.5" font-weight="700" fill="#4C1D95">発達・老化</text>
  <text x="708" y="401" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#4C1D95">8問</text>

  <rect x="766" y="330" width="96" height="120" rx="10" fill="url(#kRow2)"/>
  <text x="814" y="375" text-anchor="middle" class="kt" font-size="10.5" font-weight="700" fill="#4C1D95">介護過程</text>
  <text x="814" y="401" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#4C1D95">8問</text>

  <!-- Row3: コミュ技術6 / 医療的ケア5 / 人間関係4 / 尊厳自立2 -->
  <rect x="400" y="475" width="72" height="120" rx="8" fill="url(#kRow3)"/>
  <text x="436" y="530" text-anchor="middle" class="kt" font-size="9.5" font-weight="700" fill="#92400E">コミュ技術</text>
  <text x="436" y="550" text-anchor="middle" class="kt" font-size="14" font-weight="800" fill="#92400E">6問</text>

  <rect x="482" y="475" width="60" height="120" rx="8" fill="url(#kRow3)"/>
  <text x="512" y="530" text-anchor="middle" class="kt" font-size="9" font-weight="700" fill="#92400E">医療的ケア</text>
  <text x="512" y="550" text-anchor="middle" class="kt" font-size="14" font-weight="800" fill="#92400E">5問</text>

  <rect x="552" y="475" width="48" height="120" rx="8" fill="url(#kRow3)"/>
  <text x="576" y="530" text-anchor="middle" class="kt" font-size="8.5" font-weight="700" fill="#92400E">人間関係</text>
  <text x="576" y="550" text-anchor="middle" class="kt" font-size="13" font-weight="800" fill="#92400E">4問</text>

  <rect x="610" y="475" width="24" height="120" rx="6" fill="url(#kRow3)"/>
  <text x="622" y="540" text-anchor="middle" class="kt" font-size="12" font-weight="800" fill="#92400E">2</text>

  <!-- callout for smallest box -->
  <line x1="622" y1="475" x2="622" y2="455" stroke="#92400E" stroke-width="1.5" stroke-dasharray="3 3"/>
  <rect x="646" y="475" width="316" height="40" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="804" y="500" text-anchor="middle" class="kt" font-size="11.5" fill="#92400E">← 最小科目「人間の尊厳と自立」も、たった2問だからこそ1点死守が重要</text>

  <!-- ============ PANEL B: 13科目 1点死守防衛線 ============ -->
  <g filter="url(#kShadow)">
    <rect x="40" y="630" width="1120" height="280" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  </g>
  <text x="70" y="662" class="kt" font-size="15" font-weight="800" fill="#B45309">PHASE 2　13科目全部の「1点死守防衛線（ぼうえいせん）」——大きさに関係なく全部守る</text>
  <text x="70" y="683" class="kt" font-size="12" fill="#64748B">出題数の多い・少ないに関係なく、13科目すべてで1点以上を取れなければ、総合点が60%を超えても不合格になる。</text>

  <!-- Row1 pills (7) -->
  <g class="kt">
    <rect x="60" y="700" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="78" cy="718" r="9" fill="#22C55E"/><path d="M74,718 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="98" y="722" class="kt" font-size="10.5" font-weight="700" fill="#166534">尊厳と自立</text>
    <text x="98" y="740" class="kt" font-size="9" fill="#16A34A">全2問中 1点死守</text>

    <rect x="215" y="700" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="233" cy="718" r="9" fill="#22C55E"/><path d="M229,718 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="253" y="722" class="kt" font-size="10.5" font-weight="700" fill="#166534">人間関係</text>
    <text x="253" y="740" class="kt" font-size="9" fill="#16A34A">全4問中 1点死守</text>

    <rect x="370" y="700" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="388" cy="718" r="9" fill="#22C55E"/><path d="M384,718 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="408" y="722" class="kt" font-size="10.5" font-weight="700" fill="#166534">社会の理解</text>
    <text x="408" y="740" class="kt" font-size="9" fill="#16A34A">全12問中 1点死守</text>

    <rect x="525" y="700" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="543" cy="718" r="9" fill="#22C55E"/><path d="M539,718 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="563" y="722" class="kt" font-size="10.5" font-weight="700" fill="#166534">からだのしくみ</text>
    <text x="563" y="740" class="kt" font-size="9" fill="#16A34A">全12問中 1点死守</text>

    <rect x="680" y="700" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="698" cy="718" r="9" fill="#22C55E"/><path d="M694,718 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="718" y="722" class="kt" font-size="10.5" font-weight="700" fill="#166534">発達・老化</text>
    <text x="718" y="740" class="kt" font-size="9" fill="#16A34A">全8問中 1点死守</text>

    <rect x="835" y="700" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="853" cy="718" r="9" fill="#22C55E"/><path d="M849,718 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="873" y="722" class="kt" font-size="10.5" font-weight="700" fill="#166534">認知症</text>
    <text x="873" y="740" class="kt" font-size="9" fill="#16A34A">全10問中 1点死守</text>

    <rect x="990" y="700" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="1008" cy="718" r="9" fill="#22C55E"/><path d="M1004,718 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1028" y="722" class="kt" font-size="10.5" font-weight="700" fill="#166534">障害の理解</text>
    <text x="1028" y="740" class="kt" font-size="9" fill="#16A34A">全10問中 1点死守</text>

    <!-- Row2 pills (6), centered -->
    <rect x="140" y="770" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="158" cy="788" r="9" fill="#22C55E"/><path d="M154,788 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="178" y="792" class="kt" font-size="10.5" font-weight="700" fill="#166534">医療的ケア</text>
    <text x="178" y="810" class="kt" font-size="9" fill="#16A34A">全5問中 1点死守</text>

    <rect x="295" y="770" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="313" cy="788" r="9" fill="#22C55E"/><path d="M309,788 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="333" y="792" class="kt" font-size="10.5" font-weight="700" fill="#166534">介護の基本</text>
    <text x="333" y="810" class="kt" font-size="9" fill="#16A34A">全10問中 1点死守</text>

    <rect x="450" y="770" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="468" cy="788" r="9" fill="#22C55E"/><path d="M464,788 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="488" y="792" class="kt" font-size="10.5" font-weight="700" fill="#166534">コミュ技術</text>
    <text x="488" y="810" class="kt" font-size="9" fill="#16A34A">全6問中 1点死守</text>

    <rect x="605" y="770" width="145" height="55" rx="12" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
    <circle cx="623" cy="788" r="9" fill="#16A34A"/><path d="M619,788 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="643" y="792" class="kt" font-size="10.5" font-weight="800" fill="#14532D">生活支援技術</text>
    <text x="643" y="810" class="kt" font-size="9" fill="#15803D">全26問中 1点死守（ボスも例外なし）</text>

    <rect x="760" y="770" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="778" cy="788" r="9" fill="#22C55E"/><path d="M774,788 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="798" y="792" class="kt" font-size="10.5" font-weight="700" fill="#166534">介護過程</text>
    <text x="798" y="810" class="kt" font-size="9" fill="#16A34A">全8問中 1点死守</text>

    <rect x="915" y="770" width="145" height="55" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
    <circle cx="933" cy="788" r="9" fill="#22C55E"/><path d="M929,788 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="953" y="792" class="kt" font-size="10.5" font-weight="700" fill="#166534">総合問題</text>
    <text x="953" y="810" class="kt" font-size="9" fill="#16A34A">全12問中 1点死守</text>
  </g>

  <text x="600" y="862" text-anchor="middle" class="kt" font-size="12.5" fill="#374151">合計125問・13科目。生活支援技術という大きな得点源で稼ぎながら、残り12科目でも足切りゼロを徹底する——</text>
  <text x="600" y="882" text-anchor="middle" class="kt" font-size="12.5" font-weight="700" fill="#16A34A">それが介護福祉士試験の「配点バランスゲーム」です。</text>

  <!-- Footer note -->
  <text x="600" y="936" text-anchor="middle" class="kt" font-size="12.5" fill="#374151">すべての科目を均等に丸暗記する必要はありません。ハコの大きさで優先順位をつけ、小さいハコほど</text>
  <text x="600" y="954" text-anchor="middle" class="kt" font-size="12.5" font-weight="700" fill="#B45309">「1点だけでいいから絶対に取る」という守りの意識に切り替えるのが最短ルートです。</text>
</svg>
