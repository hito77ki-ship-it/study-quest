<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">FP3級 相続・事業承継——法定相続人・相続分・相続税計算</text>

  <!-- 左: 法定相続人の順位 -->
  <rect x="20" y="52" width="350" height="280" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="52" width="350" height="28" rx="10" fill="#3B82F6"/>
  <rect x="20" y="70" width="350" height="10" fill="#3B82F6"/>
  <text x="195" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">法定相続人と法定相続分</text>

  <!-- 配偶者 -->
  <rect x="36" y="88" width="318" height="32" rx="6" fill="#1E40AF"/>
  <text x="195" y="108" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">配偶者 — 常に相続人（全順位と共同相続）</text>

  <!-- 第1順位 -->
  <rect x="36" y="128" width="318" height="54" rx="6" fill="#DBEAFE"/>
  <text x="195" y="146" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">第1順位：子（子が先死亡なら孫が代襲相続）</text>
  <text x="195" y="162" text-anchor="middle" font-size="10" fill="#374151">配偶者と子が相続：配偶者1/2 ・ 子1/2（均等分割）</text>
  <text x="195" y="176" text-anchor="middle" font-size="10" fill="#64748B">子が2人なら：配偶者1/2 ・ 子各1/4</text>

  <!-- 第2順位 -->
  <rect x="36" y="190" width="318" height="54" rx="6" fill="#DBEAFE"/>
  <text x="195" y="208" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">第2順位：直系尊属（父母→祖父母の順）</text>
  <text x="195" y="224" text-anchor="middle" font-size="10" fill="#374151">第1順位がいない場合に登場</text>
  <text x="195" y="238" text-anchor="middle" font-size="10" fill="#64748B">配偶者と父母：配偶者2/3 ・ 父母1/3</text>

  <!-- 第3順位 -->
  <rect x="36" y="252" width="318" height="54" rx="6" fill="#DBEAFE"/>
  <text x="195" y="270" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">第3順位：兄弟姉妹（甥姪まで代襲可）</text>
  <text x="195" y="286" text-anchor="middle" font-size="10" fill="#374151">第1・2順位がいない場合に登場</text>
  <text x="195" y="302" text-anchor="middle" font-size="10" fill="#64748B">配偶者と兄弟姉妹：配偶者3/4 ・ 兄弟姉妹1/4</text>

  <!-- 右: 相続税の計算 -->
  <rect x="390" y="52" width="350" height="280" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="390" y="52" width="350" height="28" rx="10" fill="#F97316"/>
  <rect x="390" y="70" width="350" height="10" fill="#F97316"/>
  <text x="565" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">相続税の計算フロー</text>

  <rect x="406" y="88" width="318" height="30" rx="5" fill="#FFEDD5"/>
  <text x="565" y="107" text-anchor="middle" font-size="10.5" fill="#374151">正味の遺産額（相続財産 − 債務・葬儀費用）</text>

  <text x="565" y="130" text-anchor="middle" font-size="10" fill="#C2410C">▼ 基礎控除を差し引く</text>
  <rect x="406" y="138" width="318" height="36" rx="5" fill="#FEE2E2"/>
  <text x="565" y="155" text-anchor="middle" font-size="10.5" font-weight="700" fill="#DC2626">基礎控除 ＝ 3,000万 ＋（600万 × 法定相続人数）</text>
  <text x="565" y="170" text-anchor="middle" font-size="9.5" fill="#64748B">例：相続人3人 → 3,000万＋1,800万 ＝ 4,800万</text>

  <text x="565" y="194" text-anchor="middle" font-size="10" fill="#C2410C">▼ 課税遺産総額を法定相続分で按分 → 税率適用</text>

  <rect x="406" y="200" width="318" height="30" rx="5" fill="#FFEDD5"/>
  <text x="565" y="219" text-anchor="middle" font-size="10.5" fill="#374151">各相続人の仮相続税額を計算</text>

  <text x="565" y="242" text-anchor="middle" font-size="10" fill="#C2410C">▼ 合算して相続税総額を計算</text>
  <text x="565" y="258" text-anchor="middle" font-size="10" fill="#C2410C">▼ 実際の取得割合で按分</text>

  <rect x="406" y="264" width="318" height="30" rx="5" fill="#FEE2E2"/>
  <text x="565" y="283" text-anchor="middle" font-size="10.5" font-weight="700" fill="#DC2626">各人の納付相続税額</text>

  <text x="565" y="306" text-anchor="middle" font-size="9.5" fill="#64748B">配偶者の税額軽減：1億6千万か法定相続分まで非課税</text>

  <!-- Bottom -->
  <rect x="20" y="344" width="720" height="24" rx="5" fill="#F1F5F9"/>
  <text x="380" y="360" text-anchor="middle" font-size="10.5" fill="#475569">💡 基礎控除の計算式「3,000万＋600万×相続人数」は必須暗記。相続放棄した人もカウントする（養子は制限あり）。</text>
  <rect x="20" y="372" width="720" height="24" rx="5" fill="#F1F5F9"/>
  <text x="380" y="388" text-anchor="middle" font-size="10.5" fill="#475569">💡 死亡保険金の非課税枠：500万円×法定相続人数。死亡退職金も同じ計算。</text>
</svg>
