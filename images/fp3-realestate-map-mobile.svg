<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1120" width="360" height="1120">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1120" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">FP3級 不動産</text>
  <text x="180" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">取引・税金・法令制限の頻出ポイント</text>

  <text x="180" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">不動産売買の流れ</text>
  <rect x="30" y="78" width="300" height="42" rx="7" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">① 媒介契約</text>
  <text x="180" y="112" text-anchor="middle" font-size="9.5" fill="#374151">専属・専任・一般</text>
  <rect x="30" y="130" width="300" height="42" rx="7" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">② 重要事項説明</text>
  <text x="180" y="164" text-anchor="middle" font-size="9.5" fill="#374151">宅建士が書面で説明</text>
  <rect x="30" y="182" width="300" height="42" rx="7" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">③ 売買契約</text>
  <text x="180" y="216" text-anchor="middle" font-size="9.5" fill="#374151">手付金（解約手付）</text>
  <rect x="30" y="234" width="300" height="42" rx="7" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">④ ローン審査</text>
  <text x="180" y="268" text-anchor="middle" font-size="9.5" fill="#374151">住宅ローン契約</text>
  <rect x="30" y="286" width="300" height="42" rx="7" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">⑤ 引渡し・登記</text>
  <text x="180" y="320" text-anchor="middle" font-size="9.5" fill="#374151">所有権移転登記</text>
  <rect x="30" y="338" width="300" height="42" rx="7" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="180" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">⑥ 取得完了</text>
  <text x="180" y="372" text-anchor="middle" font-size="9.5" fill="#374151">各種税金の支払いへ</text>

  <text x="180" y="404" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">不動産にかかる税金——3段階</text>

  <rect x="16" y="416" width="328" height="150" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="16" y="416" width="328" height="28" rx="10" fill="#EF4444"/>
  <rect x="16" y="434" width="328" height="10" fill="#EF4444"/>
  <text x="180" y="435" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">取得時の税金</text>
  <text x="30" y="462" font-size="10.5" fill="#374151">不動産取得税（都道府県税）</text>
  <text x="30" y="478" font-size="9.5" fill="#64748B">固定資産税評価額×原則4%（住宅3%）</text>
  <text x="30" y="498" font-size="10.5" fill="#374151">登録免許税</text>
  <text x="30" y="514" font-size="9.5" fill="#64748B">所有権移転・抵当権設定など登記時</text>
  <text x="30" y="534" font-size="10.5" fill="#374151">印紙税</text>
  <text x="30" y="550" font-size="9.5" fill="#64748B">売買契約書・ローン契約書など</text>

  <rect x="16" y="582" width="328" height="150" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <rect x="16" y="582" width="328" height="28" rx="10" fill="#EAB308"/>
  <rect x="16" y="600" width="328" height="10" fill="#EAB308"/>
  <text x="180" y="601" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">保有時の税金</text>
  <text x="30" y="628" font-size="10.5" fill="#374151">固定資産税（市町村税）</text>
  <text x="30" y="644" font-size="9.5" fill="#64748B">固定資産税評価額×1.4%（標準税率）</text>
  <text x="30" y="660" font-size="9.5" fill="#64748B">1月1日現在の所有者に課税</text>
  <text x="30" y="680" font-size="10.5" fill="#374151">都市計画税</text>
  <text x="30" y="696" font-size="9.5" fill="#64748B">市街化区域内のみ・評価額×0.3%</text>

  <rect x="16" y="748" width="328" height="176" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="748" width="328" height="28" rx="10" fill="#22C55E"/>
  <rect x="16" y="766" width="328" height="10" fill="#22C55E"/>
  <text x="180" y="767" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">譲渡時の税金</text>
  <text x="30" y="794" font-size="10.5" fill="#374151">譲渡所得税（申告分離課税）</text>
  <text x="30" y="810" font-size="9.5" fill="#64748B">短期（5年以下）：39.63%</text>
  <text x="30" y="826" font-size="9.5" fill="#64748B">長期（5年超）：20.315%</text>
  <text x="30" y="846" font-size="9.5" fill="#166534">居住用：3,000万円特別控除</text>
  <text x="30" y="862" font-size="9.5" fill="#166534">軽減税率（10年超：14.21%）</text>
  <text x="30" y="880" font-size="9.5" fill="#64748B">譲渡所得＝収入−(取得費＋譲渡費用)</text>

  <rect x="16" y="940" width="328" height="46" rx="8" fill="#F1F5F9"/>
  <text x="30" y="958" font-size="10" fill="#475569">💡 短期5年以下/長期5年超は、売却した年の</text>
  <text x="30" y="974" font-size="10" fill="#475569">1月1日現在の保有期間で判断。</text>
  <rect x="16" y="998" width="328" height="46" rx="8" fill="#F1F5F9"/>
  <text x="30" y="1016" font-size="10" fill="#475569">💡 小規模住宅用地特例：200㎡以下の部分は</text>
  <text x="30" y="1032" font-size="10" fill="#475569">課税標準を1/6に。それ超は1/3に。</text>
</svg>
