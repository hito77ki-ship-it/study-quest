<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="420" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">法人税等・消費税——仕訳の全体フロー</text>

  <!-- Top: 3種類 -->
  <rect x="30" y="52" width="700" height="68" rx="10" fill="#1E293B"/>
  <text x="380" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#F8FAFC">法人税等 ＝ 法人税 ＋ 住民税 ＋ 事業税　の3種類をまとめて処理</text>
  <text x="380" y="97" text-anchor="middle" font-size="11" fill="#94A3B8">いずれも「会社の利益」に対してかかる税金。決算で確定額を計算し、中間分との差額を未払計上する。</text>

  <!-- Timeline: 期首 → 中間納付 → 期末 → 翌期納付 -->
  <line x1="60" y1="158" x2="700" y2="158" stroke="#CBD5E1" stroke-width="2"/>

  <!-- 期首 -->
  <line x1="80" y1="150" x2="80" y2="166" stroke="#64748B" stroke-width="2"/>
  <text x="80" y="144" text-anchor="middle" font-size="10" fill="#64748B">期首</text>

  <!-- 中間納付 -->
  <line x1="270" y1="150" x2="270" y2="166" stroke="#F97316" stroke-width="2.5"/>
  <text x="270" y="144" text-anchor="middle" font-size="10" fill="#F97316">中間申告・納付</text>
  <text x="270" y="134" text-anchor="middle" font-size="9" fill="#64748B">（期首から6か月後）</text>

  <!-- 期末 -->
  <line x1="530" y1="150" x2="530" y2="166" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="530" y="144" text-anchor="middle" font-size="10" fill="#7C3AED">決算日（期末）</text>

  <!-- 翌期納付 -->
  <line x1="700" y1="150" x2="700" y2="166" stroke="#22C55E" stroke-width="2.5"/>
  <text x="700" y="144" text-anchor="middle" font-size="10" fill="#22C55E">翌期確定申告・納付</text>

  <!-- Card: 中間納付 -->
  <rect x="30" y="176" width="310" height="92" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="185" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#C2410C">中間納付時の仕訳</text>
  <rect x="50" y="204" width="270" height="56" rx="6" fill="#FFEDD5"/>
  <text x="185" y="222" text-anchor="middle" font-size="11" fill="#C2410C">仮払法人税等 ×× ／ 現金預金 ××</text>
  <text x="185" y="242" text-anchor="middle" font-size="10.5" fill="#92400E">前払いなので「仮払」勘定に一時保管する</text>
  <text x="185" y="256" text-anchor="middle" font-size="10" fill="#64748B">（確定前なので費用計上しない）</text>

  <!-- Card: 期末決算 -->
  <rect x="360" y="176" width="370" height="92" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="545" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">期末決算時の仕訳</text>
  <rect x="378" y="204" width="334" height="56" rx="6" fill="#EDE9FE"/>
  <text x="545" y="220" text-anchor="middle" font-size="11" fill="#5B21B6">法人税等 確定額 ／ 仮払法人税等 中間納付額</text>
  <text x="545" y="238" text-anchor="middle" font-size="11" fill="#5B21B6">　　　　　　　 ／ 未払法人税等 差額</text>
  <text x="545" y="254" text-anchor="middle" font-size="10" fill="#64748B">確定税額＞中間分 → 差額を未払計上（負債）</text>

  <!-- Arrow: 翌期 -->
  <rect x="530" y="282" width="200" height="50" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="630" y="302" text-anchor="middle" font-size="11" fill="#166534">翌期確定申告納付時</text>
  <text x="630" y="320" text-anchor="middle" font-size="10.5" fill="#166534">未払法人税等 / 現金預金</text>

  <!-- 消費税 section -->
  <rect x="30" y="342" width="700" height="66" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="380" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">消費税（税抜方式）の処理フロー</text>
  <text x="80" y="384" font-size="10.5" fill="#374151">仕入時：仮払消費税 ／ 現金（買ったとき消費税を仮払）</text>
  <text x="80" y="398" font-size="10.5" fill="#374151">売上時：現金 ／ 売上 ＋ 仮受消費税（受け取ったとき仮受）</text>
  <text x="500" y="384" font-size="10.5" fill="#166534">決算：仮受消費税 ／ 仮払消費税</text>
  <text x="500" y="398" font-size="10.5" fill="#166534">　　　　　　　　 ／ 未払消費税（差額を納付）</text>
</svg>
