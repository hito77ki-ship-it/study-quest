<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1400" width="360" height="1400" role="img" aria-labelledby="t d">
  <title id="t">原因の「ハコ分け」× 次回合格への4ステップ・リベンジ戦略マップ（モバイル版）</title>
  <desc id="d">理解不足・演習量不足・特定論点の失点・時間切れという4つの失点原因と、休む・ハコだけ補強・解き直し・時間制限演習という4ステップのリベンジ戦略を縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1400" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">原因のハコ分け×次回合格への</text>
  <text x="180" y="44" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">4ステップ・リベンジ戦略</text>

  <text x="180" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">STEP0：失点の原因を4つのハコに分ける</text>

  <rect x="16" y="82" width="328" height="106" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="30" y="104" font-size="12" font-weight="700" fill="#DC2626">ハコA：理解不足</text>
  <text x="30" y="124" font-size="10.5" fill="#374151">仕訳の意味を理解せず丸暗記していた</text>
  <text x="30" y="146" font-size="10" fill="#DC2626">→ 仕訳の理由から学び直す</text>
  <text x="30" y="164" font-size="10" fill="#64748B">テキストは買い直さない</text>

  <rect x="16" y="198" width="328" height="106" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="30" y="220" font-size="12" font-weight="700" fill="#92400E">ハコB：演習量不足</text>
  <text x="30" y="240" font-size="10.5" fill="#374151">テキストを読んだだけで演習が少なかった</text>
  <text x="30" y="262" font-size="10" fill="#92400E">→ 過去問・予想問を3回転</text>
  <text x="30" y="280" font-size="10" fill="#64748B">間違えた問題に絞って</text>

  <rect x="16" y="314" width="328" height="106" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="30" y="336" font-size="12" font-weight="700" fill="#1E40AF">ハコC：特定論点の失点</text>
  <text x="30" y="356" font-size="10.5" fill="#374151">工業簿記・連結など苦手単元で失点</text>
  <text x="30" y="378" font-size="10" fill="#1E40AF">→ その論点だけ集中補強</text>
  <text x="30" y="396" font-size="10" fill="#64748B">1〜2週間の短期集中</text>

  <rect x="16" y="430" width="328" height="106" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="30" y="452" font-size="12" font-weight="700" fill="#5B21B6">ハコD：時間切れ</text>
  <text x="30" y="472" font-size="10.5" fill="#374151">知識はあるが90分で解き切れなかった</text>
  <text x="30" y="494" font-size="10" fill="#5B21B6">→ 時間制限つき演習</text>
  <text x="30" y="512" font-size="10" fill="#64748B">解く順番を固定する</text>

  <text x="180" y="552" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">リベンジ4ステップ（ハコを潰したら合格ラインへ）</text>

  <rect x="16" y="566" width="328" height="130" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="30" y="590" font-size="12" font-weight="700" fill="#C2410C">STEP 1：休む（1〜2週間）</text>
  <text x="30" y="612" font-size="10.5" fill="#374151">脳と気持ちをリセット</text>
  <text x="30" y="630" font-size="10.5" fill="#374151">焦って再開しない</text>
  <text x="30" y="648" font-size="10.5" fill="#374151">感情を落ち着かせる</text>
  <text x="30" y="670" font-size="10" fill="#C2410C">長期継続のための助走</text>

  <text x="180" y="712" text-anchor="middle" font-size="14" fill="#CBD5E1">↓</text>

  <rect x="16" y="720" width="328" height="130" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="30" y="744" font-size="12" font-weight="700" fill="#1E40AF">STEP 2：ハコだけ補強</text>
  <text x="30" y="766" font-size="10.5" fill="#374151">該当したハコの論点を</text>
  <text x="30" y="784" font-size="10.5" fill="#374151">1〜2週間で集中反復</text>
  <text x="30" y="802" font-size="10.5" fill="#374151">得意分野は触らない</text>
  <text x="30" y="824" font-size="10" fill="#1E40AF">全部やり直さなくていい</text>

  <text x="180" y="866" text-anchor="middle" font-size="14" fill="#CBD5E1">↓</text>

  <rect x="16" y="874" width="328" height="130" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="30" y="898" font-size="12" font-weight="700" fill="#5B21B6">STEP 3：解き直し</text>
  <text x="30" y="920" font-size="10.5" fill="#374151">前回の点数に応じて</text>
  <text x="30" y="938" font-size="10.5" fill="#374151">問題集にメリハリをつけ1周解き直す</text>
  <text x="30" y="960" font-size="10" fill="#5B21B6">全部より狙い撃ち</text>

  <text x="180" y="1002" text-anchor="middle" font-size="14" fill="#CBD5E1">↓</text>

  <rect x="16" y="1010" width="328" height="130" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="30" y="1034" font-size="12" font-weight="700" fill="#166534">STEP 4：時間制限演習</text>
  <text x="30" y="1056" font-size="10.5" fill="#374151">90分の過去問を本番同様に演習</text>
  <text x="30" y="1074" font-size="10.5" fill="#374151">ネット試験で即再挑戦</text>
  <text x="30" y="1096" font-size="10" fill="#166534">合格ラインが見えてくる</text>

  <rect x="16" y="1160" width="328" height="60" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="180" y="1184" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">積み上げた知識はゼロにならない</text>
  <text x="180" y="1202" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">ハコを潰せば「強くてニューゲーム」で合格へ</text>
</svg>
