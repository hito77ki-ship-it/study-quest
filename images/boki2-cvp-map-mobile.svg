<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 900" width="360" height="900">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="900" rx="14" fill="#F8FAFC"/>
  <text x="180" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">CVP分析——損益分岐点グラフ</text>
  <text x="180" y="42" text-anchor="middle" font-size="11" fill="#1E293B">と計算公式</text>

  <!-- Graph -->
  <rect x="20" y="56" width="320" height="270" rx="8" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <line x1="56" y1="66" x2="56" y2="290" stroke="#374151" stroke-width="2"/>
  <polygon points="56,62 51,74 61,74" fill="#374151"/>
  <text x="54" y="60" text-anchor="end" font-size="9.5" fill="#374151">金額</text>
  <line x1="56" y1="290" x2="316" y2="290" stroke="#374151" stroke-width="2"/>
  <polygon points="320,290 310,285 310,295" fill="#374151"/>
  <text x="322" y="294" font-size="9.5" fill="#374151">売上高</text>

  <line x1="56" y1="230" x2="316" y2="230" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="234" text-anchor="end" font-size="9" fill="#64748B">固定費</text>

  <line x1="56" y1="230" x2="316" y2="100" stroke="#F97316" stroke-width="2.5"/>
  <text x="322" y="98" font-size="9.5" fill="#F97316">総費用</text>

  <line x1="56" y1="290" x2="316" y2="72" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="322" y="70" font-size="9.5" fill="#3B82F6">売上高</text>

  <circle cx="238" cy="117" r="7" fill="none" stroke="#22C55E" stroke-width="2.5"/>
  <circle cx="238" cy="117" r="3" fill="#22C55E"/>
  <line x1="238" y1="117" x2="238" y2="290" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="238" y="304" text-anchor="middle" font-size="9.5" fill="#22C55E">損益分岐点</text>

  <text x="150" y="180" text-anchor="middle" font-size="10" fill="#EF4444">赤字ゾーン</text>
  <text x="280" y="90" text-anchor="middle" font-size="10" fill="#22C55E">黒字ゾーン</text>

  <!-- Formulas -->
  <text x="180" y="352" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">CVP分析の公式まとめ</text>

  <text x="30" y="378" font-size="11" font-weight="700" fill="#166534">① 貢献利益</text>
  <rect x="30" y="386" width="300" height="30" rx="6" fill="#DCFCE7"/>
  <text x="180" y="406" text-anchor="middle" font-size="11" fill="#15803D">売上高 − 変動費 ＝ 貢献利益</text>

  <text x="30" y="436" font-size="11" font-weight="700" fill="#166534">② 損益分岐点売上高</text>
  <rect x="30" y="444" width="300" height="46" rx="6" fill="#DCFCE7"/>
  <text x="180" y="464" text-anchor="middle" font-size="11" fill="#15803D">固定費 ÷ 貢献利益率</text>
  <text x="180" y="482" text-anchor="middle" font-size="9.5" fill="#64748B">貢献利益率＝貢献利益÷売上高</text>

  <text x="30" y="512" font-size="11" font-weight="700" fill="#166534">③ 安全余裕率</text>
  <rect x="30" y="520" width="300" height="46" rx="6" fill="#DCFCE7"/>
  <text x="180" y="540" text-anchor="middle" font-size="11" fill="#15803D">（実際売上−BEP売上）</text>
  <text x="180" y="558" text-anchor="middle" font-size="11" fill="#15803D">÷ 実際売上高 × 100%</text>

  <text x="30" y="588" font-size="11" font-weight="700" fill="#166534">④ 目標利益達成の売上高</text>
  <rect x="30" y="596" width="300" height="46" rx="6" fill="#DCFCE7"/>
  <text x="180" y="616" text-anchor="middle" font-size="11" fill="#15803D">（固定費＋目標利益）</text>
  <text x="180" y="634" text-anchor="middle" font-size="11" fill="#15803D">÷ 貢献利益率</text>

  <rect x="20" y="662" width="320" height="70" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="180" y="686" text-anchor="middle" font-size="10.5" fill="#475569">💡 変動費率＋貢献利益率＝1（100%）</text>
  <text x="180" y="708" text-anchor="middle" font-size="10" fill="#475569">安全余裕率が高いほど経営が安定している</text>
