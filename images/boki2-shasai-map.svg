<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="460" rx="12" fill="#F8FAFC"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">社債の物語——980,000円が5年かけて1,000,000円に育つまで</text>
  <text x="380" y="45" text-anchor="middle" font-size="11" fill="#64748B">割引発行の差額20,000円を、償却原価法で毎年4,000円ずつ社債利息として加算する</text>

  <!-- Increment chips row (isolated from bar labels to avoid overlap) -->
  <g font-size="11" font-weight="700" fill="#B45309">
    <rect x="102" y="54" width="76" height="20" rx="10" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="140" y="68" text-anchor="middle">+4,000円</text>
    <rect x="222" y="54" width="76" height="20" rx="10" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="260" y="68" text-anchor="middle">+4,000円</text>
    <rect x="342" y="54" width="76" height="20" rx="10" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="380" y="68" text-anchor="middle">+4,000円</text>
    <rect x="462" y="54" width="76" height="20" rx="10" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="500" y="68" text-anchor="middle">+4,000円</text>
    <rect x="582" y="54" width="76" height="20" rx="10" fill="#FEF3C7" stroke="#F59E0B"/>
    <text x="620" y="68" text-anchor="middle">+4,000円</text>
  </g>

  <!-- Goal line (額面 1,000,000円) -->
  <line x1="40" y1="182" x2="730" y2="182" stroke="#FCA5A5" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="45" y="174" font-size="11" font-weight="700" fill="#DC2626">額面 1,000,000円（ゴール）</text>

  <!-- Baseline -->
  <line x1="40" y1="372" x2="730" y2="372" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Trend line connecting bar tops -->
  <polyline points="80,332 200,302 320,272 440,242 560,212 680,182" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="80" cy="332" r="3" fill="#F59E0B"/>
  <circle cx="200" cy="302" r="3" fill="#F59E0B"/>
  <circle cx="320" cy="272" r="3" fill="#F59E0B"/>
  <circle cx="440" cy="242" r="3" fill="#F59E0B"/>
  <circle cx="560" cy="212" r="3" fill="#F59E0B"/>
  <circle cx="680" cy="182" r="3" fill="#F59E0B"/>

  <!-- Step 0: 発行時 980,000円 -->
  <rect x="50" y="332" width="60" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="80" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">980,000円</text>
  <text x="80" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">発行時</text>

  <!-- Step 1: 1年目 984,000円 -->
  <rect x="170" y="302" width="60" height="70" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="200" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">984,000円</text>
  <text x="200" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">1年目</text>

  <!-- Step 2: 2年目 988,000円 -->
  <rect x="290" y="272" width="60" height="100" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="320" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">988,000円</text>
  <text x="320" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">2年目</text>

  <!-- Step 3: 3年目 992,000円 -->
  <rect x="410" y="242" width="60" height="130" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="440" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">992,000円</text>
  <text x="440" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">3年目</text>

  <!-- Step 4: 4年目 996,000円 -->
  <rect x="530" y="212" width="60" height="160" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="560" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">996,000円</text>
  <text x="560" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">4年目</text>

  <!-- Step 5: 5年目（満期）1,000,000円 -->
  <rect x="650" y="182" width="60" height="190" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="2.5"/>
  <text x="680" y="168" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">★1,000,000円</text>
  <text x="680" y="390" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">5年目（満期）</text>

  <!-- Bottom journal note -->
  <rect x="40" y="398" width="690" height="52" rx="8" fill="#111827"/>
  <text x="385" y="418" text-anchor="middle" font-size="11" font-weight="700" fill="#E5E7EB">毎年末（決算時）の仕訳（償却原価法）</text>
  <text x="385" y="438" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FBBF24">社債利息 4,000 ／ 社債 4,000</text>
</svg>
