<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 730" width="760" height="730">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="730" rx="14" fill="#F8FAFC"/>
  <text x="380" y="30" text-anchor="middle" font-size="15.5" font-weight="700" fill="#1E293B">社債のレベルアップ階段　＆　買入償還（かいいれしょうかん）ルート脱出マップ</text>
  <text x="380" y="50" text-anchor="middle" font-size="11" fill="#64748B">償却原価法（しょうきゃくげんかほう）で帳簿価額が育つ様子と、途中下車する買入償還ルート</text>

  <!-- Increment chips row（ピンク） -->
  <g font-size="11" font-weight="700" fill="#9D174D">
    <rect x="102" y="58" width="76" height="20" rx="10" fill="#FCE7F3" stroke="#F9A8D4"/>
    <text x="140" y="72" text-anchor="middle">+4,000円</text>
    <rect x="222" y="58" width="76" height="20" rx="10" fill="#FCE7F3" stroke="#F9A8D4"/>
    <text x="260" y="72" text-anchor="middle">+4,000円</text>
    <rect x="342" y="58" width="76" height="20" rx="10" fill="#FCE7F3" stroke="#F9A8D4"/>
    <text x="380" y="72" text-anchor="middle">+4,000円</text>
    <rect x="462" y="58" width="76" height="20" rx="10" fill="#FCE7F3" stroke="#F9A8D4"/>
    <text x="500" y="72" text-anchor="middle">+4,000円</text>
    <rect x="582" y="58" width="76" height="20" rx="10" fill="#FCE7F3" stroke="#F9A8D4"/>
    <text x="620" y="72" text-anchor="middle">+4,000円</text>
  </g>

  <!-- Axis -->
  <line x1="40" y1="88" x2="40" y2="372" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="40,80 34,92 46,92" fill="#CBD5E1"/>
  <text x="40" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">帳簿価額</text>

  <line x1="40" y1="372" x2="730" y2="372" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="738,372 726,366 726,378" fill="#CBD5E1"/>
  <text x="700" y="406" text-anchor="end" font-size="10" font-weight="700" fill="#475569">時間（1年目～5年目）</text>

  <!-- Goal line（額面1,000,000円・グリーン） -->
  <line x1="40" y1="182" x2="730" y2="182" stroke="#86EFAC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="45" y="174" font-size="11" font-weight="700" fill="#166534">額面 1,000,000円（ゴール）</text>

  <!-- Trend line connecting bar tops（ブルー） -->
  <polyline points="80,332 200,302 320,272 440,242 560,212 680,182" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="80" cy="332" r="3" fill="#3B82F6"/>
  <circle cx="200" cy="302" r="3" fill="#3B82F6"/>
  <circle cx="320" cy="272" r="3" fill="#3B82F6"/>
  <circle cx="440" cy="242" r="3" fill="#3B82F6"/>
  <circle cx="560" cy="212" r="3" fill="#3B82F6"/>
  <circle cx="680" cy="182" r="3" fill="#3B82F6"/>

  <!-- Step 0: 発行時 980,000円 -->
  <rect x="50" y="332" width="60" height="40" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="80" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">980,000円</text>
  <text x="80" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">発行時</text>

  <!-- Step 1: 1年目 984,000円 -->
  <rect x="170" y="302" width="60" height="70" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="200" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">984,000円</text>
  <text x="200" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">1年目</text>

  <!-- Step 2: 2年目 988,000円 -->
  <rect x="290" y="272" width="60" height="100" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="320" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">988,000円</text>
  <text x="320" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">2年目</text>

  <!-- Step 3: 3年目 992,000円（買入償還の分岐点） -->
  <rect x="410" y="242" width="60" height="130" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="440" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">992,000円</text>
  <text x="440" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">3年目</text>
  <circle cx="440" cy="246" r="6" fill="#EC4899" stroke="#fff" stroke-width="2"/>

  <!-- Step 4: 4年目 996,000円 -->
  <rect x="530" y="212" width="60" height="160" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="560" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">996,000円</text>
  <text x="560" y="390" text-anchor="middle" font-size="10.5" fill="#64748B">4年目</text>

  <!-- Step 5: 5年目（満期）1,000,000円 -->
  <rect x="650" y="182" width="60" height="190" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="2.5"/>
  <text x="680" y="168" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">★1,000,000円</text>
  <text x="680" y="390" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">5年目（満期）</text>

  <!-- 買入償還への分岐矢印（斜め下へルート脱出） -->
  <line x1="440" y1="254" x2="560" y2="463" stroke="#EC4899" stroke-width="2.5" stroke-dasharray="7,5"/>
  <polygon points="560,472 549,459 567,461" fill="#EC4899"/>
  <rect x="430" y="418" width="180" height="28" rx="14" fill="#ffffff" stroke="#F9A8D4" stroke-width="1.5"/>
  <text x="520" y="437" text-anchor="middle" font-size="10.5" font-weight="700" fill="#DB2777">3年目に買入償還で分岐！</text>

  <!-- 買入償還カード（ピンク） -->
  <rect x="40" y="470" width="690" height="170" rx="12" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="385" y="497" text-anchor="middle" font-size="13" font-weight="700" fill="#9D174D">🔀 買入償還（かいいれしょうかん）— ルート脱出の分岐点！</text>

  <!-- Box1: 帳簿の価値（ブルー） -->
  <rect x="70" y="515" width="180" height="76" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="160" y="534" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">帳簿の価値</text>
  <text x="160" y="548" text-anchor="middle" font-size="9" fill="#1E40AF">（3年目）</text>
  <text x="160" y="573" text-anchor="middle" font-size="15" font-weight="700" fill="#1E40AF">992,000円</text>

  <text x="270" y="561" text-anchor="middle" font-size="22" font-weight="700" fill="#DB2777">－</text>

  <!-- Box2: 実際の買入価額（ピンク） -->
  <rect x="300" y="515" width="180" height="76" rx="8" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="2"/>
  <text x="390" y="534" text-anchor="middle" font-size="10.5" font-weight="700" fill="#9D174D">実際の買入価額</text>
  <text x="390" y="548" text-anchor="middle" font-size="9" fill="#9D174D">（買った値段）</text>
  <text x="390" y="573" text-anchor="middle" font-size="15" font-weight="700" fill="#9D174D">990,000円</text>

  <text x="500" y="561" text-anchor="middle" font-size="22" font-weight="700" fill="#DB2777">＝</text>

  <!-- Box3: 差額＝社債償還益（グリーン） -->
  <rect x="530" y="515" width="180" height="76" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="620" y="534" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">差額＝社債償還益</text>
  <text x="620" y="548" text-anchor="middle" font-size="8.5" fill="#166534">（しゃさいしょうかんえき）</text>
  <text x="620" y="573" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">2,000円</text>

  <text x="385" y="616" text-anchor="middle" font-size="10.5" fill="#374151">帳簿価額 992,000円 － 買入価額 990,000円 ＝ 差額 2,000円は「得した分」＝ 社債償還益（利益）になる！</text>

  <!-- Bottom journal note -->
  <rect x="40" y="655" width="690" height="55" rx="8" fill="#111827"/>
  <text x="385" y="676" text-anchor="middle" font-size="11" font-weight="700" fill="#E5E7EB">毎年末（決算時）の仕訳（償却原価法）</text>
  <text x="385" y="697" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FBBF24">社債利息（しゃさいりそく） 4,000 ／ 社債 4,000</text>
</svg>
