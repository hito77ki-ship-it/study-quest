<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="800" height="500" rx="14" fill="#FAFDF6"/>
  <circle cx="775" cy="22" r="5" fill="#FDE68A" opacity="0.65"/>
  <circle cx="752" cy="44" r="3" fill="#C4B5FD" opacity="0.55"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">独学ステップアップ攻略マップ——初心者から難関資格まで最速ルート</text>
  <text x="400" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">いきなり難関に挑まず、成功体験の盾を先に手に入れるのが独学成功の鉄則</text>

  <!-- STEP1 -->
  <rect x="20" y="66" width="240" height="380" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="20" y="66" width="240" height="34" rx="10" fill="#3B82F6"/>
  <rect x="20" y="90" width="240" height="10" fill="#3B82F6"/>
  <text x="140" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">STEP1｜成功体験ゾーン</text>

  <text x="140" y="122" text-anchor="middle" font-size="10" fill="#1D4ED8">過去問データが使い回され、</text>
  <text x="140" y="136" text-anchor="middle" font-size="10" fill="#1D4ED8">合格率が高いイージー資格</text>

  <rect x="36" y="150" width="208" height="40" rx="6" fill="#DBEAFE"/>
  <text x="46" y="167" font-size="10" font-weight="700" fill="#1E3A8A">ITパスポート</text>
  <text x="46" y="182" font-size="9" fill="#1E40AF">50〜100h・合格率約50%</text>

  <rect x="36" y="196" width="208" height="40" rx="6" fill="#DBEAFE"/>
  <text x="46" y="213" font-size="10" font-weight="700" fill="#1E3A8A">危険物乙4</text>
  <text x="46" y="228" font-size="9" fill="#1E40AF">40〜80h・合格率約40%</text>

  <rect x="36" y="242" width="208" height="40" rx="6" fill="#DBEAFE"/>
  <text x="46" y="259" font-size="10" font-weight="700" fill="#1E3A8A">MOS</text>
  <text x="46" y="274" font-size="9" fill="#1E40AF">40〜80h・合格率約70%</text>

  <rect x="36" y="288" width="208" height="40" rx="6" fill="#DBEAFE"/>
  <text x="46" y="305" font-size="10" font-weight="700" fill="#1E3A8A">漢検2級</text>
  <text x="46" y="320" font-size="9" fill="#1E40AF">50〜100h・合格率約20〜25%</text>

  <rect x="36" y="340" width="208" height="90" rx="8" fill="#1E3A8A"/>
  <text x="140" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#93C5FD">ここで得るもの</text>
  <text x="140" y="378" text-anchor="middle" font-size="9" fill="#DBEAFE">「独学でも受かるんだ」という</text>
  <text x="140" y="392" text-anchor="middle" font-size="9" fill="#DBEAFE">成功体験の盾。継続力の土台。</text>
  <text x="140" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#BFDBFE">最初の1〜2ヶ月で1つ取ろう</text>

  <!-- 矢印 1→2 -->
  <line x1="264" y1="250" x2="284" y2="250" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="288,250 278,244 278,256" fill="#8CC63F"/>

  <!-- STEP2 -->
  <rect x="292" y="66" width="240" height="380" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="292" y="66" width="240" height="34" rx="10" fill="#F59E0B"/>
  <rect x="292" y="90" width="240" height="10" fill="#F59E0B"/>
  <text x="412" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">STEP2｜実務直結ゾーン</text>

  <text x="412" y="122" text-anchor="middle" font-size="10" fill="#B45309">成功体験を武器に、</text>
  <text x="412" y="136" text-anchor="middle" font-size="10" fill="#B45309">転職・実務で効く資格へ</text>

  <rect x="308" y="150" width="208" height="40" rx="6" fill="#FEF3C7"/>
  <text x="318" y="167" font-size="10" font-weight="700" fill="#92400E">簿記3級→2級</text>
  <text x="318" y="182" font-size="9" fill="#78350F">60〜350h・段階的にステップ</text>

  <rect x="308" y="196" width="208" height="40" rx="6" fill="#FEF3C7"/>
  <text x="318" y="213" font-size="10" font-weight="700" fill="#92400E">FP3級→2級</text>
  <text x="318" y="228" font-size="9" fill="#78350F">50〜200h・お金の知識が実生活にも</text>

  <rect x="308" y="242" width="208" height="40" rx="6" fill="#FEF3C7"/>
  <text x="318" y="259" font-size="10" font-weight="700" fill="#92400E">基本情報技術者</text>
  <text x="318" y="274" font-size="9" fill="#78350F">150〜200h・IT就職の登竜門</text>

  <rect x="308" y="288" width="208" height="40" rx="6" fill="#FEF3C7"/>
  <text x="318" y="305" font-size="10" font-weight="700" fill="#92400E">登録販売者・衛生管理者・英検2級</text>
  <text x="318" y="320" font-size="9" fill="#78350F">100〜350h・業界別に強い武器</text>

  <rect x="308" y="340" width="208" height="90" rx="8" fill="#92400E"/>
  <text x="412" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#FDE68A">ここで得るもの</text>
  <text x="412" y="378" text-anchor="middle" font-size="9" fill="#FEF3C7">実務に直結する専門知識と、</text>
  <text x="412" y="392" text-anchor="middle" font-size="9" fill="#FEF3C7">長期学習に耐える持久力。</text>
  <text x="412" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#FDE68A">3〜8ヶ月かけてじっくり攻略</text>

  <!-- 矢印 2→3 -->
  <line x1="536" y1="250" x2="556" y2="250" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="560,250 550,244 550,256" fill="#8CC63F"/>

  <!-- STEP3 -->
  <rect x="564" y="66" width="216" height="380" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="564" y="66" width="216" height="34" rx="10" fill="#EF4444"/>
  <rect x="564" y="90" width="216" height="10" fill="#EF4444"/>
  <text x="672" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">STEP3｜難関ラスボス</text>

  <text x="672" y="122" text-anchor="middle" font-size="10" fill="#DC2626">STEP1・2で鍛えた継続力で</text>
  <text x="672" y="136" text-anchor="middle" font-size="10" fill="#DC2626">独学の最終ボスへ挑む</text>

  <rect x="580" y="150" width="184" height="50" rx="6" fill="#FEE2E2"/>
  <text x="590" y="170" font-size="10.5" font-weight="700" fill="#991B1B">宅地建物取引士（宅建）</text>
  <text x="590" y="186" font-size="9" fill="#7F1D1D">300〜400h・合格率約15〜17%</text>

  <rect x="580" y="206" width="184" height="50" rx="6" fill="#FEE2E2"/>
  <text x="590" y="226" font-size="10.5" font-weight="700" fill="#991B1B">行政書士</text>
  <text x="590" y="242" font-size="9" fill="#7F1D1D">500〜800h・合格率約10〜15%</text>

  <rect x="580" y="266" width="184" height="30" rx="6" fill="#FCA5A5"/>
  <text x="672" y="286" text-anchor="middle" font-size="9" font-weight="700" fill="#7F1D1D">独学合格者が多い難関資格</text>

  <rect x="580" y="340" width="184" height="90" rx="8" fill="#7F1D1D"/>
  <text x="672" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#FCA5A5">ここで得るもの</text>
  <text x="672" y="378" text-anchor="middle" font-size="9" fill="#FEE2E2">独立・専門職も視野に入る</text>
  <text x="672" y="392" text-anchor="middle" font-size="9" fill="#FEE2E2">キャリアの決定打。</text>
  <text x="672" y="410" text-anchor="middle" font-size="9" font-weight="700" fill="#FCA5A5">1〜1.5年計画でじっくり</text>

  <!-- 下部サマリー -->
  <rect x="20" y="458" width="760" height="30" rx="8" fill="#166534"/>
  <text x="400" y="478" text-anchor="middle" font-size="10" font-weight="700" fill="#DCFCE7">STEP1の成功体験 → STEP2の実務力 → STEP3の難関突破。焦らず一段ずつ登るのが独学最速ルート</text>
</svg>
