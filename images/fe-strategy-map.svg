<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="500" rx="12" fill="#FAFDF6"/>
  <circle cx="735" cy="20" r="5" fill="#FDE68A" opacity="0.6"/>
  <circle cx="712" cy="40" r="3" fill="#C4B5FD" opacity="0.5"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">基本情報技術者試験 攻略マップ——科目A「知識の盾」×科目B「アルゴリズムの剣」</text>
  <text x="380" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">合格基準：科目A・科目Bともに600点以上（1,000点満点）／ CBT方式で通年受験可能</text>

  <!-- Left: 科目A（知識の盾） -->
  <rect x="20" y="62" width="348" height="410" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="20" y="62" width="348" height="34" rx="10" fill="#3B82F6"/>
  <rect x="20" y="86" width="348" height="10" fill="#3B82F6"/>
  <text x="194" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🛡 科目A（知識の盾）</text>

  <rect x="40" y="112" width="308" height="28" rx="6" fill="#DBEAFE"/>
  <text x="50" y="131" text-anchor="start" font-size="10" fill="#1E3A8A">60問／テクノロジ・マネジメント・ストラテジ</text>
  <rect x="40" y="146" width="308" height="28" rx="6" fill="#BFDBFE"/>
  <text x="50" y="165" text-anchor="start" font-size="10" font-weight="700" fill="#1D4ED8">目標：6割以上の正解率で守り切る</text>

  <text x="40" y="200" text-anchor="start" font-size="11.5" font-weight="700" fill="#1D4ED8">盾を構成する知識パーツ</text>
  <text x="50" y="220" font-size="9.5" fill="#374151">▸ テクノロジ系：2進数・論理回路・NW（TCP/IP）</text>
  <text x="50" y="236" font-size="9.5" fill="#374151">▸ テクノロジ系：DB（SQL・正規化）・セキュリティ</text>
  <text x="50" y="252" font-size="9.5" fill="#374151">▸ マネジメント系：プロジェクト管理・開発工程</text>
  <text x="50" y="268" font-size="9.5" fill="#374151">▸ ストラテジ系：経営戦略・システム戦略</text>

  <rect x="40" y="286" width="308" height="58" rx="8" fill="#DBEAFE"/>
  <text x="194" y="304" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">盾の鍛え方</text>
  <text x="50" y="322" font-size="9.5" fill="#1E3A8A">過去問道場を反復するほど盾は厚くなる。</text>
  <text x="50" y="337" font-size="9.5" fill="#1E3A8A">丸暗記ではなく「なぜそうなるか」で理解。</text>

  <rect x="40" y="358" width="308" height="96" rx="8" fill="#1E3A8A"/>
  <text x="194" y="378" text-anchor="middle" font-size="10.5" font-weight="700" fill="#93C5FD">科目Aの役割</text>
  <text x="50" y="398" font-size="9.5" fill="#DBEAFE">知識問題は「暗記量＝防御力」に直結する</text>
  <text x="50" y="414" font-size="9.5" fill="#DBEAFE">ストレートな戦い。奇をてらわず反復あるのみ。</text>
  <text x="50" y="434" font-size="9.5" font-weight="700" fill="#BFDBFE">攻略の主戦場は科目B。科目Aは守り切ろう。</text>

  <!-- Right: 科目B（アルゴリズムの剣） -->
  <rect x="384" y="62" width="356" height="410" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="384" y="62" width="356" height="34" rx="10" fill="#EF4444"/>
  <rect x="384" y="86" width="356" height="10" fill="#EF4444"/>
  <text x="562" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">⚔ 科目B（アルゴリズムの剣）</text>

  <rect x="404" y="112" width="316" height="28" rx="6" fill="#FEE2E2"/>
  <text x="414" y="131" text-anchor="start" font-size="10" fill="#7F1D1D">アルゴリズム16問＋セキュリティ4問＝20問</text>
  <rect x="404" y="146" width="316" height="28" rx="6" fill="#FECACA"/>
  <text x="414" y="165" text-anchor="start" font-size="10" font-weight="700" fill="#991B1B">最難関・最重要：合否はここで決まる</text>

  <text x="404" y="200" text-anchor="start" font-size="11.5" font-weight="700" fill="#B91C1C">剣を研ぐ＝疑似言語トレース力</text>
  <text x="414" y="220" font-size="9.5" fill="#374151">▸ ソート・探索アルゴリズムを手で追う</text>
  <text x="414" y="236" font-size="9.5" fill="#374151">▸ 再帰処理・文字列処理のパターンを覚える</text>
  <text x="414" y="252" font-size="9.5" fill="#374151">▸ 変数の値の変化を紙にトレースする練習</text>
  <text x="414" y="268" font-size="9.5" fill="#374151">▸ セキュリティ4問は知識で確実に得点</text>

  <rect x="404" y="286" width="316" height="58" rx="8" fill="#FECACA"/>
  <text x="562" y="304" text-anchor="middle" font-size="10.5" font-weight="700" fill="#991B1B">剣の研ぎ方</text>
  <text x="414" y="322" font-size="9.5" fill="#7F1D1D">「キタミ式」「アルゴリズム図鑑」で直感理解。</text>
  <text x="414" y="337" font-size="9.5" fill="#7F1D1D">手を止めず、計算用紙に書きながら反復する。</text>

  <rect x="404" y="358" width="316" height="96" rx="8" fill="#7F1D1D"/>
  <text x="562" y="378" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FCA5A5">科目Bの役割</text>
  <text x="414" y="398" font-size="9.5" fill="#FEE2E2">知識だけでは殴れない「頭脳戦」の主戦場。</text>
  <text x="414" y="414" font-size="9.5" fill="#FEE2E2">パズルを解く快感がクセになる領域でもある。</text>
  <text x="414" y="434" font-size="9.5" font-weight="700" fill="#FECACA">ここに学習時間の半分以上を投資すべし。</text>

  <!-- 下部バナー -->
  <rect x="20" y="480" width="720" height="16" rx="5" fill="#DCFCE7"/>
  <text x="380" y="492" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">盾（科目A）で守り、剣（科目B）で決める——両輪が揃って初めて600点ラインを超える</text>
</svg>
