<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 846" width="360" height="846" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">ケアマネ試験 2分野足切り回避＆五肢複択マップ（モバイル版）</title>
  <desc id="svgdesc">介護支援分野・保健医療福祉分野の防衛線目標と、五肢複択の消去手順を縦に並べて示した図解</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="846" rx="16" fill="#F8FAFC"/>
  <text x="180" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">ケアマネ試験 足切り回避＆</text>
  <text x="180" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">五肢複択マップ</text>
  <text x="180" y="70" text-anchor="middle" font-size="10.5" fill="#64748B">2分野とも70%前後の防衛線をクリアしないと不合格</text>

  <!-- Section 1: 2分野の防衛線 -->
  <rect x="16" y="92" width="328" height="26" rx="6" fill="#1E293B"/>
  <text x="180" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">① 2分野の防衛線</text>

  <rect x="16" y="130" width="328" height="90" rx="10" fill="#FFEDD5" stroke="#F97316" stroke-width="2"/>
  <text x="32" y="152" font-size="13" font-weight="700" fill="#1E293B">介護支援分野</text>
  <text x="32" y="168" font-size="10.5" fill="#64748B">25問・難易度高</text>
  <rect x="32" y="176" width="296" height="16" rx="8" fill="#FFFFFF"/>
  <rect x="32" y="176" width="222" height="16" rx="8" fill="#F97316"/>
  <text x="328" y="188" text-anchor="end" font-size="11" font-weight="700" fill="#C2410C">目標 75%</text>
  <line x1="256" y1="176" x2="256" y2="192" stroke="#B91C1C" stroke-width="2"/>
  <text x="256" y="210" text-anchor="middle" font-size="8.5" fill="#B91C1C">70%防衛線</text>

  <rect x="16" y="230" width="328" height="90" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="32" y="252" font-size="13" font-weight="700" fill="#1E293B">保健医療福祉分野</text>
  <text x="32" y="268" font-size="10.5" fill="#64748B">35問</text>
  <rect x="32" y="276" width="296" height="16" rx="8" fill="#FFFFFF"/>
  <rect x="32" y="276" width="231" height="16" rx="8" fill="#3B82F6"/>
  <text x="328" y="288" text-anchor="end" font-size="11" font-weight="700" fill="#1D4ED8">目標 78%</text>
  <line x1="256" y1="276" x2="256" y2="292" stroke="#B91C1C" stroke-width="2"/>
  <text x="256" y="310" text-anchor="middle" font-size="8.5" fill="#B91C1C">70%防衛線</text>

  <rect x="16" y="330" width="328" height="30" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="180" y="350" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">両方が70%を超えて初めて合格</text>

  <!-- Section 2: 五肢複択の消去手順 -->
  <rect x="16" y="380" width="328" height="26" rx="6" fill="#1E293B"/>
  <text x="180" y="398" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">② 五肢複択の消去手順</text>

  <rect x="16" y="418" width="328" height="46" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="180" y="446" text-anchor="middle" font-size="11.5" fill="#5B21B6">選択肢①〜⑤を1つずつ検討</text>

  <polygon points="180,470 172,482 188,482" fill="#94A3B8"/>

  <rect x="16" y="486" width="328" height="46" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="180" y="510" text-anchor="middle" font-size="11" fill="#15803D">明確にYES・NOと判定できる</text>
  <text x="180" y="524" text-anchor="middle" font-size="11" fill="#15803D">肢を先に確定</text>

  <polygon points="180,538 172,550 188,550" fill="#94A3B8"/>

  <rect x="16" y="554" width="328" height="46" rx="8" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
  <text x="180" y="582" text-anchor="middle" font-size="11.5" fill="#A16207">迷う肢は消去法で候補を絞り込む</text>

  <polygon points="180,606 172,618 188,618" fill="#94A3B8"/>

  <rect x="16" y="622" width="328" height="46" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="180" y="646" text-anchor="middle" font-size="11" font-weight="700" fill="#B91C1C">1つでも誤ればその設問は</text>
  <text x="180" y="660" text-anchor="middle" font-size="11" font-weight="700" fill="#B91C1C">全不正解</text>

  <text x="180" y="690" text-anchor="middle" font-size="10" fill="#64748B">→ 曖昧な暗記は厳禁。</text>
  <text x="180" y="706" text-anchor="middle" font-size="10" fill="#64748B">数字・要件は正確に</text>

  <!-- Bottom summary -->
  <rect x="16" y="730" width="328" height="96" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="756" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">実務知識 ≠ 試験知識</text>
  <text x="180" y="774" text-anchor="middle" font-size="10.5" fill="#92400E">数字・期限・要件は「なんとなく」</text>
  <text x="180" y="790" text-anchor="middle" font-size="10.5" fill="#92400E">ではなく正確に暗記する</text>
  <text x="180" y="810" text-anchor="middle" font-size="9.5" fill="#B45309">2分野突破＋五肢複択で1肢もブレない状態がゴール</text>
</svg>
