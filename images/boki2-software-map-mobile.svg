<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 900" width="360" height="900">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="900" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">無形固定資産——研究開発費 vs</text>
  <text x="180" y="44" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">ソフトウェア資産計上の判定</text>

  <rect x="70" y="60" width="220" height="52" rx="10" fill="#1E293B"/>
  <text x="180" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#F8FAFC">無形資産の支出が発生</text>
  <text x="180" y="100" text-anchor="middle" font-size="10" fill="#94A3B8">ソフト開発・特許・商標 etc.</text>

  <path d="M140,116 L100,140 M160,116 L220,140" stroke="#94A3B8" stroke-width="1.5" fill="none"/>
  <text x="100" y="156" text-anchor="middle" font-size="9.5" fill="#EF4444">研究・開発段階</text>
  <text x="260" y="156" text-anchor="middle" font-size="9.5" fill="#3B82F6">収益獲得が確実</text>

  <!-- 研究開発費 -->
  <rect x="16" y="168" width="328" height="164" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="16" y="168" width="328" height="32" rx="10" fill="#EF4444"/>
  <rect x="16" y="188" width="328" height="12" fill="#EF4444"/>
  <text x="180" y="190" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">研究開発費（費用処理）</text>

  <text x="180" y="222" text-anchor="middle" font-size="10.5" fill="#374151">将来の収益獲得が不確実な段階</text>
  <text x="180" y="240" text-anchor="middle" font-size="10.5" fill="#374151">原則として発生時に全額費用処理</text>
  <rect x="32" y="250" width="296" height="30" rx="5" fill="#FEE2E2"/>
  <text x="180" y="270" text-anchor="middle" font-size="10.5" fill="#DC2626">研究開発費 ×× ／ 現金預金 ××</text>
  <text x="180" y="312" text-anchor="middle" font-size="9.5" fill="#64748B">P/Lに一括費用計上（B/Sに乗らない）</text>

  <!-- ソフトウェア -->
  <rect x="16" y="348" width="328" height="164" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="348" width="328" height="32" rx="10" fill="#3B82F6"/>
  <rect x="16" y="368" width="328" height="12" fill="#3B82F6"/>
  <text x="180" y="370" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">ソフトウェア（資産計上）</text>

  <text x="180" y="402" text-anchor="middle" font-size="10.5" fill="#374151">将来の収益獲得・費用削減が確実</text>
  <text x="180" y="420" text-anchor="middle" font-size="10.5" fill="#374151">無形固定資産として計上し償却</text>
  <rect x="32" y="430" width="296" height="30" rx="5" fill="#DBEAFE"/>
  <text x="180" y="450" text-anchor="middle" font-size="10.5" fill="#1D4ED8">ソフトウェア ×× ／ 現金預金 ××</text>
  <text x="180" y="492" text-anchor="middle" font-size="9.5" fill="#64748B">B/Sに計上→毎年「ソフトウェア償却」で費用化</text>

  <!-- 3分類 -->
  <rect x="16" y="530" width="328" height="238" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="180" y="554" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">ソフトウェアの3分類と処理</text>

  <rect x="32" y="566" width="296" height="58" rx="6" fill="#FEF9C3"/>
  <text x="180" y="586" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">市場販売目的</text>
  <text x="180" y="604" text-anchor="middle" font-size="10" fill="#374151">販売用製品として資産計上</text>

  <rect x="32" y="632" width="296" height="58" rx="6" fill="#FEF9C3"/>
  <text x="180" y="652" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">自社利用目的</text>
  <text x="180" y="670" text-anchor="middle" font-size="10" fill="#374151">確実性があれば資産計上</text>

  <rect x="32" y="698" width="296" height="58" rx="6" fill="#FEF9C3"/>
  <text x="180" y="718" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">委託開発</text>
  <text x="180" y="736" text-anchor="middle" font-size="10" fill="#374151">完成後に資産計上（仕掛中は仮計上）</text>
</svg>
