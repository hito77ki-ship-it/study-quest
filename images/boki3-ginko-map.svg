<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">銀行勘定調整表の不一致4原因と調整方向の全体マップ</title>
  <desc id="desc">未渡小切手・未記帳入金は自社帳簿の修正が必要、未取立小切手・未取付小切手は銀行側の調整のみで自社の仕訳は不要であることを示す図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#fff7fb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#667085" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:30px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15.5px;font-weight:600;fill:#64748b}
      .pill{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .cardname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16.5px;font-weight:800;fill:#1f2937}
      .cardbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.8px;font-weight:600;fill:#334155}
      .cardresult{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13.5px;font-weight:800}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:700;fill:#166534}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="1200" height="760" rx="40" fill="url(#bg)"/>
  <circle cx="110" cy="90" r="66" fill="#dbeafe" opacity="0.55"/>
  <circle cx="1100" cy="120" r="80" fill="#dcfce7" opacity="0.55"/>
  <circle cx="1090" cy="700" r="90" fill="#fce7f3" opacity="0.5"/>
  <circle cx="120" cy="690" r="72" fill="#fef3c7" opacity="0.55"/>

  <text x="600" y="52" text-anchor="middle" class="title">銀行勘定調整表 不一致4原因マップ</text>
  <text x="600" y="80" text-anchor="middle" class="sub">「自社が知らないだけ」か「銀行が知らないだけ」かで、仕訳の要・不要が分かれる</text>

  <!-- Left column: 自社側 -->
  <g filter="url(#softShadow)">
    <rect x="80" y="112" width="500" height="40" rx="14" fill="#3b82f6"/>
    <text x="330" y="138" text-anchor="middle" class="colhead">自社帳簿を修正（仕訳あり）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="80" y="166" width="500" height="150" rx="20" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>
    <rect x="104" y="186" width="86" height="30" rx="15" fill="#3b82f6"/>
    <text x="147" y="206" text-anchor="middle" class="pill">原因①</text>
    <text x="204" y="210" class="cardname">未渡小切手</text>
    <text x="104" y="240" class="cardbody">振り出して「当座預金を減らす」と記帳したが、相手にまだ手渡していない。</text>
    <text x="104" y="260" class="cardbody">＝支払った"つもり"だが、実際は支払っていない。</text>
    <text x="104" y="290" class="cardresult" fill="#1D4ED8">→ 当座預金を＋修正（当座預金／未払金）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="80" y="330" width="500" height="150" rx="20" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>
    <rect x="104" y="350" width="86" height="30" rx="15" fill="#3b82f6"/>
    <text x="147" y="370" text-anchor="middle" class="pill">原因②</text>
    <text x="204" y="374" class="cardname">未記帳の入金・利息など</text>
    <text x="104" y="404" class="cardbody">銀行は振込入金や利息の入金・手数料の引落を処理済みだが、</text>
    <text x="104" y="424" class="cardbody">自社がまだ気づいておらず帳簿に書いていない。</text>
    <text x="104" y="454" class="cardresult" fill="#1D4ED8">→ 判明した内容で自社帳簿を＋／－修正</text>
  </g>

  <!-- Right column: 銀行側 -->
  <g filter="url(#softShadow)">
    <rect x="620" y="112" width="500" height="40" rx="14" fill="#22c55e"/>
    <text x="870" y="138" text-anchor="middle" class="colhead">銀行側の調整のみ（仕訳不要）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="620" y="166" width="500" height="150" rx="20" fill="#ffffff" stroke="#86efac" stroke-width="3"/>
    <rect x="644" y="186" width="86" height="30" rx="15" fill="#22c55e"/>
    <text x="687" y="206" text-anchor="middle" class="pill">原因③</text>
    <text x="744" y="210" class="cardname">未取立小切手</text>
    <text x="644" y="240" class="cardbody">受け取った小切手を「入金した」と自社は記帳済みだが、</text>
    <text x="644" y="260" class="cardbody">まだ銀行に持ち込んでいない＝銀行側が未処理なだけ。</text>
    <text x="644" y="290" class="cardresult" fill="#166534">→ 銀行残高に＋（自社の仕訳は不要）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="620" y="330" width="500" height="150" rx="20" fill="#ffffff" stroke="#86efac" stroke-width="3"/>
    <rect x="644" y="350" width="86" height="30" rx="15" fill="#22c55e"/>
    <text x="687" y="370" text-anchor="middle" class="pill">原因④</text>
    <text x="744" y="374" class="cardname">未取付小切手</text>
    <text x="644" y="404" class="cardbody">小切手を振り出して相手にきちんと渡した（自社の記帳は正しい）。</text>
    <text x="644" y="424" class="cardbody">相手がまだ銀行に呈示していない＝銀行側が未処理なだけ。</text>
    <text x="644" y="454" class="cardresult" fill="#166534">→ 銀行残高に－（自社の仕訳は不要）</text>
  </g>

  <!-- Puzzle note: 未渡 vs 未取付 -->
  <g filter="url(#softShadow)">
    <rect x="80" y="508" width="1040" height="130" rx="22" fill="#fffbeb" stroke="#fcd34d" stroke-width="3"/>
    <text x="600" y="540" text-anchor="middle" class="banner" fill="#92400e">最大の引っかけ：「未渡小切手」と「未取付小切手」を混同しない</text>
    <text x="600" y="568" text-anchor="middle" class="bannersmall">どちらも"振り出した小切手"だが、運命の分かれ目は「相手に渡したかどうか」</text>
    <text x="600" y="592" text-anchor="middle" class="bannersmall">渡していない → 自社の記帳が先走っただけ＝自社側で修正／渡した → あとは銀行の処理待ち＝銀行側の調整のみ</text>
    <text x="600" y="616" text-anchor="middle" class="bannersmall">この1点さえ判断できれば、4原因の仕訳・不要はもうパズル感覚で解ける</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="80" y="656" width="1040" height="78" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <text x="600" y="690" text-anchor="middle" class="banner">自社の正しい残高 ＝ 銀行の正しい残高——両者区分調整法のゴールは「一致」</text>
    <text x="600" y="712" text-anchor="middle" class="bannersmall">一致しなければ、どこかの原因分類か金額計算に必ずミスがある</text>
  </g>
</svg>
