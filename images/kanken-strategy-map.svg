<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1000" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">漢字検定2級の配点ウェイトと合格基準死守の戦略マップ</title>
  <desc id="desc">200点満点のうち書き取り50点・四字熟語30点が突出して大きく、この2カテゴリで全体の40%を占めること、および160点の合格基準ラインが書き取り・四字熟語・読み・熟語の構成・対義語類義語でほぼ到達できることを示す図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#fff7fb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#667085" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:28px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:600;fill:#64748b}
      .sectionlabel{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13.5px;font-weight:700;fill:#475569}
      .barlabel{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .barsub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11.5px;font-weight:700;fill:#ffffff}
      .furigana{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:9px;font-weight:600;fill:#64748b}
      .cardname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13px;font-weight:800;fill:#1f2937}
      .cardpt{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:700;fill:#166534}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
      .zonelabel{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800}
    </style>
  </defs>

  <rect width="1200" height="1000" rx="40" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="64" fill="#dbeafe" opacity="0.55"/>
  <circle cx="1100" cy="110" r="78" fill="#fef3c7" opacity="0.5"/>
  <circle cx="1090" cy="930" r="88" fill="#fce7f3" opacity="0.45"/>
  <circle cx="110" cy="920" r="70" fill="#dcfce7" opacity="0.5"/>

  <text x="600" y="52" text-anchor="middle" class="title">漢検2級 配点ウェイト戦略マップ</text>
  <text x="600" y="80" text-anchor="middle" class="sub">200点満点・160点で合格（80%）——書き取りと四字熟語の2大巨頭を制する者が合格する</text>

  <!-- Stacked point bar (200pt = 1000px, scale 5px/pt) -->
  <text x="100" y="118" class="sectionlabel">出題カテゴリ別 配点シェア（200点満点）</text>
  <g filter="url(#softShadow)">
    <rect x="100" y="130" width="250" height="90" rx="10" fill="#f97316"/>
    <text x="225" y="164" text-anchor="middle" class="barlabel">書き取り</text>
    <text x="225" y="188" text-anchor="middle" class="barsub">50点（全体の25%）</text>

    <rect x="350" y="130" width="150" height="90" fill="#f59e0b"/>
    <text x="425" y="164" text-anchor="middle" class="barlabel">四字熟語</text>
    <text x="425" y="188" text-anchor="middle" class="barsub">30点</text>

    <rect x="500" y="130" width="150" height="90" fill="#3b82f6"/>
    <text x="575" y="164" text-anchor="middle" class="barlabel">読み</text>
    <text x="575" y="188" text-anchor="middle" class="barsub">30点</text>

    <rect x="650" y="130" width="100" height="90" fill="#22c55e"/>
    <text x="700" y="170" text-anchor="middle" class="barsub">熟語の構成</text>
    <text x="700" y="188" text-anchor="middle" class="barsub">20点</text>

    <rect x="750" y="130" width="100" height="90" fill="#a855f7"/>
    <text x="800" y="170" text-anchor="middle" class="barsub">対義語</text>
    <text x="800" y="188" text-anchor="middle" class="barsub">類義語 20点</text>

    <rect x="850" y="130" width="100" height="90" fill="#14b8a6"/>
    <text x="900" y="170" text-anchor="middle" class="barsub">同音</text>
    <text x="900" y="188" text-anchor="middle" class="barsub">同訓異字 20点</text>

    <rect x="950" y="130" width="50" height="90" fill="#cbd5e1"/>
    <rect x="1000" y="130" width="50" height="90" fill="#94a3b8"/>
    <rect x="1050" y="130" width="50" height="90" fill="#cbd5e1"/>
    <rect x="100" y="130" width="1000" height="90" rx="10" fill="none" stroke="#e2e8f0" stroke-width="2"/>
  </g>
  <text x="975" y="240" text-anchor="middle" class="furigana">部首 10点</text>
  <text x="1025" y="240" text-anchor="middle" class="furigana">誤字訂正 10点</text>
  <text x="1075" y="240" text-anchor="middle" class="furigana">送り仮名 10点</text>

  <!-- 2大巨頭 bracket -->
  <path d="M100 118 L100 106 L500 106 L500 118" fill="none" stroke="#c2410c" stroke-width="3"/>
  <text x="300" y="98" text-anchor="middle" class="zonelabel" fill="#c2410c">「書き取り」＋「四字熟語」＝全体の40%を占める2大巨頭</text>

  <!-- 160pt threshold -->
  <line x1="900" y1="120" x2="900" y2="270" stroke="#dc2626" stroke-width="3" stroke-dasharray="6,4"/>
  <g filter="url(#softShadow)">
    <rect x="770" y="260" width="260" height="46" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2.5"/>
    <text x="900" y="288" text-anchor="middle" class="zonelabel" fill="#b91c1c">◀ 合格基準ライン 160点（80%）</text>
  </g>
  <text x="500" y="330" text-anchor="middle" class="bannersmall">書き取り・四字熟語・読み・熟語の構成・対義語類義語を固めるだけで170点。合格ラインを自然に超える</text>

  <!-- Legend grid: 9 categories with furigana -->
  <text x="100" y="378" class="sectionlabel">出題カテゴリ一覧（ルビ付き）</text>

  <g filter="url(#softShadow)">
    <rect x="100" y="392" width="330" height="80" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2.5"/>
    <text x="130" y="412" class="furigana">かきとり</text>
    <text x="130" y="432" class="cardname">書き取り</text>
    <text x="130" y="456" class="cardpt" fill="#c2410c">50点・最重要</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="440" y="392" width="330" height="80" rx="14" fill="#fffbeb" stroke="#fcd34d" stroke-width="2.5"/>
    <text x="470" y="412" class="furigana">よじじゅくご</text>
    <text x="470" y="432" class="cardname">四字熟語</text>
    <text x="470" y="456" class="cardpt" fill="#92400e">30点・200〜300語暗記</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="780" y="392" width="330" height="80" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="2.5"/>
    <text x="810" y="412" class="furigana">よみ</text>
    <text x="810" y="432" class="cardname">読み</text>
    <text x="810" y="456" class="cardpt" fill="#1d4ed8">30点・音読み訓読み両方</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="100" y="484" width="330" height="80" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2.5"/>
    <text x="130" y="504" class="furigana">じゅくごのこうせい</text>
    <text x="130" y="524" class="cardname">熟語の構成</text>
    <text x="130" y="548" class="cardpt" fill="#15803d">20点・修飾関係を分析</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="440" y="484" width="330" height="80" rx="14" fill="#faf5ff" stroke="#d8b4fe" stroke-width="2.5"/>
    <text x="470" y="504" class="furigana">たいぎご・るいぎご</text>
    <text x="470" y="524" class="cardname">対義語・類義語</text>
    <text x="470" y="548" class="cardpt" fill="#7e22ce">20点・ペアで暗記</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="780" y="484" width="330" height="80" rx="14" fill="#f0fdfa" stroke="#5eead4" stroke-width="2.5"/>
    <text x="810" y="504" class="furigana">どうおん・どうくんいじ</text>
    <text x="810" y="524" class="cardname">同音・同訓異字</text>
    <text x="810" y="548" class="cardpt" fill="#0f766e">20点・文脈で使い分け</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="100" y="576" width="330" height="80" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5"/>
    <text x="130" y="596" class="furigana">ぶしゅ</text>
    <text x="130" y="616" class="cardname">部首</text>
    <text x="130" y="640" class="cardpt" fill="#475569">10点・部首名と位置</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="440" y="576" width="330" height="80" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5"/>
    <text x="470" y="596" class="furigana">ごじていせい</text>
    <text x="470" y="616" class="cardname">誤字訂正</text>
    <text x="470" y="640" class="cardpt" fill="#475569">10点・形の似た漢字</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="780" y="576" width="330" height="80" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5"/>
    <text x="810" y="596" class="furigana">おくりがな</text>
    <text x="810" y="616" class="cardname">送り仮名</text>
    <text x="810" y="640" class="cardpt" fill="#475569">10点・ルールと例外</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="100" y="700" width="1000" height="180" rx="24" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <text x="600" y="740" text-anchor="middle" class="banner">満遍なく暗記する必要はゼロ——ハコ分けして優先順位をつける</text>
    <text x="600" y="770" text-anchor="middle" class="bannersmall">「書き取り」50点と「四字熟語」30点、合わせて80点＝全体の40%をまず最優先で潰す</text>
    <text x="600" y="794" text-anchor="middle" class="bannersmall">そこに「読み」30点を積めば110点。あと50点を残りのカテゴリから拾えば160点の合格ラインに到達する</text>
    <text x="600" y="818" text-anchor="middle" class="bannersmall">部首・誤字訂正・送り仮名（各10点）は最後に詰め込むだけで十分——配点の小さいカテゴリに時間を奪われない</text>
    <text x="600" y="850" text-anchor="middle" class="bannersmall">これが暗記量の多さに絶望しなくていい理由。配点バランスを味方につければ合格は一気に近づく</text>
  </g>
</svg>
