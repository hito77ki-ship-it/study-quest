<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1180" viewBox="0 0 360 1180" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">会計士撤退後の知識コンバート＆進路分岐マップ（モバイル版）</title>
  <desc id="svgdesc">公認会計士で学んだ財務会計論・管理会計論・原価計算の知識が、税理士（簿財）と日商簿記1級のどちらにどう活きるかを示し、独立開業ルートと就職・転職ルートへの進路分岐を縦に並べた図解</desc>
  <defs>
    <linearGradient id="zbmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#F0FFF4"/>
    </linearGradient>
    <linearGradient id="zbmTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#2D4A10"/>
    </linearGradient>
    <linearGradient id="zbmHigh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8CC63F"/>
      <stop offset="1" stop-color="#6AAF2B"/>
    </linearGradient>
    <linearGradient id="zbmMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <style>.zt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="360" height="1180" rx="18" fill="url(#zbmBg)"/>

  <!-- Title -->
  <rect x="16" y="20" width="328" height="66" rx="12" fill="url(#zbmTitle)"/>
  <text x="180" y="42" text-anchor="middle" class="zt" font-size="9.5" font-weight="700" fill="#A0C070" letter-spacing="1">知識コンバート＆進路分岐マップ</text>
  <text x="180" y="60" text-anchor="middle" class="zt" font-size="12.5" font-weight="800" fill="#FFFFFF">会計士の知識は税理士(簿財)と</text>
  <text x="180" y="78" text-anchor="middle" class="zt" font-size="12.5" font-weight="800" fill="#FFFFFF">簿記1級のどちらで最大化するか</text>

  <!-- Hub card -->
  <rect x="20" y="100" width="320" height="98" rx="14" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2"/>
  <text x="180" y="126" text-anchor="middle" class="zt" font-size="13" font-weight="800" fill="#1A202C">🎓 公認会計士で積み上げた知識</text>
  <text x="180" y="148" text-anchor="middle" class="zt" font-size="10.5" fill="#374151">財務会計論・管理会計論・原価計算・</text>
  <text x="180" y="164" text-anchor="middle" class="zt" font-size="10.5" fill="#374151">理論暗記体力</text>
  <text x="180" y="186" text-anchor="middle" class="zt" font-size="10.5" font-weight="700" fill="#6AAF2B">↓ 2つのルートへ知識をコンバート</text>

  <!-- 税理士カード -->
  <rect x="20" y="214" width="320" height="330" rx="16" fill="#FDF2F8" stroke="#F472B6" stroke-width="2"/>
  <rect x="20" y="214" width="320" height="46" rx="16" fill="#F472B6"/>
  <rect x="20" y="244" width="320" height="16" fill="#F472B6"/>
  <text x="180" y="243" text-anchor="middle" class="zt" font-size="12.5" font-weight="800" fill="#FFFFFF">📘 税理士 簿記論・財務諸表論</text>

  <text x="38" y="284" class="zt" font-size="11" font-weight="700" fill="#9D174D">🗡 コンバート内容</text>
  <text x="38" y="304" class="zt" font-size="11.5" fill="#374151">財務会計論（計算・理論）</text>
  <text x="38" y="322" class="zt" font-size="11.5" fill="#374151">→ ほぼそのまま活きる</text>
  <rect x="38" y="334" width="200" height="26" rx="13" fill="url(#zbmHigh)"/>
  <text x="138" y="351" text-anchor="middle" class="zt" font-size="10.5" font-weight="700" fill="#fff">重複度：★★★★★（高い）</text>
  <text x="38" y="388" class="zt" font-size="11" fill="#374151">必要勉強時間目安：</text>
  <text x="38" y="406" class="zt" font-size="11" fill="#374151">200〜400時間（会計士経験者）</text>

  <text x="38" y="432" class="zt" font-size="11" font-weight="700" fill="#9D174D">⬆ この先のルート</text>
  <text x="38" y="450" class="zt" font-size="11" fill="#374151">科目合格は無期限。税理士5科目</text>
  <text x="38" y="468" class="zt" font-size="11" fill="#374151">達成を目指せる</text>

  <rect x="38" y="486" width="284" height="40" rx="14" fill="#9D174D"/>
  <text x="180" y="506" text-anchor="middle" class="zt" font-size="11" font-weight="700" fill="#fff">🏳 向いている進路：</text>
  <text x="180" y="520" text-anchor="middle" class="zt" font-size="11" font-weight="700" fill="#fff">独立開業・専門性重視</text>

  <!-- 簿記1級カード -->
  <rect x="20" y="564" width="320" height="380" rx="16" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <rect x="20" y="564" width="320" height="58" rx="16" fill="#3B82F6"/>
  <rect x="20" y="606" width="320" height="16" fill="#3B82F6"/>
  <text x="180" y="588" text-anchor="middle" class="zt" font-size="12.5" font-weight="800" fill="#FFFFFF">📗 日商簿記1級</text>
  <text x="180" y="606" text-anchor="middle" class="zt" font-size="11" font-weight="700" fill="#FFFFFF">（商業簿記・工業簿記・原価計算）</text>

  <text x="38" y="646" class="zt" font-size="11" font-weight="700" fill="#1E40AF">🗡 コンバート内容</text>
  <text x="38" y="664" class="zt" font-size="11" fill="#374151">商業簿記・会計学</text>
  <text x="38" y="680" class="zt" font-size="11" fill="#374151">→ 財務会計論とほぼ重複</text>
  <rect x="38" y="690" width="200" height="24" rx="12" fill="url(#zbmHigh)"/>
  <text x="138" y="706" text-anchor="middle" class="zt" font-size="10" font-weight="700" fill="#fff">重複度：高い</text>
  <text x="38" y="736" class="zt" font-size="11" fill="#374151">工業簿記・原価計算</text>
  <text x="38" y="752" class="zt" font-size="11" fill="#374151">→ 管理会計論と近いが要復習</text>
  <rect x="38" y="762" width="200" height="24" rx="12" fill="url(#zbmMid)"/>
  <text x="138" y="778" text-anchor="middle" class="zt" font-size="10" font-weight="700" fill="#fff">重複度：中</text>

  <text x="38" y="808" class="zt" font-size="11" font-weight="700" fill="#1E40AF">⬆ この先のルート</text>
  <text x="38" y="826" class="zt" font-size="11" fill="#374151">税理士の受験資格を取得。</text>
  <text x="38" y="844" class="zt" font-size="11" fill="#374151">就職・転職の武器にも</text>

  <rect x="38" y="862" width="284" height="52" rx="14" fill="#1E40AF"/>
  <text x="180" y="884" text-anchor="middle" class="zt" font-size="11" font-weight="700" fill="#fff">🏳 向いている進路：</text>
  <text x="180" y="900" text-anchor="middle" class="zt" font-size="11" font-weight="700" fill="#fff">就職・転職・受験資格の確保</text>

  <!-- Bottom summary bar -->
  <rect x="16" y="962" width="328" height="200" rx="16" fill="#111827"/>
  <text x="180" y="990" text-anchor="middle" class="zt" font-size="12.5" font-weight="700" fill="#8CC63F">💡 独立 vs 就職、進路分岐の判断軸</text>
  <text x="180" y="1016" text-anchor="middle" class="zt" font-size="10.5" fill="#E5E7EB">① 将来「税理士として独立・開業したい」</text>
  <text x="180" y="1034" text-anchor="middle" class="zt" font-size="10.5" fill="#E5E7EB">→ 簿記論・財務諸表論を直接受けるのが</text>
  <text x="180" y="1052" text-anchor="middle" class="zt" font-size="10.5" fill="#E5E7EB">最短ルート</text>
  <text x="180" y="1080" text-anchor="middle" class="zt" font-size="10.5" fill="#E5E7EB">② 「まず就職・転職に活かしたい」</text>
  <text x="180" y="1098" text-anchor="middle" class="zt" font-size="10.5" fill="#E5E7EB">「受験資格がまだない」</text>
  <text x="180" y="1116" text-anchor="middle" class="zt" font-size="10.5" fill="#E5E7EB">→ 日商簿記1級で受験資格と実務評価を</text>
  <text x="180" y="1134" text-anchor="middle" class="zt" font-size="10.5" fill="#E5E7EB">同時に獲得</text>
</svg>
