<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 940" width="360" height="940" role="img" aria-labelledby="t d">
  <title id="t">リース取引——ファイナンスかオペレーティングかの判定と仕訳（モバイル版）</title>
  <desc id="d">ノンキャンセラブル・フルペイアウトの判定基準と、ファイナンス・リース／オペレーティング・リースそれぞれの仕訳を縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="940" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">リース取引</text>
  <text x="180" y="44" text-anchor="middle" font-size="10" fill="#64748B">ファイナンスかオペレーティングかの判定と仕訳</text>

  <rect x="16" y="58" width="328" height="56" rx="10" fill="#1E293B"/>
  <text x="180" y="80" text-anchor="middle" font-size="11.5" font-weight="700" fill="#F8FAFC">リース取引の判定</text>
  <text x="180" y="98" text-anchor="middle" font-size="9.5" fill="#94A3B8">ノンキャンセラブル＋フルペイアウト？</text>

  <text x="90" y="132" text-anchor="middle" font-size="9.5" fill="#3B82F6">両方YES↓</text>
  <text x="270" y="132" text-anchor="middle" font-size="9.5" fill="#EF4444">どちらかNO↓</text>

  <rect x="16" y="142" width="328" height="240" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="142" width="328" height="32" rx="10" fill="#3B82F6"/>
  <text x="180" y="163" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">ファイナンス・リース</text>
  <text x="180" y="192" text-anchor="middle" font-size="10.5" fill="#1E40AF">実質的な購入と同じ扱い</text>
  <text x="180" y="208" text-anchor="middle" font-size="10" fill="#374151">→ 借り手がB/Sに資産・負債を計上</text>

  <rect x="30" y="220" width="298" height="42" rx="6" fill="#DBEAFE"/>
  <text x="44" y="238" font-size="10.5" font-weight="700" fill="#1E40AF">リース開始時</text>
  <text x="44" y="256" font-size="10" fill="#1D4ED8">リース資産 ×× ／ リース債務 ××</text>

  <rect x="30" y="270" width="298" height="56" rx="6" fill="#DBEAFE"/>
  <text x="44" y="288" font-size="10.5" font-weight="700" fill="#1E40AF">毎期のリース料支払時</text>
  <text x="44" y="304" font-size="10" fill="#1D4ED8">支払利息 ×× ／ 現金 ××</text>
  <text x="44" y="320" font-size="10" fill="#1D4ED8">リース債務 ×× ／（減価償却も計上）</text>

  <rect x="16" y="398" width="328" height="240" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="16" y="398" width="328" height="32" rx="10" fill="#94A3B8"/>
  <text x="180" y="419" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">オペレーティング・リース</text>
  <text x="180" y="448" text-anchor="middle" font-size="10.5" fill="#475569">単純な「借りて使う」契約</text>
  <text x="180" y="464" text-anchor="middle" font-size="10" fill="#374151">→ B/Sに計上しない（オフバランス）</text>

  <rect x="30" y="476" width="298" height="42" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="44" y="494" font-size="10.5" font-weight="700" fill="#475569">リース料支払時（毎回）</text>
  <text x="44" y="510" font-size="10" fill="#374151">支払リース料 ×× ／ 現金 ××</text>

  <rect x="30" y="526" width="298" height="56" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="44" y="546" font-size="10.5" fill="#475569">資産・負債の計上なし</text>
  <text x="44" y="562" font-size="10.5" fill="#475569">（注記で開示のみ）</text>
  <text x="44" y="576" font-size="9.5" fill="#94A3B8">減価償却もしない</text>

  <rect x="16" y="656" width="328" height="78" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="180" y="680" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">ノンキャンセラブル：途中解約不可</text>
  <text x="180" y="698" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">フルペイアウト：便益とリスクが借り手に移転</text>
  <text x="180" y="716" text-anchor="middle" font-size="9.5" fill="#92400E">両方満たすとファイナンス・リース</text>
</svg>
