<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1400" width="360" height="1400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1400" rx="16" fill="#F8FAFC"/>
  <text x="180" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">8桁精算表の4列ペア構造</text>

  <!-- Row 1: 現金 -->
  <rect x="20" y="52" width="320" height="118" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="36" y="74" font-size="13" font-weight="700" fill="#1E293B">現　金</text>
  <text x="200" y="74" font-size="10.5" fill="#94A3B8">借方 / 貸方</text>
  <text x="36" y="96" font-size="11" fill="#94A3B8">残高試算表</text>
  <text x="230" y="96" font-size="11" fill="#374151">50,000 / —</text>
  <text x="36" y="116" font-size="11" fill="#94A3B8">修正記入</text>
  <text x="230" y="116" font-size="11" fill="#374151">— / —</text>
  <text x="36" y="136" font-size="11" fill="#94A3B8">損益計算書</text>
  <text x="230" y="136" font-size="11" fill="#374151">— / —</text>
  <rect x="30" y="144" width="300" height="20" rx="4" fill="#DBEAFE"/>
  <text x="36" y="159" font-size="11" fill="#1D4ED8">貸借対照表</text>
  <text x="230" y="159" font-size="11.5" font-weight="700" fill="#1D4ED8">50,000 / —</text>

  <!-- Row 2: 支払保険料 -->
  <rect x="20" y="184" width="320" height="118" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="36" y="206" font-size="13" font-weight="700" fill="#1E293B">支払保険料</text>
  <text x="36" y="228" font-size="11" fill="#94A3B8">残高試算表</text>
  <text x="230" y="228" font-size="11" fill="#374151">12,000 / —</text>
  <rect x="30" y="236" width="300" height="20" rx="4" fill="#DCFCE7"/>
  <text x="36" y="251" font-size="11" fill="#166534">修正記入</text>
  <text x="230" y="251" font-size="11.5" font-weight="700" fill="#166534">— / 3,000</text>
  <rect x="30" y="260" width="300" height="20" rx="4" fill="#FEE2E2"/>
  <text x="36" y="275" font-size="11" fill="#991B1B">損益計算書</text>
  <text x="230" y="275" font-size="11.5" font-weight="700" fill="#991B1B">9,000 / —</text>
  <text x="36" y="296" font-size="11" fill="#94A3B8">貸借対照表</text>
  <text x="230" y="296" font-size="11" fill="#374151">— / —</text>

  <!-- Row 3: 前払保険料 -->
  <rect x="20" y="316" width="320" height="118" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="36" y="338" font-size="13" font-weight="700" fill="#1E293B">前払保険料</text>
  <text x="36" y="360" font-size="11" fill="#94A3B8">残高試算表</text>
  <text x="230" y="360" font-size="11" fill="#374151">— / —</text>
  <rect x="30" y="368" width="300" height="20" rx="4" fill="#DCFCE7"/>
  <text x="36" y="383" font-size="11" fill="#166534">修正記入</text>
  <text x="230" y="383" font-size="11.5" font-weight="700" fill="#166534">3,000 / —</text>
  <text x="36" y="404" font-size="11" fill="#94A3B8">損益計算書</text>
  <text x="230" y="404" font-size="11" fill="#374151">— / —</text>
  <rect x="30" y="412" width="300" height="20" rx="4" fill="#DBEAFE"/>
  <text x="36" y="427" font-size="11" fill="#1D4ED8">貸借対照表</text>
  <text x="230" y="427" font-size="11.5" font-weight="700" fill="#1D4ED8">3,000 / —</text>

  <!-- Row 4: 売上 -->
  <rect x="20" y="448" width="320" height="118" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="36" y="470" font-size="13" font-weight="700" fill="#1E293B">売　上</text>
  <text x="36" y="492" font-size="11" fill="#94A3B8">残高試算表</text>
  <text x="230" y="492" font-size="11" fill="#374151">— / 80,000</text>
  <text x="36" y="512" font-size="11" fill="#94A3B8">修正記入</text>
  <text x="230" y="512" font-size="11" fill="#374151">— / —</text>
  <rect x="30" y="520" width="300" height="20" rx="4" fill="#FEE2E2"/>
  <text x="36" y="535" font-size="11" fill="#991B1B">損益計算書</text>
  <text x="230" y="535" font-size="11.5" font-weight="700" fill="#991B1B">— / 80,000</text>
  <text x="36" y="556" font-size="11" fill="#94A3B8">貸借対照表</text>
  <text x="230" y="556" font-size="11" fill="#374151">— / —</text>

  <!-- Row 5: 当期純利益 -->
  <rect x="20" y="580" width="320" height="118" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="36" y="602" font-size="13" font-weight="700" fill="#1E293B">当期純利益</text>
  <text x="36" y="624" font-size="11" fill="#94A3B8">残高試算表</text>
  <text x="230" y="624" font-size="11" fill="#374151">— / —</text>
  <text x="36" y="644" font-size="11" fill="#94A3B8">修正記入</text>
  <text x="230" y="644" font-size="11" fill="#374151">— / —</text>
  <rect x="30" y="652" width="300" height="20" rx="4" fill="#FFEDD5"/>
  <text x="36" y="667" font-size="11" fill="#C2410C">損益計算書</text>
  <text x="230" y="667" font-size="11.5" font-weight="700" fill="#C2410C">×,××× / —</text>
  <rect x="30" y="676" width="300" height="20" rx="4" fill="#FFEDD5"/>
  <text x="36" y="691" font-size="11" fill="#C2410C">貸借対照表</text>
  <text x="230" y="691" font-size="11.5" font-weight="700" fill="#C2410C">— / ×,×××</text>

  <!-- Legend boxes -->
  <rect x="20" y="726" width="320" height="76" rx="8" fill="#FEF9C3" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="36" y="750" font-size="12" font-weight="700" fill="#713F12">① 残高試算表</text>
  <text x="36" y="768" font-size="10.5" fill="#92400E">決算整理前の残高（仕訳帳から集計）</text>

  <rect x="20" y="812" width="320" height="76" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="36" y="836" font-size="12" font-weight="700" fill="#166534">② 修正記入</text>
  <text x="36" y="854" font-size="10.5" fill="#15803D">決算整理仕訳をこの列に書く</text>

  <rect x="20" y="898" width="320" height="76" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="36" y="922" font-size="12" font-weight="700" fill="#991B1B">③ 損益計算書</text>
  <text x="36" y="940" font-size="10.5" fill="#7F1D1D">費用・収益の勘定 → P/L に転記</text>

  <rect x="20" y="984" width="320" height="76" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="36" y="1008" font-size="12" font-weight="700" fill="#1E40AF">④ 貸借対照表</text>
  <text x="36" y="1026" font-size="10.5" fill="#1D4ED8">資産・負債・純資産 → B/S に転記</text>

  <!-- bottom note -->
  <rect x="20" y="1076" width="320" height="220" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="180" y="1104" text-anchor="middle" font-size="11" fill="#475569">💡 P/L差額（収益合計－費用合計）＝</text>
  <text x="180" y="1122" text-anchor="middle" font-size="11" fill="#475569">B/S差額（資産合計－負債・純資産合計）</text>
  <text x="180" y="1140" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">＝ 当期純利益</text>
  <text x="180" y="1170" text-anchor="middle" font-size="11" fill="#475569">この等式が成り立たない場合は</text>
  <text x="180" y="1188" text-anchor="middle" font-size="11" fill="#475569">修正記入や転記にミスがある</text>
  <text x="180" y="1216" text-anchor="middle" font-size="10.5" fill="#94A3B8">精算表はあくまで「ワークシート」</text>
  <text x="180" y="1234" text-anchor="middle" font-size="10.5" fill="#94A3B8">——財務諸表そのものではない</text>
</svg>
