<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="leftH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="rightH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="leftB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="rightB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="540" fill="url(#bgG)"/>

  <!-- Titles -->
  <text x="400" y="36" text-anchor="middle" font-size="19" font-weight="700" fill="#1A202C">資格戦略マップ：闇雲コレクター型 vs 逆算ハンター型</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#64748B">なりたい姿から逆算すれば、10倍効率の武器選びができる！</text>

  <!-- ====== LEFT PANEL ====== -->
  <rect x="16" y="68" width="362" height="446" rx="14" fill="url(#leftB)" stroke="#CBD5E0" stroke-width="1.5"/>
  <!-- Header gradient -->
  <rect x="16" y="68" width="362" height="80" rx="14" fill="url(#leftH)"/>
  <!-- Square-off bottom of header -->
  <rect x="16" y="120" width="362" height="28" fill="#475569"/>

  <!-- Header icon: confused "?" circle -->
  <circle cx="56" cy="106" r="24" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <text x="56" y="115" text-anchor="middle" font-size="22" font-weight="700" fill="rgba(255,255,255,0.8)">?</text>

  <!-- Header text -->
  <text x="222" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">闇雲コレクター型</text>
  <text x="222" y="122" text-anchor="middle" font-size="12" fill="#CBD5E0">とにかく数を集める・迷子プレイヤー</text>

  <!-- Confused character in body -->
  <circle cx="197" cy="196" r="28" fill="#CBD5E0" stroke="#94A3B8" stroke-width="2"/>
  <text x="197" y="205" text-anchor="middle" font-size="26" font-weight="700" fill="#64748B">?</text>
  <!-- Confusion rays (right side) -->
  <line x1="231" y1="172" x2="246" y2="162" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="234" y1="184" x2="251" y2="180" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <!-- Confusion rays (left side) -->
  <line x1="163" y1="172" x2="148" y2="162" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  <line x1="160" y1="184" x2="143" y2="180" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>

  <!-- Scattered skill badges (rotated, random positions) -->
  <!-- Badge: 英検2級 -12deg -->
  <g transform="translate(78,272) rotate(-12)">
    <rect x="-44" y="-14" width="88" height="28" rx="14" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#475569" font-weight="700">英検2級</text>
  </g>
  <!-- Badge: MOS +9deg -->
  <g transform="translate(294,258) rotate(9)">
    <rect x="-34" y="-14" width="68" height="28" rx="14" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#475569" font-weight="700">MOS</text>
  </g>
  <!-- Badge: FP3級 -8deg -->
  <g transform="translate(296,328) rotate(-8)">
    <rect x="-38" y="-14" width="76" height="28" rx="14" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#475569" font-weight="700">FP3級</text>
  </g>
  <!-- Badge: 色彩検定 +14deg -->
  <g transform="translate(100,348) rotate(14)">
    <rect x="-46" y="-14" width="92" height="28" rx="14" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#475569" font-weight="700">色彩検定</text>
  </g>
  <!-- Badge: 普通免許 -6deg -->
  <g transform="translate(258,394) rotate(-6)">
    <rect x="-46" y="-14" width="92" height="28" rx="14" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#475569" font-weight="700">普通免許</text>
  </g>
  <!-- Badge: 簿記3級 +9deg -->
  <g transform="translate(104,424) rotate(9)">
    <rect x="-44" y="-14" width="88" height="28" rx="14" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#475569" font-weight="700">簿記3級</text>
  </g>

  <!-- Bottom label left -->
  <rect x="30" y="462" width="334" height="42" rx="8" fill="#E2E8F0"/>
  <text x="197" y="480" text-anchor="middle" font-size="12" fill="#475569" font-weight="700">「結局なにがしたいの？」と聞かれると詰まる…</text>
  <text x="197" y="496" text-anchor="middle" font-size="11" fill="#718096">時間も労力もムダになる最悪パターン</text>

  <!-- ====== RIGHT PANEL ====== -->
  <rect x="422" y="68" width="362" height="446" rx="14" fill="url(#rightB)" stroke="#6EE7B7" stroke-width="1.5"/>
  <!-- Header gradient -->
  <rect x="422" y="68" width="362" height="80" rx="14" fill="url(#rightH)"/>
  <!-- Square-off bottom of header -->
  <rect x="422" y="120" width="362" height="28" fill="#047857"/>

  <!-- Header icon: target/bullseye -->
  <circle cx="462" cy="106" r="24" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <circle cx="462" cy="106" r="14" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="462" cy="106" r="5" fill="rgba(255,255,255,0.85)"/>

  <!-- Header text -->
  <text x="628" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">逆算ハンター型</text>
  <text x="628" y="122" text-anchor="middle" font-size="12" fill="#A7F3D0">なりたい姿から計算する・戦略家プレイヤー</text>

  <!-- STEP 1 box -->
  <rect x="438" y="162" width="330" height="56" rx="10" fill="#047857"/>
  <text x="603" y="184" text-anchor="middle" font-size="12" fill="#A7F3D0" font-weight="700">STEP 1 / なりたいジョブを決める</text>
  <text x="603" y="204" text-anchor="middle" font-size="13" fill="#fff">会計プロ / 総合職 / エンジニア …</text>

  <!-- Arrow 1 with label -->
  <line x1="603" y1="218" x2="603" y2="246" stroke="#059669" stroke-width="2.5" stroke-dasharray="4,3"/>
  <polygon points="597,245 609,245 603,257" fill="#059669"/>
  <text x="622" y="234" font-size="11" fill="#047857" font-weight="700">逆算</text>

  <!-- STEP 2 box -->
  <rect x="438" y="260" width="330" height="74" rx="10" fill="#065F46"/>
  <text x="603" y="282" text-anchor="middle" font-size="12" fill="#A7F3D0" font-weight="700">STEP 2 / 必要な武器（資格）を絞る</text>
  <!-- Skill chips row -->
  <rect x="452" y="290" width="140" height="30" rx="6" fill="#047857"/>
  <text x="522" y="310" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">簿記2級 + TOEIC</text>
  <rect x="600" y="290" width="154" height="30" rx="6" fill="#047857"/>
  <text x="677" y="310" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">CPA / 基本情報技術者</text>

  <!-- Arrow 2 with label -->
  <line x1="603" y1="334" x2="603" y2="362" stroke="#059669" stroke-width="2.5" stroke-dasharray="4,3"/>
  <polygon points="597,361 609,361 603,373" fill="#059669"/>
  <text x="622" y="350" font-size="11" fill="#047857" font-weight="700">集中！</text>

  <!-- STEP 3 box -->
  <rect x="438" y="376" width="330" height="56" rx="10" fill="#047857"/>
  <text x="603" y="398" text-anchor="middle" font-size="12" fill="#A7F3D0" font-weight="700">STEP 3 / 1点集中で最速攻略！</text>
  <text x="603" y="418" text-anchor="middle" font-size="13" fill="#fff">資格取得 → 実力の証明 → 内定獲得</text>

  <!-- Bottom label right -->
  <rect x="438" y="462" width="330" height="42" rx="8" fill="#059669"/>
  <text x="603" y="480" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">「○○になりたい」という軸で面接無双！</text>
  <text x="603" y="496" text-anchor="middle" font-size="11" fill="#A7F3D0">最短で市場価値MAX → 就活で圧倒的優位</text>

  <!-- VS badge center -->
  <circle cx="400" cy="136" r="32" fill="#0F172A" stroke="#fff" stroke-width="3"/>
  <text x="400" y="145" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">VS</text>
</svg>
