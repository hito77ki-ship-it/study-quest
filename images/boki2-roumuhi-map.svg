<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="380" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">労務費——直接労務費・間接労務費の分類と計算構造</text>

  <!-- Top: 労務費の定義 -->
  <rect x="30" y="52" width="700" height="44" rx="8" fill="#1E293B"/>
  <text x="380" y="71" text-anchor="middle" font-size="11" fill="#F8FAFC">労務費 ＝ 製造に関わる人件費</text>
  <text x="380" y="88" text-anchor="middle" font-size="10.5" fill="#94A3B8">賃金（工場作業員）・給料（現場管理者）・賞与・法定福利費・退職給付費用 etc.</text>

  <!-- 2 columns -->
  <!-- Left: 直接労務費 -->
  <rect x="30" y="108" width="340" height="220" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="30" y="108" width="340" height="32" rx="10" fill="#22C55E"/>
  <rect x="30" y="130" width="340" height="10" fill="#22C55E"/>
  <text x="200" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">直接労務費（製品に直接紐づく）</text>

  <text x="200" y="158" text-anchor="middle" font-size="10.5" fill="#166534">特定の製品を直接製造した作業員の賃金</text>
  <text x="200" y="174" text-anchor="middle" font-size="10.5" fill="#166534">→ 仕掛品（製品原価）に直接賦課</text>

  <!-- 計算方法 -->
  <rect x="50" y="182" width="300" height="56" rx="6" fill="#DCFCE7"/>
  <text x="200" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">賃金消費額の計算</text>
  <text x="200" y="218" text-anchor="middle" font-size="10.5" fill="#374151">当月消費額 ＝ 当月支払高 − 月初未払高 ＋ 月末未払高</text>
  <text x="200" y="232" text-anchor="middle" font-size="10" fill="#64748B">（作業時間票で実際時間を集計）</text>

  <!-- 仕訳 -->
  <rect x="50" y="244" width="300" height="40" rx="6" fill="#DCFCE7"/>
  <text x="200" y="260" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">仕訳例</text>
  <text x="200" y="276" text-anchor="middle" font-size="10.5" fill="#166534">仕掛品 ×× ／ 賃金・給料 ××</text>
  <text x="200" y="316" text-anchor="middle" font-size="10" fill="#64748B">外部報告に使う（製品原価に含まれる）</text>

  <!-- Right: 間接労務費 -->
  <rect x="390" y="108" width="340" height="220" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="390" y="108" width="340" height="32" rx="10" fill="#3B82F6"/>
  <rect x="390" y="130" width="340" height="10" fill="#3B82F6"/>
  <text x="560" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">間接労務費（製品に間接的に関わる）</text>

  <text x="560" y="158" text-anchor="middle" font-size="10.5" fill="#1E40AF">特定の製品に直接結びつかない人件費</text>
  <text x="560" y="174" text-anchor="middle" font-size="10.5" fill="#1E40AF">→ 製造間接費として処理し、後で配賦</text>

  <!-- 具体例 -->
  <rect x="410" y="182" width="300" height="56" rx="6" fill="#DBEAFE"/>
  <text x="560" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">間接労務費の具体例</text>
  <text x="560" y="218" text-anchor="middle" font-size="10.5" fill="#374151">工場長・管理監督者の給料</text>
  <text x="560" y="232" text-anchor="middle" font-size="10.5" fill="#374151">間接作業賃金・手待賃金・休暇給</text>

  <!-- 仕訳 -->
  <rect x="410" y="244" width="300" height="40" rx="6" fill="#DBEAFE"/>
  <text x="560" y="260" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">仕訳例</text>
  <text x="560" y="276" text-anchor="middle" font-size="10.5" fill="#1D4ED8">製造間接費 ×× ／ 賃金・給料 ××</text>
  <text x="560" y="316" text-anchor="middle" font-size="10" fill="#64748B">→ 後で製造間接費から各製品へ配賦</text>

  <!-- Bottom note -->
  <rect x="30" y="342" width="700" height="28" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="380" y="357" text-anchor="middle" font-size="11" fill="#92400E">💡 賃金未払いの処理：「賃金 ×× ／ 現金 ×× ＋ 未払賃金 ××」。翌月に未払賃金を取り崩して支払う。</text>
  <text x="380" y="372" text-anchor="middle" font-size="10.5" fill="#92400E">直接労務費 ＝ 標準賃率 × 直接作業時間。差異分析で「賃率差異」「作業時間差異」に分解する。</text>
</svg>
