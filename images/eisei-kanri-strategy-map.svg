<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="950" viewBox="0 0 1200 950" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">衛生管理者試験の足切り回避と過去問循環マップ</title>
  <desc id="svgdesc">各科目40%の足切りラインを死守しながら、過去問プールから60%の得点を回収する合格戦略の図解</desc>
  <defs>
    <linearGradient id="eBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.5" stop-color="#f7fff4"/>
      <stop offset="1" stop-color="#fff9f4"/>
    </linearGradient>
    <linearGradient id="eTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="eBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86EFAC"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="eBoxHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="eGoal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="eShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <style>.et{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="950" rx="20" fill="url(#eBg)"/>
  <circle cx="100" cy="120" r="90" fill="#DBEAFE" opacity="0.45"/>
  <circle cx="1100" cy="140" r="100" fill="#D1FAE5" opacity="0.45"/>
  <circle cx="600" cy="920" r="120" fill="#EDE9FE" opacity="0.35"/>

  <!-- Title bar -->
  <rect x="40" y="24" width="1120" height="64" rx="14" fill="url(#eTitle)"/>
  <text x="600" y="48" text-anchor="middle" class="et" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="3">40%の防衛線 × 過去問プール循環</text>
  <text x="600" y="72" text-anchor="middle" class="et" font-size="21" font-weight="800" fill="#FFFFFF">衛生管理者 合格戦略マップ——足切り回避と過去問ハック</text>
  <text x="600" y="106" text-anchor="middle" class="et" font-size="13" fill="#64748B">合格基準は「各科目40%以上」かつ「総合60%以上」。100点は狙わない、割り切りゲームです</text>

  <!-- ============ PANEL A: 40%防衛ライン ============ -->
  <g filter="url(#eShadow)">
    <rect x="40" y="110" width="1120" height="330" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  </g>
  <text x="70" y="142" class="et" font-size="15" font-weight="800" fill="#166534">PHASE 1　科目別「40%の防衛ライン」を死守する（第一種の例）</text>
  <text x="70" y="163" class="et" font-size="12" fill="#64748B">1科目でも40%を下回ると、総合点に関係なく即不合格。まず全科目のフロアを固める。</text>

  <!-- danger band (below 40%) -->
  <rect x="150" y="328" width="900" height="92" fill="#FEE2E2" opacity="0.7"/>
  <text x="168" y="352" class="et" font-size="11" font-weight="700" fill="#B91C1C">ここを割ると科目の得点に関わらず即不合格</text>

  <!-- 40% dashed line -->
  <line x1="150" y1="328" x2="1050" y2="328" stroke="#DC2626" stroke-width="2.5" stroke-dasharray="8 6"/>
  <text x="1058" y="332" class="et" font-size="12" font-weight="800" fill="#DC2626">40%死守ライン</text>

  <!-- baseline -->
  <line x1="150" y1="420" x2="1050" y2="420" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Bar 1: 労働衛生 62% -->
  <rect x="175" y="277" width="130" height="143" rx="8" fill="url(#eBar)"/>
  <text x="240" y="266" text-anchor="middle" class="et" font-size="14" font-weight="800" fill="#166534">62%</text>
  <text x="240" y="440" text-anchor="middle" class="et" font-size="11" font-weight="700" fill="#374151">労働衛生</text>
  <text x="240" y="456" text-anchor="middle" class="et" font-size="10" fill="#718096">（17問）</text>

  <!-- Bar 2: 関係法令(有害業務) 55% -->
  <rect x="355" y="293" width="130" height="127" rx="8" fill="url(#eBar)"/>
  <text x="420" y="282" text-anchor="middle" class="et" font-size="14" font-weight="800" fill="#166534">55%</text>
  <text x="420" y="440" text-anchor="middle" class="et" font-size="11" font-weight="700" fill="#374151">関係法令</text>
  <text x="420" y="456" text-anchor="middle" class="et" font-size="10" fill="#718096">（有害業務・10問）</text>

  <!-- Bar 3: 労働生理 68% -->
  <rect x="535" y="264" width="130" height="156" rx="8" fill="url(#eBar)"/>
  <text x="600" y="253" text-anchor="middle" class="et" font-size="14" font-weight="800" fill="#166534">68%</text>
  <text x="600" y="440" text-anchor="middle" class="et" font-size="11" font-weight="700" fill="#374151">労働生理</text>
  <text x="600" y="456" text-anchor="middle" class="et" font-size="10" fill="#718096">（10問）</text>

  <!-- Bar 4: 関係法令(その他) 50% -->
  <rect x="715" y="305" width="130" height="115" rx="8" fill="url(#eBar)"/>
  <text x="780" y="294" text-anchor="middle" class="et" font-size="14" font-weight="800" fill="#166534">50%</text>
  <text x="780" y="440" text-anchor="middle" class="et" font-size="11" font-weight="700" fill="#374151">関係法令</text>
  <text x="780" y="456" text-anchor="middle" class="et" font-size="10" fill="#718096">（その他・7問）</text>

  <!-- Bar 5: 労働衛生(その他) 58% -->
  <rect x="895" y="287" width="130" height="133" rx="8" fill="url(#eBar)"/>
  <text x="960" y="276" text-anchor="middle" class="et" font-size="14" font-weight="800" fill="#166534">58%</text>
  <text x="960" y="440" text-anchor="middle" class="et" font-size="11" font-weight="700" fill="#374151">労働衛生</text>
  <text x="960" y="456" text-anchor="middle" class="et" font-size="10" fill="#718096">（その他・6問）</text>

  <!-- ============ PANEL B: 過去問循環サイクル ============ -->
  <g filter="url(#eShadow)">
    <rect x="40" y="480" width="1120" height="400" rx="18" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  </g>
  <text x="70" y="514" class="et" font-size="15" font-weight="800" fill="#5B21B6">PHASE 2　過去問プールを循環させて60%を回収する</text>
  <text x="70" y="535" class="et" font-size="12" fill="#64748B">衛生管理者試験は過去問の使い回しが多い。同じサイクルを回すだけで得点源が積み上がる。</text>

  <!-- Step boxes -->
  <g filter="url(#eShadow)">
    <rect x="70" y="552" width="250" height="130" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
    <rect x="70" y="552" width="250" height="34" rx="14" fill="url(#eBoxHead)"/>
    <rect x="70" y="568" width="250" height="18" fill="#8B5CF6"/>
  </g>
  <text x="195" y="574" text-anchor="middle" class="et" font-size="12" font-weight="800" fill="#fff">① 過去問を解く</text>
  <text x="195" y="612" text-anchor="middle" class="et" font-size="12" font-weight="700" fill="#4C1D95">直近5年分を通しで演習</text>
  <text x="195" y="634" text-anchor="middle" class="et" font-size="11" fill="#5B21B6">まずは解けなくてもOK</text>
  <text x="195" y="654" text-anchor="middle" class="et" font-size="11" fill="#5B21B6">出題形式に慣れることが目的</text>

  <g filter="url(#eShadow)">
    <rect x="340" y="552" width="250" height="130" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
    <rect x="340" y="552" width="250" height="34" rx="14" fill="url(#eBoxHead)"/>
    <rect x="340" y="568" width="250" height="18" fill="#8B5CF6"/>
  </g>
  <text x="465" y="574" text-anchor="middle" class="et" font-size="12" font-weight="800" fill="#fff">② 出題パターンを掴む</text>
  <text x="465" y="612" text-anchor="middle" class="et" font-size="12" font-weight="700" fill="#4C1D95">数値・語句の言い換えに注目</text>
  <text x="465" y="634" text-anchor="middle" class="et" font-size="11" fill="#5B21B6">同じ論点が形を変えて</text>
  <text x="465" y="654" text-anchor="middle" class="et" font-size="11" fill="#5B21B6">繰り返し出題されると気づく</text>

  <g filter="url(#eShadow)">
    <rect x="610" y="552" width="250" height="130" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
    <rect x="610" y="552" width="250" height="34" rx="14" fill="url(#eBoxHead)"/>
    <rect x="610" y="568" width="250" height="18" fill="#8B5CF6"/>
  </g>
  <text x="735" y="574" text-anchor="middle" class="et" font-size="12" font-weight="800" fill="#fff">③ 頻出論点だけ暗記</text>
  <text x="735" y="612" text-anchor="middle" class="et" font-size="12" font-weight="700" fill="#4C1D95">100点を狙わず「捨てる」勇気</text>
  <text x="735" y="634" text-anchor="middle" class="et" font-size="11" fill="#5B21B6">TLV値・規制数値など</text>
  <text x="735" y="654" text-anchor="middle" class="et" font-size="11" fill="#5B21B6">頻出の暗記事項に絞る</text>

  <g filter="url(#eShadow)">
    <rect x="880" y="552" width="250" height="130" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
    <rect x="880" y="552" width="250" height="34" rx="14" fill="url(#eBoxHead)"/>
    <rect x="880" y="568" width="250" height="18" fill="#8B5CF6"/>
  </g>
  <text x="1005" y="574" text-anchor="middle" class="et" font-size="12" font-weight="800" fill="#fff">④ 弱点科目を反復</text>
  <text x="1005" y="612" text-anchor="middle" class="et" font-size="12" font-weight="700" fill="#4C1D95">40%割れ科目を最優先で復習</text>
  <text x="1005" y="634" text-anchor="middle" class="et" font-size="11" fill="#5B21B6">防衛ラインが甘い科目から</text>
  <text x="1005" y="654" text-anchor="middle" class="et" font-size="11" fill="#5B21B6">①に戻って繰り返す</text>

  <!-- arrows between boxes -->
  <polygon points="322,617 336,610 336,624" fill="#8B5CF6"/>
  <polygon points="592,617 606,610 606,624" fill="#8B5CF6"/>
  <polygon points="862,617 876,610 876,624" fill="#8B5CF6"/>

  <!-- loop-back arrow -->
  <path d="M 1005,682 L 1005,730 L 195,730 L 195,684" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 0"/>
  <polygon points="195,684 188,698 202,698" fill="#F59E0B"/>
  <rect x="430" y="712" width="340" height="30" rx="15" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="600" y="732" text-anchor="middle" class="et" font-size="12" font-weight="700" fill="#C2410C">同じパターンがまた出る → ①に戻って得点源を積み増す</text>

  <!-- Goal -->
  <rect x="400" y="770" width="400" height="90" rx="18" fill="url(#eGoal)" filter="url(#eShadow)"/>
  <rect x="576" y="782" width="40" height="28" rx="6" fill="#DCFCE7"/>
  <rect x="584" y="810" width="24" height="6" rx="3" fill="#DCFCE7"/>
  <rect x="579" y="816" width="34" height="5" rx="2.5" fill="#DCFCE7"/>
  <circle cx="576" cy="792" r="6" fill="#16A34A" stroke="#DCFCE7" stroke-width="2"/>
  <circle cx="616" cy="792" r="6" fill="#16A34A" stroke="#DCFCE7" stroke-width="2"/>
  <text x="660" y="808" class="et" font-size="20" font-weight="800" fill="#fff">合格</text>
  <text x="660" y="830" class="et" font-size="12" fill="#DCFCE7">各科目40%クリア × 総合60%到達</text>

  <!-- Footer note -->
  <text x="600" y="900" text-anchor="middle" class="et" font-size="12.5" fill="#374151">100点満点を狙う必要はゼロ。各科目40%の防衛線を守りながら、過去問プールから60%だけを</text>
  <text x="600" y="920" text-anchor="middle" class="et" font-size="12.5" font-weight="700" fill="#16A34A">効率よくもぎ取る——それが衛生管理者試験の「割り切りゲーム」攻略法です。</text>
</svg>
