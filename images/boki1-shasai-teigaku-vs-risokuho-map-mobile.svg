<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1480" viewBox="0 0 360 1480" role="img" aria-labelledby="title desc">
  <title id="title">社債の償却原価法、定額法と利息法の違い（モバイル版）</title>
  <desc id="desc">定額法は金利調整差額を発行期間で均等に配分する簿記2級の簡便法であるのに対し、利息法は帳簿価額に実効利子率を掛けて社債利息を算定する簿記1級の原則法であり、償却額が年々増加していくという違いを対比する図解</desc>
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#fffbeb"/>
    </linearGradient>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:9.5px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .ptnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11px;font-weight:800;fill:#ffffff}
      .ptname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#1f2937}
      .ptbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="360" height="1480" rx="20" fill="url(#mbg)"/>

  <text x="180" y="26" text-anchor="middle" class="title">社債の償却原価法</text>
  <text x="180" y="44" text-anchor="middle" class="sub">定額法 vs 利息法の違い</text>

  <!-- 定額法 -->
  <rect x="16" y="62" width="328" height="42" rx="12" fill="#166534"/>
  <text x="180" y="88" text-anchor="middle" class="colhead">定額法（簿記2級・簡便法）</text>

  <rect x="16" y="116" width="328" height="500" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2.5"/>

  <circle cx="44" cy="150" r="15" fill="#166534"/>
  <text x="44" y="155" text-anchor="middle" class="ptnum">1</text>
  <text x="66" y="146" class="ptname">配分の方法</text>
  <text x="66" y="164" class="ptbody">金利調整差額を発行期間で均等配分</text>

  <line x1="30" y1="180" x2="330" y2="180" stroke="#dcfce7" stroke-width="2"/>

  <circle cx="44" cy="212" r="15" fill="#166534"/>
  <text x="44" y="217" text-anchor="middle" class="ptnum">2</text>
  <text x="66" y="208" class="ptname">毎期の償却額</text>
  <text x="66" y="226" class="ptbody">毎年まったく同じ金額</text>

  <line x1="30" y1="242" x2="330" y2="242" stroke="#dcfce7" stroke-width="2"/>

  <circle cx="44" cy="274" r="15" fill="#166534"/>
  <text x="44" y="279" text-anchor="middle" class="ptnum">3</text>
  <text x="66" y="270" class="ptname">位置づけ</text>
  <text x="66" y="288" class="ptbody">継続適用を条件に認められる簡便法</text>

  <rect x="30" y="374" width="300" height="226" rx="12" fill="#f0fdf4"/>
  <text x="46" y="400" class="ptname" fill="#166534">計算式</text>
  <text x="46" y="424" class="ptbody">毎期の償却額＝</text>
  <text x="46" y="442" class="ptbody">金利調整差額÷発行期間</text>
  <text x="46" y="470" class="ptname" fill="#166534">見分けるキーワード</text>
  <text x="46" y="494" class="ptbody">「定額法」「毎期均等額」</text>
  <text x="46" y="512" class="ptbody">指示なし＝2級は定額法が前提</text>

  <!-- 利息法 -->
  <rect x="16" y="646" width="328" height="42" rx="12" fill="#B45309"/>
  <text x="180" y="672" text-anchor="middle" class="colhead">利息法（簿記1級・原則法）</text>

  <rect x="16" y="700" width="328" height="500" rx="16" fill="#ffffff" stroke="#FCD9A0" stroke-width="2.5"/>

  <circle cx="44" cy="734" r="15" fill="#B45309"/>
  <text x="44" y="739" text-anchor="middle" class="ptnum">1</text>
  <text x="66" y="730" class="ptname">配分の方法</text>
  <text x="66" y="748" class="ptbody">帳簿価額×実効利子率で算定</text>

  <line x1="30" y1="764" x2="330" y2="764" stroke="#FEF3C7" stroke-width="2"/>

  <circle cx="44" cy="796" r="15" fill="#B45309"/>
  <text x="44" y="801" text-anchor="middle" class="ptnum">2</text>
  <text x="66" y="792" class="ptname">毎期の償却額</text>
  <text x="66" y="810" class="ptbody">帳簿価額が増えるほど年々増加</text>

  <line x1="30" y1="826" x2="330" y2="826" stroke="#FEF3C7" stroke-width="2"/>

  <circle cx="44" cy="858" r="15" fill="#B45309"/>
  <text x="44" y="863" text-anchor="middle" class="ptnum">3</text>
  <text x="66" y="854" class="ptname">位置づけ</text>
  <text x="66" y="872" class="ptbody">理論上、本来あるべき原則的な方法</text>

  <rect x="30" y="956" width="300" height="226" rx="12" fill="#FFFBEB"/>
  <text x="46" y="982" class="ptname" fill="#92400E">計算式</text>
  <text x="46" y="1006" class="ptbody">社債利息＝</text>
  <text x="46" y="1024" class="ptbody">期首帳簿価額×実効利子率</text>
  <text x="46" y="1052" class="ptname" fill="#92400E">見分けるキーワード</text>
  <text x="46" y="1076" class="ptbody">「利息法」「実効利子率」</text>
  <text x="46" y="1094" class="ptbody">実効利子率の指示があれば利息法</text>

  <!-- Bottom banner -->
  <rect x="16" y="1250" width="328" height="200" rx="16" fill="#fffbeb" stroke="#fcd34d" stroke-width="2.5"/>
  <text x="180" y="1280" text-anchor="middle" class="banner">2級は定額法だけでOK</text>
  <text x="180" y="1300" text-anchor="middle" class="banner">1級で利息法が原則と知る</text>
  <text x="180" y="1328" text-anchor="middle" class="bannersmall">定額法は簡単だが近似値、</text>
  <text x="180" y="1346" text-anchor="middle" class="bannersmall">利息法は複雑だが実態を</text>
  <text x="180" y="1364" text-anchor="middle" class="bannersmall">正確に反映する</text>
</svg>
