<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="800" height="600" rx="16" fill="#FEFCF9"/>
  <text x="400" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">二級建築士 学科・製図2段階突破の合格戦略マップ</text>
  <text x="400" y="44" text-anchor="middle" font-size="11" fill="#94A3B8">学科は「法規」を得点源に→合格の5年間有効期限をフル活用→製図5時間勝負へバトンリレー</text>

  <!-- 建築計画 -->
  <rect x="30" y="64" width="170" height="96" rx="14" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="115" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">建築計画（けいかく）</text>
  <text x="115" y="110" text-anchor="middle" font-size="11" fill="#1E40AF">25問</text>
  <text x="115" y="130" text-anchor="middle" font-size="9" fill="#374151">住宅・各部寸法の</text>
  <text x="115" y="144" text-anchor="middle" font-size="9" fill="#374151">暗記が中心</text>

  <!-- 建築法規（最優先・得点源） -->
  <rect x="220" y="64" width="170" height="96" rx="14" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2.5"/>
  <text x="305" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">★建築法規（ほうき）</text>
  <text x="305" y="110" text-anchor="middle" font-size="11" fill="#78350F">25問</text>
  <text x="305" y="130" text-anchor="middle" font-size="9" fill="#78350F">法令集持込可</text>
  <text x="305" y="144" text-anchor="middle" font-size="9" font-weight="700" fill="#C2410C">最優先の得点源！</text>

  <!-- 建築構造 -->
  <rect x="410" y="64" width="170" height="96" rx="14" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="495" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">建築構造（こうぞう）</text>
  <text x="495" y="110" text-anchor="middle" font-size="11" fill="#14532D">25問</text>
  <text x="495" y="130" text-anchor="middle" font-size="9" fill="#374151">力学計算・</text>
  <text x="495" y="144" text-anchor="middle" font-size="9" fill="#374151">構造形式の理解</text>

  <!-- 建築施工 -->
  <rect x="600" y="64" width="170" height="96" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="685" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">建築施工（せこう）</text>
  <text x="685" y="110" text-anchor="middle" font-size="11" fill="#4C1D95">25問</text>
  <text x="685" y="130" text-anchor="middle" font-size="9" fill="#374151">施工手順・</text>
  <text x="685" y="144" text-anchor="middle" font-size="9" fill="#374151">用語の暗記</text>

  <!-- 収束ライン -->
  <line x1="115" y1="160" x2="360" y2="248" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="305" y1="160" x2="385" y2="248" stroke="#FBBF24" stroke-width="1.5"/>
  <line x1="495" y1="160" x2="415" y2="248" stroke="#86EFAC" stroke-width="1.5"/>
  <line x1="685" y1="160" x2="440" y2="248" stroke="#C4B5FD" stroke-width="1.5"/>

  <!-- 学科試験合格バッジ -->
  <rect x="280" y="250" width="240" height="70" rx="16" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2.5"/>
  <text x="400" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">🎓 学科試験 合格！</text>
  <text x="400" y="300" text-anchor="middle" font-size="9.5" fill="#14532D">4科目とも60%前後の基準を死守</text>

  <line x1="400" y1="320" x2="400" y2="348" stroke="#94A3B8" stroke-width="2"/>
  <polygon points="400,355 394,345 406,345" fill="#94A3B8"/>

  <!-- 5年間有効タイムライン -->
  <rect x="60" y="360" width="680" height="46" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="400" y="388" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">学科合格から5年間、製図試験に何度でも再挑戦できる有効期限</text>
  <text x="110" y="424" text-anchor="middle" font-size="9" fill="#64748B">1年目</text>
  <text x="255" y="424" text-anchor="middle" font-size="9" fill="#64748B">2年目</text>
  <text x="400" y="424" text-anchor="middle" font-size="9" fill="#64748B">3年目</text>
  <text x="545" y="424" text-anchor="middle" font-size="9" fill="#64748B">4年目</text>
  <text x="690" y="424" text-anchor="middle" font-size="9" fill="#64748B">5年目</text>

  <line x1="400" y1="436" x2="400" y2="460" stroke="#EC4899" stroke-width="2"/>
  <polygon points="400,467 394,457 406,457" fill="#EC4899"/>
  <text x="440" y="452" text-anchor="middle" font-size="9.5" font-weight="700" fill="#DB2777">バトンリレー</text>

  <!-- 製図試験 -->
  <rect x="250" y="470" width="300" height="100" rx="16" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="2.5"/>
  <text x="400" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#9D174D">🖊️ 製図試験（せいずしけん）</text>
  <text x="400" y="518" text-anchor="middle" font-size="10" fill="#831843">5時間・手書きで設計図面を完成させる</text>
  <text x="400" y="538" text-anchor="middle" font-size="10" fill="#831843">面積オーバー・構造不成立は即失格に注意</text>
  <text x="400" y="556" text-anchor="middle" font-size="9" fill="#374151">合格率50〜55%</text>
</svg>
