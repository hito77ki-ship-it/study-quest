<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">企業結合会計と連結会計、視点の違いからわかる3つのポイント</title>
  <desc id="desc">企業結合会計は取得した瞬間の個別財務諸表上の一取引として処理されるのに対し、連結会計は支配関係が続く限り毎期継続してグループ全体の財務諸表を作成する手続きであるという違いを対比する図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#667085" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:25px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .ptnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13px;font-weight:800;fill:#ffffff}
      .ptname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:800;fill:#1f2937}
      .ptbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15.5px;font-weight:800;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="1200" height="800" rx="40" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="64" fill="#fef3c7" opacity="0.6"/>
  <circle cx="1100" cy="110" r="78" fill="#dbeafe" opacity="0.55"/>
  <circle cx="1090" cy="740" r="88" fill="#dbeafe" opacity="0.4"/>
  <circle cx="110" cy="730" r="70" fill="#fef3c7" opacity="0.45"/>

  <text x="600" y="50" text-anchor="middle" class="title">企業結合会計 vs 連結会計 視点の違いからわかるポイント</text>
  <text x="600" y="76" text-anchor="middle" class="sub">「取得した瞬間の一取引」か「支配が続く限り毎期続く手続き」か</text>

  <!-- Left column: 企業結合会計 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="104" width="500" height="46" rx="16" fill="#B45309"/>
    <text x="320" y="133" text-anchor="middle" class="colhead">企業結合会計（取得した瞬間・一取引）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="70" y="166" width="500" height="500" rx="22" fill="#ffffff" stroke="#FCD9A0" stroke-width="3"/>

    <circle cx="108" cy="206" r="17" fill="#B45309"/>
    <text x="108" y="211" text-anchor="middle" class="ptnum">1</text>
    <text x="136" y="202" class="ptname">対象となる財務諸表</text>
    <text x="136" y="222" class="ptbody">個別財務諸表——取得した会社1社の帳簿の話</text>

    <line x1="96" y1="240" x2="546" y2="240" stroke="#FEF3C7" stroke-width="2"/>

    <circle cx="108" cy="278" r="17" fill="#B45309"/>
    <text x="108" y="283" text-anchor="middle" class="ptnum">2</text>
    <text x="136" y="274" class="ptname">処理のタイミング</text>
    <text x="136" y="294" class="ptbody">取得した「その時」1回だけの取引として処理する</text>

    <line x1="96" y1="312" x2="546" y2="312" stroke="#FEF3C7" stroke-width="2"/>

    <circle cx="108" cy="350" r="17" fill="#B45309"/>
    <text x="108" y="355" text-anchor="middle" class="ptnum">3</text>
    <text x="136" y="346" class="ptname">主な論点</text>
    <text x="136" y="366" class="ptbody">取得法・逆取得・共通支配下の取引</text>

    <rect x="96" y="466" width="450" height="176" rx="14" fill="#FFFBEB"/>
    <text x="120" y="496" class="ptname" fill="#92400E">見分けるキーワード</text>
    <text x="120" y="522" class="ptbody">「取得した」「合併した」「株式交換」</text>
    <text x="120" y="544" class="ptbody">「取得原価の配分」「のれんの算定」</text>
    <text x="120" y="576" class="ptname" fill="#92400E">問いかけ</text>
    <text x="120" y="602" class="ptbody">「この取引、いくらで買ったことになる？」</text>
    <text x="120" y="624" class="ptbody">→ 取得時点の話がテーマ</text>
  </g>

  <!-- Right column: 連結会計 -->
  <g filter="url(#softShadow)">
    <rect x="630" y="104" width="500" height="46" rx="16" fill="#1D4ED8"/>
    <text x="880" y="133" text-anchor="middle" class="colhead">連結会計（支配が続く限り・毎期継続）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="630" y="166" width="500" height="500" rx="22" fill="#ffffff" stroke="#93C5FD" stroke-width="3"/>

    <circle cx="668" cy="206" r="17" fill="#1D4ED8"/>
    <text x="668" y="211" text-anchor="middle" class="ptnum">1</text>
    <text x="696" y="202" class="ptname">対象となる財務諸表</text>
    <text x="696" y="222" class="ptbody">連結財務諸表——親子会社グループ全体の帳簿</text>

    <line x1="656" y1="240" x2="1106" y2="240" stroke="#DBEAFE" stroke-width="2"/>

    <circle cx="668" cy="278" r="17" fill="#1D4ED8"/>
    <text x="668" y="283" text-anchor="middle" class="ptnum">2</text>
    <text x="696" y="274" class="ptname">処理のタイミング</text>
    <text x="696" y="294" class="ptbody">支配関係が続く限り、決算のたびに毎回作成する</text>

    <line x1="656" y1="312" x2="1106" y2="312" stroke="#DBEAFE" stroke-width="2"/>

    <circle cx="668" cy="350" r="17" fill="#1D4ED8"/>
    <text x="696" y="346" class="ptname">主な論点</text>
    <text x="696" y="366" class="ptbody">資本連結・成果連結・持分法</text>
    <text x="668" y="355" text-anchor="middle" class="ptnum">3</text>

    <rect x="656" y="466" width="450" height="176" rx="14" fill="#EFF6FF"/>
    <text x="680" y="496" class="ptname" fill="#1D4ED8">見分けるキーワード</text>
    <text x="680" y="522" class="ptbody">「親会社」「子会社」「非支配株主持分」</text>
    <text x="680" y="544" class="ptbody">「連結修正仕訳」「グループ全体」</text>
    <text x="680" y="576" class="ptname" fill="#1D4ED8">問いかけ</text>
    <text x="680" y="602" class="ptbody">「グループ全体で見るといくらになる？」</text>
    <text x="680" y="624" class="ptbody">→ 決算のたびに繰り返す話がテーマ</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="70" y="690" width="1060" height="92" rx="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="3"/>
    <text x="600" y="724" text-anchor="middle" class="banner">企業結合会計が「入口」、連結会計が「その後ずっと続く手続き」</text>
    <text x="600" y="750" text-anchor="middle" class="bannersmall">企業結合（株式取得）で子会社化した瞬間の処理を終えたら、その先は毎期の連結決算——2つは時系列でつながっている</text>
  </g>
</svg>
