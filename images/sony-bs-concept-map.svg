<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 490" width="760" height="490">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="490" rx="12" fill="#F8FAFC"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">ソニーグループ 連結貸借対照表（イメージ図）——のれん・非支配持分の位置</text>
  <text x="380" y="48" text-anchor="middle" font-size="10.5" fill="#64748B">※実際の金額比率とは異なる、位置関係を理解するための簡略図です</text>

  <!-- ラベル: 資産の部 / 負債・純資産の部 -->
  <text x="205" y="68" text-anchor="middle" font-size="8.5" fill="#94A3B8">しさん</text>
  <text x="205" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">資産の部</text>
  <text x="565" y="68" text-anchor="middle" font-size="8.5" fill="#94A3B8">ふさい・じゅんしさん</text>
  <text x="565" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">負債・純資産の部</text>

  <!-- 左側：資産の部の外枠 -->
  <rect x="40" y="90" width="330" height="364" rx="8" fill="none" stroke="#93C5FD" stroke-width="1.5"/>

  <!-- 流動資産 -->
  <rect x="52" y="102" width="306" height="70" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="205" y="142" text-anchor="middle" font-size="12" fill="#1E40AF">流動資産</text>
  <text x="205" y="158" text-anchor="middle" font-size="9.5" fill="#64748B">現金・売掛金・棚卸資産 など</text>

  <!-- 有形固定資産 -->
  <rect x="52" y="180" width="306" height="70" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="205" y="212" text-anchor="middle" font-size="8.5" fill="#94A3B8">ゆうけい こていしさん</text>
  <text x="205" y="224" text-anchor="middle" font-size="12" fill="#1E40AF">有形固定資産</text>
  <text x="205" y="240" text-anchor="middle" font-size="9.5" fill="#64748B">土地・建物・機械設備 など</text>

  <!-- 無形固定資産（のれんを含む・ハイライト） -->
  <rect x="52" y="258" width="306" height="160" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="205" y="280" text-anchor="middle" font-size="8.5" fill="#9A6B2E">むけい こていしさん</text>
  <text x="205" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412">無形固定資産</text>
  <rect x="68" y="304" width="274" height="98" rx="8" fill="#FED7AA"/>
  <text x="205" y="330" text-anchor="middle" font-size="14" font-weight="700" fill="#7C2D12">のれん（Goodwill）</text>
  <text x="205" y="352" text-anchor="middle" font-size="16" font-weight="700" fill="#7C2D12">約1兆6,739億円</text>
  <text x="205" y="372" text-anchor="middle" font-size="9.5" fill="#9A3412">（2026年3月期・買収のたびに積み上がる）</text>
  <text x="205" y="391" text-anchor="middle" font-size="9.5" fill="#9A3412">特許権・ソフトウェアなども同じ区分に入る</text>

  <!-- 右側：負債・純資産の部の外枠 -->
  <rect x="400" y="90" width="320" height="364" rx="8" fill="none" stroke="#86EFAC" stroke-width="1.5"/>

  <!-- 負債の部 -->
  <rect x="412" y="102" width="296" height="90" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="560" y="130" text-anchor="middle" font-size="8.5" fill="#94A3B8">ふさい</text>
  <text x="560" y="144" text-anchor="middle" font-size="12" fill="#166534">負債の部</text>
  <text x="560" y="162" text-anchor="middle" font-size="9.5" fill="#64748B">買掛金・借入金・社債 など</text>
  <text x="560" y="178" text-anchor="middle" font-size="9.5" fill="#64748B">（他人資本＝いずれ返す必要があるお金）</text>

  <!-- 純資産の部 -->
  <rect x="412" y="200" width="296" height="242" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="560" y="222" text-anchor="middle" font-size="8.5" fill="#3F6B4C">じゅんしさん</text>
  <text x="560" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">純資産の部</text>

  <!-- 株主資本 -->
  <rect x="426" y="246" width="268" height="70" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="560" y="270" text-anchor="middle" font-size="8.5" fill="#3F6B4C">かぶぬし しほん</text>
  <text x="560" y="284" text-anchor="middle" font-size="12" fill="#166534">株主資本</text>
  <text x="560" y="300" text-anchor="middle" font-size="9.5" fill="#3F6B4C">資本金・利益剰余金 など（親会社株主の取り分）</text>

  <!-- 非支配持分（ハイライト） -->
  <rect x="426" y="326" width="268" height="104" rx="8" fill="#FED7AA" stroke="#FDBA74" stroke-width="2"/>
  <text x="560" y="346" text-anchor="middle" font-size="8.5" fill="#9A6B2E">ひ・しはい・もちぶん</text>
  <text x="560" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#7C2D12">非支配持分</text>
  <text x="560" y="378" text-anchor="middle" font-size="10" fill="#9A3412">(Non-controlling interests)</text>
  <text x="560" y="400" text-anchor="middle" font-size="16" font-weight="700" fill="#7C2D12">約3,946億円</text>
  <text x="560" y="420" text-anchor="middle" font-size="9.5" fill="#9A3412">（日本基準では「非支配株主持分」）</text>

  <!-- 対応関係を示す注記 -->
  <text x="380" y="472" text-anchor="middle" font-size="10.5" fill="#475569">左（資産）の「のれん」は買収時に生まれ、右（純資産）の「非支配持分」は子会社の外部株主の取り分——どちらも連結会計特有の科目</text>
</svg>
