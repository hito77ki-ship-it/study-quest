<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1120" width="360" height="1120" role="img" aria-labelledby="t d">
  <title id="t">決算の仕訳マジック——法人税等の3ステップ＆消費税の相殺パズル（モバイル版）</title>
  <desc id="d">法人税等の中間納付から未払法人税等確定までの3ステップと、仮受消費税・仮払消費税を相殺して未払消費税を求める流れを縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1120" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">決算の仕訳マジック</text>
  <text x="180" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">期中の残高を反対側に置いて消し去る</text>

  <text x="20" y="72" font-size="12.5" font-weight="700" fill="#1E293B">🏦 法人税等——中間納付の3ステップ</text>

  <rect x="16" y="84" width="328" height="86" rx="10" fill="#EBF8FF" stroke="#3B4DA8" stroke-width="2"/>
  <rect x="30" y="94" width="70" height="20" rx="10" fill="#3B4DA8"/>
  <text x="65" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">STEP 1</text>
  <text x="180" y="108" font-size="10" fill="#64748B">期中（中間納付）</text>
  <text x="30" y="134" font-size="12" font-weight="700" fill="#3B4DA8">仮払法人税等</text>
  <text x="30" y="156" font-size="15" font-weight="700" fill="#3B4DA8">120,000円</text>

  <text x="180" y="184" text-anchor="middle" font-size="16" fill="#64748B">↓</text>

  <rect x="16" y="192" width="328" height="86" rx="10" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2"/>
  <rect x="30" y="202" width="70" height="20" rx="10" fill="#7C3AED"/>
  <text x="65" y="216" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">STEP 2</text>
  <text x="180" y="216" font-size="10" fill="#64748B">決算（税額確定）</text>
  <text x="30" y="242" font-size="12" font-weight="700" fill="#7C3AED">法人税等</text>
  <text x="30" y="264" font-size="15" font-weight="700" fill="#7C3AED">300,000円</text>

  <text x="180" y="292" text-anchor="middle" font-size="16" fill="#64748B">↓</text>

  <rect x="16" y="300" width="328" height="86" rx="10" fill="#F0FFF4" stroke="#276749" stroke-width="2"/>
  <rect x="30" y="310" width="70" height="20" rx="10" fill="#276749"/>
  <text x="65" y="324" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">STEP 3</text>
  <text x="190" y="324" font-size="10" fill="#64748B">決算整理（仕訳完成）</text>
  <text x="30" y="350" font-size="12" font-weight="700" fill="#276749">未払法人税等</text>
  <text x="30" y="372" font-size="15" font-weight="700" fill="#276749">180,000円</text>

  <rect x="16" y="396" width="328" height="44" rx="8" fill="#F7F9FF" stroke="#C3DAFE" stroke-width="1.5"/>
  <text x="180" y="415" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3B4DA8">法人税等300,000－仮払法人税等120,000</text>
  <text x="180" y="431" text-anchor="middle" font-size="10.5" font-weight="700" fill="#3B4DA8">＝未払法人税等180,000</text>

  <line x1="16" y1="456" x2="344" y2="456" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="20" y="482" font-size="12.5" font-weight="700" fill="#1E293B">🔄 消費税——決算の相殺パズル</text>

  <rect x="16" y="494" width="328" height="126" rx="10" fill="#E6FFFA" stroke="#4FD1C5" stroke-width="2"/>
  <rect x="120" y="504" width="130" height="22" rx="11" fill="#4FD1C5"/>
  <text x="185" y="519" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">仮受消費税</text>
  <text x="185" y="546" text-anchor="middle" font-size="16" font-weight="700" fill="#285E61">500,000円</text>
  <text x="185" y="566" text-anchor="middle" font-size="10" fill="#374151">期中は貸方（右）</text>
  <text x="185" y="584" text-anchor="middle" font-size="10" font-weight="700" fill="#285E61">→ 決算で借方（左）へ移動</text>

  <text x="180" y="640" text-anchor="middle" font-size="18">⇄</text>
  <text x="180" y="656" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309">相殺</text>

  <rect x="16" y="672" width="328" height="126" rx="10" fill="#FFF0F0" stroke="#FC8181" stroke-width="2"/>
  <rect x="120" y="682" width="130" height="22" rx="11" fill="#FC8181"/>
  <text x="185" y="697" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">仮払消費税</text>
  <text x="185" y="724" text-anchor="middle" font-size="16" font-weight="700" fill="#C05621">320,000円</text>
  <text x="185" y="744" text-anchor="middle" font-size="10" fill="#374151">期中は借方（左）</text>
  <text x="185" y="762" text-anchor="middle" font-size="10" font-weight="700" fill="#C05621">→ 決算で貸方（右）へ移動</text>

  <rect x="16" y="812" width="328" height="60" rx="10" fill="#FEFCE8" stroke="#D97706" stroke-width="2"/>
  <text x="180" y="836" text-anchor="middle" font-size="11.5" font-weight="700" fill="#B45309">500,000－320,000＝差額180,000円</text>
  <text x="180" y="858" text-anchor="middle" font-size="10.5" fill="#78350F">未払消費税として国に納付する</text>

  <rect x="16" y="892" width="328" height="80" rx="10" fill="#111827"/>
  <text x="180" y="918" text-anchor="middle" font-size="11" font-weight="700" fill="#8CC63F">決算マジックの正体：期中に貯まった</text>
  <text x="180" y="936" text-anchor="middle" font-size="11" font-weight="700" fill="#8CC63F">残高を反対側に置いて消し去るだけ</text>
  <text x="180" y="956" text-anchor="middle" font-size="10" fill="#E5E7EB">法人税等も消費税も同じ仕組み</text>
</svg>
