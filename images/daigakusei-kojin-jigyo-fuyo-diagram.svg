<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="420" rx="12" fill="#F8FAFC"/>

  <text x="380" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1A202C">「所得」に至るまでの計算方法の違い</text>

  <!-- アルバイト側 -->
  <rect x="30" y="64" width="330" height="330" rx="10" fill="#EBF8FF" stroke="#BEE3F8" stroke-width="1.5"/>
  <text x="195" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#2C5282">アルバイト（給与所得）</text>

  <rect x="55" y="116" width="280" height="46" rx="8" fill="#ffffff" stroke="#CBD5E0"/>
  <text x="195" y="144" text-anchor="middle" font-size="13" fill="#1A202C">収入（給与）</text>

  <text x="195" y="185" text-anchor="middle" font-size="18" fill="#2C5282">−</text>

  <rect x="55" y="196" width="280" height="52" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="195" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">給与所得控除</text>
  <text x="195" y="236" text-anchor="middle" font-size="11.5" fill="#2563EB">（自動・最低65万円保証）</text>

  <text x="195" y="272" text-anchor="middle" font-size="18" fill="#2C5282">=</text>

  <rect x="55" y="282" width="280" height="46" rx="8" fill="#1E40AF"/>
  <text x="195" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">合計所得金額</text>

  <text x="195" y="360" text-anchor="middle" font-size="12" fill="#2C5282">誰でも自動的に控除される</text>
  <text x="195" y="380" text-anchor="middle" font-size="12" fill="#2C5282">→ 収入188万円でも所得123万円</text>

  <!-- 個人事業主側 -->
  <rect x="400" y="64" width="330" height="330" rx="10" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.5"/>
  <text x="565" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#276749">個人事業主（事業所得）</text>

  <rect x="425" y="116" width="280" height="46" rx="8" fill="#ffffff" stroke="#CBD5E0"/>
  <text x="565" y="144" text-anchor="middle" font-size="13" fill="#1A202C">収入（売上）</text>

  <text x="565" y="185" text-anchor="middle" font-size="18" fill="#276749">−</text>

  <rect x="425" y="196" width="280" height="52" rx="8" fill="#FFFBEB" stroke="#F6E05E"/>
  <text x="565" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#975A16">必要経費＋青色申告特別控除</text>
  <text x="565" y="236" text-anchor="middle" font-size="11.5" fill="#B7791F">（自分で確保する必要あり・最大65万円）</text>

  <text x="565" y="272" text-anchor="middle" font-size="18" fill="#276749">=</text>

  <rect x="425" y="282" width="280" height="46" rx="8" fill="#276749"/>
  <text x="565" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">合計所得金額</text>

  <text x="565" y="360" text-anchor="middle" font-size="12" fill="#276749">白色申告だと控除の保証なし</text>
  <text x="565" y="380" text-anchor="middle" font-size="12" fill="#276749">青色申告なら同水準を確保できる</text>
</svg>
