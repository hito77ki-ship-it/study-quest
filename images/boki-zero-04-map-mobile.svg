<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1080" width="360" height="1080">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1080" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">単式簿記 vs 複式簿記</text>
  <text x="180" y="44" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">＆ 借方・貸方の一発暗記</text>
  <text x="180" y="62" text-anchor="middle" font-size="10" fill="#64748B">「り」は左に払う、「し」は右に流れる</text>

  <!-- 単式簿記 -->
  <rect x="20" y="80" width="320" height="200" rx="12" fill="#FFF9C4" stroke="#F6E05E" stroke-width="2"/>
  <rect x="40" y="98" width="110" height="26" rx="13" fill="#F6E05E"/>
  <text x="95" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">単式簿記</text>
  <text x="180" y="150" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">家計簿スタイル</text>
  <rect x="40" y="164" width="280" height="40" rx="8" fill="#ffffff"/>
  <text x="180" y="188" text-anchor="middle" font-size="11.5" fill="#78350F">4/1　商品販売　＋1,100円</text>
  <text x="40" y="228" font-size="11" fill="#166534">✅ 書きやすい</text>
  <text x="40" y="252" font-size="11" fill="#B91C1C">❌ なぜ増えたかわからない</text>

  <!-- 複式簿記 -->
  <rect x="20" y="298" width="320" height="200" rx="12" fill="#E8F7B8" stroke="#9AE6B4" stroke-width="2"/>
  <rect x="40" y="316" width="110" height="26" rx="13" fill="#9AE6B4"/>
  <text x="95" y="334" text-anchor="middle" font-size="11" font-weight="700" fill="#276749">複式簿記</text>
  <text x="180" y="368" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">仕訳スタイル</text>
  <rect x="40" y="382" width="280" height="40" rx="8" fill="#ffffff"/>
  <line x1="180" y1="382" x2="180" y2="422" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="110" y="406" text-anchor="middle" font-size="11" font-weight="700" fill="#2B6CB0">現金 1,100</text>
  <text x="250" y="406" text-anchor="middle" font-size="11" font-weight="700" fill="#C05621">売上 1,100</text>
  <text x="40" y="446" font-size="11" fill="#166534">✅ 結果と原因を同時記録</text>
  <text x="40" y="470" font-size="11" fill="#166534">✅ 財務諸表が自動的に作れる</text>

  <!-- 暗記セクション -->
  <rect x="20" y="524" width="320" height="500" rx="14" fill="#ffffff" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="180" y="554" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">借方・貸方の一発暗記</text>

  <text x="180" y="650" text-anchor="middle" font-size="70" font-weight="900" fill="#2B6CB0">り</text>
  <text x="180" y="686" text-anchor="middle" font-size="22">⬅️</text>
  <text x="180" y="716" text-anchor="middle" font-size="14" font-weight="700" fill="#2B6CB0">借方（かりかた）＝左</text>
  <text x="180" y="736" text-anchor="middle" font-size="11" fill="#64748B">「り」のハネが左に払う！</text>

  <line x1="60" y1="770" x2="300" y2="770" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="180" y="850" text-anchor="middle" font-size="70" font-weight="900" fill="#C05621">し</text>
  <text x="180" y="886" text-anchor="middle" font-size="22">➡️</text>
  <text x="180" y="916" text-anchor="middle" font-size="14" font-weight="700" fill="#C05621">貸方（かしかた）＝右</text>
  <text x="180" y="936" text-anchor="middle" font-size="11" fill="#64748B">「し」の曲がりが右に流れる！</text>

  <rect x="20" y="972" width="320" height="52" rx="10" fill="#111827"/>
  <text x="180" y="1004" text-anchor="middle" font-size="11" font-weight="700" fill="#8CC63F">例：現金1,100（借方＝左）／売上1,100（貸方＝右）</text>
</svg>
