<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 900" width="360" height="900" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">貸倒引当金あり vs なし——利益への影響比較（モバイル版）</title>
  <desc id="svgdesc">貸倒引当金を計上する場合としない場合で、前期・当期の利益への影響がどう変わるかを縦に並べて比較した図解</desc>
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="900" rx="12" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">貸倒引当金 あり vs なし</text>
  <text x="180" y="42" text-anchor="middle" font-size="9.5" fill="#64748B">利益への影響比較</text>

  <rect x="20" y="56" width="320" height="30" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="76" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">【引当金あり】（正しい処理）</text>

  <rect x="20" y="94" width="320" height="70" rx="8" fill="#DBEAFE"/>
  <text x="36" y="114" font-size="10.5" font-weight="700" fill="#1D4ED8">前期末</text>
  <text x="36" y="132" font-size="10.5" fill="#1E3A8A">貸倒引当金繰入¥7,000／貸倒引当金¥7,000</text>
  <text x="36" y="150" font-size="9.5" fill="#3B82F6">→ 前期の費用として計上（利益▲7,000）</text>

  <line x1="180" y1="164" x2="180" y2="188" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="180,192 174,184 186,184" fill="#64748B"/>

  <rect x="20" y="198" width="320" height="70" rx="8" fill="#DCFCE7"/>
  <text x="36" y="218" font-size="10.5" font-weight="700" fill="#166534">当期（貸倒発生）</text>
  <text x="36" y="236" font-size="10.5" fill="#14532D">貸倒引当金¥7,000／売掛金¥7,000</text>
  <text x="36" y="254" font-size="9.5" fill="#16A34A">→ 引当金で相殺　当期の利益への影響±0</text>

  <rect x="20" y="278" width="320" height="54" rx="8" fill="#F0FDF4" stroke="#4ADE80" stroke-width="2"/>
  <text x="180" y="300" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">✅ 費用の期間対応が正しい</text>
  <text x="180" y="318" text-anchor="middle" font-size="10.5" fill="#15803D">前期▲7,000 / 当期±0</text>

  <line x1="20" y1="356" x2="340" y2="356" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <rect x="20" y="376" width="320" height="30" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="180" y="396" text-anchor="middle" font-size="12.5" font-weight="700" fill="#991B1B">【引当金なし】（NG）</text>

  <rect x="20" y="414" width="320" height="70" rx="8" fill="#F1F5F9"/>
  <text x="36" y="434" font-size="10.5" font-weight="700" fill="#64748B">前期末</text>
  <text x="36" y="452" font-size="10.5" fill="#94A3B8">（仕訳なし）</text>
  <text x="36" y="470" font-size="9.5" fill="#94A3B8">→ 前期の費用計上なし（利益は正確でない）</text>

  <line x1="180" y1="484" x2="180" y2="508" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="180,512 174,504 186,504" fill="#64748B"/>

  <rect x="20" y="518" width="320" height="70" rx="8" fill="#FEE2E2"/>
  <text x="36" y="538" font-size="10.5" font-weight="700" fill="#991B1B">当期（貸倒発生）</text>
  <text x="36" y="556" font-size="10.5" fill="#7F1D1D">貸倒損失¥7,000／売掛金¥7,000</text>
  <text x="36" y="574" font-size="9.5" fill="#DC2626">→ 当期にドカンと費用計上（利益▲7,000）</text>

  <rect x="20" y="598" width="320" height="54" rx="8" fill="#FEF2F2" stroke="#F87171" stroke-width="2"/>
  <text x="180" y="620" text-anchor="middle" font-size="11.5" font-weight="700" fill="#991B1B">❌ 費用が当期に偏る（利益の歪み）</text>
  <text x="180" y="638" text-anchor="middle" font-size="10.5" fill="#DC2626">前期±0 / 当期▲7,000</text>

  <rect x="20" y="672" width="320" height="50" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="694" text-anchor="middle" font-size="10.5" fill="#92400E">引当金の目的＝費用・収益の期間対応</text>
  <text x="180" y="712" text-anchor="middle" font-size="10.5" fill="#92400E">（発生主義の徹底）</text>
</svg>
