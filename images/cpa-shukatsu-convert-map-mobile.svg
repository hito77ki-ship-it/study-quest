<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1340" viewBox="0 0 360 1340" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">公認会計士試験撤退から面接アピールへのネガポジ変換3ステップ戦略マップ（モバイル版）</title>
  <desc id="svgdesc">面接官からのネガティブな質問を、培った会計知識と自己管理力を経て、入社後のビジョンへとひっくり返す3ステップの変換フローを縦に並べた図解</desc>
  <defs>
    <linearGradient id="cmmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF5F5"/>
      <stop offset="0.5" stop-color="#F7F5FF"/>
      <stop offset="1" stop-color="#F0FFF7"/>
    </linearGradient>
    <style>.ct{font-family:"Noto Sans JP",system-ui,sans-serif}.cr{font-family:"Noto Sans JP",system-ui,sans-serif;font-size:10px;fill:#64748b}</style>
  </defs>

  <rect width="360" height="1340" rx="18" fill="url(#cmmBg)"/>

  <rect x="16" y="20" width="328" height="60" rx="12" fill="#1E293B"/>
  <text x="180" y="42" text-anchor="middle" class="ct" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1">大谷流・面接ネガポジ変換マップ</text>
  <text x="180" y="62" text-anchor="middle" class="ct" font-size="13" font-weight="800" fill="#FFFFFF">「なぜ諦めた？」を『即戦力』に変える3ステップ</text>

  <!-- STEP1 -->
  <rect x="16" y="98" width="328" height="330" rx="16" fill="#FFF1F1" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="16" y="98" width="328" height="40" rx="16" fill="#F87171"/>
  <rect x="16" y="122" width="328" height="16" fill="#F87171"/>
  <text x="180" y="122" text-anchor="middle" class="ct" font-size="10" font-weight="700" fill="rgba(255,255,255,.85)" letter-spacing="1">STEP 1　ネガティブな質問</text>

  <rect x="140" y="150" width="80" height="60" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="2.5"/>
  <text x="180" y="196" text-anchor="middle" class="ct" font-size="36" font-weight="800" fill="#EF4444">？</text>

  <text x="180" y="234" text-anchor="middle" class="ct" font-size="12.5" font-weight="700" fill="#991B1B">「公認会計士はなぜ</text>
  <text x="180" y="252" text-anchor="middle" class="ct" font-size="12.5" font-weight="700" fill="#991B1B">諦めたんですか？」</text>

  <rect x="34" y="268" width="292" height="66" rx="10" fill="rgba(239,68,68,.08)" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="180" y="288" text-anchor="middle" class="ct" font-size="11" fill="#991B1B">面接で必ず突かれる、</text>
  <text x="180" y="304" text-anchor="middle" class="ct" font-size="11" fill="#991B1B">受験生が一番怖い質問。</text>
  <text x="180" y="320" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#991B1B">でも、ここが逆転の起点。</text>

  <text x="180" y="360" text-anchor="middle" class="ct" font-size="11.5" font-weight="700" fill="#B91C1C">NG回答：「無理でした」</text>
  <text x="180" y="378" text-anchor="middle" class="ct" font-size="10.5" fill="#B91C1C">で終わると評価はマイナスのまま</text>
  <text x="180" y="404" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#B91C1C">視点を変えれば武器になる</text>

  <path d="M180,436 L180,462 M170,450 L180,462 L190,450" fill="none" stroke="#818CF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="426" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#4338CA">視点を変換</text>

  <!-- STEP2 -->
  <rect x="16" y="472" width="328" height="330" rx="16" fill="#F0F5FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="472" width="328" height="40" rx="16" fill="#60A5FA"/>
  <rect x="16" y="496" width="328" height="16" fill="#60A5FA"/>
  <text x="180" y="496" text-anchor="middle" class="ct" font-size="10" font-weight="700" fill="rgba(255,255,255,.85)" letter-spacing="1">STEP 2　培った武器</text>

  <path d="M180,524 L212,534 L212,562 Q212,586 180,598 Q148,586 148,562 L148,534 Z" fill="#DBEAFE" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="180" y1="530" x2="180" y2="592" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <line x1="166" y1="548" x2="194" y2="548" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>

  <text x="180" y="626" text-anchor="middle" class="ct" font-size="12.5" font-weight="700" fill="#1E3A8A">財務・管理会計の知識</text>
  <text x="180" y="642" text-anchor="middle" class="cr">（ざいむ・かんりかいけい）</text>
  <text x="180" y="662" text-anchor="middle" class="ct" font-size="12.5" font-weight="700" fill="#1E3A8A">数年間の自己管理力</text>
  <text x="180" y="678" text-anchor="middle" class="cr">（じこかんりりょく）</text>

  <rect x="34" y="694" width="292" height="66" rx="10" fill="rgba(59,130,246,.08)" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="714" text-anchor="middle" class="ct" font-size="11" fill="#1E3A8A">数千時間の学習で身につけた</text>
  <text x="180" y="730" text-anchor="middle" class="ct" font-size="11" fill="#1E3A8A">「財務諸表を読む力」と</text>
  <text x="180" y="746" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#1E3A8A">「自分で方向転換を決めた判断力」</text>

  <text x="180" y="778" text-anchor="middle" class="ct" font-size="11.5" font-weight="700" fill="#1D4ED8">この2つを自分の言葉で</text>
  <text x="180" y="794" text-anchor="middle" class="ct" font-size="11.5" font-weight="700" fill="#1D4ED8">具体的に語れるかが勝負</text>

  <path d="M180,824 L180,850 M170,838 L180,850 L190,838" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="814" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#15803D">利益に変換</text>

  <!-- STEP3 -->
  <rect x="16" y="860" width="328" height="330" rx="16" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="860" width="328" height="40" rx="16" fill="#22C55E"/>
  <rect x="16" y="884" width="328" height="16" fill="#22C55E"/>
  <text x="180" y="884" text-anchor="middle" class="ct" font-size="10" font-weight="700" fill="rgba(255,255,255,.85)" letter-spacing="1">STEP 3　入社後のリターン</text>

  <polyline points="150,952 168,934 184,946 218,910" fill="none" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="218,910 202,910 218,926" fill="#16A34A"/>
  <circle cx="150" cy="952" r="5" fill="#22C55E"/>

  <text x="180" y="1000" text-anchor="middle" class="ct" font-size="12.5" font-weight="700" fill="#14532D">即戦力（そくせんりょく）</text>
  <text x="180" y="1020" text-anchor="middle" class="ct" font-size="12.5" font-weight="700" fill="#14532D">として利益に貢献</text>

  <rect x="34" y="1040" width="292" height="66" rx="10" fill="rgba(34,197,94,.08)" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="180" y="1060" text-anchor="middle" class="ct" font-size="11" fill="#14532D">「御社の経理・財務で、</text>
  <text x="180" y="1076" text-anchor="middle" class="ct" font-size="11" fill="#14532D">この知識と判断力を</text>
  <text x="180" y="1092" text-anchor="middle" class="ct" font-size="11" font-weight="700" fill="#14532D">実務で活かしたい」</text>

  <text x="180" y="1124" text-anchor="middle" class="ct" font-size="11.5" font-weight="700" fill="#15803D">評価がまるごと</text>
  <text x="180" y="1140" text-anchor="middle" class="ct" font-size="11.5" font-weight="700" fill="#15803D">ひっくり返る着地点</text>

  <!-- Bottom summary bar -->
  <rect x="16" y="1170" width="328" height="132" rx="14" fill="#111827"/>
  <text x="180" y="1198" text-anchor="middle" class="ct" font-size="11.5" fill="#E5E7EB">面接官が知りたいのは「なぜ落ちたか」</text>
  <text x="180" y="1216" text-anchor="middle" class="ct" font-size="11.5" fill="#E5E7EB">ではなく、その経験を</text>
  <text x="180" y="1240" text-anchor="middle" class="ct" font-size="12" font-weight="700" fill="#8CC63F">「どううちの会社の利益に</text>
  <text x="180" y="1258" text-anchor="middle" class="ct" font-size="12" font-weight="700" fill="#8CC63F">変えてくれるか」の一点だけ。</text>

  <text x="180" y="1286" text-anchor="middle" class="ct" font-size="11" fill="#374151">挫折を隠さず、逆算戦略で武器に変える</text>
  <text x="180" y="1302" text-anchor="middle" class="ct" font-size="11" fill="#374151">——それが内定をむしり取る近道です。</text>
</svg>
