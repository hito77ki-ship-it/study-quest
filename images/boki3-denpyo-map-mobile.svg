<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1100" width="360" height="1100">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="1100" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">３伝票制の使い分けと記入ルール</text>

  <!-- 入金伝票 -->
  <rect x="16" y="46" width="328" height="176" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="46" width="328" height="34" rx="10" fill="#3B82F6"/>
  <rect x="16" y="70" width="328" height="10" fill="#3B82F6"/>
  <text x="180" y="68" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">入金伝票 💵</text>
  <text x="180" y="96" text-anchor="middle" font-size="11" fill="#1E40AF">現金を受け取ったとき</text>
  <rect x="32" y="106" width="296" height="52" rx="6" fill="#DBEAFE"/>
  <text x="180" y="126" text-anchor="middle" font-size="11" fill="#1D4ED8">借方は常に「現金」固定</text>
  <text x="180" y="144" text-anchor="middle" font-size="11" fill="#1D4ED8">貸方科目を伝票に記入</text>
  <text x="180" y="188" text-anchor="middle" font-size="10.5" fill="#94A3B8">例：現金 / 売上 10,000</text>

  <!-- 出金伝票 -->
  <rect x="16" y="238" width="328" height="176" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="16" y="238" width="328" height="34" rx="10" fill="#EF4444"/>
  <rect x="16" y="262" width="328" height="10" fill="#EF4444"/>
  <text x="180" y="260" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">出金伝票 💸</text>
  <text x="180" y="288" text-anchor="middle" font-size="11" fill="#991B1B">現金を支払ったとき</text>
  <rect x="32" y="298" width="296" height="52" rx="6" fill="#FEE2E2"/>
  <text x="180" y="318" text-anchor="middle" font-size="11" fill="#991B1B">貸方は常に「現金」固定</text>
  <text x="180" y="336" text-anchor="middle" font-size="11" fill="#991B1B">借方科目を伝票に記入</text>
  <text x="180" y="380" text-anchor="middle" font-size="10.5" fill="#94A3B8">例：仕入 10,000 / 現金</text>

  <!-- 振替伝票 -->
  <rect x="16" y="430" width="328" height="176" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="430" width="328" height="34" rx="10" fill="#22C55E"/>
  <rect x="16" y="454" width="328" height="10" fill="#22C55E"/>
  <text x="180" y="452" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">振替伝票 📄</text>
  <text x="180" y="480" text-anchor="middle" font-size="11" fill="#166534">現金以外の取引のとき</text>
  <rect x="32" y="490" width="296" height="52" rx="6" fill="#DCFCE7"/>
  <text x="180" y="510" text-anchor="middle" font-size="11" fill="#15803D">借方・貸方どちらも記入</text>
  <text x="180" y="528" text-anchor="middle" font-size="11" fill="#15803D">（普通の仕訳と同じ形）</text>
  <text x="180" y="572" text-anchor="middle" font-size="10.5" fill="#94A3B8">例：売掛金/売上 10,000</text>

  <!-- 現金混在取引 -->
  <rect x="16" y="622" width="328" height="424" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="648" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">現金と掛けが混在するとき</text>
  <text x="180" y="666" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">——分解法 vs 擬制法</text>

  <rect x="32" y="682" width="296" height="150" rx="8" fill="#FEF9C3"/>
  <text x="180" y="706" text-anchor="middle" font-size="11.5" font-weight="700" fill="#713F12">分解法（現金部分を分ける）</text>
  <text x="180" y="726" text-anchor="middle" font-size="10" fill="#78350F">現金¥3,000＋掛け¥7,000で</text>
  <text x="180" y="742" text-anchor="middle" font-size="10" fill="#78350F">仕入¥10,000</text>
  <text x="180" y="764" text-anchor="middle" font-size="10" fill="#78350F">出金伝票：仕入¥3,000／現金</text>
  <text x="180" y="782" text-anchor="middle" font-size="10" fill="#78350F">振替伝票：仕入¥7,000／買掛金</text>

  <rect x="32" y="844" width="296" height="150" rx="8" fill="#FEF3C7"/>
  <text x="180" y="868" text-anchor="middle" font-size="11.5" font-weight="700" fill="#713F12">擬制法（全額掛けにしてキャンセル）</text>
  <text x="180" y="890" text-anchor="middle" font-size="10" fill="#78350F">振替伝票：仕入¥10,000／買掛金</text>
  <text x="180" y="908" text-anchor="middle" font-size="10" fill="#78350F">入金伝票：現金¥3,000／買掛金</text>
  <text x="180" y="928" text-anchor="middle" font-size="10" fill="#78350F">（掛けを現金で即時払いと擬制）</text>

  <text x="180" y="1024" text-anchor="middle" font-size="10.5" fill="#94A3B8">💡 どちらの方法を使うかは問題文の指示に</text>
  <text x="180" y="1040" text-anchor="middle" font-size="10.5" fill="#94A3B8">従う——合計金額は同じになる</text>
</svg>
