<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1480" viewBox="0 0 360 1480" role="img" aria-labelledby="title desc">
  <title id="title">企業結合会計と連結会計、視点の違いからわかる3つのポイント（モバイル版）</title>
  <desc id="desc">企業結合会計は取得した瞬間の個別財務諸表上の一取引として処理されるのに対し、連結会計は支配関係が続く限り毎期継続してグループ全体の財務諸表を作成する手続きであるという違いを対比する図解</desc>
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:9.5px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .ptnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11px;font-weight:800;fill:#ffffff}
      .ptname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#1f2937}
      .ptbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="360" height="1480" rx="20" fill="url(#mbg)"/>

  <text x="180" y="26" text-anchor="middle" class="title">企業結合会計 vs 連結会計</text>
  <text x="180" y="44" text-anchor="middle" class="sub">視点の違いからわかるポイント</text>

  <!-- 企業結合会計 -->
  <rect x="16" y="62" width="328" height="42" rx="12" fill="#B45309"/>
  <text x="180" y="88" text-anchor="middle" class="colhead">企業結合会計（取得した瞬間）</text>

  <rect x="16" y="116" width="328" height="500" rx="16" fill="#ffffff" stroke="#FCD9A0" stroke-width="2.5"/>

  <circle cx="44" cy="150" r="15" fill="#B45309"/>
  <text x="44" y="155" text-anchor="middle" class="ptnum">1</text>
  <text x="66" y="146" class="ptname">対象となる財務諸表</text>
  <text x="66" y="164" class="ptbody">個別財務諸表（取得した1社の帳簿）</text>

  <line x1="30" y1="180" x2="330" y2="180" stroke="#FEF3C7" stroke-width="2"/>

  <circle cx="44" cy="212" r="15" fill="#B45309"/>
  <text x="44" y="217" text-anchor="middle" class="ptnum">2</text>
  <text x="66" y="208" class="ptname">処理のタイミング</text>
  <text x="66" y="226" class="ptbody">取得した「その時」1回だけの取引</text>

  <line x1="30" y1="242" x2="330" y2="242" stroke="#FEF3C7" stroke-width="2"/>

  <circle cx="44" cy="274" r="15" fill="#B45309"/>
  <text x="44" y="279" text-anchor="middle" class="ptnum">3</text>
  <text x="66" y="270" class="ptname">主な論点</text>
  <text x="66" y="288" class="ptbody">取得法・逆取得・共通支配下の取引</text>

  <rect x="30" y="374" width="300" height="226" rx="12" fill="#FFFBEB"/>
  <text x="46" y="400" class="ptname" fill="#92400E">見分けるキーワード</text>
  <text x="46" y="422" class="ptbody">「取得した」「合併した」「株式交換」</text>
  <text x="46" y="440" class="ptbody">「取得原価の配分」「のれん算定」</text>
  <text x="46" y="470" class="ptname" fill="#92400E">問いかけ</text>
  <text x="46" y="494" class="ptbody">「いくらで買ったことになる？」</text>
  <text x="46" y="512" class="ptbody">→ 取得時点の話がテーマ</text>

  <!-- 連結会計 -->
  <rect x="16" y="646" width="328" height="42" rx="12" fill="#1D4ED8"/>
  <text x="180" y="672" text-anchor="middle" class="colhead">連結会計（支配が続く限り継続）</text>

  <rect x="16" y="700" width="328" height="500" rx="16" fill="#ffffff" stroke="#93C5FD" stroke-width="2.5"/>

  <circle cx="44" cy="734" r="15" fill="#1D4ED8"/>
  <text x="44" y="739" text-anchor="middle" class="ptnum">1</text>
  <text x="66" y="730" class="ptname">対象となる財務諸表</text>
  <text x="66" y="748" class="ptbody">連結財務諸表（グループ全体の帳簿）</text>

  <line x1="30" y1="764" x2="330" y2="764" stroke="#DBEAFE" stroke-width="2"/>

  <circle cx="44" cy="796" r="15" fill="#1D4ED8"/>
  <text x="44" y="801" text-anchor="middle" class="ptnum">2</text>
  <text x="66" y="792" class="ptname">処理のタイミング</text>
  <text x="66" y="810" class="ptbody">支配関係が続く限り、決算のたび毎回</text>

  <line x1="30" y1="826" x2="330" y2="826" stroke="#DBEAFE" stroke-width="2"/>

  <circle cx="44" cy="858" r="15" fill="#1D4ED8"/>
  <text x="44" y="863" text-anchor="middle" class="ptnum">3</text>
  <text x="66" y="854" class="ptname">主な論点</text>
  <text x="66" y="872" class="ptbody">資本連結・成果連結・持分法</text>

  <rect x="30" y="956" width="300" height="226" rx="12" fill="#EFF6FF"/>
  <text x="46" y="982" class="ptname" fill="#1D4ED8">見分けるキーワード</text>
  <text x="46" y="1004" class="ptbody">「親会社」「子会社」「非支配株主持分」</text>
  <text x="46" y="1022" class="ptbody">「連結修正仕訳」「グループ全体」</text>
  <text x="46" y="1052" class="ptname" fill="#1D4ED8">問いかけ</text>
  <text x="46" y="1076" class="ptbody">「グループ全体でいくらになる？」</text>
  <text x="46" y="1094" class="ptbody">→ 決算のたびに繰り返す話がテーマ</text>

  <!-- Bottom banner -->
  <rect x="16" y="1250" width="328" height="200" rx="16" fill="#fffbeb" stroke="#fcd34d" stroke-width="2.5"/>
  <text x="180" y="1280" text-anchor="middle" class="banner">企業結合が「入口」</text>
  <text x="180" y="1300" text-anchor="middle" class="banner">連結会計が「その後ずっと続く」</text>
  <text x="180" y="1328" text-anchor="middle" class="bannersmall">株式取得で子会社化した瞬間の</text>
  <text x="180" y="1346" text-anchor="middle" class="bannersmall">処理を終えたら、その先は毎期の</text>
  <text x="180" y="1364" text-anchor="middle" class="bannersmall">連結決算——2つは時系列でつながる</text>
</svg>
