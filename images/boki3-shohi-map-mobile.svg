<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1160" width="360" height="1160">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1160" rx="16" fill="#F8FAFC"/>
  <text x="180" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">消費税（税抜方式）の流れ</text>
  <text x="180" y="52" text-anchor="middle" font-size="11" fill="#64748B">3段階で処理する</text>

  <!-- Phase 1: 仕入時 -->
  <rect x="16" y="70" width="328" height="210" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="16" y="70" width="328" height="32" rx="10" fill="#EF4444"/>
  <rect x="16" y="92" width="328" height="10" fill="#EF4444"/>
  <text x="180" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">① 仕入時</text>
  <text x="34" y="122" font-size="12.5" fill="#991B1B">仕入 ¥100,000</text>
  <text x="34" y="142" font-size="12.5" fill="#991B1B">仮払消費税 ¥10,000</text>
  <text x="180" y="164" text-anchor="middle" font-size="11.5" fill="#7F1D1D">合計 ¥110,000 支払</text>
  <rect x="34" y="176" width="292" height="86" rx="6" fill="#FFECEC"/>
  <text x="180" y="198" text-anchor="middle" font-size="12" fill="#991B1B">仕　入　　100,000</text>
  <text x="180" y="220" text-anchor="middle" font-size="12" fill="#991B1B">仮払消費税  10,000</text>
  <text x="180" y="242" text-anchor="middle" font-size="10.5" fill="#94A3B8">　 ／ 買掛金等 110,000</text>

  <path d="M180,286 L180,310 M170,300 L180,310 L190,300" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Phase 2: 売上時 -->
  <rect x="16" y="320" width="328" height="210" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="320" width="328" height="32" rx="10" fill="#22C55E"/>
  <rect x="16" y="342" width="328" height="10" fill="#22C55E"/>
  <text x="180" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">② 売上時</text>
  <text x="34" y="372" font-size="12.5" fill="#166534">売上 ¥150,000</text>
  <text x="34" y="392" font-size="12.5" fill="#166534">仮受消費税 ¥15,000</text>
  <text x="180" y="414" text-anchor="middle" font-size="11.5" fill="#14532D">合計 ¥165,000 受取</text>
  <rect x="34" y="426" width="292" height="86" rx="6" fill="#DCFCE7"/>
  <text x="180" y="448" text-anchor="middle" font-size="12" fill="#166534">売掛金等 165,000 ／</text>
  <text x="180" y="470" text-anchor="middle" font-size="12" fill="#166534">売　上　　　150,000</text>
  <text x="180" y="492" text-anchor="middle" font-size="10.5" fill="#94A3B8">仮受消費税   15,000</text>

  <path d="M180,536 L180,560 M170,550 L180,560 L190,550" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Phase 3: 決算時 -->
  <rect x="16" y="570" width="328" height="220" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="570" width="328" height="32" rx="10" fill="#3B82F6"/>
  <rect x="16" y="592" width="328" height="10" fill="#3B82F6"/>
  <text x="180" y="592" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">③ 決算時（相殺・確定）</text>
  <text x="34" y="622" font-size="12.5" fill="#1E40AF">仮受 − 仮払 ＝ 納付額</text>
  <text x="34" y="642" font-size="12.5" fill="#1E40AF">¥15,000 − ¥10,000 ＝ ¥5,000</text>
  <text x="180" y="664" text-anchor="middle" font-size="11" fill="#1E3A8A">未払消費税（負債）として計上</text>
  <rect x="34" y="676" width="292" height="86" rx="6" fill="#DBEAFE"/>
  <text x="180" y="698" text-anchor="middle" font-size="12" fill="#1D4ED8">仮受消費税 15,000 ／</text>
  <text x="180" y="720" text-anchor="middle" font-size="12" fill="#1D4ED8">仮払消費税 10,000</text>
  <text x="180" y="742" text-anchor="middle" font-size="10.5" fill="#94A3B8">未払消費税   5,000</text>

  <!-- Summary keyword box -->
  <rect x="16" y="808" width="328" height="180" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="832" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">税抜方式のキーワード整理</text>
  <text x="180" y="858" text-anchor="middle" font-size="12.5" fill="#374151">仮払消費税</text>
  <text x="180" y="876" text-anchor="middle" font-size="11" fill="#92400E">→ 資産（後で回収or相殺）</text>
  <line x1="46" y1="888" x2="314" y2="888" stroke="#FDE68A" stroke-width="1"/>
  <text x="180" y="908" text-anchor="middle" font-size="12.5" fill="#374151">仮受消費税</text>
  <text x="180" y="926" text-anchor="middle" font-size="11" fill="#92400E">→ 負債（国に納める預かり金）</text>
  <line x1="46" y1="938" x2="314" y2="938" stroke="#FDE68A" stroke-width="1"/>
  <text x="180" y="958" text-anchor="middle" font-size="12.5" fill="#374151">未払消費税</text>
  <text x="180" y="976" text-anchor="middle" font-size="11" fill="#92400E">→ 負債（期末に計上）</text>

  <!-- bottom note -->
  <rect x="16" y="1004" width="328" height="140" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="180" y="1030" text-anchor="middle" font-size="11.5" fill="#475569">💡 翌期に税務署へ納付：</text>
  <text x="180" y="1050" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">未払消費税（負債）／現金 で処理</text>
  <text x="180" y="1076" text-anchor="middle" font-size="11" fill="#475569">仮払・仮受は決算で必ず消去</text>
  <text x="180" y="1094" text-anchor="middle" font-size="11" fill="#475569">——残高を残さないのがポイント</text>
  <text x="180" y="1120" text-anchor="middle" font-size="10" fill="#94A3B8">（試験では「税込方式」と「税抜方式」</text>
  <text x="180" y="1136" text-anchor="middle" font-size="10" fill="#94A3B8">を問い分けられることに注意）</text>
</svg>
