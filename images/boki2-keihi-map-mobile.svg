<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1080" width="360" height="1080" role="img" aria-labelledby="t d">
  <title id="t">経費——直接経費・間接経費の分類と具体例（モバイル版）</title>
  <desc id="d">製造原価の3区分のうち経費に注目し、直接経費と間接経費それぞれの具体例を縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1080" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">経費</text>
  <text x="180" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">直接経費・間接経費の分類と具体例</text>

  <rect x="16" y="62" width="328" height="60" rx="8" fill="#1E293B"/>
  <text x="180" y="82" text-anchor="middle" font-size="10.5" fill="#F8FAFC">製造原価の3区分</text>
  <text x="65" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="#93C5FD">材料費</text>
  <text x="180" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="#FCA5A5">労務費</text>
  <text x="300" y="106" text-anchor="middle" font-size="10" font-weight="700" fill="#86EFAC">経費（今回）</text>

  <rect x="16" y="136" width="328" height="32" rx="10" fill="#22C55E"/>
  <text x="180" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">直接経費（製品に直接紐づく）</text>
  <text x="180" y="188" text-anchor="middle" font-size="10.5" fill="#166534">製品Xだけの経費 → 直接製品原価に集計</text>

  <rect x="16" y="204" width="328" height="56" rx="6" fill="#DCFCE7"/>
  <text x="30" y="226" font-size="11.5" font-weight="700" fill="#166534">外注加工賃</text>
  <text x="30" y="244" font-size="10.5" fill="#374151">外部に加工を依頼したときの費用</text>

  <rect x="16" y="268" width="328" height="56" rx="6" fill="#DCFCE7"/>
  <text x="30" y="290" font-size="11.5" font-weight="700" fill="#166534">特許権使用料</text>
  <text x="30" y="308" font-size="10.5" fill="#374151">その製品の製造に使う特許の使用料</text>

  <rect x="16" y="332" width="328" height="56" rx="6" fill="#DCFCE7"/>
  <text x="30" y="354" font-size="11.5" font-weight="700" fill="#166534">試験・検査費</text>
  <text x="30" y="372" font-size="10.5" fill="#374151">その製品専用の検査・試験費用</text>

  <text x="180" y="406" text-anchor="middle" font-size="10" fill="#64748B">外注加工賃が最頻出。仕訳：仕掛品／外注加工賃</text>

  <rect x="16" y="430" width="328" height="32" rx="10" fill="#3B82F6"/>
  <text x="180" y="451" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">間接経費（複数製品に共通）</text>
  <text x="180" y="482" text-anchor="middle" font-size="10.5" fill="#1E40AF">複数製品で共通発生 → 配賦して割当て</text>

  <rect x="16" y="498" width="328" height="56" rx="6" fill="#DBEAFE"/>
  <text x="30" y="520" font-size="11" font-weight="700" fill="#1E40AF">電力料・ガス代・水道料</text>
  <text x="30" y="538" font-size="10" fill="#374151">工場全体の光熱費（機械時間等で配賦）</text>

  <rect x="16" y="562" width="328" height="56" rx="6" fill="#DBEAFE"/>
  <text x="30" y="584" font-size="11" font-weight="700" fill="#1E40AF">減価償却費（製造設備）</text>
  <text x="30" y="602" font-size="10" fill="#374151">工場の機械・建物に対する減価償却</text>

  <rect x="16" y="626" width="328" height="56" rx="6" fill="#DBEAFE"/>
  <text x="30" y="648" font-size="11" font-weight="700" fill="#1E40AF">修繕料・保険料・賃借料</text>
  <text x="30" y="666" font-size="10" fill="#374151">工場全体の修繕・保険・設備リース料等</text>

  <text x="180" y="700" text-anchor="middle" font-size="10" fill="#64748B">製造間接費として集計 → 配賦基準で按分</text>

  <rect x="16" y="724" width="328" height="70" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="180" y="750" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">仕訳：製造間接費（or仕掛品）／現金・</text>
  <text x="180" y="768" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">減価償却累計額等</text>
  <text x="180" y="786" text-anchor="middle" font-size="10" fill="#92400E">販売費・一般管理費とは区別すること</text>
</svg>
