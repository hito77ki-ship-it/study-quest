<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="460" rx="14" fill="#F8FAFC"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">補助簿6種類の分類・関係図——ネットワークで一気に整理</text>
  <text x="380" y="49" text-anchor="middle" font-size="11" fill="#64748B">「時系列で記録」する補助記入帳と「取引先・商品ごとに記録」する補助元帳の2グループ</text>

  <!-- Hub: 補助簿 -->
  <rect x="310" y="64" width="140" height="46" rx="23" fill="#1E293B"/>
  <text x="380" y="93" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">補助簿</text>

  <!-- Connecting lines: hub -> category hubs -->
  <line x1="345" y1="110" x2="195" y2="150" stroke="#94A3B8" stroke-width="2"/>
  <line x1="415" y1="110" x2="565" y2="150" stroke="#94A3B8" stroke-width="2"/>

  <!-- Category hub: 補助記入帳（ブルー） -->
  <rect x="85" y="150" width="220" height="60" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="195" y="171" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">補助記入帳</text>
  <text x="195" y="184" text-anchor="middle" font-size="7.5" fill="#3B82F6">（ほじょきにゅうちょう）</text>
  <text x="195" y="200" text-anchor="middle" font-size="9.5" fill="#374151">取引を時系列で記録する</text>

  <!-- Category hub: 補助元帳（ピンク） -->
  <rect x="455" y="150" width="220" height="60" rx="10" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="565" y="171" text-anchor="middle" font-size="13" font-weight="700" fill="#9D174D">補助元帳</text>
  <text x="565" y="184" text-anchor="middle" font-size="7.5" fill="#DB2777">（ほじょもとちょう）</text>
  <text x="565" y="200" text-anchor="middle" font-size="9.5" fill="#374151">取引先・商品ごとに記録する</text>

  <!-- Fan lines: 補助記入帳 -> 3 books -->
  <line x1="195" y1="210" x2="75" y2="234" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="195" y1="210" x2="195" y2="234" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="195" y1="210" x2="315" y2="234" stroke="#93C5FD" stroke-width="1.5"/>

  <!-- Fan lines: 補助元帳 -> 3 books -->
  <line x1="565" y1="210" x2="445" y2="234" stroke="#F9A8D4" stroke-width="1.5"/>
  <line x1="565" y1="210" x2="565" y2="234" stroke="#F9A8D4" stroke-width="1.5"/>
  <line x1="565" y1="210" x2="685" y2="234" stroke="#F9A8D4" stroke-width="1.5"/>

  <!-- Card 1: 現金出納帳 -->
  <rect x="20" y="234" width="110" height="130" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="75" y="258" text-anchor="middle" font-size="20">💰</text>
  <text x="75" y="280" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">現金出納帳</text>
  <text x="75" y="292" text-anchor="middle" font-size="7.5" fill="#3B82F6">（げんきん</text>
  <text x="75" y="302" text-anchor="middle" font-size="7.5" fill="#3B82F6">すいとうちょう）</text>
  <text x="75" y="320" text-anchor="middle" font-size="9" fill="#374151">現金の出入りを記録</text>

  <!-- Card 2: 売上帳 -->
  <rect x="140" y="234" width="110" height="130" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="195" y="258" text-anchor="middle" font-size="20">🧾</text>
  <text x="195" y="280" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">売上帳</text>
  <text x="195" y="296" text-anchor="middle" font-size="7.5" fill="#3B82F6">（うりあげちょう）</text>
  <text x="195" y="320" text-anchor="middle" font-size="9" fill="#374151">商品を売った明細</text>

  <!-- Card 3: 仕入帳 -->
  <rect x="260" y="234" width="110" height="130" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="315" y="258" text-anchor="middle" font-size="20">📦</text>
  <text x="315" y="280" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">仕入帳</text>
  <text x="315" y="296" text-anchor="middle" font-size="7.5" fill="#3B82F6">（しいれちょう）</text>
  <text x="315" y="320" text-anchor="middle" font-size="9" fill="#374151">商品を仕入れた明細</text>

  <!-- Card 4: 商品有高帳（要注意バッジ付き） -->
  <rect x="390" y="234" width="110" height="130" rx="10" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="445" y="258" text-anchor="middle" font-size="20">📊</text>
  <text x="445" y="280" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9D174D">商品有高帳</text>
  <text x="445" y="292" text-anchor="middle" font-size="7.5" fill="#DB2777">（しょうひん</text>
  <text x="445" y="302" text-anchor="middle" font-size="7.5" fill="#DB2777">ありだかちょう）</text>
  <text x="445" y="320" text-anchor="middle" font-size="9" font-weight="700" fill="#C2410C">原価で記入に注意！</text>
  <circle cx="490" cy="240" r="13" fill="#F59E0B" stroke="#fff" stroke-width="2"/>
  <text x="490" y="245" text-anchor="middle" font-size="13" fill="#fff">⚠</text>

  <!-- Card 5: 売掛金元帳 -->
  <rect x="510" y="234" width="110" height="130" rx="10" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="565" y="258" text-anchor="middle" font-size="20">🤝</text>
  <text x="565" y="280" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9D174D">売掛金元帳</text>
  <text x="565" y="292" text-anchor="middle" font-size="7.5" fill="#DB2777">（うりかけきん</text>
  <text x="565" y="302" text-anchor="middle" font-size="7.5" fill="#DB2777">もとちょう）</text>
  <text x="565" y="320" text-anchor="middle" font-size="9" fill="#374151">得意先ごとの残高</text>

  <!-- Card 6: 買掛金元帳 -->
  <rect x="630" y="234" width="110" height="130" rx="10" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="685" y="258" text-anchor="middle" font-size="20">📋</text>
  <text x="685" y="280" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9D174D">買掛金元帳</text>
  <text x="685" y="292" text-anchor="middle" font-size="7.5" fill="#DB2777">（かいかけきん</text>
  <text x="685" y="302" text-anchor="middle" font-size="7.5" fill="#DB2777">もとちょう）</text>
  <text x="685" y="320" text-anchor="middle" font-size="9" fill="#374151">仕入先ごとの残高</text>

  <!-- Bottom legend -->
  <rect x="20" y="381" width="720" height="60" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="380" y="401" text-anchor="middle" font-size="10.5" fill="#374151">🔵 補助記入帳＝取引を時系列で記録　　🩷 補助元帳＝取引先・商品ごとに記録</text>
  <text x="380" y="421" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">⚠ 商品有高帳は「売価」と「原価」の混同に要注意！（このあとのコラムで解説）</text>
</svg>
