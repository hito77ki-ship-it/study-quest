<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">引当金——4要件の確認と主な種類</text>

  <!-- Left: 4要件 -->
  <rect x="30" y="52" width="330" height="300" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="30" y="52" width="330" height="36" rx="10" fill="#F97316"/>
  <rect x="30" y="78" width="330" height="10" fill="#F97316"/>
  <text x="195" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">引当金計上の4要件（全部満たすこと）</text>

  <!-- 要件1 -->
  <rect x="50" y="100" width="290" height="48" rx="8" fill="#FFEDD5"/>
  <text x="72" y="121" font-size="12" font-weight="700" fill="#C2410C">① 将来の費用・損失である</text>
  <text x="72" y="139" font-size="10.5" fill="#92400E">まだ発生していないが、将来に費用・損失が生じる</text>

  <!-- 要件2 -->
  <rect x="50" y="156" width="290" height="48" rx="8" fill="#FFEDD5"/>
  <text x="72" y="177" font-size="12" font-weight="700" fill="#C2410C">② 発生の可能性が高い</text>
  <text x="72" y="195" font-size="10.5" fill="#92400E">発生するかどうかがほぼ確実に見込まれる</text>

  <!-- 要件3 -->
  <rect x="50" y="212" width="290" height="48" rx="8" fill="#FFEDD5"/>
  <text x="72" y="233" font-size="12" font-weight="700" fill="#C2410C">③ 金額を合理的に見積もれる</text>
  <text x="72" y="251" font-size="10.5" fill="#92400E">過去実績や統計データ等で金額が計算できる</text>

  <!-- 要件4 -->
  <rect x="50" y="268" width="290" height="48" rx="8" fill="#FED7AA"/>
  <text x="72" y="289" font-size="12" font-weight="700" fill="#C2410C">④ 原因が当期以前にある</text>
  <text x="72" y="307" font-size="10.5" fill="#92400E">費用の原因がすでに今期または過去の取引にある</text>

  <text x="195" y="342" text-anchor="middle" font-size="10" fill="#64748B">1つでも欠けると引当金は計上できない</text>

  <!-- Right: 主な種類 -->
  <rect x="390" y="52" width="340" height="300" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="390" y="52" width="340" height="36" rx="10" fill="#3B82F6"/>
  <rect x="390" y="78" width="340" height="10" fill="#3B82F6"/>
  <text x="560" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">主な引当金の種類</text>

  <!-- 貸倒引当金 -->
  <rect x="408" y="100" width="302" height="56" rx="8" fill="#DBEAFE"/>
  <text x="420" y="120" font-size="11" font-weight="700" fill="#1E40AF">貸倒引当金（評価性引当金）</text>
  <text x="420" y="138" font-size="10.5" fill="#1D4ED8">売掛金・受取手形などが回収できなくなる</text>
  <text x="420" y="152" font-size="10" fill="#64748B">繰入：貸倒引当金繰入 / 残高：売掛金から控除</text>

  <!-- 退職給付引当金 -->
  <rect x="408" y="164" width="302" height="56" rx="8" fill="#DBEAFE"/>
  <text x="420" y="184" font-size="11" font-weight="700" fill="#1E40AF">退職給付引当金</text>
  <text x="420" y="202" font-size="10.5" fill="#1D4ED8">従業員が将来退職するとき支払う退職金</text>
  <text x="420" y="216" font-size="10" fill="#64748B">繰入：退職給付費用 / 残高：固定負債</text>

  <!-- 製品保証引当金 -->
  <rect x="408" y="228" width="302" height="56" rx="8" fill="#DBEAFE"/>
  <text x="420" y="248" font-size="11" font-weight="700" fill="#1E40AF">製品保証引当金</text>
  <text x="420" y="266" font-size="10.5" fill="#1D4ED8">販売後の修理・交換保証にかかるコスト</text>
  <text x="420" y="280" font-size="10" fill="#64748B">繰入：製品保証引当金繰入 / 残高：流動負債</text>

  <text x="560" y="346" text-anchor="middle" font-size="10" fill="#64748B">使用時：引当金 ×× / 現金等 ×× で取り崩す</text>

  <!-- Bottom note -->
  <rect x="30" y="364" width="700" height="24" rx="6" fill="#F1F5F9"/>
  <text x="380" y="380" text-anchor="middle" font-size="10.5" fill="#475569">💡 引当金は「まだ払っていないが、原因はもう発生している」費用を当期に計上するための負債。費用の適切期間配分が目的。</text>
</svg>
