<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1000" width="360" height="1000">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="1000" rx="14" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">部門別原価計算</text>
  <text x="180" y="44" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">製造間接費の配賦の流れ</text>

  <!-- 製造間接費 -->
  <rect x="30" y="62" width="300" height="66" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="180" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#C2410C">製造間接費（全社集計）</text>
  <text x="180" y="104" text-anchor="middle" font-size="10.5" fill="#92400E">間接材料費・間接労務費・減価償却費 etc.</text>

  <text x="180" y="140" text-anchor="middle" font-size="10" fill="#64748B">① 部門費の第1次集計（発生部門に集める）</text>
  <text x="180" y="156" text-anchor="middle" font-size="11" fill="#64748B">↓</text>

  <!-- 製造部門A -->
  <rect x="30" y="172" width="300" height="80" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="180" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">製造部門 A</text>
  <text x="180" y="216" text-anchor="middle" font-size="10.5" fill="#1E40AF">切削・旋盤などの加工部門</text>
  <text x="180" y="234" text-anchor="middle" font-size="10" fill="#1E3A8A">製品に直接関わる部門</text>

  <!-- 製造部門B -->
  <rect x="30" y="264" width="300" height="80" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="180" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">製造部門 B</text>
  <text x="180" y="308" text-anchor="middle" font-size="10.5" fill="#1E40AF">組立・仕上げなどの加工部門</text>
  <text x="180" y="326" text-anchor="middle" font-size="10" fill="#1E3A8A">製品に直接関わる部門</text>

  <!-- 補助部門 -->
  <rect x="30" y="356" width="300" height="80" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="180" y="380" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">補助部門</text>
  <text x="180" y="400" text-anchor="middle" font-size="10.5" fill="#991B1B">動力・修繕・工場管理 etc.</text>
  <text x="180" y="418" text-anchor="middle" font-size="10" fill="#7F1D1D">製造部門を支援する部門</text>

  <text x="180" y="452" text-anchor="middle" font-size="10" fill="#EF4444">② 補助部門費を製造部門A・Bへ配賦（直接配賦法）</text>
  <text x="180" y="470" text-anchor="middle" font-size="11" fill="#64748B">↓</text>

  <text x="180" y="500" text-anchor="middle" font-size="10" fill="#3B82F6">③ 製造部門費を製品（仕掛品）へ予定配賦</text>
  <text x="180" y="518" text-anchor="middle" font-size="11" fill="#64748B">↓</text>

  <!-- 仕掛品 -->
  <rect x="30" y="536" width="300" height="86" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="562" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">仕掛品（製品原価に集積）</text>
  <text x="180" y="584" text-anchor="middle" font-size="10.5" fill="#15803D">製造部門Aの配賦額＋Bの配賦額</text>
  <text x="180" y="602" text-anchor="middle" font-size="10.5" fill="#15803D">＝ 製品1個の間接費</text>

  <rect x="20" y="646" width="320" height="90" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="180" y="670" text-anchor="middle" font-size="10.5" fill="#475569">💡 補助部門が互いにサービスを提供し合う</text>
  <text x="180" y="688" text-anchor="middle" font-size="10.5" fill="#475569">場合は「相互配賦法」を使う（精度が高い）</text>
  <text x="180" y="712" text-anchor="middle" font-size="10" fill="#475569">予定配賦率＝年間予算額÷年間予定配賦基準</text>
</svg>
