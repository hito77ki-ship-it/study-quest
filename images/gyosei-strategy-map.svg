<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="480" rx="16" fill="#FEFCF9"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">行政書士試験 科目別配点と攻略の優先順位</text>
  <text x="380" y="48" text-anchor="middle" font-size="11" fill="#94A3B8">配点が大きい科目から確実に得点源にするのが合格への近道</text>

  <!-- 行政法（最優先） -->
  <text x="170" y="92" text-anchor="end" font-size="12.5" font-weight="700" fill="#C2410C">① 行政法</text>
  <rect x="180" y="70" width="480" height="34" rx="8" fill="#FED7AA" stroke="#FB923C" stroke-width="2"/>
  <text x="668" y="92" font-size="11" font-weight="700" fill="#374151">112点</text>

  <!-- 民法（高） -->
  <text x="170" y="140" text-anchor="end" font-size="12.5" font-weight="700" fill="#1D4ED8">② 民法</text>
  <rect x="180" y="118" width="326" height="34" rx="8" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="514" y="140" font-size="11" font-weight="700" fill="#374151">76点</text>

  <!-- 一般知識（高・足切り注意） -->
  <text x="170" y="188" text-anchor="end" font-size="12.5" font-weight="700" fill="#5B21B6">③ 一般知識</text>
  <rect x="180" y="166" width="240" height="34" rx="8" fill="#DDD6FE" stroke="#A78BFA" stroke-width="2"/>
  <text x="428" y="188" font-size="11" font-weight="700" fill="#374151">56点</text>
  <line x1="283" y1="162" x2="283" y2="204" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="283" y="156" text-anchor="middle" font-size="8.5" font-weight="700" fill="#DC2626">足切り24点</text>

  <!-- 憲法（高） -->
  <text x="170" y="236" text-anchor="end" font-size="12.5" font-weight="700" fill="#1D4ED8">④ 憲法</text>
  <rect x="180" y="214" width="120" height="34" rx="8" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="308" y="236" font-size="11" font-weight="700" fill="#374151">28点</text>

  <!-- 商法・会社法（中） -->
  <text x="170" y="284" text-anchor="end" font-size="12.5" font-weight="700" fill="#475569">⑤ 商法・会社法</text>
  <rect x="180" y="262" width="86" height="34" rx="8" fill="#E2E8F0" stroke="#94A3B8" stroke-width="2"/>
  <text x="274" y="284" font-size="11" font-weight="700" fill="#374151">20点</text>

  <!-- 攻略の鉄則ボックス -->
  <rect x="20" y="320" width="720" height="140" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">🎯 攻略の鉄則</text>
  <text x="380" y="370" text-anchor="middle" font-size="11" fill="#78350F">行政法だけで全体300点満点の37%を占める——ここを最優先で仕上げるのが合格への近道</text>
  <text x="380" y="394" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">攻略順：①行政法 → ②民法 → ③一般知識（足切り注意） → ④憲法 → ⑤商法・会社法</text>

  <!-- 凡例 -->
  <rect x="55" y="428" width="14" height="14" rx="3" fill="#FED7AA" stroke="#FB923C"/>
  <text x="75" y="439" font-size="10" fill="#374151">最優先</text>
  <rect x="185" y="428" width="14" height="14" rx="3" fill="#BFDBFE" stroke="#60A5FA"/>
  <text x="205" y="439" font-size="10" fill="#374151">高</text>
  <rect x="290" y="428" width="14" height="14" rx="3" fill="#E2E8F0" stroke="#94A3B8"/>
  <text x="310" y="439" font-size="10" fill="#374151">中</text>
  <line x1="390" y1="435" x2="410" y2="435" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="418" y="439" font-size="10" fill="#374151">足切りライン</text>
</svg>
