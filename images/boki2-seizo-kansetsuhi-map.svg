<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">製造間接費——予定配賦の仕組みと配賦差異の分析</text>

  <!-- Top: 直接費 vs 間接費 -->
  <rect x="30" y="52" width="330" height="78" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="195" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">直接費（製品に直接紐づく）</text>
  <text x="195" y="90" text-anchor="middle" font-size="10.5" fill="#374151">直接材料費・直接労務費・直接経費</text>
  <text x="195" y="108" text-anchor="middle" font-size="10" fill="#64748B">→ 製品ごとに賦課（指図書に直接計上）</text>
  <text x="195" y="122" text-anchor="middle" font-size="10" fill="#64748B">ブレない：製品Aのコストと1対1対応</text>

  <rect x="400" y="52" width="330" height="78" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="565" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">間接費（複数製品に共通）</text>
  <text x="565" y="90" text-anchor="middle" font-size="10.5" fill="#374151">間接材料費・間接労務費・間接経費</text>
  <text x="565" y="108" text-anchor="middle" font-size="10" fill="#64748B">→ 配賦基準で各製品に按分</text>
  <text x="565" y="122" text-anchor="middle" font-size="10" fill="#64748B">電力・修繕・減価償却費など全体で発生</text>

  <!-- 予定配賦の流れ -->
  <text x="380" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">予定配賦の流れ（実際配賦の落とし穴を避ける）</text>

  <!-- Step boxes -->
  <rect x="30" y="174" width="180" height="76" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="120" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">① 年度始めに決定</text>
  <text x="120" y="214" text-anchor="middle" font-size="10.5" fill="#374151">予定配賦率</text>
  <text x="120" y="230" text-anchor="middle" font-size="10.5" fill="#374151">＝ 年間予算額</text>
  <text x="120" y="244" text-anchor="middle" font-size="10.5" fill="#374151">÷ 年間予定操業度</text>

  <polygon points="220,212 210,207 210,217" fill="#64748B"/>
  <line x1="210" y1="212" x2="214" y2="212" stroke="#64748B" stroke-width="1.5"/>

  <rect x="220" y="174" width="180" height="76" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="310" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">② 毎月の配賦計算</text>
  <text x="310" y="214" text-anchor="middle" font-size="10.5" fill="#374151">予定配賦額</text>
  <text x="310" y="230" text-anchor="middle" font-size="10.5" fill="#374151">＝ 予定配賦率</text>
  <text x="310" y="244" text-anchor="middle" font-size="10.5" fill="#374151">× 実際操業度</text>

  <polygon points="410,212 400,207 400,217" fill="#64748B"/>

  <rect x="410" y="174" width="180" height="76" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="500" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">③ 期末に差異確認</text>
  <text x="500" y="214" text-anchor="middle" font-size="10.5" fill="#374151">配賦差異</text>
  <text x="500" y="230" text-anchor="middle" font-size="10.5" fill="#374151">＝ 実際発生額</text>
  <text x="500" y="244" text-anchor="middle" font-size="10.5" fill="#374151">− 予定配賦額</text>

  <polygon points="600,212 590,207 590,217" fill="#64748B"/>

  <rect x="600" y="174" width="130" height="76" rx="8" fill="#1E293B"/>
  <text x="665" y="202" text-anchor="middle" font-size="10.5" font-weight="700" fill="#F8FAFC">配賦差異を</text>
  <text x="665" y="220" text-anchor="middle" font-size="10.5" fill="#94A3B8">売上原価等へ</text>
  <text x="665" y="236" text-anchor="middle" font-size="10.5" fill="#94A3B8">按分・振替</text>

  <!-- 差異分析 -->
  <text x="380" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">配賦差異の判定（T字勘定で考える）</text>

  <rect x="30" y="294" width="330" height="82" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="195" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">不利差異（借方差異）</text>
  <text x="195" y="334" text-anchor="middle" font-size="10.5" fill="#374151">実際発生額 ＞ 予定配賦額</text>
  <text x="195" y="352" text-anchor="middle" font-size="10.5" fill="#374151">想定より多くコストがかかった</text>
  <text x="195" y="368" text-anchor="middle" font-size="10" fill="#DC2626">製造間接費配賦差異（借方）= 損失計上</text>

  <rect x="400" y="294" width="330" height="82" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="565" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">有利差異（貸方差異）</text>
  <text x="565" y="334" text-anchor="middle" font-size="10.5" fill="#374151">実際発生額 ＜ 予定配賦額</text>
  <text x="565" y="352" text-anchor="middle" font-size="10.5" fill="#374151">想定より少ないコストで済んだ</text>
  <text x="565" y="368" text-anchor="middle" font-size="10" fill="#166534">製造間接費配賦差異（貸方）= 利益計上</text>
</svg>
