  <text x="600" y="1050" text-anchor="middle" class="kt" font-size="12.5" fill="#374151">合計150問・18の得点区分。相談援助の理論と方法という大きな得点源を過去問で仕留めつつ、残り17区分でも足切りゼロを徹底する——</text>
  <text x="600" y="1070" text-anchor="middle" class="kt" font-size="12.5" font-weight="700" fill="#16A34A">それが社会福祉士試験の「バランス配分ゲーム」です。</text>
</svg>