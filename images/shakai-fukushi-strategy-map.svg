    <circle cx="78.0" cy="954.0" r="9" fill="#EC4899"/><path d="M74.0,954.0 l3,4 l7,-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
