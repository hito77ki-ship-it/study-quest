    <text x="457.3" y="752.0" class="kt" font-size="8.5" font-weight="700" fill="#166534">社会理論とシステム</text>
    <text x="457.3" y="771.0" class="kt" font-size="9" fill="#16A34A">全7問中 1点死守</text>
