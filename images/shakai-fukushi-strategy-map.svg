    <text x="249.7" y="977.0" class="kt" font-size="9" fill="#BE185D">全7問中 1点死守</text>
    <rect x="371.4" y="936.0" width="145.7" height="58" rx="12" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
