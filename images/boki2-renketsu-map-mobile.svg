<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1240" width="360" height="1240" role="img" aria-labelledby="t d">
  <title id="t">連結会計——連結財務諸表の作成手順と主要修正（モバイル版）</title>
  <desc id="d">親会社と子会社の単純合算から、投資と資本の相殺消去・内部取引の消去・債権債務の相殺消去という3つの連結修正仕訳を経て連結財務諸表が完成するまでの流れを縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1240" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">連結会計</text>
  <text x="180" y="44" text-anchor="middle" font-size="10" fill="#64748B">連結財務諸表の作成手順と主要修正</text>

  <rect x="16" y="60" width="328" height="66" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="180" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">親会社</text>
  <text x="180" y="100" text-anchor="middle" font-size="10" fill="#374151">支配力を持つ会社。子会社株式を50%超保有</text>

  <text x="180" y="140" text-anchor="middle" font-size="13" fill="#CBD5E1">＋</text>

  <rect x="16" y="150" width="328" height="66" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">子会社</text>
  <text x="180" y="190" text-anchor="middle" font-size="10" fill="#374151">親会社に支配される会社。実質的な支配で判定</text>

  <text x="180" y="234" text-anchor="middle" font-size="10.5" fill="#7C3AED">↓ 単純合算（財務諸表を足し合わせる）</text>

  <rect x="80" y="244" width="200" height="30" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
  <text x="180" y="264" text-anchor="middle" font-size="10.5" fill="#5B21B6">単純合算財務諸表</text>

  <text x="180" y="298" text-anchor="middle" font-size="10.5" fill="#EF4444">↓ 連結修正仕訳（3つ）</text>

  <rect x="16" y="310" width="328" height="140" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="30" y="334" font-size="12" font-weight="700" fill="#DC2626">① 投資と資本の相殺消去</text>
  <text x="30" y="356" font-size="10.5" fill="#374151">親の「子会社株式」と子の「純資産」を相殺</text>
  <text x="30" y="378" font-size="10.5" fill="#DC2626">資本金等 ×× ／ 子会社株式 ××</text>
  <text x="30" y="398" font-size="10" fill="#374151">差額がのれん（正）またはのれん受入益（負）</text>
  <text x="30" y="416" font-size="10" fill="#64748B">のれんは20年以内で償却</text>

  <rect x="16" y="464" width="328" height="140" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="30" y="488" font-size="12" font-weight="700" fill="#C2410C">② 内部取引・内部利益消去</text>
  <text x="30" y="510" font-size="10.5" fill="#374151">親子間の売買取引を消去</text>
  <text x="30" y="532" font-size="10.5" fill="#C2410C">売上高 ×× ／ 売上原価 ××</text>
  <text x="30" y="552" font-size="10" fill="#374151">期末棚卸資産に未実現利益が残る場合</text>
  <text x="30" y="570" font-size="10" fill="#64748B">売上原価／棚卸資産（未実現利益消去）</text>

  <rect x="16" y="618" width="328" height="140" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="30" y="642" font-size="12" font-weight="700" fill="#1E40AF">③ 債権・債務の相殺消去</text>
  <text x="30" y="664" font-size="10.5" fill="#374151">親の「売掛金」と子の「買掛金」を相殺</text>
  <text x="30" y="686" font-size="10.5" fill="#1D4ED8">買掛金 ×× ／ 売掛金 ××</text>
  <text x="30" y="706" font-size="10" fill="#374151">受取手形・支払手形・貸付金・借入金も同様</text>
  <text x="30" y="724" font-size="10" fill="#64748B">貸倒引当金も修正が必要</text>

  <text x="180" y="784" text-anchor="middle" font-size="14" fill="#22C55E">↓</text>

  <rect x="30" y="794" width="300" height="50" rx="10" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="824" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">連結財務諸表（グループ全体）完成</text>

  <rect x="16" y="870" width="328" height="70" rx="10" fill="#F1F5F9"/>
  <text x="180" y="896" text-anchor="middle" font-size="10.5" font-weight="700" fill="#475569">連結会計の核心は「グループ内の取引を</text>
  <text x="180" y="914" text-anchor="middle" font-size="10.5" font-weight="700" fill="#475569">なかったことにする」作業</text>
</svg>
