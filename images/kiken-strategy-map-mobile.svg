<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 502" width="360" height="502" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">危険物乙4試験 3科目構成と足切りを回避する戦略マップ（モバイル版）</title>
  <desc id="svgdesc">法令、物理学・化学、性質・消火の3科目すべてで60%以上が必要で、1科目でも落とすと即不合格になることを縦に示した図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="502" rx="16" fill="#FEFCF9"/>
  <text x="180" y="28" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">危険物乙4試験 3科目構成と</text>
  <text x="180" y="46" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">足切り回避の戦略マップ</text>
  <text x="180" y="64" text-anchor="middle" font-size="9.5" fill="#94A3B8">3科目すべて60%以上必要——1科目でも落とせば即不合格</text>

  <rect x="16" y="82" width="328" height="72" rx="12" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="32" y="104" font-size="13" font-weight="700" fill="#1D4ED8">① 法令</text>
  <rect x="32" y="112" width="296" height="18" rx="9" fill="#FFFFFF"/>
  <rect x="32" y="112" width="178" height="18" rx="9" fill="#3B82F6"/>
  <line x1="178" y1="108" x2="178" y2="134" stroke="#EF4444" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="328" y="146" text-anchor="end" font-size="10.5" font-weight="700" fill="#374151">15問中9問以上</text>

  <rect x="16" y="162" width="328" height="72" rx="12" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="32" y="184" font-size="13" font-weight="700" fill="#166534">② 物理学・化学</text>
  <rect x="32" y="192" width="296" height="18" rx="9" fill="#FFFFFF"/>
  <rect x="32" y="192" width="178" height="18" rx="9" fill="#22C55E"/>
  <line x1="178" y1="188" x2="178" y2="214" stroke="#EF4444" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="328" y="226" text-anchor="end" font-size="10.5" font-weight="700" fill="#374151">10問中6問以上</text>

  <rect x="16" y="242" width="328" height="80" rx="12" fill="#FED7AA" stroke="#FB923C" stroke-width="2.5"/>
  <text x="32" y="264" font-size="13" font-weight="700" fill="#C2410C">★③ 性質・消火（最重要）</text>
  <rect x="32" y="274" width="296" height="18" rx="9" fill="#FFFFFF"/>
  <rect x="32" y="274" width="178" height="18" rx="9" fill="#FB923C"/>
  <line x1="178" y1="270" x2="178" y2="296" stroke="#EF4444" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="328" y="310" text-anchor="end" font-size="10.5" font-weight="700" fill="#374151">20問中12問以上</text>

  <text x="180" y="342" text-anchor="middle" font-size="9.5" fill="#DC2626">‐ ‐ ‐ ＝60%足切りライン</text>

  <rect x="16" y="358" width="328" height="130" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="382" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">⚠ 3科目とも60%未満なら</text>
  <text x="180" y="398" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">即不合格（他が満点でも無効）</text>
  <text x="180" y="422" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">攻略順：①性質・消火（配点最大）</text>
  <text x="180" y="438" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">→②法令（暗記で確実に）</text>
  <text x="180" y="454" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">→③物理化学（概念中心）</text>
  <text x="180" y="474" text-anchor="middle" font-size="9.5" fill="#94A3B8">性質・消火は全45問中20問（約44%）の最重点科目</text>
</svg>
