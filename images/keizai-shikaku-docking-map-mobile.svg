<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1360" width="360" height="1360">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1360" rx="16" fill="#FAFAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">経済・経営学部生のための</text>
  <text x="180" y="46" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">業界×資格ドッキングマップ</text>

  <!-- Hub -->
  <rect x="20" y="62" width="320" height="86" rx="14" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">🛡 全員共通の基礎装備</text>
  <text x="180" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">日商簿記2級（数字を読む力）</text>
  <text x="180" y="130" text-anchor="middle" font-size="10.5" fill="#4D7C59">↓ ここから志望業界別に武器を追加</text>

  <!-- Box1: 経理・財務 -->
  <rect x="20" y="168" width="320" height="220" rx="12" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <rect x="20" y="168" width="320" height="36" rx="12" fill="#F472B6"/>
  <rect x="20" y="192" width="320" height="12" fill="#F472B6"/>
  <text x="180" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">経理・財務・会計</text>
  <text x="36" y="228" font-size="11" font-weight="700" fill="#9D174D">🗡 武器（必須）</text>
  <text x="36" y="248" font-size="13" font-weight="700" fill="#374151">日商簿記2級</text>
  <text x="36" y="266" font-size="11" fill="#374151">財務諸表を読む力がそのまま評価される</text>
  <text x="36" y="298" font-size="11" font-weight="700" fill="#9D174D">⬆ 発展装備</text>
  <text x="36" y="318" font-size="12" fill="#374151">簿記1級・税理士科目</text>
  <text x="36" y="336" font-size="10.5" fill="#9D174D">会計士・税理士も視野に</text>

  <!-- Box2: 金融 -->
  <rect x="20" y="404" width="320" height="220" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="404" width="320" height="36" rx="12" fill="#3B82F6"/>
  <rect x="20" y="428" width="320" height="12" fill="#3B82F6"/>
  <text x="180" y="428" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">銀行・証券・保険</text>
  <text x="36" y="464" font-size="11" font-weight="700" fill="#1E40AF">🗡 武器（必須）</text>
  <text x="36" y="484" font-size="13" font-weight="700" fill="#374151">FP2級（3級から）</text>
  <text x="36" y="502" font-size="11" fill="#374151">税金・年金・資産運用の全体像が武器になる</text>
  <text x="36" y="534" font-size="11" font-weight="700" fill="#1E40AF">⬆ 発展装備</text>
  <text x="36" y="554" font-size="12" fill="#374151">証券外務員</text>
  <text x="36" y="572" font-size="10.5" fill="#1E40AF">簿記2級と併せ持つと最強</text>

  <!-- Box3: 不動産 -->
  <rect x="20" y="640" width="320" height="220" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <rect x="20" y="640" width="320" height="36" rx="12" fill="#EAB308"/>
  <rect x="20" y="664" width="320" height="12" fill="#EAB308"/>
  <text x="180" y="664" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">不動産・デベロッパー</text>
  <text x="36" y="700" font-size="11" font-weight="700" fill="#92400E">🗡 武器（必須）</text>
  <text x="36" y="720" font-size="13" font-weight="700" fill="#374151">宅地建物取引士</text>
  <text x="36" y="738" font-size="11" fill="#374151">従業員5人に1人以上の設置義務がある国家資格</text>
  <text x="36" y="770" font-size="11" font-weight="700" fill="#92400E">⬆ 発展装備</text>
  <text x="36" y="790" font-size="12" fill="#374151">賃貸不動産経営管理士</text>
  <text x="36" y="808" font-size="10.5" fill="#92400E">即戦力として採用で有利</text>

  <!-- Box4: IT -->
  <rect x="20" y="876" width="320" height="220" rx="12" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="20" y="876" width="320" height="36" rx="12" fill="#8B5CF6"/>
  <rect x="20" y="900" width="320" height="12" fill="#8B5CF6"/>
  <text x="180" y="900" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">IT・DX推進</text>
  <text x="36" y="936" font-size="11" font-weight="700" fill="#5B21B6">🗡 武器（入門）</text>
  <text x="36" y="956" font-size="13" font-weight="700" fill="#374151">ITパスポート</text>
  <text x="36" y="974" font-size="11" fill="#374151">文系でもDX人材として差別化できる基礎資格</text>
  <text x="36" y="1006" font-size="11" font-weight="700" fill="#5B21B6">⬆ 発展装備</text>
  <text x="36" y="1026" font-size="12" fill="#374151">基本情報技術者</text>
  <text x="36" y="1044" font-size="10.5" fill="#5B21B6">IT・コンサル就職で高評価</text>

  <!-- Bottom note -->
  <rect x="20" y="1112" width="320" height="130" rx="10" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
  <text x="180" y="1138" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0369A1">💡 攻略の順番</text>
  <text x="180" y="1160" text-anchor="middle" font-size="10.5" fill="#374151">① まず全員が「基礎装備＝簿記2級」を</text>
  <text x="180" y="1178" text-anchor="middle" font-size="10.5" fill="#374151">1〜2年生のうちに取得</text>
  <text x="180" y="1202" text-anchor="middle" font-size="10.5" fill="#374151">② 3年生で志望業界が固まったら、そのハコに</text>
  <text x="180" y="1220" text-anchor="middle" font-size="10.5" fill="#374151">対応する専門武器を追加していく</text>
</svg>
