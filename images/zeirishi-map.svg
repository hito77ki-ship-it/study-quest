<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="800" height="480" rx="16" fill="#FEFCF9"/>
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">税理士試験 5科目合格の組み合わせパズル</text>
  <text x="400" y="52" text-anchor="middle" font-size="11" fill="#94A3B8">11科目の中から5つをドッキングさせれば合格！</text>

  <!-- ジョイント（ドッキングの接続点） -->
  <circle cx="184" cy="165" r="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="328" cy="165" r="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="472" cy="165" r="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <circle cx="616" cy="165" r="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- ① 簿記論（必須・パステルブルー） -->
  <rect x="47" y="100" width="130" height="130" rx="14" fill="#EBF8FF" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="112" cy="124" r="16" fill="#3B82F6"/>
  <text x="112" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">①</text>
  <text x="112" y="153" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">必須</text>
  <text x="112" y="173" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">簿記論</text>
  <text x="112" y="199" text-anchor="middle" font-size="9" fill="#374151">450〜600時間</text>
  <text x="112" y="214" text-anchor="middle" font-size="9" fill="#374151">合格率17〜20%</text>

  <!-- ② 財務諸表論（必須・パステルブルー） -->
  <rect x="191" y="100" width="130" height="130" rx="14" fill="#EBF8FF" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="256" cy="124" r="16" fill="#3B82F6"/>
  <text x="256" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">②</text>
  <text x="256" y="153" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">必須</text>
  <text x="256" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">財務諸表論</text>
  <text x="256" y="199" text-anchor="middle" font-size="9" fill="#374151">400〜500時間</text>
  <text x="256" y="214" text-anchor="middle" font-size="9" fill="#374151">合格率15〜20%</text>

  <!-- ③ 法人税法 or 所得税法（選択必須・パステルパープル） -->
  <rect x="335" y="100" width="130" height="130" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <circle cx="400" cy="124" r="16" fill="#8B5CF6"/>
  <text x="400" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">③</text>
  <text x="400" y="150" text-anchor="middle" font-size="9.5" font-weight="700" fill="#5B21B6">選択必須（1つ）</text>
  <text x="400" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">法人税法</text>
  <text x="400" y="182" text-anchor="middle" font-size="9" fill="#7C3AED">または</text>
  <text x="400" y="199" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">所得税法</text>
  <text x="400" y="216" text-anchor="middle" font-size="9" fill="#374151">600〜800時間</text>

  <!-- ④ 消費税法（自由選択・パステルオレンジ） -->
  <rect x="479" y="100" width="130" height="130" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <circle cx="544" cy="124" r="16" fill="#F97316"/>
  <text x="544" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">④</text>
  <text x="544" y="153" text-anchor="middle" font-size="10" font-weight="700" fill="#C2410C">自由選択</text>
  <text x="544" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#C2410C">消費税法</text>
  <text x="544" y="199" text-anchor="middle" font-size="9" fill="#374151">300〜400時間</text>
  <text x="544" y="214" text-anchor="middle" font-size="9" fill="#374151">合格率13〜17%</text>

  <!-- ⑤ 国税徴収法（自由選択・パステルグリーン） -->
  <rect x="623" y="100" width="130" height="130" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <circle cx="688" cy="124" r="16" fill="#22C55E"/>
  <text x="688" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">⑤</text>
  <text x="688" y="153" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">自由選択</text>
  <text x="688" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">国税徴収法</text>
  <text x="688" y="199" text-anchor="middle" font-size="9" fill="#374151">200〜300時間</text>
  <text x="688" y="214" text-anchor="middle" font-size="9" fill="#374151">合格率13〜18%</text>

  <!-- 収束ライン -->
  <line x1="112" y1="230" x2="400" y2="283" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="256" y1="230" x2="400" y2="283" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="400" y1="230" x2="400" y2="283" stroke="#C4B5FD" stroke-width="1.5"/>
  <line x1="544" y1="230" x2="400" y2="283" stroke="#FDBA74" stroke-width="1.5"/>
  <line x1="688" y1="230" x2="400" y2="283" stroke="#86EFAC" stroke-width="1.5"/>

  <!-- ゴール：5科目合格 -->
  <circle cx="400" cy="345" r="62" fill="#FEF9E7" stroke="#FDE68A" stroke-width="3"/>
  <text x="400" y="338" text-anchor="middle" font-size="26">🏆</text>
  <text x="400" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">5科目合格！</text>

  <text x="400" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">必須2科目 ＋ 選択必須1科目 ＋ 自由選択2科目 ＝ 5科目そろえば合格</text>
  <text x="400" y="450" text-anchor="middle" font-size="9.5" fill="#94A3B8">④⑤は残り8科目（消費税法・相続税法・国税徴収法・住民税・酒税法・固定資産税・事業税など）から自由に選べる</text>
</svg>
