  <rect x="30" y="380" width="300" height="22" rx="11" fill="#E2E8F0"/>
  <rect x="30" y="380" width="180" height="22" rx="11" fill="#8CC63F"/>
  <line x1="210" y1="374" x2="210" y2="408" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="210" y="420" text-anchor="middle" font-size="9.5" fill="#B91C1C">合格基準 60%</text>

  <text x="30" y="452" font-size="11" font-weight="700" fill="#1E293B">実技試験</text>
  <text x="30" y="464" font-size="8.5" fill="#64748B">（FP協会推奨）</text>
  <rect x="30" y="472" width="300" height="22" rx="11" fill="#E2E8F0"/>
  <rect x="30" y="472" width="180" height="22" rx="11" fill="#6AAF2B"/>
  <line x1="210" y1="466" x2="210" y2="500" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="210" y="512" text-anchor="middle" font-size="9.5" fill="#B91C1C">合格基準 60%</text>

  <rect x="16" y="540" width="328" height="50" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="180" y="562" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">満点不要。ライフプランニングを起点に</text>
  <text x="180" y="578" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">6分野を60%ラインまで積み上げるのが近道</text>
