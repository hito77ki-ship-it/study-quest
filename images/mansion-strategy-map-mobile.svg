<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 822" width="360" height="822" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">マンション管理士 配点ウェイト＆W取得戦略マップ（モバイル版）</title>
  <desc id="svgdesc">出題6分野の配点ウェイト、管理業務主任者との70%重複、合格基準36〜38点の防衛ラインを縦に示した図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="822" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">マンション管理士 配点ウェイト</text>
  <text x="180" y="46" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">＆W取得戦略マップ</text>
  <text x="180" y="64" text-anchor="middle" font-size="9.5" fill="#64748B">区分所有法を最優先攻略、管理業務主任者との重複を活用</text>

  <text x="16" y="90" font-size="12" font-weight="700" fill="#1E293B">① 出題分野の配点ウェイト</text>

  <text x="16" y="112" font-size="11" font-weight="700" fill="#9D174D">区分所有法</text>
  <text x="344" y="112" text-anchor="end" font-size="10.5" font-weight="700" fill="#9D174D">10〜12問</text>
  <rect x="16" y="118" width="328" height="16" rx="5" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1.5"/>
  <rect x="16" y="118" width="290" height="16" rx="5" fill="#F9A8D4"/>

  <text x="16" y="156" font-size="11" font-weight="700" fill="#9D174D">標準管理規約</text>
  <text x="344" y="156" text-anchor="end" font-size="10.5" font-weight="700" fill="#9D174D">6〜8問</text>
  <rect x="16" y="162" width="328" height="16" rx="5" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1.5"/>
  <rect x="16" y="162" width="190" height="16" rx="5" fill="#F9A8D4"/>

  <text x="16" y="200" font-size="11" font-weight="700" fill="#1E40AF">民法</text>
  <text x="344" y="200" text-anchor="end" font-size="10.5" font-weight="700" fill="#1E40AF">8〜10問</text>
  <rect x="16" y="206" width="328" height="16" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="16" y="206" width="240" height="16" rx="5" fill="#93C5FD"/>

  <text x="16" y="244" font-size="11" font-weight="700" fill="#1E40AF">建築・設備</text>
  <text x="344" y="244" text-anchor="end" font-size="10.5" font-weight="700" fill="#1E40AF">6〜8問</text>
  <rect x="16" y="250" width="328" height="16" rx="5" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="16" y="250" width="190" height="16" rx="5" fill="#93C5FD"/>

  <text x="16" y="288" font-size="11" font-weight="700" fill="#166534">適正化法</text>
  <text x="344" y="288" text-anchor="end" font-size="10.5" font-weight="700" fill="#166534">4〜6問</text>
  <rect x="16" y="294" width="328" height="16" rx="5" fill="#F0FFF4" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="16" y="294" width="140" height="16" rx="5" fill="#86EFAC"/>

  <text x="16" y="332" font-size="11" font-weight="700" fill="#475569">会計・税務</text>
  <text x="344" y="332" text-anchor="end" font-size="10.5" font-weight="700" fill="#475569">2〜4問</text>
  <rect x="16" y="338" width="328" height="16" rx="5" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="16" y="338" width="90" height="16" rx="5" fill="#CBD5E1"/>

  <!-- Section 2 -->
  <text x="16" y="384" font-size="12" font-weight="700" fill="#1E293B">② 管業とのW取得——70%重複</text>
  <rect x="16" y="398" width="328" height="118" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="180" y="424" text-anchor="middle" font-size="11" font-weight="700" fill="#9D174D">マンション管理士</text>
  <text x="180" y="444" text-anchor="middle" font-size="22" font-weight="800" fill="#7C3AED">70%重複</text>
  <text x="180" y="464" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">管理業務主任者</text>
  <text x="180" y="486" text-anchor="middle" font-size="10" fill="#374151">区分所有法・標準管理規約・民法 など</text>
  <text x="180" y="504" text-anchor="middle" font-size="9.5" fill="#64748B">同時学習でどちらも取得を狙える</text>

  <!-- Section 3 -->
  <text x="16" y="546" font-size="12" font-weight="700" fill="#1E293B">③ 合格基準は36〜38点／50問</text>
  <text x="16" y="564" font-size="10.5" fill="#374151">ここが最終防衛ライン</text>

  <rect x="16" y="580" width="328" height="30" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="257" y="580" width="87" height="30" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="257" y="580" width="13" height="30" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="26" y="622" font-size="9.5" fill="#64748B">0問</text>
  <text x="180" y="622" text-anchor="middle" font-size="9.5" fill="#64748B">不合格ゾーン</text>
  <text x="300" y="622" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">合格ゾーン</text>
  <text x="334" y="622" text-anchor="end" font-size="9.5" fill="#64748B">50問</text>
  <text x="264" y="642" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309">↑防衛ライン 36〜38点</text>

  <!-- Bottom summary -->
  <rect x="16" y="666" width="328" height="140" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="692" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">🎯 攻略の鉄則：区分所有法＋</text>
  <text x="180" y="710" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">標準管理規約で18〜20問を死守</text>
  <text x="180" y="734" text-anchor="middle" font-size="10" fill="#374151">→ 管理業務主任者と共有する「70%の</text>
  <text x="180" y="750" text-anchor="middle" font-size="10" fill="#374151">得点源」を先に固める</text>
  <text x="180" y="772" text-anchor="middle" font-size="10" fill="#374151">→ 残りを民法で加点し、36〜38点の</text>
  <text x="180" y="788" text-anchor="middle" font-size="10" fill="#374151">防衛ラインを確実に超える設計にする</text>
</svg>
