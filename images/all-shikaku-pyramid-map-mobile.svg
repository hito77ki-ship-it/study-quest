<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1000" width="360" height="1000" role="img" aria-labelledby="psvgtitle psvgdesc">
  <title id="psvgtitle">スタディクエスト全資格の難易度ピラミッドと合格ロードマップ（モバイル版）</title>
  <desc id="psvgdesc">下段の星1入門資格から上段の星5最難関・公認会計士まで、サイトで扱う全資格の位置関係を示す図解</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1000" rx="12" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">大谷流・全資格 難易度ピラミッドマップ</text>
  <text x="180" y="44" text-anchor="middle" font-size="9.5" fill="#64748B">下から★1入門〜上に行くほど★5最難関</text>

  <!-- Tier5 -->
  <rect x="16" y="62" width="328" height="94" rx="10" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="28" y="86" font-size="12" font-weight="700" fill="#B91C1C">★5 最難関（2000時間以上）</text>
  <text x="28" y="104" font-size="10.5" fill="#374151">公認会計士・税理士（5科目）</text>

  <!-- Tier4 -->
  <rect x="16" y="168" width="328" height="108" rx="10" fill="#FFEDD5" stroke="#F97316" stroke-width="2"/>
  <text x="28" y="192" font-size="12" font-weight="700" fill="#C2410C">★4 上級（600〜1500時間）</text>
  <text x="28" y="210" font-size="10.5" fill="#374151">社会保険労務士・中小企業診断士</text>
  <text x="28" y="226" font-size="10.5" fill="#374151">税理士（1科目）</text>

  <!-- Tier3 -->
  <rect x="16" y="296" width="328" height="108" rx="10" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="28" y="320" font-size="12" font-weight="700" fill="#6D28D9">★3 中級（300〜600時間）</text>
  <text x="28" y="338" font-size="10.5" fill="#374151">簿記2級・宅建・行政書士</text>
  <text x="28" y="354" font-size="10.5" fill="#374151">応用情報技術者・看護師国家試験</text>

  <!-- Tier2 -->
  <rect x="16" y="424" width="328" height="108" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="28" y="448" font-size="12" font-weight="700" fill="#1D4ED8">★2 初級（100〜300時間）</text>
  <text x="28" y="466" font-size="10.5" fill="#374151">簿記3級・FP2級・英検2級・基本情報</text>
  <text x="28" y="482" font-size="10.5" fill="#374151">保育士・ケアマネジャー・TOEIC</text>

  <!-- Tier1 -->
  <rect x="16" y="552" width="328" height="94" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="2.5"/>
  <text x="28" y="576" font-size="12" font-weight="700" fill="#15803D">★1 入門（〜100時間）</text>
  <text x="28" y="594" font-size="10.5" fill="#374151">ITパスポート・危険物取扱者乙4</text>
  <text x="28" y="610" font-size="10.5" fill="#374151">電気工事士2種</text>
  <text x="180" y="634" text-anchor="middle" font-size="10.5" font-weight="700" fill="#15803D">👉 まずはここから始めよう</text>

  <!-- Bottom summary -->
  <rect x="16" y="672" width="328" height="90" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="696" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">★1〜2の入門ボスで「成功体験の盾」を</text>
  <text x="180" y="712" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">手に入れてから、★3以上へ挑むのが最速ルート</text>
  <text x="180" y="732" text-anchor="middle" font-size="9.5" fill="#B45309">いきなり自分のレベルに合わないボスに挑むと</text>
  <text x="180" y="746" text-anchor="middle" font-size="9.5" fill="#B45309">挫折しやすい。まずは足元の1体を確実に倒そう</text>
</svg>
