<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1480" viewBox="0 0 360 1480" role="img" aria-labelledby="title desc">
  <title id="title">圧縮記帳、直接減額方式と積立金方式の違い（モバイル版）</title>
  <desc id="desc">直接減額方式は国庫補助金相当額を固定資産の取得原価から直接減額し会計と税務にズレが生じないため税効果会計が不要な簿記2級の方法であるのに対し、積立金方式は取得原価を減額せず圧縮積立金として純資産に振り替えるため将来加算一時差異が生じ税効果会計が必要になる簿記1級の方法であるという違いを対比する図解</desc>
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#fffbeb"/>
    </linearGradient>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13.5px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:9px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .ptnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11px;font-weight:800;fill:#ffffff}
      .ptname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#1f2937}
      .ptbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="360" height="1480" rx="20" fill="url(#mbg)"/>

  <text x="180" y="26" text-anchor="middle" class="title">圧縮記帳 直接減額方式 vs 積立金方式</text>
  <text x="180" y="44" text-anchor="middle" class="sub">取得原価を減らすか、減らさないか</text>

  <!-- 直接減額方式 -->
  <rect x="16" y="62" width="328" height="42" rx="12" fill="#166534"/>
  <text x="180" y="88" text-anchor="middle" class="colhead">直接減額方式（簿記2級）</text>

  <rect x="16" y="116" width="328" height="500" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="2.5"/>

  <circle cx="44" cy="150" r="15" fill="#166534"/>
  <text x="44" y="155" text-anchor="middle" class="ptnum">1</text>
  <text x="66" y="146" class="ptname">固定資産の帳簿価額</text>
  <text x="66" y="164" class="ptbody">補助金相当額を取得原価から直接減額</text>

  <line x1="30" y1="180" x2="330" y2="180" stroke="#dcfce7" stroke-width="2"/>

  <circle cx="44" cy="212" r="15" fill="#166534"/>
  <text x="44" y="217" text-anchor="middle" class="ptnum">2</text>
  <text x="66" y="208" class="ptname">税効果会計</text>
  <text x="66" y="226" class="ptbody">不要（会計と税務にズレなし）</text>

  <line x1="30" y1="242" x2="330" y2="242" stroke="#dcfce7" stroke-width="2"/>

  <circle cx="44" cy="274" r="15" fill="#166534"/>
  <text x="44" y="279" text-anchor="middle" class="ptnum">3</text>
  <text x="66" y="270" class="ptname">仕組み</text>
  <text x="66" y="288" class="ptbody">シンプル、将来の減価償却費は小さい</text>

  <rect x="30" y="374" width="300" height="226" rx="12" fill="#f0fdf4"/>
  <text x="46" y="400" class="ptname" fill="#166534">数値例（建物9,000・補助金6,000）</text>
  <text x="46" y="424" class="ptbody">固定資産圧縮損6,000／建物6,000</text>
  <text x="46" y="446" class="ptbody">→ 建物の帳簿価額は3,000に</text>
  <text x="46" y="472" class="ptbody">毎年の減価償却費：</text>
  <text x="46" y="490" class="ptbody">3,000÷3年＝1,000円</text>

  <!-- 積立金方式 -->
  <rect x="16" y="646" width="328" height="42" rx="12" fill="#B45309"/>
  <text x="180" y="672" text-anchor="middle" class="colhead">積立金方式（簿記1級）</text>

  <rect x="16" y="700" width="328" height="500" rx="16" fill="#ffffff" stroke="#FCD9A0" stroke-width="2.5"/>

  <circle cx="44" cy="734" r="15" fill="#B45309"/>
  <text x="44" y="739" text-anchor="middle" class="ptnum">1</text>
  <text x="66" y="730" class="ptname">固定資産の帳簿価額</text>
  <text x="66" y="748" class="ptbody">減額せず取得原価のまま計上</text>

  <line x1="30" y1="764" x2="330" y2="764" stroke="#FEF3C7" stroke-width="2"/>

  <circle cx="44" cy="796" r="15" fill="#B45309"/>
  <text x="44" y="801" text-anchor="middle" class="ptnum">2</text>
  <text x="66" y="792" class="ptname">税効果会計</text>
  <text x="66" y="810" class="ptbody">必要（将来加算一時差異が発生）</text>

  <line x1="30" y1="826" x2="330" y2="826" stroke="#FEF3C7" stroke-width="2"/>

  <circle cx="44" cy="858" r="15" fill="#B45309"/>
  <text x="44" y="863" text-anchor="middle" class="ptnum">3</text>
  <text x="66" y="854" class="ptname">仕組み</text>
  <text x="66" y="872" class="ptbody">繰越利益剰余金を圧縮積立金へ振替</text>

  <rect x="30" y="956" width="300" height="226" rx="12" fill="#FFFBEB"/>
  <text x="46" y="982" class="ptname" fill="#92400E">数値例（建物9,000・補助金6,000）</text>
  <text x="46" y="1006" class="ptbody">法人税等調整額2,400／</text>
  <text x="46" y="1024" class="ptbody">繰延税金負債2,400（6,000×40%）</text>
  <text x="46" y="1050" class="ptbody">→ 建物の帳簿価額は9,000のまま</text>
  <text x="46" y="1074" class="ptbody">毎年の減価償却費：</text>
  <text x="46" y="1092" class="ptbody">9,000÷3年＝3,000円</text>

  <!-- Bottom banner -->
  <rect x="16" y="1250" width="328" height="200" rx="16" fill="#fffbeb" stroke="#fcd34d" stroke-width="2.5"/>
  <text x="180" y="1280" text-anchor="middle" class="banner">どちらも「課税の繰延べ」</text>
  <text x="180" y="1298" text-anchor="middle" class="banner">効果は同じ</text>
  <text x="180" y="1326" text-anchor="middle" class="bannersmall">直接減額は資産を減らして完結、</text>
  <text x="180" y="1344" text-anchor="middle" class="bannersmall">積立金方式は純資産と税効果で</text>
  <text x="180" y="1362" text-anchor="middle" class="bannersmall">調整——2級は前者のみ</text>
</svg>
