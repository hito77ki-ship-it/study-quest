<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 930" width="360" height="930" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">基本情報技術者試験（FE）の全体像と攻略（モバイル版）</title>
  <desc id="svgdesc">科目A・科目Bの試験構成と、合格のための4つの学習ポイントを縦に並べた図解</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="930" rx="16" fill="#F8FAFC"/>
  <text x="180" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">基本情報技術者試験（FE）</text>
  <text x="180" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">の全体像と攻略</text>

  <!-- 試験構成 -->
  <rect x="16" y="66" width="328" height="386" rx="10" fill="#F5F3FF"/>
  <rect x="16" y="66" width="328" height="32" rx="10" fill="#7C3AED"/>
  <text x="180" y="88" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">試験構成（IPA レベル2・CBT随時）</text>

  <text x="30" y="118" font-size="11.5" font-weight="700" fill="#6D28D9">科目A（旧午前）── 90分 60問</text>
  <rect x="30" y="126" width="300" height="28" rx="5" fill="#EDE9FE"/>
  <text x="40" y="144" font-size="9.5" fill="#374151">テクノロジ系（約55問）：アルゴリズム・DB・ネットワーク</text>
  <rect x="30" y="158" width="300" height="28" rx="5" fill="#EDE9FE"/>
  <text x="40" y="176" font-size="9.5" fill="#374151">マネジメント系（約5問）：プロジェクト・サービス管理</text>
  <rect x="30" y="190" width="300" height="28" rx="5" fill="#DDD6FE"/>
  <text x="40" y="208" font-size="10" font-weight="700" fill="#6D28D9">合格基準：600点以上（1000点満点）</text>

  <text x="30" y="242" font-size="11.5" font-weight="700" fill="#6D28D9">科目B（旧午後）── 100分 20問</text>
  <rect x="30" y="250" width="300" height="28" rx="5" fill="#EDE9FE"/>
  <text x="40" y="268" font-size="9.5" fill="#374151">アルゴリズムとプログラミング（16問）</text>
  <rect x="30" y="282" width="300" height="28" rx="5" fill="#EDE9FE"/>
  <text x="40" y="300" font-size="9.5" fill="#374151">情報セキュリティ（4問）</text>
  <rect x="30" y="314" width="300" height="28" rx="5" fill="#DDD6FE"/>
  <text x="40" y="332" font-size="10" font-weight="700" fill="#6D28D9">合格基準：600点以上（1000点満点）</text>

  <rect x="30" y="352" width="300" height="46" rx="6" fill="#7C3AED"/>
  <text x="180" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">両科目600点以上で合格</text>
  <text x="180" y="388" text-anchor="middle" font-size="10" fill="#E9D5FF">合格率35〜45%　必要勉強時間100〜200時間</text>

  <!-- 学習ポイント -->
  <rect x="16" y="470" width="328" height="700" rx="10" fill="#EFF6FF"/>
  <rect x="16" y="470" width="328" height="32" rx="10" fill="#2563EB"/>
  <text x="180" y="492" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">合格のための学習ポイント</text>

  <rect x="30" y="512" width="300" height="88" rx="6" fill="#DBEAFE"/>
  <text x="180" y="534" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">① 科目A：過去問1000問を回す</text>
  <text x="180" y="554" text-anchor="middle" font-size="10" fill="#374151">科目Aは過去問の焼き直しが多い。</text>
  <text x="180" y="572" text-anchor="middle" font-size="10" fill="#374151">「科目A免除制度」も活用を検討する</text>

  <rect x="30" y="612" width="300" height="88" rx="6" fill="#DBEAFE"/>
  <text x="180" y="634" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">② 科目B：擬似言語を読む練習</text>
  <text x="180" y="654" text-anchor="middle" font-size="10" fill="#374151">FEの擬似言語（疑似コード）を読む練習が核心</text>
  <text x="180" y="672" text-anchor="middle" font-size="10" fill="#374151">Pythonでの実装練習も合わせると理解が深まる</text>

  <rect x="30" y="712" width="300" height="88" rx="6" fill="#DBEAFE"/>
  <text x="180" y="734" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">③ セキュリティ：4問を確実に取る</text>
  <text x="180" y="754" text-anchor="middle" font-size="10" fill="#374151">科目Bのセキュリティ4問は比較的易しい</text>
  <text x="180" y="772" text-anchor="middle" font-size="10" fill="#374151">リスク・脅威・認証の基本を押さえれば全問正解可能</text>

  <rect x="30" y="812" width="300" height="88" rx="6" fill="#BFDBFE"/>
  <text x="180" y="834" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">④ CBTのメリットを活かす</text>
  <text x="180" y="854" text-anchor="middle" font-size="10" fill="#374151">年4回以上受験できる。科目Aから先に合格して</text>
  <text x="180" y="872" text-anchor="middle" font-size="10" fill="#374151">科目Bに集中するという戦略も有効</text>
</svg>
