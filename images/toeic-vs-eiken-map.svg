  <rect x="284" y="276" width="192" height="44" rx="4" fill="#F1F5F9"/>
  <text x="380" y="303" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">強み・用途</text>
  <rect x="484" y="276" width="256" height="44" rx="4" fill="#EDE9FE"/>
  <text x="612" y="295" text-anchor="middle" font-size="11" fill="#6D28D9">大学受験・進学・英語教員</text>
  <text x="612" y="312" text-anchor="middle" font-size="10" fill="#6D28D9">スピーキング証明に強い</text>
  <!-- Recommendation row -->
