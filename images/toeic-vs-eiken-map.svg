  <rect x="284" y="50" width="192" height="34" rx="6" fill="#475569"/>
  <text x="380" y="73" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">比較項目</text>
  <rect x="484" y="50" width="256" height="34" rx="6" fill="#7C3AED"/>
  <text x="612" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">英検（実用英語技能検定）</text>
  <!-- Row 1: 形式 -->
  <rect x="20" y="92" width="256" height="40" rx="4" fill="#E0F2FE"/>
  <text x="148" y="117" text-anchor="middle" font-size="11" fill="#0369A1">マーク式のみ・2時間</text>
  <rect x="284" y="92" width="192" height="40" rx="4" fill="#F1F5F9"/>
  <text x="380" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">試験形式</text>
  <rect x="484" y="92" width="256" height="40" rx="4" fill="#F3E8FF"/>
  <text x="612" y="117" text-anchor="middle" font-size="11" fill="#7C3AED">筆記＋リスニング＋二次面接</text>
  <!-- Row 2: 評価 -->
  <rect x="20" y="138" width="256" height="40" rx="4" fill="#E0F2FE"/>
  <text x="148" y="163" text-anchor="middle" font-size="11" fill="#0369A1">スコア制（10〜990点）</text>
  <rect x="284" y="138" width="192" height="40" rx="4" fill="#F1F5F9"/>
  <text x="380" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">評価方式</text>
  <rect x="484" y="138" width="256" height="40" rx="4" fill="#F3E8FF"/>
  <text x="612" y="163" text-anchor="middle" font-size="11" fill="#7C3AED">合否制（1〜5級）</text>
  <!-- Row 3: 測定技能 -->
  <rect x="20" y="184" width="256" height="40" rx="4" fill="#E0F2FE"/>
  <text x="148" y="209" text-anchor="middle" font-size="11" fill="#0369A1">L / R の2技能に特化</text>
  <rect x="284" y="184" width="192" height="40" rx="4" fill="#F1F5F9"/>
  <text x="380" y="209" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">測定技能</text>
  <rect x="484" y="184" width="256" height="40" rx="4" fill="#F3E8FF"/>
  <text x="612" y="209" text-anchor="middle" font-size="11" fill="#7C3AED">R / L / W / S の4技能</text>
  <!-- Row 4: 更新 -->
  <rect x="20" y="230" width="256" height="40" rx="4" fill="#E0F2FE"/>
  <text x="148" y="255" text-anchor="middle" font-size="11" fill="#0369A1">期限なし（永続有効）</text>
  <rect x="284" y="230" width="192" height="40" rx="4" fill="#F1F5F9"/>
  <text x="380" y="255" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">資格の有効期限</text>
  <rect x="484" y="230" width="256" height="40" rx="4" fill="#F3E8FF"/>
  <text x="612" y="255" text-anchor="middle" font-size="11" fill="#7C3AED">期限なし（永続有効）</text>
  <!-- Row 5: 強み -->
  <rect x="20" y="276" width="256" height="44" rx="4" fill="#DBEAFE"/>
  <text x="148" y="295" text-anchor="middle" font-size="11" fill="#1D4ED8">就職・転職・昇進・海外赴任</text>
