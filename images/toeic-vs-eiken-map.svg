  <text x="380" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#94A3B8">目的別おすすめ</text>
  <rect x="28" y="360" width="160" height="32" rx="5" fill="#0369A1"/>
  <text x="108" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">就職・転職 → TOEIC</text>
  <rect x="198" y="360" width="160" height="32" rx="5" fill="#7C3AED"/>
  <text x="278" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">進学・受験 → 英検</text>
  <rect x="368" y="360" width="190" height="32" rx="5" fill="#0369A1"/>
  <text x="463" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">昇進・海外赴任 → TOEIC</text>
  <rect x="568" y="360" width="174" height="32" rx="5" fill="#7C3AED"/>
  <text x="655" y="381" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">英語4技能証明 → 英検</text>
