<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 510" width="360" height="510">
  <defs>
    <style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style>
    <linearGradient id="mMinpo" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#93C5FD"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="mKaisha" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#CBD5E1"/><stop offset="100%" stop-color="#94A3B8"/></linearGradient>
    <linearGradient id="mMinor" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E2E8F0"/><stop offset="100%" stop-color="#CBD5E1"/></linearGradient>
    <linearGradient id="mFutoki" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6EE7B7"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
    <linearGradient id="mShoto" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#CBD5E1"/><stop offset="100%" stop-color="#94A3B8"/></linearGradient>
    <linearGradient id="mSosho" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#E2E8F0"/><stop offset="100%" stop-color="#CBD5E1"/></linearGradient>
    <linearGradient id="mBg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#F1F5F9"/></linearGradient>
  </defs>

  <rect width="360" height="510" rx="16" fill="url(#mBg)"/>
  <text x="180" y="28" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">⚔ 司法書士 配点ハック＆足切り回避マップ</text>
  <text x="180" y="48" text-anchor="middle" font-size="10" fill="#64748B">午前・午後、それぞれ独立した基準点を突破しないと</text>
  <text x="180" y="62" text-anchor="middle" font-size="10" fill="#64748B">記述式は採点すらされない</text>

  <!-- AM panel -->
  <rect x="16" y="82" width="328" height="26" rx="6" fill="#DBEAFE"/>
  <text x="180" y="99" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A8A">午前の部（択一35問）</text>

  <!-- horizontal stacked bar AM: 民法20/会社法9/憲法3/刑法3 -->
  <rect x="28" y="118" width="174" height="30" fill="url(#mMinpo)"/>
  <rect x="202" y="118" width="78" height="30" fill="url(#mKaisha)"/>
  <rect x="280" y="118" width="26" height="30" fill="url(#mMinor)"/>
  <rect x="306" y="118" width="26" height="30" fill="url(#mMinor)"/>
  <rect x="28" y="118" width="304" height="30" fill="none" stroke="#94A3B8" stroke-width="1.5"/>

  <rect x="28" y="160" width="12" height="12" fill="url(#mMinpo)"/>
  <text x="46" y="170" font-size="10.5" font-weight="700" fill="#1E3A8A">民法 20問 ★最重要</text>
  <rect x="28" y="178" width="12" height="12" fill="url(#mKaisha)"/>
  <text x="46" y="188" font-size="10.5" fill="#475569">会社法・商法 9問</text>
  <rect x="28" y="196" width="12" height="12" fill="url(#mMinor)"/>
  <text x="46" y="206" font-size="10.5" fill="#64748B">憲法・刑法 各3問</text>

  <text x="180" y="230" text-anchor="middle" font-size="10.5" fill="#64748B">👉 民法1科目で午前の57%を占める</text>

  <!-- PM panel -->
  <rect x="16" y="256" width="328" height="26" rx="6" fill="#D1FAE5"/>
  <text x="180" y="273" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065F46">午後の部（択一35問＋記述2問）</text>

  <rect x="28" y="292" width="139" height="30" fill="url(#mFutoki)"/>
  <rect x="167" y="292" width="70" height="30" fill="url(#mShoto)"/>
  <rect x="237" y="292" width="95" height="30" fill="url(#mSosho)"/>
  <rect x="28" y="292" width="304" height="30" fill="none" stroke="#94A3B8" stroke-width="1.5"/>

  <rect x="28" y="334" width="12" height="12" fill="url(#mFutoki)"/>
  <text x="46" y="344" font-size="10.5" font-weight="700" fill="#065F46">不動産登記法 16問+記述 ★最重要</text>
  <rect x="28" y="352" width="12" height="12" fill="url(#mShoto)"/>
  <text x="46" y="362" font-size="10.5" fill="#475569">商業登記法 8問+記述</text>
  <rect x="28" y="370" width="12" height="12" fill="url(#mSosho)"/>
  <text x="46" y="380" font-size="10.5" fill="#64748B">民事訴訟法等 11問</text>

  <text x="180" y="404" text-anchor="middle" font-size="10.5" fill="#64748B">👉 記述式は基準点を超えないと採点されない</text>

  <!-- Bottom callout -->
  <rect x="16" y="430" width="328" height="60" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="180" y="452" text-anchor="middle" font-size="10.5" font-weight="700" fill="#065F46">✅ 民法＋不動産登記法だけで午前・午後の</text>
  <text x="180" y="470" text-anchor="middle" font-size="10.5" font-weight="700" fill="#065F46">出題数の約51%（36/70問）。最短合格ルート</text>
</svg>
