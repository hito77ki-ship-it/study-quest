<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">３伝票制の使い分けと記入ルール</text>

  <!-- 3 card row -->
  <!-- 入金伝票 -->
  <rect x="30" y="56" width="210" height="180" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="30" y="56" width="210" height="34" rx="10" fill="#3B82F6"/>
  <rect x="30" y="80" width="210" height="10" fill="#3B82F6"/>
  <text x="135" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">入金伝票</text>
  <text x="135" y="106" text-anchor="middle" font-size="11" fill="#1E40AF">現金を受け取ったとき</text>
  <text x="135" y="128" text-anchor="middle" font-size="28" fill="#3B82F6">💵</text>
  <rect x="50" y="148" width="170" height="42" rx="6" fill="#DBEAFE"/>
  <text x="135" y="165" text-anchor="middle" font-size="10.5" fill="#1D4ED8">借方は常に「現金」固定</text>
  <text x="135" y="181" text-anchor="middle" font-size="10.5" fill="#1D4ED8">貸方科目を伝票に記入</text>
  <text x="135" y="222" text-anchor="middle" font-size="10" fill="#94A3B8">例：現金 / 売上 10,000</text>

  <!-- 出金伝票 -->
  <rect x="275" y="56" width="210" height="180" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="275" y="56" width="210" height="34" rx="10" fill="#EF4444"/>
  <rect x="275" y="80" width="210" height="10" fill="#EF4444"/>
  <text x="380" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">出金伝票</text>
  <text x="380" y="106" text-anchor="middle" font-size="11" fill="#991B1B">現金を支払ったとき</text>
  <text x="380" y="128" text-anchor="middle" font-size="28" fill="#EF4444">💸</text>
  <rect x="295" y="148" width="170" height="42" rx="6" fill="#FEE2E2"/>
  <text x="380" y="165" text-anchor="middle" font-size="10.5" fill="#991B1B">貸方は常に「現金」固定</text>
  <text x="380" y="181" text-anchor="middle" font-size="10.5" fill="#991B1B">借方科目を伝票に記入</text>
  <text x="380" y="222" text-anchor="middle" font-size="10" fill="#94A3B8">例：仕入 10,000 / 現金</text>

  <!-- 振替伝票 -->
  <rect x="520" y="56" width="210" height="180" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="520" y="56" width="210" height="34" rx="10" fill="#22C55E"/>
  <rect x="520" y="80" width="210" height="10" fill="#22C55E"/>
  <text x="625" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">振替伝票</text>
  <text x="625" y="106" text-anchor="middle" font-size="11" fill="#166534">現金以外の取引のとき</text>
  <text x="625" y="128" text-anchor="middle" font-size="28" fill="#22C55E">📄</text>
  <rect x="540" y="148" width="170" height="42" rx="6" fill="#DCFCE7"/>
  <text x="625" y="165" text-anchor="middle" font-size="10.5" fill="#15803D">借方・貸方どちらも記入</text>
  <text x="625" y="181" text-anchor="middle" font-size="10.5" fill="#15803D">（普通の仕訳と同じ形）</text>
  <text x="625" y="222" text-anchor="middle" font-size="10" fill="#94A3B8">例：売掛金/売上 10,000</text>

  <!-- 現金混在取引のルール -->
  <rect x="30" y="254" width="700" height="114" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="274" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">現金と掛けが混在するとき——分解法 vs 擬制法</text>

  <!-- 分解法 -->
  <rect x="50" y="284" width="300" height="72" rx="8" fill="#FEF9C3"/>
  <text x="200" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">分解法（現金部分を分ける）</text>
  <text x="200" y="320" text-anchor="middle" font-size="10.5" fill="#78350F">現金¥3,000 ＋ 掛け¥7,000 で仕入¥10,000</text>
  <text x="200" y="337" text-anchor="middle" font-size="10" fill="#78350F">出金伝票：仕入¥3,000 ／ 現金</text>
  <text x="200" y="353" text-anchor="middle" font-size="10" fill="#78350F">振替伝票：仕入¥7,000 ／ 買掛金</text>

  <!-- 擬制法 -->
  <rect x="380" y="284" width="320" height="72" rx="8" fill="#FEF3C7"/>
  <text x="540" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">擬制法（全額掛けにしてキャンセル）</text>
  <text x="540" y="320" text-anchor="middle" font-size="10.5" fill="#78350F">振替伝票：仕入¥10,000 ／ 買掛金</text>
  <text x="540" y="337" text-anchor="middle" font-size="10" fill="#78350F">入金伝票：現金¥3,000 ／ 買掛金</text>
  <text x="540" y="353" text-anchor="middle" font-size="10" fill="#78350F">（掛けを現金で即時払いと擬制）</text>

  <!-- line divider -->
  <line x1="370" y1="284" x2="370" y2="356" stroke="#FDE68A" stroke-width="1"/>

  <!-- bottom note -->
  <text x="380" y="384" text-anchor="middle" font-size="10.5" fill="#94A3B8">💡 どちらの方法を使うかは問題文の指示に従う——合計金額は同じになる</text>
</svg>
