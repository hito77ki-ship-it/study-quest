<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="520" rx="16" fill="#F8FAFC"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">マンション管理士 配点ウェイト＆W取得戦略マップ</text>
  <text x="380" y="49" text-anchor="middle" font-size="10.5" fill="#64748B">区分所有法（くぶんしょゆうほう）を最優先で攻略し、管理業務主任者との重複をフル活用する</text>

  <line x1="368" y1="68" x2="368" y2="315" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ① 出題分野の配点ウェイト（左） -->
  <text x="30" y="76" font-size="12.5" font-weight="700" fill="#1E293B">① 出題分野の配点ウェイト</text>

  <text x="30" y="98" font-size="11" font-weight="700" fill="#9D174D">区分所有法（くぶんしょゆうほう）</text>
  <text x="330" y="98" text-anchor="end" font-size="10.5" font-weight="700" fill="#9D174D">10〜12問</text>
  <rect x="30" y="104" width="260" height="14" rx="4" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1.5"/>

  <text x="30" y="140" font-size="11" font-weight="700" fill="#9D174D">標準管理規約（ひょうじゅんかんりきやく）</text>
  <text x="330" y="140" text-anchor="end" font-size="10.5" font-weight="700" fill="#9D174D">6〜8問</text>
  <rect x="30" y="146" width="173" height="14" rx="4" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1.5"/>

  <text x="30" y="182" font-size="11" font-weight="700" fill="#1E40AF">民法</text>
  <text x="330" y="182" text-anchor="end" font-size="10.5" font-weight="700" fill="#1E40AF">8〜10問</text>
  <rect x="30" y="188" width="217" height="14" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>

  <text x="30" y="224" font-size="11" font-weight="700" fill="#1E40AF">建築・設備</text>
  <text x="330" y="224" text-anchor="end" font-size="10.5" font-weight="700" fill="#1E40AF">6〜8問</text>
  <rect x="30" y="230" width="173" height="14" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>

  <text x="30" y="266" font-size="11" font-weight="700" fill="#166534">適正化法（てきせいかほう）</text>
  <text x="330" y="266" text-anchor="end" font-size="10.5" font-weight="700" fill="#166534">4〜6問</text>
  <rect x="30" y="272" width="130" height="14" rx="4" fill="#F0FFF4" stroke="#86EFAC" stroke-width="1.5"/>

  <text x="30" y="298" font-size="11" font-weight="700" fill="#475569">会計・税務</text>
  <text x="330" y="298" text-anchor="end" font-size="10.5" font-weight="700" fill="#475569">2〜4問</text>
  <rect x="30" y="304" width="87" height="14" rx="4" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- ② 管業とのW取得・70%重複（右） -->
  <text x="400" y="76" font-size="12.5" font-weight="700" fill="#1E293B">② 管業とのW取得——70%重複</text>

  <ellipse cx="495" cy="200" rx="95" ry="92" fill="#F9A8D4" fill-opacity="0.45" stroke="#F472B6" stroke-width="1.5"/>
  <ellipse cx="600" cy="200" rx="95" ry="92" fill="#93C5FD" fill-opacity="0.45" stroke="#60A5FA" stroke-width="1.5"/>

  <text x="445" y="140" text-anchor="middle" font-size="10" font-weight="700" fill="#9D174D">マンション管理士</text>
  <text x="445" y="153" text-anchor="middle" font-size="9" fill="#9D174D">特有</text>
  <text x="648" y="140" text-anchor="middle" font-size="10" font-weight="700" fill="#1E40AF">管理業務主任者</text>
  <text x="648" y="153" text-anchor="middle" font-size="8.5" fill="#1E40AF">（かんりぎょうむしゅにんしゃ）特有</text>

  <text x="547" y="196" text-anchor="middle" font-size="17" font-weight="700" fill="#7C3AED">70%</text>
  <text x="547" y="213" text-anchor="middle" font-size="11" font-weight="700" fill="#7C3AED">重複</text>

  <text x="547" y="285" text-anchor="middle" font-size="9.5" fill="#374151">区分所有法・標準管理規約・民法 など</text>

  <!-- ③ 合格基準36〜38点の防衛線 -->
  <text x="30" y="345" font-size="12.5" font-weight="700" fill="#1E293B">③ 合格基準は36〜38点／50問——ここが最終防衛ライン</text>

  <rect x="50" y="368" width="660" height="30" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <rect x="525" y="368" width="185" height="30" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="525" y="368" width="26" height="30" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>

  <text x="70" y="388" font-size="9.5" fill="#64748B">0問</text>
  <text x="380" y="388" text-anchor="middle" font-size="9.5" fill="#64748B">不合格ゾーン</text>
  <text x="620" y="388" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">合格ゾーン</text>
  <text x="695" y="388" text-anchor="end" font-size="9.5" fill="#64748B">50問</text>

  <line x1="538" y1="368" x2="538" y2="348" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="538" y="341" text-anchor="middle" font-size="10.5" font-weight="700" fill="#B45309">防衛ライン 36〜38点</text>

  <!-- 下部まとめ -->
  <rect x="30" y="423" width="700" height="80" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="447" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">🎯 攻略の鉄則：区分所有法＋標準管理規約でまず18〜20問を死守する</text>
  <text x="380" y="466" text-anchor="middle" font-size="10.5" fill="#374151">→ 管理業務主任者と共有する「70%の得点源」を先に固める → 残りを民法で加点し、</text>
  <text x="380" y="484" text-anchor="middle" font-size="10.5" fill="#374151">36〜38点の防衛ラインを確実に超える設計にする</text>
</svg>
