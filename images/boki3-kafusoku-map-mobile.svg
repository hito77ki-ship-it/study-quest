<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1300" viewBox="0 0 360 1300" role="img" aria-labelledby="title desc">
  <title id="title">現金過不足の実査・原因判明・決算整理3ステップフロー（モバイル版）</title>
  <desc id="desc">現金過不足という仮の勘定科目が、実査で発生し、原因判明で正しい科目へ振り替えられ、決算整理で雑損・雑益に清算されて必ずゼロになる3ステップを縦に並べた図解</desc>
  <defs>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10px;font-weight:600;fill:#64748b}
      .pill{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:800;fill:#ffffff}
      .stepname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#1f2937}
      .body{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11.5px;font-weight:600;fill:#334155}
      .ex{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11.5px;font-weight:700}
      .exsmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10px;font-weight:600;fill:#64748b}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:700;fill:#166534}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="360" height="1300" rx="20" fill="#FBFDF5"/>
  <text x="180" y="30" text-anchor="middle" class="title">現金過不足 3ステップ清算マップ</text>
  <text x="180" y="50" text-anchor="middle" class="sub">仮のハコは3ステップを経て必ずゼロになる</text>

  <!-- STEP1 -->
  <rect x="20" y="70" width="320" height="260" rx="18" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>
  <rect x="36" y="86" width="80" height="28" rx="14" fill="#3b82f6"/>
  <text x="76" y="105" text-anchor="middle" class="pill">STEP 1</text>
  <text x="220" y="105" text-anchor="middle" class="stepname">現金実査 🔍</text>
  <text x="36" y="142" class="body">帳簿残高と実際の手元現金を数えて</text>
  <text x="36" y="160" class="body">比べる。差額が出たら「現金過不足」</text>
  <text x="36" y="178" class="body">という仮のハコに一時避難させる。</text>
  <rect x="36" y="196" width="288" height="112" rx="10" fill="#EFF6FF"/>
  <text x="180" y="222" text-anchor="middle" class="exsmall">例：帳簿100,000 → 実際99,000</text>
  <text x="180" y="248" text-anchor="middle" class="ex" fill="#1D4ED8">現金過不足 1,000 ／ 現金 1,000</text>
  <text x="180" y="278" text-anchor="middle" class="exsmall">原因はまだ分からなくてOK</text>

  <polygon points="160,344 200,344 180,368" fill="#94a3b8"/>

  <!-- STEP2 -->
  <rect x="20" y="384" width="320" height="260" rx="18" fill="#ffffff" stroke="#86efac" stroke-width="3"/>
  <rect x="36" y="400" width="80" height="28" rx="14" fill="#22c55e"/>
  <text x="76" y="419" text-anchor="middle" class="pill">STEP 2</text>
  <text x="220" y="419" text-anchor="middle" class="stepname">原因判明 💡</text>
  <text x="36" y="456" class="body">原因が分かった分だけ、現金過不足を</text>
  <text x="36" y="474" class="body">「消して」正しい科目に書き直す。</text>
  <text x="36" y="492" class="body">消す＝反対側に同額を書くだけ。</text>
  <rect x="36" y="510" width="288" height="112" rx="10" fill="#F0FDF4"/>
  <text x="180" y="534" text-anchor="middle" class="exsmall">例：受取手数料の記入漏れ2,000円</text>
  <text x="180" y="560" text-anchor="middle" class="ex" fill="#166534">現金過不足2,000／受取手数料2,000</text>
  <text x="180" y="592" text-anchor="middle" class="exsmall">残りはまだ「仮のハコ」に居残る</text>

  <polygon points="160,658 200,658 180,682" fill="#94a3b8"/>

  <!-- STEP3 -->
  <rect x="20" y="698" width="320" height="260" rx="18" fill="#ffffff" stroke="#fdba74" stroke-width="3"/>
  <rect x="36" y="714" width="80" height="28" rx="14" fill="#f97316"/>
  <text x="76" y="733" text-anchor="middle" class="pill">STEP 3</text>
  <text x="220" y="733" text-anchor="middle" class="stepname">決算整理 📅</text>
  <text x="36" y="770" class="body">決算日になっても原因不明の分は、</text>
  <text x="36" y="788" class="body">現金過不足を強制的にゼロにして</text>
  <text x="36" y="806" class="body">雑損（費用）か雑益（収益）へ清算。</text>
  <rect x="36" y="824" width="288" height="112" rx="10" fill="#FFF7ED"/>
  <text x="180" y="850" text-anchor="middle" class="exsmall">借方に残っていた分（不足＝損）</text>
  <text x="180" y="876" text-anchor="middle" class="ex" fill="#C2410C">雑損 ／ 現金過不足</text>
  <text x="180" y="906" text-anchor="middle" class="exsmall">貸方に残っていれば「雑益」で逆仕訳</text>

  <!-- Bottom takeaway -->
  <rect x="20" y="978" width="320" height="290" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2.5"/>
  <text x="180" y="1012" text-anchor="middle" class="banner">決算清算の合言葉：</text>
  <text x="180" y="1034" text-anchor="middle" class="banner">「残高を消すために、</text>
  <text x="180" y="1054" text-anchor="middle" class="banner">反対側に同じ数字を書く」</text>
  <text x="180" y="1088" text-anchor="middle" class="bannersmall">借方に残る → 貸方に書いて消す</text>
  <text x="180" y="1108" text-anchor="middle" class="bannersmall">→ 反対の借方に残るのが「雑損」</text>
  <text x="180" y="1140" text-anchor="middle" class="bannersmall">貸方に残る → 借方に書いて消す</text>
  <text x="180" y="1160" text-anchor="middle" class="bannersmall">→ 反対の貸方に残るのが「雑益」</text>
  <text x="180" y="1194" text-anchor="middle" class="bannersmall">この型さえ覚えれば、雑損・雑益の</text>
  <text x="180" y="1214" text-anchor="middle" class="bannersmall">どちらを使うか迷う必要はもうありません</text>
</svg>
