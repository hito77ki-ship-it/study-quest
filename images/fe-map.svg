<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">基本情報技術者試験（FE）の全体像と攻略</text>
  <!-- Left: 試験構成 -->
  <rect x="20" y="52" width="348" height="328" rx="8" fill="#F5F3FF"/>
  <rect x="20" y="52" width="348" height="34" rx="8" fill="#7C3AED"/>
  <text x="194" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">試験構成（IPA レベル2・CBT随時）</text>
  <!-- 科目A -->
  <text x="40" y="106" text-anchor="start" font-size="12" font-weight="700" fill="#6D28D9">科目A（旧午前）── 90分 60問</text>
  <rect x="40" y="114" width="310" height="26" rx="4" fill="#EDE9FE"/>
  <text x="50" y="131" text-anchor="start" font-size="10" fill="#374151">テクノロジ系（約55問）：アルゴリズム・DB・ネットワーク</text>
  <rect x="40" y="146" width="310" height="26" rx="4" fill="#EDE9FE"/>
  <text x="50" y="163" text-anchor="start" font-size="10" fill="#374151">マネジメント系（約5問）：プロジェクト・サービス管理</text>
  <rect x="40" y="178" width="310" height="26" rx="4" fill="#DDD6FE"/>
  <text x="50" y="195" text-anchor="start" font-size="10" font-weight="700" fill="#6D28D9">合格基準：600点以上（1000点満点）</text>
  <!-- 科目B -->
  <text x="40" y="226" text-anchor="start" font-size="12" font-weight="700" fill="#6D28D9">科目B（旧午後）── 100分 20問</text>
  <rect x="40" y="234" width="310" height="26" rx="4" fill="#EDE9FE"/>
  <text x="50" y="251" text-anchor="start" font-size="10" fill="#374151">アルゴリズムとプログラミング（16問）</text>
  <rect x="40" y="266" width="310" height="26" rx="4" fill="#EDE9FE"/>
  <text x="50" y="283" text-anchor="start" font-size="10" fill="#374151">情報セキュリティ（4問）</text>
  <rect x="40" y="298" width="310" height="26" rx="4" fill="#DDD6FE"/>
  <text x="50" y="315" text-anchor="start" font-size="10" font-weight="700" fill="#6D28D9">合格基準：600点以上（1000点満点）</text>
  <rect x="40" y="336" width="310" height="34" rx="4" fill="#7C3AED"/>
  <text x="194" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">両科目600点以上で合格</text>
  <text x="194" y="364" text-anchor="middle" font-size="10" fill="#E9D5FF">合格率35〜45%  必要勉強時間100〜200時間</text>
  <!-- Right: 攻略 -->
  <rect x="384" y="52" width="356" height="328" rx="8" fill="#EFF6FF"/>
  <rect x="384" y="52" width="356" height="34" rx="8" fill="#2563EB"/>
  <text x="562" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">合格のための学習ポイント</text>
  <rect x="400" y="96" width="324" height="60" rx="6" fill="#DBEAFE"/>
  <text x="562" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">① 科目A：過去問1000問を回す</text>
  <text x="562" y="134" text-anchor="middle" font-size="10" fill="#374151">科目Aは過去問の焼き直しが多い。</text>
  <text x="562" y="150" text-anchor="middle" font-size="10" fill="#374151">「科目A免除制度」も活用を検討する</text>
  <rect x="400" y="166" width="324" height="60" rx="6" fill="#DBEAFE"/>
  <text x="562" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">② 科目B：擬似言語を読む練習</text>
  <text x="562" y="204" text-anchor="middle" font-size="10" fill="#374151">FEの擬似言語（疑似コード）を読む練習が核心</text>
  <text x="562" y="220" text-anchor="middle" font-size="10" fill="#374151">Pythonでの実装練習も合わせると理解が深まる</text>
  <rect x="400" y="236" width="324" height="60" rx="6" fill="#DBEAFE"/>
  <text x="562" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">③ セキュリティ：4問を確実に取る</text>
  <text x="562" y="274" text-anchor="middle" font-size="10" fill="#374151">科目Bのセキュリティ4問は比較的易しい</text>
  <text x="562" y="290" text-anchor="middle" font-size="10" fill="#374151">リスク・脅威・認証の基本を押さえれば全問正解可能</text>
  <rect x="400" y="306" width="324" height="64" rx="6" fill="#BFDBFE"/>
  <text x="562" y="326" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">④ CBTのメリットを活かす</text>
  <text x="562" y="344" text-anchor="middle" font-size="10" fill="#374151">年4回以上受験できる。科目Aから先に合格して</text>
  <text x="562" y="360" text-anchor="middle" font-size="10" fill="#374151">科目Bに集中するという戦略も有効</text>
</svg>
