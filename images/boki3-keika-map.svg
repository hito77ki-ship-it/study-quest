<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="420" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <rect x="60" y="12" width="640" height="36" fill="#FEF3C7" rx="8"/>
  <text x="380" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1A202C">経過勘定（けいかかんじょう）4パターン——発生主義の決算整理</text>

  <!-- タイムライン -->
  <line x1="60" y1="82" x2="700" y2="82" stroke="#D1D5DB" stroke-width="2"/>
  <text x="60" y="76" text-anchor="middle" font-size="10" fill="#9CA3AF">期首</text>
  <text x="380" y="76" text-anchor="middle" font-size="10" fill="#B91C1C">決算日 ←</text>
  <line x1="380" y1="60" x2="380" y2="280" stroke="#FCA5A5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="700" y="76" text-anchor="middle" font-size="10" fill="#9CA3AF">翌期</text>

  <!-- ── 上段：費用の2パターン ── -->
  <!-- A: 前払費用 -->
  <rect x="20" y="96" width="340" height="82" fill="#EFF6FF" rx="8" stroke="#93C5FD" stroke-width="1"/>
  <text x="190" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">A. 前払費用（まえばらいひよう）</text>
  <!-- 当期分バー -->
  <rect x="30" y="126" width="166" height="22" fill="#3B82F6" rx="4"/>
  <text x="113" y="141" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">当期分の費用</text>
  <!-- 前払分バー -->
  <rect x="200" y="126" width="150" height="22" fill="#BFDBFE" rx="4"/>
  <text x="275" y="141" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">→ 前払費用（資産）</text>
  <!-- 支払時点マーク -->
  <circle cx="30" cy="137" r="5" fill="#1D4ED8"/>
  <text x="60" y="168" font-size="10" fill="#374151">支払済み分のうち、翌期以降に対応する部分を</text>
  <text x="60" y="182" font-size="10" fill="#374151">「前払費用」（資産）として繰り延べる</text>

  <!-- B: 未払費用 -->
  <rect x="400" y="96" width="340" height="82" fill="#FFF5F5" rx="8" stroke="#FCA5A5" stroke-width="1"/>
  <text x="570" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#B91C1C">B. 未払費用（みばらいひよう）</text>
  <!-- 発生済み分バー -->
  <rect x="410" y="126" width="166" height="22" fill="#EF4444" rx="4"/>
  <text x="493" y="141" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">発生済みの費用</text>
  <!-- 未払分バー -->
  <rect x="580" y="126" width="150" height="22" fill="#FEE2E2" rx="4" stroke="#FCA5A5" stroke-width="1"/>
  <text x="655" y="141" text-anchor="middle" font-size="10" fill="#9B2C2C">（↑は同じ分）</text>
  <text x="440" y="168" font-size="10" fill="#374151">当期分の費用がすでに発生しているが</text>
  <text x="440" y="182" font-size="10" fill="#374151">まだ支払っていない → 「未払費用」（負債）を計上</text>

  <!-- ── 下段：収益の2パターン ── -->
  <!-- C: 前受収益 -->
  <rect x="20" y="194" width="340" height="82" fill="#D1FAE5" rx="8" stroke="#6EE7B7" stroke-width="1"/>
  <text x="190" y="214" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">C. 前受収益（まえうけしゅうえき）</text>
  <!-- 当期分バー -->
  <rect x="30" y="224" width="166" height="22" fill="#059669" rx="4"/>
  <text x="113" y="239" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">当期分の収益</text>
  <!-- 前受分バー -->
  <rect x="200" y="224" width="150" height="22" fill="#A7F3D0" rx="4"/>
  <text x="275" y="239" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">→ 前受収益（負債）</text>
  <text x="60" y="266" font-size="10" fill="#374151">受取済み分のうち、翌期分に相当する部分を</text>
  <text x="60" y="280" font-size="10" fill="#374151">「前受収益」（負債）として繰り延べる</text>

  <!-- D: 未収収益 -->
  <rect x="400" y="194" width="340" height="82" fill="#FEF3C7" rx="8" stroke="#FCD34D" stroke-width="1"/>
  <text x="570" y="214" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">D. 未収収益（みしゅうしゅうえき）</text>
  <!-- 発生済みバー -->
  <rect x="410" y="224" width="166" height="22" fill="#D97706" rx="4"/>
  <text x="493" y="239" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">発生済みの収益</text>
  <!-- 未収分バー -->
  <rect x="580" y="224" width="150" height="22" fill="#FEF9C3" rx="4" stroke="#FCD34D" stroke-width="1"/>
  <text x="655" y="239" text-anchor="middle" font-size="10" fill="#D97706">（↑は同じ分）</text>
  <text x="440" y="266" font-size="10" fill="#374151">当期分の収益がすでに発生しているが</text>
  <text x="440" y="280" font-size="10" fill="#374151">まだ受け取っていない → 「未収収益」（資産）を計上</text>

  <!-- ── 4パターンの一覧表 ── -->
  <rect x="20" y="290" width="720" height="118" fill="#fff" rx="10" stroke="#E2E8F0" stroke-width="1"/>
  <text x="380" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#1A202C">📋 4パターン早見表</text>

  <!-- ヘッダー -->
  <rect x="30" y="320" width="700" height="24" fill="#F3F4F6" rx="4"/>
  <text x="160" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">勘定科目</text>
  <text x="350" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">分類</text>
  <text x="530" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">発生のタイミング</text>

  <text x="160" y="359" text-anchor="middle" font-size="11" fill="#1D4ED8">A. 前払費用</text>
  <text x="350" y="359" text-anchor="middle" font-size="11" fill="#374151">資産（翌期の費用を先払い）</text>
  <text x="530" y="359" text-anchor="middle" font-size="11" fill="#374151">支払日が当期・費用は翌期に対応</text>

  <rect x="30" y="365" width="700" height="1" fill="#E5E7EB"/>

  <text x="160" y="381" text-anchor="middle" font-size="11" fill="#B91C1C">B. 未払費用</text>
  <text x="350" y="381" text-anchor="middle" font-size="11" fill="#374151">負債（当期費用がまだ未払い）</text>
  <text x="530" y="381" text-anchor="middle" font-size="11" fill="#374151">費用発生は当期・支払は翌期</text>

  <rect x="30" y="387" width="700" height="1" fill="#E5E7EB"/>

  <text x="160" y="403" text-anchor="middle" font-size="11" fill="#065F46">C. 前受収益</text>
  <text x="350" y="403" text-anchor="middle" font-size="11" fill="#374151">負債（翌期の収益を先受け）</text>
  <text x="530" y="403" text-anchor="middle" font-size="11" fill="#374151">受取日が当期・収益は翌期に対応</text>
</svg>
