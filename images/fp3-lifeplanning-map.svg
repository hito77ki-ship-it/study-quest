<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">FP3級 ライフプランニング——6つの係数と年金3階建て</text>

  <!-- 6つの係数 -->
  <text x="380" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">頻出！6つの係数——「何を求めるか」で使い分ける</text>

  <rect x="20" y="68" width="226" height="64" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="133" y="86" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">終価係数</text>
  <text x="133" y="102" text-anchor="middle" font-size="10" fill="#374151">現在の元本 → 将来いくら？</text>
  <text x="133" y="118" text-anchor="middle" font-size="10" fill="#64748B">例：100万円を5年運用すると？</text>

  <rect x="267" y="68" width="226" height="64" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="380" y="86" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">現価係数</text>
  <text x="380" y="102" text-anchor="middle" font-size="10" fill="#374151">将来の金額 → 現在いくら必要？</text>
  <text x="380" y="118" text-anchor="middle" font-size="10" fill="#64748B">例：5年後の500万を準備するには？</text>

  <rect x="514" y="68" width="226" height="64" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="627" y="86" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">年金終価係数</text>
  <text x="627" y="102" text-anchor="middle" font-size="10" fill="#374151">毎年積立 → 将来いくらに？</text>
  <text x="627" y="118" text-anchor="middle" font-size="10" fill="#64748B">例：毎年10万を5年積立すると？</text>

  <rect x="20" y="142" width="226" height="64" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="133" y="160" text-anchor="middle" font-size="10.5" font-weight="700" fill="#713F12">減債基金係数</text>
  <text x="133" y="176" text-anchor="middle" font-size="10" fill="#374151">将来の目標額 → 毎年いくら積立？</text>
  <text x="133" y="192" text-anchor="middle" font-size="10" fill="#64748B">例：5年後500万のために毎年いくら？</text>

  <rect x="267" y="142" width="226" height="64" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="380" y="160" text-anchor="middle" font-size="10.5" font-weight="700" fill="#713F12">年金現価係数</text>
  <text x="380" y="176" text-anchor="middle" font-size="10" fill="#374151">毎年受取額 → 元本いくら必要？</text>
  <text x="380" y="192" text-anchor="middle" font-size="10" fill="#64748B">例：毎年100万受け取るには元本は？</text>

  <rect x="514" y="142" width="226" height="64" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="627" y="160" text-anchor="middle" font-size="10.5" font-weight="700" fill="#713F12">資本回収係数</text>
  <text x="627" y="176" text-anchor="middle" font-size="10" fill="#374151">元本 → 毎年いくら受け取れる？</text>
  <text x="627" y="192" text-anchor="middle" font-size="10" fill="#64748B">例：住宅ローンの毎年返済額は？</text>

  <!-- 年金3階建て -->
  <text x="380" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">公的年金——3階建て構造</text>

  <!-- 3F -->
  <rect x="200" y="238" width="360" height="36" rx="6" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="380" y="254" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5B21B6">3階：企業年金・iDeCo（任意加入）</text>
  <text x="380" y="268" text-anchor="middle" font-size="9.5" fill="#64748B">確定給付年金・確定拠出年金（DC）など</text>

  <!-- 2F -->
  <rect x="140" y="278" width="480" height="36" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="380" y="294" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">2階：厚生年金（会社員・公務員）</text>
  <text x="380" y="308" text-anchor="middle" font-size="9.5" fill="#64748B">報酬比例部分 / 国民年金の上乗せ</text>

  <!-- 1F -->
  <rect x="80" y="318" width="600" height="36" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="380" y="334" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">1階：国民年金（基礎年金）——全員加入</text>
  <text x="380" y="348" text-anchor="middle" font-size="9.5" fill="#64748B">20歳〜60歳の全国民 / 満額：月約67,000円（2025年度）</text>

  <!-- Bottom hint -->
  <rect x="20" y="364" width="720" height="24" rx="5" fill="#F1F5F9"/>
  <text x="380" y="380" text-anchor="middle" font-size="10.5" fill="#475569">💡 国民年金は全員・厚生年金は会社員追加・企業年金は任意。3階建て全部もらえるのは会社員で企業年金ありの人。</text>
</svg>
