<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 970" width="360" height="970">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="970" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">製造間接費——予定配賦の仕組み</text>
  <text x="180" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">と配賦差異の分析</text>

  <rect x="16" y="60" width="328" height="86" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="80" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">直接費（製品に直接紐づく）</text>
  <text x="180" y="98" text-anchor="middle" font-size="10.5" fill="#374151">直接材料費・直接労務費・直接経費</text>
  <text x="180" y="114" text-anchor="middle" font-size="10" fill="#64748B">→ 製品ごとに賦課（指図書に直接計上）</text>
  <text x="180" y="130" text-anchor="middle" font-size="10" fill="#64748B">製品Aのコストと1対1対応</text>

  <rect x="16" y="154" width="328" height="86" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="180" y="174" text-anchor="middle" font-size="11.5" font-weight="700" fill="#DC2626">間接費（複数製品に共通）</text>
  <text x="180" y="192" text-anchor="middle" font-size="10.5" fill="#374151">間接材料費・間接労務費・間接経費</text>
  <text x="180" y="208" text-anchor="middle" font-size="10" fill="#64748B">→ 配賦基準で各製品に按分</text>
  <text x="180" y="224" text-anchor="middle" font-size="10" fill="#64748B">電力・修繕・減価償却費など全体で発生</text>

  <text x="180" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">予定配賦の流れ</text>
  <text x="180" y="282" text-anchor="middle" font-size="10.5" fill="#64748B">（実際配賦の落とし穴を避ける）</text>

  <rect x="16" y="298" width="328" height="80" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">① 年度始めに決定</text>
  <text x="180" y="336" text-anchor="middle" font-size="10.5" fill="#374151">予定配賦率＝年間予算額</text>
  <text x="180" y="352" text-anchor="middle" font-size="10.5" fill="#374151">÷年間予定操業度</text>

  <path d="M180,382 L180,398 M172,390 L180,398 L188,390" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="16" y="406" width="328" height="80" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="180" y="426" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">② 毎月の配賦計算</text>
  <text x="180" y="444" text-anchor="middle" font-size="10.5" fill="#374151">予定配賦額＝予定配賦率</text>
  <text x="180" y="460" text-anchor="middle" font-size="10.5" fill="#374151">×実際操業度</text>

  <path d="M180,490 L180,506 M172,498 L180,506 L188,498" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="16" y="514" width="328" height="80" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="180" y="534" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">③ 期末に差異確認</text>
  <text x="180" y="552" text-anchor="middle" font-size="10.5" fill="#374151">配賦差異＝実際発生額</text>
  <text x="180" y="568" text-anchor="middle" font-size="10.5" fill="#374151">－予定配賦額</text>

  <path d="M180,598 L180,614 M172,606 L180,614 L188,606" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="16" y="622" width="328" height="60" rx="8" fill="#1E293B"/>
  <text x="180" y="646" text-anchor="middle" font-size="11.5" font-weight="700" fill="#F8FAFC">配賦差異を売上原価等へ</text>
  <text x="180" y="664" text-anchor="middle" font-size="11.5" fill="#94A3B8">按分・振替</text>

  <text x="180" y="714" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">配賦差異の判定（T字勘定で考える）</text>

  <rect x="16" y="730" width="328" height="106" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="180" y="752" text-anchor="middle" font-size="11.5" font-weight="700" fill="#DC2626">不利差異（借方差異）</text>
  <text x="180" y="772" text-anchor="middle" font-size="10.5" fill="#374151">実際発生額 ＞ 予定配賦額</text>
  <text x="180" y="790" text-anchor="middle" font-size="10.5" fill="#374151">想定より多くコストがかかった</text>
  <text x="180" y="808" text-anchor="middle" font-size="10" fill="#DC2626">製造間接費配賦差異（借方）= 損失計上</text>
  <text x="180" y="824" text-anchor="middle" font-size="10" fill="#DC2626"> </text>

  <rect x="16" y="846" width="328" height="106" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="868" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">有利差異（貸方差異）</text>
  <text x="180" y="888" text-anchor="middle" font-size="10.5" fill="#374151">実際発生額 ＜ 予定配賦額</text>
  <text x="180" y="906" text-anchor="middle" font-size="10.5" fill="#374151">想定より少ないコストで済んだ</text>
  <text x="180" y="924" text-anchor="middle" font-size="10" fill="#166534">製造間接費配賦差異（貸方）= 利益計上</text>
</svg>
