<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1260" width="360" height="1260" role="img" aria-labelledby="title desc">
  <title id="title">TOEIC 730点突破 戦略マップ（モバイル版）</title>
  <desc id="desc">730点突破に立ちはだかる3つの壁（Part3/4・Part5/6・Part7）の目標正答率と、リーディング75分の時間配分を縦に並べて示す図解</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1260" rx="16" fill="#FFFFFF"/>

  <text x="180" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">TOEIC 730点突破 戦略マップ</text>
  <text x="180" y="48" text-anchor="middle" font-size="9.5" fill="#718096">3つの壁の防衛線＆75分タイムライン</text>

  <text x="180" y="76" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3B5BDB">① 730点突破に立ちはだかる3つの壁</text>

  <!-- Column 1: Part3/4 -->
  <rect x="20" y="92" width="320" height="150" rx="10" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="180" y="122" text-anchor="middle" font-size="26">🎧</text>
  <text x="180" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">Part3/4 長文（意図問題）</text>
  <text x="180" y="164" text-anchor="middle" font-size="11" fill="#1565C0">目標正答率：80%（69問）</text>
  <line x1="40" y1="176" x2="320" y2="176" stroke="#BBDEFB" stroke-width="1"/>
  <text x="180" y="198" text-anchor="middle" font-size="10.5" fill="#1565C0">先読み×意図問題対策で</text>
  <text x="180" y="216" text-anchor="middle" font-size="10.5" fill="#1565C0">防衛ラインを死守する</text>

  <!-- Column 2: Part5/6 -->
  <rect x="20" y="256" width="320" height="150" rx="10" fill="#F3E8FD" stroke="#CBA6F7" stroke-width="1.5"/>
  <text x="180" y="286" text-anchor="middle" font-size="26">📝</text>
  <text x="180" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">Part5/6 文法・語彙精度</text>
  <text x="180" y="328" text-anchor="middle" font-size="11" fill="#6D28D9">目標正答率：90%（46問）</text>
  <line x1="40" y1="340" x2="320" y2="340" stroke="#E4D2FB" stroke-width="1"/>
  <text x="180" y="362" text-anchor="middle" font-size="10.5" fill="#6D28D9">1問20秒の瞬殺精度が</text>
  <text x="180" y="380" text-anchor="middle" font-size="10.5" fill="#6D28D9">スコアの生命線になる</text>

  <!-- Column 3: Part7 -->
  <rect x="20" y="420" width="320" height="150" rx="10" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1.5"/>
  <text x="180" y="450" text-anchor="middle" font-size="26">📚</text>
  <text x="180" y="474" text-anchor="middle" font-size="12" font-weight="700" fill="#8A4B0B">Part7 長文読解スピード</text>
  <text x="180" y="492" text-anchor="middle" font-size="11" fill="#B45309">目標正答率：70%（54問）</text>
  <line x1="40" y1="504" x2="320" y2="504" stroke="#FFE0B2" stroke-width="1"/>
  <text x="180" y="526" text-anchor="middle" font-size="10.5" fill="#B45309">Skim&amp;Scanで時間内に</text>
  <text x="180" y="544" text-anchor="middle" font-size="10.5" fill="#B45309">完走することが最優先</text>

  <!-- Comparison bars -->
  <text x="20" y="590" font-size="10.5" fill="#5A7BAF">Part3/4 目標80%</text>
  <rect x="20" y="596" width="320" height="16" rx="8" fill="#E9EDF5" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="20" y="596" width="256" height="16" rx="8" fill="#1565C0"/>

  <text x="20" y="632" font-size="10.5" fill="#8B6FC7">Part5/6 目標90%</text>
  <rect x="20" y="638" width="320" height="16" rx="8" fill="#E9EDF5" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="20" y="638" width="288" height="16" rx="8" fill="#6D28D9"/>

  <text x="20" y="674" font-size="10.5" fill="#C08A4E">Part7 目標70%</text>
  <rect x="20" y="680" width="320" height="16" rx="8" fill="#E9EDF5" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="20" y="680" width="224" height="16" rx="8" fill="#B45309"/>

  <text x="180" y="726" text-anchor="middle" font-size="10.5" fill="#3B5BDB">3つの壁はどれも「防衛ライン」</text>
  <text x="180" y="744" text-anchor="middle" font-size="10.5" fill="#3B5BDB">1つでも大きく割り込むと730点には届かない</text>

  <!-- Panel B: timeline -->
  <text x="180" y="784" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">② リーディング75分の秒単位タイムライン</text>
  <text x="180" y="802" text-anchor="middle" font-size="9.5" fill="#C08A4E">Part5を瞬殺し、浮いた時間をマルチパッセージへ</text>

  <rect x="20" y="818" width="320" height="52" rx="10" fill="#BBDEFB" stroke="#90CAF9" stroke-width="1"/>
  <text x="180" y="840" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">Part5：10分</text>
  <text x="180" y="858" text-anchor="middle" font-size="9.5" fill="#0D47A1">0分〜10分</text>

  <rect x="20" y="878" width="320" height="52" rx="10" fill="#D8C4F5" stroke="#CBA6F7" stroke-width="1"/>
  <text x="180" y="900" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">Part6：8分</text>
  <text x="180" y="918" text-anchor="middle" font-size="9.5" fill="#5B21B6">10分〜18分</text>

  <rect x="20" y="938" width="320" height="52" rx="10" fill="#C8E6C9" stroke="#A5D6A7" stroke-width="1"/>
  <text x="180" y="960" text-anchor="middle" font-size="12" font-weight="700" fill="#1B5E20">Part7 単一：20分</text>
  <text x="180" y="978" text-anchor="middle" font-size="9.5" fill="#1B5E20">18分〜38分</text>

  <rect x="20" y="998" width="320" height="60" rx="10" fill="#8BC98F" stroke="#5FA36A" stroke-width="1"/>
  <text x="180" y="1022" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Part7 複合（ダブル・トリプル）：37分</text>
  <text x="180" y="1042" text-anchor="middle" font-size="9.5" fill="#fff">38分〜75分</text>

  <rect x="90" y="1074" width="180" height="30" rx="15" fill="#2E7D32"/>
  <text x="180" y="1094" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">浮いた時間を注入！</text>

  <!-- Bottom callout -->
  <rect x="20" y="1122" width="320" height="110" rx="12" fill="#FFF6E9" stroke="#FFD9A0" stroke-width="1"/>
  <text x="180" y="1150" text-anchor="middle" font-size="12" font-weight="700" fill="#8A4B0B">だから精読より『時間配分』で勝つ。</text>
  <text x="180" y="1174" text-anchor="middle" font-size="10.5" fill="#8A4B0B">Part5を1問20秒で瞬殺し、浮いた</text>
  <text x="180" y="1192" text-anchor="middle" font-size="10.5" fill="#8A4B0B">時間をマルチパッセージの複合問題へ</text>
  <text x="180" y="1210" text-anchor="middle" font-size="10.5" fill="#8A4B0B">回そう！</text>
</svg>
