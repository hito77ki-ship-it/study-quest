<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 940" width="360" height="940">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="940" rx="16" fill="#F8FAFC"/>
  <text x="180" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">社労士 vs 中小企業診断士</text>
  <text x="180" y="48" text-anchor="middle" font-size="11" fill="#64748B">基本情報・強み・目的別おすすめ比較</text>

  <circle cx="60" cy="66" r="5" fill="#EA580C"/>
  <text x="72" y="70" font-size="10.5" fill="#EA580C">社労士</text>
  <circle cx="230" cy="66" r="5" fill="#0369A1"/>
  <text x="242" y="70" font-size="10.5" fill="#0369A1">中小企業診断士</text>

  <!-- 試験回数・形式 -->
  <rect x="16" y="86" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="106" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">試験回数・形式</text>
  <rect x="28" y="116" width="304" height="26" rx="6" fill="#FFEDD5"/>
  <text x="36" y="134" font-size="11" fill="#9A3412">社労士：年1回・8月（1段階）</text>
  <rect x="28" y="146" width="304" height="26" rx="6" fill="#E0F2FE"/>
  <text x="36" y="164" font-size="11" fill="#0369A1">診断士：年1回・1次(8月)＋2次(10月)</text>

  <!-- 合格率 -->
  <rect x="16" y="190" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="210" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">合格率（最終）</text>
  <rect x="28" y="220" width="304" height="26" rx="6" fill="#FFEDD5"/>
  <text x="36" y="238" font-size="11" fill="#9A3412">社労士：6〜8%</text>
  <rect x="28" y="250" width="304" height="26" rx="6" fill="#E0F2FE"/>
  <text x="36" y="268" font-size="11" fill="#0369A1">診断士：約4〜5%（1次30%×2次20%）</text>

  <!-- 必要勉強時間 -->
  <rect x="16" y="294" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="314" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">必要勉強時間</text>
  <rect x="28" y="324" width="304" height="26" rx="6" fill="#FFEDD5"/>
  <text x="36" y="342" font-size="11" fill="#9A3412">社労士：500〜800時間</text>
  <rect x="28" y="354" width="304" height="26" rx="6" fill="#E0F2FE"/>
  <text x="36" y="372" font-size="11" fill="#0369A1">診断士：800〜1,200時間</text>

  <!-- 専門領域 -->
  <rect x="16" y="398" width="328" height="112" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="418" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">専門領域</text>
  <rect x="28" y="428" width="304" height="36" rx="6" fill="#FFEDD5"/>
  <text x="36" y="444" font-size="10.5" fill="#9A3412">社労士：労働法・社会保険の専門家</text>
  <text x="36" y="459" font-size="10" fill="#9A3412">法律に基づく手続き代行が独占業務</text>
  <rect x="28" y="468" width="304" height="36" rx="6" fill="#E0F2FE"/>
  <text x="36" y="484" font-size="10.5" fill="#0369A1">診断士：経営全般のコンサルタント</text>
  <text x="36" y="499" font-size="10" fill="#0369A1">財務・戦略・マーケティング・IT</text>

  <!-- 活躍の場 -->
  <rect x="16" y="524" width="328" height="112" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="544" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">活躍の場</text>
  <rect x="28" y="554" width="304" height="36" rx="6" fill="#FED7AA"/>
  <text x="36" y="570" font-size="10.5" fill="#9A3412">社労士：人事・労務担当・社労士事務所</text>
  <text x="36" y="585" font-size="10" fill="#9A3412">独立開業・企業内社労士</text>
  <rect x="28" y="594" width="304" height="36" rx="6" fill="#BAE6FD"/>
  <text x="36" y="610" font-size="10.5" fill="#0369A1">診断士：経営コンサル・金融機関・中小企業</text>
  <text x="36" y="625" font-size="10" fill="#0369A1">副業コンサル・独立開業</text>

  <!-- 向いている人 -->
  <rect x="16" y="650" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="670" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">向いている人</text>
  <rect x="28" y="680" width="304" height="26" rx="6" fill="#FFEDD5"/>
  <text x="36" y="698" font-size="10.5" fill="#9A3412">社労士：「人」の問題を法律で解決</text>
  <rect x="28" y="710" width="304" height="26" rx="6" fill="#E0F2FE"/>
  <text x="36" y="728" font-size="10.5" fill="#0369A1">診断士：「会社全体」の経営課題を解決</text>

  <!-- Bottom recommendation -->
  <rect x="16" y="762" width="328" height="130" rx="12" fill="#1E293B"/>
  <rect x="28" y="774" width="304" height="46" rx="8" fill="#EA580C"/>
  <text x="180" y="792" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">労務・人事・社会保険を</text>
  <text x="180" y="808" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">極めたい → 社労士</text>
  <rect x="28" y="828" width="304" height="46" rx="8" fill="#0369A1"/>
  <text x="180" y="846" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">経営全般のコンサルを</text>
  <text x="180" y="862" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">したい → 中小企業診断士</text>
</svg>
