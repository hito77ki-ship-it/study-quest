<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">減価償却——価値の目減りを毎年費用化する仕組み</text>

  <!-- example setup -->
  <rect x="30" y="52" width="700" height="36" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="380" y="68" text-anchor="middle" font-size="11" fill="#1E40AF">例）取得原価¥1,000,000 / 残存価値¥100,000 / 耐用年数5年 → 定額法</text>
  <text x="380" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">年間減価償却費 ＝（1,000,000 − 100,000）÷ 5 ＝ ¥180,000</text>
  <text x="720" y="100" text-anchor="end" font-size="9" fill="#64748B">（下のグラフの金額は千円単位）</text>

  <!-- Timeline axis -->
  <line x1="60" y1="160" x2="720" y2="160" stroke="#94A3B8" stroke-width="2"/>

  <!-- Year marker ticks (labels are drawn after the bars so they are never hidden behind them) -->
  <line x1="60" y1="152" x2="60" y2="168" stroke="#64748B" stroke-width="2"/>
  <line x1="185" y1="152" x2="185" y2="168" stroke="#64748B" stroke-width="1.5"/>
  <line x1="310" y1="152" x2="310" y2="168" stroke="#64748B" stroke-width="1.5"/>
  <line x1="435" y1="152" x2="435" y2="168" stroke="#64748B" stroke-width="1.5"/>
  <line x1="560" y1="152" x2="560" y2="168" stroke="#64748B" stroke-width="1.5"/>
  <line x1="685" y1="152" x2="685" y2="168" stroke="#64748B" stroke-width="2"/>

  <!-- Stacked bars (取得原価 = 帳簿価額 + 累計) -->
  <!-- bar heights proportional: 1,000,000 total, 180,000 per year -->
  <!-- 取得時: 全部が帳簿価額 -->
  <rect x="30" y="110" width="30" height="50" rx="3" fill="#3B82F6"/>
  <text x="45" y="106" text-anchor="middle" font-size="9" fill="#1D4ED8">¥1,000</text>
  <text x="45" y="118" text-anchor="middle" font-size="8" fill="#fff">帳簿価額</text>

  <!-- 1年目末 -->
  <rect x="155" y="119" width="30" height="41" rx="3" fill="#3B82F6"/>
  <rect x="155" y="110" width="30" height="9" rx="3" fill="#93C5FD"/>
  <text x="170" y="106" text-anchor="middle" font-size="9" fill="#1D4ED8">¥820</text>

  <!-- 2年目末 -->
  <rect x="280" y="128" width="30" height="32" rx="3" fill="#3B82F6"/>
  <rect x="280" y="110" width="30" height="18" rx="3" fill="#93C5FD"/>
  <text x="295" y="106" text-anchor="middle" font-size="9" fill="#1D4ED8">¥640</text>

  <!-- 3年目末 -->
  <rect x="405" y="137" width="30" height="23" rx="3" fill="#3B82F6"/>
  <rect x="405" y="110" width="30" height="27" rx="3" fill="#93C5FD"/>
  <text x="420" y="106" text-anchor="middle" font-size="9" fill="#1D4ED8">¥460</text>

  <!-- 4年目末 -->
  <rect x="530" y="146" width="30" height="14" rx="3" fill="#3B82F6"/>
  <rect x="530" y="110" width="30" height="36" rx="3" fill="#93C5FD"/>
  <text x="545" y="106" text-anchor="middle" font-size="9" fill="#1D4ED8">¥280</text>

  <!-- 5年目末: 残存¥100,000 -->
  <rect x="655" y="155" width="30" height="5" rx="2" fill="#3B82F6"/>
  <rect x="655" y="110" width="30" height="45" rx="3" fill="#93C5FD"/>
  <text x="670" y="106" text-anchor="middle" font-size="9" fill="#1D4ED8">¥100</text>

  <!-- Year marker labels (drawn after bars so they always stay visible on top) -->
  <text x="60" y="146" text-anchor="middle" font-size="10" fill="#475569">取得時</text>
  <text x="185" y="146" text-anchor="middle" font-size="10" fill="#475569">1年目末</text>
  <text x="310" y="146" text-anchor="middle" font-size="10" fill="#475569">2年目末</text>
  <text x="435" y="146" text-anchor="middle" font-size="10" fill="#475569">3年目末</text>
  <text x="560" y="146" text-anchor="middle" font-size="10" fill="#475569">4年目末</text>
  <text x="685" y="146" text-anchor="middle" font-size="10" fill="#475569">5年目末</text>

  <!-- legend -->
  <rect x="560" y="172" width="14" height="12" rx="2" fill="#3B82F6"/>
  <text x="578" y="183" font-size="10" fill="#374151">帳簿価額（残）</text>
  <rect x="650" y="172" width="14" height="12" rx="2" fill="#93C5FD"/>
  <text x="668" y="183" font-size="10" fill="#374151">減価償却累計額</text>

  <!-- annual fee label -->
  <text x="125" y="188" text-anchor="middle" font-size="9.5" fill="#EF4444">↑¥180,000</text>
  <text x="250" y="188" text-anchor="middle" font-size="9.5" fill="#EF4444">↑¥180,000</text>
  <text x="372" y="188" text-anchor="middle" font-size="9.5" fill="#EF4444">↑¥180,000</text>
  <text x="498" y="188" text-anchor="middle" font-size="9.5" fill="#EF4444">↑¥180,000</text>
  <text x="622" y="188" text-anchor="middle" font-size="9.5" fill="#EF4444">↑¥180,000</text>

  <!-- Bottom: 仕訳と間接法表示 -->
  <rect x="30" y="206" width="340" height="166" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="200" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">毎年の仕訳（間接控除法）</text>
  <rect x="50" y="234" width="300" height="32" rx="6" fill="#FEF3C7"/>
  <text x="200" y="249" text-anchor="middle" font-size="11" fill="#713F12">減価償却費 ¥180,000</text>
  <text x="200" y="265" text-anchor="middle" font-size="11" fill="#713F12">　　／ 減価償却累計額 ¥180,000</text>
  <text x="200" y="290" text-anchor="middle" font-size="11" fill="#92400E">「減価償却累計額」を使うのがポイント</text>
  <text x="200" y="308" text-anchor="middle" font-size="10.5" fill="#78350F">固定資産を直接減らさずに</text>
  <text x="200" y="324" text-anchor="middle" font-size="10.5" fill="#78350F">「取得原価」と「累計額」で別々に管理</text>
  <text x="200" y="345" text-anchor="middle" font-size="10" fill="#A16207">→ これをB/S上で控除表示する（間接法）</text>

  <rect x="394" y="206" width="336" height="166" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="562" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">B/S上の表示（間接控除法）</text>
  <rect x="414" y="234" width="296" height="90" rx="6" fill="#DCFCE7"/>
  <text x="562" y="254" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">【固定資産の部】</text>
  <text x="434" y="275" font-size="11" fill="#374151">建　物　　　　　1,000,000</text>
  <text x="434" y="295" font-size="11" fill="#374151">減価償却累計額   △360,000</text>
  <line x1="414" y1="302" x2="710" y2="302" stroke="#86EFAC" stroke-width="1"/>
  <text x="434" y="318" font-size="11" font-weight="700" fill="#166534">帳簿価額　　　     640,000</text>
  <text x="562" y="348" text-anchor="middle" font-size="10" fill="#15803D">（2年後の場合 ¥360,000 累計）</text>
  <text x="562" y="364" text-anchor="middle" font-size="10" fill="#15803D">取得原価 − 累計額 ＝ 帳簿価額</text>
</svg>
