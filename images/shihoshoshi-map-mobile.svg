<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 930" width="360" height="930">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="930" rx="16" fill="#F8FAFC"/>
  <text x="180" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">司法書士試験——11科目の出題比率と</text>
  <text x="180" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">攻略優先度マップ</text>

  <!-- 午前 -->
  <rect x="16" y="66" width="328" height="330" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="66" width="328" height="28" rx="10" fill="#3B82F6"/>
  <rect x="16" y="84" width="328" height="10" fill="#3B82F6"/>
  <text x="180" y="84" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">午前の部 択一式（35問）</text>

  <rect x="28" y="102" width="304" height="40" rx="6" fill="#DC2626"/>
  <text x="180" y="118" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">民法 20問 ★★★★★</text>
  <text x="180" y="134" text-anchor="middle" font-size="10" fill="#FEE2E2">総則・物権・債権・家族法 — 全科目の土台</text>

  <rect x="28" y="150" width="304" height="40" rx="6" fill="#EF4444"/>
  <text x="180" y="166" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">会社法 9問 ★★★★</text>
  <text x="180" y="182" text-anchor="middle" font-size="10" fill="#FEE2E2">機関設計・株式・設立・解散</text>

  <rect x="28" y="198" width="304" height="30" rx="6" fill="#FCA5A5"/>
  <text x="180" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#7F1D1D">憲法 3問 ★★</text>
  <text x="180" y="224" text-anchor="middle" font-size="9.5" fill="#7F1D1D">基本的人権・統治機構の基本</text>

  <rect x="28" y="236" width="304" height="30" rx="6" fill="#FCA5A5"/>
  <text x="180" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#7F1D1D">刑法 3問 ★★</text>
  <text x="180" y="262" text-anchor="middle" font-size="9.5" fill="#7F1D1D">犯罪成立要件・主要各論</text>

  <line x1="28" y1="276" x2="332" y2="276" stroke="#BFDBFE" stroke-width="1"/>
  <text x="180" y="294" text-anchor="middle" font-size="10.5" fill="#1E40AF">合格ライン：35問中 約22〜23問正解</text>
  <text x="180" y="312" text-anchor="middle" font-size="10.5" fill="#374151">民法を最初に固めること</text>
  <text x="180" y="330" text-anchor="middle" font-size="10.5" fill="#374151">会社法は民法の次に着手</text>
  <text x="180" y="348" text-anchor="middle" font-size="10.5" fill="#374151">憲法・刑法は後半に短期で仕上げ</text>

  <!-- 午後 -->
  <rect x="16" y="418" width="328" height="360" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="418" width="328" height="28" rx="10" fill="#22C55E"/>
  <rect x="16" y="436" width="328" height="10" fill="#22C55E"/>
  <text x="180" y="436" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">午後の部 択一式（35問）＋記述式（2問）</text>

  <rect x="28" y="454" width="304" height="40" rx="6" fill="#166534"/>
  <text x="180" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">不動産登記法 16問＋記述1問 ★★★★★</text>
  <text x="180" y="486" text-anchor="middle" font-size="10" fill="#DCFCE7">申請手続・添付情報・各種登記類型</text>

  <rect x="28" y="502" width="304" height="40" rx="6" fill="#22C55E"/>
  <text x="180" y="518" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">商業登記法 8問＋記述1問 ★★★★</text>
  <text x="180" y="534" text-anchor="middle" font-size="10" fill="#DCFCE7">会社法と連動した登記手続</text>

  <rect x="28" y="550" width="304" height="30" rx="6" fill="#86EFAC"/>
  <text x="180" y="564" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">民事訴訟法 5問 ★★★</text>
  <text x="180" y="576" text-anchor="middle" font-size="9.5" fill="#166534">訴訟手続・判決効力の基本</text>

  <rect x="28" y="588" width="304" height="40" rx="6" fill="#86EFAC"/>
  <text x="180" y="602" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">民事執行法・保全法・司法書士法</text>
  <text x="180" y="618" text-anchor="middle" font-size="9.5" fill="#166534">各2〜3問／基本論点のみ押さえる</text>

  <line x1="28" y1="634" x2="332" y2="634" stroke="#BBF7D0" stroke-width="1"/>
  <text x="180" y="652" text-anchor="middle" font-size="10.5" fill="#166534">合格ライン：35問中 約22〜23問正解</text>
  <text x="180" y="670" text-anchor="middle" font-size="10.5" fill="#374151">不動産登記法が最重要（記述含む）</text>
  <text x="180" y="688" text-anchor="middle" font-size="10.5" fill="#374151">商業登記法は会社法とセット学習</text>
  <text x="180" y="706" text-anchor="middle" font-size="10.5" fill="#374151">マイナー科目は全体後半で短期仕上げ</text>
  <text x="180" y="724" text-anchor="middle" font-size="10.5" fill="#374151"> </text>

  <!-- Bottom -->
  <rect x="16" y="800" width="328" height="42" rx="6" fill="#1E293B"/>
  <text x="180" y="818" text-anchor="middle" font-size="10" fill="#F8FAFC">攻略順：民法 → 不動産登記法 → 会社法 →</text>
  <text x="180" y="834" text-anchor="middle" font-size="10" fill="#F8FAFC">商業登記法 → 民事訴訟法 → マイナー科目</text>
  <rect x="16" y="852" width="328" height="60" rx="6" fill="#F1F5F9"/>
  <text x="180" y="874" text-anchor="middle" font-size="10" fill="#475569">💡 合格基準：午前・午後とも基準点クリア</text>
  <text x="180" y="892" text-anchor="middle" font-size="10" fill="#475569">＋記述式で足切り回避が必要（科目別足切りあり）</text>
</svg>
