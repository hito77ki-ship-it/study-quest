<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 390" width="760" height="390">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="390" rx="16" fill="#F8FAFC"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">ITパスポート試験 3分野の出題比率と攻略マップ</text>
  <text x="380" y="49" text-anchor="middle" font-size="11" fill="#94A3B8">出題数が多い分野から確実に得点源にするのが最短合格への近道</text>

  <!-- テクノロジ系（最重要） -->
  <text x="170" y="96" text-anchor="end" font-size="12.5" font-weight="700" fill="#166534">① テクノロジ系</text>
  <rect x="180" y="74" width="480" height="34" rx="8" fill="#BBF7D0" stroke="#4ADE80" stroke-width="2"/>
  <text x="668" y="96" font-size="11" font-weight="700" fill="#374151">45問</text>

  <!-- ストラテジ系 -->
  <text x="170" y="144" text-anchor="end" font-size="12.5" font-weight="700" fill="#1D4ED8">② ストラテジ系</text>
  <rect x="180" y="122" width="373" height="34" rx="8" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="561" y="144" font-size="11" font-weight="700" fill="#374151">35問</text>

  <!-- マネジメント系 -->
  <text x="170" y="192" text-anchor="end" font-size="12.5" font-weight="700" fill="#475569">③ マネジメント系</text>
  <rect x="180" y="170" width="213" height="34" rx="8" fill="#E2E8F0" stroke="#94A3B8" stroke-width="2"/>
  <text x="401" y="192" font-size="11" font-weight="700" fill="#374151">20問</text>

  <!-- 合格基準と攻略の鉄則 -->
  <rect x="20" y="224" width="720" height="104" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="380" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">🎯 合格基準と攻略の鉄則</text>
  <text x="380" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A">合格基準：総合600点以上 ＆ 各分野300点以上（1,000点満点）</text>
  <text x="380" y="294" text-anchor="middle" font-size="10.5" fill="#374151">テクノロジ系＋ストラテジ系で全100問中80問（8割）を占める</text>
  <text x="380" y="313" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">→ この2分野を重点的に固めるのが最短合格ルート</text>

  <!-- 凡例 -->
  <rect x="150" y="352" width="14" height="14" rx="3" fill="#BBF7D0" stroke="#4ADE80"/>
  <text x="170" y="363" font-size="10" fill="#374151">最重要</text>
  <rect x="330" y="352" width="14" height="14" rx="3" fill="#BFDBFE" stroke="#60A5FA"/>
  <text x="350" y="363" font-size="10" fill="#374151">優先度：高</text>
  <rect x="520" y="352" width="14" height="14" rx="3" fill="#E2E8F0" stroke="#94A3B8"/>
  <text x="540" y="363" font-size="10" fill="#374151">優先度：中</text>
</svg>
