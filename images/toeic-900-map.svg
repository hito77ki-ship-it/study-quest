<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="440" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">TOEIC 900点レベルの英語力と学習戦略</text>
  <!-- CEFR panel (top) -->
  <rect x="20" y="52" width="720" height="60" rx="8" fill="#1E1B4B"/>
  <text x="380" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#A5B4FC">CEFR レベル対応</text>
  <!-- CEFR bar -->
  <rect x="40" y="84" width="116" height="20" rx="3" fill="#94A3B8"/>
  <text x="98" y="98" text-anchor="middle" font-size="10" fill="#fff">A1〜A2 / 〜350点</text>
  <rect x="162" y="84" width="116" height="20" rx="3" fill="#22C55E"/>
  <text x="220" y="98" text-anchor="middle" font-size="10" fill="#fff">B1 / 〜600点</text>
  <rect x="284" y="84" width="116" height="20" rx="3" fill="#3B82F6"/>
  <text x="342" y="98" text-anchor="middle" font-size="10" fill="#fff">B2 / 〜730点</text>
  <rect x="406" y="84" width="116" height="20" rx="3" fill="#8B5CF6"/>
  <text x="464" y="98" text-anchor="middle" font-size="10" fill="#fff">B2+ / 〜860点</text>
  <rect x="528" y="84" width="116" height="20" rx="3" fill="#EC4899"/>
  <text x="586" y="98" text-anchor="middle" font-size="10" fill="#fff">C1 / 900点以上</text>
  <rect x="650" y="84" width="100" height="20" rx="3" fill="#F59E0B"/>
  <text x="700" y="98" text-anchor="middle" font-size="10" fill="#fff">C2 / 満点990</text>
  <!-- Bottom 3 panels -->
  <!-- Panel 1: C1の英語力 -->
  <rect x="20" y="126" width="228" height="294" rx="8" fill="#FDF4FF"/>
  <rect x="20" y="126" width="228" height="34" rx="8" fill="#9333EA"/>
  <text x="134" y="149" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">C1レベルの英語力とは</text>
  <text x="134" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#7E22CE">概ね達成している能力</text>
  <text x="134" y="200" text-anchor="middle" font-size="10" fill="#374151">・ネイティブとのビジネス会話</text>
  <text x="134" y="218" text-anchor="middle" font-size="10" fill="#374151">・英語でのプレゼン・交渉</text>
  <text x="134" y="236" text-anchor="middle" font-size="10" fill="#374151">・技術的な英文書類の読解</text>
  <text x="134" y="254" text-anchor="middle" font-size="10" fill="#374151">・英語ニュースを速読できる</text>
  <line x1="40" y1="268" x2="228" y2="268" stroke="#E9D5FF" stroke-width="1"/>
  <text x="134" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="#7E22CE">900点と990点の差</text>
  <text x="134" y="308" text-anchor="middle" font-size="10" fill="#374151">いずれもC1圏内だが990点は</text>
  <text x="134" y="324" text-anchor="middle" font-size="10" fill="#374151">ほぼ完全無欠の理解度が必要</text>
  <text x="134" y="344" text-anchor="middle" font-size="10" fill="#374151">推測・含意の読み取りまで</text>
  <text x="134" y="360" text-anchor="middle" font-size="10" fill="#374151">ミスなくこなせる実力が要る</text>
  <rect x="40" y="384" width="188" height="28" rx="6" fill="#E9D5FF"/>
  <text x="134" y="403" text-anchor="middle" font-size="10" font-weight="700" fill="#7E22CE">990点は上位1〜2%の壁</text>
  <!-- Panel 2: 900点達成の3要素 -->
  <rect x="264" y="126" width="232" height="294" rx="8" fill="#EFF6FF"/>
  <rect x="264" y="126" width="232" height="34" rx="8" fill="#2563EB"/>
  <text x="380" y="149" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">900点達成の3要素</text>
  <!-- 要素1 -->
  <rect x="278" y="170" width="204" height="70" rx="6" fill="#DBEAFE"/>
  <text x="380" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">① 高度語彙・イディオム</text>
  <text x="380" y="210" text-anchor="middle" font-size="10" fill="#374151">ビジネス専門語彙4,000語以上</text>
  <text x="380" y="228" text-anchor="middle" font-size="10" fill="#374151">文脈推測力と言い換え認識力</text>
  <!-- 要素2 -->
  <rect x="278" y="250" width="204" height="70" rx="6" fill="#DBEAFE"/>
  <text x="380" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">② 推論・含意の読み取り</text>
  <text x="380" y="290" text-anchor="middle" font-size="10" fill="#374151">直接書かれていない情報を</text>
  <text x="380" y="308" text-anchor="middle" font-size="10" fill="#374151">文脈・トーンから判断できる</text>
  <!-- 要素3 -->
  <rect x="278" y="330" width="204" height="70" rx="6" fill="#DBEAFE"/>
  <text x="380" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">③ 処理速度の余裕</text>
  <text x="380" y="370" text-anchor="middle" font-size="10" fill="#374151">Part7を見直し時間付きで</text>
  <text x="380" y="388" text-anchor="middle" font-size="10" fill="#374151">完走できる速読力が必要</text>
  <!-- Panel 3: 長期学習戦略 -->
  <rect x="512" y="126" width="228" height="294" rx="8" fill="#F0FDF4"/>
  <rect x="512" y="126" width="228" height="34" rx="8" fill="#15803D"/>
  <text x="626" y="149" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">900点への長期学習戦略</text>
  <text x="626" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#14532D">勉強時間の目安</text>
  <rect x="528" y="188" width="196" height="28" rx="5" fill="#DCFCE7"/>
  <text x="626" y="207" text-anchor="middle" font-size="10" fill="#374151">600点から → 約600時間</text>
  <rect x="528" y="222" width="196" height="28" rx="5" fill="#DCFCE7"/>
  <text x="626" y="241" text-anchor="middle" font-size="10" fill="#374151">730点から → 約300時間</text>
  <rect x="528" y="256" width="196" height="28" rx="5" fill="#DCFCE7"/>
  <text x="626" y="275" text-anchor="middle" font-size="10" fill="#374151">860点から → 約150時間</text>
  <line x1="528" y1="298" x2="720" y2="298" stroke="#BBF7D0" stroke-width="1"/>
  <text x="626" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#14532D">毎日の習慣化</text>
  <text x="626" y="338" text-anchor="middle" font-size="10" fill="#374151">・英語ニュース30分/日</text>
  <text x="626" y="356" text-anchor="middle" font-size="10" fill="#374151">・ディクテーション15分/日</text>
  <text x="626" y="374" text-anchor="middle" font-size="10" fill="#374151">・模試1回/2週</text>
  <rect x="528" y="390" width="196" height="24" rx="6" fill="#BBF7D0"/>
  <text x="626" y="407" text-anchor="middle" font-size="10" font-weight="700" fill="#14532D">継続こそが唯一の近道</text>
</svg>
