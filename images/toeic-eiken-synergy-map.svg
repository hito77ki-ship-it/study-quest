<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="460" rx="12" fill="#FAFDF6"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">英検2級 × TOEIC 知識ドッキング・シナジーマップ</text>
  <text x="380" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">英検で鍛えた語彙・文法・4技能の基礎体力が、TOEICのスコアメイクにそのまま流れ込む</text>

  <!-- 左: 英検2級の武器庫 -->
  <rect x="20" y="62" width="270" height="360" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="20" y="62" width="270" height="34" rx="10" fill="#3B82F6"/>
  <rect x="20" y="86" width="270" height="10" fill="#3B82F6"/>
  <text x="155" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🗡 英検2級で鍛えた武器</text>

  <rect x="36" y="110" width="238" height="50" rx="8" fill="#DBEAFE"/>
  <text x="46" y="130" font-size="11" font-weight="700" fill="#1E40AF">約5,000語の語彙の土台</text>
  <text x="46" y="146" font-size="9.5" fill="#1E3A8A">「でる順パス単」で固めた基礎ボキャブラリー</text>

  <rect x="36" y="168" width="238" height="50" rx="8" fill="#DBEAFE"/>
  <text x="46" y="188" font-size="11" font-weight="700" fill="#1E40AF">高校文法の正確な運用力</text>
  <text x="46" y="204" font-size="9.5" fill="#1E3A8A">関係代名詞・時制・分詞構文の実戦経験</text>

  <rect x="36" y="226" width="238" height="50" rx="8" fill="#DBEAFE"/>
  <text x="46" y="246" font-size="11" font-weight="700" fill="#1E40AF">長文読解・リスニングの型</text>
  <text x="46" y="262" font-size="9.5" fill="#1E3A8A">設問先読み・トピックセンテンス把握の習慣</text>

  <rect x="36" y="284" width="238" height="66" rx="8" fill="#BFDBFE"/>
  <text x="155" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A">⚔ 最大のボス戦</text>
  <text x="155" y="320" text-anchor="middle" font-size="10" fill="#1E40AF">英作文・二次面接（W・S）</text>
  <text x="155" y="336" text-anchor="middle" font-size="9" fill="#1E3A8A">4技能を鍛えた経験が地力に変わる</text>

  <rect x="36" y="360" width="238" height="46" rx="8" fill="#1E3A8A"/>
  <text x="155" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#93C5FD">身につく力</text>
  <text x="155" y="396" text-anchor="middle" font-size="9.5" fill="#DBEAFE">英語を正確に処理する「基礎体力」</text>

  <!-- 中央矢印 -->
  <line x1="292" y1="240" x2="330" y2="240" stroke="#8CC63F" stroke-width="3" stroke-dasharray="6,3"/>
  <polygon points="334,240 324,233 324,247" fill="#8CC63F"/>
  <text x="313" y="222" text-anchor="middle" font-size="10" font-weight="700" fill="#276749">ドッキング</text>

  <!-- 右: TOEICの3分野 -->
  <rect x="336" y="62" width="404" height="360" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="336" y="62" width="404" height="34" rx="10" fill="#22C55E"/>
  <rect x="336" y="86" width="404" height="10" fill="#22C55E"/>
  <text x="538" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🛡 TOEICで無双する3分野</text>

  <rect x="352" y="110" width="372" height="90" rx="8" fill="#DCFCE7"/>
  <text x="362" y="130" font-size="11.5" font-weight="700" fill="#166534">① Listening（Part1〜4）</text>
  <text x="362" y="148" font-size="9.5" fill="#374151">英検で鍛えた基礎文法・語彙の音声処理力が、</text>
  <text x="362" y="163" font-size="9.5" fill="#374151">会話・アナウンスの聞き取りにそのまま活きる。</text>
  <text x="362" y="181" font-size="9.5" font-weight="700" fill="#15803D">→ あとはスピード慣れだけで得点源に</text>

  <rect x="352" y="208" width="372" height="90" rx="8" fill="#DCFCE7"/>
  <text x="362" y="228" font-size="11.5" font-weight="700" fill="#166534">② Reading（Part5〜7）</text>
  <text x="362" y="246" font-size="9.5" fill="#374151">英検の文法問題・長文読解で培った処理経験が、</text>
  <text x="362" y="261" font-size="9.5" fill="#374151">ビジネス文書・Eメール読解の土台になる。</text>
  <text x="362" y="279" font-size="9.5" font-weight="700" fill="#15803D">→ 「見たことある構文だ」で即座に時短</text>

  <rect x="352" y="306" width="372" height="90" rx="8" fill="#DCFCE7"/>
  <text x="362" y="326" font-size="11.5" font-weight="700" fill="#166534">③ スコアメイク戦略</text>
  <text x="362" y="344" font-size="9.5" fill="#374151">英検で身につけた「基礎体力」があれば、あとは</text>
  <text x="362" y="359" font-size="9.5" fill="#374151">マークシート形式・時間配分のテクニックだけ追加。</text>
  <text x="362" y="377" font-size="9.5" font-weight="700" fill="#15803D">→ ゼロから始めるより圧倒的に近道</text>

  <rect x="352" y="404" width="372" height="16" rx="5" fill="#166534" opacity="0.85"/>
  <text x="538" y="416" text-anchor="middle" font-size="9.5" font-weight="700" fill="#DCFCE7">英検2級を先に取れば、TOEICのスコアアップ速度が一段階アップする</text>
</svg>
