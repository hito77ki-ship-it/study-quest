<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">圧縮記帳、直接減額方式と積立金方式の違い</title>
  <desc id="desc">直接減額方式は国庫補助金相当額を固定資産の取得原価から直接減額し会計と税務にズレが生じないため税効果会計が不要な簿記2級の方法であるのに対し、積立金方式は取得原価を減額せず圧縮積立金として純資産に振り替えるため将来加算一時差異が生じ税効果会計が必要になる簿記1級の方法であるという違いを対比する図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#fffbeb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#667085" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:25px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15.5px;font-weight:800;fill:#ffffff}
      .ptnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13px;font-weight:800;fill:#ffffff}
      .ptname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:800;fill:#1f2937}
      .ptbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="1200" height="800" rx="40" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="64" fill="#dcfce7" opacity="0.6"/>
  <circle cx="1100" cy="110" r="78" fill="#fef3c7" opacity="0.55"/>
  <circle cx="1090" cy="740" r="88" fill="#fef3c7" opacity="0.4"/>
  <circle cx="110" cy="730" r="70" fill="#dcfce7" opacity="0.45"/>

  <text x="600" y="50" text-anchor="middle" class="title">圧縮記帳 直接減額方式 vs 積立金方式</text>
  <text x="600" y="76" text-anchor="middle" class="sub">固定資産の取得原価を「直接減らす」か「減らさず純資産で調整する」か</text>

  <!-- Left column: 直接減額方式 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="104" width="500" height="46" rx="16" fill="#166534"/>
    <text x="320" y="133" text-anchor="middle" class="colhead">直接減額方式（簿記2級）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="70" y="166" width="500" height="500" rx="22" fill="#ffffff" stroke="#86efac" stroke-width="3"/>

    <circle cx="108" cy="206" r="17" fill="#166534"/>
    <text x="108" y="211" text-anchor="middle" class="ptnum">1</text>
    <text x="136" y="202" class="ptname">固定資産の帳簿価額</text>
    <text x="136" y="222" class="ptbody">国庫補助金相当額を取得原価から直接減額する</text>

    <line x1="96" y1="240" x2="546" y2="240" stroke="#dcfce7" stroke-width="2"/>

    <circle cx="108" cy="278" r="17" fill="#166534"/>
    <text x="108" y="283" text-anchor="middle" class="ptnum">2</text>
    <text x="136" y="274" class="ptname">税効果会計</text>
    <text x="136" y="294" class="ptbody">不要（会計と税務にズレが生じない）</text>

    <line x1="96" y1="312" x2="546" y2="312" stroke="#dcfce7" stroke-width="2"/>

    <circle cx="108" cy="350" r="17" fill="#166534"/>
    <text x="108" y="355" text-anchor="middle" class="ptnum">3</text>
    <text x="136" y="346" class="ptname">仕組み</text>
    <text x="136" y="366" class="ptbody">シンプルだが将来の減価償却費は小さくなる</text>

    <rect x="96" y="466" width="450" height="176" rx="14" fill="#f0fdf4"/>
    <text x="120" y="496" class="ptname" fill="#166534">数値例（建物9,000・補助金6,000）</text>
    <text x="120" y="522" class="ptbody">固定資産圧縮損6,000／建物6,000</text>
    <text x="120" y="544" class="ptbody">→ 建物の帳簿価額は3,000に</text>
    <text x="120" y="576" class="ptbody">毎年の減価償却費：3,000÷3年＝1,000円</text>
    <text x="120" y="602" class="ptbody">（耐用年数3年・定額法の場合）</text>
  </g>

  <!-- Right column: 積立金方式 -->
  <g filter="url(#softShadow)">
    <rect x="630" y="104" width="500" height="46" rx="16" fill="#B45309"/>
    <text x="880" y="133" text-anchor="middle" class="colhead">積立金方式（簿記1級）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="630" y="166" width="500" height="500" rx="22" fill="#ffffff" stroke="#FCD9A0" stroke-width="3"/>

    <circle cx="668" cy="206" r="17" fill="#B45309"/>
    <text x="668" y="211" text-anchor="middle" class="ptnum">1</text>
    <text x="696" y="202" class="ptname">固定資産の帳簿価額</text>
    <text x="696" y="222" class="ptbody">減額せず取得原価のまま計上する</text>

    <line x1="656" y1="240" x2="1106" y2="240" stroke="#FEF3C7" stroke-width="2"/>

    <circle cx="668" cy="278" r="17" fill="#B45309"/>
    <text x="668" y="283" text-anchor="middle" class="ptnum">2</text>
    <text x="696" y="274" class="ptname">税効果会計</text>
    <text x="696" y="294" class="ptbody">必要（将来加算一時差異が発生する）</text>

    <line x1="656" y1="312" x2="1106" y2="312" stroke="#FEF3C7" stroke-width="2"/>

    <circle cx="668" cy="350" r="17" fill="#B45309"/>
    <text x="668" y="355" text-anchor="middle" class="ptnum">3</text>
    <text x="696" y="346" class="ptname">仕組み</text>
    <text x="696" y="366" class="ptbody">繰越利益剰余金を圧縮積立金に振り替える</text>

    <rect x="656" y="466" width="450" height="176" rx="14" fill="#FFFBEB"/>
    <text x="680" y="496" class="ptname" fill="#92400E">数値例（建物9,000・補助金6,000）</text>
    <text x="680" y="522" class="ptbody">法人税等調整額2,400／繰延税金負債2,400</text>
    <text x="680" y="544" class="ptbody">（6,000×実効税率40%）</text>
    <text x="680" y="576" class="ptbody">→ 建物の帳簿価額は9,000のまま</text>
    <text x="680" y="602" class="ptbody">毎年の減価償却費：9,000÷3年＝3,000円</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="70" y="690" width="1060" height="92" rx="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="3"/>
    <text x="600" y="724" text-anchor="middle" class="banner">どちらも「課税を将来へ繰り延べる」効果は同じ、会計処理の見え方が違うだけ</text>
    <text x="600" y="750" text-anchor="middle" class="bannersmall">直接減額方式は資産を減らして完結、積立金方式は資産は減らさず純資産（圧縮積立金）と税効果で調整する——2級は前者のみ、1級で後者が加わる</text>
  </g>
</svg>
