<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 900" width="360" height="900" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">ITパスポート vs 基本情報技術者の比較マップ（モバイル版）</title>
  <desc id="svgdesc">難易度・試験形式・合格率・必要勉強時間・強み用途・向いている人の6項目を、ITパスポートと基本情報技術者で縦に並べて比較した図解</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="900" rx="16" fill="#F8FAFC"/>
  <text x="180" y="34" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">ITパスポート vs 基本情報技術者</text>
  <text x="180" y="54" text-anchor="middle" font-size="11" fill="#64748B">比較と選び方</text>

  <!-- legend -->
  <circle cx="60" cy="72" r="5" fill="#0369A1"/>
  <text x="72" y="76" font-size="10.5" fill="#0369A1">ITパスポート</text>
  <circle cx="230" cy="72" r="5" fill="#7C3AED"/>
  <text x="242" y="76" font-size="10.5" fill="#7C3AED">基本情報技術者</text>

  <!-- Row 1: 難易度 -->
  <rect x="16" y="92" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="112" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">難易度</text>
  <rect x="28" y="122" width="304" height="26" rx="6" fill="#E0F2FE"/>
  <text x="36" y="140" font-size="11.5" fill="#0369A1">iパス：IPAレベル1</text>
  <rect x="28" y="152" width="304" height="26" rx="6" fill="#EDE9FE"/>
  <text x="36" y="170" font-size="11.5" fill="#7C3AED">FE：IPAレベル2</text>

  <!-- Row 2: 試験形式 -->
  <rect x="16" y="196" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="216" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">試験形式</text>
  <rect x="28" y="226" width="304" height="26" rx="6" fill="#E0F2FE"/>
  <text x="36" y="244" font-size="11.5" fill="#0369A1">iパス：CBT・全国随時受験</text>
  <rect x="28" y="256" width="304" height="26" rx="6" fill="#EDE9FE"/>
  <text x="36" y="274" font-size="11.5" fill="#7C3AED">FE：CBT・全国随時受験</text>

  <!-- Row 3: 合格率 -->
  <rect x="16" y="300" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="320" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">合格率</text>
  <rect x="28" y="330" width="304" height="26" rx="6" fill="#E0F2FE"/>
  <text x="36" y="348" font-size="11.5" fill="#0369A1">iパス：約50〜60%</text>
  <rect x="28" y="360" width="304" height="26" rx="6" fill="#EDE9FE"/>
  <text x="36" y="378" font-size="11.5" fill="#7C3AED">FE：約35〜45%</text>

  <!-- Row 4: 必要勉強時間 -->
  <rect x="16" y="404" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="424" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">必要勉強時間</text>
  <rect x="28" y="434" width="304" height="26" rx="6" fill="#E0F2FE"/>
  <text x="36" y="452" font-size="11.5" fill="#0369A1">iパス：30〜60時間</text>
  <rect x="28" y="464" width="304" height="26" rx="6" fill="#EDE9FE"/>
  <text x="36" y="482" font-size="11.5" fill="#7C3AED">FE：100〜200時間</text>

  <!-- Row 5: 強み・用途 -->
  <rect x="16" y="508" width="328" height="112" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="528" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">強み・用途</text>
  <rect x="28" y="538" width="304" height="36" rx="6" fill="#BAE6FD"/>
  <text x="36" y="553" font-size="10.5" fill="#0369A1">iパス：IT全般の基礎知識を証明</text>
  <text x="36" y="568" font-size="10.5" fill="#0369A1">就活・非エンジニア職のアピール</text>
  <rect x="28" y="580" width="304" height="36" rx="6" fill="#DDD6FE"/>
  <text x="36" y="595" font-size="10.5" fill="#7C3AED">FE：ITエンジニアの登竜門</text>
  <text x="36" y="610" font-size="10.5" fill="#7C3AED">アルゴリズム・プログラミング力の証明</text>

  <!-- Row 6: 向いている人 -->
  <rect x="16" y="634" width="328" height="90" rx="10" fill="#fff" stroke="#E2E8F0"/>
  <text x="180" y="654" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">向いている人</text>
  <rect x="28" y="664" width="304" height="26" rx="6" fill="#BAE6FD"/>
  <text x="36" y="682" font-size="10.5" fill="#0369A1">iパス：IT未経験・文系・新社会人</text>
  <rect x="28" y="694" width="304" height="26" rx="6" fill="#DDD6FE"/>
  <text x="36" y="712" font-size="10.5" fill="#7C3AED">FE：エンジニア志望・IT就職・開発職</text>

  <!-- Bottom summary -->
  <rect x="16" y="738" width="328" height="100" rx="12" fill="#1E293B"/>
  <rect x="28" y="750" width="304" height="34" rx="6" fill="#0369A1"/>
  <text x="180" y="771" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">IT知識ゼロから → iパスから</text>
  <rect x="28" y="792" width="304" height="34" rx="6" fill="#7C3AED"/>
  <text x="180" y="813" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">エンジニア志望 → FEへ直行もあり</text>
</svg>
