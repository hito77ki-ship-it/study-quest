<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" width="760" height="480">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="480" rx="16" fill="#F8FAFC"/>
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">挫折回避＆復活ロードマップ——継続エネルギーのタイムライン</text>
  <text x="380" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">2週間目の壁と模試後の絶望ラインを越えたら、1問ずつの接触回数で必ず戻れる</text>

  <!-- 背景ゾーン -->
  <rect x="60" y="70" width="260" height="270" fill="#FDF2F8" fill-opacity="0.5"/>
  <rect x="320" y="70" width="140" height="270" fill="#F1F5F9" fill-opacity="0.7"/>
  <rect x="460" y="70" width="260" height="270" fill="#F0FFF4" fill-opacity="0.5"/>

  <text x="190" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#9D174D">① 挫折ゾーン</text>
  <text x="390" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#64748B">② 中断期間</text>
  <text x="590" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">③ 復活ゾーン</text>

  <!-- Y軸ラベル -->
  <text x="52" y="104" text-anchor="end" font-size="9" fill="#94A3B8">100%</text>
  <text x="52" y="340" text-anchor="end" font-size="9" fill="#94A3B8">0%</text>
  <line x1="60" y1="340" x2="720" y2="340" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- 挫折ゾーンの折れ線（赤系） -->
  <polyline points="80,100 200,205 320,295" fill="none" stroke="#F472B6" stroke-width="3"/>
  <circle cx="80" cy="100" r="5" fill="#F472B6"/>
  <circle cx="200" cy="205" r="5" fill="#F472B6"/>
  <circle cx="320" cy="295" r="5" fill="#F472B6"/>

  <!-- 中断期間（点線） -->
  <line x1="320" y1="295" x2="460" y2="308" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6,5"/>

  <!-- 復活ゾーンの折れ線（緑系） -->
  <polyline points="460,308 520,288 580,258 640,215 700,165" fill="none" stroke="#4ADE80" stroke-width="3"/>
  <circle cx="460" cy="308" r="5" fill="#22C55E"/>
  <circle cx="520" cy="288" r="5" fill="#22C55E"/>
  <circle cx="580" cy="258" r="5" fill="#22C55E"/>
  <circle cx="640" cy="215" r="5" fill="#22C55E"/>
  <circle cx="700" cy="165" r="5" fill="#22C55E"/>

  <!-- ラベル：スタート -->
  <text x="80" y="120" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9D174D">スタート直後</text>

  <!-- ラベル：2週間目の壁 -->
  <line x1="200" y1="205" x2="200" y2="365" stroke="#F472B6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="200" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#9D174D">2週間目の壁</text>
  <text x="200" y="393" text-anchor="middle" font-size="8.5" fill="#9D174D">（新鮮味が消える）</text>

  <!-- ラベル：模試後絶望ライン -->
  <line x1="320" y1="295" x2="320" y2="365" stroke="#F472B6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="320" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#9D174D">模試後の絶望ライン</text>
  <text x="320" y="393" text-anchor="middle" font-size="8.5" fill="#9D174D">（点数が伸びず心が折れる）</text>

  <!-- 中断期間ラベル -->
  <text x="390" y="330" text-anchor="middle" font-size="9" fill="#64748B">止まっていた期間</text>

  <!-- 復活ステップラベル -->
  <text x="460" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">①1ページ</text>
  <text x="520" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">②1問だけ</text>
  <text x="580" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">③数問</text>
  <text x="640" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">④短時間学習</text>
  <text x="700" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">⑤習慣化</text>

  <!-- 下部まとめ -->
  <rect x="30" y="435" width="700" height="35" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="457" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">🎯 復活の鉄則：勢いではなく「接触回数（せっしょくかいすう）」を増やす——小さく触れば触るほど、脳が慣れて戻ってくる</text>
</svg>
