<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 900" width="360" height="900" role="img" aria-labelledby="title desc">
  <title id="title">転職に有利な資格 4象限マトリクス（モバイル版）</title>
  <desc id="desc">未経験からの求人の広がりと取得までの勉強時間の短さで資格を4ゾーンに分類し、各ゾーンに属する資格を縦に並べて示す図解</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="900" rx="16" fill="#FAFDF6"/>
  <text x="180" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">転職に有利な資格 4ゾーン</text>
  <text x="180" y="48" text-anchor="middle" font-size="9.5" fill="#64748B">求人の広がり × 勉強時間の短さで分類</text>

  <!-- Zone 1: 無敵ゾーン -->
  <rect x="16" y="66" width="328" height="182" rx="12" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.5"/>
  <text x="30" y="88" font-size="12" font-weight="700" fill="#166534">🏆 無敵ゾーン</text>
  <text x="30" y="104" font-size="9.5" fill="#166534">時間対効果で評価が突き抜ける</text>
  <rect x="30" y="112" width="300" height="26" rx="6" fill="#22C55E"/>
  <text x="180" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">①簿記2級</text>
  <rect x="30" y="142" width="300" height="26" rx="6" fill="#4ADE80"/>
  <text x="180" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">②宅建</text>
  <rect x="30" y="172" width="145" height="26" rx="6" fill="#86EFAC"/>
  <text x="102" y="190" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">③基本情報</text>
  <rect x="185" y="172" width="145" height="26" rx="6" fill="#86EFAC"/>
  <text x="257" y="190" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">④FP2級</text>
  <rect x="30" y="202" width="145" height="26" rx="6" fill="#BBF7D0"/>
  <text x="102" y="220" text-anchor="middle" font-size="9" fill="#166534">⑤TOEIC730</text>
  <rect x="185" y="202" width="145" height="26" rx="6" fill="#BBF7D0"/>
  <text x="257" y="220" text-anchor="middle" font-size="9" fill="#166534">⑦登録販売者</text>

  <!-- Zone 2: じっくり投資ゾーン -->
  <rect x="16" y="260" width="328" height="112" rx="12" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="30" y="282" font-size="12" font-weight="700" fill="#1D4ED8">💪 じっくり投資ゾーン</text>
  <text x="30" y="298" font-size="9.5" fill="#1D4ED8">時間はかかるが専門性が武器に</text>
  <rect x="30" y="306" width="300" height="26" rx="6" fill="#60A5FA"/>
  <text x="180" y="324" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">⑧社労士</text>
  <rect x="30" y="336" width="300" height="26" rx="6" fill="#3B82F6"/>
  <text x="180" y="354" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">⑩中小企業診断士</text>

  <!-- Zone 3: お手軽ゾーン -->
  <rect x="16" y="384" width="328" height="112" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="30" y="406" font-size="12" font-weight="700" fill="#92400E">⚡ お手軽ゾーン</text>
  <text x="30" y="422" font-size="9.5" fill="#92400E">短時間で入口を作れる</text>
  <rect x="30" y="430" width="300" height="26" rx="6" fill="#FBBF24"/>
  <text x="180" y="448" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">⑥ITパスポート</text>
  <rect x="30" y="460" width="300" height="26" rx="6" fill="#FCD34D"/>
  <text x="180" y="478" text-anchor="middle" font-size="10.5" font-weight="700" fill="#78350F">⑨MOS</text>

  <!-- Zone 4: 要検討ゾーン -->
  <rect x="16" y="508" width="328" height="84" rx="12" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="30" y="530" font-size="12" font-weight="700" fill="#991B1B">⚠ 要検討ゾーン</text>
  <text x="30" y="546" font-size="9.5" fill="#991B1B">時間の割に評価が伸びにくい</text>
  <text x="30" y="566" font-size="9.5" fill="#991B1B">（今回のプロットでは該当資格なし）</text>

  <!-- Bottom summary -->
  <rect x="16" y="616" width="328" height="180" rx="14" fill="#1E293B"/>
  <text x="180" y="644" text-anchor="middle" font-size="11" font-weight="700" fill="#8CC63F">なぜ簿記2級・宅建・基本情報が</text>
  <text x="180" y="662" text-anchor="middle" font-size="11" font-weight="700" fill="#8CC63F">「無敵ゾーン」にいるのか</text>
  <text x="30" y="688" font-size="10" fill="#CBD5E1">200〜400時間程度の投資で、未経験</text>
  <text x="30" y="704" font-size="10" fill="#CBD5E1">からでも応募できる求人が一気に広が</text>
  <text x="30" y="720" font-size="10" fill="#CBD5E1">り、面接での説得力も跳ね上がるから。</text>
  <text x="30" y="742" font-size="10" fill="#CBD5E1">社労士・中小企業診断士は時間がかか</text>
  <text x="30" y="758" font-size="10" fill="#CBD5E1">るが、専門性を武器に管理部門やコン</text>
  <text x="30" y="774" font-size="10" fill="#CBD5E1">サルへ転身するなら投資価値が高い。</text>
</svg>
