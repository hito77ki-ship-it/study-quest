<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="380" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <rect x="60" y="12" width="640" height="36" fill="#FEF3C7" rx="8"/>
  <text x="380" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1A202C">固定資産（こていしさん）の売却損益を図解で理解しよう</text>

  <!-- ── 左：売却損のケース ── -->
  <rect x="16" y="60" width="356" height="30" fill="#FCA5A5" rx="6 6 0 0"/>
  <text x="194" y="81" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">❌ 売却損が出るケース</text>

  <!-- 取得原価バー (loss) -->
  <rect x="30" y="102" width="328" height="32" fill="#FECACA" rx="4"/>
  <text x="110" y="123" font-size="11" font-weight="700" fill="#9B2C2C">取得原価（しゅとくげんか）</text>
  <text x="340" y="123" text-anchor="end" font-size="11" font-weight="700" fill="#9B2C2C">600,000</text>

  <!-- 減価償却累計額バー -->
  <rect x="30" y="140" width="200" height="28" fill="#FEE2E2" rx="4"/>
  <text x="108" y="159" font-size="10" fill="#B91C1C">－減価償却累計額</text>
  <text x="228" y="159" text-anchor="end" font-size="10" fill="#B91C1C">200,000</text>

  <!-- 帳簿価額バー -->
  <rect x="30" y="174" width="128" height="32" fill="#FEF2F2" rx="4" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="94" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#991B1B">帳簿価額</text>
  <text x="156" y="193" text-anchor="end" font-size="10" fill="#991B1B">400,000</text>

  <!-- 売却価額バー -->
  <rect x="30" y="216" width="88" height="28" fill="#FEE2E2" rx="4" stroke="#FCA5A5" stroke-width="1"/>
  <text x="73" y="235" text-anchor="middle" font-size="10" fill="#B91C1C">売却額</text>
  <text x="116" y="235" text-anchor="end" font-size="10" fill="#B91C1C">350,000</text>

  <!-- 損額バー -->
  <rect x="122" y="216" width="36" height="28" fill="#FECACA" rx="4" stroke="#EF4444" stroke-width="1.5"/>
  <text x="140" y="235" text-anchor="middle" font-size="9" font-weight="700" fill="#B91C1C">損</text>

  <!-- 結果ボックス (loss) -->
  <rect x="30" y="258" width="328" height="40" fill="#FEE2E2" rx="6"/>
  <text x="194" y="274" text-anchor="middle" font-size="11" fill="#374151">帳簿価額400,000 ＞ 売却額350,000</text>
  <text x="194" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#B91C1C">→ 固定資産売却損 50,000（借方・費用）</text>

  <!-- ── 右：売却益のケース ── -->
  <rect x="388" y="60" width="356" height="30" fill="#6EE7B7" rx="6 6 0 0"/>
  <text x="566" y="81" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">✅ 売却益が出るケース</text>

  <!-- 取得原価バー (gain) -->
  <rect x="402" y="102" width="328" height="32" fill="#D1FAE5" rx="4"/>
  <text x="480" y="123" font-size="11" font-weight="700" fill="#065F46">取得原価（しゅとくげんか）</text>
  <text x="722" y="123" text-anchor="end" font-size="11" font-weight="700" fill="#065F46">600,000</text>

  <!-- 減価償却累計額バー -->
  <rect x="402" y="140" width="200" height="28" fill="#A7F3D0" rx="4"/>
  <text x="480" y="159" font-size="10" fill="#065F46">－減価償却累計額</text>
  <text x="600" y="159" text-anchor="end" font-size="10" fill="#065F46">200,000</text>

  <!-- 帳簿価額バー -->
  <rect x="402" y="174" width="128" height="32" fill="#ECFDF5" rx="4" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="466" y="193" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">帳簿価額</text>
  <text x="528" y="193" text-anchor="end" font-size="10" fill="#065F46">400,000</text>

  <!-- 売却価額バー（帳簿より大きい） -->
  <rect x="402" y="216" width="150" height="28" fill="#A7F3D0" rx="4" stroke="#6EE7B7" stroke-width="1"/>
  <text x="460" y="235" text-anchor="middle" font-size="10" fill="#065F46">売却額 500,000</text>

  <!-- 益額バー -->
  <rect x="530" y="216" width="22" height="28" fill="#34D399" rx="4" stroke="#059669" stroke-width="1.5"/>
  <text x="541" y="235" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">益</text>

  <!-- 結果ボックス (gain) -->
  <rect x="402" y="258" width="328" height="40" fill="#D1FAE5" rx="6"/>
  <text x="566" y="274" text-anchor="middle" font-size="11" fill="#374151">帳簿価額400,000 ＜ 売却額500,000</text>
  <text x="566" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">→ 固定資産売却益 100,000（貸方・収益）</text>

  <!-- 中央の ＝ -->
  <text x="380" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#9CA3AF">⇔</text>

  <!-- 下部まとめ -->
  <rect x="16" y="312" width="728" height="52" fill="#FFFBEB" rx="8" stroke="#FCD34D" stroke-width="1"/>
  <text x="380" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">🎯 計算の鉄則：帳簿価額（取得原価 ー 減価償却累計額）と売却価格を比べる</text>
  <text x="380" y="354" text-anchor="middle" font-size="11" fill="#374151">売却価格 ＞ 帳簿価額 → 売却益（貸方・収益）　　売却価格 ＜ 帳簿価額 → 売却損（借方・費用）</text>
</svg>
