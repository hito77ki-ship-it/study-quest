<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="430" rx="16" fill="#F8FAFC"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">固定資産の売却損益——帳簿価額（ちょうぼかがく）vs 売却価格の天秤マップ</text>
  <text x="380" y="47" text-anchor="middle" font-size="10.5" fill="#64748B">天秤が傾いた方向で「売却損」か「売却益」かが一瞬でわかる</text>

  <line x1="380" y1="66" x2="380" y2="335" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ===== 左：売却損のケース ===== -->
  <rect x="55" y="62" width="280" height="26" rx="13" fill="#FDF2F8"/>
  <text x="195" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#9D174D">❌ 売却損のケース</text>

  <!-- 地面と支柱 -->
  <line x1="60" y1="225" x2="330" y2="225" stroke="#CBD5E1" stroke-width="3"/>
  <polygon points="195,175 175,205 215,205" fill="#94A3B8"/>
  <rect x="190" y="205" width="10" height="20" fill="#94A3B8"/>

  <!-- 天秤の梁（帳簿価額側が重くて下がる） -->
  <line x1="90" y1="195" x2="300" y2="155" stroke="#374151" stroke-width="4"/>

  <!-- 左の皿：帳簿価額（重い） -->
  <line x1="90" y1="195" x2="90" y2="225" stroke="#374151" stroke-width="2"/>
  <circle cx="90" cy="248" r="40" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
  <text x="90" y="244" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">帳簿価額</text>
  <text x="90" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">400,000円</text>

  <!-- 右の皿：売却価格（軽い） -->
  <line x1="300" y1="155" x2="300" y2="185" stroke="#374151" stroke-width="2"/>
  <circle cx="300" cy="206" r="34" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2.5"/>
  <text x="300" y="202" text-anchor="middle" font-size="10.5" font-weight="700" fill="#9D174D">売却価格</text>
  <text x="300" y="219" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9D174D">350,000円</text>

  <!-- 結果 -->
  <rect x="45" y="298" width="300" height="52" rx="8" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="195" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#9D174D">400,000 － 350,000 ＝ 差額 50,000円</text>
  <text x="195" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#9D174D">→ 固定資産売却損（費用）</text>

  <!-- ===== 右：売却益のケース ===== -->
  <rect x="425" y="62" width="280" height="26" rx="13" fill="#F0FFF4"/>
  <text x="565" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">⭕ 売却益のケース</text>

  <line x1="430" y1="225" x2="700" y2="225" stroke="#CBD5E1" stroke-width="3"/>
  <polygon points="565,175 545,205 585,205" fill="#94A3B8"/>
  <rect x="560" y="205" width="10" height="20" fill="#94A3B8"/>

  <!-- 天秤の梁（売却価格側が重くて下がる） -->
  <line x1="460" y1="155" x2="670" y2="195" stroke="#374151" stroke-width="4"/>

  <!-- 左の皿：帳簿価額（軽い） -->
  <line x1="460" y1="155" x2="460" y2="185" stroke="#374151" stroke-width="2"/>
  <circle cx="460" cy="206" r="34" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2.5"/>
  <text x="460" y="202" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">帳簿価額</text>
  <text x="460" y="219" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">400,000円</text>

  <!-- 右の皿：売却価格（重い） -->
  <line x1="670" y1="195" x2="670" y2="225" stroke="#374151" stroke-width="2"/>
  <circle cx="670" cy="248" r="40" fill="#F0FFF4" stroke="#86EFAC" stroke-width="2.5"/>
  <text x="670" y="244" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">売却価格</text>
  <text x="670" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">500,000円</text>

  <!-- 結果 -->
  <rect x="415" y="298" width="300" height="52" rx="8" fill="#F0FFF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="565" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">500,000 － 400,000 ＝ 差額 100,000円</text>
  <text x="565" y="337" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">→ 固定資産売却益（収益）</text>

  <!-- 下部まとめ -->
  <rect x="30" y="368" width="700" height="48" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="390" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">🎯 計算の鉄則：帳簿価額（取得原価－減価償却累計額）と売却価格を比べる</text>
  <text x="380" y="407" text-anchor="middle" font-size="10.5" fill="#374151">天秤が売却価格側に傾けば売却益、帳簿価額側に傾けば売却損——傾いた方向が答えそのもの！</text>
</svg>
