<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">売掛金と貸付金、発生原因からわかる3つの違い</title>
  <desc id="desc">売掛金は商品・サービスの掛け売りから発生し常に流動資産で利息が原則なしなのに対し、貸付金は金銭そのものの貸し付けから発生し返済期日が1年超なら固定資産（長期貸付金）に区分され受取利息が生じることが多いという、発生原因を起点にした3つの違いを対比する図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f9ff"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#fff9f0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#667085" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:27px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:600;fill:#64748b}
      .colhead{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16.5px;font-weight:800;fill:#ffffff}
      .ptnum{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13px;font-weight:800;fill:#ffffff}
      .ptname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:800;fill:#1f2937}
      .ptbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:16px;font-weight:800;fill:#92400e}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="1200" height="800" rx="40" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="64" fill="#dbeafe" opacity="0.5"/>
  <circle cx="1100" cy="110" r="78" fill="#ffedd5" opacity="0.55"/>
  <circle cx="1090" cy="740" r="88" fill="#dcfce7" opacity="0.45"/>
  <circle cx="110" cy="730" r="70" fill="#dbeafe" opacity="0.45"/>

  <text x="600" y="50" text-anchor="middle" class="title">売掛金 vs 貸付金 発生原因からわかる3つの違い</text>
  <text x="600" y="76" text-anchor="middle" class="sub">同じ「将来お金を受け取る権利」でも、生まれた理由が違えば区分・利息・引当金の扱いが変わる</text>

  <!-- Left column: 売掛金 -->
  <g filter="url(#softShadow)">
    <rect x="70" y="104" width="500" height="46" rx="16" fill="#3B82F6"/>
    <text x="320" y="133" text-anchor="middle" class="colhead">売掛金（商品・サービスの掛け売りから発生）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="70" y="166" width="500" height="500" rx="22" fill="#ffffff" stroke="#93c5fd" stroke-width="3"/>

    <circle cx="108" cy="206" r="17" fill="#3B82F6"/>
    <text x="108" y="211" text-anchor="middle" class="ptnum">1</text>
    <text x="136" y="202" class="ptname">発生原因</text>
    <text x="136" y="222" class="ptbody">商品やサービスを「掛け」で販売した代金の未収分</text>

    <line x1="96" y1="240" x2="546" y2="240" stroke="#dbeafe" stroke-width="2"/>

    <circle cx="108" cy="278" r="17" fill="#3B82F6"/>
    <text x="108" y="283" text-anchor="middle" class="ptnum">2</text>
    <text x="136" y="274" class="ptname">資産区分</text>
    <text x="136" y="294" class="ptbody">常に流動資産——営業サイクル内での回収が前提</text>

    <line x1="96" y1="312" x2="546" y2="312" stroke="#dbeafe" stroke-width="2"/>

    <circle cx="108" cy="350" r="17" fill="#3B82F6"/>
    <text x="108" y="355" text-anchor="middle" class="ptnum">3</text>
    <text x="136" y="346" class="ptname">利息</text>
    <text x="136" y="366" class="ptbody">原則として発生しない（商品代金そのものだから）</text>

    <line x1="96" y1="384" x2="546" y2="384" stroke="#dbeafe" stroke-width="2"/>

    <circle cx="108" cy="422" r="17" fill="#3B82F6"/>
    <text x="108" y="427" text-anchor="middle" class="ptnum">4</text>
    <text x="136" y="418" class="ptname">貸倒引当金</text>
    <text x="136" y="438" class="ptbody">「売上債権」として設定対象になる（受取手形と同枠）</text>

    <rect x="96" y="466" width="450" height="176" rx="14" fill="#eff6ff"/>
    <text x="120" y="496" class="ptname" fill="#1d4ed8">見分けるキーワード</text>
    <text x="120" y="522" class="ptbody">「商品を売った」「サービスを提供した」</text>
    <text x="120" y="544" class="ptbody">「代金は掛けとした」</text>
    <text x="120" y="576" class="ptname" fill="#1d4ed8">仕訳の相手科目</text>
    <text x="120" y="602" class="ptbody">（借）売掛金 ／（貸）売上</text>
    <text x="120" y="624" class="ptbody">→ 貸方に必ず収益科目が来る</text>
  </g>

  <!-- Right column: 貸付金 -->
  <g filter="url(#softShadow)">
    <rect x="630" y="104" width="500" height="46" rx="16" fill="#f59e0b"/>
    <text x="880" y="133" text-anchor="middle" class="colhead">貸付金（金銭そのものの貸し付けから発生）</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="630" y="166" width="500" height="500" rx="22" fill="#ffffff" stroke="#fcd34d" stroke-width="3"/>

    <circle cx="668" cy="206" r="17" fill="#f59e0b"/>
    <text x="668" y="211" text-anchor="middle" class="ptnum">1</text>
    <text x="696" y="202" class="ptname">発生原因</text>
    <text x="696" y="222" class="ptbody">金銭そのものを取引先や役員・従業員に貸し付けた</text>

    <line x1="656" y1="240" x2="1106" y2="240" stroke="#fef3c7" stroke-width="2"/>

    <circle cx="668" cy="278" r="17" fill="#f59e0b"/>
    <text x="668" y="283" text-anchor="middle" class="ptnum">2</text>
    <text x="696" y="274" class="ptname">資産区分（2級知識）</text>
    <text x="696" y="294" class="ptbody">返済期日が1年以内→流動資産／1年超→固定資産（長期貸付金）</text>

    <line x1="656" y1="312" x2="1106" y2="312" stroke="#fef3c7" stroke-width="2"/>

    <circle cx="668" cy="350" r="17" fill="#f59e0b"/>
    <text x="668" y="355" text-anchor="middle" class="ptnum">3</text>
    <text x="696" y="346" class="ptname">利息</text>
    <text x="696" y="366" class="ptbody">受取利息が発生することが多い（お金を貸した対価）</text>

    <line x1="656" y1="384" x2="1106" y2="384" stroke="#fef3c7" stroke-width="2"/>

    <circle cx="668" cy="422" r="17" fill="#f59e0b"/>
    <text x="668" y="427" text-anchor="middle" class="ptnum">4</text>
    <text x="696" y="418" class="ptname">貸倒引当金</text>
    <text x="696" y="438" class="ptbody">金銭債権として設定対象になるが、売上債権とは別区分で管理</text>

    <rect x="656" y="466" width="450" height="176" rx="14" fill="#fffbeb"/>
    <text x="680" y="496" class="ptname" fill="#b45309">見分けるキーワード</text>
    <text x="680" y="522" class="ptbody">「資金を貸した」「お金を貸し付けた」</text>
    <text x="680" y="544" class="ptbody">「借用証書を受け取った」</text>
    <text x="680" y="576" class="ptname" fill="#b45309">仕訳の相手科目</text>
    <text x="680" y="602" class="ptbody">（借）貸付金 ／（貸）現金・当座預金</text>
    <text x="680" y="624" class="ptbody">→ 貸方に収益科目は来ない</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="70" y="690" width="1060" height="92" rx="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="3"/>
    <text x="600" y="724" text-anchor="middle" class="banner">迷ったら「商品・サービスが動いたか、お金そのものが動いたか」だけを見る</text>
    <text x="600" y="750" text-anchor="middle" class="bannersmall">問題文に「売上」「販売」があれば売掛金、「貸し付けた」「資金」があれば貸付金——発生原因が全ての判断基準</text>
  </g>
</svg>
