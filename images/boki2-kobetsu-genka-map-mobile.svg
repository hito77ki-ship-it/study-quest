<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1180" width="360" height="1180" role="img" aria-labelledby="t d">
  <title id="t">個別原価計算——製造指図書で注文ごとに原価を集計する（モバイル版）</title>
  <desc id="d">注文書から製造指図書発行、原価集計、製品完成までの流れと、直接材料費・直接労務費・製造間接費の3種類の原価を縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1180" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">個別原価計算</text>
  <text x="180" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">製造指図書で注文ごとに原価を集計</text>

  <rect x="16" y="64" width="328" height="56" rx="8" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="30" y="86" font-size="11.5" font-weight="700" fill="#C2410C">① 注文書</text>
  <text x="30" y="104" font-size="10.5" fill="#92400E">得意先からの注文が入る</text>

  <text x="180" y="136" text-anchor="middle" font-size="14" fill="#64748B">↓</text>

  <rect x="16" y="144" width="328" height="56" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="30" y="166" font-size="11.5" font-weight="700" fill="#1E40AF">② 製造指図書 発行</text>
  <text x="30" y="184" font-size="10.5" fill="#374151">指図書No.×××、各注文に1枚ずつ発行</text>

  <text x="180" y="216" text-anchor="middle" font-size="14" fill="#64748B">↓</text>

  <rect x="16" y="224" width="328" height="88" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="30" y="246" font-size="11.5" font-weight="700" fill="#166534">③ 指図書ごとに原価集計</text>
  <text x="30" y="266" font-size="10.5" fill="#374151">直接材料費（DM）／直接労務費（DL）</text>
  <text x="30" y="284" font-size="10.5" fill="#374151">製造間接費（OHは配賦）</text>
  <text x="30" y="302" font-size="9.5" fill="#64748B">↑直接経費もあれば加算</text>

  <text x="180" y="334" text-anchor="middle" font-size="14" fill="#22C55E">↓</text>

  <rect x="16" y="342" width="328" height="56" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="30" y="364" font-size="11.5" font-weight="700" fill="#166534">④ 製品完成</text>
  <text x="30" y="382" font-size="10.5" fill="#374151">仕掛品 → 製品勘定へ振替</text>

  <text x="180" y="424" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">製造指図書に集計する3種類の原価</text>

  <rect x="16" y="440" width="328" height="150" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="30" y="464" font-size="12" font-weight="700" fill="#713F12">直接材料費</text>
  <text x="30" y="484" font-size="10.5" fill="#374151">その製品だけに使った材料</text>
  <text x="30" y="502" font-size="10" fill="#713F12">→ 直接指図書に賦課</text>
  <rect x="30" y="512" width="298" height="60" rx="5" fill="#FEF9C3"/>
  <text x="44" y="534" font-size="10" fill="#713F12">材料出庫時に指図書Noを記入</text>
  <text x="44" y="552" font-size="10" fill="#713F12">して集計する</text>

  <rect x="16" y="606" width="328" height="150" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="30" y="630" font-size="12" font-weight="700" fill="#1E40AF">直接労務費</text>
  <text x="30" y="650" font-size="10.5" fill="#374151">その製品だけに費やした作業時間</text>
  <text x="30" y="668" font-size="10" fill="#1E40AF">→ 直接指図書に賦課</text>
  <rect x="30" y="678" width="298" height="60" rx="5" fill="#DBEAFE"/>
  <text x="44" y="700" font-size="10" fill="#1E40AF">作業時間票で指図書ごとの直接</text>
  <text x="44" y="718" font-size="10" fill="#1E40AF">作業時間を記録する</text>

  <rect x="16" y="772" width="328" height="150" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="30" y="796" font-size="12" font-weight="700" fill="#DC2626">製造間接費</text>
  <text x="30" y="816" font-size="10.5" fill="#374151">複数製品で共通の間接費用</text>
  <text x="30" y="834" font-size="10" fill="#DC2626">→ 配賦基準で各指図書に配賦</text>
  <rect x="30" y="844" width="298" height="60" rx="5" fill="#FEE2E2"/>
  <text x="44" y="866" font-size="10" fill="#DC2626">予定配賦率×直接作業時間＝</text>
  <text x="44" y="884" font-size="10" fill="#DC2626">各指図書への配賦額</text>

  <rect x="16" y="938" width="328" height="110" rx="10" fill="#111827"/>
  <text x="180" y="962" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8CC63F">個別原価計算＝注文ごとに原価を</text>
  <text x="180" y="980" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8CC63F">「積み上げる」方式</text>
  <text x="180" y="1000" text-anchor="middle" font-size="9.5" fill="#E5E7EB">総合原価計算は「平均する」方式</text>
  <text x="180" y="1018" text-anchor="middle" font-size="9.5" fill="#E5E7EB">完成時：仕掛品／材料・賃金・製造間接費</text>
  <text x="180" y="1036" text-anchor="middle" font-size="9.5" fill="#E5E7EB">引渡時：売上原価／製品</text>
</svg>
