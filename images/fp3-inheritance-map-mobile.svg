<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 792" width="360" height="792">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="792" rx="16" fill="#F8FAFC"/>
  <text x="180" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">FP3級 相続・事業承継</text>
  <text x="180" y="48" text-anchor="middle" font-size="11" fill="#64748B">法定相続人・相続分・相続税計算</text>

  <rect x="16" y="66" width="328" height="26" rx="8" fill="#3B82F6"/>
  <text x="180" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">法定相続人と法定相続分</text>

  <rect x="16" y="98" width="328" height="32" rx="6" fill="#1E40AF"/>
  <text x="180" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">配偶者 — 常に相続人（全順位と共同相続）</text>

  <rect x="16" y="138" width="328" height="70" rx="6" fill="#DBEAFE"/>
  <text x="30" y="158" font-size="11.5" font-weight="700" fill="#1D4ED8">第1順位：子（先死亡なら孫が代襲）</text>
  <text x="30" y="176" font-size="10.5" fill="#374151">配偶者と子：配偶者1/2・子1/2</text>
  <text x="30" y="192" font-size="10" fill="#64748B">子2人なら配偶者1/2・子各1/4</text>

  <rect x="16" y="216" width="328" height="70" rx="6" fill="#DBEAFE"/>
  <text x="30" y="236" font-size="11.5" font-weight="700" fill="#1D4ED8">第2順位：直系尊属（父母→祖父母）</text>
  <text x="30" y="254" font-size="10.5" fill="#374151">第1順位がいない場合に登場</text>
  <text x="30" y="270" font-size="10" fill="#64748B">配偶者と父母：配偶者2/3・父母1/3</text>

  <rect x="16" y="294" width="328" height="70" rx="6" fill="#DBEAFE"/>
  <text x="30" y="314" font-size="11.5" font-weight="700" fill="#1D4ED8">第3順位：兄弟姉妹（甥姪まで代襲可）</text>
  <text x="30" y="332" font-size="10.5" fill="#374151">第1・2順位がいない場合に登場</text>
  <text x="30" y="348" font-size="10" fill="#64748B">配偶者と兄弟姉妹：配偶者3/4・1/4</text>

  <rect x="16" y="384" width="328" height="26" rx="8" fill="#F97316"/>
  <text x="180" y="402" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">相続税の計算フロー</text>

  <rect x="16" y="416" width="328" height="34" rx="6" fill="#FFEDD5"/>
  <text x="180" y="437" text-anchor="middle" font-size="11" fill="#374151">正味の遺産額（相続財産−債務・葬儀費用）</text>
  <text x="180" y="464" text-anchor="middle" font-size="10.5" fill="#C2410C">▼ 基礎控除を差し引く</text>
  <rect x="16" y="474" width="328" height="46" rx="6" fill="#FEE2E2"/>
  <text x="180" y="493" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">基礎控除＝3,000万＋600万×法定相続人数</text>
  <text x="180" y="510" text-anchor="middle" font-size="10" fill="#64748B">例：相続人3人→3,000万＋1,800万＝4,800万</text>
  <text x="180" y="538" text-anchor="middle" font-size="10.5" fill="#C2410C">▼ 課税遺産総額を法定相続分で按分→税率適用</text>
  <rect x="16" y="548" width="328" height="34" rx="6" fill="#FFEDD5"/>
  <text x="180" y="569" text-anchor="middle" font-size="11" fill="#374151">各相続人の仮相続税額を計算</text>
  <text x="180" y="596" text-anchor="middle" font-size="10.5" fill="#C2410C">▼ 合算して総額を計算→実際の取得割合で按分</text>
  <rect x="16" y="606" width="328" height="34" rx="6" fill="#FEE2E2"/>
  <text x="180" y="627" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">各人の納付相続税額</text>
  <text x="180" y="654" text-anchor="middle" font-size="10" fill="#64748B">配偶者の税額軽減：1億6千万か法定相続分まで非課税</text>

  <rect x="16" y="672" width="328" height="50" rx="8" fill="#F1F5F9"/>
  <text x="30" y="692" font-size="10.5" fill="#475569">💡 基礎控除の式「3,000万＋600万×相続人数」は必須暗記。相続放棄した人もカウント（養子は制限あり）。</text>
  <rect x="16" y="732" width="328" height="40" rx="8" fill="#F1F5F9"/>
  <text x="30" y="752" font-size="10.5" fill="#475569">💡 死亡保険金の非課税枠：500万×法定相続人数。死亡退職金も同じ計算。</text>
</svg>
