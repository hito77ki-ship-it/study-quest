<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1080" width="360" height="1080">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="1080" rx="14" fill="#F8FAFC"/>
  <text x="180" y="24" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">外貨換算——3つのタイミングと</text>
  <text x="180" y="42" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">レートの使い分け</text>

  <!-- Card1 取引発生時 -->
  <rect x="20" y="60" width="320" height="230" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="60" width="320" height="34" rx="10" fill="#3B82F6"/>
  <rect x="20" y="82" width="320" height="12" fill="#3B82F6"/>
  <text x="180" y="82" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">① 取引発生時（例：7/1）</text>
  <text x="180" y="116" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">取引日のレートで換算</text>
  <text x="180" y="134" text-anchor="middle" font-size="10.5" fill="#374151">（Historical Rate / HR）</text>
  <rect x="36" y="146" width="288" height="86" rx="6" fill="#DBEAFE"/>
  <text x="180" y="166" text-anchor="middle" font-size="10.5" fill="#1D4ED8">例：$1,000を売掛金で売上</text>
  <text x="180" y="184" text-anchor="middle" font-size="10.5" fill="#1D4ED8">レート：1$＝140円</text>
  <text x="180" y="202" text-anchor="middle" font-size="10.5" fill="#1D4ED8">売掛金140,000／売上140,000</text>
  <text x="180" y="222" text-anchor="middle" font-size="10" fill="#94A3B8">この時点では為替差損益なし</text>

  <text x="180" y="316" text-anchor="middle" font-size="12" fill="#64748B">↓</text>

  <!-- Card2 決算時 -->
  <rect x="20" y="332" width="320" height="240" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="20" y="332" width="320" height="34" rx="10" fill="#7C3AED"/>
  <rect x="20" y="354" width="320" height="12" fill="#7C3AED"/>
  <text x="180" y="354" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">② 決算時（例：12/31）</text>
  <text x="180" y="388" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5B21B6">決算日レートで再換算</text>
  <text x="180" y="406" text-anchor="middle" font-size="10.5" fill="#374151">（Current Rate / CR）</text>
  <rect x="36" y="418" width="288" height="100" rx="6" fill="#EDE9FE"/>
  <text x="180" y="438" text-anchor="middle" font-size="10.5" fill="#5B21B6">決算日レート：1$＝145円</text>
  <text x="180" y="456" text-anchor="middle" font-size="10.5" fill="#5B21B6">評価替え：145,000円に</text>
  <text x="180" y="474" text-anchor="middle" font-size="10.5" fill="#5B21B6">差額5,000 → 為替差益</text>
  <text x="180" y="494" text-anchor="middle" font-size="10" fill="#5B21B6">売掛金5,000／為替差益5,000</text>
  <text x="180" y="512" text-anchor="middle" font-size="9.5" fill="#94A3B8">外貨建金銭債権・債務のみ対象</text>

  <text x="180" y="600" text-anchor="middle" font-size="12" fill="#64748B">↓</text>

  <!-- Card3 決済時 -->
  <rect x="20" y="616" width="320" height="240" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="20" y="616" width="320" height="34" rx="10" fill="#22C55E"/>
  <rect x="20" y="638" width="320" height="12" fill="#22C55E"/>
  <text x="180" y="638" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">③ 決済時（例：翌1/31）</text>
  <text x="180" y="672" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">決済日レートで換算</text>
  <text x="180" y="690" text-anchor="middle" font-size="10.5" fill="#374151">（売掛金を実際に回収）</text>
  <rect x="36" y="702" width="288" height="100" rx="6" fill="#DCFCE7"/>
  <text x="180" y="722" text-anchor="middle" font-size="10.5" fill="#166534">決済日レート：1$＝143円</text>
  <text x="180" y="740" text-anchor="middle" font-size="10.5" fill="#166534">現金受取：143,000円</text>
  <text x="180" y="758" text-anchor="middle" font-size="10.5" fill="#166534">帳簿残高145,000との差▲2,000</text>
  <text x="180" y="778" text-anchor="middle" font-size="10" fill="#166534">現金143,000／為替差損2,000／売掛金145,000</text>

  <rect x="20" y="884" width="320" height="140" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="180" y="908" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">為替差損益の判定ポイント</text>
  <text x="180" y="934" text-anchor="middle" font-size="10" fill="#374151">売掛金（受取る側）：円高→為替差損</text>
  <text x="180" y="952" text-anchor="middle" font-size="10" fill="#374151">円安→為替差益</text>
  <text x="180" y="976" text-anchor="middle" font-size="10" fill="#374151">買掛金（支払う側）：円高→為替差益</text>
  <text x="180" y="994" text-anchor="middle" font-size="10" fill="#374151">円安→為替差損</text>
</svg>
