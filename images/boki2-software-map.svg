<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="380" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">無形固定資産——研究開発費 vs ソフトウェア資産計上の判定</text>

  <!-- Top decision flow -->
  <rect x="270" y="54" width="220" height="48" rx="10" fill="#1E293B"/>
  <text x="380" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#F8FAFC">無形資産の支出が発生</text>
  <text x="380" y="90" text-anchor="middle" font-size="10.5" fill="#94A3B8">ソフト開発・特許・商標 etc.</text>

  <!-- Branch 1: 研究開発費 -->
  <line x1="280" y1="102" x2="160" y2="130" stroke="#EF4444" stroke-width="1.5"/>
  <text x="195" y="122" text-anchor="middle" font-size="9.5" fill="#EF4444">研究・開発段階</text>

  <rect x="30" y="132" width="260" height="130" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <rect x="30" y="132" width="260" height="28" rx="10" fill="#EF4444"/>
  <rect x="30" y="150" width="260" height="10" fill="#EF4444"/>
  <text x="160" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">研究開発費（費用処理）</text>
  <text x="160" y="176" text-anchor="middle" font-size="10.5" fill="#374151">将来の収益獲得が不確実な段階</text>
  <text x="160" y="194" text-anchor="middle" font-size="10.5" fill="#374151">原則として発生時に全額費用処理</text>
  <rect x="50" y="202" width="220" height="28" rx="5" fill="#FEE2E2"/>
  <text x="160" y="220" text-anchor="middle" font-size="10.5" fill="#DC2626">研究開発費 ×× ／ 現金預金 ××</text>
  <text x="160" y="248" text-anchor="middle" font-size="10" fill="#64748B">P/Lに一括費用計上（貸借対照表に乗らない）</text>

  <!-- Branch 2: ソフトウェア -->
  <line x1="480" y1="102" x2="600" y2="130" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="565" y="122" text-anchor="middle" font-size="9.5" fill="#3B82F6">収益獲得が確実</text>

  <rect x="470" y="132" width="260" height="130" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="470" y="132" width="260" height="28" rx="10" fill="#3B82F6"/>
  <rect x="470" y="150" width="260" height="10" fill="#3B82F6"/>
  <text x="600" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">ソフトウェア（資産計上）</text>
  <text x="600" y="176" text-anchor="middle" font-size="10.5" fill="#374151">将来の収益獲得・費用削減が確実</text>
  <text x="600" y="194" text-anchor="middle" font-size="10.5" fill="#374151">無形固定資産として計上し償却</text>
  <rect x="490" y="202" width="220" height="28" rx="5" fill="#DBEAFE"/>
  <text x="600" y="220" text-anchor="middle" font-size="10.5" fill="#1D4ED8">ソフトウェア ×× ／ 現金預金 ××</text>
  <text x="600" y="248" text-anchor="middle" font-size="10" fill="#64748B">B/Sに計上 → 毎年「ソフトウェア償却」で費用化</text>

  <!-- Bottom: 3種類のソフトウェア -->
  <rect x="30" y="282" width="700" height="84" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="380" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">ソフトウェアの3分類と処理</text>
  <rect x="50" y="312" width="196" height="44" rx="6" fill="#FEF9C3"/>
  <text x="148" y="330" text-anchor="middle" font-size="10.5" font-weight="700" fill="#713F12">市場販売目的</text>
  <text x="148" y="348" text-anchor="middle" font-size="10" fill="#374151">販売用製品として資産計上</text>

  <rect x="282" y="312" width="196" height="44" rx="6" fill="#FEF9C3"/>
  <text x="380" y="330" text-anchor="middle" font-size="10.5" font-weight="700" fill="#713F12">自社利用目的</text>
  <text x="380" y="348" text-anchor="middle" font-size="10" fill="#374151">確実性があれば資産計上</text>

  <rect x="514" y="312" width="196" height="44" rx="6" fill="#FEF9C3"/>
  <text x="612" y="330" text-anchor="middle" font-size="10.5" font-weight="700" fill="#713F12">委託開発</text>
  <text x="612" y="348" text-anchor="middle" font-size="10" fill="#374151">完成後に資産計上（仕掛中は仮計上）</text>
</svg>
