<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1080" width="360" height="1080">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1080" rx="16" fill="#FEFCF9"/>
  <text x="180" y="26" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">公認会計士試験 撤退後の</text>
  <text x="180" y="44" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">進路ナビゲートフローチャート</text>
  <text x="180" y="62" text-anchor="middle" font-size="10" fill="#94A3B8">どのルートを選んでも、積み上げた努力は消えません</text>

  <!-- スタート -->
  <rect x="80" y="78" width="200" height="66" rx="16" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="2.5"/>
  <text x="180" y="106" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">🎓 公認会計士</text>
  <text x="180" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">撤退を考えている</text>

  <path d="M180,144 L180,168 M172,158 L180,168 L188,158" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Q1 -->
  <rect x="55" y="178" width="250" height="64" rx="14" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
  <text x="180" y="204" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Q1. 会計の勉強自体は</text>
  <text x="180" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">好き？</text>

  <!-- Q1 NO -->
  <text x="180" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="#C2410C">NO ↓</text>
  <rect x="40" y="276" width="280" height="106" rx="14" fill="#FFEDD5" stroke="#FDBA74" stroke-width="2.5"/>
  <text x="180" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412">進路4：別分野へ進路変更</text>
  <text x="180" y="326" text-anchor="middle" font-size="10.5" fill="#78350F">本当は別の仕事に興味があるなら、</text>
  <text x="180" y="344" text-anchor="middle" font-size="10.5" fill="#78350F">方向転換も立派な選択</text>
  <text x="180" y="368" text-anchor="middle" font-size="10" fill="#C2410C">（Q1でYESの場合は下記へ）</text>

  <text x="180" y="414" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">YES ↓</text>
  <path d="M180,420 L180,444 M172,434 L180,444 L188,434" fill="none" stroke="#86EFAC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Q2 -->
  <rect x="55" y="454" width="250" height="64" rx="14" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
  <text x="180" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Q2. 今すぐ働きたい？</text>

  <!-- Q2 YES -->
  <text x="180" y="558" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">YES ↓</text>
  <rect x="40" y="570" width="280" height="106" rx="14" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2.5"/>
  <text x="180" y="596" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">進路3：就職・転職</text>
  <text x="180" y="620" text-anchor="middle" font-size="10.5" fill="#1E40AF">会計知識と継続力を経理・事務系の</text>
  <text x="180" y="638" text-anchor="middle" font-size="10.5" fill="#1E40AF">強みに変えて活動する</text>
  <text x="180" y="662" text-anchor="middle" font-size="10" fill="#1D4ED8">（Q2でNOの場合は下記へ）</text>

  <text x="180" y="708" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">NO ↓</text>
  <path d="M180,714 L180,738 M172,728 L180,738 L188,728" fill="none" stroke="#86EFAC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="180" y="762" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">会計学習を続ける2つのルート</text>

  <!-- 進路1：簿記1級 -->
  <rect x="30" y="778" width="300" height="126" rx="14" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2.5"/>
  <text x="180" y="806" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">進路1：簿記1級へ切り替え</text>
  <text x="180" y="830" text-anchor="middle" font-size="11" fill="#14532D">財務会計論・原価計算の積み上げを</text>
  <text x="180" y="850" text-anchor="middle" font-size="11" fill="#14532D">そのまま活かせる</text>

  <!-- 進路2：税理士 -->
  <rect x="30" y="920" width="300" height="126" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2.5"/>
  <text x="180" y="948" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5B21B6">進路2：税理士を目指す</text>
  <text x="180" y="972" text-anchor="middle" font-size="11" fill="#4C1D95">科目合格制で自分のペースを</text>
  <text x="180" y="992" text-anchor="middle" font-size="11" fill="#4C1D95">作れる</text>
</svg>
