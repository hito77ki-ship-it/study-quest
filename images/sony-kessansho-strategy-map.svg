<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">ソニーグループの「のれん」推移——買収で積み上がり、減損で見直される</text>

  <!-- 軸 -->
  <line x1="70" y1="300" x2="700" y2="300" stroke="#94A3B8" stroke-width="2"/>

  <!-- FY2023 -->
  <rect x="110" y="148" width="70" height="152" rx="4" fill="#93C5FD"/>
  <text x="145" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">1兆2,751億円</text>
  <text x="145" y="318" text-anchor="middle" font-size="11" fill="#475569">2023年3月期</text>

  <!-- FY2024 -->
  <rect x="260" y="122" width="70" height="178" rx="4" fill="#60A5FA"/>
  <text x="295" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">1兆4,871億円</text>
  <text x="295" y="318" text-anchor="middle" font-size="11" fill="#475569">2024年3月期</text>

  <!-- FY2025 -->
  <rect x="410" y="120" width="70" height="180" rx="4" fill="#3B82F6"/>
  <text x="445" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">1兆5,087億円</text>
  <text x="445" y="318" text-anchor="middle" font-size="11" fill="#475569">2025年3月期</text>

  <!-- FY2026 -->
  <rect x="560" y="100" width="70" height="200" rx="4" fill="#2563EB"/>
  <text x="595" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">1兆6,739億円</text>
  <text x="595" y="318" text-anchor="middle" font-size="11" fill="#475569">2026年3月期</text>

  <!-- バンジー買収コールアウト（引き出し線は数値ラベルと重なるため廃止、位置の近さで対応関係を示す） -->
  <rect x="30" y="20" width="270" height="42" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="165" y="36" text-anchor="middle" font-size="10.5" font-weight="700" fill="#9A3412">2022年 バンジー買収完了</text>
  <text x="165" y="52" text-anchor="middle" font-size="9.5" fill="#9A3412">取得関連費用 約5,140億円規模</text>

  <!-- 減損コールアウト -->
  <rect x="465" y="20" width="270" height="42" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="600" y="36" text-anchor="middle" font-size="10.5" font-weight="700" fill="#991B1B">2026年1〜3月期 のれん減損</text>
  <text x="600" y="52" text-anchor="middle" font-size="9.5" fill="#991B1B">ゲーム事業の一部で886億円を計上</text>

  <text x="380" y="350" text-anchor="middle" font-size="10.5" fill="#475569">「のれん」は買収のたびに積み上がる一方、状況が変われば減損で価値を見直すこともある</text>
  <text x="380" y="368" text-anchor="middle" font-size="9.5" fill="#94A3B8">※出典：IRBANKの集計データ（2026年7月時点）をもとに作成</text>
</svg>
