<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="420" rx="12" fill="#F8FAFC"/>

  <text x="380" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1A202C">悪質さに応じた罰則の4段階</text>

  <!-- 階段状のバー(悪質さが増すごとに高く・濃い色に) -->
  <rect x="50" y="300" width="150" height="70" rx="8" fill="#68D391"/>
  <rect x="220" y="260" width="150" height="110" rx="8" fill="#F6E05E"/>
  <rect x="390" y="200" width="150" height="170" rx="8" fill="#F6AD55"/>
  <rect x="560" y="130" width="150" height="240" rx="8" fill="#FC8181"/>

  <text x="125" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#22543D">①単純に遅れた</text>
  <text x="295" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#744210">②申告し忘れた</text>
  <text x="465" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#7B341E">③わざと隠した</text>
  <text x="635" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#742A2A">④悪質な脱税</text>

  <text x="125" y="335" text-anchor="middle" font-size="12" fill="#22543D">延滞税</text>
  <text x="295" y="315" text-anchor="middle" font-size="12" fill="#744210">無申告加算税</text>
  <text x="295" y="332" text-anchor="middle" font-size="11" fill="#744210">（5〜25%）</text>
  <text x="465" y="285" text-anchor="middle" font-size="12" fill="#7B341E">重加算税</text>
  <text x="465" y="302" text-anchor="middle" font-size="11" fill="#7B341E">（40%）</text>
  <text x="635" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#742A2A">刑事罰</text>
  <text x="635" y="262" text-anchor="middle" font-size="11" fill="#742A2A">拘禁刑・罰金</text>

  <line x1="50" y1="390" x2="710" y2="390" stroke="#CBD5E0" stroke-width="1.5"/>
  <text x="125" y="405" text-anchor="middle" font-size="11" fill="#4A5568">前科なし</text>
  <text x="295" y="405" text-anchor="middle" font-size="11" fill="#4A5568">前科なし</text>
  <text x="465" y="405" text-anchor="middle" font-size="11" fill="#4A5568">原則前科なし</text>
  <text x="635" y="405" text-anchor="middle" font-size="11" font-weight="700" fill="#C53030">前科がつく</text>
</svg>
