<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 696" width="360" height="696">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="696" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">宅建×マンション管理士 相乗効果マップ</text>
  <text x="180" y="44" text-anchor="middle" font-size="9.5" fill="#64748B">民法・区分所有法の重複を活かし、同年連続受験で最大化</text>

  <text x="16" y="70" font-size="12.5" font-weight="700" fill="#1E293B">① 試験範囲の重複エリア</text>

  <rect x="16" y="82" width="328" height="76" rx="10" fill="#F9A8D4" fill-opacity="0.35" stroke="#F472B6" stroke-width="1.5"/>
  <text x="180" y="104" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9D174D">宅建</text>
  <text x="180" y="122" text-anchor="middle" font-size="10.5" fill="#9D174D">宅建業法・法令上の制限・税その他</text>
  <text x="180" y="140" text-anchor="middle" font-size="10.5" fill="#9D174D">（独自分野）</text>

  <rect x="16" y="166" width="328" height="76" rx="10" fill="#C4B5FD" fill-opacity="0.4" stroke="#A78BFA" stroke-width="2"/>
  <text x="180" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">共通の土台</text>
  <text x="180" y="206" text-anchor="middle" font-size="10.5" fill="#7C3AED">民法・区分所有法・不動産登記法</text>
  <text x="180" y="224" text-anchor="middle" font-size="10.5" fill="#7C3AED">（両試験で活きる）</text>

  <rect x="16" y="250" width="328" height="76" rx="10" fill="#93C5FD" fill-opacity="0.35" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="180" y="272" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">マンション管理士</text>
  <text x="180" y="290" text-anchor="middle" font-size="10.5" fill="#1E40AF">標準管理規約・建物設備</text>
  <text x="180" y="308" text-anchor="middle" font-size="10.5" fill="#1E40AF">管理組合の会計（独自分野）</text>

  <text x="16" y="360" font-size="12.5" font-weight="700" fill="#1E293B">② 同年連続受験のシナジー戦略</text>

  <rect x="16" y="374" width="328" height="64" rx="10" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="180" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#9D174D">10月　宅建試験</text>
  <text x="180" y="418" text-anchor="middle" font-size="10" fill="#9D174D">まずここから受験</text>

  <line x1="180" y1="440" x2="180" y2="470" stroke="#94A3B8" stroke-width="2.5"/>
  <polygon points="180,470 173,458 187,458" fill="#94A3B8"/>
  <text x="180" y="452" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">記憶が新鮮なまま民法・</text>
  <text x="180" y="466" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">区分所有法を直結</text>

  <rect x="16" y="482" width="328" height="64" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="180" y="508" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">11月　マンション管理士試験</text>
  <text x="180" y="526" text-anchor="middle" font-size="10" fill="#1E40AF">1ヶ月後に連続受験</text>

  <!-- Bottom summary -->
  <rect x="16" y="576" width="328" height="100" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="600" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">🎯 相乗効果の鉄則：宅建で「民法・</text>
  <text x="180" y="618" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">区分所有法」の土台を固めてから</text>
  <text x="180" y="640" text-anchor="middle" font-size="10" fill="#374151">1ヶ月後のマンション管理士に直結——</text>
  <text x="180" y="656" text-anchor="middle" font-size="10" fill="#374151">同年連続受験が学習効率を最大化する黄金ルート</text>
</svg>
