<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 620" width="360" height="620" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">給料支払いの全体像——お金の流れを図解（モバイル版）</title>
  <desc id="svgdesc">総支給額の内訳、給料支払い時の借方・貸方仕訳、後日の預り金納付の流れを縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="620" fill="#FAFAFA" rx="12"/>

  <rect x="20" y="14" width="320" height="34" fill="#D1FAE5" rx="8"/>
  <text x="180" y="36" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065F46">給料支払いの全体像</text>

  <!-- 総支給額内訳 -->
  <text x="20" y="72" font-size="10.5" fill="#6B7280">総支給額 300,000円 の内訳</text>
  <rect x="20" y="80" width="320" height="34" fill="#6EE7B7" rx="6"/>
  <text x="180" y="102" text-anchor="middle" font-size="11.5" font-weight="700" fill="#065F46">手取り額 255,000円</text>

  <rect x="20" y="122" width="155" height="30" fill="#FCD34D" rx="4"/>
  <text x="97" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">社保 30,000</text>
  <rect x="185" y="122" width="155" height="30" fill="#FCA5A5" rx="4"/>
  <text x="262" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#9B2C2C">所得税 15,000</text>

  <!-- 仕訳 -->
  <rect x="20" y="172" width="320" height="330" fill="#fff" rx="10" stroke="#E2E8F0" stroke-width="1"/>
  <text x="180" y="196" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A202C">📝 給料支払い時の仕訳</text>

  <rect x="32" y="208" width="296" height="80" fill="#DBEAFE" rx="8"/>
  <text x="180" y="228" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1D4ED8">借方（かりかた）＝ 左</text>
  <rect x="42" y="236" width="276" height="30" fill="#fff" rx="6"/>
  <text x="52" y="256" font-size="11.5" font-weight="700" fill="#1D4ED8">給料</text>
  <text x="308" y="256" text-anchor="end" font-size="11.5" font-weight="700" fill="#1D4ED8">300,000</text>
  <text x="42" y="280" font-size="9" fill="#4B5563">← 総支給額で費用計上（控除前）</text>

  <rect x="32" y="298" width="296" height="140" fill="#FEF3C7" rx="8"/>
  <text x="180" y="318" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">貸方（かしかた）＝ 右</text>
  <rect x="42" y="326" width="276" height="26" fill="#fff" rx="4"/>
  <text x="50" y="344" font-size="10.5" font-weight="700" fill="#B91C1C">所得税預り金</text>
  <text x="308" y="344" text-anchor="end" font-size="10.5" font-weight="700" fill="#B91C1C">15,000</text>
  <rect x="42" y="358" width="276" height="26" fill="#fff" rx="4"/>
  <text x="50" y="376" font-size="10.5" font-weight="700" fill="#D97706">社会保険料預り金</text>
  <text x="308" y="376" text-anchor="end" font-size="10.5" font-weight="700" fill="#D97706">30,000</text>
  <rect x="42" y="390" width="276" height="26" fill="#fff" rx="4"/>
  <text x="50" y="408" font-size="10.5" font-weight="700" fill="#065F46">現金（手取り振込）</text>
  <text x="308" y="408" text-anchor="end" font-size="10.5" font-weight="700" fill="#065F46">255,000</text>

  <text x="180" y="470" text-anchor="middle" font-size="9.5" fill="#94A3B8">↓ 後日、税務署・社会保険事務所へ納付</text>

  <!-- 納付フロー -->
  <rect x="20" y="484" width="320" height="118" fill="#FFF7ED" rx="10" stroke="#FCD34D" stroke-width="1"/>
  <text x="180" y="508" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">📅 預り金を納付するとき</text>
  <rect x="32" y="520" width="296" height="58" fill="#fff" rx="6" stroke="#E2E8F0" stroke-width="1"/>
  <text x="180" y="542" text-anchor="middle" font-size="10.5" fill="#374151">借方：所得税預り金 15,000</text>
  <text x="180" y="564" text-anchor="middle" font-size="10.5" fill="#374151">貸方：現金 15,000</text>
  <text x="180" y="596" text-anchor="middle" font-size="9.5" fill="#6B7280">（預り金 → 現金で納付し預り金が消える）</text>
</svg>
