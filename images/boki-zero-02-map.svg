<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="380" rx="12" fill="#F8FAFC"/>
  <text x="380" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">簿記は「経理だけのもの」じゃない——こんな場面で役立つ</text>

  <!-- Card 1: 経理 -->
  <rect x="30" y="56" width="160" height="200" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="30" y="56" width="160" height="36" rx="10" fill="#3B82F6"/>
  <rect x="30" y="80" width="160" height="12" fill="#3B82F6"/>
  <text x="110" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">経理・会計担当</text>
  <text x="110" y="114" text-anchor="middle" font-size="28" fill="#3B82F6">📒</text>
  <text x="110" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">取引を正確に記録</text>
  <text x="110" y="166" text-anchor="middle" font-size="10.5" fill="#374151">仕訳・帳簿管理・</text>
  <text x="110" y="182" text-anchor="middle" font-size="10.5" fill="#374151">決算書の作成が仕事</text>
  <text x="110" y="206" text-anchor="middle" font-size="10" fill="#1D4ED8">→ 簿記は必須スキル</text>
  <text x="110" y="222" text-anchor="middle" font-size="10" fill="#1D4ED8">（特に2〜3級が評価）</text>
  <text x="110" y="242" text-anchor="middle" font-size="10" fill="#94A3B8">求人で「簿記2級以上」</text>
  <text x="110" y="256" text-anchor="middle" font-size="10" fill="#94A3B8">と書かれることが多い</text>

  <!-- Card 2: 営業 -->
  <rect x="210" y="56" width="160" height="200" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="210" y="56" width="160" height="36" rx="10" fill="#22C55E"/>
  <rect x="210" y="80" width="160" height="12" fill="#22C55E"/>
  <text x="290" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">営業・企画担当</text>
  <text x="290" y="114" text-anchor="middle" font-size="28" fill="#22C55E">💼</text>
  <text x="290" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">数字を読んで動く</text>
  <text x="290" y="166" text-anchor="middle" font-size="10.5" fill="#374151">売上・利益・コストの</text>
  <text x="290" y="182" text-anchor="middle" font-size="10.5" fill="#374151">構造が見えるようになる</text>
  <text x="290" y="206" text-anchor="middle" font-size="10" fill="#166534">→ 提案資料の説得力↑</text>
  <text x="290" y="222" text-anchor="middle" font-size="10" fill="#166534">→ 利益率の改善提案が</text>
  <text x="290" y="238" text-anchor="middle" font-size="10" fill="#166534">　自分でできるようになる</text>

  <!-- Card 3: 経営者 -->
  <rect x="390" y="56" width="160" height="200" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="390" y="56" width="160" height="36" rx="10" fill="#F97316"/>
  <rect x="390" y="80" width="160" height="12" fill="#F97316"/>
  <text x="470" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">経営者・管理職</text>
  <text x="470" y="114" text-anchor="middle" font-size="28" fill="#F97316">👑</text>
  <text x="470" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#C2410C">数字で意思決定</text>
  <text x="470" y="166" text-anchor="middle" font-size="10.5" fill="#374151">決算書を読んで</text>
  <text x="470" y="182" text-anchor="middle" font-size="10.5" fill="#374151">会社の状態を把握する</text>
  <text x="470" y="206" text-anchor="middle" font-size="10" fill="#C2410C">→ 投資するか節約するか</text>
  <text x="470" y="222" text-anchor="middle" font-size="10" fill="#C2410C">→ 黒字倒産を防げる</text>
  <text x="470" y="238" text-anchor="middle" font-size="10" fill="#94A3B8">（売上があっても現金がなければ倒産）</text>

  <!-- Card 4: 就職・投資 -->
  <rect x="570" y="56" width="160" height="200" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="570" y="56" width="160" height="36" rx="10" fill="#7C3AED"/>
  <rect x="570" y="80" width="160" height="12" fill="#7C3AED"/>
  <text x="650" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">就職・転職・投資</text>
  <text x="650" y="114" text-anchor="middle" font-size="28" fill="#7C3AED">🎯</text>
  <text x="650" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">人生全体で役立つ</text>
  <text x="650" y="166" text-anchor="middle" font-size="10.5" fill="#374151">就職活動での差別化</text>
  <text x="650" y="182" text-anchor="middle" font-size="10.5" fill="#374151">株式投資の企業分析</text>
  <text x="650" y="198" text-anchor="middle" font-size="10.5" fill="#374151">副業・フリーランスの</text>
  <text x="650" y="214" text-anchor="middle" font-size="10.5" fill="#374151">確定申告の自己管理</text>
  <text x="650" y="234" text-anchor="middle" font-size="10" fill="#5B21B6">→ 3級でも大きな武器に</text>

  <!-- bottom summary -->
  <rect x="30" y="274" width="700" height="90" rx="10" fill="#F0FFF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="380" y="296" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">簿記を学ぶ意味——「記録する力」は「読む力」でもある</text>
  <text x="380" y="318" text-anchor="middle" font-size="11" fill="#374151">簿記の記録ルールを知ると、会社の決算書（財務諸表）を自分で読めるようになります。</text>
  <text x="380" y="338" text-anchor="middle" font-size="11" fill="#374151">「この会社は儲かっているのか」「借金は返せるのか」が数字から分かる——</text>
  <text x="380" y="354" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">これはビジネスパーソン全員に役立つスキルです。</text>
</svg>
