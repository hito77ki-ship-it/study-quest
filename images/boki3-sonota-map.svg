<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="400" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">債権・債務と諸勘定の分類マップ</text>

  <!-- Left column: 資産（債権系） -->
  <rect x="30" y="56" width="330" height="300" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="30" y="56" width="330" height="36" rx="10" fill="#3B82F6"/>
  <rect x="30" y="82" width="330" height="10" fill="#3B82F6"/>
  <text x="195" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">資産（債権）— 受け取る権利</text>

  <!-- 前払金 -->
  <rect x="50" y="102" width="290" height="60" rx="8" fill="#DBEAFE"/>
  <text x="120" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">前払金</text>
  <text x="120" y="138" text-anchor="middle" font-size="10" fill="#1E40AF">（まえばらいきん）</text>
  <text x="260" y="120" text-anchor="middle" font-size="10.5" fill="#1E3A8A">商品受取前に手付金を払った</text>
  <text x="260" y="138" text-anchor="middle" font-size="10.5" fill="#1E3A8A">→ 後で商品を受け取る権利</text>
  <line x1="160" y1="102" x2="160" y2="162" stroke="#93C5FD" stroke-width="1"/>

  <!-- 仮払金 -->
  <rect x="50" y="172" width="290" height="60" rx="8" fill="#DBEAFE"/>
  <text x="120" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">仮払金</text>
  <text x="120" y="208" text-anchor="middle" font-size="10" fill="#1E40AF">（かりばらいきん）</text>
  <text x="260" y="190" text-anchor="middle" font-size="10.5" fill="#1E3A8A">内容不明・金額未確定で払った</text>
  <text x="260" y="208" text-anchor="middle" font-size="10.5" fill="#1E3A8A">→ 内容確定後に正科目へ振替</text>
  <line x1="160" y1="172" x2="160" y2="232" stroke="#93C5FD" stroke-width="1"/>

  <!-- 立替金 -->
  <rect x="50" y="242" width="290" height="60" rx="8" fill="#DBEAFE"/>
  <text x="120" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">立替金</text>
  <text x="120" y="278" text-anchor="middle" font-size="10" fill="#1E40AF">（たてかえきん）</text>
  <text x="260" y="260" text-anchor="middle" font-size="10.5" fill="#1E3A8A">第三者の費用を一時的に立替</text>
  <text x="260" y="278" text-anchor="middle" font-size="10.5" fill="#1E3A8A">→ 後で返してもらう権利</text>
  <line x1="160" y1="242" x2="160" y2="302" stroke="#93C5FD" stroke-width="1"/>

  <!-- 未収収益 -->
  <rect x="50" y="312" width="290" height="30" rx="6" fill="#BFDBFE"/>
  <text x="195" y="331" text-anchor="middle" font-size="10.5" fill="#1E3A8A">未収収益（未収入金）— まだ受け取っていない収益</text>

  <!-- Right column: 負債（債務系） -->
  <rect x="400" y="56" width="330" height="300" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="400" y="56" width="330" height="36" rx="10" fill="#F97316"/>
  <rect x="400" y="82" width="330" height="10" fill="#F97316"/>
  <text x="565" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">負債（債務）— 支払う義務</text>

  <!-- 前受金 -->
  <rect x="420" y="102" width="290" height="60" rx="8" fill="#FFEDD5"/>
  <text x="490" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#C2410C">前受金</text>
  <text x="490" y="138" text-anchor="middle" font-size="10" fill="#EA580C">（まえうけきん）</text>
  <text x="630" y="120" text-anchor="middle" font-size="10.5" fill="#7C2D12">商品渡す前に手付金を受取った</text>
  <text x="630" y="138" text-anchor="middle" font-size="10.5" fill="#7C2D12">→ 後で商品を渡す義務</text>
  <line x1="530" y1="102" x2="530" y2="162" stroke="#FDB97D" stroke-width="1"/>

  <!-- 仮受金 -->
  <rect x="420" y="172" width="290" height="60" rx="8" fill="#FFEDD5"/>
  <text x="490" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#C2410C">仮受金</text>
  <text x="490" y="208" text-anchor="middle" font-size="10" fill="#EA580C">（かりうけきん）</text>
  <text x="630" y="190" text-anchor="middle" font-size="10.5" fill="#7C2D12">内容不明・金額未確定で受取った</text>
  <text x="630" y="208" text-anchor="middle" font-size="10.5" fill="#7C2D12">→ 内容確定後に正科目へ振替</text>
  <line x1="530" y1="172" x2="530" y2="232" stroke="#FDB97D" stroke-width="1"/>

  <!-- 預り金 -->
  <rect x="420" y="242" width="290" height="60" rx="8" fill="#FFEDD5"/>
  <text x="490" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#C2410C">預り金</text>
  <text x="490" y="278" text-anchor="middle" font-size="10" fill="#EA580C">（あずかりきん）</text>
  <text x="630" y="260" text-anchor="middle" font-size="10.5" fill="#7C2D12">従業員の所得税・社会保険料等</text>
  <text x="630" y="278" text-anchor="middle" font-size="10.5" fill="#7C2D12">→ 後で納付する義務</text>
  <line x1="530" y1="242" x2="530" y2="302" stroke="#FDB97D" stroke-width="1"/>

  <!-- 未払費用 -->
  <rect x="420" y="312" width="290" height="30" rx="6" fill="#FED7AA"/>
  <text x="565" y="331" text-anchor="middle" font-size="10.5" fill="#7C2D12">未払費用（未払金）— まだ支払っていない費用</text>

  <!-- center divider label -->
  <text x="380" y="212" text-anchor="middle" font-size="20" fill="#CBD5E1">⇄</text>

  <!-- bottom note -->
  <rect x="30" y="368" width="700" height="24" rx="6" fill="#F1F5F9"/>
  <text x="380" y="384" text-anchor="middle" font-size="10.5" fill="#64748B">💡 「仮払・仮受」は後で必ず正しい科目へ振り替える ——決算でこれらが残ったままはNG</text>
</svg>
