<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1500" viewBox="0 0 360 1500" role="img" aria-labelledby="btitle bdesc">
  <title id="btitle">簿記3級 最速スタートダッシュ ロードマップ（モバイル版）</title>
  <desc id="bdesc">テキスト入手から仕訳マスター、PC模試体験、テストセンター突撃まで4ステップで合格するロードマップを縦に並べた図解</desc>
  <defs>
    <linearGradient id="bBgM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEFDF8"/>
      <stop offset="0.5" stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#F0FFF4"/>
    </linearGradient>
    <linearGradient id="bTitleM" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <style>.bt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="360" height="1500" rx="20" fill="url(#bBgM)"/>

  <rect x="20" y="20" width="320" height="76" rx="14" fill="url(#bTitleM)"/>
  <text x="180" y="42" text-anchor="middle" class="bt" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1">簿記3級 ネット試験対策</text>
  <text x="180" y="64" text-anchor="middle" class="bt" font-size="14" font-weight="800" fill="#FFFFFF">今日から合格までのロードマップ</text>
  <text x="180" y="84" text-anchor="middle" class="bt" font-size="10.5" fill="#64748B">学習時間の目安：50〜100時間</text>

  <!-- STEP1 -->
  <rect x="20" y="112" width="320" height="230" rx="16" fill="#EBF8FF" stroke="#90CDF4" stroke-width="1.5"/>
  <rect x="20" y="112" width="320" height="46" rx="16" fill="#4299E1"/>
  <text x="180" y="140" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#fff">STEP 1（0〜20時間）</text>
  <text x="180" y="190" text-anchor="middle" font-size="36">📘</text>
  <text x="180" y="230" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#2B6CB0">テキスト入手</text>
  <text x="180" y="250" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">スッキリわかる等、または無料の</text>
  <text x="180" y="268" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">CPAラーニングで初期装備を揃える！</text>

  <polygon points="160,352 200,352 180,376" fill="#90CDF4"/>

  <!-- STEP2 -->
  <rect x="20" y="386" width="320" height="230" rx="16" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.5"/>
  <rect x="20" y="386" width="320" height="46" rx="16" fill="#48BB78"/>
  <text x="180" y="414" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#fff">STEP 2（20〜60時間）</text>
  <text x="180" y="464" text-anchor="middle" font-size="36">📝</text>
  <text x="180" y="504" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#276749">仕訳マスター</text>
  <text x="180" y="524" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">借方・貸方の感覚を毎日10問ずつ</text>
  <text x="180" y="542" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#276749">体に染み込ませる。仕訳が完璧なら勝利！</text>

  <polygon points="160,660 200,660 180,684" fill="#9AE6B4"/>

  <!-- STEP3 -->
  <rect x="20" y="694" width="320" height="230" rx="16" fill="#FFFAF0" stroke="#F6AD55" stroke-width="1.5"/>
  <rect x="20" y="694" width="320" height="46" rx="16" fill="#ED8936"/>
  <text x="180" y="722" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#fff">STEP 3（60〜90時間）</text>
  <text x="180" y="772" text-anchor="middle" font-size="36">💻</text>
  <text x="180" y="812" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#C05621">PC模試体験</text>
  <text x="180" y="832" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">画面＋電卓＋白紙の3点セット操作に</text>
  <text x="180" y="850" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#C05621">慣れる。公式サンプル問題を必ず体験！</text>

  <polygon points="160,968 200,968 180,992" fill="#F6AD55"/>

  <!-- STEP4 -->
  <rect x="20" y="1002" width="320" height="230" rx="16" fill="#FAF5FF" stroke="#D6BCFA" stroke-width="1.5"/>
  <rect x="20" y="1002" width="320" height="46" rx="16" fill="#9F7AEA"/>
  <text x="180" y="1030" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#fff">STEP 4（90〜100時間）</text>
  <text x="180" y="1080" text-anchor="middle" font-size="36">⭐</text>
  <text x="180" y="1120" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#553C9A">テストセンター突撃！</text>
  <text x="180" y="1140" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">予約サイトで日程確定。退路を断てば</text>
  <text x="180" y="1158" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#9F7AEA">合格率が爆上がり！60分・70点以上で合格</text>

  <rect x="130" y="1246" width="100" height="40" rx="10" fill="#9F7AEA"/>
  <text x="180" y="1272" text-anchor="middle" class="bt" font-size="14" font-weight="700" fill="#fff">合格 GET!</text>

  <!-- Progress bar -->
  <rect x="20" y="1306" width="320" height="130" rx="14" fill="rgba(255,255,255,0.75)" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="36" y="1322" width="288" height="14" rx="7" fill="#E2E8F0"/>
  <rect x="36" y="1322" width="72" height="14" fill="#4299E1"/>
  <rect x="108" y="1322" width="72" height="14" fill="#48BB78"/>
  <rect x="180" y="1322" width="72" height="14" fill="#ED8936"/>
  <rect x="252" y="1322" width="72" height="14" rx="7" fill="#9F7AEA"/>
  <text x="36" y="1354" text-anchor="middle" class="bt" font-size="10" fill="#718096">0h</text>
  <text x="108" y="1354" text-anchor="middle" class="bt" font-size="10" fill="#718096">20h</text>
  <text x="180" y="1354" text-anchor="middle" class="bt" font-size="10" fill="#718096">60h</text>
  <text x="252" y="1354" text-anchor="middle" class="bt" font-size="10" fill="#718096">90h</text>
  <text x="324" y="1354" text-anchor="middle" class="bt" font-size="10" font-weight="700" fill="#9F7AEA">100h</text>
  <text x="180" y="1382" text-anchor="middle" class="bt" font-size="10.5" fill="#4A5568">ネット試験は4ステップを終えたら、</text>
  <text x="180" y="1400" text-anchor="middle" class="bt" font-size="10.5" fill="#4A5568">全国のテストセンターで明日からでも受験できます</text>
  <text x="180" y="1422" text-anchor="middle" class="bt" font-size="10.5" font-weight="700" fill="#8CC63F">合格後すぐに画面で合否が分かるのが最大の魅力！</text>
</svg>
