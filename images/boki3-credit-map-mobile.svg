<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1000" width="360" height="1000">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1000" rx="16" fill="#FEFCF9"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">クレジット売掛金と支払手数料の</text>
  <text x="180" y="44" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">3者間キャッシュフロー</text>
  <text x="180" y="62" text-anchor="middle" font-size="9.5" fill="#94A3B8">当社が現金を受け取る相手は</text>
  <text x="180" y="76" text-anchor="middle" font-size="9.5" fill="#94A3B8">「顧客」ではなく「信販会社」</text>

  <!-- 3 entities -->
  <rect x="16" y="92" width="328" height="56" rx="12" fill="#FEF3C7" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">顧客</text>
  <text x="180" y="132" text-anchor="middle" font-size="10" fill="#78350F">クレジットで購入する人</text>

  <path d="M180,150 L180,168 M172,160 L180,168 L188,160" fill="none" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">① クレジット販売（現金は動かない）</text>

  <rect x="16" y="196" width="328" height="56" rx="12" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="180" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">当社</text>
  <text x="180" y="236" text-anchor="middle" font-size="10" fill="#1E40AF">商品を販売する側</text>

  <path d="M180,254 L180,272 M172,264 L180,272 L188,264" fill="none" stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="288" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">② 立替を依頼（クレジット売掛金が発生）</text>

  <rect x="16" y="300" width="328" height="56" rx="12" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">信販会社</text>
  <text x="180" y="340" text-anchor="middle" font-size="10" fill="#14532D">カード会社・立替払い</text>

  <path d="M180,358 L180,376 M172,368 L180,376 L188,368" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="16" y="388" width="328" height="52" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">③ 手数料を差し引いた額を入金</text>
  <text x="180" y="424" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">（実際に現金が動くのはここだけ！）</text>

  <rect x="16" y="452" width="328" height="46" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="180" y="472" text-anchor="middle" font-size="9.5" fill="#64748B">④ 顧客は後日カード会社へ支払い</text>
  <text x="180" y="488" text-anchor="middle" font-size="9.5" fill="#64748B">（当社には関係なし）</text>

  <!-- 仕訳サマリー -->
  <rect x="16" y="516" width="328" height="450" rx="14" fill="#fff" stroke="#E2E8F0" stroke-width="2"/>
  <text x="180" y="542" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">📝 各タイミングの仕訳</text>

  <rect x="32" y="556" width="296" height="94" rx="10" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="180" y="578" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">① 販売時</text>
  <text x="180" y="598" text-anchor="middle" font-size="10.5" fill="#374151">クレジット売掛金 9,700</text>
  <text x="180" y="614" text-anchor="middle" font-size="10.5" fill="#374151">支払手数料　　　　300</text>
  <text x="180" y="634" text-anchor="middle" font-size="10.5" fill="#374151">／ 売上　10,000</text>

  <rect x="32" y="660" width="296" height="94" rx="10" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="180" y="682" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">③ 入金時</text>
  <text x="180" y="702" text-anchor="middle" font-size="10.5" fill="#374151">現金　　　　9,700</text>
  <text x="180" y="720" text-anchor="middle" font-size="10.5" fill="#374151">／ クレジット売掛金</text>
  <text x="180" y="738" text-anchor="middle" font-size="10.5" fill="#374151">　　　　　　9,700</text>

  <rect x="32" y="764" width="296" height="126" rx="10" fill="#FEF3C7" stroke="#FDE68A"/>
  <text x="180" y="786" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">⚠️ ポイント</text>
  <text x="180" y="806" text-anchor="middle" font-size="10" fill="#78350F">売掛金 ≠ クレジット売掛金</text>
  <text x="180" y="826" text-anchor="middle" font-size="9.5" fill="#78350F">売掛金 → 顧客からもらう権利</text>
  <text x="180" y="844" text-anchor="middle" font-size="9.5" fill="#78350F">クレジット売掛金 →</text>
  <text x="180" y="860" text-anchor="middle" font-size="9.5" fill="#78350F">信販会社からもらう権利</text>
</svg>
