<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="380" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">材料費——仕入から消費・計算までの全フロー</text>

  <!-- Top: 材料費の流れ -->
  <rect x="30" y="54" width="130" height="64" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="95" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#713F12">材料購入</text>
  <text x="95" y="96" text-anchor="middle" font-size="10" fill="#374151">購入代価</text>
  <text x="95" y="110" text-anchor="middle" font-size="10" fill="#374151">＋引取費用</text>

  <polygon points="172,86 161,81 161,91" fill="#64748B"/>
  <line x1="160" y1="86" x2="162" y2="86" stroke="#64748B" stroke-width="1.5"/>

  <rect x="172" y="54" width="160" height="64" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="252" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">材料勘定（倉庫）</text>
  <text x="252" y="94" text-anchor="middle" font-size="10" fill="#374151">月初残高 ＋ 当月購入</text>
  <text x="252" y="110" text-anchor="middle" font-size="10" fill="#374151">−月末残高 ＝ 消費額</text>

  <polygon points="344,86 333,81 333,91" fill="#64748B"/>

  <rect x="344" y="54" width="190" height="64" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="439" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">消費（払出）</text>
  <text x="439" y="92" text-anchor="middle" font-size="10" fill="#374151">直接材料費 → 仕掛品</text>
  <text x="439" y="108" text-anchor="middle" font-size="10" fill="#374151">間接材料費 → 製造間接費</text>

  <polygon points="546,86 535,81 535,91" fill="#64748B"/>

  <rect x="546" y="54" width="184" height="64" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="638" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">製品原価へ</text>
  <text x="638" y="94" text-anchor="middle" font-size="10" fill="#374151">仕掛品 → 製品 →</text>
  <text x="638" y="110" text-anchor="middle" font-size="10" fill="#374151">売上原価（P/L）</text>

  <!-- 単価計算 -->
  <text x="380" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">消費単価の計算方法——先入先出法 vs 移動平均法</text>

  <!-- Left: 先入先出法 -->
  <rect x="30" y="164" width="340" height="176" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="30" y="164" width="340" height="30" rx="10" fill="#F97316"/>
  <rect x="30" y="184" width="340" height="10" fill="#F97316"/>
  <text x="200" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">先入先出法（FIFO）</text>
  <text x="200" y="208" text-anchor="middle" font-size="10.5" fill="#374151">古い仕入分から先に払い出す</text>
  <rect x="50" y="216" width="300" height="72" rx="6" fill="#FFEDD5"/>
  <text x="200" y="234" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">計算例</text>
  <text x="60" y="252" font-size="10" fill="#374151">月初：100個 @200円</text>
  <text x="60" y="268" font-size="10" fill="#374151">当月仕入：200個 @220円</text>
  <text x="60" y="284" font-size="10" fill="#374151">消費：150個 → 先に月初100個(@200)＋50個(@220)</text>
  <text x="200" y="322" text-anchor="middle" font-size="10" fill="#C2410C">消費額 ＝ 100×200 ＋ 50×220 ＝ 31,000円</text>
  <text x="200" y="336" text-anchor="middle" font-size="10" fill="#64748B">物価上昇局面では消費単価が低くなりやすい</text>

  <!-- Right: 移動平均法 -->
  <rect x="390" y="164" width="340" height="176" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="390" y="164" width="340" height="30" rx="10" fill="#3B82F6"/>
  <rect x="390" y="184" width="340" height="10" fill="#3B82F6"/>
  <text x="560" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">移動平均法</text>
  <text x="560" y="208" text-anchor="middle" font-size="10.5" fill="#374151">仕入のたびに平均単価を計算し直す</text>
  <rect x="410" y="216" width="300" height="72" rx="6" fill="#DBEAFE"/>
  <text x="560" y="234" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">計算例</text>
  <text x="400" y="252" font-size="10" fill="#374151">月初：100個 @200円 ＝ 20,000円</text>
  <text x="400" y="268" font-size="10" fill="#374151">仕入後：（20,000＋200×220）÷ 300個 ＝ @213.3円</text>
  <text x="400" y="284" font-size="10" fill="#374151">消費：150個 × @213.3円</text>
  <text x="560" y="322" text-anchor="middle" font-size="10" fill="#1E40AF">消費額 ＝ 150 × 213.3 ≈ 31,997円</text>
  <text x="560" y="336" text-anchor="middle" font-size="10" fill="#64748B">仕入のたびに平均単価が更新される</text>
</svg>
