<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 760" width="360" height="760">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="760" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">ダウンストリーム vs アップストリーム</text>
  <text x="180" y="44" text-anchor="middle" font-size="10.5" fill="#64748B">仕訳の本数がひと目でわかる比較</text>

  <!-- ダウンストリーム -->
  <rect x="16" y="60" width="328" height="300" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">ダウンストリーム（親→子）</text>
  <text x="180" y="100" text-anchor="middle" font-size="9.5" fill="#3B5A8A">売り手＝親会社／利益は親会社のもの</text>

  <rect x="30" y="112" width="300" height="52" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="180" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">① 売上高 ／ 売上原価</text>
  <text x="180" y="150" text-anchor="middle" font-size="9.5" fill="#3B5A8A">グループ内の売上・仕入を相殺</text>

  <rect x="30" y="174" width="300" height="52" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="180" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">② 売上原価 ／ 商品</text>
  <text x="180" y="212" text-anchor="middle" font-size="9.5" fill="#3B5A8A">未実現利益を消去</text>

  <rect x="30" y="236" width="300" height="52" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-dasharray="4,3"/>
  <text x="180" y="256" text-anchor="middle" font-size="10.5" fill="#94A3B8">③ 非支配株主持分の調整</text>
  <text x="180" y="274" text-anchor="middle" font-size="9.5" fill="#94A3B8">不要（親会社の利益のため）</text>

  <rect x="30" y="300" width="300" height="46" rx="8" fill="#1E40AF"/>
  <text x="180" y="329" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">仕訳は2本だけ</text>

  <!-- アップストリーム -->
  <rect x="16" y="380" width="328" height="340" rx="10" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="180" y="404" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">アップストリーム（子→親）</text>
  <text x="180" y="420" text-anchor="middle" font-size="9.5" fill="#9A6B2E">売り手＝子会社／利益は子会社のもの</text>

  <rect x="30" y="432" width="300" height="52" rx="8" fill="#FFEDD5" stroke="#FDBA74"/>
  <text x="180" y="452" text-anchor="middle" font-size="11" font-weight="700" fill="#9A3412">① 売上高 ／ 売上原価</text>
  <text x="180" y="470" text-anchor="middle" font-size="9.5" fill="#9A6B2E">グループ内の売上・仕入を相殺</text>

  <rect x="30" y="494" width="300" height="52" rx="8" fill="#FFEDD5" stroke="#FDBA74"/>
  <text x="180" y="514" text-anchor="middle" font-size="11" font-weight="700" fill="#9A3412">② 売上原価 ／ 商品</text>
  <text x="180" y="532" text-anchor="middle" font-size="9.5" fill="#9A6B2E">未実現利益を消去</text>

  <rect x="30" y="556" width="300" height="74" rx="8" fill="#FED7AA" stroke="#F97316" stroke-width="2"/>
  <text x="180" y="576" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7C2D12">③ 非支配株主持分 ／</text>
  <text x="180" y="592" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7C2D12">非支配株主に帰属する当期純利益</text>
  <text x="180" y="610" text-anchor="middle" font-size="9" fill="#7C2D12">未実現利益×非支配株主持分割合を調整</text>

  <rect x="30" y="642" width="300" height="46" rx="8" fill="#C2410C"/>
  <text x="180" y="671" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">仕訳は3本になる</text>

  <text x="180" y="736" text-anchor="middle" font-size="10" fill="#475569">①②は共通、違いは「③」があるかどうかの1点だけ</text>
</svg>
