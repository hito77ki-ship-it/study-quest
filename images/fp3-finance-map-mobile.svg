<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1180" width="360" height="1180" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">FP3級 金融資産運用——債券・株式・投資信託の頻出ポイント（モバイル版）</title>
  <desc id="svgdesc">債券・株式・投資信託それぞれの仕組みと頻出計算・税制ポイントを縦に並べた図解</desc>
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1180" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">FP3級 金融資産運用</text>
  <text x="180" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1E293B">債券・株式・投資信託の頻出ポイント</text>

  <!-- 債券 -->
  <rect x="16" y="60" width="328" height="300" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="60" width="328" height="28" rx="10" fill="#3B82F6"/>
  <text x="180" y="79" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">債券</text>
  <text x="180" y="102" text-anchor="middle" font-size="10" fill="#374151">お金を貸して利息をもらう証券</text>
  <rect x="30" y="110" width="300" height="40" rx="5" fill="#DBEAFE"/>
  <text x="180" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">利回り計算（直接利回り）</text>
  <text x="180" y="142" text-anchor="middle" font-size="10" fill="#1D4ED8">年利息 ÷ 購入価格 × 100</text>
  <text x="180" y="166" text-anchor="middle" font-size="9.5" fill="#374151">金利↑ → 債券価格↓（逆相関）</text>
  <text x="180" y="182" text-anchor="middle" font-size="9.5" fill="#374151">格付けが高いほど利回りは低い</text>
  <text x="180" y="202" text-anchor="middle" font-size="9.5" fill="#64748B">国債：元本保証に近い</text>
  <text x="180" y="218" text-anchor="middle" font-size="9.5" fill="#64748B">社債：発行企業が倒産→デフォルト</text>
  <text x="180" y="234" text-anchor="middle" font-size="9.5" fill="#64748B">個人向け国債：変動10年・固定5年・3年</text>
  <text x="180" y="254" text-anchor="middle" font-size="9.5" fill="#374151">利子所得：20.315%の源泉徴収</text>
  <text x="180" y="270" text-anchor="middle" font-size="9.5" fill="#374151">（所得税15.315%＋住民税5%）</text>
  <text x="180" y="286" text-anchor="middle" font-size="9.5" fill="#64748B">申告分離課税or確定申告不要</text>

  <!-- 株式 -->
  <rect x="16" y="376" width="328" height="300" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="16" y="376" width="328" height="28" rx="10" fill="#F97316"/>
  <text x="180" y="395" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">株式</text>
  <text x="180" y="418" text-anchor="middle" font-size="10" fill="#374151">企業の所有権（議決権あり）</text>
  <rect x="30" y="426" width="300" height="56" rx="5" fill="#FFEDD5"/>
  <text x="180" y="442" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">主な指標</text>
  <text x="180" y="458" text-anchor="middle" font-size="9.5" fill="#374151">PER：株価÷EPS（割高・割安）</text>
  <text x="180" y="474" text-anchor="middle" font-size="9.5" fill="#374151">PBR：株価÷BPS（純資産比）／配当利回り：配当÷株価×100</text>
  <text x="180" y="502" text-anchor="middle" font-size="9.5" fill="#64748B">値上がり益（キャピタルゲイン）</text>
  <text x="180" y="518" text-anchor="middle" font-size="9.5" fill="#64748B">配当（インカムゲイン）</text>
  <text x="180" y="538" text-anchor="middle" font-size="9.5" fill="#374151">配当所得：20.315%源泉徴収</text>
  <text x="180" y="554" text-anchor="middle" font-size="9.5" fill="#374151">譲渡益：申告分離課税20.315%</text>
  <text x="180" y="574" text-anchor="middle" font-size="9.5" fill="#64748B">NISA：非課税口座で運用可</text>
  <text x="180" y="590" text-anchor="middle" font-size="9.5" fill="#64748B">つみたてNISA / 成長投資枠</text>

  <!-- 投資信託 -->
  <rect x="16" y="692" width="328" height="300" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="692" width="328" height="28" rx="10" fill="#22C55E"/>
  <text x="180" y="711" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">投資信託</text>
  <text x="180" y="734" text-anchor="middle" font-size="10" fill="#374151">みんなでお金を集めてプロが運用</text>
  <rect x="30" y="742" width="300" height="56" rx="5" fill="#DCFCE7"/>
  <text x="180" y="758" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">基準価額と費用</text>
  <text x="180" y="774" text-anchor="middle" font-size="9.5" fill="#374151">基準価額：1万口あたりの時価</text>
  <text x="180" y="790" text-anchor="middle" font-size="9.5" fill="#374151">信託報酬：保有中に毎年／販売手数料：購入時</text>
  <text x="180" y="818" text-anchor="middle" font-size="9.5" fill="#64748B">アクティブ型：市場平均超え狙い</text>
  <text x="180" y="834" text-anchor="middle" font-size="9.5" fill="#64748B">パッシブ型（インデックス）：市場連動</text>
  <text x="180" y="854" text-anchor="middle" font-size="9.5" fill="#374151">分配金：普通分配金（課税）</text>
  <text x="180" y="870" text-anchor="middle" font-size="9.5" fill="#374151">　　　　特別分配金（元本払戻・非課税）</text>
  <text x="180" y="890" text-anchor="middle" font-size="9.5" fill="#64748B">ETF：取引所でリアルタイム売買</text>
  <text x="180" y="906" text-anchor="middle" font-size="9.5" fill="#64748B">REIT：不動産投資信託</text>

  <!-- Bottom hint -->
  <rect x="16" y="1024" width="328" height="46" rx="6" fill="#F1F5F9"/>
  <text x="180" y="1042" text-anchor="middle" font-size="9.5" fill="#475569">💡 金利↑→債券価格↓は絶対暗記。株式の3指標</text>
  <text x="180" y="1058" text-anchor="middle" font-size="9.5" fill="#475569">（PER・PBR・配当利回り）の計算式もセットで覚える。</text>

  <rect x="16" y="1078" width="328" height="46" rx="6" fill="#F1F5F9"/>
  <text x="180" y="1096" text-anchor="middle" font-size="9.5" fill="#475569">💡 投資信託の「特別分配金は元本払戻なので非課税」</text>
  <text x="180" y="1112" text-anchor="middle" font-size="9.5" fill="#475569">は頻出引っかけ。普通分配金は課税。</text>
</svg>
