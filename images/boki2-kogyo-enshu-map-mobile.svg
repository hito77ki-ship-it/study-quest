<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1400" width="360" height="1400" role="img" aria-labelledby="t d">
  <title id="t">工業簿記 第4問・第5問——解法の王道フロー（モバイル版）</title>
  <desc id="d">問題文を読む・原価の分類・T字勘定を書く・数値を計算・解答欄に転記の5ステップと、材料から売上原価までの勘定フローを縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1400" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">工業簿記 第4問・第5問</text>
  <text x="180" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">解法の王道フロー</text>

  <rect x="16" y="64" width="328" height="86" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="30" y="74" width="70" height="20" rx="10" fill="#F97316"/>
  <text x="65" y="88" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">STEP 1</text>
  <text x="30" y="114" font-size="12" font-weight="700" fill="#C2410C">問題文を読む</text>
  <text x="30" y="132" font-size="10.5" fill="#374151">何を聞かれているか確認、論点を特定</text>

  <text x="180" y="168" text-anchor="middle" font-size="14" fill="#CBD5E1">↓</text>

  <rect x="16" y="176" width="328" height="86" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="30" y="186" width="70" height="20" rx="10" fill="#3B82F6"/>
  <text x="65" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">STEP 2</text>
  <text x="30" y="226" font-size="12" font-weight="700" fill="#1E40AF">原価の分類</text>
  <text x="30" y="244" font-size="10.5" fill="#374151">材料費・労務費・経費を直接/間接に仕分け</text>

  <text x="180" y="280" text-anchor="middle" font-size="14" fill="#CBD5E1">↓</text>

  <rect x="16" y="288" width="328" height="86" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="30" y="298" width="70" height="20" rx="10" fill="#7C3AED"/>
  <text x="65" y="312" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">STEP 3</text>
  <text x="30" y="338" font-size="12" font-weight="700" fill="#5B21B6">T字勘定を書く</text>
  <text x="30" y="356" font-size="10.5" fill="#374151">材料／賃金・製造間接費／仕掛品の流れ</text>

  <text x="180" y="392" text-anchor="middle" font-size="14" fill="#CBD5E1">↓</text>

  <rect x="16" y="400" width="328" height="86" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <rect x="30" y="410" width="70" height="20" rx="10" fill="#EAB308"/>
  <text x="65" y="424" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">STEP 4</text>
  <text x="30" y="450" font-size="12" font-weight="700" fill="#713F12">数値を計算</text>
  <text x="30" y="468" font-size="10.5" fill="#374151">消費額・配賦額・差異・完成品原価を計算</text>

  <text x="180" y="504" text-anchor="middle" font-size="14" fill="#CBD5E1">↓</text>

  <rect x="16" y="512" width="328" height="86" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="30" y="522" width="70" height="20" rx="10" fill="#22C55E"/>
  <text x="65" y="536" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">STEP 5</text>
  <text x="30" y="562" font-size="12" font-weight="700" fill="#166534">解答欄に転記</text>
  <text x="30" y="580" font-size="10.5" fill="#374151">仕訳・計算結果を丁寧に転記、符号ミス注意</text>

  <text x="180" y="622" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">工業簿記の勘定フロー</text>

  <rect x="16" y="638" width="328" height="52" rx="8" fill="#FFF7ED" stroke="#FDB97D" stroke-width="1.5"/>
  <text x="30" y="662" font-size="11.5" font-weight="700" fill="#C2410C">材料</text>
  <text x="30" y="680" font-size="10" fill="#374151">直接→仕掛品／間接→製造間接費</text>
  <text x="180" y="706" text-anchor="middle" font-size="13" fill="#64748B">↓</text>

  <rect x="16" y="714" width="328" height="52" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="30" y="738" font-size="11.5" font-weight="700" fill="#1E40AF">賃金・給料</text>
  <text x="30" y="756" font-size="10" fill="#374151">直接→仕掛品／間接→製造間接費</text>
  <text x="180" y="782" text-anchor="middle" font-size="13" fill="#64748B">↓</text>

  <rect x="16" y="790" width="328" height="52" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="30" y="814" font-size="11.5" font-weight="700" fill="#5B21B6">製造間接費</text>
  <text x="30" y="832" font-size="10" fill="#374151">配賦 → 仕掛品へ</text>
  <text x="180" y="858" text-anchor="middle" font-size="13" fill="#64748B">↓</text>

  <rect x="16" y="866" width="328" height="52" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="30" y="890" font-size="11.5" font-weight="700" fill="#713F12">仕掛品</text>
  <text x="30" y="908" font-size="10" fill="#374151">3費用集積 → 完成で製品へ</text>
  <text x="180" y="934" text-anchor="middle" font-size="13" fill="#22C55E">↓</text>

  <rect x="16" y="942" width="328" height="52" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="30" y="966" font-size="11.5" font-weight="700" fill="#166534">製品</text>
  <text x="30" y="984" font-size="10" fill="#374151">完成品 → 売上時に費用</text>
  <text x="180" y="1010" text-anchor="middle" font-size="13" fill="#EF4444">↓</text>

  <rect x="16" y="1018" width="328" height="52" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="30" y="1042" font-size="11.5" font-weight="700" fill="#DC2626">売上原価</text>
  <text x="30" y="1060" font-size="10" fill="#374151">販売した分 → P/Lへ</text>

  <rect x="16" y="1090" width="328" height="130" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="180" y="1114" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">演習でよく出る計算パターン</text>
  <text x="30" y="1138" font-size="10" fill="#475569">・材料消費額：先入先出法/平均法で単価計算</text>
  <text x="30" y="1158" font-size="10" fill="#475569">・製造間接費配賦：予定配賦率×直接作業時間</text>
  <text x="30" y="1178" font-size="10" fill="#475569">・仕掛品：月初＋当月投入－月末＝完成品原価</text>
</svg>
