<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" width="760" height="430">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="430" rx="12" fill="#FAFAFC"/>
  <text x="380" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">基本情報 × 応用情報 比較と「午前共通」相乗効果マップ</text>

  <!-- FE card -->
  <rect x="40" y="56" width="310" height="230" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="40" y="56" width="310" height="42" rx="14" fill="#4ADE80"/>
  <rect x="40" y="84" width="310" height="14" fill="#4ADE80"/>
  <text x="195" y="83" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">基本情報技術者（FE）— レベル2</text>
  <text x="65" y="122" font-size="11.5" fill="#166534">🗓 試験形式：CBT方式（通年いつでも受験）</text>
  <text x="65" y="146" font-size="11.5" fill="#166534">📊 合格率：約40〜50%</text>
  <text x="65" y="170" font-size="11.5" fill="#166534">⏱ 必要勉強時間：150〜200時間</text>
  <text x="65" y="194" font-size="11.5" fill="#166534">✍ 午後試験：アルゴリズム＋プログラミング必須</text>
  <text x="65" y="222" font-size="10.5" fill="#4D7C59">向いている人：</text>
  <text x="65" y="240" font-size="10.5" fill="#4D7C59">IT未経験・学生・まず基礎固めしたい人</text>
  <text x="65" y="262" font-size="10.5" fill="#4D7C59">通年受験なので「準備できたら即受験」できる</text>

  <!-- AP card -->
  <rect x="410" y="56" width="310" height="230" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="410" y="56" width="310" height="42" rx="14" fill="#60A5FA"/>
  <rect x="410" y="84" width="310" height="14" fill="#60A5FA"/>
  <text x="565" y="83" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">応用情報技術者（AP）— レベル3</text>
  <text x="435" y="122" font-size="11.5" fill="#1E40AF">🗓 試験形式：年2回（4月・10月）記述式</text>
  <text x="435" y="146" font-size="11.5" fill="#1E40AF">📊 合格率：約20〜25%</text>
  <text x="435" y="170" font-size="11.5" fill="#1E40AF">⏱ 必要勉強時間：300〜500時間</text>
  <text x="435" y="194" font-size="11.5" fill="#1E40AF">✍ 午後試験：論述式（11題中5題を選択）</text>
  <text x="435" y="222" font-size="10.5" fill="#3B5B8C">向いている人：</text>
  <text x="435" y="240" font-size="10.5" fill="#3B5B8C">中堅エンジニア・転職/昇格を狙う人</text>
  <text x="435" y="262" font-size="10.5" fill="#3B5B8C">プログラミング不要の「経営戦略」等も選択可</text>

  <!-- Connector arrows -->
  <line x1="195" y1="286" x2="330" y2="332" stroke="#FBBF24" stroke-width="2.5"/>
  <line x1="565" y1="286" x2="430" y2="332" stroke="#FBBF24" stroke-width="2.5"/>
  <polygon points="380,340 368,326 392,326" fill="#FBBF24"/>

  <!-- Synergy banner -->
  <rect x="90" y="336" width="580" height="76" rx="14" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="362" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400E">🔗 午前試験は共通範囲！これが最大の相乗効果</text>
  <text x="380" y="382" text-anchor="middle" font-size="10.5" fill="#78350F">FEの午前（科目A）対策はそのままAPの午前対策に直結する。先にFEを取れば、</text>
  <text x="380" y="399" text-anchor="middle" font-size="10.5" fill="#78350F">AP受験時は「午後の論述対策」だけに集中でき、学習効率が大きく上がる。</text>
</svg>
