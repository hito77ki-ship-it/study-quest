<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="380" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">会社法・商業登記法——機関設計・株式・登記の頻出論点マップ</text>

  <!-- 機関設計 -->
  <rect x="20" y="52" width="224" height="268" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="20" y="52" width="224" height="28" rx="10" fill="#3B82F6"/>
  <rect x="20" y="70" width="224" height="10" fill="#3B82F6"/>
  <text x="132" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">株式会社の機関</text>

  <rect x="36" y="88" width="192" height="26" rx="5" fill="#DBEAFE"/>
  <text x="132" y="105" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">株主総会（最高意思決定機関）</text>
  <text x="36" y="122" font-size="10" fill="#374151">定款変更・合併承認・取締役選任</text>
  <text x="36" y="138" font-size="10" fill="#374151">特別決議（2/3以上）・普通決議（1/2超）</text>

  <rect x="36" y="148" width="192" height="26" rx="5" fill="#DBEAFE"/>
  <text x="132" y="165" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">取締役・取締役会</text>
  <text x="36" y="182" font-size="10" fill="#374151">公開会社：取締役会設置義務</text>
  <text x="36" y="198" font-size="10" fill="#374151">非公開会社：取締役1名でもOK</text>

  <rect x="36" y="208" width="192" height="26" rx="5" fill="#DBEAFE"/>
  <text x="132" y="225" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">監査役・会計監査人</text>
  <text x="36" y="242" font-size="10" fill="#374151">大会社（資本5億以上 or 負債200億以上）</text>
  <text x="36" y="258" font-size="10" fill="#374151">→会計監査人設置義務</text>

  <rect x="36" y="268" width="192" height="26" rx="5" fill="#DBEAFE"/>
  <text x="132" y="285" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1D4ED8">代表取締役</text>
  <text x="36" y="302" font-size="10" fill="#374151">取締役会設置：取締役会で選定</text>
  <text x="36" y="318" font-size="10" fill="#374151">取締役会なし：取締役全員が代表</text>

  <!-- 株式 -->
  <rect x="268" y="52" width="224" height="268" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="268" y="52" width="224" height="28" rx="10" fill="#F97316"/>
  <rect x="268" y="70" width="224" height="10" fill="#F97316"/>
  <text x="380" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">株式</text>

  <rect x="284" y="88" width="192" height="26" rx="5" fill="#FFEDD5"/>
  <text x="380" y="105" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">株式の種類</text>
  <text x="284" y="122" font-size="10" fill="#374151">普通株式・優先株式・劣後株式</text>
  <text x="284" y="138" font-size="10" fill="#374151">議決権制限株式・譲渡制限株式</text>

  <rect x="284" y="148" width="192" height="26" rx="5" fill="#FFEDD5"/>
  <text x="380" y="165" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">株式譲渡</text>
  <text x="284" y="182" font-size="10" fill="#374151">非公開会社：定款で取締役会承認が必要</text>
  <text x="284" y="198" font-size="10" fill="#374151">公開会社：原則として自由に譲渡可能</text>

  <rect x="284" y="208" width="192" height="26" rx="5" fill="#FFEDD5"/>
  <text x="380" y="225" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">自己株式の取得</text>
  <text x="284" y="242" font-size="10" fill="#374151">株主総会の決議が原則必要</text>
  <text x="284" y="258" font-size="10" fill="#374151">財源規制（分配可能額）あり</text>

  <rect x="284" y="268" width="192" height="26" rx="5" fill="#FFEDD5"/>
  <text x="380" y="285" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">設立（発起設立・募集設立）</text>
  <text x="284" y="302" font-size="10" fill="#374151">発起設立：発起人のみで設立</text>
  <text x="284" y="318" font-size="10" fill="#374151">募集設立：株主を広く募集して設立</text>

  <!-- 商業登記 -->
  <rect x="516" y="52" width="224" height="268" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="516" y="52" width="224" height="28" rx="10" fill="#22C55E"/>
  <rect x="516" y="70" width="224" height="10" fill="#22C55E"/>
  <text x="628" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">商業登記の手続</text>

  <rect x="532" y="88" width="192" height="26" rx="5" fill="#DCFCE7"/>
  <text x="628" y="105" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">設立登記</text>
  <text x="532" y="122" font-size="10" fill="#374151">本店所在地を管轄する法務局に申請</text>
  <text x="532" y="138" font-size="10" fill="#374151">設立日 → 登記申請日から効力発生</text>

  <rect x="532" y="148" width="192" height="26" rx="5" fill="#DCFCE7"/>
  <text x="628" y="165" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">役員変更登記</text>
  <text x="532" y="182" font-size="10" fill="#374151">取締役・監査役の就任・退任</text>
  <text x="532" y="198" font-size="10" fill="#374151">2週間以内に申請義務</text>

  <rect x="532" y="208" width="192" height="26" rx="5" fill="#DCFCE7"/>
  <text x="628" y="225" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">本店移転登記</text>
  <text x="532" y="242" font-size="10" fill="#374151">管轄内移転：現登記所に申請</text>
  <text x="532" y="258" font-size="10" fill="#374151">管轄外移転：旧・新両方に申請</text>

  <rect x="532" y="268" width="192" height="26" rx="5" fill="#DCFCE7"/>
  <text x="628" y="285" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">解散・清算結了</text>
  <text x="532" y="302" font-size="10" fill="#374151">解散登記 → 清算人選任登記</text>
  <text x="532" y="318" font-size="10" fill="#374151">決算報告承認 → 清算結了登記</text>

  <!-- Bottom -->
  <rect x="20" y="332" width="720" height="24" rx="5" fill="#F1F5F9"/>
  <text x="380" y="348" text-anchor="middle" font-size="10.5" fill="#475569">💡 記述式（商業登記）では「役員変更の登記申請書を作れ」形式が頻出。就任・退任・変更の事実ごとに登記すべき事項を整理する。</text>
</svg>
