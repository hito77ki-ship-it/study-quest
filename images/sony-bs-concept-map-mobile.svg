<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1180" width="360" height="1180">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="1180" rx="16" fill="#F8FAFC"/>
  <text x="180" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">ソニーグループ 連結貸借対照表</text>
  <text x="180" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">（イメージ図）</text>
  <text x="180" y="64" text-anchor="middle" font-size="9.5" fill="#64748B">※位置関係を理解するための簡略図です</text>

  <!-- 資産の部 -->
  <text x="20" y="92" font-size="8.5" fill="#94A3B8">しさん</text>
  <text x="20" y="106" font-size="13" font-weight="700" fill="#1E40AF">資産の部</text>
  <rect x="16" y="116" width="328" height="440" rx="8" fill="none" stroke="#93C5FD" stroke-width="1.5"/>

  <rect x="28" y="128" width="304" height="60" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="180" y="154" text-anchor="middle" font-size="12" fill="#1E40AF">流動資産</text>
  <text x="180" y="170" text-anchor="middle" font-size="9.5" fill="#64748B">現金・売掛金・棚卸資産 など</text>

  <rect x="28" y="196" width="304" height="70" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="180" y="216" text-anchor="middle" font-size="8.5" fill="#94A3B8">ゆうけい こていしさん</text>
  <text x="180" y="230" text-anchor="middle" font-size="12" fill="#1E40AF">有形固定資産</text>
  <text x="180" y="246" text-anchor="middle" font-size="9.5" fill="#64748B">土地・建物・機械設備 など</text>

  <rect x="28" y="274" width="304" height="270" rx="8" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="180" y="296" text-anchor="middle" font-size="8.5" fill="#9A6B2E">むけい こていしさん</text>
  <text x="180" y="310" text-anchor="middle" font-size="12" font-weight="700" fill="#9A3412">無形固定資産</text>
  <rect x="42" y="320" width="276" height="210" rx="8" fill="#FED7AA"/>
  <text x="180" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#7C2D12">のれん</text>
  <text x="180" y="372" text-anchor="middle" font-size="12" font-weight="700" fill="#7C2D12">（Goodwill）</text>
  <text x="180" y="404" text-anchor="middle" font-size="17" font-weight="700" fill="#7C2D12">約1兆6,739億円</text>
  <text x="180" y="440" text-anchor="middle" font-size="10" fill="#9A3412">（2026年3月期）</text>
  <text x="180" y="460" text-anchor="middle" font-size="10" fill="#9A3412">買収のたびに積み上がる</text>
  <text x="180" y="486" text-anchor="middle" font-size="9.5" fill="#9A3412">特許権・ソフトウェアなども</text>
  <text x="180" y="502" text-anchor="middle" font-size="9.5" fill="#9A3412">同じ区分に入る</text>

  <!-- 矢印区切り -->
  <text x="180" y="592" text-anchor="middle" font-size="18" fill="#94A3B8">⇕</text>

  <!-- 負債・純資産の部 -->
  <text x="20" y="626" font-size="8.5" fill="#94A3B8">ふさい・じゅんしさん</text>
  <text x="20" y="640" font-size="13" font-weight="700" fill="#166534">負債・純資産の部</text>
  <rect x="16" y="650" width="328" height="470" rx="8" fill="none" stroke="#86EFAC" stroke-width="1.5"/>

  <rect x="28" y="662" width="304" height="80" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="180" y="684" text-anchor="middle" font-size="8.5" fill="#94A3B8">ふさい</text>
  <text x="180" y="698" text-anchor="middle" font-size="12" fill="#166534">負債の部</text>
  <text x="180" y="714" text-anchor="middle" font-size="9.5" fill="#64748B">買掛金・借入金・社債 など</text>
  <text x="180" y="730" text-anchor="middle" font-size="9.5" fill="#64748B">（他人資本）</text>

  <rect x="28" y="754" width="304" height="352" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="180" y="776" text-anchor="middle" font-size="8.5" fill="#3F6B4C">じゅんしさん</text>
  <text x="180" y="790" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">純資産の部</text>

  <rect x="40" y="800" width="280" height="80" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="180" y="824" text-anchor="middle" font-size="8.5" fill="#3F6B4C">かぶぬし しほん</text>
  <text x="180" y="838" text-anchor="middle" font-size="12" fill="#166534">株主資本</text>
  <text x="180" y="854" text-anchor="middle" font-size="9.5" fill="#3F6B4C">資本金・利益剰余金 など</text>
  <text x="180" y="870" text-anchor="middle" font-size="9.5" fill="#3F6B4C">（親会社株主の取り分）</text>

  <rect x="40" y="892" width="280" height="196" rx="8" fill="#FED7AA" stroke="#FDBA74" stroke-width="2"/>
  <text x="180" y="916" text-anchor="middle" font-size="8.5" fill="#9A6B2E">ひ・しはい・もちぶん</text>
  <text x="180" y="932" text-anchor="middle" font-size="13" font-weight="700" fill="#7C2D12">非支配持分</text>
  <text x="180" y="950" text-anchor="middle" font-size="10.5" fill="#7C2D12">（Non-controlling interests）</text>
  <text x="180" y="980" text-anchor="middle" font-size="17" font-weight="700" fill="#7C2D12">約3,946億円</text>
  <text x="180" y="1010" text-anchor="middle" font-size="9.5" fill="#9A3412">日本基準では</text>
  <text x="180" y="1026" text-anchor="middle" font-size="9.5" fill="#9A3412">「非支配株主持分」と呼ぶ</text>
  <text x="180" y="1050" text-anchor="middle" font-size="9.5" fill="#9A3412">子会社の外部株主の取り分</text>
  <text x="180" y="1066" text-anchor="middle" font-size="9.5" fill="#9A3412">（純資産の一部）</text>

  <text x="180" y="1140" text-anchor="middle" font-size="10" fill="#475569">「のれん」は買収時に生まれる資産、</text>
  <text x="180" y="1156" text-anchor="middle" font-size="10" fill="#475569">「非支配持分」は子会社の外部株主の取り分</text>
</svg>
