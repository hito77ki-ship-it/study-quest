<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1500" viewBox="0 0 360 1500" role="img" aria-labelledby="title desc">
  <title id="title">大学生の授業・バイトと資格勉強を両立する24時間スケジュール習慣化図解（モバイル版）</title>
  <desc id="desc">大学生の1日のタイムラインの中に、空きコマ15分・バイト前10分・就寝前10分という3つのスキマ時間を勉強タイムとしてドッキングさせる図解を縦に並べたもの</desc>
  <defs>
    <style>
      .mtitle{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14.5px;font-weight:800;fill:#1f2937}
      .msub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#64748b}
      .callname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:800;fill:#166534}
      .callbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11px;font-weight:600;fill:#15803d}
      .segname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:700;fill:#334155}
      .legend{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:11px;font-weight:600;fill:#475569}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:13.5px;font-weight:700;fill:#166534}
      .bannersmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:10.5px;font-weight:600;fill:#475569}
    </style>
  </defs>

  <rect width="360" height="1500" rx="20" fill="#fbfdf5"/>

  <text x="180" y="32" text-anchor="middle" class="mtitle">大学生の24時間・</text>
  <text x="180" y="52" text-anchor="middle" class="mtitle">スキマ時間ドッキングマップ</text>
  <text x="180" y="72" text-anchor="middle" class="msub">「まとめて3時間」より「毎日15分×3回」が最強</text>

  <!-- Vertical timeline list -->
  <rect x="20" y="98" width="320" height="52" rx="10" fill="#F1F5F9"/>
  <text x="36" y="128" class="segname">7:00　起床・準備</text>

  <rect x="20" y="158" width="320" height="52" rx="10" fill="#DBEAFE"/>
  <text x="36" y="188" class="segname">通学</text>

  <rect x="20" y="218" width="320" height="52" rx="10" fill="#93C5FD"/>
  <text x="36" y="248" class="segname">1〜2限（授業）</text>

  <!-- Callout 1 -->
  <rect x="20" y="278" width="320" height="88" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2.5"/>
  <text x="180" y="304" text-anchor="middle" class="callname">① 1限後の空きコマ・15分</text>
  <text x="180" y="324" text-anchor="middle" class="callbody">教室に座ったまま単語帳や一問一答を</text>
  <text x="180" y="342" text-anchor="middle" class="callbody">開くだけ。移動する前が狙い目</text>

  <rect x="20" y="374" width="320" height="52" rx="10" fill="#93C5FD"/>
  <text x="36" y="404" class="segname">3限（授業）／昼休み</text>

  <rect x="20" y="434" width="320" height="52" rx="10" fill="#DDD6FE"/>
  <text x="36" y="464" class="segname">移動</text>

  <!-- Callout 2 -->
  <rect x="20" y="494" width="320" height="88" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2.5"/>
  <text x="180" y="520" text-anchor="middle" class="callname">② バイト前のマックで10分</text>
  <text x="180" y="540" text-anchor="middle" class="callbody">シフトに入る前の待ち時間に</text>
  <text x="180" y="558" text-anchor="middle" class="callbody">スマホで講義動画を1本だけ見る</text>

  <rect x="20" y="590" width="320" height="52" rx="10" fill="#FDBA74"/>
  <text x="36" y="620" class="segname">バイト</text>

  <rect x="20" y="650" width="320" height="52" rx="10" fill="#DDD6FE"/>
  <text x="36" y="680" class="segname">帰宅・移動</text>

  <!-- Callout 3 -->
  <rect x="20" y="710" width="320" height="88" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2.5"/>
  <text x="180" y="736" text-anchor="middle" class="callname">③ 帰宅後・就寝前の10分</text>
  <text x="180" y="756" text-anchor="middle" class="callbody">今日やった分だけ復習して寝る。</text>
  <text x="180" y="774" text-anchor="middle" class="callbody">「ゼロの日」を作らないための保険</text>

  <rect x="20" y="806" width="320" height="52" rx="10" fill="#CBD5E1"/>
  <text x="36" y="836" class="segname">睡眠</text>

  <!-- Legend -->
  <text x="20" y="892" class="legend" font-weight="700">凡例</text>
  <rect x="20" y="906" width="14" height="14" rx="3" fill="#93C5FD"/><text x="40" y="918" class="legend">授業</text>
  <rect x="120" y="906" width="14" height="14" rx="3" fill="#FDBA74"/><text x="140" y="918" class="legend">バイト</text>
  <rect x="220" y="906" width="14" height="14" rx="3" fill="#DDD6FE"/><text x="240" y="918" class="legend">移動</text>
  <rect x="20" y="932" width="14" height="14" rx="3" fill="#CBD5E1"/><text x="40" y="944" class="legend">睡眠・自由</text>
  <rect x="140" y="932" width="14" height="14" rx="3" fill="#22C55E"/><text x="160" y="944" class="legend">スキマ時間ドッキング（勉強）</text>

  <!-- Bottom banner -->
  <rect x="20" y="982" width="320" height="330" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
  <text x="180" y="1018" text-anchor="middle" class="banner">「土日にまとめて3時間」の</text>
  <text x="180" y="1038" text-anchor="middle" class="banner">計画は100%崩壊する</text>
  <text x="180" y="1070" text-anchor="middle" class="bannersmall">15分×3回でも1日45分。1週間続ければ</text>
  <text x="180" y="1088" text-anchor="middle" class="bannersmall">約5時間——まとめ勉強の予定倒れより</text>
  <text x="180" y="1106" text-anchor="middle" class="bannersmall">確実に積み上がる</text>
  <text x="180" y="1140" text-anchor="middle" class="bannersmall">「今日勉強する日」ではなく「1限後・</text>
  <text x="180" y="1158" text-anchor="middle" class="bannersmall">バイト前・寝る前」という生活の</text>
  <text x="180" y="1176" text-anchor="middle" class="bannersmall">"すきま"に固定でドッキングさせる</text>
  <text x="180" y="1210" text-anchor="middle" class="bannersmall">場所と時間を先に決めておけば、</text>
  <text x="180" y="1228" text-anchor="middle" class="bannersmall">意志の力に頼らず自動的に</text>
  <text x="180" y="1246" text-anchor="middle" class="bannersmall">体が動くようになる</text>
</svg>
