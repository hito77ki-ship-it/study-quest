<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 560" width="780" height="560">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="780" height="560" rx="12" fill="#FAFDF6"/>
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">営業職におすすめ資格 4象限マトリクス</text>
  <text x="390" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">縦軸：汎用性（業種を問わず使えるか）／横軸：取得にかかる時間——左上に近いほど「即戦力の武器」</text>

  <!-- 象限背景 -->
  <rect x="110" y="60" width="315" height="210" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.5"/>
  <rect x="425" y="60" width="315" height="210" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="110" y="270" width="315" height="210" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="425" y="270" width="315" height="210" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>

  <!-- 象限ラベル -->
  <text x="130" y="80" font-size="11.5" font-weight="700" fill="#166534">⚡ 即戦力ゾーン（短時間×高汎用性）</text>
  <text x="445" y="80" font-size="11.5" font-weight="700" fill="#1D4ED8">💪 じっくり投資ゾーン（長時間だが高リターン）</text>
  <text x="130" y="288" font-size="11.5" font-weight="700" fill="#92400E">🎯 特化スピードゾーン（短時間・特定業種で効く）</text>
  <text x="445" y="288" font-size="11.5" font-weight="700" fill="#991B1B">🏠 専門特化ゾーン（長時間だが業種内で必須）</text>

  <!-- 軸の目印 -->
  <text x="112" y="52" font-size="10" font-weight="700" fill="#374151">▲ 汎用性 高い</text>
  <text x="112" y="502" font-size="10" font-weight="700" fill="#374151">▼ 汎用性 低い</text>
  <text x="130" y="518" font-size="10" font-weight="700" fill="#374151">◀ 取得時間 短い</text>
  <text x="650" y="518" text-anchor="end" font-size="10" font-weight="700" fill="#374151">取得時間 長い ▶</text>

  <!-- 王座の強調 -->
  <circle cx="180" cy="112" r="34" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="180" y="79" text-anchor="middle" font-size="9.5" font-weight="700" fill="#B45309">王座</text>

  <!-- プロット: 即戦力ゾーン（左上） -->
  <circle cx="180" cy="112" r="14" fill="#22C55E" stroke="#fff" stroke-width="2"/>
  <text x="180" y="134" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">①FP2級</text>

  <circle cx="180" cy="205" r="11" fill="#86EFAC" stroke="#fff" stroke-width="2"/>
  <text x="180" y="226" text-anchor="middle" font-size="9" fill="#166534">⑧秘書検定準1級</text>

  <!-- プロット: じっくり投資ゾーン（右上） -->
  <circle cx="650" cy="100" r="14" fill="#3B82F6" stroke="#fff" stroke-width="2"/>
  <text x="650" y="122" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">③中小企業診断士</text>

  <circle cx="500" cy="180" r="11" fill="#93C5FD" stroke="#fff" stroke-width="2"/>
  <text x="500" y="201" text-anchor="middle" font-size="9" fill="#1E3A8A">⑤簿記2級</text>

  <!-- プロット: 特化スピードゾーン（左下） -->
  <circle cx="175" cy="315" r="12" fill="#FBBF24" stroke="#fff" stroke-width="2"/>
  <text x="175" y="337" text-anchor="middle" font-size="9" fill="#92400E">④ITパスポート</text>

  <circle cx="280" cy="355" r="10" fill="#FCD34D" stroke="#fff" stroke-width="2"/>
  <text x="280" y="375" text-anchor="middle" font-size="9" fill="#92400E">⑥証券外務員</text>

  <circle cx="200" cy="425" r="10" fill="#FDE68A" stroke="#fff" stroke-width="2"/>
  <text x="200" y="445" text-anchor="middle" font-size="9" fill="#92400E">⑦TOEIC800</text>

  <!-- プロット: 専門特化ゾーン（右下） -->
  <circle cx="565" cy="355" r="14" fill="#F87171" stroke="#fff" stroke-width="2"/>
  <text x="565" y="377" text-anchor="middle" font-size="9.5" font-weight="700" fill="#991B1B">②宅建</text>

  <!-- 下部サマリー -->
  <rect x="110" y="490" width="630" height="58" rx="8" fill="#1E293B"/>
  <text x="425" y="510" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8CC63F">なぜFP2級が「即戦力ゾーン」の王座にいるのか</text>
  <text x="425" y="528" text-anchor="middle" font-size="9" fill="#CBD5E1">150〜200時間という投資で、保険・金融に限らずどの営業でも顧客の資産を語れる武器になるから。</text>
  <text x="425" y="542" text-anchor="middle" font-size="9" fill="#CBD5E1">中小企業診断士は時間がかかるが右上に位置し、法人営業からコンサルへの転身まで見据えるなら投資価値が高い。</text>
</svg>
