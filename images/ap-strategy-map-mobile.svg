<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 760" width="360" height="760">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="760" rx="16" fill="#FEFCF9"/>
  <text x="180" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">応用情報 午前・午後の構成と</text>
  <text x="180" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">満点を狙う戦略マップ</text>
  <text x="180" y="62" text-anchor="middle" font-size="10.5" fill="#94A3B8">「合格ライン60点＋α」を確実に取るのが最短ルート</text>

  <!-- 午前 -->
  <rect x="16" y="80" width="328" height="290" rx="16" fill="#EBF8FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="180" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#1D4ED8">☀️ 午前試験</text>
  <text x="180" y="134" text-anchor="middle" font-size="12" fill="#374151">四肢択一 80問／試験時間：150分</text>

  <text x="180" y="158" text-anchor="middle" font-size="10.5" fill="#64748B">得点イメージ</text>
  <rect x="40" y="168" width="280" height="26" rx="13" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="40" y="168" width="210" height="26" rx="13" fill="#3B82F6"/>
  <line x1="208" y1="162" x2="208" y2="200" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="208" y="214" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">合格ライン 60点</text>

  <rect x="40" y="238" width="280" height="112" rx="10" fill="#fff" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="180" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">🎯 戦略</text>
  <text x="180" y="286" text-anchor="middle" font-size="11" fill="#374151">FE合格者は共通知識を</text>
  <text x="180" y="304" text-anchor="middle" font-size="11" fill="#374151">横展開して得点効率アップ</text>
  <text x="180" y="326" text-anchor="middle" font-size="10.5" fill="#64748B">未経験者は過去問5年分を反復</text>

  <!-- 午後 -->
  <rect x="16" y="388" width="328" height="290" rx="16" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="180" y="420" text-anchor="middle" font-size="15" font-weight="700" fill="#5B21B6">🌙 午後試験</text>
  <text x="180" y="442" text-anchor="middle" font-size="12" fill="#374151">11分野中5問選択（記述式）／150分</text>

  <text x="180" y="466" text-anchor="middle" font-size="10.5" fill="#64748B">得点イメージ</text>
  <rect x="40" y="476" width="280" height="26" rx="13" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="40" y="476" width="196" height="26" rx="13" fill="#8B5CF6"/>
  <line x1="196" y1="470" x2="196" y2="508" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="196" y="522" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">合格ライン 60点</text>

  <rect x="40" y="546" width="280" height="112" rx="10" fill="#fff" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="180" y="570" text-anchor="middle" font-size="12" font-weight="700" fill="#5B21B6">🎯 戦略</text>
  <text x="180" y="594" text-anchor="middle" font-size="11" fill="#374151">必須1問＋得意4分野の</text>
  <text x="180" y="612" text-anchor="middle" font-size="11" fill="#374151">「5人パーティ」で挑む</text>
  <text x="180" y="634" text-anchor="middle" font-size="10.5" fill="#64748B">11分野を広く浅くは失敗のもと</text>

  <rect x="16" y="696" width="328" height="52" rx="10" fill="#111827"/>
  <text x="180" y="720" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8CC63F">選んだ分野を深く仕上げる</text>
  <text x="180" y="736" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8CC63F">「絞り込み戦略」が最短ルート</text>
</svg>
