<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="400" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <rect x="60" y="12" width="640" height="36" fill="#DBEAFE" rx="8"/>
  <text x="380" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1A202C">株式会社の純資産（じゅんしさん）の構成と変動フロー</text>

  <!-- ── 左：純資産の構成積み上げ ── -->
  <text x="180" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#1A202C">純資産の4つの構成</text>

  <!-- 資本金（大） -->
  <rect x="30" y="80" width="300" height="68" fill="#3B82F6" rx="6"/>
  <text x="180" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">資本金（しほんきん）</text>
  <text x="180" y="128" text-anchor="middle" font-size="11" fill="#BFDBFE">株主からの出資 → 払込金額の1/2以上</text>
  <text x="180" y="145" text-anchor="middle" font-size="10" fill="#93C5FD">株式発行 / 資本金</text>

  <!-- 資本準備金（中） -->
  <rect x="30" y="152" width="300" height="52" fill="#60A5FA" rx="6"/>
  <text x="180" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">資本準備金（しほんじゅんびきん）</text>
  <text x="180" y="196" text-anchor="middle" font-size="10" fill="#DBEAFE">払込金額の1/2以下まで計上可能</text>

  <!-- 利益準備金 -->
  <rect x="30" y="208" width="300" height="48" fill="#34D399" rx="6"/>
  <text x="180" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">利益準備金（りえきじゅんびきん）</text>
  <text x="180" y="246" text-anchor="middle" font-size="10" fill="#D1FAE5">配当のたびに1/10強制積立（1/4上限まで）</text>

  <!-- 繰越利益剰余金（大） -->
  <rect x="30" y="260" width="300" height="68" fill="#059669" rx="6"/>
  <text x="180" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">繰越利益剰余金</text>
  <text x="180" y="306" text-anchor="middle" font-size="11" fill="#A7F3D0">（くりこしりえきじょうよきん）</text>
  <text x="180" y="322" text-anchor="middle" font-size="10" fill="#6EE7B7">毎期の純利益を積み上げた会社の内部留保</text>

  <!-- ── 右：繰越利益剰余金の増減 ── -->
  <text x="560" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#1A202C">繰越利益剰余金の変動</text>

  <!-- 繰越利益剰余金ボックス（中央） -->
  <rect x="458" y="155" width="204" height="56" fill="#059669" rx="8"/>
  <text x="560" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">繰越利益剰余金</text>
  <text x="560" y="197" text-anchor="middle" font-size="10" fill="#D1FAE5">（残高）</text>

  <!-- 増える要因（上） -->
  <rect x="458" y="86" width="204" height="52" fill="#D1FAE5" rx="8"/>
  <text x="560" y="106" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">↑ 増える</text>
  <text x="560" y="122" text-anchor="middle" font-size="11" fill="#374151">当期純利益（決算時に振替）</text>
  <text x="560" y="136" text-anchor="middle" font-size="10" fill="#374151">損益 → 繰越利益剰余金</text>
  <!-- 矢印 -->
  <line x1="560" y1="138" x2="560" y2="155" stroke="#059669" stroke-width="2"/>
  <polygon points="555,153 565,153 560,161" fill="#059669"/>

  <!-- 減る要因（下） -->
  <rect x="458" y="228" width="204" height="72" fill="#FEE2E2" rx="8"/>
  <text x="560" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#B91C1C">↓ 減る</text>
  <text x="560" y="264" text-anchor="middle" font-size="11" fill="#374151">① 株主への配当（支払配当）</text>
  <text x="560" y="280" text-anchor="middle" font-size="11" fill="#374151">② 利益準備金の積立</text>
  <text x="560" y="296" text-anchor="middle" font-size="10" fill="#374151">繰越利益剰余金 → 未払配当金＋利益準備金</text>
  <!-- 矢印 -->
  <line x1="560" y1="211" x2="560" y2="228" stroke="#B91C1C" stroke-width="2"/>
  <polygon points="555,226 565,226 560,234" fill="#B91C1C"/>

  <!-- まとめ -->
  <rect x="20" y="342" width="720" height="44" fill="#FFFBEB" rx="8" stroke="#FCD34D" stroke-width="1"/>
  <text x="380" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">🎯 資本金・資本準備金＝株主の元手　　利益準備金・繰越利益剰余金＝会社が稼いだ利益</text>
  <text x="380" y="378" text-anchor="middle" font-size="11" fill="#374151">純資産の合計 ＝ 総資産 − 総負債（貸借対照表の右下に表示）</text>
</svg>
