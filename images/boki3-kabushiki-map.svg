<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="760" height="520" rx="16" fill="#F8FAFC"/>
  <text x="380" y="30" text-anchor="middle" font-size="15.5" font-weight="700" fill="#1E293B">株式会社の純資産4要素——積み上げ構造と繰越利益剰余金の増減フロー</text>
  <text x="380" y="50" text-anchor="middle" font-size="10.5" fill="#64748B">外からの元手（資本金・資本準備金）と、中で稼いだ利益（利益準備金・繰越利益剰余金）の2グループ</text>

  <text x="30" y="76" font-size="12.5" font-weight="700" fill="#1E293B">純資産の4要素（積み上げ構造）</text>

  <text x="30" y="98" font-size="11" font-weight="700" fill="#1E40AF">🔵 外からの元手（株主からの入金）</text>

  <!-- 資本金 -->
  <rect x="30" y="108" width="340" height="66" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="200" y="132" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">資本金（しほんきん）</text>
  <text x="200" y="150" text-anchor="middle" font-size="10" fill="#374151">株主からの出資のうち払込金額の1/2以上</text>
  <text x="200" y="166" text-anchor="middle" font-size="9.5" fill="#64748B">→ 株式発行時に計上</text>

  <!-- 資本準備金 -->
  <rect x="30" y="184" width="340" height="66" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="200" y="208" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E40AF">資本準備金（しほんじゅんびきん）</text>
  <text x="200" y="226" text-anchor="middle" font-size="10" fill="#374151">払込金額のうち資本金にしなかった残り</text>
  <text x="200" y="242" text-anchor="middle" font-size="9.5" fill="#64748B">（払込金額の1/2以下）</text>

  <text x="30" y="272" font-size="11" font-weight="700" fill="#166534">🟢 中で稼いだ利益（会社の内部留保）</text>

  <!-- 利益準備金 -->
  <rect x="30" y="282" width="340" height="66" rx="10" fill="#F0FFF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="200" y="306" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">利益準備金（りえきじゅんびきん）</text>
  <text x="200" y="324" text-anchor="middle" font-size="10" fill="#374151">配当のたびに配当額の1/10を強制積立</text>
  <text x="200" y="340" text-anchor="middle" font-size="9.5" fill="#64748B">（資本金の1/4まで）</text>

  <!-- 繰越利益剰余金 -->
  <rect x="30" y="358" width="340" height="66" rx="10" fill="#F0FFF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="200" y="380" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">繰越利益剰余金</text>
  <text x="200" y="396" text-anchor="middle" font-size="9.5" fill="#64748B">（くりこしりえきじょうよきん）</text>
  <text x="200" y="413" text-anchor="middle" font-size="10" fill="#374151">毎期の純利益を積み上げた内部留保</text>

  <line x1="392" y1="90" x2="392" y2="430" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="5,4"/>

  <text x="410" y="76" font-size="12.5" font-weight="700" fill="#1E293B">繰越利益剰余金の増減フロー</text>

  <!-- 増える -->
  <rect x="410" y="98" width="320" height="66" rx="10" fill="#F0FFF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="570" y="120" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">↑ 増える</text>
  <text x="570" y="138" text-anchor="middle" font-size="10.5" fill="#374151">当期純利益（決算時に振替）</text>
  <text x="570" y="154" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">損益 → 繰越利益剰余金</text>

  <line x1="570" y1="164" x2="570" y2="192" stroke="#22C55E" stroke-width="2.5"/>
  <polygon points="562,186 578,186 570,198" fill="#22C55E"/>

  <!-- 中央：残高 -->
  <rect x="460" y="198" width="220" height="54" rx="10" fill="#DCFCE7" stroke="#22C55E" stroke-width="2.5"/>
  <text x="570" y="222" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">繰越利益剰余金</text>
  <text x="570" y="240" text-anchor="middle" font-size="10" fill="#166534">（残高）</text>

  <line x1="570" y1="252" x2="570" y2="280" stroke="#DB2777" stroke-width="2.5"/>
  <polygon points="562,274 578,274 570,286" fill="#DB2777"/>

  <!-- 減る -->
  <rect x="410" y="286" width="320" height="98" rx="10" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="570" y="308" text-anchor="middle" font-size="11.5" font-weight="700" fill="#9D174D">↓ 減る</text>
  <text x="570" y="326" text-anchor="middle" font-size="10.5" fill="#374151">① 株主への配当（未払配当金）</text>
  <text x="570" y="342" text-anchor="middle" font-size="10.5" fill="#374151">② 利益準備金の積立</text>
  <text x="570" y="362" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9D174D">繰越利益剰余金 →</text>
  <text x="570" y="376" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9D174D">未払配当金＋利益準備金</text>

  <!-- 底部まとめ -->
  <rect x="30" y="440" width="700" height="60" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="380" y="464" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">🎯 資本金・資本準備金＝株主の元手　　利益準備金・繰越利益剰余金＝会社が稼いだ利益</text>
  <text x="380" y="484" text-anchor="middle" font-size="10.5" fill="#374151">純資産の合計 ＝ 総資産 － 総負債（貸借対照表の右下に表示）</text>
</svg>
