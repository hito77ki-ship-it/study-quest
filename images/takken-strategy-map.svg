<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">宅建試験の科目別配点と満点を狙う戦略マップ</title>
  <desc id="desc">宅建業法20問・権利関係14問・法令制限8問・税その他8問の配点比率と、科目ごとの優先度・攻略の合言葉を示す図解</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.5" stop-color="#fbfdf5"/>
      <stop offset="1" stop-color="#fff7fb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#667085" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:34px;font-weight:800;fill:#1f2937}
      .sub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:17px;font-weight:600;fill:#64748b}
      .pill{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .barlabel{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .barsub{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12px;font-weight:700;fill:#ffffff;opacity:.92}
      .cardname{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:19px;font-weight:800;fill:#1f2937}
      .cardbody{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14px;font-weight:600;fill:#334155}
      .cardsmall{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:12.5px;font-weight:600;fill:#64748b}
      .stars{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:14px;font-weight:700}
      .banner{font-family:"Noto Sans JP", system-ui, sans-serif;font-size:15.5px;font-weight:700;fill:#166534}
    </style>
  </defs>

  <rect width="1200" height="760" rx="40" fill="url(#bg)"/>
  <circle cx="110" cy="100" r="70" fill="#dcfce7" opacity="0.6"/>
  <circle cx="1100" cy="130" r="86" fill="#dbeafe" opacity="0.6"/>
  <circle cx="1060" cy="700" r="90" fill="#fce7f3" opacity="0.55"/>
  <circle cx="130" cy="690" r="76" fill="#fef3c7" opacity="0.6"/>

  <text x="600" y="58" text-anchor="middle" class="title">宅建 配点戦略マップ</text>
  <text x="600" y="88" text-anchor="middle" class="sub">50点満点・4科目の配点比率と「満点を狙う優先度」がひと目でわかる</text>

  <!-- Stacked bar: 50 questions, 20px per question -->
  <text x="100" y="126" class="cardsmall" font-size="13">出題数の内訳（全50問）</text>
  <g filter="url(#softShadow)">
    <rect x="100" y="134" width="400" height="56" rx="10" fill="#22c55e"/>
    <text x="300" y="158" text-anchor="middle" class="barlabel">宅建業法</text>
    <text x="300" y="176" text-anchor="middle" class="barsub">20問（40%）</text>

    <rect x="500" y="134" width="280" height="56" fill="#3b82f6"/>
    <text x="640" y="158" text-anchor="middle" class="barlabel">権利関係</text>
    <text x="640" y="176" text-anchor="middle" class="barsub">14問（28%）</text>

    <rect x="780" y="134" width="160" height="56" fill="#f59e0b"/>
    <text x="860" y="158" text-anchor="middle" class="barlabel">法令制限</text>
    <text x="860" y="176" text-anchor="middle" class="barsub">8問（16%）</text>

    <rect x="940" y="134" width="160" height="56" rx="10" fill="#a855f7"/>
    <text x="1020" y="158" text-anchor="middle" class="barlabel">税その他</text>
    <text x="1020" y="176" text-anchor="middle" class="barsub">8問（16%）</text>
  </g>

  <!-- Card 1: 宅建業法 -->
  <g filter="url(#softShadow)">
    <rect x="100" y="228" width="480" height="168" rx="26" fill="#ffffff" stroke="#86efac" stroke-width="4"/>
    <rect x="128" y="252" width="120" height="34" rx="17" fill="#22c55e"/>
    <text x="188" y="275" text-anchor="middle" class="pill">最優先</text>
    <text x="270" y="278" class="cardname">宅建業法（20問）</text>
    <text x="128" y="316" class="stars" fill="#f59e0b">難易度 ★★☆</text>
    <text x="128" y="346" class="cardbody">出題パターンが決まっている暗記科目。</text>
    <text x="128" y="368" class="cardsmall">ここで満点近くを取り切るのが合格の王道。</text>
  </g>

  <!-- Card 2: 権利関係 -->
  <g filter="url(#softShadow)">
    <rect x="620" y="228" width="480" height="168" rx="26" fill="#ffffff" stroke="#93c5fd" stroke-width="4"/>
    <rect x="648" y="252" width="90" height="34" rx="17" fill="#3b82f6"/>
    <text x="693" y="275" text-anchor="middle" class="pill">中</text>
    <text x="758" y="278" class="cardname">権利関係（14問）</text>
    <text x="648" y="316" class="stars" fill="#f59e0b">難易度 ★★★</text>
    <text x="648" y="346" class="cardbody">最難関の民法。深追い厳禁。</text>
    <text x="648" y="368" class="cardsmall">14問中8〜9問取れれば十分＝合格ライン。</text>
  </g>

  <!-- Card 3: 法令制限 -->
  <g filter="url(#softShadow)">
    <rect x="100" y="418" width="480" height="168" rx="26" fill="#ffffff" stroke="#fcd34d" stroke-width="4"/>
    <rect x="128" y="442" width="70" height="34" rx="17" fill="#f59e0b"/>
    <text x="163" y="465" text-anchor="middle" class="pill">高</text>
    <text x="220" y="468" class="cardname">法令制限（8問）</text>
    <text x="128" y="506" class="stars" fill="#f59e0b">難易度 ★★☆</text>
    <text x="128" y="536" class="cardbody">都市計画法・建築基準法など数字暗記中心。</text>
    <text x="128" y="558" class="cardsmall">語呂合わせで直前期に一気に詰め込む。</text>
  </g>

  <!-- Card 4: 税その他 -->
  <g filter="url(#softShadow)">
    <rect x="620" y="418" width="480" height="168" rx="26" fill="#ffffff" stroke="#e9d5ff" stroke-width="4"/>
    <rect x="648" y="442" width="70" height="34" rx="17" fill="#a855f7"/>
    <text x="683" y="465" text-anchor="middle" class="pill">高</text>
    <text x="740" y="468" class="cardname">税その他・統計（8問）</text>
    <text x="648" y="506" class="stars" fill="#f59e0b">難易度 ★★☆</text>
    <text x="648" y="536" class="cardbody">税金知識＋直前の統計データ確認が中心。</text>
    <text x="648" y="558" class="cardsmall">試験直前の最新データ暗記で得点源になる。</text>
  </g>

  <!-- Bottom takeaway banner -->
  <g filter="url(#softShadow)">
    <rect x="100" y="628" width="1000" height="92" rx="22" fill="#f0fdf4" stroke="#86efac" stroke-width="3"/>
    <text x="600" y="662" text-anchor="middle" class="banner">宅建業法（20問）で満点近くを取り、権利関係（14問）は深追いしない</text>
    <text x="600" y="690" text-anchor="middle" class="banner">――これが独学・最短合格の逆算ルート</text>
  </g>
</svg>
