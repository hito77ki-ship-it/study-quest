<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1160" width="360" height="1160">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="1160" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">材料費——仕入から消費・</text>
  <text x="180" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">計算までの全フロー</text>

  <rect x="24" y="60" width="312" height="58" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="2"/>
  <text x="180" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#713F12">材料購入</text>
  <text x="180" y="100" text-anchor="middle" font-size="10.5" fill="#374151">購入代価＋引取費用</text>

  <path d="M180,118 L180,134 M172,126 L180,134 L188,126" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="24" y="142" width="312" height="58" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="180" y="164" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">材料勘定（倉庫）</text>
  <text x="180" y="182" text-anchor="middle" font-size="10.5" fill="#374151">月初残高＋当月購入－月末残高＝消費額</text>

  <path d="M180,200 L180,216 M172,208 L180,216 L188,208" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="24" y="224" width="312" height="58" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="246" text-anchor="middle" font-size="11.5" font-weight="700" fill="#166534">消費（払出）</text>
  <text x="180" y="264" text-anchor="middle" font-size="10.5" fill="#374151">直接材料費→仕掛品／間接材料費→製造間接費</text>

  <path d="M180,282 L180,298 M172,290 L180,298 L188,290" fill="none" stroke="#64748B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="24" y="306" width="312" height="58" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="180" y="328" text-anchor="middle" font-size="11.5" font-weight="700" fill="#DC2626">製品原価へ</text>
  <text x="180" y="346" text-anchor="middle" font-size="10.5" fill="#374151">仕掛品→製品→売上原価（P/L）</text>

  <text x="180" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">消費単価の計算方法</text>

  <!-- 先入先出法 -->
  <rect x="16" y="408" width="328" height="256" rx="10" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <rect x="16" y="408" width="328" height="30" rx="10" fill="#F97316"/>
  <rect x="16" y="428" width="328" height="10" fill="#F97316"/>
  <text x="180" y="428" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">先入先出法（FIFO）</text>
  <text x="180" y="456" text-anchor="middle" font-size="10.5" fill="#374151">古い仕入分から先に払い出す</text>
  <rect x="32" y="464" width="296" height="130" rx="6" fill="#FFEDD5"/>
  <text x="180" y="484" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">計算例</text>
  <text x="46" y="504" font-size="10" fill="#374151">月初：100個 @200円</text>
  <text x="46" y="522" font-size="10" fill="#374151">当月仕入：200個 @220円</text>
  <text x="46" y="540" font-size="10" fill="#374151">消費：150個</text>
  <text x="46" y="558" font-size="9.5" fill="#374151">→月初100個(@200)＋50個(@220)</text>
  <text x="180" y="580" text-anchor="middle" font-size="10" fill="#C2410C">消費額＝100×200＋50×220＝31,000円</text>
  <text x="180" y="614" text-anchor="middle" font-size="9.5" fill="#64748B">物価上昇局面では消費単価が低くなりやすい</text>

  <!-- 移動平均法 -->
  <rect x="16" y="680" width="328" height="256" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="680" width="328" height="30" rx="10" fill="#3B82F6"/>
  <rect x="16" y="700" width="328" height="10" fill="#3B82F6"/>
  <text x="180" y="700" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">移動平均法</text>
  <text x="180" y="728" text-anchor="middle" font-size="10.5" fill="#374151">仕入のたびに平均単価を計算し直す</text>
  <rect x="32" y="736" width="296" height="130" rx="6" fill="#DBEAFE"/>
  <text x="180" y="756" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">計算例</text>
  <text x="46" y="776" font-size="10" fill="#374151">月初：100個 @200円＝20,000円</text>
  <text x="46" y="794" font-size="9.5" fill="#374151">仕入後：(20,000＋200×220)÷300個</text>
  <text x="46" y="810" font-size="9.5" fill="#374151">＝@213.3円</text>
  <text x="46" y="828" font-size="10" fill="#374151">消費：150個×@213.3円</text>
  <text x="180" y="852" text-anchor="middle" font-size="10" fill="#1E40AF">消費額＝150×213.3≈31,997円</text>
  <text x="180" y="886" text-anchor="middle" font-size="9.5" fill="#64748B">仕入のたびに平均単価が更新される</text>
</svg>
