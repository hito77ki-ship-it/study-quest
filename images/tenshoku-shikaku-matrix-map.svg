<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 560" width="780" height="560">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="780" height="560" rx="12" fill="#FAFDF6"/>
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">転職に有利な資格 4象限マトリクス</text>
  <text x="390" y="46" text-anchor="middle" font-size="10.5" fill="#64748B">縦軸：未経験からの求人の広がり（評価の高さ）／横軸：取得までの勉強時間の短さ——左上に近いほど「無敵のポジション」</text>

  <!-- 象限背景 -->
  <rect x="110" y="60" width="315" height="210" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.5"/>
  <rect x="425" y="60" width="315" height="210" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="110" y="270" width="315" height="210" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="425" y="270" width="315" height="210" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>

  <!-- 象限ラベル -->
  <text x="130" y="80" font-size="11.5" font-weight="700" fill="#166534">🏆 無敵ゾーン（時間対効果で評価が突き抜ける）</text>
  <text x="445" y="80" font-size="11.5" font-weight="700" fill="#1D4ED8">💪 じっくり投資ゾーン（時間はかかるが専門性が武器に）</text>
  <text x="130" y="288" font-size="11.5" font-weight="700" fill="#92400E">⚡ お手軽ゾーン（短時間で入口を作れる）</text>
  <text x="445" y="288" font-size="11.5" font-weight="700" fill="#991B1B">⚠ 要検討ゾーン（時間の割に評価が伸びにくい）</text>

  <!-- 軸の目印 -->
  <text x="112" y="52" font-size="10" font-weight="700" fill="#374151">▲ 求人の広がり（評価） 高い</text>
  <text x="112" y="502" font-size="10" font-weight="700" fill="#374151">▼ 求人の広がり（評価） 低い</text>
  <text x="130" y="518" font-size="10" font-weight="700" fill="#374151">◀ 勉強時間 短い</text>
  <text x="650" y="518" text-anchor="end" font-size="10" font-weight="700" fill="#374151">勉強時間 長い ▶</text>

  <!-- 王座の強調 -->
  <circle cx="175" cy="110" r="34" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="175" y="77" text-anchor="middle" font-size="9.5" font-weight="700" fill="#B45309">王座</text>

  <!-- プロット: 無敵ゾーン（左上） -->
  <circle cx="175" cy="110" r="14" fill="#22C55E" stroke="#fff" stroke-width="2"/>
  <text x="175" y="132" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">①簿記2級</text>

  <circle cx="175" cy="168" r="13" fill="#4ADE80" stroke="#fff" stroke-width="2"/>
  <text x="175" y="189" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">②宅建</text>

  <circle cx="285" cy="122" r="11" fill="#86EFAC" stroke="#fff" stroke-width="2"/>
  <text x="285" y="143" text-anchor="middle" font-size="9" fill="#166534">③基本情報</text>

  <circle cx="290" cy="180" r="10" fill="#86EFAC" stroke="#fff" stroke-width="2"/>
  <text x="290" y="200" text-anchor="middle" font-size="9" fill="#166534">④FP2級</text>

  <circle cx="175" cy="222" r="10" fill="#BBF7D0" stroke="#fff" stroke-width="2"/>
  <text x="175" y="242" text-anchor="middle" font-size="9" fill="#166534">⑤TOEIC730</text>

  <circle cx="290" cy="235" r="10" fill="#BBF7D0" stroke="#fff" stroke-width="2"/>
  <text x="290" y="255" text-anchor="middle" font-size="9" fill="#166534">⑦登録販売者</text>

  <!-- プロット: じっくり投資ゾーン（右上） -->
  <circle cx="520" cy="110" r="12" fill="#60A5FA" stroke="#fff" stroke-width="2"/>
  <text x="520" y="131" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">⑧社労士</text>

  <circle cx="625" cy="155" r="13" fill="#3B82F6" stroke="#fff" stroke-width="2"/>
  <text x="625" y="177" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">⑩中小企業診断士</text>

  <!-- プロット: お手軽ゾーン（左下） -->
  <circle cx="175" cy="320" r="11" fill="#FBBF24" stroke="#fff" stroke-width="2"/>
  <text x="175" y="341" text-anchor="middle" font-size="9" fill="#92400E">⑥ITパスポート</text>

  <circle cx="285" cy="362" r="10" fill="#FCD34D" stroke="#fff" stroke-width="2"/>
  <text x="285" y="382" text-anchor="middle" font-size="9" fill="#92400E">⑨MOS</text>

  <!-- 下部サマリー -->
  <rect x="110" y="490" width="630" height="58" rx="8" fill="#1E293B"/>
  <text x="425" y="510" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8CC63F">なぜ簿記2級・宅建・基本情報が「無敵ゾーン」にいるのか</text>
  <text x="425" y="528" text-anchor="middle" font-size="9" fill="#CBD5E1">200〜400時間程度の投資で、未経験からでも応募できる求人が一気に広がり、面接での説得力も跳ね上がるから。</text>
  <text x="425" y="542" text-anchor="middle" font-size="9" fill="#CBD5E1">社労士・中小企業診断士は時間がかかるが右上に位置し、専門性を武器に管理部門やコンサルへ転身するなら投資価値が高い。</text>
</svg>
