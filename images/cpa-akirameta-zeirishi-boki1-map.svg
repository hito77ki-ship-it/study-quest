<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">会計士撤退後の知識コンバート＆進路分岐マップ</title>
  <desc id="svgdesc">公認会計士で学んだ財務会計論・管理会計論・原価計算の知識が、税理士（簿記論・財務諸表論）と日商簿記1級（工業簿記・原価計算）のどちらにどう活きるかを示し、さらに独立開業ルートと就職・転職ルートへの進路分岐を示した図解</desc>
  <defs>
    <linearGradient id="zbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#F0FFF4"/>
    </linearGradient>
    <linearGradient id="zbTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#2D4A10"/>
    </linearGradient>
    <linearGradient id="zbHigh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8CC63F"/>
      <stop offset="1" stop-color="#6AAF2B"/>
    </linearGradient>
    <linearGradient id="zbMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="zbShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <style>.zt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="1200" height="660" rx="20" fill="url(#zbBg)"/>

  <!-- Title -->
  <rect x="40" y="24" width="1120" height="64" rx="14" fill="url(#zbTitle)"/>
  <text x="600" y="48" text-anchor="middle" class="zt" font-size="11.5" font-weight="700" fill="#A0C070" letter-spacing="2">知識コンバート＆進路分岐マップ</text>
  <text x="600" y="71" text-anchor="middle" class="zt" font-size="19" font-weight="800" fill="#FFFFFF">会計士の知識は、税理士（簿財）と簿記1級のどちらで最大化するか</text>

  <!-- Hub card -->
  <g filter="url(#zbShadow)">
    <rect x="380" y="110" width="440" height="92" rx="16" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2"/>
  </g>
  <text x="600" y="140" text-anchor="middle" class="zt" font-size="15" font-weight="800" fill="#1A202C">🎓 公認会計士で積み上げた知識</text>
  <text x="600" y="162" text-anchor="middle" class="zt" font-size="12" fill="#374151">財務会計論・管理会計論・原価計算・理論暗記体力</text>
  <text x="600" y="182" text-anchor="middle" class="zt" font-size="11" font-weight="700" fill="#6AAF2B">↓ 2つのルートへ知識をコンバート</text>

  <!-- Connector lines -->
  <line x1="500" y1="202" x2="310" y2="250" stroke="#CBD5E1" stroke-width="2.5"/>
  <line x1="700" y1="202" x2="890" y2="250" stroke="#CBD5E1" stroke-width="2.5"/>

  <!-- Left card: 税理士 簿記論・財務諸表論 -->
  <g filter="url(#zbShadow)">
    <rect x="60" y="250" width="500" height="230" rx="16" fill="#FDF2F8" stroke="#F472B6" stroke-width="2"/>
  </g>
  <rect x="60" y="250" width="500" height="40" rx="16" fill="#F472B6"/>
  <rect x="60" y="274" width="500" height="16" fill="#F472B6"/>
  <text x="310" y="276" text-anchor="middle" class="zt" font-size="14" font-weight="800" fill="#FFFFFF">📘 税理士 簿記論・財務諸表論</text>

  <text x="90" y="308" class="zt" font-size="11.5" font-weight="700" fill="#9D174D">🗡 コンバート内容</text>
  <text x="90" y="326" class="zt" font-size="12.5" fill="#374151">財務会計論（計算・理論）→ ほぼそのまま活きる</text>
  <rect x="90" y="336" width="220" height="24" rx="12" fill="url(#zbHigh)"/>
  <text x="200" y="352" text-anchor="middle" class="zt" font-size="11" font-weight="700" fill="#fff">重複度：★★★★★（高い）</text>
  <text x="90" y="382" class="zt" font-size="12" fill="#374151">必要勉強時間目安：200〜400時間（会計士経験者）</text>

  <text x="90" y="408" class="zt" font-size="11.5" font-weight="700" fill="#9D174D">⬆ この先のルート</text>
  <text x="90" y="426" class="zt" font-size="12" fill="#374151">科目合格は無期限。税理士5科目達成を目指せる</text>

  <rect x="90" y="442" width="440" height="28" rx="14" fill="#9D174D"/>
  <text x="310" y="461" text-anchor="middle" class="zt" font-size="12" font-weight="700" fill="#fff">🏳 向いている進路：独立開業・専門性重視</text>

  <!-- Right card: 日商簿記1級 -->
  <g filter="url(#zbShadow)">
    <rect x="640" y="250" width="500" height="230" rx="16" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  </g>
  <rect x="640" y="250" width="500" height="40" rx="16" fill="#3B82F6"/>
  <rect x="640" y="274" width="500" height="16" fill="#3B82F6"/>
  <text x="890" y="276" text-anchor="middle" class="zt" font-size="14" font-weight="800" fill="#FFFFFF">📗 日商簿記1級（商業簿記・工業簿記・原価計算）</text>

  <text x="670" y="304" class="zt" font-size="11.5" font-weight="700" fill="#1E40AF">🗡 コンバート内容</text>
  <text x="670" y="321" class="zt" font-size="12.5" fill="#374151">商業簿記・会計学 → 財務会計論とほぼ重複</text>
  <rect x="670" y="329" width="220" height="22" rx="11" fill="url(#zbHigh)"/>
  <text x="780" y="344" text-anchor="middle" class="zt" font-size="10.5" font-weight="700" fill="#fff">重複度：高い</text>
  <text x="670" y="368" class="zt" font-size="12.5" fill="#374151">工業簿記・原価計算 → 管理会計論と近いが要復習</text>
  <rect x="670" y="376" width="220" height="22" rx="11" fill="url(#zbMid)"/>
  <text x="780" y="391" text-anchor="middle" class="zt" font-size="10.5" font-weight="700" fill="#fff">重複度：中</text>

  <text x="670" y="416" class="zt" font-size="11.5" font-weight="700" fill="#1E40AF">⬆ この先のルート</text>
  <text x="670" y="434" class="zt" font-size="12" fill="#374151">税理士の受験資格を取得。就職・転職の武器にも</text>

  <rect x="670" y="442" width="440" height="28" rx="14" fill="#1E40AF"/>
  <text x="890" y="461" text-anchor="middle" class="zt" font-size="12" font-weight="700" fill="#fff">🏳 向いている進路：就職・転職・受験資格の確保</text>

  <!-- Bottom summary bar -->
  <rect x="40" y="510" width="1120" height="110" rx="16" fill="#111827" filter="url(#zbShadow)"/>
  <text x="600" y="542" text-anchor="middle" class="zt" font-size="14" font-weight="700" fill="#8CC63F">💡 独立 vs 就職、進路分岐の判断軸</text>
  <text x="600" y="568" text-anchor="middle" class="zt" font-size="12" fill="#E5E7EB">① 将来「税理士として独立・開業したい」→ 簿記論・財務諸表論を直接受けるのが最短ルート</text>
  <text x="600" y="592" text-anchor="middle" class="zt" font-size="12" fill="#E5E7EB">② 「まず就職・転職に活かしたい」「受験資格がまだない」→ 日商簿記1級で受験資格と実務評価を同時に獲得</text>
</svg>
