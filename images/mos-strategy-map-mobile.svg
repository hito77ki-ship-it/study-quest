<svg xmlns="http://www.w3.org/2000/svg" width="360" height="1234" viewBox="0 0 360 1234" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">MOS試験 科目・レベル別マップと合格戦略（モバイル版）</title>
  <desc id="svgdesc">Word・Excel・PowerPointの一般Associateと上級Expertのボリューム対比、合格基準700点の防衛線、Excelを縦に取り切るコスパ最強ルートを縦に示す戦略マップ</desc>
  <defs>
    <style>.mt{font-family:"Noto Sans JP",system-ui,sans-serif}.mr{font-family:"Noto Sans JP",system-ui,sans-serif;font-size:9.5px;fill:#64748b}</style>
  </defs>
  <rect width="360" height="1234" rx="16" fill="#F0FFF4"/>
  <rect x="16" y="20" width="328" height="56" rx="12" fill="#1E293B"/>
  <text x="180" y="40" text-anchor="middle" class="mt" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="1">大谷流・MOS攻略ナビ</text>
  <text x="180" y="60" text-anchor="middle" class="mt" font-size="13.5" font-weight="800" fill="#FFFFFF">科目・レベル別戦略マップ</text>

  <text x="180" y="98" text-anchor="middle" class="mt" font-size="11" font-weight="700" fill="#334155">3科目のボリューム対比（一般Associate と 上級Expert）</text>

  <!-- Word card -->
  <rect x="16" y="112" width="328" height="230" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="16" y="112" width="328" height="34" rx="14" fill="#3B82F6"/>
  <text x="180" y="134" text-anchor="middle" class="mt" font-size="13" font-weight="800" fill="#fff">BOX 1　Word（文書作成）</text>

  <text x="32" y="168" class="mt" font-size="10.5" font-weight="700" fill="#1E3A8A">一般（Associate）</text>
  <rect x="32" y="176" width="296" height="18" rx="6" fill="#E0F2FE" stroke="#93C5FD" stroke-width="1"/>
  <rect x="32" y="176" width="115" height="18" rx="6" fill="#60A5FA"/>
  <text x="328" y="190" text-anchor="end" class="mt" font-size="10" fill="#1E3A8A">20〜40h</text>

  <text x="32" y="216" class="mt" font-size="10.5" font-weight="700" fill="#1E3A8A">上級（Expert）</text>
  <rect x="32" y="224" width="296" height="18" rx="6" fill="#E0F2FE" stroke="#93C5FD" stroke-width="1"/>
  <rect x="32" y="224" width="222" height="18" rx="6" fill="#2563EB"/>
  <text x="328" y="238" text-anchor="end" class="mt" font-size="10" fill="#1E3A8A">50〜70h</text>

  <text x="180" y="272" text-anchor="middle" class="mt" font-size="10" fill="#1E3A8A">事務・秘書・総務系で評価。</text>
  <text x="180" y="288" text-anchor="middle" class="mt" font-size="10" fill="#1E3A8A">「魅せる書類」を作る技能。</text>
  <text x="180" y="308" text-anchor="middle" class="mt" font-size="10.5" font-weight="700" fill="#1D4ED8">就活優先度：中（★★／★★★★）</text>
  <text x="180" y="330" text-anchor="middle" class="mt" font-size="11" font-weight="700" fill="#1E3A8A">武器としては2番手「文書作成」</text>

  <!-- Excel card (highlighted) -->
  <rect x="16" y="360" width="328" height="270" rx="16" fill="#F0FDF4" stroke="#FBBF24" stroke-width="3"/>
  <rect x="90" y="346" width="180" height="26" rx="13" fill="#FBBF24" stroke="#B45309" stroke-width="1.5"/>
  <text x="180" y="363" text-anchor="middle" class="mt" font-size="11" font-weight="800" fill="#78350F">★最優先ルート★</text>
  <rect x="16" y="378" width="328" height="34" rx="16" fill="#16A34A"/>
  <text x="180" y="400" text-anchor="middle" class="mt" font-size="13.5" font-weight="800" fill="#fff">BOX 2　Excel（就活最強）</text>

  <text x="32" y="434" class="mt" font-size="10.5" font-weight="700" fill="#14532D">一般（Associate）</text>
  <rect x="32" y="442" width="296" height="20" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <rect x="32" y="442" width="150" height="20" rx="6" fill="#4ADE80"/>
  <text x="328" y="457" text-anchor="end" class="mt" font-size="10.5" font-weight="700" fill="#14532D">30〜50h</text>

  <text x="180" y="480" text-anchor="middle" class="mt" font-size="10" font-weight="800" fill="#B45309">↓縦に取り切るのが最大のチート技</text>

  <text x="32" y="504" class="mt" font-size="10.5" font-weight="700" fill="#14532D">上級（Expert）</text>
  <rect x="32" y="512" width="296" height="20" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <rect x="32" y="512" width="245" height="20" rx="6" fill="#16A34A"/>
  <text x="328" y="527" text-anchor="end" class="mt" font-size="10.5" font-weight="700" fill="#14532D">60〜80h</text>

  <text x="180" y="558" text-anchor="middle" class="mt" font-size="10.5" font-weight="700" fill="#14532D">経理・財務・データ分析職で</text>
  <text x="180" y="574" text-anchor="middle" class="mt" font-size="10.5" font-weight="700" fill="#14532D">圧倒的に評価される最強科目。</text>
  <text x="180" y="590" text-anchor="middle" class="mt" font-size="11" font-weight="800" fill="#15803D">就活優先度：★最高★</text>
  <text x="180" y="614" text-anchor="middle" class="mt" font-size="11.5" font-weight="800" fill="#14532D">最優先で味方にすべき「就活最強」</text>

  <!-- PowerPoint card -->
  <rect x="16" y="648" width="328" height="230" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <rect x="16" y="648" width="328" height="34" rx="14" fill="#F97316"/>
  <text x="180" y="670" text-anchor="middle" class="mt" font-size="12.5" font-weight="800" fill="#fff">BOX 3　PowerPoint（伝達力）</text>

  <text x="32" y="704" class="mt" font-size="10.5" font-weight="700" fill="#9A3412">一般（Associate）のみ</text>
  <rect x="32" y="712" width="296" height="18" rx="6" fill="#FFEDD5" stroke="#FDBA74" stroke-width="1"/>
  <rect x="32" y="712" width="105" height="18" rx="6" fill="#FB923C"/>
  <text x="328" y="726" text-anchor="end" class="mt" font-size="10" fill="#9A3412">20〜30h</text>
  <text x="180" y="750" text-anchor="middle" class="mt" font-size="10" font-weight="700" fill="#C2410C">上級（Expert）は現行365では設定なし</text>

  <text x="180" y="778" text-anchor="middle" class="mt" font-size="10" fill="#9A3412">営業・企画・マーケ系でプレゼンの</text>
  <text x="180" y="794" text-anchor="middle" class="mt" font-size="10" fill="#9A3412">説得力を証明。一般1科目で完結。</text>
  <text x="180" y="814" text-anchor="middle" class="mt" font-size="10.5" font-weight="700" fill="#C2410C">就活優先度：中〜高（★★・一般のみ）</text>
  <text x="180" y="838" text-anchor="middle" class="mt" font-size="11" font-weight="700" fill="#9A3412">短期決着で取れる「伝達力」</text>

  <!-- Defense line -->
  <text x="180" y="896" text-anchor="middle" class="mt" font-size="11.5" font-weight="700" fill="#334155">全科目共通：合格基準700点の防衛線</text>
  <text x="180" y="912" text-anchor="middle" class="mt" font-size="10" fill="#334155">（1000点満点）</text>

  <rect x="16" y="928" width="328" height="150" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="32" y="954" class="mt" font-size="11" font-weight="700" fill="#1E293B">出題：マルチプロジェクト形式の実技試験</text>
  <text x="32" y="970" class="mr">（50〜60分・複数ファイル操作）</text>

  <rect x="32" y="984" width="296" height="26" rx="13" fill="#FDE68A" opacity="0.85"/>
  <rect x="32" y="984" width="207" height="26" rx="13" fill="#FCA5A5" opacity="0.85"/>
  <rect x="239" y="984" width="89" height="26" rx="13" fill="#86EFAC" opacity="0.85"/>
  <line x1="239" y1="972" x2="239" y2="1014" stroke="#1E293B" stroke-width="2.5"/>
  <text x="239" y="964" text-anchor="middle" class="mt" font-size="10.5" font-weight="800" fill="#1E293B">700点ライン</text>

  <text x="120" y="1034" text-anchor="middle" class="mt" font-size="9.5" fill="#7F1D1D">知識だけでは届かない</text>
  <text x="284" y="1034" text-anchor="middle" class="mt" font-size="9.5" fill="#14532D">操作練習で安定突破</text>
  <text x="180" y="1060" text-anchor="middle" class="mt" font-size="10.5" font-weight="700" fill="#334155">攻略：テキストを読むだけでなく、実際に</text>
  <text x="180" y="1076" text-anchor="middle" class="mt" font-size="10.5" font-weight="700" fill="#334155">PCを操作した回数がそのままスコアになる</text>

  <!-- Footer -->
  <rect x="16" y="1098" width="328" height="120" rx="14" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="1128" text-anchor="middle" class="mt" font-size="10.5" fill="#374151">3科目を均等に取る必要はない。</text>
  <text x="180" y="1148" text-anchor="middle" class="mt" font-size="10.5" fill="#374151">就活で評価される「Excel一般→Expert」を</text>
  <text x="180" y="1168" text-anchor="middle" class="mt" font-size="10.5" fill="#374151">縦に取り切るのを最優先に。</text>
  <text x="180" y="1194" text-anchor="middle" class="mt" font-size="11" font-weight="700" fill="#16A34A">受験料を最速で実務スキルという資産に</text>
  <text x="180" y="1210" text-anchor="middle" class="mt" font-size="11" font-weight="700" fill="#16A34A">変えられます。</text>
</svg>
