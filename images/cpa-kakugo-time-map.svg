<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">大学生のための公認会計士受験・自由時間のハコ分けマップ</title>
  <desc id="svgdesc">大学生の24時間の内訳（睡眠・授業と通学・自由時間）を円グラフで示し、さらに自由時間8〜10時間の内訳を拡大して、半分以上の巨大なハコを勉強が占領し、残りの小さなスキマでバイトや娯楽をやりくりする圧倒的なトレードオフを示した図解</desc>
  <defs>
    <linearGradient id="ktTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#2D4A10"/>
    </linearGradient>
    <linearGradient id="ktStudy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FC8181"/>
      <stop offset="1" stop-color="#C53030"/>
    </linearGradient>
    <filter id="ktShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <marker id="ktArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94A3B8"/>
    </marker>
    <style>.kt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="1200" height="650" rx="20" fill="#FAFAFC"/>

  <!-- Title -->
  <rect x="40" y="24" width="1120" height="64" rx="14" fill="url(#ktTitle)"/>
  <text x="600" y="48" text-anchor="middle" class="kt" font-size="11.5" font-weight="700" fill="#A0C070" letter-spacing="2">大学生の自由時間ハコ分けマトリクス</text>
  <text x="600" y="71" text-anchor="middle" class="kt" font-size="19" font-weight="800" fill="#FFFFFF">24時間のうち、自由時間はこう溶けていく</text>

  <!-- Chart A: 24-hour breakdown -->
  <g filter="url(#ktShadow)">
    <path d="M220,300 L220.0,170.0 A130,130 0 0,1 345.6,333.6 Z" fill="#C7D2FE" stroke="#818CF8" stroke-width="2"/>
    <path d="M220,300 L345.6,333.6 A130,130 0 0,1 155.0,412.6 Z" fill="#E2E8F0" stroke="#94A3B8" stroke-width="2"/>
    <path d="M220,300 L155.0,412.6 A130,130 0 0,1 220.0,170.0 Z" fill="#BBF7D0" stroke="#4ADE80" stroke-width="2"/>
  </g>
  <text x="600" y="145" text-anchor="middle" class="kt" font-size="13" font-weight="700" fill="#334155">大学生の24時間</text>

  <text x="283.9" y="245.9" text-anchor="middle" class="kt" font-size="12" font-weight="700" fill="#3730A3">睡眠</text>
  <text x="283.9" y="261.9" text-anchor="middle" class="kt" font-size="10.5" fill="#3730A3">約7時間</text>
  <text x="250.8" y="369.5" text-anchor="middle" class="kt" font-size="12" font-weight="700" fill="#334155">授業・通学</text>
  <text x="250.8" y="385.5" text-anchor="middle" class="kt" font-size="10.5" fill="#334155">約7時間</text>
  <text x="142.1" y="274.1" text-anchor="middle" class="kt" font-size="12.5" font-weight="800" fill="#166534">自由時間</text>
  <text x="142.1" y="291.1" text-anchor="middle" class="kt" font-size="10.5" font-weight="700" fill="#166534">8〜10時間</text>

  <!-- Connector -->
  <line x1="360" y1="300" x2="840" y2="300" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6,6" marker-end="url(#ktArrow)"/>
  <text x="600" y="285" text-anchor="middle" class="kt" font-size="12.5" font-weight="700" fill="#475569">🔍 自由時間8〜10時間を分解すると…</text>

  <!-- Chart B: free-time breakdown -->
  <g filter="url(#ktShadow)">
    <path d="M980,300 L980.0,170.0 A130,130 0 1,1 935.5,422.2 Z" fill="url(#ktStudy)" stroke="#9B2C2C" stroke-width="2"/>
    <path d="M980,300 L935.5,422.2 A130,130 0 0,1 980.0,170.0 Z" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2"/>
  </g>
  <text x="600" y="145" text-anchor="middle" class="kt" font-size="13" font-weight="700" fill="#334155" opacity="0"> </text>
  <text x="980" y="145" text-anchor="middle" class="kt" font-size="13" font-weight="700" fill="#334155">自由時間8〜10時間の内訳</text>

  <text x="1059.4" y="308" text-anchor="middle" class="kt" font-size="12" font-weight="800" fill="#FFFFFF">勉強</text>
  <text x="1059.4" y="324" text-anchor="middle" class="kt" font-size="10.5" font-weight="700" fill="#FFFFFF">4〜5時間</text>
  <text x="900.6" y="280" text-anchor="middle" class="kt" font-size="11.5" font-weight="700" fill="#1E40AF">バイト・娯楽</text>
  <text x="900.6" y="296" text-anchor="middle" class="kt" font-size="10.5" fill="#1E40AF">・息抜き</text>

  <!-- Legends -->
  <rect x="60" y="450" width="16" height="16" rx="4" fill="#C7D2FE" stroke="#818CF8"/>
  <text x="84" y="463" class="kt" font-size="12" fill="#374151">睡眠：約7時間</text>
  <rect x="60" y="474" width="16" height="16" rx="4" fill="#E2E8F0" stroke="#94A3B8"/>
  <text x="84" y="487" class="kt" font-size="12" fill="#374151">授業・通学：約7時間</text>
  <rect x="60" y="498" width="16" height="16" rx="4" fill="#BBF7D0" stroke="#4ADE80"/>
  <text x="84" y="511" class="kt" font-size="12" font-weight="700" fill="#166534">自由時間：8〜10時間（ここが勝負）</text>

  <rect x="830" y="450" width="16" height="16" rx="4" fill="url(#ktStudy)" stroke="#9B2C2C"/>
  <text x="854" y="463" class="kt" font-size="12" font-weight="700" fill="#C53030">勉強：4〜5時間（絶対死守のハコ）</text>
  <rect x="830" y="474" width="16" height="16" rx="4" fill="#BFDBFE" stroke="#60A5FA"/>
  <text x="854" y="487" class="kt" font-size="12" fill="#374151">バイト・娯楽・息抜き：残りのスキマ</text>

  <!-- Bottom summary bar -->
  <rect x="40" y="540" width="1120" height="90" rx="16" fill="#111827" filter="url(#ktShadow)"/>
  <text x="600" y="570" text-anchor="middle" class="kt" font-size="14" font-weight="700" fill="#8CC63F">💡 覚悟<tspan font-size="9" dy="-8" fill="#A0C070">かくご</tspan><tspan dy="8">のリアル：自由時間の半分以上を勉強に明け渡すゲーム</tspan></text>
  <text x="600" y="596" text-anchor="middle" class="kt" font-size="12" fill="#E5E7EB">自由時間8〜10時間のうち5時間前後を勉強が占領。残りの3〜5時間でバイト・娯楽・息抜きを全部やりくりする必要がある。</text>
  <text x="600" y="616" text-anchor="middle" class="kt" font-size="12" fill="#E5E7EB">これが、公認会計士試験に本気で捧げるということの数字のリアルです。</text>
</svg>
