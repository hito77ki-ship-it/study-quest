<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1180" width="360" height="1180">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="360" height="1180" rx="12" fill="#FAFDF6"/>
  <text x="180" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">資格勉強アプリ 3大分類マップ</text>
  <text x="180" y="44" text-anchor="middle" font-size="10" fill="#64748B">「記録したい」「学びたい」「続けたい」で選ぶ</text>

  <!-- ① 学習記録・管理型 -->
  <rect x="16" y="62" width="328" height="336" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="16" y="62" width="328" height="34" rx="10" fill="#3B82F6"/>
  <rect x="16" y="86" width="328" height="10" fill="#3B82F6"/>
  <text x="180" y="84" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">📊 学習記録・管理型</text>

  <text x="180" y="116" text-anchor="middle" font-size="10.5" fill="#1D4ED8">勉強時間を記録・可視化する</text>
  <rect x="28" y="128" width="304" height="42" rx="6" fill="#DBEAFE"/>
  <text x="180" y="146" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">代表アプリ</text>
  <text x="180" y="162" text-anchor="middle" font-size="10.5" fill="#1E3A8A">StudyPlus／Study Quest</text>

  <text x="28" y="192" font-size="10.5" fill="#374151">▸ 勉強時間をグラフで可視化</text>
  <text x="28" y="208" font-size="10.5" fill="#374151">▸ SNSで勉強仲間とつながれる</text>
  <text x="28" y="224" font-size="10.5" fill="#374151">▸ 記録がシンプルで迷わない</text>

  <rect x="28" y="240" width="304" height="66" rx="6" fill="#BFDBFE"/>
  <text x="180" y="258" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">弱点</text>
  <text x="180" y="274" text-anchor="middle" font-size="10" fill="#1E3A8A">継続を後押しする仕掛けが少ない</text>
  <text x="180" y="290" text-anchor="middle" font-size="10" fill="#1E3A8A">タイプもある（StudyPlusなど）</text>

  <rect x="28" y="316" width="304" height="66" rx="6" fill="#1E3A8A"/>
  <text x="180" y="335" text-anchor="middle" font-size="10.5" font-weight="700" fill="#93C5FD">向いている人</text>
  <text x="180" y="352" text-anchor="middle" font-size="10" fill="#DBEAFE">シンプルに記録したい人</text>
  <text x="180" y="368" text-anchor="middle" font-size="10" fill="#DBEAFE">仲間を見つけたい人</text>

  <!-- ② コンテンツ提供型 -->
  <rect x="16" y="416" width="328" height="336" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="16" y="416" width="328" height="34" rx="10" fill="#F59E0B"/>
  <rect x="16" y="440" width="328" height="10" fill="#F59E0B"/>
  <text x="180" y="438" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">🎓 コンテンツ提供型</text>

  <text x="180" y="470" text-anchor="middle" font-size="10.5" fill="#B45309">講義動画や問題集を提供する</text>
  <rect x="28" y="482" width="304" height="42" rx="6" fill="#FEF3C7"/>
  <text x="180" y="500" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">代表アプリ</text>
  <text x="180" y="516" text-anchor="middle" font-size="10.5" fill="#78350F">スタディング／資格スクエア</text>

  <text x="28" y="546" font-size="10.5" fill="#374151">▸ 講義動画・問題集が高品質</text>
  <text x="28" y="562" font-size="10.5" fill="#374151">▸ 隙間時間で学習が完結する</text>
  <text x="28" y="578" font-size="10.5" fill="#374151">▸ AIが学習マップを提示する</text>

  <rect x="28" y="594" width="304" height="66" rx="6" fill="#FDE68A"/>
  <text x="180" y="612" text-anchor="middle" font-size="10.5" font-weight="700" fill="#92400E">弱点</text>
  <text x="180" y="628" text-anchor="middle" font-size="10" fill="#78350F">月額費用が必要。継続の仕掛けが</text>
  <text x="180" y="644" text-anchor="middle" font-size="10" fill="#78350F">弱く、途中離脱しやすい傾向がある</text>

  <rect x="28" y="670" width="304" height="66" rx="6" fill="#92400E"/>
  <text x="180" y="689" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FDE68A">向いている人</text>
  <text x="180" y="706" text-anchor="middle" font-size="10" fill="#FEF3C7">教材をアプリで完結したい人</text>
  <text x="180" y="722" text-anchor="middle" font-size="10" fill="#FEF3C7">隙間時間を活用したい人</text>

  <!-- ③ ゲーミフィケーション型 -->
  <rect x="16" y="770" width="328" height="336" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <rect x="16" y="770" width="328" height="34" rx="10" fill="#22C55E"/>
  <rect x="16" y="794" width="328" height="10" fill="#22C55E"/>
  <text x="180" y="792" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">🎮 ゲーミフィケーション型</text>

  <text x="180" y="824" text-anchor="middle" font-size="10.5" fill="#15803D">ゲーム要素で継続をサポート</text>
  <rect x="28" y="836" width="304" height="42" rx="6" fill="#DCFCE7"/>
  <text x="180" y="854" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">代表アプリ</text>
  <text x="180" y="870" text-anchor="middle" font-size="10.5" fill="#14532D">Study Quest／Duolingo</text>

  <text x="28" y="900" font-size="10.5" fill="#374151">▸ 経験値・レベルで継続を後押し</text>
  <text x="28" y="916" font-size="10.5" fill="#374151">▸ ストリーク・通知設計が秀逸</text>
  <text x="28" y="932" font-size="10.5" fill="#374151">▸ 孤独な勉強がゲームに変わる</text>

  <rect x="28" y="948" width="304" height="66" rx="6" fill="#BBF7D0"/>
  <text x="180" y="966" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">弱点</text>
  <text x="180" y="982" text-anchor="middle" font-size="10" fill="#14532D">Duolingoは語学専用。Study Questは</text>
  <text x="180" y="998" text-anchor="middle" font-size="10" fill="#14532D">学習コンテンツ自体は提供しない</text>

  <rect x="28" y="1024" width="304" height="66" rx="6" fill="#14532D"/>
  <text x="180" y="1043" text-anchor="middle" font-size="10.5" font-weight="700" fill="#86EFAC">向いている人</text>
  <text x="180" y="1060" text-anchor="middle" font-size="10" fill="#DCFCE7">続かないことに悩む人</text>
  <text x="180" y="1076" text-anchor="middle" font-size="10" fill="#DCFCE7">ゲーム好き・独学勢</text>
</svg>
