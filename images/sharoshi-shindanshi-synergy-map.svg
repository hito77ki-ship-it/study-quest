<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">社労士×中小企業診断士 試験範囲・専門領域対比と相乗効果ダブルライセンスマップ</title>
  <desc id="svgdesc">社労士の労務・人事・社会保険の専門領域と、中小企業診断士の経営・財務・マーケティング・ITの専門領域を対比し、重なり合う相乗効果を示すダブルライセンスマップ</desc>
  <defs>
    <linearGradient id="syBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0F9FF"/>
      <stop offset="0.5" stop-color="#FDF4FF"/>
      <stop offset="1" stop-color="#F0FFF7"/>
    </linearGradient>
    <linearGradient id="syTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <radialGradient id="syLeft" cx="0.35" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#BFDBFE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </radialGradient>
    <radialGradient id="syRight" cx="0.65" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </radialGradient>
    <filter id="syShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <style>.st{font-family:"Noto Sans JP",system-ui,sans-serif}.sr{font-family:"Noto Sans JP",system-ui,sans-serif;font-size:10.5px;fill:#64748b}</style>
  </defs>

  <rect width="1200" height="700" rx="20" fill="url(#syBg)"/>
  <circle cx="90" cy="100" r="90" fill="#DBEAFE" opacity="0.5"/>
  <circle cx="1110" cy="120" r="100" fill="#FEF3C7" opacity="0.4"/>
  <circle cx="600" cy="670" r="110" fill="#D1FAE5" opacity="0.35"/>

  <!-- Title bar -->
  <rect x="40" y="24" width="1120" height="66" rx="14" fill="url(#syTitle)"/>
  <text x="600" y="48" text-anchor="middle" class="st" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="3">大谷流・ダブルライセンス戦略ナビ</text>
  <text x="600" y="73" text-anchor="middle" class="st" font-size="20" font-weight="800" fill="#FFFFFF">社労士×中小企業診断士 専門領域対比と相乗効果マップ</text>

  <!-- ============ VENN DIAGRAM ============ -->
  <circle cx="440" cy="320" r="210" fill="url(#syLeft)" opacity="0.88" filter="url(#syShadow)"/>
  <circle cx="760" cy="320" r="210" fill="url(#syRight)" opacity="0.88" filter="url(#syShadow)"/>

  <!-- Left label -->
  <text x="330" y="180" text-anchor="middle" class="st" font-size="17" font-weight="800" fill="#fff">社会保険労務士</text>
  <text x="330" y="200" text-anchor="middle" class="st" font-size="12" font-weight="700" fill="rgba(255,255,255,.85)">「人」を法律で守る専門家</text>

  <text x="300" y="240" text-anchor="middle" class="st" font-size="12" fill="#1E3A8A">・労働基準法／社会保険法</text>
  <text x="300" y="260" text-anchor="middle" class="st" font-size="12" fill="#1E3A8A">・就業規則の作成</text>
  <text x="300" y="280" text-anchor="middle" class="st" font-size="12" fill="#1E3A8A">・給与計算・人事労務</text>
  <text x="300" y="300" text-anchor="middle" class="st" font-size="12" fill="#1E3A8A">・ハラスメント対応</text>

  <rect x="220" y="378" width="220" height="60" rx="10" fill="rgba(255,255,255,.75)" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="330" y="400" text-anchor="middle" class="st" font-size="11.5" font-weight="700" fill="#1E3A8A">稼ぎ方：顧問契約</text>
  <text x="330" y="418" text-anchor="middle" class="st" font-size="11.5" font-weight="700" fill="#1E3A8A">＝サブスク型（月次安定収入）</text>

  <!-- Right label -->
  <text x="870" y="180" text-anchor="middle" class="st" font-size="17" font-weight="800" fill="#fff">中小企業診断士</text>
  <text x="870" y="200" text-anchor="middle" class="st" font-size="12" font-weight="700" fill="rgba(255,255,255,.85)">「会社」を経営で伸ばす専門家</text>

  <text x="900" y="240" text-anchor="middle" class="st" font-size="12" fill="#92400E">・経営戦略／財務会計</text>
  <text x="900" y="260" text-anchor="middle" class="st" font-size="12" fill="#92400E">・マーケティング・運営管理</text>
  <text x="900" y="280" text-anchor="middle" class="st" font-size="12" fill="#92400E">・IT・DX推進支援</text>
  <text x="900" y="300" text-anchor="middle" class="st" font-size="12" fill="#92400E">・補助金・事業計画策定</text>

  <rect x="760" y="378" width="220" height="60" rx="10" fill="rgba(255,255,255,.75)" stroke="#92400E" stroke-width="1.5"/>
  <text x="870" y="400" text-anchor="middle" class="st" font-size="11.5" font-weight="700" fill="#92400E">稼ぎ方：コンサル・研修</text>
  <text x="870" y="418" text-anchor="middle" class="st" font-size="11.5" font-weight="700" fill="#92400E">＝ショット型（単発・成果報酬）</text>

  <!-- Overlap center -->
  <g filter="url(#syShadow)">
    <rect x="500" y="270" width="200" height="150" rx="16" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2.5"/>
  </g>
  <text x="600" y="298" text-anchor="middle" class="st" font-size="12" font-weight="800" fill="#276749" letter-spacing="1">相乗効果ゾーン</text>
  <text x="600" y="322" text-anchor="middle" class="st" font-size="12.5" font-weight="700" fill="#1A202C">労務も経営も</text>
  <text x="600" y="342" text-anchor="middle" class="st" font-size="12.5" font-weight="700" fill="#1A202C">丸ごと支援できる</text>
  <text x="600" y="362" text-anchor="middle" class="st" font-size="12.5" font-weight="700" fill="#1A202C">希少な専門家</text>
  <text x="600" y="384" text-anchor="middle" class="st" font-size="11" fill="#276749">サブスク×ショットの複合提案</text>
  <text x="600" y="400" text-anchor="middle" class="st" font-size="11" fill="#276749">＝収入源が二重化して安定</text>

  <!-- Bottom summary -->
  <rect x="60" y="470" width="1080" height="170" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#syShadow)"/>
  <text x="600" y="500" text-anchor="middle" class="st" font-size="13" font-weight="700" fill="#334155">試験範囲は重ならない。だからこそ武器が2倍になる。</text>

  <text x="140" y="536" class="st" font-size="12" font-weight="700" fill="#1E3A8A">社労士の試験範囲</text>
  <text x="140" y="556" class="st" font-size="11.5" fill="#374151">労働基準法・労災保険・雇用保険・</text>
  <text x="140" y="574" class="st" font-size="11.5" fill="#374151">健康保険・厚生年金・国民年金 等</text>

  <line x1="600" y1="510" x2="600" y2="600" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4 4"/>

  <text x="660" y="536" class="st" font-size="12" font-weight="700" fill="#92400E">中小企業診断士の試験範囲</text>
  <text x="660" y="556" class="st" font-size="11.5" fill="#374151">経済学・財務会計・企業経営理論・</text>
  <text x="660" y="574" class="st" font-size="11.5" fill="#374151">運営管理・経営法務・情報システム 等</text>

  <text x="600" y="610" text-anchor="middle" class="st" font-size="12" font-weight="700" fill="#16A34A">重複ゼロだから、片方の学習がもう片方の得点源を食い合わない</text>

  <!-- Footer note -->
  <text x="600" y="668" text-anchor="middle" class="st" font-size="13" font-weight="700" fill="#374151">労務の「守り」と経営の「攻め」、両方持てるのはこの組み合わせだけ。</text>
</svg>
