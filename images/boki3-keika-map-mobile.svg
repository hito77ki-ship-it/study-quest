<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1180" width="360" height="1180" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">経過勘定4パターン——決算日をまたぐ「ズレ」の可視化（モバイル版）</title>
  <desc id="svgdesc">前払費用・未払費用・前受収益・未収収益の4つの経過勘定について、決算日をまたぐ当期・翌期の対応関係を縦に並べた図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="1180" fill="#FAFAFA" rx="12"/>

  <rect x="20" y="16" width="320" height="34" fill="#FEF3C7" rx="8"/>
  <text x="180" y="38" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A202C">経過勘定4パターン</text>

  <!-- A -->
  <rect x="20" y="66" width="320" height="150" rx="10" fill="#fff" stroke="#93C5FD" stroke-width="2"/>
  <text x="36" y="90" font-size="12.5" font-weight="700" fill="#1D4ED8">A. 前払費用（資産）</text>
  <rect x="36" y="100" width="150" height="26" rx="4" fill="#3B82F6"/>
  <text x="111" y="117" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">当期の費用</text>
  <rect x="186" y="100" width="138" height="26" rx="4" fill="#BFDBFE" stroke="#93C5FD"/>
  <text x="255" y="117" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1D4ED8">前払費用（翌期）</text>
  <line x1="186" y1="96" x2="186" y2="130" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="186" y="146" text-anchor="middle" font-size="9" fill="#DC2626">▼ 決算日</text>
  <text x="180" y="168" text-anchor="middle" font-size="10" fill="#374151">先払い済みのうち翌期対応分を</text>
  <text x="180" y="186" text-anchor="middle" font-size="10" fill="#374151">資産として繰り延べる</text>
  <text x="180" y="204" text-anchor="middle" font-size="9" fill="#6B7280">↑支払日（当期）</text>

  <!-- B -->
  <rect x="20" y="232" width="320" height="150" rx="10" fill="#fff" stroke="#FCA5A5" stroke-width="2"/>
  <text x="36" y="256" font-size="12.5" font-weight="700" fill="#B91C1C">B. 未払費用（負債）</text>
  <rect x="36" y="266" width="150" height="26" rx="4" fill="#EF4444"/>
  <text x="111" y="283" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">当期発生（未払費用）</text>
  <line x1="186" y1="262" x2="186" y2="296" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="186" y="312" text-anchor="middle" font-size="9" fill="#DC2626">▼ 決算日</text>
  <line x1="186" y1="279" x2="300" y2="279" stroke="#FCA5A5" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="300" cy="279" r="5" fill="#EF4444"/>
  <text x="180" y="334" text-anchor="middle" font-size="10" fill="#374151">当期発生済みだが未払いの分を</text>
  <text x="180" y="352" text-anchor="middle" font-size="10" fill="#374151">負債として追加計上する</text>
  <text x="180" y="370" text-anchor="middle" font-size="9" fill="#6B7280">↓支払日（翌期）</text>

  <!-- C -->
  <rect x="20" y="398" width="320" height="150" rx="10" fill="#fff" stroke="#6EE7B7" stroke-width="2"/>
  <text x="36" y="422" font-size="12.5" font-weight="700" fill="#065F46">C. 前受収益（負債）</text>
  <rect x="36" y="432" width="150" height="26" rx="4" fill="#059669"/>
  <text x="111" y="449" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">当期の収益</text>
  <rect x="186" y="432" width="138" height="26" rx="4" fill="#A7F3D0" stroke="#6EE7B7"/>
  <text x="255" y="449" text-anchor="middle" font-size="9.5" font-weight="700" fill="#065F46">前受収益（翌期）</text>
  <line x1="186" y1="428" x2="186" y2="462" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="186" y="478" text-anchor="middle" font-size="9" fill="#DC2626">▼ 決算日</text>
  <text x="180" y="500" text-anchor="middle" font-size="10" fill="#374151">先受け済みのうち翌期対応分を</text>
  <text x="180" y="518" text-anchor="middle" font-size="10" fill="#374151">負債として繰り延べる</text>
  <text x="180" y="536" text-anchor="middle" font-size="9" fill="#6B7280">↑受取日（当期）</text>

  <!-- D -->
  <rect x="20" y="564" width="320" height="150" rx="10" fill="#fff" stroke="#FCD34D" stroke-width="2"/>
  <text x="36" y="588" font-size="12.5" font-weight="700" fill="#92400E">D. 未収収益（資産）</text>
  <rect x="36" y="598" width="150" height="26" rx="4" fill="#D97706"/>
  <text x="111" y="615" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">当期発生（未収収益）</text>
  <line x1="186" y1="594" x2="186" y2="628" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="186" y="644" text-anchor="middle" font-size="9" fill="#DC2626">▼ 決算日</text>
  <line x1="186" y1="611" x2="300" y2="611" stroke="#FCD34D" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="300" cy="611" r="5" fill="#D97706"/>
  <text x="180" y="666" text-anchor="middle" font-size="10" fill="#374151">当期発生済みだが未受取の分を</text>
  <text x="180" y="684" text-anchor="middle" font-size="10" fill="#374151">資産として追加計上する</text>
  <text x="180" y="702" text-anchor="middle" font-size="9" fill="#6B7280">↓受取日（翌期）</text>

  <!-- summary -->
  <rect x="20" y="730" width="320" height="270" fill="#fff" rx="10" stroke="#E2E8F0" stroke-width="1"/>
  <text x="180" y="756" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1A202C">📋 4パターン早見表</text>
  <text x="36" y="782" font-size="10.5" fill="#374151"><tspan font-weight="700" fill="#1D4ED8">前払費用</tspan>：</text>
  <text x="36" y="800" font-size="10.5" fill="#374151">先払い済みのうち翌期対応分を資産計上</text>
  <text x="36" y="828" font-size="10.5" fill="#374151"><tspan font-weight="700" fill="#B91C1C">未払費用</tspan>：</text>
  <text x="36" y="846" font-size="10.5" fill="#374151">当期発生済みだが未払いの分を負債計上</text>
  <text x="36" y="874" font-size="10.5" fill="#374151"><tspan font-weight="700" fill="#065F46">前受収益</tspan>：</text>
  <text x="36" y="892" font-size="10.5" fill="#374151">先受け済みのうち翌期対応分を負債計上</text>
  <text x="36" y="920" font-size="10.5" fill="#374151"><tspan font-weight="700" fill="#92400E">未収収益</tspan>：</text>
  <text x="36" y="938" font-size="10.5" fill="#374151">当期発生済みだが未受取の分を資産計上</text>
</svg>
