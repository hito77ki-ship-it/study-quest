<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="460" rx="12" fill="#F8FAFC"/>
  <text x="380" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">社労士試験の全体像——試験構成・科目・足切りライン</text>
  <!-- Left: 試験構成 -->
  <rect x="20" y="52" width="348" height="388" rx="8" fill="#FFF7ED"/>
  <rect x="20" y="52" width="348" height="34" rx="8" fill="#EA580C"/>
  <text x="194" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">試験構成（合格率6〜7%）</text>
  <!-- 選択式 -->
  <text x="40" y="106" text-anchor="start" font-size="12" font-weight="700" fill="#C2410C">選択式（午前：1時間20分）</text>
  <rect x="40" y="114" width="310" height="28" rx="4" fill="#FFEDD5"/>
  <text x="50" y="133" text-anchor="start" font-size="10" fill="#374151">8科目 × 5問 ＝ 40問（各科目5択穴埋め）</text>
  <rect x="40" y="148" width="310" height="28" rx="4" fill="#FED7AA"/>
  <text x="50" y="167" text-anchor="start" font-size="10" font-weight="700" fill="#9A3412">足切り：各科目3点以上（満点5点）が必須</text>
  <!-- 択一式 -->
  <text x="40" y="208" text-anchor="start" font-size="12" font-weight="700" fill="#C2410C">択一式（午後：3時間30分）</text>
  <rect x="40" y="216" width="310" height="28" rx="4" fill="#FFEDD5"/>
  <text x="50" y="235" text-anchor="start" font-size="10" fill="#374151">7科目 × 10問 ＝ 70問（5肢択一）</text>
  <rect x="40" y="250" width="310" height="28" rx="4" fill="#FED7AA"/>
  <text x="50" y="269" text-anchor="start" font-size="10" font-weight="700" fill="#9A3412">足切り：各科目4点以上（満点10点）が必須</text>
  <!-- 合格ライン -->
  <text x="40" y="310" text-anchor="start" font-size="12" font-weight="700" fill="#C2410C">合格基準（年度により変動）</text>
  <rect x="40" y="318" width="310" height="26" rx="4" fill="#FFEDD5"/>
  <text x="50" y="335" text-anchor="start" font-size="10" fill="#374151">選択式：総得点24〜26点前後（目安）</text>
  <rect x="40" y="350" width="310" height="26" rx="4" fill="#FFEDD5"/>
  <text x="50" y="367" text-anchor="start" font-size="10" fill="#374151">択一式：総得点45〜49点前後（目安）</text>
  <rect x="40" y="382" width="310" height="42" rx="4" fill="#FEE2E2"/>
  <text x="50" y="400" text-anchor="start" font-size="10" font-weight="700" fill="#991B1B">注意：総得点が高くても各科目の足切りを</text>
  <text x="50" y="416" text-anchor="start" font-size="10" font-weight="700" fill="#991B1B">1科目でも下回ると不合格になる</text>
  <!-- Right: 10科目 -->
  <rect x="384" y="52" width="356" height="388" rx="8" fill="#F0FDF4"/>
  <rect x="384" y="52" width="356" height="34" rx="8" fill="#15803D"/>
  <text x="562" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">主要10科目と学習優先度</text>
  <!-- 科目リスト -->
  <rect x="400" y="96" width="324" height="28" rx="4" fill="#DCFCE7"/>
  <text x="410" y="115" text-anchor="start" font-size="10" fill="#374151">① 労働基準法・安全衛生法</text>
  <rect x="668" y="100" width="48" height="20" rx="4" fill="#16A34A"/>
  <text x="692" y="114" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">最重要</text>
  <rect x="400" y="130" width="324" height="28" rx="4" fill="#DCFCE7"/>
  <text x="410" y="149" text-anchor="start" font-size="10" fill="#374151">② 労働者災害補償保険法（労災）</text>
  <rect x="668" y="134" width="48" height="20" rx="4" fill="#16A34A"/>
  <text x="692" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">最重要</text>
  <rect x="400" y="164" width="324" height="28" rx="4" fill="#DCFCE7"/>
  <text x="410" y="183" text-anchor="start" font-size="10" fill="#374151">③ 雇用保険法</text>
  <rect x="668" y="168" width="48" height="20" rx="4" fill="#16A34A"/>
  <text x="692" y="182" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">最重要</text>
  <rect x="400" y="198" width="324" height="28" rx="4" fill="#BBF7D0"/>
  <text x="410" y="217" text-anchor="start" font-size="10" fill="#374151">④ 社会保険に関する一般常識</text>
  <rect x="668" y="202" width="48" height="20" rx="4" fill="#22C55E"/>
  <text x="692" y="216" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">重要</text>
  <rect x="400" y="232" width="324" height="28" rx="4" fill="#BBF7D0"/>
  <text x="410" y="251" text-anchor="start" font-size="10" fill="#374151">⑤ 健康保険法</text>
  <rect x="668" y="236" width="48" height="20" rx="4" fill="#22C55E"/>
  <text x="692" y="250" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">重要</text>
  <rect x="400" y="266" width="324" height="28" rx="4" fill="#BBF7D0"/>
  <text x="410" y="285" text-anchor="start" font-size="10" fill="#374151">⑥ 厚生年金保険法</text>
  <rect x="668" y="270" width="48" height="20" rx="4" fill="#22C55E"/>
  <text x="692" y="284" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">重要</text>
  <rect x="400" y="300" width="324" height="28" rx="4" fill="#BBF7D0"/>
  <text x="410" y="319" text-anchor="start" font-size="10" fill="#374151">⑦ 国民年金法</text>
  <rect x="668" y="304" width="48" height="20" rx="4" fill="#22C55E"/>
  <text x="692" y="318" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">重要</text>
  <rect x="400" y="334" width="324" height="28" rx="4" fill="#DCFCE7"/>
  <text x="410" y="353" text-anchor="start" font-size="10" fill="#374151">⑧ 労働保険徴収法</text>
  <rect x="668" y="338" width="48" height="20" rx="4" fill="#86EFAC"/>
  <text x="692" y="352" text-anchor="middle" font-size="9" fill="#166534">標準</text>
  <rect x="400" y="368" width="324" height="28" rx="4" fill="#DCFCE7"/>
  <text x="410" y="387" text-anchor="start" font-size="10" fill="#374151">⑨ 労働に関する一般常識</text>
  <rect x="668" y="372" width="48" height="20" rx="4" fill="#86EFAC"/>
  <text x="692" y="386" text-anchor="middle" font-size="9" fill="#166534">標準</text>
  <rect x="400" y="402" width="324" height="28" rx="4" fill="#DCFCE7"/>
  <text x="410" y="421" text-anchor="start" font-size="10" fill="#374151">⑩ 労働安全衛生法（安衛法）</text>
  <rect x="668" y="406" width="48" height="20" rx="4" fill="#86EFAC"/>
  <text x="692" y="420" text-anchor="middle" font-size="9" fill="#166534">標準</text>
</svg>
