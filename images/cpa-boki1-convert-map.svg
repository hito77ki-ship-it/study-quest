<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">公認会計士試験の知識を日商簿記1級へ引き継ぐ科目重複と知識コンバートマップ</title>
  <desc id="svgdesc">財務会計論・管理会計論・原価計算・理論暗記体力・監査論企業法の5分野が、日商簿記1級のどの科目にどれくらい活きるかを重複度別に示した図解</desc>
  <defs>
    <linearGradient id="kmBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#F0FFF4"/>
    </linearGradient>
    <linearGradient id="kmTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#2D4A10"/>
    </linearGradient>
    <linearGradient id="kmHigh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8CC63F"/>
      <stop offset="1" stop-color="#6AAF2B"/>
    </linearGradient>
    <linearGradient id="kmMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="kmLow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#CBD5E1"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>
    <filter id="kmShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <style>.kt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <rect width="1200" height="760" rx="20" fill="url(#kmBg)"/>

  <!-- Title -->
  <rect x="40" y="24" width="1120" height="64" rx="14" fill="url(#kmTitle)"/>
  <text x="600" y="48" text-anchor="middle" class="kt" font-size="12.5" font-weight="700" fill="#A0C070" letter-spacing="2">知識コンバートマップ</text>
  <text x="600" y="71" text-anchor="middle" class="kt" font-size="21" font-weight="800" fill="#FFFFFF">公認会計士の学習は、日商簿記1級にどこまで引き継げるか</text>

  <!-- Column headers -->
  <text x="215" y="118" text-anchor="middle" class="kt" font-size="17" font-weight="700" fill="#334155">公認会計士試験（CPA）で学んだ分野</text>
  <text x="600" y="118" text-anchor="middle" class="kt" font-size="16" font-weight="700" fill="#64748B">重複度</text>
  <text x="985" y="118" text-anchor="middle" class="kt" font-size="17" font-weight="700" fill="#334155">日商簿記1級で活きる範囲</text>

  <!-- Row template values: y positions -->
  <!-- Row 1: 財務会計論 -> 商業簿記・会計学 [高い] -->
  <g filter="url(#kmShadow)">
    <rect x="40" y="134" width="350" height="82" rx="14" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2"/>
    <rect x="810" y="134" width="350" height="82" rx="14" fill="#F0FFF4" stroke="#8CC63F" stroke-width="2"/>
  </g>
  <text x="215" y="168" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#1A202C">財務会計論</text>
  <text x="215" y="188" text-anchor="middle" class="kt" font-size="13" fill="#718096">計算・理論の土台</text>
  <rect x="450" y="160" width="300" height="30" rx="15" fill="url(#kmHigh)"/>
  <text x="600" y="180" text-anchor="middle" class="kt" font-size="14" font-weight="700" fill="#fff">重複度：高い →</text>
  <text x="985" y="168" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#276749">商業簿記・会計学</text>
  <text x="985" y="188" text-anchor="middle" class="kt" font-size="13" fill="#276749">そのまま土台として活きやすい</text>

  <!-- Row 2: 管理会計論 -> 工業簿記 [高い] -->
  <g filter="url(#kmShadow)">
    <rect x="40" y="230" width="350" height="82" rx="14" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2"/>
    <rect x="810" y="230" width="350" height="82" rx="14" fill="#F0FFF4" stroke="#8CC63F" stroke-width="2"/>
  </g>
  <text x="215" y="264" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#1A202C">管理会計論</text>
  <text x="215" y="284" text-anchor="middle" class="kt" font-size="13" fill="#718096">原価・意思決定会計</text>
  <rect x="450" y="256" width="300" height="30" rx="15" fill="url(#kmHigh)"/>
  <text x="600" y="276" text-anchor="middle" class="kt" font-size="14" font-weight="700" fill="#fff">重複度：高い →</text>
  <text x="985" y="264" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#276749">工業簿記</text>
  <text x="985" y="284" text-anchor="middle" class="kt" font-size="13" fill="#276749">原価計算の考え方が直結しやすい</text>

  <!-- Row 3: 原価計算 -> 原価計算 [高い] -->
  <g filter="url(#kmShadow)">
    <rect x="40" y="326" width="350" height="82" rx="14" fill="#FFFFFF" stroke="#8CC63F" stroke-width="2"/>
    <rect x="810" y="326" width="350" height="82" rx="14" fill="#F0FFF4" stroke="#8CC63F" stroke-width="2"/>
  </g>
  <text x="215" y="360" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#1A202C">原価計算</text>
  <text x="215" y="380" text-anchor="middle" class="kt" font-size="13" fill="#718096">CPA科目の中でも得点源</text>
  <rect x="450" y="352" width="300" height="30" rx="15" fill="url(#kmHigh)"/>
  <text x="600" y="372" text-anchor="middle" class="kt" font-size="14" font-weight="700" fill="#fff">重複度：高い →</text>
  <text x="985" y="360" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#276749">原価計算</text>
  <text x="985" y="380" text-anchor="middle" class="kt" font-size="13" fill="#276749">大きなアドバンテージになる</text>

  <!-- Row 4: 理論暗記体力 -> 学習習慣・暗記体力 [中] -->
  <g filter="url(#kmShadow)">
    <rect x="40" y="422" width="350" height="82" rx="14" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <rect x="810" y="422" width="350" height="82" rx="14" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  </g>
  <text x="215" y="456" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#1A202C">理論の暗記体力</text>
  <text x="215" y="476" text-anchor="middle" class="kt" font-size="13" fill="#718096">会計学・理論科目の学習習慣</text>
  <rect x="450" y="448" width="300" height="30" rx="15" fill="url(#kmMid)"/>
  <text x="600" y="468" text-anchor="middle" class="kt" font-size="14" font-weight="700" fill="#fff">重複度：中 →</text>
  <text x="985" y="456" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#975A16">学習習慣・暗記体力全般</text>
  <text x="985" y="476" text-anchor="middle" class="kt" font-size="13" fill="#975A16">活きるが、そのままでは足りない</text>

  <!-- Row 5: 監査論・企業法 -> ほぼ直接は活きない [低い] -->
  <g filter="url(#kmShadow)">
    <rect x="40" y="518" width="350" height="82" rx="14" fill="#FFFFFF" stroke="#94A3B8" stroke-width="2"/>
    <rect x="810" y="518" width="350" height="82" rx="14" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
  </g>
  <text x="215" y="552" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#1A202C">監査論・企業法</text>
  <text x="215" y="572" text-anchor="middle" class="kt" font-size="13" fill="#718096">理論暗記中心の科目</text>
  <rect x="450" y="544" width="300" height="30" rx="15" fill="url(#kmLow)"/>
  <text x="600" y="564" text-anchor="middle" class="kt" font-size="14" font-weight="700" fill="#fff">重複度：低い →</text>
  <text x="985" y="552" text-anchor="middle" class="kt" font-size="17" font-weight="800" fill="#475569">簿記1級にはほぼ直接活きない</text>
  <text x="985" y="572" text-anchor="middle" class="kt" font-size="13" fill="#475569">仕切り直しが必要なゾーン</text>

  <!-- Bottom summary bar -->
  <rect x="40" y="628" width="1120" height="96" rx="16" fill="#111827" filter="url(#kmShadow)"/>
  <text x="600" y="662" text-anchor="middle" class="kt" font-size="16" font-weight="700" fill="#8CC63F">会計・原価まわりは「強くてニューゲーム」——ここに全力投球しよう</text>
  <text x="600" y="688" text-anchor="middle" class="kt" font-size="14" fill="#E5E7EB">監査論・企業法にかけた時間も、決して無駄ではありません。</text>
  <text x="600" y="708" text-anchor="middle" class="kt" font-size="14" fill="#E5E7EB">「広い範囲を体系的に理解しきる力」という汎用スキルとして、簿記1級の学習全体に活きています。</text>
</svg>
