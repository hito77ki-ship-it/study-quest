<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="460" rx="14" fill="#FAFDF6"/>
  <!-- 装飾ドット -->
  <circle cx="775" cy="22" r="5" fill="#C4B5FD" opacity="0.6"/>
  <circle cx="752" cy="42" r="3" fill="#86EFAC" opacity="0.6"/>
  <circle cx="793" cy="48" r="4" fill="#FDE68A" opacity="0.5"/>
  <circle cx="20" cy="438" r="4" fill="#93C5FD" opacity="0.4"/>

  <!-- タイトル -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">自習 × 大学の講義：合体シナジーマップ</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#64748B">資格勉強 × 大学の授業 ＝ 単位も合格も「両取り」できる無敵の好循環</text>

  <!-- ===== STEP 1: 自習→予習 (Purple) ===== -->
  <rect x="10" y="60" width="174" height="222" rx="10" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <rect x="10" y="60" width="174" height="32" rx="10" fill="#7C3AED"/>
  <rect x="10" y="82" width="174" height="10" fill="#7C3AED"/>
  <text x="97" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">STEP 1</text>

  <text x="97" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">自習が予習になる</text>
  <text x="97" y="128" text-anchor="middle" font-size="8" fill="#7C3AED">（じしゅうがよしゅうになる）</text>

  <line x1="22" y1="138" x2="172" y2="138" stroke="#DDD6FE" stroke-width="0.8"/>

  <rect x="22" y="145" width="7" height="7" rx="1.5" fill="#7C3AED"/>
  <text x="35" y="153" font-size="9.5" fill="#374151">資格テキストで予備知識をゲット</text>
  <rect x="22" y="162" width="7" height="7" rx="1.5" fill="#7C3AED"/>
  <text x="35" y="170" font-size="9.5" fill="#374151">授業内容がスラスラ入ってくる</text>
  <rect x="22" y="179" width="7" height="7" rx="1.5" fill="#7C3AED"/>
  <text x="35" y="187" font-size="9.5" fill="#374151">手応えで自然とやる気がUP</text>

  <rect x="18" y="208" width="158" height="18" rx="5" fill="#EDE9FE"/>
  <text x="97" y="221" text-anchor="middle" font-size="9" font-weight="700" fill="#5B21B6">準備万端で講義へ出発！</text>

  <!-- 矢印 STEP1→2 -->
  <line x1="186" y1="171" x2="197" y2="171" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="200,171 193,167 193,175" fill="#8CC63F"/>

  <!-- ===== STEP 2: 講義→復習 (Blue) ===== -->
  <rect x="206" y="60" width="174" height="222" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="206" y="60" width="174" height="32" rx="10" fill="#3B82F6"/>
  <rect x="206" y="82" width="174" height="10" fill="#3B82F6"/>
  <text x="293" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">STEP 2</text>

  <text x="293" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">講義が復習になる</text>
  <text x="293" y="128" text-anchor="middle" font-size="8" fill="#3B82F6">（こうぎがふくしゅうになる）</text>

  <line x1="218" y1="138" x2="368" y2="138" stroke="#BFDBFE" stroke-width="0.8"/>

  <rect x="218" y="145" width="7" height="7" rx="1.5" fill="#3B82F6"/>
  <text x="231" y="153" font-size="9.5" fill="#374151">「知ってる！」で定着率が2倍に</text>
  <rect x="218" y="162" width="7" height="7" rx="1.5" fill="#3B82F6"/>
  <text x="231" y="170" font-size="9.5" fill="#374151">脳への刻み込みが一気に深まる</text>
  <rect x="218" y="179" width="7" height="7" rx="1.5" fill="#3B82F6"/>
  <text x="231" y="187" font-size="9.5" fill="#374151">その場で疑問を講師に聞ける</text>

  <rect x="214" y="208" width="158" height="18" rx="5" fill="#DBEAFE"/>
  <text x="293" y="221" text-anchor="middle" font-size="9" font-weight="700" fill="#1E40AF">理解度が爆発的に深まる！</text>

  <!-- 矢印 STEP2→3 -->
  <line x1="382" y1="171" x2="393" y2="171" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="396,171 389,167 389,175" fill="#8CC63F"/>

  <!-- ===== STEP 3: 単位ハック (Green) ===== -->
  <rect x="402" y="60" width="174" height="222" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="402" y="60" width="174" height="32" rx="10" fill="#22C55E"/>
  <rect x="402" y="82" width="174" height="10" fill="#22C55E"/>
  <text x="489" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">STEP 3</text>

  <text x="489" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">単位イージーモード</text>
  <text x="489" y="128" text-anchor="middle" font-size="8" fill="#22C55E">（たんいいーじーもーど）</text>

  <line x1="414" y1="138" x2="564" y2="138" stroke="#BBF7D0" stroke-width="0.8"/>

  <rect x="414" y="145" width="7" height="7" rx="1.5" fill="#22C55E"/>
  <text x="427" y="153" font-size="9.5" fill="#374151">周囲が苦しむ中、一人だけ余裕</text>
  <rect x="414" y="162" width="7" height="7" rx="1.5" fill="#22C55E"/>
  <text x="427" y="170" font-size="9.5" fill="#374151">試験で「優・秀」を狙い打てる</text>
  <rect x="414" y="179" width="7" height="7" rx="1.5" fill="#22C55E"/>
  <text x="427" y="187" font-size="9.5" fill="#374151">GPAが押し上がり就活にも有利</text>

  <rect x="410" y="208" width="158" height="18" rx="5" fill="#DCFCE7"/>
  <text x="489" y="221" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">単位（優）を楽にもぎ取れ！</text>

  <!-- 矢印 STEP3→4 -->
  <line x1="578" y1="171" x2="589" y2="171" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="592,171 585,167 585,175" fill="#8CC63F"/>

  <!-- ===== STEP 4: 教授→無料塾 (Amber) ===== -->
  <rect x="598" y="60" width="192" height="222" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <rect x="598" y="60" width="192" height="32" rx="10" fill="#F59E0B"/>
  <rect x="598" y="82" width="192" height="10" fill="#F59E0B"/>
  <text x="694" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">STEP 4</text>

  <text x="694" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">教授＝無料の個別指導塾</text>
  <text x="694" y="127" text-anchor="middle" font-size="8" fill="#B45309">（むりょうのこべつしどうじゅく）</text>

  <line x1="610" y1="138" x2="778" y2="138" stroke="#FDE68A" stroke-width="0.8"/>

  <rect x="610" y="145" width="7" height="7" rx="1.5" fill="#F59E0B"/>
  <text x="623" y="153" font-size="9.5" fill="#374151">オフィスアワーで質問し放題</text>
  <rect x="610" y="162" width="7" height="7" rx="1.5" fill="#F59E0B"/>
  <text x="623" y="170" font-size="9.5" fill="#374151">難問（連結・定率法）をプロが解説</text>
  <rect x="610" y="179" width="7" height="7" rx="1.5" fill="#F59E0B"/>
  <text x="623" y="187" font-size="9.5" fill="#374151">独学最大の弱点を確実にカバー</text>

  <rect x="606" y="208" width="178" height="18" rx="5" fill="#FEF3C7"/>
  <text x="694" y="221" text-anchor="middle" font-size="9" font-weight="700" fill="#92400E">最強の無料ギルドに入隊せよ！</text>

  <!-- ===== 好循環フィードバックループ ===== -->
  <path d="M 790,282 L 790,305 L 10,305 L 10,282" fill="none" stroke="#8CC63F" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="10,282 4,291 16,291" fill="#8CC63F"/>
  <rect x="284" y="308" width="232" height="18" rx="6" fill="#F0FFF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="400" y="321" text-anchor="middle" font-size="9.5" font-weight="700" fill="#166534">↩ 好循環ループ：4ステップが自動的に回り続ける</text>

  <!-- ===== 下部ダークバンド ===== -->
  <rect x="10" y="336" width="780" height="114" rx="8" fill="#1E293B"/>
  <text x="400" y="358" text-anchor="middle" font-size="11.5" font-weight="700" fill="#8CC63F">大谷が確信する「一石五鳥」 ― 5つの神メリット</text>

  <!-- 縦区切り線 -->
  <line x1="166" y1="367" x2="166" y2="440" stroke="#334155" stroke-width="1"/>
  <line x1="322" y1="367" x2="322" y2="440" stroke="#334155" stroke-width="1"/>
  <line x1="478" y1="367" x2="478" y2="440" stroke="#334155" stroke-width="1"/>
  <line x1="634" y1="367" x2="634" y2="440" stroke="#334155" stroke-width="1"/>

  <!-- Col 1: 最高の復習 (center x=88) -->
  <text x="88" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#C4B5FD">① 最高の復習</text>
  <text x="88" y="396" text-anchor="middle" font-size="9" fill="#CBD5E1">脳への定着率2倍</text>
  <text x="88" y="411" text-anchor="middle" font-size="9" fill="#94A3B8">同じ論点を2度学習</text>

  <!-- Col 2: 登校の動機 (center x=244) -->
  <text x="244" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#93C5FD">② 登校の動機</text>
  <text x="244" y="396" text-anchor="middle" font-size="9" fill="#CBD5E1">自然とサボらなくなる</text>
  <text x="244" y="411" text-anchor="middle" font-size="9" fill="#94A3B8">講義が資格の時間に変わる</text>

  <!-- Col 3: 単位ハック (center x=400) -->
  <text x="400" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#86EFAC">③ 単位ハック</text>
  <text x="400" y="396" text-anchor="middle" font-size="9" fill="#CBD5E1">優・秀を楽に取得</text>
  <text x="400" y="411" text-anchor="middle" font-size="9" fill="#94A3B8">GPA向上で就活に有利</text>

  <!-- Col 4: 無料個別指導 (center x=556) -->
  <text x="556" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#FDE68A">④ 無料個別指導</text>
  <text x="556" y="396" text-anchor="middle" font-size="9" fill="#CBD5E1">教授がプロ家庭教師に</text>
  <text x="556" y="411" text-anchor="middle" font-size="9" fill="#94A3B8">難問をマンツーマン解説</text>

  <!-- Col 5: モチベ維持 (center x=712) -->
  <text x="712" y="380" text-anchor="middle" font-size="10" font-weight="700" fill="#FCA5A5">⑤ モチベ維持</text>
  <text x="712" y="396" text-anchor="middle" font-size="9" fill="#CBD5E1">仲間と熱講師に出会う</text>
  <text x="712" y="411" text-anchor="middle" font-size="9" fill="#94A3B8">孤独な勉強が楽しくなる</text>

  <!-- 締めの一言 -->
  <rect x="90" y="424" width="620" height="18" rx="5" fill="#0F2918"/>
  <text x="400" y="437" text-anchor="middle" font-size="9.5" font-weight="700" fill="#8CC63F">単位 × 資格合格 × モチベ × GPA × 人脈 ＝ 一石五鳥を全部まとめてゲット！</text>
</svg>
