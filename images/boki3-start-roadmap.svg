<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="btitle bdesc">
  <title id="btitle">簿記3級 最速スタートダッシュ ロードマップ</title>
  <desc id="bdesc">テキスト入手から仕訳マスター、PC模試体験、テストセンター突撃まで4ステップで合格するロードマップ</desc>
  <defs>
    <linearGradient id="bBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FEFDF8"/>
      <stop offset="0.5" stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#F0FFF4"/>
    </linearGradient>
    <linearGradient id="bTitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="bs1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#63B3ED"/>
      <stop offset="1" stop-color="#4299E1"/>
    </linearGradient>
    <linearGradient id="bs2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#68D391"/>
      <stop offset="1" stop-color="#48BB78"/>
    </linearGradient>
    <linearGradient id="bs3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6C56A"/>
      <stop offset="1" stop-color="#ED8936"/>
    </linearGradient>
    <linearGradient id="bs4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B794F4"/>
      <stop offset="1" stop-color="#9F7AEA"/>
    </linearGradient>
    <filter id="bShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>
    <style>.bt{font-family:"Noto Sans JP",system-ui,sans-serif}</style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" rx="20" fill="url(#bBg)"/>
  <circle cx="100" cy="80" r="70" fill="#DBEAFE" opacity="0.4"/>
  <circle cx="1100" cy="100" r="80" fill="#D1FAE5" opacity="0.4"/>

  <!-- Title bar -->
  <rect x="40" y="20" width="1120" height="56" rx="14" fill="url(#bTitle)"/>
  <text x="600" y="42" text-anchor="middle" class="bt" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="3">簿記3級 ネット試験 対策</text>
  <text x="600" y="64" text-anchor="middle" class="bt" font-size="20" font-weight="800" fill="#FFFFFF">今日から合格まで！最速スタートダッシュ ロードマップ</text>
  <text x="600" y="98" text-anchor="middle" class="bt" font-size="13" fill="#64748B">学習時間の目安：50〜100時間　　ネット試験はいつでも受験OK！</text>

  <!-- Connector line -->
  <line x1="92" y1="256" x2="1068" y2="256" stroke="#CBD5E0" stroke-width="2.5" stroke-dasharray="8,5"/>
  <circle cx="313" cy="256" r="6" fill="#CBD5E0"/>
  <circle cx="536" cy="256" r="6" fill="#CBD5E0"/>
  <circle cx="757" cy="256" r="6" fill="#CBD5E0"/>

  <!-- ===== STEP 1: テキスト入手 ===== -->
  <g filter="url(#bShadow)">
    <rect x="40" y="114" width="218" height="220" rx="16" fill="#EBF8FF" stroke="#90CDF4" stroke-width="1.5"/>
    <rect x="40" y="114" width="218" height="50" rx="16" fill="url(#bs1)"/>
    <rect x="40" y="148" width="218" height="16" fill="#4299E1"/>
    <text x="149" y="136" text-anchor="middle" class="bt" font-size="14" font-weight="700" fill="#fff">STEP 1</text>
    <text x="149" y="158" text-anchor="middle" class="bt" font-size="10" fill="#BEE3F8">0 〜 20時間</text>
  </g>
  <!-- Book icon (SVG shapes) -->
  <rect x="125" y="172" width="48" height="58" rx="4" fill="#BEE3F8" stroke="#4299E1" stroke-width="2"/>
  <rect x="129" y="172" width="8" height="58" rx="3" fill="#4299E1"/>
  <line x1="143" y1="184" x2="167" y2="184" stroke="#90CDF4" stroke-width="1.5"/>
  <line x1="143" y1="195" x2="167" y2="195" stroke="#90CDF4" stroke-width="1.5"/>
  <line x1="143" y1="206" x2="167" y2="206" stroke="#90CDF4" stroke-width="1.5"/>
  <text x="149" y="254" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#2B6CB0">テキスト入手</text>
  <text x="149" y="272" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">スッキリわかる等</text>
  <text x="149" y="288" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">または無料の</text>
  <text x="149" y="305" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">CPAラーニングで</text>
  <text x="149" y="322" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#2B6CB0">初期装備を揃える！</text>
  <!-- Arrow -->
  <polygon points="264,249 264,263 282,256" fill="#90CDF4"/>

  <!-- ===== STEP 2: 仕訳マスター ===== -->
  <g filter="url(#bShadow)">
    <rect x="292" y="114" width="218" height="220" rx="16" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="1.5"/>
    <rect x="292" y="114" width="218" height="50" rx="16" fill="url(#bs2)"/>
    <rect x="292" y="148" width="218" height="16" fill="#48BB78"/>
    <text x="401" y="136" text-anchor="middle" class="bt" font-size="14" font-weight="700" fill="#fff">STEP 2</text>
    <text x="401" y="158" text-anchor="middle" class="bt" font-size="10" fill="#C6F6D5">20 〜 60時間</text>
  </g>
  <!-- Journal icon -->
  <rect x="375" y="172" width="52" height="58" rx="5" fill="#C6F6D5" stroke="#48BB78" stroke-width="2"/>
  <rect x="379" y="182" width="10" height="38" rx="3" fill="#48BB78"/>
  <!-- Jounral lines -->
  <line x1="394" y1="184" x2="420" y2="184" stroke="#9AE6B4" stroke-width="1.5"/>
  <line x1="394" y1="194" x2="420" y2="194" stroke="#9AE6B4" stroke-width="1.5"/>
  <line x1="394" y1="204" x2="420" y2="204" stroke="#9AE6B4" stroke-width="1.5"/>
  <line x1="394" y1="214" x2="420" y2="214" stroke="#9AE6B4" stroke-width="1.5"/>
  <text x="401" y="254" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#276749">仕訳マスター</text>
  <text x="401" y="272" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">借方・貸方の感覚を</text>
  <text x="401" y="288" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">毎日10問ずつ</text>
  <text x="401" y="305" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">体に染み込ませる。</text>
  <text x="401" y="322" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#276749">仕訳さえ完璧なら勝利！</text>
  <!-- Arrow -->
  <polygon points="516,249 516,263 534,256" fill="#9AE6B4"/>

  <!-- ===== STEP 3: PC模試体験 ===== -->
  <g filter="url(#bShadow)">
    <rect x="544" y="114" width="218" height="220" rx="16" fill="#FFFAF0" stroke="#F6AD55" stroke-width="1.5"/>
    <rect x="544" y="114" width="218" height="50" rx="16" fill="url(#bs3)"/>
    <rect x="544" y="148" width="218" height="16" fill="#ED8936"/>
    <text x="653" y="136" text-anchor="middle" class="bt" font-size="14" font-weight="700" fill="#fff">STEP 3</text>
    <text x="653" y="158" text-anchor="middle" class="bt" font-size="10" fill="#FEEBC8">60 〜 90時間</text>
  </g>
  <!-- PC icon (SVG shapes) -->
  <rect x="626" y="172" width="54" height="36" rx="3" fill="none" stroke="#C05621" stroke-width="2.5"/>
  <rect x="636" y="208" width="34" height="5" rx="2" fill="#C05621"/>
  <rect x="628" y="213" width="50" height="4" rx="2" fill="#C05621"/>
  <line x1="653" y1="175" x2="653" y2="207" stroke="#ED8936" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="653" y="254" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#C05621">PC模試体験</text>
  <text x="653" y="272" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">画面＋電卓＋白紙の</text>
  <text x="653" y="288" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">3点セット操作に慣れる。</text>
  <text x="653" y="305" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">公式サンプル問題を</text>
  <text x="653" y="322" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#C05621">必ず体験しておく！</text>
  <!-- Arrow -->
  <polygon points="768,249 768,263 786,256" fill="#F6AD55"/>

  <!-- ===== STEP 4: テストセンター突撃！ ===== -->
  <g filter="url(#bShadow)">
    <rect x="796" y="114" width="218" height="220" rx="16" fill="#FAF5FF" stroke="#D6BCFA" stroke-width="1.5"/>
    <rect x="796" y="114" width="218" height="50" rx="16" fill="url(#bs4)"/>
    <rect x="796" y="148" width="218" height="16" fill="#9F7AEA"/>
    <text x="905" y="136" text-anchor="middle" class="bt" font-size="14" font-weight="700" fill="#fff">STEP 4</text>
    <text x="905" y="158" text-anchor="middle" class="bt" font-size="10" fill="#E9D8FD">90 〜 100時間</text>
  </g>
  <!-- Star icon -->
  <polygon points="905,173 911,189 928,189 915,199 919,215 905,205 891,215 895,199 882,189 899,189" fill="#B794F4" stroke="#9F7AEA" stroke-width="1.5"/>
  <circle cx="905" cy="196" r="6" fill="#fff" opacity="0.7"/>
  <text x="905" y="254" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#553C9A">テストセンター突撃！</text>
  <text x="905" y="272" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">予約サイトで日程確定。</text>
  <text x="905" y="288" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">退路を断てば</text>
  <text x="905" y="305" text-anchor="middle" class="bt" font-size="11" fill="#4A5568">合格率が爆上がり！</text>
  <text x="905" y="322" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#9F7AEA">60分・70点以上で合格</text>

  <!-- GOAL marker -->
  <rect x="1044" y="236" width="72" height="40" rx="10" fill="#9F7AEA"/>
  <polygon points="1020,248 1020,264 1042,256" fill="#9F7AEA"/>
  <text x="1080" y="252" text-anchor="middle" class="bt" font-size="13" font-weight="700" fill="#fff">合格</text>
  <text x="1080" y="268" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#E9D8FD">GET!</text>

  <!-- Progress bar section -->
  <rect x="40" y="354" width="1120" height="100" rx="14" fill="rgba(255,255,255,0.75)" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Bar track -->
  <rect x="60" y="370" width="1080" height="14" rx="7" fill="#E2E8F0"/>
  <!-- 4 color segments -->
  <rect x="60"  y="370" width="270" height="14" rx="0" fill="#4299E1"/>
  <rect x="330" y="370" width="270" height="14" fill="#48BB78"/>
  <rect x="600" y="370" width="270" height="14" fill="#ED8936"/>
  <rect x="870" y="370" width="270" height="14" rx="0" fill="#9F7AEA"/>
  <!-- Round end caps -->
  <rect x="60"  y="370" width="14" height="14" rx="7" fill="#4299E1"/>
  <rect x="1126" y="370" width="14" height="14" rx="7" fill="#9F7AEA"/>
  <!-- Dividers -->
  <line x1="330" y1="368" x2="330" y2="386" stroke="#fff" stroke-width="2.5"/>
  <line x1="600" y1="368" x2="600" y2="386" stroke="#fff" stroke-width="2.5"/>
  <line x1="870" y1="368" x2="870" y2="386" stroke="#fff" stroke-width="2.5"/>
  <!-- Hour labels -->
  <text x="60"  y="404" text-anchor="middle" class="bt" font-size="11" fill="#718096">0h</text>
  <text x="330" y="404" text-anchor="middle" class="bt" font-size="11" fill="#718096">20h</text>
  <text x="600" y="404" text-anchor="middle" class="bt" font-size="11" fill="#718096">60h</text>
  <text x="870" y="404" text-anchor="middle" class="bt" font-size="11" fill="#718096">90h</text>
  <text x="1140" y="404" text-anchor="middle" class="bt" font-size="11" font-weight="700" fill="#9F7AEA">100h</text>
  <!-- Footer note -->
  <text x="600" y="430" text-anchor="middle" class="bt" font-size="12" fill="#4A5568">ネット試験（CBT方式）はこの4ステップを終えたら、全国のテストセンターで明日からでも受験できます！</text>
  <text x="600" y="448" text-anchor="middle" class="bt" font-size="12" font-weight="700" fill="#8CC63F">合格後すぐにパソコン画面で合否が分かるのがネット試験の最大の魅力！</text>
</svg>
