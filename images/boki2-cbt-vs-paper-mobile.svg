<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 1360" width="360" height="1360">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="1360" rx="14" fill="#FAFDF6"/>
  <text x="180" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">ネット試験（CBT）vs 統一試験（紙）</text>
  <text x="180" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="#1E293B">2級どっちで受けるべき？</text>
  <text x="180" y="60" text-anchor="middle" font-size="9.5" fill="#64748B">2級特有のリスクを踏まえたリアル比較</text>

  <!-- CBT -->
  <rect x="16" y="76" width="328" height="34" rx="10" fill="#3B82F6"/>
  <text x="180" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">⚡ ネット試験（CBT方式）</text>
  <rect x="16" y="110" width="328" height="330" rx="0" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="180" y="132" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1E40AF">スピード攻略型ダンジョン</text>
  <text x="180" y="148" text-anchor="middle" font-size="9.5" fill="#3B82F6">「準備OK！と思ったら即挑戦できる」</text>

  <text x="30" y="170" font-size="11" font-weight="700" fill="#1E40AF">◎ 2級受験のメリット</text>
  <text x="30" y="192" font-size="10.5" fill="#374151">・いつでも受験・不合格でも数日後に</text>
  <text x="30" y="208" font-size="10.5" fill="#374151">　即リベンジ可能</text>
  <text x="30" y="228" font-size="10.5" fill="#374151">・試験終了後すぐ合否が画面に表示</text>
  <text x="30" y="248" font-size="10.5" fill="#374151">・難易度が比較的安定（ハズレ回リスク低）</text>
  <text x="30" y="268" font-size="10.5" fill="#374151">・「仕上がったベストな状態」で受験できる</text>

  <text x="30" y="296" font-size="11" font-weight="700" fill="#B45309">△ 2級特有の注意点</text>
  <text x="30" y="318" font-size="10.5" fill="#374151">・複雑な財務諸表を画面で読む</text>
  <text x="30" y="334" font-size="10.5" fill="#374151">　「視線移動」が大変</text>
  <text x="30" y="354" font-size="10.5" fill="#374151">・計算用紙1〜2枚のみ／下書きを</text>
  <text x="30" y="370" font-size="10.5" fill="#374151">　小さく書く練習が必要</text>
  <text x="30" y="390" font-size="10.5" fill="#374151">・シュラッター図等は別紙に書く工夫が必須</text>

  <rect x="30" y="410" width="300" height="24" rx="6" fill="#DBEAFE"/>
  <text x="180" y="426" text-anchor="middle" font-size="10" font-weight="700" fill="#1E40AF">★ 大谷イチ推し！ほとんどの人に強くおすすめ</text>

  <text x="180" y="470" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">VS</text>

  <!-- 紙 -->
  <rect x="16" y="486" width="328" height="34" rx="10" fill="#F59E0B"/>
  <text x="180" y="508" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">✏ 統一試験（紙の試験）</text>
  <rect x="16" y="520" width="328" height="360" rx="0" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="180" y="542" text-anchor="middle" font-size="11.5" font-weight="700" fill="#92400E">じっくり書き込み型ダンジョン</text>
  <text x="180" y="558" text-anchor="middle" font-size="9.5" fill="#B45309">「ペンでゴリゴリ下書きする職人タイプ向け」</text>

  <text x="30" y="580" font-size="11" font-weight="700" fill="#92400E">◎ 2級受験のメリット</text>
  <text x="30" y="602" font-size="10.5" fill="#374151">・問題用紙にシュラッター図・ボックス図を</text>
  <text x="30" y="618" font-size="10.5" fill="#374151">　直接書ける</text>
  <text x="30" y="638" font-size="10.5" fill="#374151">・長文の問題資料を紙のまま自由に行き来</text>
  <text x="30" y="658" font-size="10.5" fill="#374151">・画面の視線移動がなく数字の読み飛ばし減</text>

  <text x="30" y="686" font-size="11" font-weight="700" fill="#DC2626">△ 2級特有の注意点（リスク）</text>
  <text x="30" y="708" font-size="10.5" fill="#374151">・年3回のみ（11月・2月・6月）</text>
  <text x="30" y="724" font-size="10.5" fill="#374151">　不合格で3ヶ月待ち</text>
  <text x="30" y="744" font-size="10.5" fill="#374151">・超難問「ハズレ回」に当たるリスク</text>
  <text x="30" y="764" font-size="10.5" fill="#374151">・合否結果が後日発表（数週間〜1ヶ月後）</text>
  <text x="30" y="784" font-size="10.5" fill="#374151">・試験会場が限られ移動コストもかかる</text>

  <rect x="30" y="804" width="300" height="40" rx="6" fill="#FEF3C7"/>
  <text x="180" y="820" text-anchor="middle" font-size="10" fill="#92400E">書き込み派・難易度ガチャOKの</text>
  <text x="180" y="836" text-anchor="middle" font-size="10" fill="#92400E">本気の職人向け</text>

  <!-- 結論 -->
  <rect x="16" y="864" width="328" height="230" rx="10" fill="#1E293B"/>
  <text x="180" y="894" text-anchor="middle" font-size="12" font-weight="700" fill="#8CC63F">大谷の2択プレイスタイル診断</text>

  <text x="180" y="922" text-anchor="middle" font-size="11" font-weight="700" fill="#93C5FD">◆ ネット試験（CBT）推奨タイプ</text>
  <text x="30" y="944" font-size="10" fill="#CBD5E1">・早く合格してすぐ次のステップへ進みたい人</text>
  <text x="30" y="962" font-size="10" fill="#CBD5E1">・下書き用紙の工夫ができる人</text>
  <text x="30" y="980" font-size="10" font-weight="700" fill="#CBD5E1">→ ネット試験一択！</text>

  <line x1="40" y1="1000" x2="320" y2="1000" stroke="#334155" stroke-width="1"/>

  <text x="180" y="1026" text-anchor="middle" font-size="11" font-weight="700" fill="#FDE68A">◆ 統一試験（紙）推奨タイプ</text>
  <text x="30" y="1048" font-size="10" fill="#CBD5E1">・画面の数字でミスが減らない、紙に書き込みたい人</text>
  <text x="30" y="1068" font-size="10" fill="#CBD5E1">・ハズレ回リスクを覚悟できる人</text>
  <text x="30" y="1086" font-size="10" font-weight="700" fill="#CBD5E1">→ 統一試験を狙え！</text>
</svg>
