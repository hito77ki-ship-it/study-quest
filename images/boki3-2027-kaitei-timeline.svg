<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320">
  <defs>
    <style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style>
  </defs>
  <rect width="760" height="320" rx="12" fill="#FAFBFC"/>

  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1A202C">2027年度出題区分改定タイムライン</text>

  <!-- ゾーン1: 安全ネット試験ゾーン -->
  <rect x="24" y="66" width="330" height="180" rx="14" fill="#D1FAE5" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="189" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">〜2027年3月：安全ネット試験ゾーン</text>
  <text x="189" y="126" text-anchor="middle" font-size="12" fill="#059669">
    <tspan x="189" dy="0">現行の出題区分（2022年度版）</tspan>
  </text>
  <text x="189" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">
    <tspan x="189" dy="0">「手形」あり</tspan>
    <tspan x="189" dy="22">定率法・固定資産除却は</tspan>
    <tspan x="189" dy="18">2級の範囲のまま</tspan>
  </text>
  <text x="189" y="230" text-anchor="middle" font-size="11" fill="#047857">今のうちに受けるなら3級はここ</text>

  <!-- ゾーン2: 大改定の爆風ゾーン -->
  <rect x="378" y="66" width="358" height="180" rx="14" fill="#FED7D7" stroke="#F87171" stroke-width="1.5"/>
  <text x="557" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#7F1D1D">2027年4月〜：大改定の爆風ゾーン</text>
  <text x="557" y="126" text-anchor="middle" font-size="12" fill="#B91C1C">
    <tspan x="557" dy="0">新区分表（暫定版・2027年度適用）</tspan>
  </text>
  <text x="557" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#7F1D1D">
    <tspan x="557" dy="0">「手形」が全範囲から除外</tspan>
    <tspan x="557" dy="22">定率法・固定資産除却が</tspan>
    <tspan x="557" dy="18">2級から3級に移行</tspan>
  </text>
  <text x="557" y="230" text-anchor="middle" font-size="11" fill="#991B1B">ネット試験は4月〜、統一試験は6月〜適用</text>

  <rect x="24" y="264" width="712" height="42" rx="10" fill="rgba(255,255,255,.9)" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="380" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#1A202C">出典：日本商工会議所「2027年度適用の出題区分表等（暫定版）」（2025年12月25日公開）</text>
</svg>
