<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 590" width="360" height="590" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">残高が「18か月分」になる仕組み（モバイル版）</title>
  <desc id="svgdesc">毎年7/1に12か月分の保険料を支払う場合に、決算整理・再振替仕訳を経て決算時の残高が18か月分に見える理由を縦に並べた図解</desc>
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="590" rx="12" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">残高が「18か月分」になる仕組み</text>
  <text x="180" y="44" text-anchor="middle" font-size="9.5" fill="#64748B">毎年7/1に12か月分¥180を支払う場合</text>

  <!-- Row1 -->
  <text x="20" y="76" font-size="10.5" font-weight="700" fill="#1D4ED8">【前期7/1】支払保険料¥180（12か月分）を支払い</text>
  <rect x="20" y="86" width="320" height="26" rx="4" fill="#93C5FD"/>
  <text x="180" y="103" text-anchor="middle" font-size="10" fill="#1E40AF">12か月分 ¥180（7月〜翌6月）</text>

  <!-- Row2 -->
  <text x="20" y="140" font-size="10.5" font-weight="700" fill="#7C3AED">【前期12/31】決算整理→前払分を資産に振替</text>
  <rect x="20" y="150" width="160" height="26" rx="4" fill="#93C5FD"/>
  <text x="100" y="167" text-anchor="middle" font-size="9.5" fill="#1E40AF">費用6か月分¥90</text>
  <rect x="180" y="150" width="160" height="26" rx="4" fill="#C4B5FD"/>
  <text x="260" y="167" text-anchor="middle" font-size="9.5" fill="#5B21B6">前払保険料¥90</text>

  <!-- Row3 -->
  <text x="20" y="206" font-size="10.5" font-weight="700" fill="#0891B2">【当期1/1】再振替仕訳→前払保険料を費用に戻す</text>
  <rect x="20" y="216" width="320" height="26" rx="4" fill="#BAE6FD"/>
  <text x="180" y="233" text-anchor="middle" font-size="10" fill="#0C4A6E">支払保険料¥90（費用に戻る）</text>

  <!-- Row4 -->
  <text x="20" y="272" font-size="10.5" font-weight="700" fill="#1D4ED8">【当期7/1】また12か月分¥180を支払い</text>
  <rect x="20" y="282" width="320" height="26" rx="4" fill="#93C5FD"/>
  <text x="180" y="299" text-anchor="middle" font-size="10" fill="#1E40AF">12か月分 ¥180（7月〜翌6月）</text>

  <!-- 決算前残高の正体 -->
  <rect x="20" y="330" width="320" height="140" rx="8" fill="#FFF7ED" stroke="#FDB97D" stroke-width="2"/>
  <text x="36" y="354" font-size="11" font-weight="700" fill="#C2410C">【当期12/31 決算整理前残高¥180の正体】</text>
  <text x="36" y="378" font-size="10.5" fill="#7C2D12">前期7/1分の再振替（¥90）</text>
  <text x="36" y="396" font-size="10.5" fill="#7C2D12">＋当期7/1分（¥180）</text>
  <text x="36" y="414" font-size="10.5" fill="#7C2D12">－費用として消費（¥90）＝¥180</text>
  <text x="36" y="440" font-size="10" fill="#92400E">＝次期繰越の前払保険料6か月分（¥90）</text>
  <text x="36" y="456" font-size="10" fill="#92400E">＋当期費用6か月分（¥90）</text>

  <!-- bottom note -->
  <rect x="20" y="486" width="320" height="76" rx="8" fill="#F1F5F9"/>
  <text x="180" y="510" text-anchor="middle" font-size="10" fill="#64748B">※決算整理で前払6か月分¥90を</text>
  <text x="180" y="528" text-anchor="middle" font-size="10" fill="#64748B">「前払保険料（資産）」に振替し、</text>
  <text x="180" y="546" text-anchor="middle" font-size="10" fill="#64748B">費用は6か月分¥90だけが当期費用となる</text>
</svg>
