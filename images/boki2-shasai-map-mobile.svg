<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 940" width="360" height="940">
  <defs><style>text { font-family: 'Noto Sans JP','Hiragino Sans',sans-serif; }</style></defs>
  <rect width="360" height="940" rx="16" fill="#F8FAFC"/>
  <text x="180" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">社債のレベルアップ階段＆</text>
  <text x="180" y="44" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">買入償還ルート脱出マップ</text>
  <text x="180" y="62" text-anchor="middle" font-size="9.5" fill="#64748B">償却原価法で帳簿価額が育つ様子と、</text>
  <text x="180" y="76" text-anchor="middle" font-size="9.5" fill="#64748B">途中下車する買入償還ルート</text>

  <!-- Step cards -->
  <rect x="24" y="92" width="312" height="52" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="180" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">発行時：980,000円</text>
  <text x="180" y="132" text-anchor="middle" font-size="9.5" fill="#64748B">社債の発行価額（額面より割引発行）</text>

  <path d="M180,144 L180,158 M174,150 L180,158 L186,150" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="230" y="153" font-size="9" fill="#EC4899">＋4,000円/年</text>

  <rect x="24" y="164" width="312" height="42" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="180" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">1年目：984,000円</text>

  <path d="M180,206 L180,220" stroke="#3B82F6" stroke-width="2"/>
  <rect x="24" y="222" width="312" height="42" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="180" y="248" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">2年目：988,000円</text>

  <path d="M180,264 L180,278" stroke="#EC4899" stroke-width="2"/>
  <rect x="24" y="280" width="312" height="50" rx="10" fill="#FDF2F8" stroke="#EC4899" stroke-width="2.5"/>
  <text x="180" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#DB2777">3年目：992,000円</text>
  <text x="180" y="320" text-anchor="middle" font-size="9.5" fill="#DB2777">🔀 ここが買入償還の分岐点！</text>

  <path d="M180,330 L180,344" stroke="#3B82F6" stroke-width="2"/>
  <rect x="24" y="346" width="312" height="42" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="180" y="372" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">4年目：996,000円</text>

  <path d="M180,388 L180,402" stroke="#16A34A" stroke-width="2"/>
  <rect x="24" y="404" width="312" height="52" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2.5"/>
  <text x="180" y="428" text-anchor="middle" font-size="12.5" font-weight="700" fill="#166534">5年目（満期）★1,000,000円</text>
  <text x="180" y="446" text-anchor="middle" font-size="9.5" fill="#166534">額面まで育って満期償還</text>

  <!-- 買入償還 section -->
  <rect x="16" y="476" width="328" height="360" rx="12" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2"/>
  <text x="180" y="502" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9D174D">🔀 買入償還——ルート脱出の分岐点！</text>

  <rect x="32" y="516" width="296" height="64" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="180" y="536" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E40AF">帳簿の価値（3年目）</text>
  <text x="180" y="562" text-anchor="middle" font-size="15" font-weight="700" fill="#1E40AF">992,000円</text>

  <text x="180" y="600" text-anchor="middle" font-size="20" font-weight="700" fill="#DB2777">－</text>

  <rect x="32" y="612" width="296" height="64" rx="8" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="2"/>
  <text x="180" y="632" text-anchor="middle" font-size="10.5" font-weight="700" fill="#9D174D">実際の買入価額（買った値段）</text>
  <text x="180" y="658" text-anchor="middle" font-size="15" font-weight="700" fill="#9D174D">990,000円</text>

  <text x="180" y="696" text-anchor="middle" font-size="20" font-weight="700" fill="#DB2777">＝</text>

  <rect x="32" y="708" width="296" height="64" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="728" text-anchor="middle" font-size="10.5" font-weight="700" fill="#166534">差額＝社債償還益</text>
  <text x="180" y="754" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">2,000円</text>

  <text x="180" y="794" text-anchor="middle" font-size="10" fill="#374151">帳簿価額992,000円－買入価額990,000円</text>
  <text x="180" y="810" text-anchor="middle" font-size="10" fill="#374151">＝差額2,000円は「得した分」＝</text>
  <text x="180" y="826" text-anchor="middle" font-size="10" fill="#374151">社債償還益（利益）になる！</text>

  <!-- Bottom journal note -->
  <rect x="16" y="852" width="328" height="70" rx="8" fill="#111827"/>
  <text x="180" y="876" text-anchor="middle" font-size="11" font-weight="700" fill="#E5E7EB">毎年末（決算時）の仕訳（償却原価法）</text>
  <text x="180" y="900" text-anchor="middle" font-size="11.5" font-weight="700" fill="#FBBF24">社債利息 4,000 ／ 社債 4,000</text>
</svg>
