<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 828" width="360" height="828" role="img" aria-labelledby="svgtitle svgdesc">
  <title id="svgtitle">二級建築士 学科・製図2段階突破の合格戦略マップ（モバイル版）</title>
  <desc id="svgdesc">建築計画・建築法規・建築構造・建築施工の4科目を経て学科試験に合格し、5年間の有効期限内に製図試験へ挑む流れを縦に示した図解</desc>
  <defs><style>text{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;}</style></defs>
  <rect width="360" height="828" rx="16" fill="#FEFCF9"/>
  <text x="180" y="28" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">二級建築士 学科・製図</text>
  <text x="180" y="46" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">2段階突破の合格戦略マップ</text>
  <text x="180" y="64" text-anchor="middle" font-size="9.5" fill="#94A3B8">「法規」を得点源に→5年間の有効期限をフル活用</text>

  <rect x="16" y="82" width="328" height="76" rx="14" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="32" y="106" font-size="13" font-weight="700" fill="#1D4ED8">建築計画（けいかく）</text>
  <text x="326" y="106" text-anchor="end" font-size="11" fill="#1E40AF">25問</text>
  <text x="32" y="126" font-size="10" fill="#374151">住宅・各部寸法の暗記が中心</text>

  <rect x="16" y="166" width="328" height="82" rx="14" fill="#FEF3C7" stroke="#FBBF24" stroke-width="2.5"/>
  <text x="32" y="190" font-size="13" font-weight="700" fill="#92400E">★建築法規（ほうき）</text>
  <text x="326" y="190" text-anchor="end" font-size="11" fill="#78350F">25問</text>
  <text x="32" y="210" font-size="10" fill="#78350F">法令集持込可</text>
  <text x="32" y="228" font-size="10.5" font-weight="700" fill="#C2410C">最優先の得点源！</text>

  <rect x="16" y="256" width="328" height="76" rx="14" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="32" y="280" font-size="13" font-weight="700" fill="#166534">建築構造（こうぞう）</text>
  <text x="326" y="280" text-anchor="end" font-size="11" fill="#14532D">25問</text>
  <text x="32" y="300" font-size="10" fill="#374151">力学計算・構造形式の理解</text>

  <rect x="16" y="340" width="328" height="76" rx="14" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
  <text x="32" y="364" font-size="13" font-weight="700" fill="#5B21B6">建築施工（せこう）</text>
  <text x="326" y="364" text-anchor="end" font-size="11" fill="#4C1D95">25問</text>
  <text x="32" y="384" font-size="10" fill="#374151">施工手順・用語の暗記</text>

  <polygon points="180,424 172,436 188,436" fill="#94A3B8"/>

  <rect x="60" y="444" width="240" height="66" rx="16" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2.5"/>
  <text x="180" y="470" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">🎓 学科試験 合格！</text>
  <text x="180" y="490" text-anchor="middle" font-size="9.5" fill="#14532D">4科目とも60%前後の基準を死守</text>

  <polygon points="180,522 172,534 188,534" fill="#94A3B8"/>

  <rect x="16" y="544" width="328" height="56" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="180" y="566" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">学科合格から5年間、製図試験に</text>
  <text x="180" y="584" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">何度でも再挑戦できる有効期限</text>

  <g font-size="10" fill="#64748B">
    <rect x="16" y="612" width="60" height="24" rx="6" fill="#F1F5F9"/><text x="46" y="628" text-anchor="middle">1年目</text>
    <rect x="86" y="612" width="60" height="24" rx="6" fill="#F1F5F9"/><text x="116" y="628" text-anchor="middle">2年目</text>
    <rect x="156" y="612" width="60" height="24" rx="6" fill="#FCE7F3"/><text x="186" y="628" text-anchor="middle" fill="#DB2777" font-weight="700">3年目</text>
    <rect x="226" y="612" width="60" height="24" rx="6" fill="#F1F5F9"/><text x="256" y="628" text-anchor="middle">4年目</text>
    <rect x="296" y="612" width="48" height="24" rx="6" fill="#F1F5F9"/><text x="320" y="628" text-anchor="middle">5年目</text>
  </g>
  <text x="180" y="654" text-anchor="middle" font-size="10" font-weight="700" fill="#DB2777">↑ 何度でもバトンリレーで再挑戦できる</text>

  <polygon points="180,674 172,686 188,686" fill="#EC4899"/>

  <rect x="30" y="696" width="300" height="112" rx="16" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="2.5"/>
  <text x="180" y="726" text-anchor="middle" font-size="13" font-weight="700" fill="#9D174D">🖊️ 製図試験（せいずしけん）</text>
  <text x="180" y="748" text-anchor="middle" font-size="10.5" fill="#831843">5時間・手書きで設計図面を完成</text>
  <text x="180" y="766" text-anchor="middle" font-size="10.5" fill="#831843">面積オーバー・構造不成立は即失格</text>
  <text x="180" y="792" text-anchor="middle" font-size="10" fill="#374151">合格率50〜55%</text>
</svg>
