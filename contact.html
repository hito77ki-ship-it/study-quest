<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜スタディクエスト</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--green:#8CC63F;--green2:#6AAF2B;--text:#1A202C;--muted:#718096;--border:#E2E8F0;--bg:#FFFFFF;}
body{font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);line-height:1.8;}
a{text-decoration:none;color:var(--green2);}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 24px;}
.nav-inner{max-width:1080px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Cinzel',serif;font-size:15px;color:var(--green2);letter-spacing:.1em;display:flex;align-items:center;gap:8px;}
.nav-logo span{font-size:20px;}
.nav-back{color:var(--muted);font-size:13px;padding:9px 20px;border-radius:100px;border:1px solid var(--border);transition:all .2s;}
.nav-back:hover{border-color:var(--green);color:var(--green);}

.container{max-width:640px;margin:0 auto;padding:100px 24px 64px;text-align:center;}
h1{font-size:28px;font-weight:700;margin-bottom:12px;}
.lead{color:var(--muted);font-size:15px;margin-bottom:48px;line-height:1.8;}

.contact-card{background:#F8FDF0;border:1px solid #D4EDAD;border-radius:16px;padding:36px 32px;text-align:left;}
.contact-card h2{font-size:16px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.contact-card p{font-size:14px;color:#374151;margin-bottom:20px;}

.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--text);}
.form-group input,
.form-group select,
.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);transition:border-color .2s;outline:none;background:#fff;}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{border-color:var(--green);}
.form-group textarea{resize:vertical;min-height:140px;}

.btn-submit{width:100%;background:var(--green);color:#fff;font-size:15px;font-weight:700;padding:14px;border-radius:100px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:background .2s;margin-top:8px;}
.btn-submit:hover{background:var(--green2);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}

.note{font-size:12px;color:var(--muted);margin-top:16px;text-align:center;}

footer{background:#111827;padding:32px 24px;text-align:center;margin-top:64px;}
.footer-logo{font-family:'Cinzel',serif;font-size:14px;color:#4A5568;margin-bottom:12px;}
.footer-links{display:flex;justify-content:center;gap:24px;margin-bottom:16px;flex-wrap:wrap;}
.footer-links a{font-size:12px;color:#4A5568;transition:color .2s;}
.footer-links a:hover{color:#8CC63F;}
.footer-copy{font-size:11px;color:#2D3748;}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8524998392329204"
     crossorigin="anonymous"></script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="lp.html"><span>⚔</span> スタディクエスト</a>
    <a class="nav-back" href="lp.html">← LPに戻る</a>
  </div>
</nav>

<div class="container">
  <h1>お問い合わせ</h1>
  <p class="lead">バグの報告・機能のご要望・その他ご質問はこちらからどうぞ。<br>通常2〜3日以内にご返信します。</p>

  <div class="contact-card">
    <h2>📬 お問い合わせフォーム</h2>
    <p>以下のフォームに必要事項を入力して送信してください。</p>

    <form id="contactForm" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label>お名前（ニックネーム可）<span style="color:#EF4444">*</span></label>
        <input type="text" id="f_name" placeholder="冒険者名など" required>
      </div>
      <div class="form-group">
        <label>メールアドレス（返信が必要な場合）</label>
        <input type="email" id="f_email" placeholder="任意">
      </div>
      <div class="form-group">
        <label>お問い合わせ種別<span style="color:#EF4444">*</span></label>
        <select id="f_type" required>
          <option value="">選択してください</option>
          <option value="バグ報告">バグ・不具合の報告</option>
          <option value="機能要望">機能のご要望</option>
          <option value="アカウントについて">アカウント・データについて</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>お問い合わせ内容<span style="color:#EF4444">*</span></label>
        <textarea id="f_message" placeholder="詳しく教えていただけると助かります。" required></textarea>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">送信する</button>
      <p class="note">※個人情報は返信のみに使用し、第三者に提供しません。</p>
    </form>

    <div id="successMsg" style="display:none;text-align:center;padding:32px 0;">
      <div style="font-size:48px;margin-bottom:16px;">✅</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px;">送信しました！</div>
      <div style="font-size:14px;color:#718096;">お問い合わせありがとうございます。確認次第ご連絡します。</div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">⚔ スタディクエスト</div>
  <div class="footer-links">
    <a href="index.html">アプリを使う</a>
    <a href="about.html">運営者情報</a>
      <a href="terms.html">利用規約</a>
    <a href="about.html">運営者情報</a>
    <a href="privacy.html">プライバシーポリシー</a>
    <a href="tokusho.html">特定商取引法</a>
    <a href="contact.html">お問い合わせ</a>
  </div>
  <div class="footer-copy">© 2026 スタディクエスト. All rights reserved.</div>
</footer>

<script>
const FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSffAgcOkl6am1JgoiHQGiYDnpC0rISkfA2aOncEmsRNEHirQw/formResponse';

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.textContent = '送信中...';
  btn.disabled = true;

  const body = new FormData();
  body.append('entry.206498477',  document.getElementById('f_name').value);
  body.append('entry.1572080067', document.getElementById('f_email').value);
  body.append('entry.1970467623', document.getElementById('f_type').value);
  body.append('entry.1205251950', document.getElementById('f_message').value);

  try {
    // Google Formsはno-corsで送信（レスポンスは取得不可だが送信は成功する）
    await fetch(FORM_ACTION, { method: 'POST', body, mode: 'no-cors' });
    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  } catch {
    alert('送信に失敗しました。お手数ですがXのDM（@ichiro_cpa_st）でお知らせください。');
    btn.textContent = '送信する';
    btn.disabled = false;
  }
}
</script>

</body>
</html>
